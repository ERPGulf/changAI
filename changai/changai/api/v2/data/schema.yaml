    - FIFO
    - Moving Average
    - LIFO
  - name: warranty_period
    description: Duration of warranty coverage for the item, used when users ask about
      warranty length or coverage period.
  - name: weight_per_unit
    description: Physical weight of a single unit of the item, used when users ask
      about item weight, shipping calculations, or weight-based pricing.
  - name: weight_uom
    description: Unit of measurement for the item's weight (e.g., kg, lbs, grams),
      used when users need to know the weight measurement standard.
    join_hint:
      table: tabUOM
      'on': weight_uom = tabUOM.name
  - name: allow_negative_stock
    description: Whether this item can be issued or sold even when inventory quantity
      is zero or below.
  - name: barcodes
    description: Barcode identifiers associated with this item for scanning and lookup
      operations.
  - name: reorder_levels
    description: Minimum stock quantity thresholds that trigger purchase or manufacturing
      requests for this item across warehouses.
  - name: has_batch_no
    description: Item requires batch number tracking for inventory management and
      traceability
  - name: create_new_batch
    description: Automatically generate a new batch number when this item is received
      or manufactured
  - name: batch_number_series
    description: Naming pattern or series used to auto-generate batch numbers for
      this item
  - name: has_expiry_date
    description: Indicates whether this item expires and requires expiration date
      tracking for inventory and sales.
  - name: retain_sample
    description: Indicates whether a sample of this item must be retained for quality
