  - name: company
    description: Company entity to which this pricing rule is restricted or belongs
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: currency
    description: Currency in which the pricing rule's amounts or discounts are denominated
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: margin_type
    description: Whether the pricing rule applies margin as a percentage or fixed
