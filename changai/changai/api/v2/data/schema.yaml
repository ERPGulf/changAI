    description: Classification code (e.g., A, B, C, D) used when determining vehicle
      type permissions and license requirements.
  - name: description
    description: Detailed explanation of what vehicles or operations the license category
      covers, used when validating driver qualifications or compliance requirements.
  - name: issuing_date
    description: Date when the driving license category was originally issued to the
      holder.
  - name: expiry_date
    description: Date when the driving license category becomes invalid and requires
      renewal.
  desc_done: true
- table: tabDropbox Settings
  description: ''
  fields:
  - name: name
    description: Name or identifier of the Dropbox integration configuration
  - name: enabled
    description: Whether the Dropbox integration is currently active and operational
  - name: send_notifications_to
    description: Email address or recipient who receives alerts about Dropbox sync
      events and errors
  - name: send_email_for_successful_backup
    description: Whether email notifications are sent when Dropbox backups complete
      successfully.
  - name: backup_frequency
    description: How often automated Dropbox backups are scheduled to run.
    options:
    - Daily
    - Weekly
  - name: limit_no_of_backups
    description: Maximum number of backup copies retained in Dropbox before older
      backups are deleted.
  - name: no_of_backups
    description: Number of backup copies retained in Dropbox for the organization.
  - name: file_backup
    description: Indicates whether automatic file backup to Dropbox is enabled.
  - name: app_access_key
    description: Authentication key used to connect and authorize the application
      with Dropbox services.
  - name: app_secret_key
    description: Secret key for authenticating the Dropbox application integration.
  - name: dropbox_refresh_token
    description: Token used to obtain new access tokens when the current Dropbox access
      token expires.
  - name: dropbox_access_token
    description: Current active token for authorizing API requests to Dropbox services.
  desc_done: true
- table: tabDunning
  description: ''
  fields:
  - name: name
    description: Unique identifier for the dunning notice or letter sent to the customer
      for overdue payments
  - name: naming_series
    description: Prefix pattern used to auto-generate dunning notice numbers
    options:
    - DUNN-.MM.-.YY.-
  - name: customer
    description: Customer who is being sent the dunning notice for outstanding or
      overdue invoices
    join_hint:
      table: tabCustomer
      'on': customer = tabCustomer.name
  - name: customer_name
    description: Name of the customer being dunned for overdue payments or outstanding
      invoices.
  - name: company
    description: Company entity that issued the dunning notice or owns the receivable.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: posting_date
    description: Date when the dunning notice or related transaction was posted to
      the accounting ledger.
  - name: posting_time
    description: Time of day when the dunning notice was posted or created.
  - name: status
    description: Current state of the dunning process such as draft, sent, resolved,
      or cancelled.
    options:
    - Draft
    - Resolved
    - Unresolved
    - Cancelled
  - name: currency
    description: Currency in which the dunning amounts and outstanding balances are
      denominated.
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: Exchange rate used to convert dunning amounts from transaction currency
      to company base currency.
  - name: dunning_type
    description: Classification of the dunning notice such as first reminder, second
      reminder, final notice, or legal action.
    join_hint:
      table: tabDunning Type
      'on': dunning_type = tabDunning Type.name
  - name: rate_of_interest
    description: Interest percentage charged on overdue amounts as specified in the
      dunning notice or agreement.
  - name: overdue_payments
    description: Amount of payments past their due date that triggered dunning actions
      or collection processes.
  - name: total_interest
    description: Accumulated interest charges on overdue payments or late balances.
  - name: dunning_fee
    description: Fee charged to the customer for dunning collection activities or
      late payment reminders.
  - name: dunning_amount
    description: Total amount subject to dunning collection in transaction currency,
      used when asking about overdue payment amounts or dunning fees charged to customers.
  - name: base_dunning_amount
    description: Dunning amount converted to company base currency for consolidated
      reporting across multiple currencies.
  - name: spacer
    description: Visual separator or placeholder field with no business data value.
  - name: total_outstanding
    description: Unpaid balance remaining on the dunning notice after payments and
      credits applied
  - name: grand_total
    description: Total amount originally due on the dunning notice before any payments
      or adjustments
  - name: language
    description: Language in which the dunning notice was generated or should be communicated
      to the customer
    join_hint:
      table: tabLanguage
      'on': language = tabLanguage.name
  - name: body_text
    description: Main content of the dunning letter sent to customers regarding overdue
      payments or outstanding balances.
  - name: letter_head
    description: Header section of the dunning letter containing company branding,
      logo, or sender information.
    join_hint:
      table: tabLetter Head
      'on': letter_head = tabLetter Head.name
  - name: closing_text
    description: Final paragraph or sign-off text at the end of the dunning letter,
      typically containing contact information or payment instructions.
  - name: income_account
    description: Account where dunning fees or charges are recorded as revenue
    join_hint:
      table: tabAccount
      'on': income_account = tabAccount.name
  - name: cost_center
    description: Cost center to which dunning-related expenses or activities are allocated
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: amended_from
    description: Reference to the original dunning document that this dunning replaces
      or corrects
    join_hint:
      table: tabDunning
      'on': amended_from = tabDunning.name
  - name: customer_address
    description: Physical or billing address of the customer being dunned for overdue
      payments.
    join_hint:
      table: tabAddress
      'on': customer_address = tabAddress.name
  - name: address_display
    description: Formatted address string used when displaying or printing dunning
      notices to customers.
  - name: contact_person
    description: Specific individual at the customer organization to contact regarding
      overdue invoices and payment collection.
    join_hint:
      table: tabContact
      'on': contact_person = tabContact.name
  - name: contact_display
    description: Name of the person to contact for dunning communications or payment
      follow-up
  - name: contact_mobile
    description: Mobile phone number to reach the dunning contact for urgent payment
      matters
  - name: contact_email
    description: Email address for sending dunning notices and payment reminders to
      the contact
  - name: company_address
    description: Company address used for dunning correspondence and legal notices
      sent to customers.
    join_hint:
      table: tabAddress
      'on': company_address = tabAddress.name
  - name: company_address_display
    description: Formatted version of company address for display on dunning letters
      and customer-facing documents.
  desc_done: true
- table: tabDunning Letter Text
  description: ''
  fields:
  - name: name
    description: Unique identifier or title for the dunning letter text template used
      to distinguish between different letter versions or types
  - name: language
    description: Language code or locale in which the dunning letter text is written,
      used when matching letters to customer language preferences
    join_hint:
      table: tabLanguage
      'on': language = tabLanguage.name
  - name: is_default_language
    description: Indicates whether this dunning letter text serves as the fallback
      template when no language-specific version matches the customer's language
  - name: body_text
    description: Main message content of the dunning letter sent to customers regarding
      overdue payments or outstanding balances.
  - name: closing_text
    description: Final closing statement or sign-off text that appears at the end
      of the dunning letter after the main body content.
  desc_done: true
- table: tabDunning Type
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the dunning type configuration
  - name: dunning_type
    description: Classification or category of the dunning process such as letter-based,
      email-based, or legal action dunning
  - name: is_default
    description: Indicates whether this dunning type is automatically applied to new
      customers or accounts without explicit assignment
  - name: company
    description: Company entity to which this dunning type configuration applies.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: dunning_fee
    description: Fixed fee amount charged to customers when this dunning type is applied
      for overdue payments.
  - name: rate_of_interest
    description: Percentage interest rate applied to overdue amounts when using this
      dunning type.
  - name: dunning_letter_text
    description: Text content of the dunning notice sent to customers with overdue
      payments.
  - name: income_account
    description: Account where dunning fees or charges are recorded as revenue.
    join_hint:
      table: tabAccount
      'on': income_account = tabAccount.name
  - name: cost_center
    description: Cost center to which dunning-related expenses or activities are allocated.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  desc_done: true
- table: tabDynamic Link
  description: ''
  fields:
  - name: name
    description: Unique identifier for this dynamic link record
  - name: link_doctype
    description: The type of document being linked (e.g., Customer, Supplier, Employee)
      that determines what kind of entity this link points to
    join_hint:
      table: tabDocType
      'on': link_doctype = tabDocType.name
  - name: link_name
    description: The specific document ID or name of the linked entity within the
      link_doctype
  - name: link_title
    description: Title or name of the linked document or record being referenced in
      the dynamic relationship
  desc_done: true
- table: tabEmail Account
  description: ''
  fields:
  - name: name
    description: email_account_name
  - name: email_id
    description: email_address_or_username_for_the_account
  - name: company
    description: company_or_organization_associated_with_this_email_account
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: email_account_name
    description: The unique identifier or label for the email account, used when searching
      for specific email configurations or account details.
  - name: domain
    description: The domain portion of the email address (e.g., company.com), used
      when filtering accounts by organization or email provider domain.
    join_hint:
      table: tabEmail Domain
      'on': domain = tabEmail Domain.name
  - name: service
    description: The email service provider or protocol type (e.g., Gmail, Outlook,
      IMAP, SMTP), used when identifying which platform or technology handles the
      email account.
    options:
    - GMail
    - Sendgrid
    - SparkPost
    - Yahoo Mail
    - Outlook.com
    - Yandex.Mail
  - name: auth_method
    description: Authentication method used for the email account such as password,
      OAuth, or API token.
    options:
    - Basic
    - OAuth
  - name: backend_app_flow
    description: Whether the email account uses backend application authentication
      flow for automated or service-based access.
  - name: password
    description: Password credential for email account authentication when using password-based
      auth method.
  - name: awaiting_password
    description: Indicates whether the email account is pending password entry or
      authentication credentials to become active.
  - name: ascii_encode_password
    description: Controls whether the password should be ASCII-encoded for compatibility
      with certain email servers or authentication protocols.
  - name: connected_app
    description: References the third-party application or OAuth app used to authenticate
      and connect this email account.
    join_hint:
      table: tabConnected App
      'on': connected_app = tabConnected App.name
  - name: connected_user
    description: User account linked to this email account for sending and receiving
      emails
    join_hint:
      table: tabUser
      'on': connected_user = tabUser.name
  - name: login_id_is_different
    description: Indicates whether the login credentials differ from the email address
      itself
  - name: login_id
    description: Username or identifier used to authenticate into the email server
      when different from the email address
  - name: enable_incoming
    description: Whether this email account can receive incoming emails from external
      sources.
  - name: default_incoming
    description: Whether this email account is the default account for receiving all
      incoming emails.
  - name: use_imap
    description: Whether this email account uses IMAP protocol instead of POP3 for
      retrieving emails.
  - name: use_ssl
    description: Whether the email account uses SSL encryption for secure connection
      to the email server.
  - name: use_starttls
    description: Whether the email account uses STARTTLS encryption to upgrade a plain
      connection to secure.
  - name: email_server
    description: The hostname or IP address of the incoming mail server for receiving
      emails.
  - name: incoming_port
    description: Port number for receiving incoming emails via IMAP or POP3 protocols
  - name: attachment_limit
    description: Maximum file size allowed for email attachments in this account
  - name: email_sync_option
    description: Configuration for how emails are synchronized between server and
      system, such as sync frequency or which folders to sync
    options:
    - ALL
    - UNSEEN
  - name: initial_sync_count
    description: Number of emails synchronized during the first sync when the email
      account was set up
    options:
    - '100'
    - '250'
    - '500'
  - name: imap_folder
    description: IMAP folder path or name where emails are stored or retrieved from
      on the mail server
  - name: append_emails_to_sent_folder
    description: Whether sent emails are automatically added to the sent folder after
      being dispatched
  - name: sent_folder_name
    description: Name of the folder where sent emails are stored for this email account.
  - name: append_to
    description: Specifies which DocType or entity type incoming emails should be
      linked or appended to.
    join_hint:
      table: tabDocType
      'on': append_to = tabDocType.name
  - name: create_contact
    description: Whether to automatically create a new contact record when receiving
      emails from unknown senders.
  - name: enable_automatic_linking
    description: Whether incoming emails are automatically linked to related documents
      like customers, leads, or issues.
  - name: notify_if_unreplied
    description: Whether to send notifications when emails remain unanswered for a
      specified duration.
  - name: unreplied_for_mins
    description: Time threshold in minutes after which an unreplied email triggers
      a notification.
  - name: send_notification_to
    description: Email address that receives system notifications and alerts from
      this email account.
  - name: enable_outgoing
    description: Whether this email account can send outbound emails.
  - name: use_tls
    description: Whether TLS encryption is enabled for secure email transmission on
      this account.
  - name: use_ssl_for_outgoing
    description: Whether SSL/TLS encryption is enabled for sending outbound emails
      through this account.
  - name: smtp_server
    description: Hostname or IP address of the mail server used to send outgoing emails.
  - name: smtp_port
    description: Network port number used to connect to the SMTP server for sending
      emails.
  - name: default_outgoing
    description: Whether this email account is the default choice for sending outbound
      emails from the system.
  - name: always_use_account_email_id_as_sender
    description: Whether outgoing emails always use this account's email address as
      the sender, overriding individual user email addresses.
  - name: always_use_account_name_as_sender_name
    description: Whether outgoing emails always use this account's display name as
      the sender name, overriding individual user names.
  - name: send_unsubscribe_message
    description: Whether unsubscribe confirmation messages are sent when recipients
      opt out of emails from this account.
  - name: track_email_status
    description: Whether delivery, open, and bounce tracking is enabled for emails
      sent through this account.
  - name: no_smtp_authentication
    description: Whether SMTP authentication is disabled when connecting to the outgoing
      mail server for this account.
  - name: always_bcc
    description: Email addresses that are automatically copied on every outgoing email
      from this account
  - name: add_signature
    description: Whether the signature is automatically appended to outgoing emails
      from this account
  - name: signature
    description: The text or HTML content that appears at the bottom of outgoing emails
      when enabled
  - name: enable_auto_reply
    description: Whether automatic email replies are turned on for this email account
      when receiving messages
  - name: auto_reply_message
    description: The text content sent automatically when someone emails this account
      and auto-reply is enabled
  - name: footer
    description: Signature or standard text automatically appended to the bottom of
      outgoing emails from this account
  - name: uidvalidity
    description: IMAP uidvalidity value indicating whether email UIDs have been reset
      or changed for this account.
  - name: uidnext
    description: IMAP uidnext value predicting the next unique identifier to be assigned
      to incoming emails.
  - name: no_failed
    description: Count of failed email operations or connection attempts for this
      email account.
  desc_done: true
- table: tabEmail Campaign
  description: ''
  fields:
  - name: name
    description: Unique identifier or code for the email campaign record
  - name: campaign_name
    description: Display name or title of the email campaign used in marketing communications
    join_hint:
      table: tabCampaign
      'on': campaign_name = tabCampaign.name
  - name: email_campaign_for
    description: Target entity, audience segment, or purpose that this email campaign
      is designed to reach
    options:
    - Lead
    - Contact
    - Email Group
  - name: recipient
    description: Email address or contact who receives the campaign message
  - name: sender
    description: Email address or contact who sends the campaign message
    join_hint:
      table: tabUser
      'on': sender = tabUser.name
  - name: start_date
    description: Date when the email campaign begins or is scheduled to launch
  - name: end_date
    description: Date when the email campaign concludes or is scheduled to stop sending
      messages.
  - name: status
    description: Current state of the email campaign such as draft, active, paused,
      completed, or cancelled.
    options:
    - Scheduled
    - In Progress
    - Completed
    - Unsubscribed
  desc_done: true
- table: tabEmail Digest
  description: Send regular summary reports via Email.
  fields:
  - name: name
    description: Unique identifier or title of the email digest configuration
  - name: enabled
    description: Whether this email digest is currently active and will be sent to
      recipients
  - name: company
    description: Company or organization that this email digest belongs to or is configured
      for
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: frequency
    description: How often the email digest is sent (daily, weekly, monthly) to determine
      the schedule interval.
    options:
    - Daily
    - Weekly
    - Monthly
  - name: next_send
    description: The upcoming date and time when this email digest will be automatically
      sent to recipients.
  - name: recipients
    description: The list of email addresses or users who will receive this digest
      when it is sent.
  - name: income
    description: Revenue or earnings received during the email digest period.
  - name: expenses_booked
    description: Expenses recorded or recognized during the email digest period.
  - name: income_year_to_date
    description: Cumulative revenue or earnings from the start of the fiscal year
      to the email digest date.
  - name: expense_year_to_date
    description: Total expenses accumulated from the beginning of the current year,
      used when asking about annual spending or year-to-date expense totals.
  - name: bank_balance
    description: Current amount of funds available in bank accounts, used when asking
      about available cash or bank account balances.
  - name: credit_balance
    description: Outstanding credit amount owed or available credit limit, used when
      asking about credit obligations or available credit.
  - name: invoiced_amount
    description: Total amount that has been invoiced to customers for completed billing
      transactions.
  - name: payables
    description: Outstanding amounts owed to suppliers or vendors that need to be
      paid.
  - name: sales_orders_to_bill
    description: Sales orders that have been fulfilled or shipped but not yet invoiced
      to customers.
  - name: purchase_orders_to_bill
    description: Filters digest to include purchase orders that have been received
      but not yet invoiced by suppliers.
  - name: sales_order
    description: Filters digest to include sales order transactions and customer order
      activity.
  - name: purchase_order
    description: Filters digest to include purchase order transactions and supplier
      ordering activity.
  - name: sales_orders_to_deliver
    description: Sales orders that have been confirmed but not yet fully delivered
      to customers.
  - name: purchase_orders_to_receive
    description: Purchase orders awaiting receipt of goods or services from suppliers.
  - name: sales_invoice
    description: Invoices issued to customers for sales transactions.
  - name: purchase_invoice
    description: Referenced when users ask about supplier bills, vendor invoices,
      or accounts payable documents in email digests.
  - name: new_quotations
    description: Referenced when users ask about recently created or just-submitted
      sales quotes in email digests.
  - name: pending_quotations
    description: Referenced when users ask about outstanding or awaiting-response
      sales quotes in email digests.
  - name: issue
    description: References a specific issue or problem tracked in the system that
      is included in the email digest.
  - name: project
    description: References the project associated with items or updates included
      in the email digest.
  - name: purchase_orders_items_overdue
    description: Indicates whether the email digest includes information about overdue
      purchase order items.
  - name: calendar_events
    description: Whether the digest includes upcoming calendar events and meetings
      scheduled for the recipient
  - name: todo_list
    description: Whether the digest includes pending tasks and to-do items assigned
      to or created by the recipient
  - name: notifications
    description: Whether the digest includes system notifications, alerts, and activity
      updates for the recipient
  - name: add_quote
    description: Whether to include quoted text from previous messages in the email
      digest
  desc_done: true
- table: tabEmail Digest Recipient
  description: ''
  fields:
  - name: name
    description: Unique identifier for the email digest recipient record
  - name: recipient
    description: Email address or user who receives the digest notifications
    join_hint:
      table: tabUser
      'on': recipient = tabUser.name
  desc_done: true
- table: tabEmail Domain
  description: ''
  fields:
  - name: name
    description: Descriptive label or identifier for the email domain configuration
  - name: domain_name
    description: The actual domain name (e.g., company.com) used in email addresses
  - name: email_server
    description: The mail server hostname or address that handles email for this domain
  - name: use_imap
    description: Whether incoming email is retrieved using IMAP protocol instead of
      POP3.
  - name: use_ssl
    description: Whether the email connection uses SSL/TLS encryption from the start
      of the connection.
  - name: use_starttls
    description: Whether the email connection upgrades to TLS encryption after initial
      plain connection using STARTTLS command.
  - name: incoming_port
    description: Port number for receiving incoming emails through IMAP or POP3 protocols.
  - name: attachment_limit
    description: Maximum file size allowed for email attachments in this domain.
  - name: smtp_server
    description: Server address used for sending outgoing emails from this domain.
  - name: use_tls
    description: Whether TLS encryption is enabled for email communication on this
      domain.
  - name: use_ssl_for_outgoing
    description: Whether SSL encryption is enabled specifically for outgoing emails
      from this domain.
  - name: smtp_port
    description: The port number used for SMTP server connections when sending emails
      from this domain.
  - name: append_emails_to_sent_folder
    description: Whether outgoing emails are automatically saved to the sent folder
      for this email domain.
  - name: sent_folder_name
    description: The name of the folder where sent emails are stored for this email
      domain.
  desc_done: true
- table: tabEmail Flag Queue
  description: ''
  fields:
  - name: name
    description: Identifier or label for the email flag queue entry
  - name: is_completed
    description: Whether the email flagging task has been finished or resolved
  - name: communication
    description: Reference to the specific email or message associated with this flag
      queue item
  - name: action
    description: The type of email operation to perform, such as send, receive, or
      process.
    options:
    - Read
    - Unread
  - name: email_account
    description: The email account associated with this queued email action.
  - name: uid
    description: Unique identifier for tracking a specific email in the processing
      queue.
  desc_done: true
- table: tabEmail Group
  description: ''
  fields:
  - name: name
    description: Unique identifier or code for the email group used in technical queries
      and system references
  - name: title
    description: Display label or human-readable name of the email group shown to
      users
  - name: total_subscribers
    description: Count of recipients or members currently subscribed to this email
      group
  - name: confirmation_email_template
    description: Template used when users need to confirm their subscription or membership
      to the email group.
    join_hint:
      table: tabEmail Template
      'on': confirmation_email_template = tabEmail Template.name
  - name: welcome_email_template
    description: Template sent to new members when they join or are added to the email
      group.
    join_hint:
      table: tabEmail Template
      'on': welcome_email_template = tabEmail Template.name
  - name: welcome_url
    description: URL included in welcome communications where new members are directed
      after joining the email group.
  - name: add_query_parameters
    description: Query string parameters automatically appended to links in emails
      sent to this group.
  desc_done: true
- table: tabEmail Group Member
  description: ''
  fields:
  - name: name
    description: Unique identifier for the email group member record.
  - name: email_group
    description: Links to the parent email group to which this member belongs, used
      when querying group membership or distribution lists.
    join_hint:
      table: tabEmail Group
      'on': email_group = tabEmail Group.name
  - name: email
    description: The email address of the member, used when searching for who receives
      communications from a specific group or when validating recipient lists.
  - name: unsubscribed
    description: Whether the member has opted out of receiving emails from this email
      group.
  desc_done: true
- table: tabEmail Queue
  description: Email Queue records.
  fields:
  - name: name
    description: Unique identifier or reference name for the queued email message
  - name: sender
    description: Email address or account from which the email will be sent
  - name: recipients
    description: Email addresses of people who will receive the email
  - name: show_as_cc
    description: Whether the recipient appears in the CC field rather than the TO
      field of the email
  - name: message
    description: The actual email content or body text being sent
  - name: status
    description: Current state of the email in the queue such as pending, sent, failed,
      or error
    options:
    - Not Sent
    - Sending
    - Sent
    - Partially Sent
    - Error
  - name: error
    description: Error message or exception details when email sending or processing
      fails.
  - name: message_id
    description: Unique identifier assigned to the email message for tracking and
      referencing in email systems.
  - name: reference_doctype
    description: Type of document that triggered or is associated with this queued
      email.
    join_hint:
      table: tabDocType
      'on': reference_doctype = tabDocType.name
  - name: reference_name
    description: Unique identifier or name for the queued email used to track or reference
      specific email entries.
  - name: communication
    description: The communication template or document type associated with this
      queued email.
    join_hint:
      table: tabCommunication
      'on': communication = tabCommunication.name
