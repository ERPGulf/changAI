    description: Whether subscription billing cycles align with calendar month boundaries
      rather than anniversary dates from start date.
  - name: generate_new_invoices_past_due_date
    description: Whether the system continues creating new invoices for subscriptions
      that have overdue unpaid invoices.
  - name: submit_invoice
    description: Whether invoices for this subscription should be submitted or generated
      automatically.
  - name: current_invoice_start
    description: Start date of the current billing period being invoiced for this
      subscription.
  - name: current_invoice_end
    description: End date of the current billing period being invoiced for this subscription.
