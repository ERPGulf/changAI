      'on': purchase_uom = tabUOM.name
  - name: min_order_qty
    description: Minimum quantity that must be ordered when purchasing this item from
      suppliers.
  - name: safety_stock
    description: Minimum inventory quantity to maintain as buffer against stockouts
      or demand variability.
  - name: is_purchase_item
    description: Indicates whether this item is procured from external suppliers rather
      than manufactured internally.
  - name: lead_time_days
    description: Number of days required from order placement to receipt of the item
      from supplier or production.
  - name: last_purchase_rate
    description: Most recent purchase price paid for this item, used when analyzing
      cost trends or comparing current purchase quotes against historical pricing.
  - name: is_customer_provided_item
    description: Indicates whether the customer supplies this item directly rather
      than the company purchasing or manufacturing it, relevant for job work or consignment
      scenarios.
  - name: customer
    description: Specific customer who owns or is associated with this item, used
      for customer-specific items, custom products, or serialized goods tied to a
      particular customer account.
    join_hint:
      table: tabCustomer
      'on': customer = tabCustomer.name
  - name: delivered_by_supplier
    description: Indicates whether the item is drop-shipped or delivered directly
      from the supplier to the customer rather than through company inventory.
  - name: supplier_items
    description: Links to supplier-specific item codes, pricing, and lead times for
      this item across different vendors.
  - name: country_of_origin
    description: The country where the item was manufactured or produced, relevant
      for customs, tariffs, trade compliance, and country-specific sourcing queries.
    join_hint:
      table: tabCountry
      'on': country_of_origin = tabCountry.name
  - name: customs_tariff_number
    description: Harmonized System code for international trade classification and
      customs duty calculation.
    join_hint:
      table: tabCustoms Tariff Number
      'on': customs_tariff_number = tabCustoms Tariff Number.name
  - name: sales_uom
    description: Unit of measure used when selling this item to customers, such as
      pieces, boxes, or kilograms.
    join_hint:
      table: tabUOM
      'on': sales_uom = tabUOM.name
  - name: grant_commission
    description: Whether sales of this item are eligible for commission payments to
      sales representatives.
  - name: is_sales_item
    description: Whether this item can be sold to customers in sales transactions.
  - name: max_discount
    description: Maximum discount percentage allowed when selling this item.
  - name: customer_items
    description: Customer-specific item codes or names that map this item to individual
      customer catalogs.
  - name: taxes
    description: Tax rules or tax template applied to this item for calculating sales
      tax, purchase tax, or VAT on transactions.
  - name: inspection_required_before_purchase
    description: Whether incoming purchased items must pass quality inspection before
      being accepted into inventory.
  - name: quality_inspection_template
    description: Predefined checklist or template used to perform quality inspections
      on this item during purchase or manufacturing.
    join_hint:
      table: tabQuality Inspection Template
      'on': quality_inspection_template = tabQuality Inspection Template.name
  - name: inspection_required_before_delivery
    description: Item must pass quality inspection before being delivered to customer
      or released from warehouse
  - name: include_item_in_manufacturing
    description: Item is available for use in production planning, bill of materials,
      and manufacturing operations
  - name: is_sub_contracted_item
    description: Item production or processing is outsourced to external subcontractors
      rather than manufactured in-house
  - name: default_bom
    description: Bill of materials automatically selected when manufacturing or assembling
      this item
    join_hint:
      table: tabBOM
      'on': default_bom = tabBOM.name
  - name: customer_code
    description: Customer's own part number or SKU for this item in their system
  - name: default_item_manufacturer
    description: Primary manufacturer associated with this item for procurement and
      sourcing
    join_hint:
      table: tabManufacturer
      'on': default_item_manufacturer = tabManufacturer.name
  - name: default_manufacturer_part_no
    description: Manufacturer's part number for the item, used when searching by vendor
      or supplier part codes.
  - name: total_projected_qty
    description: Forecasted quantity including current stock plus planned receipts
