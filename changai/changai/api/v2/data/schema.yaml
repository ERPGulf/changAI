      or verified in this inspection reading
    join_hint:
      table: tabQuality Inspection Parameter
      'on': specification = tabQuality Inspection Parameter.name
  - name: parameter_group
    description: Category or grouping that organizes related inspection parameters
      or measurements together
    join_hint:
      table: tabQuality Inspection Parameter Group
      'on': parameter_group = tabQuality Inspection Parameter Group.name
  - name: status
    description: Indicates whether the quality inspection reading passed, failed,
      or is pending review.
    options:
    - Accepted
    - Rejected
  - name: value
    description: The actual recorded measurement or observation from the quality inspection,
      which may be text, numeric, or categorical.
  - name: numeric
    description: The numerical representation of the inspection reading value, used
