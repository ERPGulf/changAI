    description: Name or label of the location where goods are collected from the
      sender, such as warehouse name or facility identifier.
    join_hint:
      table: tabAddress
      'on': pickup_address_name = tabAddress.name
  - name: pickup_address
    description: Full street address and location details where the shipment is physically
      picked up from.
  - name: pickup_contact_person
