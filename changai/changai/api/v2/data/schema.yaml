    description: Name or identifier of the data import job or batch
  - name: reference_doctype
    description: The target document type or table where imported data will be inserted
    join_hint:
      table: tabDocType
      'on': reference_doctype = tabDocType.name
  - name: import_type
    description: Method or format of the import operation such as insert, update,
      or upsert
    options:
    - Insert New Records
    - Update Existing Records
  - name: payload_count
    description: Number of records or rows included in this data import batch.
  - name: google_sheets_url
    description: URL of the Google Sheets document used as the source for this import.
  - name: status
    description: Current state of the import process such as pending, in progress,
      completed, or failed.
    options:
    - Pending
    - Success
    - Partial Success
    - Error
    - Timed Out
  - name: submit_after_import
    description: Whether imported records are automatically submitted after import
      completes.
  - name: mute_emails
    description: Whether email notifications are suppressed during the import process.
  - name: template_options
    description: Configuration settings or parameters available for the import template
      being used.
  - name: template_warnings
    description: Warnings or validation messages generated during data import template
      processing or configuration.
  - name: show_failed_logs
    description: Controls whether failed or error records from the import process
      are displayed or included in logs.
  desc_done: true
- table: tabData Import Log
  description: ''
