      financial statements.
  - name: debit_in_transaction_currency
    description: Debit amount in the original currency of the transaction as recorded
      at entry time.
  - name: credit_in_account_currency
    description: Credit amount converted to the currency of the GL account being credited.
  - name: credit
    description: Credit amount in the company's base or reporting currency for consolidated
      financial statements.
  - name: credit_in_transaction_currency
    description: Credit amount in the original currency of the business transaction
      as entered.
  - name: cost_center
    description: Department or organizational unit to which the transaction costs
      are allocated for expense tracking and budgeting.
