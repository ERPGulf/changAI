  - name: manual_inspection
    description: Whether the quality inspection reading requires manual verification
      or measurement by an inspector rather than automated testing.
  - name: min_value
    description: The minimum acceptable threshold or lower specification limit for
      this quality inspection measurement.
  - name: max_value
    description: The maximum acceptable threshold or upper specification limit for
      this quality inspection measurement.
  - name: formula_based_criteria
    description: Indicates whether the quality inspection uses a formula to determine
      pass/fail rather than simple threshold values.
  - name: acceptance_formula
    description: The formula expression used to calculate whether an inspection reading
      meets acceptance criteria.
  - name: reading_value
    description: The actual measured or recorded value from the quality inspection
      test or measurement.
  - name: reading_1
    description: First measurement value recorded during quality inspection for a
      specific parameter or characteristic.
  - name: reading_2
    description: Second measurement value recorded during quality inspection for a
      specific parameter or characteristic.
  - name: reading_3
    description: Third measurement value recorded during quality inspection for a
      specific parameter or characteristic.
  - name: reading_4
    description: Fourth measurement value recorded during quality inspection for multi-point
      testing scenarios.
  - name: reading_5
    description: Fifth measurement value recorded during quality inspection for multi-point
      testing scenarios.
  - name: reading_6
    description: Sixth measurement value recorded during quality inspection for multi-point
      testing scenarios.
  - name: reading_7
    description: Seventh measurement value recorded during quality inspection for
      multi-point testing scenarios
  - name: reading_8
    description: Eighth measurement value recorded during quality inspection for multi-point
      testing scenarios
  - name: reading_9
    description: Ninth measurement value recorded during quality inspection for multi-point
      testing scenarios
  - name: reading_10
