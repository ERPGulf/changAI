- table: tabSales Invoice
  description: ''
  fields:
  - name: name
    description: Unique system-generated identifier for this specific Sales Invoice
      record. This field serves as the primary key and document number displayed to
      users (e.g., 'SINV-2023-00001'). Use this field when searching for a specific
      invoice by its document ID, referencing invoices in reports, filtering by exact
      invoice number, or establishing relationships with child tables like payment
      entries or delivery notes. This differs from 'title' which is a display label,
      not the actual document identifier used in transactions and audit trails.
  - name: custom_ksa_einvoicing_xml
    description: Stores the XML representation of the invoice specifically formatted
      for Kingdom of Saudi Arabia (KSA) electronic invoicing (e-invoicing/Fatoora)
      compliance requirements. This field is populated when generating ZATCA-compliant
      XML for submission to Saudi tax authorities. Use this when retrieving the submitted
      e-invoice XML payload, auditing KSA tax compliance, regenerating QR codes for
      Arabic invoices, or troubleshooting e-invoicing integration issues. This field
      is only relevant for Saudi Arabian businesses subject to Phase 2 e-invoicing
      regulations and remains empty for non-KSA invoices or when e-invoicing is not
      enabled.
  - name: title
    description: Human-readable display name or label for the Sales Invoice, typically
      derived from the customer name for quick visual identification (e.g., 'ABC Corporation').
      This field is used for UI display purposes, dropdown selections, and user-friendly
      reporting where showing the customer name is more intuitive than the system
      document ID. Use this when presenting invoice lists to users who need to identify
      invoices by customer rather than document number, or in dashboards and charts.
      This differs from 'name' which is the unique system identifier; 'title' is non-unique
      and multiple invoices can share the same title if they belong to the same customer.
  - name: naming_series
    description: ''
    options:
    - ACC-SINV-.YYYY.-
    - ACC-SINV-RET-.YYYY.-
