    - '#,###.##'
    - '#.###,##'
    - '# ###.##'
    - '# ###,##'
    - '#''###.##'
    - '#, ###.##'
    - '#,##,###.##'
    - '#,###.###'
    - '#.###'
    - '#,###'
  desc_done: true
- table: tabCurrency Exchange
