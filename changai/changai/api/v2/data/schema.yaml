tables:
- table: tabAbout Us Settings
  description: Settings for the About Us Page
  fields:
  - name: name
    description: Unique identifier or label for the About Us settings configuration
  - name: page_title
    description: Title displayed on the About Us page header or browser tab
  - name: company_introduction
    description: Main introductory text or description about the company shown on
      the About Us page
  - name: company_history_heading
    description: Title or header text displayed above the company history section
      on the About Us page.
  - name: company_history
    description: Narrative text describing the company's background, founding story,
      milestones, and evolution over time.
  - name: team_members_heading
    description: Title or header text displayed above the team members section on
      the About Us page.
  - name: team_members_subtitle
    description: Subtitle or heading text displayed above the team members section
      on the About Us page
  - name: team_members
    description: List or content of individual team member profiles, names, roles,
      or bios shown in the About Us section
  - name: footer
    description: Footer text or content displayed at the bottom of the About Us page
  desc_done: true
- table: tabAbout Us Team Member
  description: ''
  fields:
  - name: name
    description: Short display name or identifier for the team member, used when searching
      for team members by their common or abbreviated name.
  - name: full_name
    description: Complete formal name of the team member including first, middle,
      and last names, used when the full legal or professional name is needed.
  - name: bio
    description: Biographical text or profile description about the team member including
      their background, expertise, role details, and accomplishments.
  desc_done: true
- table: tabAccount
  description: Heads (or groups) against which Accounting Entries are made and balances
    are maintained.
  fields:
  - name: name
    description: Unique identifier or code for the account used when searching for
      specific account records or filtering transactions by account.
  - name: disabled
    description: Indicates whether the account is inactive or no longer in use, relevant
      when filtering for active accounts or analyzing historical account status changes.
  - name: account_name
    description: Full descriptive name of the account used when users search by account
      description, generate financial reports, or need human-readable account identification.
  - name: account_number
    description: Unique identifier for the account used in financial transactions
      and reporting queries.
  - name: is_group
    description: Indicates whether the account is a parent grouping account rather
      than a transactional account.
  - name: company
    description: The specific company or entity that owns or is associated with this
      account in multi-company environments.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: root_type
    description: Top-level classification of account as Asset, Liability, Equity,
      Income, or Expense for financial statement categorization
    options:
    - Asset
    - Liability
    - Income
    - Expense
    - Equity
  - name: report_type
    description: Balance Sheet or Profit and Loss statement assignment determining
      where the account appears in financial reports
    options:
    - Balance Sheet
    - Profit and Loss
  - name: account_currency
    description: Currency in which transactions for this account are denominated and
      recorded
    join_hint:
      table: tabCurrency
      'on': account_currency = tabCurrency.name
  - name: parent_account
    description: Links account to its parent in the chart of accounts hierarchy for
      rollup reporting and multi-level financial structures.
    join_hint:
      table: tabAccount
      'on': parent_account = tabAccount.name
  - name: account_type
    description: Categorizes account as asset, liability, equity, revenue, or expense
      for financial statement classification and balance sheet vs income statement
      placement.
    options:
    - Accumulated Depreciation
    - Asset Received But Not Billed
    - Bank
    - Cash
    - Chargeable
    - Capital Work in Progress
    - Cost of Goods Sold
    - Current Asset
    - Current Liability
    - Depreciation
    - Direct Expense
    - Direct Income
    - Equity
    - Expense Account
    - Expenses Included In Asset Valuation
    - Expenses Included In Valuation
    - Fixed Asset
    - Income Account
    - Indirect Expense
    - Indirect Income
    - Liability
    - Payable
    - Receivable
    - Round Off
    - Round Off for Opening
    - Stock
    - Stock Adjustment
    - Stock Received But Not Billed
    - Service Received But Not Billed
    - Tax
    - Temporary
  - name: tax_rate
    description: Default tax percentage applied to transactions using this account
      for automatic tax calculation on sales or purchases.
  - name: freeze_account
    description: Whether the account is frozen and cannot accept new transactions
      or postings.
    options:
    - 'No'
    - 'Yes'
  - name: balance_must_be
    description: Required balance constraint for the account such as debit, credit,
      or no restriction.
    options:
    - Debit
    - Credit
  - name: lft
    description: Left boundary value in nested set model for hierarchical account
      tree traversal and parent-child queries.
  - name: rgt
    description: Right boundary value in nested set hierarchy for account tree traversal
      and subtree queries.
  - name: old_parent
    description: Previous parent account before reparenting or restructuring the account
      hierarchy.
  - name: include_in_gross
    description: Whether this account's balance is included in gross profit or gross
      margin calculations.
  desc_done: true
- table: tabAccount Closing Balance
  description: ''
  fields:
  - name: name
    description: name
  - name: closing_date
    description: The specific date when the account balance was closed or finalized
      for a reporting period.
  - name: account
    description: The account identifier for which the closing balance is recorded.
    join_hint:
      table: tabAccount
      'on': account = tabAccount.name
  - name: cost_center
    description: Cost center associated with the account closing balance for departmental
      or divisional financial tracking.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: debit
    description: Debit balance amount at account closing, representing assets or expenses
      with debit-side balances.
  - name: credit
    description: Credit balance amount at account closing, representing liabilities,
      equity, or revenue with credit-side balances.
  - name: account_currency
    description: Currency in which the account balance and transactions are denominated,
      used when filtering or analyzing balances by specific currency.
    join_hint:
      table: tabCurrency
      'on': account_currency = tabCurrency.name
  - name: debit_in_account_currency
    description: Total debit amount in the account's native currency, used when calculating
      net balance or analyzing debit activity without currency conversion.
  - name: credit_in_account_currency
    description: Total credit amount in the account's native currency, used when calculating
      net balance or analyzing credit activity without currency conversion.
  - name: project
    description: Filter or group account closing balances by specific project to analyze
      project-level financial positions.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: company
    description: Filter or group account closing balances by specific company entity
      in multi-company environments.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: finance_book
    description: Filter account closing balances by alternative accounting book for
      parallel accounting scenarios like tax vs management reporting.
    join_hint:
      table: tabFinance Book
      'on': finance_book = tabFinance Book.name
  - name: period_closing_voucher
    description: The voucher document used to close accounting periods and transfer
      balances.
    join_hint:
      table: tabPeriod Closing Voucher
      'on': period_closing_voucher = tabPeriod Closing Voucher.name
  - name: is_period_closing_voucher_entry
    description: Indicates whether this balance entry was created by the period closing
      process.
  desc_done: true
- table: tabAccounting Dimension
  description: ''
  fields:
  - name: name
    description: Unique identifier or code for the accounting dimension used to filter
      and group financial transactions by business segments.
  - name: document_type
    description: Specifies the category or type of accounting dimension such as cost
      center, department, or project for organizing financial data.
    join_hint:
      table: tabDocType
      'on': document_type = tabDocType.name
  - name: label
    description: Human-readable display name for the accounting dimension used in
      reports and user interfaces when presenting financial breakdowns.
  - name: fieldname
    description: Name or code identifying the accounting dimension used for financial
      segmentation and reporting analysis
  - name: dimension_defaults
    description: Default dimension values automatically applied to transactions when
      no specific dimension is specified
  - name: disabled
    description: Indicates whether the accounting dimension is currently inactive
      and unavailable for use in transactions
  desc_done: true
- table: tabAccounting Dimension Detail
  description: ''
  fields:
  - name: name
    description: name
  - name: company
    description: The specific company entity this accounting dimension belongs to
      in multi-company environments.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: reference_document
    description: The source transaction or document that created or is linked to this
      accounting dimension entry.
    join_hint:
      table: tabDocType
      'on': reference_document = tabDocType.name
  - name: default_dimension
    description: The default accounting dimension value automatically applied to transactions
      when no specific dimension is selected.
  - name: mandatory_for_bs
    description: Indicates whether this dimension must be specified on balance sheet
      account transactions.
  - name: mandatory_for_pl
    description: Indicates whether this dimension must be specified on profit and
      loss account transactions.
  - name: automatically_post_balancing_accounting_entry
    description: Whether the system automatically creates offsetting journal entries
      to balance transactions for this accounting dimension.
  - name: offsetting_account
    description: The account used to automatically balance entries when posting transactions
      involving this accounting dimension.
    join_hint:
      table: tabAccount
      'on': offsetting_account = tabAccount.name
  desc_done: true
- table: tabAccounting Dimension Filter
  description: ''
  fields:
  - name: name
    description: name
  - name: accounting_dimension
    description: The specific accounting dimension (like cost center, project, department)
      that this filter applies to
  - name: fieldname
    description: The document field being filtered on to determine which accounting
      dimension values are allowed or applied
  - name: disabled
    description: Whether this accounting dimension filter is inactive and excluded
      from transactions or reports.
  - name: company
    description: The specific company entity to which this accounting dimension filter
      applies.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: apply_restriction_on_values
    description: Whether this filter enforces restrictions on which dimension values
      can be selected or used in transactions.
  - name: allow_or_restrict
    description: Whether the filter permits or blocks the specified accounts and dimensions
      from being used together
    options:
    - Allow
    - Restrict
  - name: accounts
    description: The account or account range that this filter rule applies to
  - name: dimensions
    description: The dimension values or combinations that are allowed or restricted
      for the specified accounts
  desc_done: true
- table: tabAccounting Period
  description: ''
  fields:
  - name: name
    description: Unique identifier for the accounting period used when filtering financial
      reports by specific time periods.
  - name: period_name
    description: Human-readable label for the accounting period used when users reference
      periods like 'Q1 2024' or 'January 2024' in queries.
  - name: start_date
    description: Beginning date of the accounting period used when determining which
      transactions fall within a specific fiscal timeframe.
  - name: end_date
    description: The final date of the accounting period, used when filtering or identifying
      periods by their closing boundary.
  - name: company
    description: The company entity to which this accounting period belongs, used
      to filter periods by organizational unit.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: closed_documents
    description: Indicates whether documents can still be posted to this period or
      if it has been locked for further transactions.
  desc_done: true
- table: tabAccounts Settings
  description: ''
  fields:
  - name: name
    description: Account settings configuration name or identifier
  - name: unlink_payment_on_cancellation_of_invoice
    description: Controls whether payments are automatically disconnected when an
      invoice is cancelled
  - name: unlink_advance_payment_on_cancelation_of_order
    description: Controls whether advance payments are automatically disconnected
      when a sales or purchase order is cancelled
  - name: delete_linked_ledger_entries
    description: Controls whether ledger entries can be deleted when their source
      transactions are removed.
  - name: enable_immutable_ledger
    description: Determines if ledger entries are locked from modification or deletion
      after creation.
  - name: check_supplier_invoice_uniqueness
    description: Enforces validation to prevent duplicate supplier invoice numbers
      from being entered.
  - name: automatically_fetch_payment_terms
    description: Whether payment terms are auto-populated from customer or supplier
      master data when creating invoices or purchase orders.
  - name: enable_common_party_accounting
    description: Whether a single party can act as both customer and supplier with
      unified accounting treatment across sales and purchase transactions.
  - name: allow_multi_currency_invoices_against_single_party_account
    description: Whether invoices in different currencies can be posted to the same
      customer or supplier account without requiring separate currency-specific accounts.
  - name: merge_similar_account_heads
    description: Whether duplicate or similar account heads are combined into single
      entries for simplified chart of accounts display
  - name: book_deferred_entries_based_on
    description: The trigger event or timing basis that determines when deferred revenue
      or expense entries are recorded (e.g., delivery date, invoice date, payment
      date)
    options:
    - Days
    - Months
  - name: automatically_process_deferred_accounting_entry
    description: Whether the system automatically creates and posts deferred accounting
      journal entries without manual intervention
  - name: book_deferred_entries_via_journal_entry
    description: Whether deferred revenue or expense entries are recorded through
      journal entries rather than automatic posting
  - name: submit_journal_entries
    description: Whether journal entries require submission or approval workflow before
      posting to the ledger
  - name: determine_address_tax_category_from
    description: Source used to determine tax category when multiple addresses exist,
      such as shipping address versus billing address
    options:
    - Billing Address
    - Shipping Address
  - name: add_taxes_from_item_tax_template
    description: Controls whether tax rates are automatically applied from item-level
      tax templates when adding products to transactions.
  - name: add_taxes_from_taxes_and_charges_template
    description: Controls whether tax rates are automatically applied from document-level
      taxes and charges templates to transactions.
  - name: book_tax_discount_loss
    description: Controls whether tax amounts lost due to discounts are recorded as
      separate accounting entries.
  - name: round_row_wise_tax
    description: Whether tax amounts are rounded at each line item level rather than
      at the document total level.
  - name: show_inclusive_tax_in_print
    description: Whether printed documents display prices with tax already included
      in the amount shown.
  - name: show_taxes_as_table_in_print
    description: Whether printed documents display tax breakdown in a separate table
      format rather than inline.
  - name: show_payment_schedule_in_print
    description: Controls whether payment schedule details appear on printed invoices
      or account documents.
  - name: maintain_same_internal_transaction_rate
    description: Determines if internal transfers between company entities use a consistent
      exchange rate throughout the transaction.
  - name: fetch_valuation_rate_for_internal_transaction
    description: Specifies whether to retrieve and apply valuation exchange rates
      when processing internal company transfers.
  - name: maintain_same_rate_action
    description: Controls whether exchange rates remain constant across related transactions
      or documents when currency conversions occur.
    options:
    - Stop
    - Warn
  - name: role_to_override_stop_action
    description: Specifies which user role has permission to bypass or override stop/block
      actions on accounts or transactions.
    join_hint:
      table: tabRole
      'on': role_to_override_stop_action = tabRole.name
  - name: allow_stale
    description: Determines whether outdated or expired exchange rates can still be
      used for currency conversions instead of requiring current rates.
  - name: allow_pegged_currencies_exchange_rates
    description: Whether the system permits exchange rate entry for currencies that
      are pegged or fixed to another currency.
  - name: stale_days
    description: Number of days after which account records or transactions are considered
      stale or outdated.
  - name: auto_reconcile_payments
    description: Whether payments are automatically matched and reconciled with corresponding
      invoices or transactions without manual intervention.
  - name: auto_reconciliation_job_trigger
    description: Controls when automatic bank reconciliation processes are initiated
      or scheduled to run.
  - name: reconciliation_queue_size
    description: Maximum number of reconciliation transactions that can be queued
      for processing at once.
  - name: exchange_gain_loss_posting_date
    description: Determines which date is used when posting foreign exchange gain
      or loss transactions to the general ledger.
    options:
    - Invoice
    - Payment
    - Reconciliation Date
  - name: over_billing_allowance
    description: Maximum percentage or amount by which invoices can exceed sales order
      values before blocking.
  - name: role_allowed_to_over_bill
    description: User role permitted to create invoices exceeding sales order limits
      despite over-billing restrictions.
    join_hint:
      table: tabRole
      'on': role_allowed_to_over_bill = tabRole.name
  - name: credit_controller
    description: Person or role responsible for managing customer credit limits and
      payment collections.
    join_hint:
      table: tabRole
      'on': credit_controller = tabRole.name
  - name: make_payment_via_journal_entry
    description: Whether payments are processed through journal entries instead of
      payment transactions
  - name: post_change_gl_entries
    description: Whether changes to transactions automatically create general ledger
      adjustment entries
  - name: calculate_depr_using_total_days
    description: Whether depreciation calculations use actual calendar days instead
      of monthly periods
  - name: book_asset_depreciation_entry_automatically
    description: Whether depreciation entries for fixed assets are posted automatically
      without manual intervention.
  - name: acc_frozen_upto
    description: Date until which accounting transactions are locked and cannot be
      modified or deleted.
  - name: ignore_account_closing_balance
    description: Whether to exclude account closing balances when calculating or displaying
      financial totals.
  - name: use_legacy_controller_for_pcv
    description: Controls whether the system uses the old or new controller for processing
      petty cash vouchers.
  - name: frozen_accounts_modifier
    description: Determines how the system handles or restricts transactions on accounts
      marked as frozen.
    join_hint:
      table: tabRole
      'on': frozen_accounts_modifier = tabRole.name
  - name: show_balance_in_coa
    description: Controls whether account balances are displayed in the chart of accounts
      view.
  - name: enable_party_matching
    description: Controls whether the system matches transactions to parties (customers,
      vendors, employees) in accounts receivable and payable.
  - name: enable_fuzzy_matching
    description: Controls whether the system uses approximate matching algorithms
      when reconciling transactions or identifying duplicate entries.
  - name: general_ledger_remarks_length
    description: Maximum character limit for remarks or notes entered on general ledger
      journal entries.
  - name: receivable_payable_remarks_length
    description: Maximum character length allowed for remarks or notes on receivable
      and payable transactions.
  - name: receivable_payable_fetch_method
    description: Method or strategy used to retrieve and calculate receivable and
      payable balances, such as real-time calculation versus cached aggregation.
    options:
    - Buffered Cursor
    - UnBuffered Cursor
    - Raw SQL
  - name: ignore_is_opening_check_for_reporting
    description: Whether opening balance entries are excluded from financial reports
      and analytics calculations.
  - name: create_pr_in_draft_status
    description: Whether new purchase requisitions are created in draft status requiring
      approval before submission
  desc_done: true
- table: tabActivity Cost
  description: ''
  fields:
  - name: name
    description: Activity name or title describing the cost entry
  - name: activity_type
    description: Category or classification of the activity such as meeting, travel,
      training, or project work
    join_hint:
      table: tabActivity Type
      'on': activity_type = tabActivity Type.name
  - name: employee
    description: Employee who performed or is associated with this activity cost
    join_hint:
      table: tabEmployee
      'on': employee = tabEmployee.name
  - name: employee_name
    description: Name of the employee whose activity costs are being tracked for labor
      expense analysis and project costing.
  - name: department
    description: Department to which the employee belongs for cost allocation and
      departmental expense reporting.
    join_hint:
      table: tabDepartment
      'on': department = tabDepartment.name
  - name: billing_rate
    description: Hourly or unit rate charged to customers or projects for this employee's
      work.
  - name: costing_rate
    description: Hourly or unit rate used to calculate the cost of an activity or
      resource allocation.
  - name: title
    description: Name or label identifying the specific activity being costed.
  desc_done: true
- table: tabActivity Type
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the activity type used when filtering
      or grouping activities by their classification.
  - name: activity_type
    description: Category or classification of the activity used when analyzing work
      types, resource allocation, or project phases.
  - name: costing_rate
    description: Standard rate applied to calculate costs for this activity type used
      when determining project expenses or billing amounts.
  - name: billing_rate
    description: Rate charged to customers for this activity type when billing for
      time or services.
  - name: disabled
    description: Whether this activity type is currently inactive and unavailable
      for selection in new transactions.
  desc_done: true
- table: tabAddress
  description: ''
  fields:
  - name: name
    description: Unique identifier for the address record, used when searching for
      or referencing a specific address entry.
  - name: address_title
    description: Display name or label for the address, used when users need to identify
      addresses by a friendly name rather than full address details.
  - name: address_type
    description: Classification of the address purpose such as billing, shipping,
      or office location, used when filtering addresses by their business function.
    options:
    - Billing
    - Shipping
    - Office
    - Personal
    - Plant
    - Postal
    - Shop
    - Subsidiary
    - Warehouse
    - Current
    - Permanent
    - Other
  - name: address_line1
    description: Primary street address including street number and name, used when
      searching for main location details.
  - name: address_line2
    description: Secondary address information such as apartment, suite, or unit number,
      used when filtering by specific sub-locations within a building.
  - name: custom_building_number
    description: Custom building identifier or code distinct from the street address,
      used when referencing internal building numbering systems or campus locations.
  - name: city
    description: Municipality or town name for filtering or grouping addresses by
      urban locality.
  - name: county
    description: Administrative subdivision within a state for regional analysis between
      city and state level.
  - name: state
    description: State or province for filtering or grouping addresses by top-level
      regional jurisdiction.
  - name: country
    description: Country name for filtering or grouping addresses by geographic region
      or nation.
    join_hint:
      table: tabCountry
      'on': country = tabCountry.name
  - name: pincode
    description: Postal or ZIP code for locating addresses within specific delivery
      zones or geographic areas.
  - name: email_id
    description: Email address associated with this location or contact for communication
      purposes.
  - name: phone
    description: Primary telephone contact number for the address location
  - name: fax
    description: Fax number for the address location
  - name: tax_category
    description: Tax classification or jurisdiction category assigned to the address
      for tax calculation purposes
    join_hint:
      table: tabTax Category
      'on': tax_category = tabTax Category.name
  - name: is_primary_address
    description: Identifies the main or default address for a customer, supplier,
      or entity when multiple addresses exist.
  - name: is_shipping_address
    description: Indicates whether this address is used for delivering goods or shipments.
  - name: disabled
    description: Marks whether this address is inactive and should not be used for
      transactions or communications.
  - name: is_your_company_address
    description: Indicates whether this address belongs to your own company versus
      a customer, supplier, or other external party.
  - name: links
    description: Related records or documents connected to this address such as contacts,
      transactions, or delivery notes.
  desc_done: true
- table: tabAddress Template
  description: ''
  fields:
  - name: name
    description: Name or title of the address template used to identify different
      address format configurations
  - name: country
    description: Country for which this address template defines the formatting and
      field arrangement rules
    join_hint:
      table: tabCountry
      'on': country = tabCountry.name
  - name: is_default
    description: Indicates whether this address template is automatically applied
      when no specific template is selected
  - name: template
    description: Address format template defining the layout and field order for displaying
      addresses in a specific country or region
  desc_done: true
- table: tabAdvance Payment Ledger Entry
  description: ''
  fields:
  - name: name
    description: Unique identifier for the advance payment ledger entry record
  - name: company
    description: Company entity to which this advance payment transaction belongs
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: voucher_type
    description: Classification of the accounting voucher document associated with
      this advance payment
    join_hint:
      table: tabDocType
      'on': voucher_type = tabDocType.name
  - name: voucher_no
    description: Identifier of the advance payment transaction being recorded in this
      ledger entry.
  - name: against_voucher_type
    description: Type of document (e.g., Sales Invoice, Purchase Invoice) that this
      advance payment is being applied against or allocated to.
    join_hint:
      table: tabDocType
      'on': against_voucher_type = tabDocType.name
  - name: against_voucher_no
    description: Specific document number that this advance payment is being applied
      against or allocated to.
  - name: amount
    description: Monetary value of the advance payment transaction in the specified
      currency.
  - name: currency
    description: Currency code for the advance payment amount.
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: event
    description: Business event or trigger that created or modified this advance payment
      ledger entry.
  - name: delinked
    description: Indicates whether this advance payment ledger entry has been disconnected
      or unlinked from its original invoice or payment document.
  desc_done: true
- table: tabAdvance Tax
  description: ''
  fields:
  - name: name
    description: Unique identifier for the advance tax payment record.
  - name: reference_type
    description: Specifies the document type (e.g., Sales Invoice, Purchase Invoice)
      against which advance tax was paid or allocated.
    join_hint:
      table: tabDocType
      'on': reference_type = tabDocType.name
  - name: reference_name
    description: Links to the specific document number where this advance tax payment
      was applied or originated.
  - name: reference_detail
    description: Identifies the specific tax payment voucher or transaction reference
      for the advance tax entry
  - name: account_head
    description: Tax ledger account under which the advance tax payment is classified
    join_hint:
      table: tabAccount
      'on': account_head = tabAccount.name
  - name: allocated_amount
