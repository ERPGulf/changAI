      by their common or display name.
  - name: customer_item_code
    description: Customer's own product identifier or SKU used when asking about deliveries
      using the customer's naming convention rather than internal codes.
  - name: description
    description: Text describing the specific item being delivered, used when searching
      for what products or goods were included in a delivery.
  - name: brand
    description: Brand or manufacturer name of the delivered item, used when filtering
      or searching deliveries by product brand.
    join_hint:
      table: tabBrand
      'on': brand = tabBrand.name
  - name: item_group
    description: Category or classification grouping of the delivered item, used when
      analyzing deliveries by product type or category.
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: image_view
    description: Visual representation of the delivered item for verification and
      identification purposes.
  - name: qty
    description: Quantity of items actually delivered in this delivery note line.
  - name: stock_uom
    description: Unit of measurement for the delivered quantity (e.g., pieces, kg,
      liters).
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: uom
    description: Unit of measurement for the delivered item quantity (e.g., boxes,
      kg, pieces) as recorded on the delivery note.
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: conversion_factor
    description: Multiplier to convert the delivery note item quantity from its UOM
      to the base stock UOM.
  - name: stock_qty
    description: Quantity of the delivered item expressed in the base stock UOM after
      applying the conversion factor.
  - name: returned_qty
    description: Quantity of items returned from this delivery, used when tracking
      customer returns or partial rejections against delivered goods.
  - name: price_list_rate
    description: Item selling price from the price list in transaction currency, used
      when verifying pricing or analyzing delivery values before currency conversion.
  - name: base_price_list_rate
    description: Item selling price from the price list in company base currency,
      used for standardized financial reporting and multi-currency delivery analysis.
  - name: margin_type
    description: Indicates whether the margin is calculated as a percentage or fixed
      amount on the delivered item.
    options:
    - Percentage
    - Amount
  - name: margin_rate_or_amount
    description: The numeric value of the margin applied, interpreted based on margin_type
      as either a percentage rate or absolute amount.
  - name: rate_with_margin
    description: The final unit price of the delivered item after applying the margin
      to the base rate.
  - name: discount_percentage
    description: Percentage discount applied directly to this delivery note item line.
  - name: discount_amount
    description: Monetary discount applied directly to this delivery note item line.
  - name: distributed_discount_amount
    description: Portion of header-level or document-level discount allocated to this
      specific item line.
  - name: base_rate_with_margin
    description: Unit price including margin adjustments before applying currency
      conversion or taxes, used when analyzing pricing with markup.
  - name: rate
    description: Final unit price applied to the delivery note item after all adjustments
      including currency conversion.
  - name: amount
    description: Total line value for the delivered quantity calculated as rate multiplied
      by quantity.
  - name: base_rate
    description: Unit price in company's base currency before applying pricing rules
      or discounts.
  - name: base_amount
    description: Total line amount in company's base currency before applying pricing
      rules or discounts.
  - name: pricing_rules
    description: Applied promotional or contractual pricing rules that modified the
      standard rate for this delivery.
  - name: stock_uom_rate
    description: Rate per stock unit of measure, used when querying item pricing in
      base inventory units rather than transaction units.
  - name: is_free_item
    description: Indicates whether the item was given at no charge as a promotional
      or complimentary item in the delivery.
  - name: grant_commission
    description: Indicates whether this delivered item is eligible for sales commission
      calculation.
  - name: net_rate
    description: Unit price of the delivered item excluding taxes, used when calculating
      pre-tax line totals or comparing prices before tax application.
  - name: net_amount
    description: Total line amount for the delivered item excluding taxes, used when
      analyzing delivery value before tax or reconciling pre-tax revenue.
  - name: item_tax_template
    description: Tax configuration applied to the delivered item, used when identifying
      which tax rules or rates govern this specific item on the delivery note.
    join_hint:
      table: tabItem Tax Template
      'on': item_tax_template = tabItem Tax Template.name
