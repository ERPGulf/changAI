  - name: description
    description: Detailed explanation of what the scoring variable measures, used
      when users need to understand the business meaning of a supplier performance
      metric.
  - name: value
    description: Numeric or text value assigned to the scoring variable, used when
      calculating supplier scores or evaluating performance thresholds.
  - name: param_name
    description: Technical parameter name used in system calculations and integrations
      when processing supplier scorecard formulas.
  - name: path
    description: Hierarchical location or category path of the scoring variable, used
      when organizing or filtering performance metrics by business area or evaluation
      dimension.
  desc_done: true
- table: tabSupplier Scorecard Standing
  description: ''
  fields:
  - name: name
    description: Unique identifier for the supplier scorecard standing record used
      to reference specific performance tier configurations.
  - name: standing_name
    description: Display name of the performance tier (e.g., Preferred, Approved,
      Probation) used when categorizing suppliers by their scorecard results.
  - name: standing_color
    description: Visual indicator color assigned to this standing level used in dashboards
      and reports to quickly identify supplier performance status.
    options:
    - Blue
    - Purple
    - Green
    - Yellow
    - Orange
    - Red
  - name: min_grade
    description: Minimum scorecard grade threshold that qualifies a supplier for this
      standing level, used to automatically assign performance tiers.
  - name: max_grade
    description: Maximum scorecard grade threshold for this standing level, used to
      define the upper boundary of this performance tier.
  - name: warn_rfqs
    description: Flag indicating whether to display warnings when creating RFQs with
      suppliers in this standing, used to alert buyers about performance concerns.
  - name: warn_pos
    description: Flag indicating whether to display warnings when creating purchase
      orders with suppliers in this standing, used to prevent procurement from poor
      performers.
  - name: prevent_rfqs
    description: Flag that blocks creation of new RFQs with suppliers in this standing,
      used to enforce hard stops for unacceptable supplier performance.
  - name: prevent_pos
    description: Flag that blocks creation of new purchase orders with suppliers in
      this standing, used to completely restrict purchasing from failing suppliers.
  - name: notify_supplier
    description: Flag indicating whether to automatically send notifications to suppliers
      when they are assigned this standing, used for supplier performance communication.
  - name: notify_employee
    description: Flag indicating whether to send alerts to internal employees when
      a supplier reaches this standing level, used for escalation and awareness.
  - name: employee_link
    description: Reference to the employee or role to notify when suppliers fall into
      this standing, used to route performance alerts to responsible procurement managers.
    join_hint:
      table: tabEmployee
      'on': employee_link = tabEmployee.name
  desc_done: true
