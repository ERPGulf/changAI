  - name: base_grand_total
    description: Final total amount of the purchase invoice in base currency including
      all items, taxes, and charges.
  - name: base_rounding_adjustment
    description: Adjustment amount in base currency applied to round the final invoice
      total to the nearest acceptable value.
  - name: base_rounded_total
    description: Total amount in base currency after applying rounding adjustments
