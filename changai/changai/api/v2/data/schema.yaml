- table: tabReport
  description: ''
  fields:
  - name: name
    description: Unique identifier or code for the report used in technical references
      and API calls
  - name: report_name
    description: Display title of the report shown to users in the interface and menus
  - name: ref_doctype
    description: The source document type or table that this report queries data from
    join_hint:
      table: tabDocType
      'on': ref_doctype = tabDocType.name
  - name: reference_report
    description: Unique identifier or code name used to locate and reference a specific
      report template or report definition.
  - name: is_standard
    description: Indicates whether the report is a default system report versus a
      custom or user-created report.
    options:
    - 'No'
    - 'Yes'
  - name: module
    description: The functional area or business module the report belongs to, such
      as Finance, Sales, Inventory, or HR.
    join_hint:
      table: tabModule Def
      'on': module = tabModule Def.name
  - name: report_type
    description: Type or category of the report such as financial, sales, inventory,
