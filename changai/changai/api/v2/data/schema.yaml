    - Purchase Receipt
    - Purchase Invoice
    - Subcontracting Receipt
    - Delivery Note
    - Sales Invoice
    - Stock Entry
    - Job Card
  - name: reference_name
    description: Specific document ID or transaction number of the item being inspected.
  - name: item_code
