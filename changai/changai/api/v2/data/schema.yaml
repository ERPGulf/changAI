      pickup at the origin location.
  - name: delivery_to_type
    description: Indicates whether the shipment is being delivered to a company, customer,
      or other entity type.
    options:
    - Company
    - Customer
    - Supplier
  - name: delivery_company
    description: The company receiving the shipment when delivery_to_type is company.
    join_hint:
      table: tabCompany
      'on': delivery_company = tabCompany.name
  - name: delivery_customer
    description: The customer receiving the shipment when delivery_to_type is customer.
    join_hint:
      table: tabCustomer
      'on': delivery_customer = tabCustomer.name
  - name: delivery_supplier
    description: The carrier or logistics company responsible for transporting the
      shipment.
    join_hint:
      table: tabSupplier
      'on': delivery_supplier = tabSupplier.name
  - name: delivery_to
    description: The recipient customer or location receiving the shipment.
  - name: delivery_address_name
    description: The named location or site identifier where the shipment is being
      delivered, distinct from the recipient entity.
    join_hint:
      table: tabAddress
      'on': delivery_address_name = tabAddress.name
  - name: delivery_address
    description: Physical location where the shipment is being delivered to the customer
      or recipient.
  - name: delivery_contact_name
