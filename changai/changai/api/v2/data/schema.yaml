- table: tabEmployee
  description: ''
  fields:
  - name: name
    description: Full name of the employee as displayed throughout the system
  - name: employee
    description: Unique employee identifier or code used to reference a specific employee
      record
  - name: naming_series
    description: Prefix pattern used to generate the employee identifier
    options:
    - HR-EMP-
  - name: first_name
    description: Employee's given name used when searching or filtering by first name
      only.
  - name: middle_name
    description: Employee's middle name used when full legal name or complete name
      matching is required.
  - name: last_name
    description: Employee's family name or surname used when searching by last name
      or sorting alphabetically.
  - name: employee_name
    description: Full name of the employee for identification, searching, and filtering
      by person.
  - name: gender
    description: Employee's gender for demographic analysis, diversity reporting,
      and HR compliance queries.
    join_hint:
      table: tabGender
      'on': gender = tabGender.name
  - name: date_of_birth
    description: Employee's birth date for calculating age, retirement eligibility,
      and age-related benefits or compliance.
  - name: salutation
    description: Title or honorific used to address the employee such as Mr., Ms.,
      Dr., or Prof.
    join_hint:
      table: tabSalutation
      'on': salutation = tabSalutation.name
  - name: date_of_joining
    description: The date when the employee officially started working at the organization.
  - name: status
    description: Current employment status indicating whether the employee is active,
      on leave, terminated, or resigned.
    options:
    - Active
    - Inactive
    - Suspended
    - Left
  - name: user_id
    description: Employee's unique system login identifier for authentication and
      user account linkage.
    join_hint:
      table: tabUser
      'on': user_id = tabUser.name
  - name: create_user_permission
    description: Whether the employee is authorized to create new user accounts in
      the system.
  - name: company
    description: The company or legal entity to which the employee belongs.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: department
    description: Organizational unit or division where the employee works, used to
      filter or group employees by business function or team.
    join_hint:
      table: tabDepartment
      'on': department = tabDepartment.name
  - name: employee_number
    description: Unique identifier assigned to each employee, used to look up or reference
      a specific individual.
  - name: designation
    description: Job title or role of the employee, used to identify position level,
      responsibilities, or filter by job function.
    join_hint:
      table: tabDesignation
      'on': designation = tabDesignation.name
  - name: reports_to
    description: Manager or supervisor that the employee directly reports to in the
      organizational hierarchy.
    join_hint:
      table: tabEmployee
      'on': reports_to = tabEmployee.name
  - name: branch
    description: Physical office location or branch where the employee is assigned
      to work.
    join_hint:
      table: tabBranch
      'on': branch = tabBranch.name
  - name: scheduled_confirmation_date
    description: Date when the employee's probationary period is expected to end and
      employment status becomes permanent.
  - name: final_confirmation_date
    description: Date when employee's permanent employment status was confirmed after
      probation or trial period.
  - name: contract_end_date
    description: Date when employee's employment contract expires or terminates, relevant
      for fixed-term or temporary employees.
  - name: notice_number_of_days
    description: Required advance notice period in days before employment termination
      by either employee or employer.
  - name: date_of_retirement
    description: When an employee retired or is scheduled to retire from the organization.
  - name: cell_number
    description: Employee's mobile phone number for direct contact.
  - name: personal_email
    description: Employee's non-work email address for personal communication outside
      company systems.
  - name: company_email
    description: Official work email address assigned by the organization to the employee.
  - name: prefered_contact_email
    description: Email address the employee prefers for receiving work-related communications
      and notifications.
    options:
    - Company Email
    - Personal Email
    - User ID
  - name: prefered_email
    description: Employee's preferred personal email address for general correspondence.
  - name: unsubscribed
    description: Whether employee has opted out of company communications or mailing
      lists.
  - name: current_address
    description: Employee's present residential address for contact, shipping, or
      location-based queries.
  - name: current_accommodation_type
    description: Type of housing arrangement where employee currently resides, such
      as owned, rented, or company-provided.
    options:
    - Rented
    - Owned
  - name: permanent_address
    description: Employee's permanent residential address for official records and
      correspondence when temporary or current address differs.
  - name: permanent_accommodation_type
    description: Type of housing at permanent address such as owned, rented, or company-provided
      accommodation.
    options:
    - Rented
    - Owned
  - name: person_to_be_contacted
    description: Emergency contact person's name to reach in case of employee emergencies
      or urgent situations.
  - name: emergency_phone_number
    description: Contact number for employee's emergency contact person in case of
      workplace incidents or urgent situations.
  - name: relation
    description: Relationship of the emergency contact person to the employee, such
      as spouse, parent, or sibling.
  - name: attendance_device_id
    description: Identifier linking employee to biometric or card-based time clock
      systems for tracking clock-ins and clock-outs.
  - name: holiday_list
    description: Which holiday calendar or schedule applies to this employee for determining
      their days off and public holidays.
    join_hint:
      table: tabHoliday List
      'on': holiday_list = tabHoliday List.name
  - name: ctc
    description: Total cost to company compensation package for the employee including
      salary, benefits, bonuses, and all employer costs.
  - name: salary_currency
    description: Currency in which the employee's salary and compensation are paid.
    join_hint:
      table: tabCurrency
      'on': salary_currency = tabCurrency.name
  - name: salary_mode
    description: Payment method for employee salary such as bank transfer, cash, or
      check
    options:
    - Bank
    - Cash
    - Cheque
  - name: bank_name
    description: Name of the financial institution where employee receives salary
      payments
  - name: bank_ac_no
    description: Employee's bank account number for salary deposits
  - name: iban
    description: International bank account number for employee salary payments and
      direct deposits
  - name: marital_status
    description: Employee's current marital status such as single, married, divorced,
      or widowed
    options:
    - Single
    - Married
    - Divorced
    - Widowed
  - name: family_background
    description: Information about employee's family members, dependents, emergency
      contacts, or household composition
  - name: blood_group
    description: Employee's blood type for medical emergencies and health records
    options:
    - A+
    - A-
    - B+
    - B-
    - AB+
    - AB-
    - O+
    - O-
  - name: health_details
    description: Medical conditions, allergies, disabilities, or other health information
      relevant to workplace safety and accommodations
  - name: passport_number
    description: Employee's passport identification number for international travel,
      work permits, and visa processing
  - name: valid_upto
    description: Expiration date of employee document or credential such as passport,
      visa, work permit, or license.
  - name: date_of_issue
    description: Issue date of employee document or credential such as passport, visa,
      work permit, or license.
  - name: place_of_issue
    description: Location or authority where employee document or credential was issued
      such as passport office, embassy, or licensing agency.
  - name: bio
    description: Employee biographical summary or personal profile information including
      background and professional overview.
  - name: education
    description: Employee academic qualifications, degrees, certifications, and educational
      institutions attended.
  - name: external_work_history
    description: Employment history and work experience at previous companies before
      joining the current organization.
  - name: internal_work_history
    description: Job changes, promotions, transfers, or role movements within the
      same organization for an employee.
  - name: resignation_letter_date
    description: Date when the employee formally submitted their resignation notice.
  - name: relieving_date
    description: Date when the employee's employment officially ended and they were
      released from duties.
  - name: held_on
    description: Date when an employee event, meeting, review, or disciplinary action
      was conducted.
  - name: new_workplace
    description: Updated work location or office assignment for an employee after
      a transfer or relocation.
  - name: leave_encashed
    description: Amount of unused leave days converted to monetary payment upon separation
      or as per policy.
    options:
    - 'Yes'
    - 'No'
  - name: encashment_date
    description: Date when an employee cashes out unused leave or benefits, typically
      queried during exit settlements or leave balance conversions.
  - name: reason_for_leaving
    description: Employee's stated reason for resignation or termination, used when
      analyzing attrition patterns or exit circumstances.
  - name: feedback
    description: Comments or evaluations about the employee, typically from performance
      reviews, exit interviews, or manager assessments.
  - name: lft
    description: Left boundary value in nested set model for employee organizational
      hierarchy traversal and reporting structure queries.
  - name: rgt
    description: Right boundary value in nested set model for employee organizational
      hierarchy traversal and reporting structure queries.
  - name: old_parent
    description: Previous manager or parent employee before a reporting structure
      change or organizational transfer.
  desc_done: true
- table: tabEmployee Education
