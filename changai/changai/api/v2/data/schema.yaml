- table: tabDashboard
  description: ''
  fields:
  - name: name
    description: Unique identifier or code for the dashboard used when referencing
      specific dashboards in queries or filters.
  - name: dashboard_name
    description: Display name of the dashboard used when users search for or identify
      dashboards by their business title.
  - name: is_default
    description: Flag indicating whether this dashboard loads automatically for users,
      relevant when determining initial user views or default landing pages.
  - name: is_standard
    description: Whether the dashboard is a default system dashboard or a custom user-created
      dashboard.
  - name: module
    description: The application module or functional area this dashboard belongs
      to, such as Accounting, HR, or Sales.
    join_hint:
      table: tabModule Def
      'on': module = tabModule Def.name
  - name: charts
    description: The visualizations and chart components included in this dashboard.
  - name: chart_options
    description: Configuration settings for visualizations like chart type, colors,
      axes, and display preferences on the dashboard.
  - name: cards
    description: Individual dashboard widgets or panels that display specific metrics,
      reports, or data visualizations.
  desc_done: true
- table: tabDashboard Chart
  description: ''
  fields:
  - name: name
    description: The title or label of the dashboard chart used to identify and search
      for specific charts
  - name: is_standard
    description: Indicates whether the chart is a built-in system chart or a custom
      user-created chart
  - name: module
    description: The application module or functional area the chart belongs to, such
      as Accounting, CRM, or HR
    join_hint:
      table: tabModule Def
      'on': module = tabModule Def.name
  - name: chart_name
    description: Name or title of the dashboard chart for identifying specific visualizations.
  - name: chart_type
    description: Type of visualization such as bar, line, pie, or table used to render
      the chart.
    options:
    - Count
    - Sum
    - Average
    - Group By
    - Custom
    - Report
  - name: report_name
    description: Name of the underlying report or data source that feeds data into
      this chart.
    join_hint:
      table: tabReport
      'on': report_name = tabReport.name
  - name: use_report_chart
    description: Whether the dashboard chart uses a report-based chart configuration
      instead of custom query data.
  - name: x_field
    description: The field or dimension plotted along the horizontal axis of the chart.
  - name: y_axis
    description: The metric, measure, or field plotted along the vertical axis of
      the chart.
  - name: source
    description: The originating module, report, or data source that feeds data into
      this dashboard chart.
    join_hint:
      table: tabDashboard Chart Source
      'on': source = tabDashboard Chart Source.name
  - name: document_type
    description: The type of ERP document or entity being visualized in this chart
      (e.g., Sales Order, Purchase Invoice, Stock Entry).
    join_hint:
      table: tabDocType
      'on': document_type = tabDocType.name
  - name: parent_document_type
    description: The parent or related document type when the chart displays data
      from linked or hierarchical documents.
    join_hint:
      table: tabDocType
      'on': parent_document_type = tabDocType.name
  - name: based_on
    description: The source DocType or table that provides the data for this dashboard
      chart.
  - name: value_based_on
    description: The specific field from the source DocType used to calculate or display
      the chart's metric values.
  - name: group_by_type
    description: The time period or dimension type used to group and aggregate chart
      data (e.g., daily, monthly, by status).
    options:
    - Count
    - Sum
    - Average
  - name: group_by_based_on
    description: Field or dimension used to categorize or segment chart data into
      groups.
  - name: aggregate_function_based_on
    description: Field on which aggregation operations like sum, count, or average
      are performed for chart calculations.
  - name: number_of_groups
    description: Maximum count of groups or categories displayed in the chart visualization.
  - name: is_public
    description: Whether the dashboard chart is visible to all users or restricted
      to specific users.
  - name: heatmap_year
    description: The specific year for which heatmap data is displayed on the chart.
  - name: timespan
    description: The time period or date range covered by the chart data, such as
      daily, weekly, monthly, quarterly, or yearly.
    options:
    - Last Year
    - Last Quarter
    - Last Month
    - Last Week
    - Select Date Range
  - name: from_date
    description: Start date for filtering dashboard chart data within a specific date
      range.
  - name: to_date
    description: End date for filtering dashboard chart data within a specific date
      range.
  - name: time_interval
    description: Grouping period for aggregating chart data such as daily, weekly,
      monthly, or yearly intervals.
    options:
    - Yearly
    - Quarterly
    - Monthly
    - Weekly
    - Daily
  - name: timeseries
    description: Whether the chart displays data over time with date/time on the x-axis.
  - name: type
    description: The visualization format of the chart such as bar, line, pie, or
      table.
    options:
    - Line
    - Bar
    - Percentage
    - Pie
    - Donut
    - Heatmap
  - name: show_values_over_chart
    description: Whether data point values are displayed directly on top of the chart
      visualization.
  - name: currency
    description: Currency used for displaying monetary values in the dashboard chart
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: filters_json
    description: Static filter criteria applied to the chart data
  - name: dynamic_filters_json
    description: User-adjustable or runtime filter criteria that can change based
      on context or parameters
  - name: custom_options
    description: Custom configuration settings or parameters specific to this dashboard
      chart's behavior or display
  - name: color
    description: Color scheme or palette assigned to the chart for visual styling
  - name: last_synced_on
    description: Timestamp when the chart's data was last refreshed or synchronized
      from its source
  - name: roles
    description: User roles or permission groups that have access to view this dashboard
      chart
  desc_done: true
