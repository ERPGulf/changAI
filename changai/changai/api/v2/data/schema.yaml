    options:
    - Report Builder
    - Query Report
    - Script Report
    - Custom Report
  - name: letter_head
    description: Letterhead template or company header branding applied to the printed
      or exported report
    join_hint:
      table: tabLetter Head
      'on': letter_head = tabLetter Head.name
  - name: add_total_row
    description: Whether the report includes a totals or summary row at the bottom
      aggregating numeric columns
  - name: disabled
    description: Whether the report is inactive or unavailable for use
  - name: prepared_report
    description: Indicates if the report has been pre-generated or is ready to run
  - name: add_translate_data
    description: Whether to include translated or multi-language data in the report
