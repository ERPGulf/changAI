  - name: has_serial_no
    description: Indicates whether this item requires unique serial number tracking
      for individual units.
  - name: serial_no_series
    description: Naming pattern or prefix used to generate serial numbers for this
      item when serial tracking is enabled.
  - name: variant_of
    description: Parent item template from which this item inherits properties as
