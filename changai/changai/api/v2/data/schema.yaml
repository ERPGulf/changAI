    description: Total monetary value of items being shipped, used when filtering
      or analyzing shipments by cargo worth or insurance requirements.
  - name: pickup_date
    description: Date when the shipment was or will be collected from origin, used
      for scheduling queries and pickup timeline analysis.
  - name: pickup_from
    description: Origin location or address where the shipment is collected, used
      when searching by source warehouse, vendor location, or departure point.
  - name: pickup_to
    description: Identifies the destination or recipient location for pickup delivery,
      used when tracking where picked-up goods are being transported to.
  - name: shipment_type
    description: Categorizes the shipment method or service level (e.g., express,
      standard, freight), used when filtering shipments by delivery speed or transportation
      mode.
    options:
    - Goods
    - Documents
