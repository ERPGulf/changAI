- table: tabBOM Item
  description: ''
  fields:
  - name: name
    description: Unique identifier for this BOM item row in the bill of materials.
  - name: item_code
    description: Code of the component or raw material included in this BOM line.
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: item_name
    description: Name of the component or raw material included in this BOM line.
  - name: operation
    description: Manufacturing operation or workstation where this BOM item is consumed
      or assembled.
    join_hint:
      table: tabOperation
      'on': operation = tabOperation.name
  - name: do_not_explode
    description: Indicates whether this BOM item should be treated as a single unit
      without expanding into its sub-components during production or material planning.
  - name: bom_no
    description: Identifier linking this item to its parent bill of materials structure.
    join_hint:
      table: tabBOM
      'on': bom_no = tabBOM.name
  - name: source_warehouse
    description: Warehouse from which the component item should be sourced or issued
      for production.
    join_hint:
      table: tabWarehouse
      'on': source_warehouse = tabWarehouse.name
  - name: allow_alternative_item
    description: Whether a substitute component can be used in place of this BOM item
      during manufacturing.
  - name: is_stock_item
    description: Whether this BOM component is a stocked inventory item versus a non-stock
      or service item.
  - name: description
    description: Text description of the component or material item included in the
      bill of materials
  - name: image_view
    description: Attached image or visual reference for the BOM component item
  - name: qty
    description: Quantity of this component required in the bill of materials assembly
  - name: uom
    description: Unit of measurement for the BOM item quantity as specified in the
      bill of materials recipe or formula.
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: stock_qty
    description: Quantity of the BOM item converted to stock UOM for inventory consumption
      calculations.
  - name: stock_uom
    description: Standard inventory unit of measurement used for stock tracking and
      warehouse transactions, which may differ from the BOM recipe UOM.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: conversion_factor
    description: Factor to convert the BOM item's unit of measure to the base or standard
      unit for quantity calculations.
  - name: rate
    description: Effective cost or price per unit of this BOM item after applying
      conversion factors or adjustments.
  - name: base_rate
    description: Standard or original cost per unit of this BOM item before any conversion
      or adjustments are applied.
  - name: amount
    description: Total cost of this BOM item component in transaction currency for
      the specified quantity.
  - name: base_amount
    description: Total cost of this BOM item component converted to company base currency.
  - name: qty_consumed_per_unit
    description: Quantity of this component material required to produce one unit
      of the finished item.
  - name: has_variants
    description: Indicates whether the BOM item has multiple variants or configurations
      that can be selected during manufacturing or assembly.
  - name: include_item_in_manufacturing
    description: Controls whether this BOM component is actually consumed or included
      when manufacturing the parent item.
  - name: original_item
    description: References the source or template item code when this BOM item was
      copied or derived from another item.
    join_hint:
      table: tabItem
      'on': original_item = tabItem.name
  - name: sourced_by_supplier
    description: Indicates whether this BOM item is procured from an external supplier
      rather than manufactured internally
  desc_done: true
- table: tabBOM Operation
  description: ''
  fields:
  - name: name
    description: name
  - name: sequence_id
    description: Order in which this operation is performed in the manufacturing process
  - name: operation
    description: The specific manufacturing task or work step to be performed
    join_hint:
      table: tabOperation
      'on': operation = tabOperation.name
  - name: workstation_type
    description: Category or classification of workstation where the BOM operation
      is performed, used when filtering operations by general workstation capabilities
      or groupings.
    join_hint:
      table: tabWorkstation Type
      'on': workstation_type = tabWorkstation Type.name
  - name: workstation
    description: Specific workstation or machine where the BOM operation is executed,
