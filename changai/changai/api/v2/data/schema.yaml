- table: tabLDAP Settings
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the LDAP configuration
  - name: enabled
    description: Whether this LDAP configuration is currently active for authentication
  - name: ldap_directory_server
    description: Hostname or IP address of the LDAP/Active Directory server to connect
      to
    options:
    - Active Directory
    - OpenLDAP
    - Custom
  - name: ldap_server_url
    description: URL or hostname of the LDAP server used for authentication and directory
      services.
  - name: base_dn
    description: Distinguished name defining the starting point for LDAP directory
      searches and user lookups.
  - name: password
    description: Credential used to bind and authenticate to the LDAP server.
  - name: ldap_search_path_user
    description: LDAP directory path where user accounts are searched, such as organizational
      unit or domain component for user authentication.
  - name: ldap_search_string
    description: LDAP query filter string used to match and retrieve directory entries
      based on specific attributes or conditions.
  - name: ldap_search_path_group
    description: LDAP directory path where group objects are searched, such as organizational
      unit or domain component for group membership lookups.
  - name: ldap_email_field
    description: LDAP attribute name that maps to user email addresses for authentication
      and communication.
  - name: ldap_username_field
    description: LDAP attribute name that maps to user login usernames for system
      authentication.
  - name: ldap_first_name_field
    description: LDAP attribute name that maps to user first names for profile display
      and personalization.
  - name: do_not_create_new_user
    description: Controls whether new users are automatically created from LDAP authentication
      or only existing users can authenticate.
  - name: ldap_middle_name_field
    description: LDAP attribute mapped to user middle name during authentication and
      synchronization.
  - name: ldap_last_name_field
    description: LDAP attribute mapped to user last name during authentication and
      synchronization.
  - name: ldap_phone_field
    description: LDAP attribute name mapped to user phone numbers for directory synchronization
      and contact information.
  - name: ldap_mobile_field
    description: LDAP attribute name mapped to user mobile numbers for directory synchronization
      and mobile contact information.
  - name: ssl_tls_mode
    description: Security protocol configuration for LDAP server connections determining
      encryption method.
    options:
    - 'Off'
    - StartTLS
  - name: require_trusted_certificate
    description: Whether LDAP connections must use certificates signed by a trusted
      certificate authority for secure authentication.
    options:
    - 'No'
    - 'Yes'
  - name: local_private_key_file
    description: File path to the private key used for LDAP SSL/TLS encryption and
      server authentication.
  - name: local_server_certificate_file
    description: File path to the server certificate used for LDAP SSL/TLS connections
      and identity verification.
  - name: local_ca_certs_file
    description: File path to local certificate authority certificates for validating
      LDAP server SSL/TLS connections.
  - name: ldap_group_objectclass
    description: LDAP object class type used to identify and filter group entries
      in the directory.
  - name: ldap_custom_group_search
    description: Custom LDAP search filter or query expression for locating groups
      beyond default objectclass matching.
  - name: ldap_group_member_attribute
    description: LDAP attribute name that identifies group membership for users authenticating
      via directory services.
  - name: default_user_type
    description: User type automatically assigned to new users created through LDAP
      authentication.
    join_hint:
      table: tabUser Type
      'on': default_user_type = tabUser Type.name
  - name: default_role
    description: Role automatically assigned to new users created through LDAP authentication.
    join_hint:
      table: tabRole
      'on': default_role = tabRole.name
  - name: ldap_groups
    description: LDAP group names or identifiers that users belong to for authentication
      and authorization purposes
  - name: ldap_group_field
    description: The specific LDAP attribute name used to retrieve group membership
      information from the directory server
  desc_done: true
- table: tabLanded Cost Item
