  - name: symbol
    description: Currency symbol or code (e.g., $, USD, €) used when users ask about
      currency identification or display representation.
  - name: symbol_on_right
    description: Indicates whether the currency symbol appears after the amount (e.g.,
      100€ vs $100) for formatting questions.
  - name: number_format
