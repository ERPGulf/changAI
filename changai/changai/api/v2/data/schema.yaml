    options:
    - Material Transfer for Manufacture
    - Material Transfer
    - Delivery
  - name: customer
    description: Customer identifier or code associated with the pick list.
    join_hint:
      table: tabCustomer
      'on': customer = tabCustomer.name
  - name: customer_name
    description: Full name of the customer associated with the pick list for human-readable
      identification.
  - name: work_order
    description: Work order number for which materials are being picked from inventory.
    join_hint:
      table: tabWork Order
      'on': work_order = tabWork Order.name
  - name: material_request
    description: Material request document that initiated this pick list.
    join_hint:
      table: tabMaterial Request
      'on': material_request = tabMaterial Request.name
