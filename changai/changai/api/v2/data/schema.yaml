  - name: defkey
    description: Key or parameter name that identifies which system setting or field
      this default value applies to.
  - name: defvalue
    description: The actual default value assigned to the corresponding key, used
      when no user-specified value exists.
  desc_done: true
- table: tabDeleted Document
  description: ''
  fields:
  - name: name
    description: Unique identifier of the deleted document record
  - name: deleted_name
