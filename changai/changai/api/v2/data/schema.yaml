      or negotiations.
  - name: discount_percentage
    description: Percentage discount offered by supplier off the price list rate for
      this quotation item.
  - name: discount_amount
    description: Total discount value applied to this quotation item line, used when
      asking about discounts given by suppliers on specific items.
  - name: distributed_discount_amount
    description: Portion of document-level discount allocated to this item, used when
      analyzing how header discounts are spread across line items.
  - name: base_price_list_rate
    description: Standard price from the supplier's price list before any discounts
      or negotiations, used when comparing quoted prices to list prices.
  - name: rate
    description: Unit price quoted by the supplier for a single item in the quotation.
  - name: amount
    description: Total line amount for the quoted item after multiplying rate by quantity.
  - name: item_tax_template
    description: Tax template applied to calculate taxes on this specific quoted item.
    join_hint:
      table: tabItem Tax Template
      'on': item_tax_template = tabItem Tax Template.name
  - name: base_rate
    description: Unit price quoted by supplier before applying pricing rules or discounts.
  - name: base_amount
    description: Total line amount before applying pricing rules or discounts, calculated
      from base rate and quantity.
  - name: pricing_rules
    description: Specific pricing rules or discount schemes applied to this quotation
      line item.
  - name: net_rate
    description: Price per unit after applying discounts but before taxes, used when
      comparing quoted unit prices from suppliers.
  - name: net_amount
    description: Total line item value after discounts but before taxes, used when
      analyzing total quoted costs per item.
  - name: base_net_rate
    description: Price per unit after discounts converted to company's base currency,
      used for cross-currency supplier quote comparisons.
  - name: base_net_amount
    description: Net amount of the quotation item in base currency, used when comparing
      supplier quotes or calculating total costs before taxes and discounts.
  - name: weight_per_unit
    description: Weight of a single unit of the quoted item, used when calculating
      shipping costs or comparing product specifications across suppliers.
  - name: total_weight
    description: Total weight for the entire quantity of the quoted item, used when
      estimating freight charges or logistics planning for the supplier quotation.
  - name: weight_uom
    description: Unit of measurement for the item's weight in the supplier quotation
      line.
    join_hint:
      table: tabUOM
      'on': weight_uom = tabUOM.name
  - name: warehouse
    description: Warehouse location where the quoted item would be received or stored
      upon purchase.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: prevdoc_doctype
    description: Document type of the preceding document that generated or is linked
      to this quotation item, such as Material Request or Request for Quotation.
  - name: material_request
    description: Links this quotation item to the original material request that triggered
      the procurement need.
    join_hint:
      table: tabMaterial Request
      'on': material_request = tabMaterial Request.name
  - name: sales_order
    description: Links this quotation item to a customer sales order when procuring
      specifically to fulfill that order.
    join_hint:
      table: tabSales Order
      'on': sales_order = tabSales Order.name
  - name: request_for_quotation
    description: Links this quotation item to the RFQ document sent to suppliers to
      solicit this quote.
    join_hint:
      table: tabRequest for Quotation
      'on': request_for_quotation = tabRequest for Quotation.name
  - name: material_request_item
    description: Links to the specific material request line item that originated
      this quotation item, used when tracing supplier quotes back to internal purchase
      requisitions.
  - name: request_for_quotation_item
    description: Links to the specific RFQ line item that this supplier quotation
      is responding to, used when comparing supplier responses to the original request
      for quotation.
  - name: item_tax_rate
    description: Tax rate percentage or tax template applied to this quoted item,
      used when calculating total quoted price including taxes or comparing tax treatment
      across suppliers.
  - name: manufacturer
    description: Brand or company that produces the quoted item, used when filtering
      or comparing quotes by product manufacturer.
    join_hint:
      table: tabManufacturer
      'on': manufacturer = tabManufacturer.name
  - name: manufacturer_part_no
    description: Manufacturer's specific part number for the quoted item, used to
      identify exact product specifications or match against manufacturer catalogs.
  - name: cost_center
    description: Accounting cost center to which the quoted item's expense will be
      allocated, used for budget tracking and departmental cost analysis.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: Links the quotation item to a specific project for tracking project-related
      supplier quotes and procurement costs.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: page_break
    description: Controls whether a page break appears before this item when printing
      or generating PDF versions of the supplier quotation.
  desc_done: true
- table: tabSupplier Scorecard
  description: ''
  fields:
  - name: name
    description: Unique identifier for the supplier scorecard used to track and reference
      specific supplier performance evaluations
  - name: supplier
    description: Links to the supplier being evaluated, used when analyzing vendor
      performance or filtering scorecards by supplier
    join_hint:
      table: tabSupplier
      'on': supplier = tabSupplier.name
  - name: supplier_score
    description: Calculated performance score used to compare supplier quality and
      determine if suppliers meet minimum standards
  - name: indicator_color
    description: Visual status indicator (red/yellow/green) used to quickly identify
      at-risk or high-performing suppliers
  - name: status
    description: Current state of the scorecard (active/inactive/draft) used to filter
      valid performance evaluations
  - name: period
    description: Time range for performance measurement used when analyzing supplier
      trends over specific quarters or years
    options:
    - Per Week
    - Per Month
    - Per Year
  - name: weighting_function
    description: Calculation method for scoring used to understand how different criteria
      contribute to overall supplier ratings
  - name: standings
    description: Current ranking or tier level used to segment suppliers into preferred,
      approved, or probationary categories
  - name: criteria
    description: Specific performance metrics being measured (quality, delivery, cost)
      used when drilling into scorecard components
  - name: warn_rfqs
    description: Threshold that triggers warnings when creating RFQs with underperforming
      suppliers
  - name: warn_pos
    description: Threshold that triggers warnings when creating purchase orders with
      poorly rated suppliers
  - name: prevent_rfqs
    description: Threshold that blocks RFQ creation with suppliers below acceptable
      performance levels
  - name: prevent_pos
    description: Threshold that blocks purchase order creation with suppliers failing
      minimum standards
  - name: notify_supplier
    description: Flag indicating whether supplier receives automated alerts about
      their performance scores
  - name: notify_employee
    description: Flag indicating whether internal staff receive alerts about supplier
      performance issues
  - name: employee
    description: Internal owner or manager responsible for the scorecard used when
      routing performance review tasks
    join_hint:
      table: tabEmployee
      'on': employee = tabEmployee.name
  desc_done: true
- table: tabSupplier Scorecard Criteria
  description: ''
  fields:
  - name: name
