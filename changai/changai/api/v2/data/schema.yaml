  - name: order_lost_reason
    description: Reason why the quotation was lost or not converted to a sales order,
      used when analyzing why deals failed.
  - name: status
    description: Current state of the quotation such as draft, submitted, accepted,
      or lost, used to filter quotations by their progress stage.
    options:
    - Draft
    - Open
    - Replied
    - Partially Ordered
    - Ordered
    - Lost
    - Cancelled
    - Expired
  - name: customer_group
    description: Classification or category of the customer receiving the quotation,
      used to segment quotations by customer type or market segment.
    join_hint:
      table: tabCustomer Group
      'on': customer_group = tabCustomer Group.name
  - name: territory
    description: Geographic sales region or area assigned to the quotation for tracking
      regional sales performance and assignments
    join_hint:
      table: tabTerritory
      'on': territory = tabTerritory.name
  - name: campaign
    description: Marketing campaign that generated or is associated with this quotation
      for tracking campaign effectiveness
    join_hint:
      table: tabCampaign
      'on': campaign = tabCampaign.name
  - name: source
    description: Origin or channel through which the quotation request was received,
      such as website, referral, or direct contact
    join_hint:
      table: tabLead Source
      'on': source = tabLead Source.name
  - name: opportunity
    description: Sales opportunity or lead associated with this quotation for tracking
      potential deals.
    join_hint:
      table: tabOpportunity
      'on': opportunity = tabOpportunity.name
  - name: supplier_quotation
    description: Indicates this is a quotation received from a supplier rather than
      sent to a customer.
    join_hint:
      table: tabSupplier Quotation
      'on': supplier_quotation = tabSupplier Quotation.name
  - name: enq_det
    description: Reference to the enquiry or request for quotation that prompted this
      quotation.
  desc_done: true
- table: tabQuotation Item
  description: ''
  fields:
  - name: name
    description: Unique identifier for the quotation item row, auto-generated from
      item code and quotation number
  - name: item_code
    description: The seller's internal product or service identifier for the quoted
      item
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: customer_item_code
    description: The customer's own product identifier or part number for the quoted
      item, used when customer references items by their internal codes
  - name: item_name
    description: Product or service code being quoted to the customer
  - name: description
    description: Detailed specification or additional information about the quoted
      item beyond its name
  - name: item_group
    description: Product category or classification for the quoted item used for grouping
      and filtering
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: brand
    description: Brand or manufacturer name of the quoted item, used when filtering
      or searching quotations by product brand.
    join_hint:
      table: tabBrand
      'on': brand = tabBrand.name
  - name: image_view
    description: Visual representation or image attachment of the quoted item, referenced
      when users need to see or verify product appearance in quotations.
  - name: qty
    description: Quantity of the item being quoted, used when asking about volumes,
      amounts, or total units in quotation line items.
  - name: stock_uom
    description: Base unit of measure for the item in inventory (e.g., pieces, kg)
      used when asking about standard stock units regardless of quotation UOM.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: uom
    description: Unit of measure for this specific quotation line (e.g., box, dozen)
      used when asking about quoted quantities or pricing units that may differ from
      stock units.
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: conversion_factor
    description: Multiplier to convert the quotation UOM to stock UOM used when asking
      how many stock units equal one quotation unit.
  - name: stock_qty
    description: Quantity available in stock at the time of quotation creation, used
      when checking if quoted items can be fulfilled from current inventory.
  - name: actual_qty
    description: Real-time quantity currently available in warehouse, used when verifying
      current stock levels against quoted amounts.
  - name: company_total_stock
    description: Total quantity available across all warehouses company-wide, used
      when checking overall inventory availability beyond single warehouse.
  - name: price_list_rate
    description: Price per unit from the price list in the quotation's currency, before
      any discounts or margins are applied.
  - name: base_price_list_rate
    description: Price per unit from the price list converted to the company's base
      currency for standardized reporting.
  - name: margin_type
    description: Whether margin is calculated as a percentage or fixed amount on top
      of the rate.
    options:
    - Percentage
    - Amount
  - name: margin_rate_or_amount
    description: Margin added to the base rate, either as a percentage or fixed amount,
      used when calculating profitability or markup on quoted items.
  - name: rate_with_margin
    description: Final rate after applying margin to the base rate, representing the
      actual quoted price per unit before discounts.
  - name: discount_percentage
    description: Percentage discount applied to reduce the quoted price, used when
      analyzing price reductions or promotional offers.
  - name: discount_amount
    description: Total discount applied to this quotation line item, used when asking
      about discounts given on specific quoted products or services.
  - name: distributed_discount_amount
    description: Portion of header-level or distributed discount allocated to this
      line item, used when analyzing how overall quotation discounts are spread across
      items.
  - name: base_rate_with_margin
    description: Unit price including margin before discounts, used when asking about
      pricing with profit margin factored in but before any discount reductions.
  - name: rate
    description: Price per unit of the item before applying any discounts or additional
      charges on the quotation line.
  - name: net_rate
    description: Final price per unit after applying discounts, pricing rules, or
      other adjustments to the base rate.
  - name: amount
    description: Total line value calculated from quantity and net rate, representing
      the final extended price for this quotation item.
  - name: net_amount
    description: Total amount for this quotation line item after applying discounts
      but before taxes.
  - name: item_tax_template
    description: Tax template applied to this quotation item defining which tax rates
      and rules apply.
    join_hint:
      table: tabItem Tax Template
      'on': item_tax_template = tabItem Tax Template.name
  - name: base_rate
    description: Unit price of the item in the company's base currency before any
      discounts or taxes.
  - name: base_net_rate
    description: Unit price after applying discounts but before taxes, in company
      base currency.
  - name: base_amount
    description: Total line amount before discounts and taxes, in company base currency.
  - name: base_net_amount
    description: Total line amount after applying discounts but before taxes, in company
      base currency.
  - name: pricing_rules
    description: Identifies which pricing rule was applied to calculate this quotation
      item's price or discount.
  - name: stock_uom_rate
    description: Price per unit in the item's base stock unit of measure, before quantity
      or UOM conversions.
  - name: is_free_item
    description: Indicates whether this item is provided at no charge as part of a
      promotion or bundle.
  - name: is_alternative
    description: Indicates this quotation item is offered as an alternative option
      rather than a primary item.
  - name: has_alternative_item
    description: Indicates this quotation item has one or more alternative items associated
      with it.
  - name: valuation_rate
    description: Cost or internal valuation rate of the item used for margin calculations,
      distinct from the selling price shown to customers.
  - name: gross_profit
    description: Profit margin or amount calculated for this quotation line item,
      used when analyzing profitability or pricing strategy of quoted products.
  - name: weight_per_unit
    description: Weight of a single unit of the quoted item, used when calculating
      shipping costs or comparing product specifications per unit.
  - name: total_weight
    description: Combined weight of all units in this quotation line, used when determining
      total shipping weight or logistics requirements for the quoted quantity.
  - name: weight_uom
    description: Unit of measurement for the quoted item's weight (e.g., kg, lbs)
      used when users ask about weight specifications or shipping calculations.
    join_hint:
      table: tabUOM
      'on': weight_uom = tabUOM.name
  - name: warehouse
    description: Warehouse location from which the quoted item will be fulfilled,
      relevant when users ask about stock availability or delivery source for quotations.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: against_blanket_order
    description: Indicates whether this quotation item is linked to an existing blanket
      purchase order, used when users ask about items quoted under long-term or framework
      agreements.
  - name: blanket_order
    description: Reference to a blanket order agreement when this quotation item is
      linked to a pre-negotiated bulk purchase arrangement.
    join_hint:
      table: tabBlanket Order
      'on': blanket_order = tabBlanket Order.name
  - name: blanket_order_rate
    description: Pre-negotiated price from the blanket order agreement applied to
      this quotation item.
  - name: prevdoc_doctype
    description: Type of the previous document that generated or is linked to this
      quotation item, such as Opportunity or Lead.
    join_hint:
      table: tabDocType
      'on': prevdoc_doctype = tabDocType.name
  - name: prevdoc_docname
    description: Reference to the previous document that generated this quotation
      item, such as an opportunity or lead identifier.
  - name: projected_qty
    description: Expected available quantity of the item considering current stock
      and planned production or procurement.
  - name: item_tax_rate
    description: Tax rate percentage applied specifically to this quotation line item.
  - name: additional_notes
    description: Free-text notes or comments specific to this quotation line item,
      used when users ask about special instructions, remarks, or additional details
      for individual quoted items.
  - name: page_break
    description: Controls whether a page break occurs before this quotation item when
      printing or generating PDF documents, relevant when users ask about quotation
      formatting or print layout.
  desc_done: true
