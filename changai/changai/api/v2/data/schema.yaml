- table: tabStock Settings
  description: Default settings for your stock-related transactions
  fields:
  - name: name
    description: Unique identifier for the stock settings configuration
  - name: item_naming_by
    description: Determines whether items are identified by item code, item name,
      or naming series in stock transactions
    options:
    - Item Code
    - Naming Series
  - name: valuation_method
    description: Default inventory costing method such as FIFO, LIFO, or moving average
      used for stock valuation
    options:
    - FIFO
    - Moving Average
