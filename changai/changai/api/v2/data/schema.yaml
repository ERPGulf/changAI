      planning.
  - name: fixed_time
    description: Time required for operation setup or preparation regardless of batch
      size.
  - name: hour_rate
    description: Actual or effective hourly cost rate applied to this operation including
      adjustments or overrides.
  - name: base_hour_rate
    description: Standard or default hourly cost rate for this operation before any
      adjustments.
  - name: operating_cost
    description: Total cost to perform this operation including adjustments, used
      when calculating actual production costs per operation
  - name: base_operating_cost
    description: Standard or default cost for this operation before any adjustments
      or multipliers are applied
  - name: batch_size
    description: Quantity of items processed together in this operation, used when
      calculating per-unit operation costs or scheduling batch production
  - name: set_cost_based_on_bom_qty
    description: Indicates whether operation cost scales with BOM quantity or remains
