  description: ''
  fields:
  - name: name
    description: Unique identifier for the pricing rule used in queries about specific
      pricing rules by code or ID
  - name: naming_series
    description: Prefix pattern that determines how pricing rule names are auto-generated
      when creating new rules
    options:
    - PRLE-.####
  - name: title
    description: Human-readable label for the pricing rule used when searching by
      descriptive name rather than technical identifier
  - name: disable
    description: Whether the pricing rule is currently inactive and not being applied
      to transactions.
  - name: apply_on
    description: The entity type the pricing rule targets, such as item code, item
      group, brand, or transaction total.
    options:
    - Item Code
    - Item Group
    - Brand
    - Transaction
  - name: price_or_product_discount
    description: Whether the rule provides a price adjustment or a free/discounted
      product as the benefit.
    options:
    - Price
    - Product
  - name: warehouse
    description: Specific warehouse location where this pricing rule applies, used
      when prices vary by storage facility or distribution center.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: items
    description: Individual product SKUs or item codes included in this pricing rule,
      used when setting prices for specific products.
  - name: item_groups
    description: Product categories or classification groups covered by this pricing
      rule, used when applying prices to entire product families or categories.
  - name: brands
    description: Specific brand names or identifiers that this pricing rule applies
      to, used when filtering price adjustments by product brand.
  - name: mixed_conditions
    description: Indicates whether the pricing rule allows combining multiple condition
      types (item groups, brands, categories) simultaneously in a single rule.
  - name: is_cumulative
    description: Determines if this pricing rule can be stacked or combined with other
      active pricing rules for the same transaction.
  - name: coupon_code_based
    description: Whether this pricing rule requires a coupon code to be applied at
      checkout or transaction time.
  - name: apply_rule_on_other
