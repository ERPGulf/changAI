  - name: items_to_be_repost
    description: Items queued or pending for valuation reposting to correct inventory
      accounting discrepancies.
  - name: distinct_item_and_warehouse
    description: Unique combinations of items and warehouses requiring separate valuation
      reposting to ensure location-specific inventory accuracy.
  - name: total_reposting_count
    description: Total number of reposting entries generated when revaluing inventory
      items across multiple accounting periods or ledgers.
  - name: current_index
    description: Sequential position of this specific reposting entry within the complete
      set of revaluation repostings.
  - name: gl_reposting_index
    description: Index specifically tracking the general ledger reposting sequence
