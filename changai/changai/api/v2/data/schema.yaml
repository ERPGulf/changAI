- table: tabBOM
  description: ''
  fields:
  - name: name
    description: BOM identifier or title used to reference a specific bill of materials
      configuration
  - name: item
    description: Finished product or assembly that this BOM produces or manufactures
    join_hint:
      table: tabItem
      'on': item = tabItem.name
  - name: company
    description: Company entity that owns or uses this bill of materials
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: uom
    description: Unit of measurement for the component or material quantity in the
      bill of materials.
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: quantity
    description: Amount of component or material required in the bill of materials
      assembly.
  - name: is_active
    description: Whether this bill of materials entry is currently valid and should
      be used in production or costing calculations.
  - name: is_default
    description: Indicates whether this BOM is the default bill of materials for the
      item when multiple BOMs exist.
  - name: allow_alternative_item
    description: Controls whether substitute or alternative items can be used in place
      of the specified BOM components during production or material planning.
  - name: set_rate_of_sub_assembly_item_based_on_bom
    description: Determines if the cost/price of sub-assembly items should be automatically
      calculated from their underlying BOM rather than using a fixed rate.
  - name: project
    description: Project associated with this bill of materials for tracking manufacturing
      or assembly costs and materials by project.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: rm_cost_as_per
    description: Method used to determine raw material costs in BOM calculations,
      such as valuation rate, price list, or last purchase rate.
    options:
    - Valuation Rate
    - Last Purchase Rate
    - Price List
  - name: buying_price_list
    description: Price list used to fetch purchase prices for raw materials and components
      in the BOM cost calculation.
    join_hint:
      table: tabPrice List
      'on': buying_price_list = tabPrice List.name
  - name: price_list_currency
    description: Currency used in the price list associated with this BOM for standard
      pricing references.
    join_hint:
      table: tabCurrency
      'on': price_list_currency = tabCurrency.name
  - name: plc_conversion_rate
    description: Exchange rate to convert between the price list currency and the
      BOM's transaction currency.
  - name: currency
    description: Transaction currency for this BOM's costs and pricing calculations.
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: Rate used to convert quantities between the finished item and raw
      material units of measure in the bill of materials.
  - name: items
    description: Child items table containing the raw materials, components, or sub-assemblies
      required to manufacture the finished product.
  - name: with_operations
    description: Indicates whether this BOM includes manufacturing operations, routing
      steps, or workstation instructions for production.
  - name: transfer_material_against
    description: Specifies whether materials are transferred against a work order
      or a BOM during manufacturing execution.
    options:
    - Work Order
    - Job Card
  - name: routing
    description: The manufacturing routing or process sequence that defines operations
      to produce this BOM item.
    join_hint:
      table: tabRouting
      'on': routing = tabRouting.name
  - name: fg_based_operating_cost
    description: Indicates whether operating costs are calculated based on the finished
      goods quantity rather than individual operation costs.
  - name: operating_cost_per_bom_quantity
    description: Total operating cost to produce one BOM quantity unit, used when
      calculating manufacturing costs or profitability per batch.
  - name: operations
    description: Manufacturing operations or process steps required to produce the
      item, referenced when analyzing production workflows or routing sequences.
  - name: scrap_items
    description: Materials expected to be wasted or discarded during production, used
      when calculating material waste or scrap allowances in manufacturing.
  - name: process_loss_percentage
    description: Percentage of material expected to be lost or wasted during the manufacturing
      process for this BOM item.
  - name: process_loss_qty
    description: Absolute quantity of material expected to be lost or wasted during
      the manufacturing process for this BOM item.
  - name: operating_cost
    description: Labor, machine, or overhead cost incurred to execute the manufacturing
      operation for this BOM item, excluding material costs.
  - name: raw_material_cost
    description: Cost of raw materials required to produce one unit of the finished
      item in this BOM.
  - name: scrap_material_cost
    description: Cost of materials expected to be wasted or scrapped during production
      of one unit.
  - name: base_operating_cost
    description: Labor and overhead costs for manufacturing operations excluding material
      costs.
  - name: base_raw_material_cost
    description: Cost of raw materials needed to produce one unit of the finished
      item, excluding scrap or waste materials.
  - name: base_scrap_material_cost
    description: Cost of materials expected to be wasted or scrapped during production
      of one unit of the finished item.
  - name: total_cost
    description: Complete cost to produce one unit including raw materials, scrap,
      operations, and all other BOM-related expenses.
  - name: base_total_cost
    description: Total cost of all materials and operations required to manufacture
      one unit of the finished item at base quantities.
  - name: item_name
    description: The finished product or assembly that this bill of materials defines
      how to manufacture.
  - name: description
    description: Explanatory text about this bill of materials structure, purpose,
      or manufacturing notes.
  - name: has_variants
    description: Indicates whether this BOM produces items with multiple attribute
      variations like size or color.
  - name: inspection_required
    description: Indicates whether manufactured items from this BOM must undergo quality
      inspection before use or sale.
  - name: quality_inspection_template
    description: The specific inspection checklist or template used when quality inspection
      is required for this BOM.
    join_hint:
      table: tabQuality Inspection Template
      'on': quality_inspection_template = tabQuality Inspection Template.name
  - name: exploded_items
    description: Flattened list of all components including sub-assembly items when
      querying complete material requirements across all BOM levels.
  - name: show_in_website
    description: Whether this BOM is visible on the website for customer or public
      viewing.
  - name: route
    description: Manufacturing method or production path such as subcontracting, in-house
      manufacturing, or purchase for this BOM.
  - name: thumbnail
    description: Image preview of the bill of materials or finished product for visual
      identification
  - name: show_items
    description: Controls whether component items and raw materials are displayed
      in the BOM view
  - name: show_operations
    description: Controls whether manufacturing operations and routing steps are displayed
      in the BOM view
  - name: web_long_description
    description: Detailed product description for the BOM displayed on web or e-commerce
      platforms.
  - name: bom_creator
    description: User or person who created or defined this bill of materials.
    join_hint:
      table: tabBOM Creator
      'on': bom_creator = tabBOM Creator.name
  - name: bom_creator_item
    description: Specific item or product that was used as the template or source
      when creating this BOM.
  - name: amended_from
    description: Links to the original BOM document that this BOM was amended or corrected
      from, used when tracking BOM revision history or finding which BOM replaced
      another.
    join_hint:
      table: tabBOM
      'on': amended_from = tabBOM.name
  desc_done: true
- table: tabBOM Creator
  description: ''
  fields:
  - name: name
    description: Unique identifier or title for this BOM creator record
  - name: item_code
    description: SKU or product code of the item being manufactured in this BOM
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: item_name
    description: Descriptive name of the finished product or manufactured item in
      this BOM
  - name: item_group
    description: Category or classification of the item being produced in the bill
