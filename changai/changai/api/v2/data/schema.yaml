      'on': reference_type = tabDocType.name
  - name: reference_name
    description: Specific document ID or number that this advance payment references
  - name: remarks
    description: Comments or notes explaining the reason for or details about the
      advance payment allocation.
  - name: reference_row
    description: Links to the specific row in the referenced advance document being
      allocated against this purchase invoice.
  - name: advance_amount
    description: The monetary value of advance payment being applied or allocated
      to this purchase invoice.
  - name: allocated_amount
    description: Amount of advance payment that has been applied or allocated against
      a purchase invoice.
  - name: exchange_gain_loss
    description: Gain or loss resulting from currency exchange rate differences between
      advance payment and invoice settlement.
  - name: ref_exchange_rate
    description: Exchange rate used to convert the advance payment amount to the reference
      or base currency.
  - name: difference_posting_date
    description: Date when exchange rate differences or payment variances from the
      advance are posted to accounting ledgers.
  desc_done: true
- table: tabPurchase Invoice Item
  description: ''
  fields:
  - name: name
    description: Unique identifier for the purchase invoice item line
  - name: item_code
    description: Code of the product or service being purchased on this invoice line
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: product_bundle
    description: Indicates if this line item represents a bundled set of products
      sold together as a package
    join_hint:
      table: tabProduct Bundle
      'on': product_bundle = tabProduct Bundle.name
  - name: item_name
    description: The product or service being purchased, used when identifying what
      was bought on the invoice.
  - name: description
    description: Additional details or specifications about the purchased item beyond
      its name, used when users need extended product information or technical specifications.
  - name: brand
    description: The manufacturer or brand name of the purchased item, used when filtering
      or searching purchases by specific brands or suppliers.
    join_hint:
      table: tabBrand
      'on': brand = tabBrand.name
  - name: item_group
    description: Category or classification of the purchased item for grouping similar
      products together in analysis and reporting.
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: image_view
    description: Visual representation or picture of the purchased item for identification
      and verification purposes.
  - name: received_qty
    description: Actual quantity of items physically received against this purchase
      invoice line, used to track delivery fulfillment and discrepancies.
  - name: qty
    description: Quantity of items invoiced by the supplier for this line item.
  - name: rejected_qty
    description: Quantity of items rejected or returned from the invoiced amount due
      to quality issues or discrepancies.
  - name: uom
    description: Unit of measurement for the invoiced quantity such as pieces, kilograms,
      or liters.
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: conversion_factor
    description: Multiplier used when user asks about converting between purchase
      unit and stock unit quantities.
  - name: stock_uom
    description: Base inventory unit of measure for the item, relevant when user asks
      about stock or inventory units rather than purchase units.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: stock_qty
    description: Quantity in base inventory units after conversion, relevant when
      user asks about inventory impact or stock-level quantities from purchases.
  - name: price_list_rate
    description: Item price from the price list in transaction currency before any
      discounts or margin adjustments are applied.
  - name: base_price_list_rate
    description: Item price from the price list converted to company base currency
      for multi-currency purchase invoice reporting.
  - name: margin_type
    description: Defines whether margin is calculated as a percentage or fixed amount
      when marking up or down from the price list rate.
    options:
    - Percentage
    - Amount
  - name: margin_rate_or_amount
    description: Margin added to the base purchase rate, either as a percentage or
      absolute amount, used when calculating marked-up item costs.
  - name: rate_with_margin
    description: Final purchase rate after applying margin to the base rate, representing
      the actual cost per unit including markup.
  - name: discount_percentage
    description: Percentage discount applied to the purchase invoice item, reducing
      the total cost from the supplier.
  - name: discount_amount
    description: Discount applied directly to this invoice line item, used when calculating
      item-level price reductions or promotional discounts.
  - name: distributed_discount_amount
    description: Portion of invoice-level or header discount allocated to this line
      item, used when header discounts are apportioned across items.
  - name: base_rate_with_margin
    description: Item rate including markup or margin added to the base cost, used
      when analyzing pricing that includes profit margin before other adjustments.
  - name: rate
    description: Unit price per item on the purchase invoice line before taxes and
      discounts.
  - name: amount
    description: Total line amount for this purchase invoice item after applying quantity,
      rate, and discounts but before taxes.
  - name: item_tax_template
    description: Tax configuration template applied to this purchase invoice item
      to determine applicable tax rates and accounts.
    join_hint:
      table: tabItem Tax Template
      'on': item_tax_template = tabItem Tax Template.name
  - name: base_rate
    description: Unit price of the purchased item in company's base currency before
      any currency conversion.
  - name: base_amount
    description: Total line amount in company's base currency after currency conversion
      from transaction currency.
  - name: pricing_rules
    description: Applied pricing rule or discount scheme that determined the final
      rate for this purchase item.
  - name: stock_uom_rate
    description: Rate per stock unit of measure when user needs pricing in base inventory
      units rather than purchase units.
  - name: is_free_item
    description: Indicates item was received at no charge as promotional or complimentary
      goods.
  - name: apply_tds
    description: Whether tax deducted at source should be calculated on this line
      item for withholding tax compliance.
  - name: net_rate
    description: Rate per unit after applying discounts but before taxes, used when
      asking about discounted unit pricing on purchase invoice items.
  - name: net_amount
    description: Total amount for the line item after discounts but before taxes,
      used when calculating or querying pre-tax totals.
  - name: base_net_rate
    description: Rate per unit after discounts in the company's base currency, used
      when querying purchase costs in standardized currency across multi-currency
      transactions.
  - name: base_net_amount
    description: Net amount of the purchase invoice line item in the company's base
      currency, used when analyzing purchase costs in standardized currency.
  - name: valuation_rate
    description: Rate used to value inventory for this purchased item, relevant when
      calculating stock value or cost of goods sold.
  - name: sales_incoming_rate
    description: Incoming exchange rate for sales-related currency conversion on this
      purchase item, used when purchase involves foreign currency transactions.
  - name: item_tax_amount
    description: Tax amount charged on this specific line item of the purchase invoice.
  - name: landed_cost_voucher_amount
    description: Additional costs allocated to this item from landed cost vouchers
      such as freight, customs, or insurance.
  - name: rm_supp_cost
    description: Raw material supplementary cost for this purchased item beyond the
      base price.
  - name: warehouse
    description: Warehouse location where purchased items are received or stored for
      this invoice line item.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: serial_and_batch_bundle
    description: Reference to bundled serial numbers and batch numbers assigned to
      this purchased item.
    join_hint:
      table: tabSerial and Batch Bundle
      'on': serial_and_batch_bundle = tabSerial and Batch Bundle.name
  - name: use_serial_batch_fields
    description: Indicates whether this invoice item tracks inventory using serial
      numbers or batch numbers.
  - name: from_warehouse
    description: Warehouse location from which purchased items are received or stocked
      upon invoice processing.
    join_hint:
      table: tabWarehouse
      'on': from_warehouse = tabWarehouse.name
  - name: quality_inspection
    description: Reference to the quality inspection record performed on purchased
      items before acceptance.
    join_hint:
      table: tabQuality Inspection
      'on': quality_inspection = tabQuality Inspection.name
  - name: rejected_warehouse
    description: Warehouse location where items failing quality inspection or rejected
      goods are stored.
    join_hint:
      table: tabWarehouse
      'on': rejected_warehouse = tabWarehouse.name
  - name: rejected_serial_and_batch_bundle
    description: References the bundle containing serial numbers and batch numbers
      for items rejected during purchase invoice receipt.
    join_hint:
      table: tabSerial and Batch Bundle
      'on': rejected_serial_and_batch_bundle = tabSerial and Batch Bundle.name
  - name: serial_no
    description: Serial number assigned to the purchased item being invoiced for tracking
      individual units.
  - name: rejected_serial_no
    description: Serial number of the specific item unit that was rejected during
      purchase invoice receipt or quality inspection.
  - name: batch_no
    description: Batch or lot number assigned to the purchased items for tracking
      and quality control purposes.
    join_hint:
      table: tabBatch
      'on': batch_no = tabBatch.name
  - name: manufacturer
    description: Company that manufactured the purchased item, distinct from the supplier
      or vendor.
    join_hint:
      table: tabManufacturer
      'on': manufacturer = tabManufacturer.name
  - name: manufacturer_part_no
    description: Manufacturer's unique part number or SKU for the purchased item,
      different from internal item codes or supplier part numbers.
  - name: expense_account
    description: General ledger account where the cost of this purchased item is recorded
      as an expense.
    join_hint:
      table: tabAccount
      'on': expense_account = tabAccount.name
  - name: wip_composite_asset
    description: Links this purchase to a work-in-progress composite asset being constructed
      or assembled.
    join_hint:
      table: tabAsset
      'on': wip_composite_asset = tabAsset.name
  - name: is_fixed_asset
    description: Indicates whether this purchased item is a fixed asset (equipment,
      property, vehicles) rather than inventory or expense.
  - name: asset_location
    description: Physical location or site where the purchased asset will be placed
      or used
    join_hint:
      table: tabLocation
      'on': asset_location = tabLocation.name
  - name: asset_category
    description: Classification of the purchased item as a fixed asset type for depreciation
      and accounting purposes
    join_hint:
      table: tabAsset Category
      'on': asset_category = tabAsset Category.name
  - name: deferred_expense_account
    description: General ledger account for expenses that will be recognized over
      time rather than immediately upon purchase
    join_hint:
      table: tabAccount
      'on': deferred_expense_account = tabAccount.name
  - name: service_stop_date
    description: End date of the service period for this purchased item, used when
      querying service duration or subscription end dates.
  - name: enable_deferred_expense
    description: Indicates whether this purchase invoice item uses deferred expense
      accounting to spread costs over multiple periods.
  - name: service_start_date
    description: Start date of the service period for this purchased item, used when
      querying service duration or subscription start dates.
  - name: service_end_date
    description: End date of the service period for service items on the purchase
      invoice, used when querying service duration or subscription end dates.
  - name: allow_zero_valuation_rate
    description: Indicates whether this invoice item permits a zero valuation rate,
      relevant when users ask about items purchased without standard costing or valuation.
  - name: item_tax_rate
    description: Tax rate percentage or tax configuration applied specifically to
      this invoice line item, used when analyzing item-level tax amounts or rates
      that differ from invoice defaults.
  - name: bom
    description: Bill of Materials reference for the purchased item, used when tracking
      manufactured or assembled items received through purchase invoices.
    join_hint:
      table: tabBOM
      'on': bom = tabBOM.name
  - name: include_exploded_items
    description: Indicates whether sub-components from the BOM are individually listed
      in the invoice rather than showing only the parent item.
  - name: purchase_invoice_item
    description: Unique identifier for this specific line item on the purchase invoice.
  - name: purchase_order
    description: Reference to the original purchase order that authorized this invoice
      item purchase.
    join_hint:
      table: tabPurchase Order
      'on': purchase_order = tabPurchase Order.name
  - name: po_detail
    description: Specific line item from the purchase order that this invoice item
      corresponds to.
  - name: purchase_receipt
    description: Reference to the goods receipt document confirming physical delivery
      of this invoiced item.
    join_hint:
      table: tabPurchase Receipt
      'on': purchase_receipt = tabPurchase Receipt.name
  - name: pr_detail
    description: Links to the specific purchase receipt item that this invoice item
      is billing against, used when matching invoices to received goods.
  - name: sales_invoice_item
    description: References the original sales invoice item in inter-company transactions
      or drop-ship scenarios where a purchase directly fulfills a sale.
  - name: material_request
    description: Links to the material request that initiated this purchase, used
      when tracking procurement from requisition through invoicing.
    join_hint:
      table: tabMaterial Request
      'on': material_request = tabMaterial Request.name
  - name: material_request_item
    description: Links to the specific material request line item that triggered this
      purchase, used when tracing purchases back to internal requisitions.
  - name: weight_per_unit
    description: Weight of a single unit of the purchased item, used for calculating
      shipping costs or total weight per individual item.
  - name: total_weight
    description: Combined weight of all units on this invoice line, used for freight
      calculations and logistics planning.
  - name: weight_uom
    description: Unit of measurement for the weight of the purchased item (e.g., kg,
      lbs, tons).
    join_hint:
      table: tabUOM
      'on': weight_uom = tabUOM.name
  - name: project
    description: Project to which this purchase invoice item is allocated for tracking
      project-specific procurement costs.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: cost_center
    description: Cost center to which this purchase invoice item's expense is assigned
      for departmental or functional cost allocation.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: page_break
    description: Indicates whether a page break should occur before this invoice item
      when printing or generating PDF documents.
  desc_done: true
- table: tabPurchase Order
  description: ''
  fields:
  - name: name
    description: Unique identifier or number assigned to the purchase order, used
      when referencing a specific PO by its ID or code
  - name: title
    description: Descriptive label or subject line for the purchase order, used when
      searching by what the order is about or its purpose
  - name: naming_series
    description: Prefix pattern or series code that determines how purchase order
      numbers are auto-generated, used when filtering or grouping POs by their numbering
      scheme
    options:
    - PUR-ORD-.YYYY.-
  - name: supplier
    description: Unique identifier code for the vendor fulfilling the purchase order,
      used when filtering or joining supplier records.
    join_hint:
      table: tabSupplier
      'on': supplier = tabSupplier.name
  - name: supplier_name
    description: Human-readable name of the vendor, used when users ask about purchases
      from a specific company by name.
  - name: order_confirmation_no
    description: Confirmation number provided by the supplier acknowledging receipt
      of the purchase order, used to track supplier acceptance and reference external
      supplier systems.
  - name: order_confirmation_date
    description: Date when the supplier confirmed acceptance of the purchase order.
  - name: transaction_date
    description: Date when the purchase order transaction was recorded in the system.
  - name: schedule_date
    description: Date when goods or services are scheduled to be delivered or received.
  - name: company
    description: The legal entity or business unit that owns this purchase order.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: apply_tds
    description: Whether tax deducted at source is applied to this purchase order.
  - name: tax_withholding_category
    description: The specific type or classification of tax withholding applied to
      this purchase order.
    join_hint:
      table: tabTax Withholding Category
      'on': tax_withholding_category = tabTax Withholding Category.name
  - name: is_subcontracted
    description: Indicates whether this purchase order involves subcontracting work
      to an external vendor who will perform manufacturing or processing operations.
  - name: has_unit_price_items
    description: Indicates whether this purchase order contains line items priced
      per unit rather than as lump sum or other pricing methods.
  - name: supplier_warehouse
    description: The warehouse location owned or managed by the supplier from which
      goods on this purchase order will be shipped or sourced.
    join_hint:
      table: tabWarehouse
      'on': supplier_warehouse = tabWarehouse.name
  - name: amended_from
    description: Links to the original purchase order that was cancelled and replaced
      by this amended version.
    join_hint:
      table: tabPurchase Order
      'on': amended_from = tabPurchase Order.name
  - name: cost_center
    description: Accounting department or division to which purchase order expenses
      are allocated for budgeting and financial tracking.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: Specific project or job to which this purchase order is assigned
      for tracking project-related procurement costs.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: currency
    description: Currency in which the purchase order total and line item prices are
      denominated.
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: Exchange rate used to convert purchase order amounts from the transaction
      currency to the company's base currency.
  - name: buying_price_list
    description: Price list applied to determine default item prices and discounts
      for this purchase order.
    join_hint:
      table: tabPrice List
      'on': buying_price_list = tabPrice List.name
  - name: price_list_currency
    description: Currency in which the price list is denominated for this purchase
      order.
    join_hint:
      table: tabCurrency
      'on': price_list_currency = tabCurrency.name
  - name: plc_conversion_rate
    description: Exchange rate used to convert price list currency to the purchase
      order's transaction currency.
  - name: ignore_pricing_rule
    description: Indicates whether automatic pricing rules are bypassed for this purchase
      order.
  - name: scan_barcode
    description: Barcode scanned during purchase order receiving or warehouse operations
      to identify items.
  - name: last_scanned_warehouse
    description: Warehouse location where the most recent barcode scan occurred for
      this purchase order.
  - name: set_from_warehouse
    description: Source warehouse designated for fulfilling or transferring items
      in this purchase order.
    join_hint:
      table: tabWarehouse
      'on': set_from_warehouse = tabWarehouse.name
  - name: set_warehouse
    description: The warehouse location where all items in this purchase order will
      be received and stored upon delivery.
    join_hint:
      table: tabWarehouse
      'on': set_warehouse = tabWarehouse.name
  - name: items
    description: The line items or products being purchased in this order, including
      details like item codes, quantities, and prices for each product.
  - name: total_qty
    description: The sum of quantities across all line items in the purchase order,
      used when asking about total units being ordered.
  - name: total_net_weight
    description: Total weight of all items in the purchase order excluding packaging,
      used when calculating shipping costs or logistics capacity.
  - name: base_total
    description: Total purchase order amount in company's base currency before any
      taxes or discounts are applied.
  - name: base_net_total
    description: Total purchase order amount in company's base currency after discounts
      but before taxes.
  - name: total
    description: Grand total amount of the purchase order including all taxes, charges,
      and discounts.
  - name: net_total
    description: Subtotal amount before taxes and additional charges are applied.
  - name: tax_withholding_net_total
    description: Net amount after deducting withholding tax that must be withheld
      at source for tax compliance.
  - name: base_tax_withholding_net_total
    description: Net total amount after tax withholding deductions in base currency,
      used when calculating final payment obligations to suppliers.
  - name: pricing_rules
    description: Applied pricing rule configurations that determined discounts or
      special pricing for this purchase order.
  - name: set_reserve_warehouse
    description: Designated warehouse location where purchased items will be reserved
      or held upon receipt.
    join_hint:
      table: tabWarehouse
      'on': set_reserve_warehouse = tabWarehouse.name
  - name: supplied_items
    description: Items provided by the customer to the supplier for use in manufacturing
      or processing the purchased goods.
  - name: tax_category
    description: Classification determining which tax rules apply to this purchase
      order based on supplier location, item type, or regulatory requirements.
    join_hint:
      table: tabTax Category
      'on': tax_category = tabTax Category.name
  - name: taxes_and_charges
    description: Template or configuration defining the specific tax rates, additional
      charges, and calculation methods applied to this purchase order.
    join_hint:
      table: tabPurchase Taxes and Charges Template
      'on': taxes_and_charges = tabPurchase Taxes and Charges Template.name
  - name: shipping_rule
    description: Defines the shipping method or carrier service selected for delivering
      the purchased goods.
    join_hint:
      table: tabShipping Rule
      'on': shipping_rule = tabShipping Rule.name
  - name: incoterm
    description: International commercial term specifying which party bears shipping
      costs, risks, and responsibilities during transport.
    join_hint:
      table: tabIncoterm
      'on': incoterm = tabIncoterm.name
  - name: named_place
    description: Specific geographic location referenced in the incoterm where risk
      and cost transfer occurs between buyer and seller.
  - name: taxes
    description: Total tax amount applied to the purchase order in transaction currency.
  - name: base_taxes_and_charges_added
    description: Total additional taxes and charges in base currency, such as freight,
      handling fees, or VAT added to the purchase order.
  - name: base_taxes_and_charges_deducted
    description: Total taxes and charges subtracted in base currency, such as discounts,
      rebates, or tax exemptions applied to the purchase order.
  - name: base_total_taxes_and_charges
    description: Net total of all taxes and charges applied to the purchase order
      in base currency, used when asking for total tax amounts or tax impact on order
      value.
  - name: taxes_and_charges_added
    description: Sum of only the tax and charge amounts that increase the purchase
      order total, used when asking specifically about additional costs or markup
      taxes.
  - name: taxes_and_charges_deducted
    description: Sum of only the tax and charge amounts that decrease the purchase
      order total, used when asking about discounts, rebates, or deductions applied
      through the tax system.
  - name: total_taxes_and_charges
    description: Sum of all tax and charge amounts applied to the purchase order,
      used when analyzing tax costs or total charges separate from item costs.
  - name: base_grand_total
    description: Final total amount of the purchase order in base currency including
      all items, taxes, charges, and adjustments.
  - name: base_rounding_adjustment
    description: Amount added or subtracted in base currency to round the final purchase
      order total to a standard precision.
  - name: base_in_words
    description: Total purchase order amount written in words in base currency for
      check printing and formal documentation
  - name: base_rounded_total
    description: Purchase order total in base currency after applying rounding adjustments,
      used when rounding rules differ from grand_total
  - name: grand_total
    description: Final total purchase order amount in transaction currency including
      all taxes, charges, and discounts
  - name: rounding_adjustment
    description: Amount added or subtracted to round the purchase order total to a
      whole number or specified precision.
  - name: rounded_total
    description: Final purchase order total after applying rounding adjustment.
  - name: disable_rounded_total
    description: Indicates whether automatic rounding of the purchase order total
      is turned off.
  - name: in_words
    description: Total purchase order amount expressed as text words for check writing
      or formal documentation
  - name: advance_paid
    description: Amount paid upfront to supplier before goods are received or invoice
      is finalized
  - name: apply_discount_on
    description: Specifies whether discounts calculate from grand total or net total
      before taxes and charges
    options:
    - Grand Total
    - Net Total
  - name: base_discount_amount
    description: Initial discount amount applied to the purchase order before any
      additional discounts.
  - name: additional_discount_percentage
    description: Extra discount percentage applied on top of the base discount to
      calculate final discount.
  - name: discount_amount
    description: Total final discount amount on the purchase order after applying
      all discounts.
  - name: other_charges_calculation
    description: Additional fees or costs beyond item prices such as freight, handling,
      or miscellaneous charges applied to the purchase order.
  - name: supplier_address
    description: The specific address identifier or name of the supplier's location
      for this purchase order.
    join_hint:
      table: tabAddress
      'on': supplier_address = tabAddress.name
  - name: address_display
    description: The formatted, human-readable full address text showing complete
      supplier address details for display purposes.
  - name: contact_person
    description: Name of the individual at the supplier who is the primary point of
      contact for this purchase order.
    join_hint:
      table: tabContact
      'on': contact_person = tabContact.name
  - name: contact_display
    description: Formatted display name combining contact person details for showing
      in lists and reports.
  - name: contact_mobile
    description: Mobile phone number of the supplier contact person for urgent purchase
      order communications.
  - name: contact_email
    description: Email address of the supplier contact person for this purchase order.
  - name: dispatch_address
    description: Address identifier where ordered goods should be delivered or dispatched
      to.
    join_hint:
      table: tabAddress
      'on': dispatch_address = tabAddress.name
  - name: dispatch_address_display
    description: Formatted delivery address text showing where ordered goods should
      be shipped.
  - name: shipping_address
    description: Physical location where purchased goods will be delivered to the
      buyer
    join_hint:
      table: tabAddress
      'on': shipping_address = tabAddress.name
  - name: shipping_address_display
    description: Formatted shipping address text for display purposes, typically used
      when showing the delivery destination in reports or documents
  - name: billing_address
    description: Address where invoices are sent and payment is processed, may differ
      from the delivery location
    join_hint:
      table: tabAddress
      'on': billing_address = tabAddress.name
  - name: billing_address_display
    description: Formatted billing address for the purchase order used when users
      ask where invoices should be sent or what the billing location is.
  - name: customer
    description: Customer identifier or code referenced when users search by customer
      ID or need to link to customer records.
    join_hint:
      table: tabCustomer
      'on': customer = tabCustomer.name
  - name: customer_name
    description: Customer's display name used when users ask about purchase orders
      by company or organization name rather than customer code.
  - name: customer_contact_person
    description: Name of the customer's contact person for this purchase order, used
      when searching for orders by who to communicate with at the customer.
    join_hint:
      table: tabContact
      'on': customer_contact_person = tabContact.name
  - name: customer_contact_display
    description: Formatted display name of the customer contact combining multiple
      name fields, used when users want the full presentable contact name.
  - name: customer_contact_mobile
    description: Mobile phone number of the customer's contact person, used when searching
      for orders by contact phone or needing to reach the customer contact.
  - name: customer_contact_email
    description: Email address of the customer contact person for this purchase order,
      used when searching for orders by customer communication details.
  - name: payment_terms_template
    description: Named template defining standard payment conditions (e.g., Net 30,
      2/10 Net 30), used when filtering orders by payment term type rather than specific
      schedules.
    join_hint:
      table: tabPayment Terms Template
      'on': payment_terms_template = tabPayment Terms Template.name
  - name: payment_schedule
    description: Detailed breakdown of payment due dates and amounts for this purchase
      order, used when querying specific installment timing or milestone-based payments.
  - name: tc_name
    description: Terms and conditions template name applied to the purchase order
      for legal and contractual requirements.
    join_hint:
      table: tabTerms and Conditions
      'on': tc_name = tabTerms and Conditions.name
  - name: terms
    description: Specific payment terms negotiated with the supplier such as net 30,
      net 60, or early payment discounts.
  - name: status
    description: Current state of the purchase order in the procurement workflow such
      as draft, submitted, approved, or closed.
    options:
    - Draft
    - On Hold
    - To Receive and Bill
    - To Bill
    - To Receive
    - Completed
    - Cancelled
    - Closed
    - Delivered
  - name: per_billed
    description: Percentage of the purchase order that has been invoiced by the supplier,
      used to track billing completion status.
  - name: per_received
    description: Percentage of the purchase order that has been physically received
      into inventory, used to track delivery completion status.
  - name: letter_head
    description: Company letterhead template applied to the printed purchase order
      document.
    join_hint:
      table: tabLetter Head
      'on': letter_head = tabLetter Head.name
  - name: group_same_items
    description: Whether identical line items are consolidated together on the purchase
      order display or print output.
  - name: select_print_heading
    description: Custom heading or title that appears when printing this purchase
      order document.
    join_hint:
      table: tabPrint Heading
      'on': select_print_heading = tabPrint Heading.name
  - name: language
    description: Language in which the purchase order document is generated or displayed
      for the supplier.
  - name: from_date
    description: Start date of the purchase order validity period or delivery schedule
      timeframe.
  - name: to_date
    description: End date of the purchase order validity period or delivery schedule
      timeframe.
  - name: auto_repeat
    description: Indicates whether this purchase order automatically recurs on a scheduled
      basis.
    join_hint:
      table: tabAuto Repeat
      'on': auto_repeat = tabAuto Repeat.name
  - name: is_internal_supplier
    description: Indicates whether the purchase order is placed with an internal supplier
      or external vendor.
  - name: represents_company
    description: The company entity that this purchase order represents or is issued
      on behalf of in multi-company scenarios.
    join_hint:
      table: tabCompany
      'on': represents_company = tabCompany.name
  - name: ref_sq
    description: Reference to the supplier quotation document that this purchase order
      was created from or is linked to.
    join_hint:
      table: tabSupplier Quotation
      'on': ref_sq = tabSupplier Quotation.name
  - name: party_account_currency
    description: Currency used for the supplier's accounting transactions and balances
      in this purchase order.
    join_hint:
      table: tabCurrency
      'on': party_account_currency = tabCurrency.name
  - name: inter_company_order_reference
    description: Reference to the linked sales order when this purchase order is part
      of an inter-company transaction between related entities.
    join_hint:
      table: tabSales Order
      'on': inter_company_order_reference = tabSales Order.name
  - name: is_old_subcontracting_flow
    description: Indicates whether this purchase order follows the legacy subcontracting
      process rather than the current subcontracting workflow.
  desc_done: true
- table: tabPurchase Order Item
  description: ''
  fields:
  - name: name
    description: Purchase order line item identifier or description of the specific
      product or material being ordered
  - name: fg_item
    description: Finished goods item code linked to this purchase order line when
      the purchased material is intended for a specific finished product
    join_hint:
      table: tabItem
      'on': fg_item = tabItem.name
  - name: fg_item_qty
    description: Quantity of the finished goods item that will be produced using the
      materials from this purchase order line
  - name: item_code
    description: Internal SKU or product identifier used when searching for what specific
      item was ordered from a supplier.
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: supplier_part_no
    description: Vendor's own part number or catalog code used when matching supplier
      documentation or invoices to purchase orders.
  - name: item_name
    description: Human-readable product description used when searching by item type
      or category rather than codes.
  - name: brand
    description: Brand name or manufacturer of the purchased item, used when filtering
      or analyzing purchases by specific brands.
    join_hint:
      table: tabBrand
      'on': brand = tabBrand.name
  - name: product_bundle
    description: Indicates if the item is part of a bundled product package, used
      when identifying grouped or kit-based purchases.
    join_hint:
      table: tabProduct Bundle
      'on': product_bundle = tabProduct Bundle.name
  - name: schedule_date
    description: Expected delivery or fulfillment date for the purchase order item,
      used when tracking when items should arrive or be received.
  - name: expected_delivery_date
    description: Date when the purchased item is expected to arrive, used when users
      ask about delivery timing or when materials will be available.
  - name: item_group
    description: Category or classification of the purchased item, used when users
      filter or analyze purchases by product type or grouping.
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: description
    description: Detailed text describing the specific purchased item, used when users
      search for items by characteristics or need to identify what was ordered.
  - name: image_view
    description: Visual representation of the purchased item for verification and
      identification purposes in purchase orders.
  - name: qty
    description: Quantity of items ordered in this purchase order line, used when
      asking about order volumes or amounts.
  - name: stock_uom
    description: Unit of measurement for the ordered quantity such as pieces, kilograms,
      or boxes, used to specify how items are counted or measured.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: subcontracted_quantity
    description: Quantity of items sent to a subcontractor for processing or manufacturing
      as part of this purchase order line.
  - name: uom
    description: Unit of measurement for the item quantity on this purchase order
      line, such as pieces, kilograms, or liters.
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: conversion_factor
    description: Multiplier to convert between the purchase order unit of measurement
      and the item's base or stock unit of measurement.
  - name: stock_qty
    description: Current available stock quantity of the item at time of purchase
      order creation, used when checking inventory levels before ordering.
  - name: price_list_rate
    description: Standard catalog price for the item from the supplier's price list,
      used when comparing quoted prices to list prices.
  - name: last_purchase_rate
    description: Actual price paid in the most recent previous purchase of this item,
      used when comparing current order pricing to historical costs.
  - name: base_price_list_rate
    description: Original list price per unit from the price list before any discounts,
      margins, or pricing rules are applied to the purchase order item.
  - name: margin_type
    description: Indicates whether the margin is calculated as a percentage or a fixed
      amount when determining the final rate from the base price.
    options:
    - Percentage
    - Amount
  - name: margin_rate_or_amount
    description: The specific margin value applied to the base price, interpreted
      as either a percentage or absolute amount based on the margin_type.
  - name: rate_with_margin
    description: Unit price including margin markup applied to the base cost, used
      when users ask about marked-up pricing or selling rates on purchase orders.
  - name: discount_percentage
    description: Percentage discount applied to the item, used when users ask about
      discount rates or percentage-based price reductions.
  - name: discount_amount
    description: Absolute monetary value of the discount applied to the item, used
      when users ask about the actual dollar amount saved or deducted.
  - name: distributed_discount_amount
    description: Discount amount allocated to this purchase order line item after
      distributing header-level or bulk discounts across items.
  - name: base_rate_with_margin
    description: Unit price including the supplier's margin or markup before applying
      discounts or taxes.
  - name: rate
    description: Final unit price for the purchase order item used to calculate the
      line total.
  - name: amount
    description: Total line amount for the purchase order item after applying quantity,
      rate, and discounts but before taxes.
  - name: item_tax_template
    description: Tax configuration template applied to this purchase order item to
      determine applicable tax rates and rules.
    join_hint:
      table: tabItem Tax Template
      'on': item_tax_template = tabItem Tax Template.name
  - name: base_rate
    description: Unit price of the item in the company's base currency before any
      currency conversion.
  - name: base_amount
    description: Total line item value in company's base currency before taxes, used
      when analyzing purchase costs in standardized currency.
  - name: pricing_rules
    description: Applied promotional or contractual pricing rules that modified the
      item's standard price, used when investigating discounts or special pricing.
  - name: stock_uom_rate
    description: Price per stock unit of measure, used when the purchase unit differs
      from inventory unit and per-stock-unit cost analysis is needed.
  - name: is_free_item
    description: Indicates whether this purchase order line item is a promotional
      or bonus item with no charge.
  - name: apply_tds
    description: Indicates whether tax deducted at source should be calculated and
      withheld on this purchase order item.
  - name: net_rate
    description: Final unit price after applying all discounts, taxes, and adjustments
      for this purchase order item.
  - name: net_amount
    description: Line item total after discounts but before taxes in transaction currency,
      used when asking about item-level purchase amounts or order line totals.
  - name: base_net_rate
    description: Unit price after discounts in company base currency, used when asking
      about standardized per-unit costs across different currency transactions.
  - name: base_net_amount
    description: Line item total after discounts but before taxes in company base
      currency, used when asking about purchase amounts in home currency for consolidated
      reporting.
  - name: from_warehouse
    description: Source warehouse when transferring stock between warehouses as part
      of the purchase order fulfillment.
    join_hint:
      table: tabWarehouse
      'on': from_warehouse = tabWarehouse.name
  - name: warehouse
    description: Target warehouse where purchased items will be received and stored.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: actual_qty
    description: Current available quantity of the item in stock at the time of purchase
      order creation.
  - name: company_total_stock
    description: Total stock quantity available across the company for the item being
      purchased, relevant when checking inventory levels before ordering.
  - name: material_request
    description: Reference to the material request document that triggered this purchase
      order item, used to trace procurement back to the original requisition.
    join_hint:
      table: tabMaterial Request
      'on': material_request = tabMaterial Request.name
  - name: material_request_item
    description: Specific line item from the material request that this purchase order
      item fulfills, used to link individual requested items to their procurement.
  - name: sales_order
    description: Links this purchase order item to the originating sales order when
      purchasing to fulfill a specific customer order.
    join_hint:
      table: tabSales Order
      'on': sales_order = tabSales Order.name
  - name: sales_order_item
    description: Links this purchase order item to the specific line item on the sales
      order being fulfilled.
  - name: sales_order_packed_item
    description: Links this purchase order item to a packed sales order item when
      purchasing materials for already packed customer orders.
  - name: supplier_quotation
    description: Links to the supplier's quote document that this purchase order item
      was created from or references.
    join_hint:
      table: tabSupplier Quotation
      'on': supplier_quotation = tabSupplier Quotation.name
  - name: supplier_quotation_item
    description: Links to the specific line item in the supplier's quotation that
      corresponds to this purchase order item.
    join_hint:
      table: tabSupplier Quotation Item
      'on': supplier_quotation_item = tabSupplier Quotation Item.name
  - name: delivered_by_supplier
    description: Identifies which supplier actually delivered this item, relevant
      when the delivering supplier differs from the ordering supplier or for tracking
      delivery responsibility.
  - name: against_blanket_order
    description: Indicates whether this purchase order item is created from a blanket
      purchase order agreement.
  - name: blanket_order
    description: References the specific blanket purchase order agreement from which
      this item was created.
    join_hint:
      table: tabBlanket Order
      'on': blanket_order = tabBlanket Order.name
  - name: blanket_order_rate
    description: The negotiated price per unit from the blanket purchase order agreement
      applied to this item.
  - name: received_qty
    description: Quantity of items physically received from the supplier for this
      purchase order line.
  - name: returned_qty
    description: Quantity of items sent back to the supplier after receipt due to
      defects, overages, or other issues.
  - name: billed_amt
    description: Total invoiced amount from the supplier for this purchase order line
      item.
  - name: expense_account
    description: General ledger account charged when the purchased item is expensed
      rather than capitalized or inventoried.
    join_hint:
      table: tabAccount
      'on': expense_account = tabAccount.name
  - name: wip_composite_asset
    description: Links the purchase order item to a work-in-progress composite asset
      being assembled or constructed.
    join_hint:
      table: tabAsset
      'on': wip_composite_asset = tabAsset.name
  - name: manufacturer
    description: Original manufacturer or brand of the item being purchased, which
      may differ from the supplier or vendor.
    join_hint:
      table: tabManufacturer
      'on': manufacturer = tabManufacturer.name
  - name: manufacturer_part_no
    description: Manufacturer's part number for the purchased item, used when searching
      by vendor-specific part identifiers rather than internal item codes.
  - name: bom
    description: Bill of materials linked to this purchase order item, relevant when
      purchasing items that have component breakdowns or subassemblies.
    join_hint:
      table: tabBOM
      'on': bom = tabBOM.name
  - name: include_exploded_items
    description: Indicates whether to show individual BOM components as separate line
      items instead of the parent item, used when analyzing detailed component-level
      purchases.
  - name: weight_per_unit
    description: Weight of a single unit of the purchased item, used when calculating
      shipping costs or comparing item specifications per unit.
  - name: total_weight
    description: Combined weight of all units in this purchase order line, used for
      freight planning and total shipment weight calculations.
  - name: weight_uom
    description: Unit of measurement for weight fields (e.g., kg, lbs, tons), used
      to interpret weight_per_unit and total_weight values.
    join_hint:
      table: tabUOM
      'on': weight_uom = tabUOM.name
  - name: project
    description: Project code or identifier to which the purchased item will be charged
      or allocated for tracking project-specific procurement costs.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: cost_center
    description: Cost center code to which the purchased item expense will be allocated
      for departmental or organizational budget tracking.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: is_fixed_asset
    description: Indicates whether the purchased item is a fixed asset that will be
      capitalized rather than expensed immediately.
  - name: item_tax_rate
    description: Tax percentage applied to this purchase order line item for calculating
      tax amounts.
  - name: production_plan
    description: Links this purchase order item to a specific production plan when
      materials are procured for manufacturing.
    join_hint:
      table: tabProduction Plan
      'on': production_plan = tabProduction Plan.name
  - name: production_plan_item
    description: Links to the specific line item within a production plan that triggered
      this purchase requirement.
  - name: production_plan_sub_assembly_item
    description: Links this purchase order item to a specific sub-assembly component
      in a production plan when procuring materials for manufacturing.
  - name: page_break
    description: Controls whether a page break appears before this line item when
      printing or generating PDF versions of the purchase order.
  desc_done: true
- table: tabPurchase Order Item Supplied
  description: ''
  fields:
  - name: name
    description: Unique identifier or reference name for the specific supplied item
      record in the purchase order
  - name: main_item_code
    description: Code of the finished or main product item that was ordered in the
      purchase order
    join_hint:
      table: tabItem
      'on': main_item_code = tabItem.name
  - name: rm_item_code
    description: Code of the raw material or component item that was actually supplied
      to fulfill the main item
    join_hint:
      table: tabItem
      'on': rm_item_code = tabItem.name
  - name: stock_uom
    description: Unit of measurement for inventory tracking when users ask about stock
      quantities or warehouse units for supplied items
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: reserve_warehouse
    description: Specific warehouse location where inventory is reserved when users
      ask where supplied materials are allocated or held
    join_hint:
      table: tabWarehouse
      'on': reserve_warehouse = tabWarehouse.name
  - name: conversion_factor
    description: Multiplier to convert between purchase unit and stock unit when users
      ask about unit conversions or quantity reconciliation
  - name: bom_detail_no
    description: Bill of materials detail number linking the supplied item to a specific
      BOM component or subassembly line.
  - name: reference_name
    description: Name or identifier of the supplier, vendor, or source providing this
      purchase order item.
  - name: rate
    description: Unit price or cost per item for this supplied purchase order line.
  - name: amount
    description: Total monetary value of the supplied items for this purchase order
      line.
  - name: required_qty
    description: Quantity of items originally ordered or still needed to fulfill the
      purchase order.
  - name: supplied_qty
    description: Quantity of items actually received or delivered against the purchase
      order.
  - name: consumed_qty
    description: Quantity of supplied items that have been consumed or used in production
      or operations.
  - name: returned_qty
    description: Quantity of supplied items that were returned to the supplier after
      delivery.
  - name: total_supplied_qty
    description: Total quantity of items delivered by the supplier for this purchase
      order line, including both consumed and returned amounts.
  desc_done: true
- table: tabPurchase Receipt
  description: ''
  fields:
  - name: name
    description: Unique identifier for the purchase receipt document, typically auto-generated
      following a naming pattern
  - name: title
    description: Custom display name or label for the purchase receipt that provides
      human-readable context beyond the system identifier
  - name: naming_series
    description: Prefix pattern that determines how purchase receipt identifiers are
      automatically generated and sequenced
    options:
    - MAT-PRE-.YYYY.-
    - MAT-PR-RET-.YYYY.-
  - name: supplier
    description: Vendor ID or code for the supplier providing the purchased goods
      in this receipt.
    join_hint:
      table: tabSupplier
      'on': supplier = tabSupplier.name
  - name: supplier_name
    description: Full business name of the vendor who delivered the goods, used when
      searching by supplier company name rather than code.
  - name: supplier_delivery_note
    description: External reference number or note from the supplier's delivery documentation
      accompanying the shipment.
  - name: subcontracting_receipt
    description: Indicates whether this purchase receipt is for materials received
      from a subcontractor who performed manufacturing or processing work.
    join_hint:
      table: tabSubcontracting Receipt
      'on': subcontracting_receipt = tabSubcontracting Receipt.name
  - name: posting_date
    description: The accounting date when the purchase receipt transaction is recorded
      in the financial ledger.
  - name: posting_time
    description: The time of day when the purchase receipt transaction was posted
      to the system.
  - name: set_posting_time
    description: Indicates whether the posting date and time were manually specified
      instead of using the current timestamp.
  - name: company
    description: The company entity that received the purchased goods or materials.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: apply_putaway_rule
    description: Indicates whether automatic warehouse putaway rules should be applied
      to determine storage locations for received items.
  - name: is_return
    description: Indicates whether this purchase receipt represents returned goods
      to the supplier rather than received goods.
  - name: return_against
    description: References the original purchase receipt document that this return
      is being made against.
    join_hint:
      table: tabPurchase Receipt
      'on': return_against = tabPurchase Receipt.name
  - name: cost_center
    description: The cost center to which the expenses or inventory from this purchase
      receipt should be allocated for accounting purposes.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: The project associated with this purchase receipt for tracking project-specific
      procurement and costs.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: currency
    description: The currency in which the purchase receipt transaction amounts are
      denominated.
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: The exchange rate used to convert the purchase receipt currency to
      the company's base currency.
  - name: buying_price_list
    description: Price list applied to this purchase receipt for determining item
      rates and currency
    join_hint:
      table: tabPrice List
      'on': buying_price_list = tabPrice List.name
  - name: price_list_currency
    description: Currency of the price list used in this purchase receipt
    join_hint:
      table: tabCurrency
      'on': price_list_currency = tabCurrency.name
  - name: plc_conversion_rate
    description: Exchange rate used to convert price list currency to company base
      currency for this purchase receipt
  - name: ignore_pricing_rule
    description: Whether pricing rules were bypassed when processing this purchase
      receipt.
  - name: scan_barcode
    description: Barcode value scanned during receipt entry for item identification.
  - name: last_scanned_warehouse
    description: Most recent warehouse location captured during barcode scanning operations
      for this receipt.
  - name: set_warehouse
    description: Target warehouse where accepted purchased items are received and
      stored upon delivery
    join_hint:
      table: tabWarehouse
      'on': set_warehouse = tabWarehouse.name
  - name: set_from_warehouse
    description: Source warehouse from which items are being transferred in an inter-warehouse
      purchase receipt scenario
    join_hint:
      table: tabWarehouse
      'on': set_from_warehouse = tabWarehouse.name
  - name: rejected_warehouse
    description: Warehouse designated for storing items that failed quality inspection
      or were rejected during receipt
    join_hint:
      table: tabWarehouse
      'on': rejected_warehouse = tabWarehouse.name
  - name: is_subcontracted
    description: Indicates whether this purchase receipt involves subcontracted manufacturing
      where materials are sent to a supplier for processing.
  - name: supplier_warehouse
    description: The warehouse location at the supplier's facility where goods are
      stored or staged before delivery.
    join_hint:
      table: tabWarehouse
      'on': supplier_warehouse = tabWarehouse.name
  - name: items
    description: Line items detailing the individual products, materials, or goods
      received in this purchase receipt including quantities and specifications.
  - name: total_qty
    description: Total quantity of all items received in this purchase receipt across
      all line items.
  - name: total_net_weight
    description: Combined net weight of all items received in this purchase receipt.
  - name: base_total
    description: Total value of received items in base currency before taxes and charges.
  - name: base_net_total
    description: Net total of all items in base currency before taxes and charges,
      used when querying receipt values in company's default currency.
  - name: total
    description: Grand total of the purchase receipt including all taxes, charges,
      and discounts in transaction currency.
  - name: net_total
    description: Net total of all items in transaction currency before applying taxes
      and additional charges.
  - name: tax_withholding_net_total
    description: Net total amount after applying tax withholding deductions on the
      purchase receipt in transaction currency.
  - name: base_tax_withholding_net_total
    description: Net total amount after applying tax withholding deductions on the
      purchase receipt in base company currency.
  - name: tax_category
    description: Tax classification applied to the purchase receipt determining which
      tax rules and rates apply to the transaction.
    join_hint:
      table: tabTax Category
      'on': tax_category = tabTax Category.name
  - name: taxes_and_charges
    description: Tax template applied to calculate taxes on this purchase receipt
    join_hint:
      table: tabPurchase Taxes and Charges Template
      'on': taxes_and_charges = tabPurchase Taxes and Charges Template.name
  - name: shipping_rule
    description: Shipping cost calculation rule applied to determine freight charges
      for this receipt
    join_hint:
      table: tabShipping Rule
      'on': shipping_rule = tabShipping Rule.name
  - name: incoterm
    description: International commercial terms defining delivery responsibilities
      and risk transfer between buyer and supplier
    join_hint:
      table: tabIncoterm
      'on': incoterm = tabIncoterm.name
  - name: named_place
    description: Delivery location or place name where purchased goods are received
      or shipped to.
  - name: taxes
    description: Tax template or tax configuration applied to calculate taxes on the
      purchase receipt.
  - name: base_taxes_and_charges_added
    description: Total tax amount added to the purchase receipt in base currency before
      any currency conversion.
  - name: base_taxes_and_charges_deducted
    description: Total amount of taxes and charges deducted from the purchase receipt
      value in base currency.
  - name: base_total_taxes_and_charges
    description: Total sum of all taxes and charges applied to the purchase receipt
      in base currency.
  - name: taxes_and_charges_added
    description: Total amount of taxes and charges added to the purchase receipt value
      in transaction currency.
  - name: taxes_and_charges_deducted
    description: Tax amount deducted at source (TDS/TCS) from the purchase receipt
      total, used when calculating net payable amount to supplier.
  - name: total_taxes_and_charges
    description: Total sum of all taxes and charges added to the purchase receipt
      before any deductions, used when analyzing tax burden or comparing gross vs
      net amounts.
  - name: base_grand_total
    description: Final total amount of the purchase receipt in company's base currency
      including items, taxes, and charges, used for financial reporting and cross-currency
      purchase comparisons.
  - name: base_rounding_adjustment
    description: Amount added or subtracted to round the total to a convenient value
      in base currency.
  - name: base_rounded_total
    description: Final total amount after applying rounding adjustment in base currency.
  - name: base_in_words
    description: Text representation of the base currency total amount spelled out
      in words for formal documentation.
  - name: grand_total
    description: Total amount of the purchase receipt including all items, taxes,
      and charges before any rounding adjustments.
  - name: rounding_adjustment
    description: Amount added or subtracted to round the grand total to a convenient
      figure.
  - name: rounded_total
    description: Final total amount after applying rounding adjustment to the grand
      total, typically used for actual payment.
  - name: in_words
    description: Total amount of the purchase receipt expressed as text words for
      check writing or formal documentation
  - name: disable_rounded_total
    description: Whether to prevent automatic rounding of the total amount to the
      nearest whole number
  - name: apply_discount_on
    description: Whether discounts are calculated on the grand total or on individual
      line item net amounts
    options:
    - Grand Total
    - Net Total
  - name: base_discount_amount
    description: Discount amount calculated from line items before applying any additional
      document-level discounts.
  - name: additional_discount_percentage
    description: Extra discount percentage applied at the document level after line
      item discounts.
  - name: discount_amount
    description: Total final discount amount including both line item and additional
      document-level discounts.
  - name: other_charges_calculation
    description: Formula or method used to calculate additional charges beyond item
      costs on the purchase receipt.
  - name: pricing_rules
    description: Applied pricing rules that determined discounts, promotions, or special
      pricing for items on this purchase receipt.
  - name: supplied_items
    description: Materials or components provided by the buyer to the supplier for
      manufacturing or processing, tracked separately from purchased items.
  - name: supplier_address
    description: Link to the specific supplier address record used for this purchase
      receipt delivery or billing location.
    join_hint:
      table: tabAddress
      'on': supplier_address = tabAddress.name
  - name: address_display
    description: Formatted full address text showing where goods were received or
      supplier location for display purposes.
  - name: contact_person
    description: Person at the supplier organization who is the point of contact for
      this purchase receipt transaction.
    join_hint:
      table: tabContact
      'on': contact_person = tabContact.name
  - name: contact_display
    description: Name of the contact person at the supplier who handled or coordinated
      the purchase receipt delivery.
  - name: contact_mobile
    description: Mobile phone number of the supplier contact person associated with
      the purchase receipt.
  - name: contact_email
    description: Email address of the supplier contact person associated with the
      purchase receipt.
  - name: dispatch_address
    description: Address from which the supplier dispatched or shipped the goods to
      the buyer.
    join_hint:
      table: tabAddress
      'on': dispatch_address = tabAddress.name
  - name: dispatch_address_display
    description: Formatted display version of the supplier's dispatch address for
      presentation purposes.
  - name: shipping_address
    description: Destination address where the purchased goods are being delivered
      or received by the buyer.
    join_hint:
      table: tabAddress
      'on': shipping_address = tabAddress.name
  - name: shipping_address_display
    description: Formatted shipping address where purchased goods are delivered, used
      when users ask where items were or will be received.
  - name: billing_address
    description: Address associated with the supplier's billing or invoice for the
      purchase receipt.
    join_hint:
      table: tabAddress
      'on': billing_address = tabAddress.name
  - name: billing_address_display
    description: Formatted billing address for the supplier, used when users need
      the invoice or payment address for a purchase receipt.
  - name: tc_name
    description: Tax category applied to the purchase receipt for tax calculation
      and compliance purposes.
    join_hint:
      table: tabTerms and Conditions
      'on': tc_name = tabTerms and Conditions.name
  - name: terms
    description: Payment terms agreed with the supplier specifying when payment is
      due for the received goods.
  - name: status
    description: Current state of the purchase receipt such as draft, submitted, completed,
      or cancelled.
    options:
    - Draft
    - Partly Billed
    - To Bill
    - Completed
    - Return Issued
    - Cancelled
    - Closed
  - name: per_billed
    description: Percentage of the purchase receipt quantity that has been converted
      into purchase invoices.
  - name: per_returned
    description: Percentage of the purchase receipt quantity that has been returned
      to the supplier.
  - name: auto_repeat
    description: Reference to a recurring schedule if this purchase receipt is part
      of an automated repeat pattern.
    join_hint:
      table: tabAuto Repeat
      'on': auto_repeat = tabAuto Repeat.name
  - name: letter_head
    description: Letterhead template used when printing or emailing this purchase
      receipt document.
    join_hint:
      table: tabLetter Head
      'on': letter_head = tabLetter Head.name
  - name: group_same_items
    description: Whether identical items are consolidated into single lines when printing
      this purchase receipt.
  - name: select_print_heading
    description: Custom heading text that appears at the top of the printed purchase
      receipt instead of the default title.
    join_hint:
      table: tabPrint Heading
      'on': select_print_heading = tabPrint Heading.name
  - name: language
    description: Language used for printing or displaying the purchase receipt document.
  - name: transporter_name
    description: Name of the shipping or logistics company that delivered the purchased
      goods.
  - name: lr_no
    description: Lorry receipt number or transport document reference number for tracking
      the shipment.
  - name: lr_date
    description: Date on the lorry receipt or transport document accompanying the
      goods delivery
  - name: instructions
    description: Special handling or processing instructions provided for receiving
      the purchased goods
  - name: is_internal_supplier
    description: Indicates whether the supplier is an internal company entity or branch
      rather than an external vendor
  - name: represents_company
    description: The company entity that this purchase receipt is recorded for in
      multi-company scenarios.
    join_hint:
      table: tabCompany
      'on': represents_company = tabCompany.name
  - name: inter_company_reference
    description: Links to a related inter-company transaction when goods are received
      from another company within the same corporate group.
    join_hint:
      table: tabDelivery Note
      'on': inter_company_reference = tabDelivery Note.name
  - name: remarks
    description: Additional notes or comments about the purchase receipt transaction.
  - name: range
    description: Specifies the number range or series prefix used for generating purchase
      receipt document numbers.
  - name: amended_from
    description: References the original purchase receipt document that this record
      amends or corrects.
    join_hint:
      table: tabPurchase Receipt
      'on': amended_from = tabPurchase Receipt.name
  - name: is_old_subcontracting_flow
    description: Indicates whether this purchase receipt follows the legacy subcontracting
      process instead of the current workflow.
  desc_done: true
- table: tabPurchase Receipt Item
  description: ''
  fields:
  - name: name
    description: Unique identifier or code for the purchase receipt item line entry
  - name: barcode
    description: Barcode scanned or entered for the received item to verify product
      identity during goods receipt
  - name: has_item_scanned
    description: Indicates whether the item was physically scanned with a barcode
      scanner during the receipt process
  - name: item_code
    description: Identifies the specific product or material received in the purchase
      receipt.
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: product_bundle
    description: Indicates if the received item is a bundled package of multiple products
      sold together as one unit.
    join_hint:
      table: tabProduct Bundle
      'on': product_bundle = tabProduct Bundle.name
  - name: supplier_part_no
    description: The vendor's unique part number or SKU for the received item, used
      when referencing supplier catalogs or cross-referencing vendor documentation.
  - name: item_name
    description: The specific product or material code received from the supplier,
      used when querying what items were purchased.
  - name: description
    description: Detailed text explaining the item's specifications or characteristics,
      used when searching by product features or attributes rather than item code.
  - name: brand
    description: The manufacturer or brand name of the received item, used when filtering
      purchases by specific brands or comparing brand-level procurement.
    join_hint:
      table: tabBrand
      'on': brand = tabBrand.name
  - name: item_group
    description: Category or classification of the purchased item for grouping similar
      products together
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: image_view
    description: Visual representation or photo of the received item for verification
      and identification purposes
  - name: received_qty
    description: Actual quantity of items physically received from the supplier in
      this receipt transaction
  - name: qty
    description: Quantity of items received and accepted in this purchase receipt
      line.
  - name: rejected_qty
    description: Quantity of items rejected or not accepted during receipt inspection.
  - name: uom
    description: Unit of measurement for the received quantity (e.g., pieces, kg,
      boxes).
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: stock_uom
    description: Unit of measurement for inventory tracking of the received item.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: conversion_factor
    description: Multiplier to convert between the purchase unit and stock unit for
      the received item.
  - name: retain_sample
    description: Indicates whether a sample of the received item should be kept for
      quality testing or reference.
  - name: sample_quantity
    description: Quantity of items received as free samples or for testing purposes,
      not added to regular inventory.
  - name: received_stock_qty
    description: Actual quantity of items physically received in the warehouse or
      storage location in stock UOM.
  - name: stock_qty
    description: Total quantity added to inventory after accounting for UOM conversion,
      rejections, and samples.
  - name: returned_qty
    description: Quantity of this item that has been returned to the supplier after
      receipt.
  - name: price_list_rate
    description: Standard catalog price per unit in transaction currency before discounts
      or negotiations.
  - name: base_price_list_rate
    description: Standard catalog price per unit converted to company base currency.
  - name: margin_type
    description: Whether the margin on the purchase receipt item is calculated as
      a percentage or fixed amount.
    options:
    - Percentage
    - Amount
  - name: margin_rate_or_amount
    description: The numeric value of the margin, interpreted as either a percentage
      rate or absolute amount depending on margin_type.
  - name: rate_with_margin
    description: The final unit rate of the item after applying the margin to the
      base purchase rate.
  - name: discount_percentage
    description: Percentage discount applied directly to this purchase receipt item
      line.
  - name: discount_amount
    description: Absolute monetary discount applied directly to this purchase receipt
      item line before distribution.
  - name: distributed_discount_amount
    description: Portion of invoice-level or header-level discount allocated to this
      specific item line.
  - name: base_rate_with_margin
    description: Unit price in company base currency after applying margin percentage
      but before taxes, used when analyzing purchase costs with margin adjustments
      across different currencies.
  - name: rate
    description: Actual unit price per item in transaction currency as agreed with
      supplier, used when querying what was paid per unit for received items.
  - name: amount
    description: Total line value for the received quantity before taxes (rate × quantity),
      used when asking about total cost or value of specific items received.
  - name: base_rate
    description: Unit price of the purchased item in company's base currency before
      any currency conversion.
  - name: base_amount
    description: Total line amount for the purchased item in company's base currency
      before any currency conversion.
  - name: pricing_rules
    description: Specific pricing rule or discount scheme applied to this purchase
      receipt line item.
  - name: stock_uom_rate
    description: Rate per unit in the stock unit of measurement, used when querying
      item costs in base inventory units rather than purchase units.
  - name: is_free_item
    description: Indicates whether this item was received as a free or promotional
      item without charge.
  - name: apply_tds
    description: Indicates whether tax deducted at source should be applied to this
      purchase receipt item.
  - name: net_rate
    description: Rate per unit of the item after applying discounts but before taxes,
      used when analyzing pre-tax unit pricing on purchase receipts.
  - name: net_amount
    description: Total amount for the line item after discounts but before taxes,
      used when calculating pre-tax purchase values.
  - name: item_tax_template
    description: Tax template applied to this specific item, used when identifying
      which tax rules or rates govern this purchased item.
    join_hint:
      table: tabItem Tax Template
      'on': item_tax_template = tabItem Tax Template.name
  - name: base_net_rate
    description: Price per unit in company base currency after discounts and before
      taxes, used for financial reporting and margin analysis.
  - name: base_net_amount
    description: Total line amount in company base currency after discounts and before
      taxes, used for financial totals and accounting entries.
  - name: valuation_rate
    description: Cost per unit used for inventory valuation and stock ledger entries,
      may differ from purchase price when including landed costs.
  - name: sales_incoming_rate
    description: Exchange rate used to convert purchase receipt amounts to sales or
      reporting currency for items received from suppliers.
  - name: item_tax_amount
    description: Total tax amount calculated for this specific item line in the purchase
      receipt.
  - name: rm_supp_cost
    description: Raw material cost charged by the supplier for this item, excluding
      taxes and additional charges.
  - name: landed_cost_voucher_amount
    description: Additional costs allocated to this receipt item from landed cost
      vouchers such as freight, customs, or insurance charges.
  - name: amount_difference_with_purchase_invoice
    description: Variance between the purchase receipt item amount and the corresponding
      purchase invoice amount, used to identify billing discrepancies.
  - name: billed_amt
    description: Total amount that has been invoiced for this receipt item, used to
      track how much of the received goods have been billed.
  - name: warehouse
    description: The warehouse where purchased items are received and stored after
      acceptance.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: rejected_warehouse
    description: The warehouse where rejected or non-conforming purchased items are
      stored separately.
    join_hint:
      table: tabWarehouse
      'on': rejected_warehouse = tabWarehouse.name
  - name: from_warehouse
    description: The source warehouse when transferring items between warehouses during
      purchase receipt processing.
    join_hint:
      table: tabWarehouse
      'on': from_warehouse = tabWarehouse.name
  - name: material_request
    description: Links to the original material request document that initiated the
      procurement process for this received item.
    join_hint:
      table: tabMaterial Request
      'on': material_request = tabMaterial Request.name
  - name: purchase_order
    description: Links to the purchase order document that authorized the purchase
      of this received item.
    join_hint:
      table: tabPurchase Order
      'on': purchase_order = tabPurchase Order.name
  - name: purchase_invoice
    description: Links to the supplier invoice document associated with this received
      item for payment processing.
    join_hint:
      table: tabPurchase Invoice
      'on': purchase_invoice = tabPurchase Invoice.name
  - name: allow_zero_valuation_rate
    description: Indicates whether this receipt item can have zero cost or valuation,
      relevant when querying items received without assigned value.
  - name: return_qty_from_rejected_warehouse
    description: Quantity being returned specifically from the rejected warehouse
      location, used when tracking returns of previously rejected goods.
  - name: is_fixed_asset
    description: Identifies whether the received item is a fixed asset rather than
      regular inventory, relevant for asset procurement and capitalization queries.
  - name: asset_location
    description: Physical location where the received asset will be placed or stored
      after receipt
    join_hint:
      table: tabLocation
      'on': asset_location = tabLocation.name
  - name: asset_category
    description: Classification of the received item as a fixed asset type for accounting
      and depreciation purposes
    join_hint:
      table: tabAsset Category
      'on': asset_category = tabAsset Category.name
  - name: schedule_date
    description: Planned or expected date for the purchase receipt delivery or processing
  - name: quality_inspection
    description: References the quality inspection record performed on this received
      item to verify it meets acceptance criteria.
    join_hint:
      table: tabQuality Inspection
      'on': quality_inspection = tabQuality Inspection.name
  - name: material_request_item
    description: Links to the original material request line that triggered this purchase
      receipt item.
  - name: purchase_order_item
    description: Links to the specific purchase order line item that this receipt
      fulfills or partially fulfills.
  - name: purchase_invoice_item
    description: Links to the corresponding purchase invoice line item when the received
      goods have been invoiced by the supplier.
  - name: purchase_receipt_item
    description: Self-reference to this purchase receipt line item, used for tracking
      item-level receipt details like quantity received, rate, and item code.
  - name: delivery_note_item
    description: Links to the customer delivery note line item when this purchase
      receipt is for a drop-ship or inter-warehouse transfer scenario.
  - name: putaway_rule
    description: Rule determining warehouse location assignment for received items
      during putaway operations.
    join_hint:
      table: tabPutaway Rule
      'on': putaway_rule = tabPutaway Rule.name
  - name: serial_and_batch_bundle
    description: Bundled collection linking this receipt item to its serial numbers
      and batch numbers for inventory tracking.
    join_hint:
      table: tabSerial and Batch Bundle
      'on': serial_and_batch_bundle = tabSerial and Batch Bundle.name
  - name: use_serial_batch_fields
    description: Indicates whether serial and batch numbers are managed through individual
      fields rather than bundles for this receipt item.
  - name: rejected_serial_and_batch_bundle
    description: References the bundle containing serial numbers and batch numbers
      for items rejected during receipt inspection or quality control.
    join_hint:
      table: tabSerial and Batch Bundle
      'on': rejected_serial_and_batch_bundle = tabSerial and Batch Bundle.name
  - name: serial_no
    description: The serial number assigned to the accepted item received in this
      purchase receipt line.
  - name: rejected_serial_no
    description: The serial number of the item that was rejected during receipt inspection,
      separate from accepted items.
  - name: batch_no
    description: Batch number assigned to the received items for inventory tracking
      and traceability purposes.
    join_hint:
      table: tabBatch
      'on': batch_no = tabBatch.name
  - name: include_exploded_items
    description: Indicates whether sub-assembly or component items from a bill of
      materials are expanded and shown as separate line items in the receipt.
  - name: bom
    description: Bill of materials reference used when receiving manufactured or assembled
      items that need component tracking.
    join_hint:
      table: tabBOM
      'on': bom = tabBOM.name
  - name: weight_per_unit
    description: Weight of a single unit of the received item, used when calculating
      total shipment weight or analyzing per-unit logistics costs.
  - name: total_weight
    description: Total combined weight of all units received in this line item, used
      for freight cost verification and warehouse capacity planning.
  - name: weight_uom
    description: Unit of measurement for weight values (kg, lbs, etc.), used to interpret
      weight_per_unit and total_weight in the correct measurement system.
    join_hint:
      table: tabUOM
      'on': weight_uom = tabUOM.name
  - name: manufacturer
    description: The company that manufactured the received item, relevant when users
      need to filter or report purchases by manufacturer brand or source.
    join_hint:
      table: tabManufacturer
      'on': manufacturer = tabManufacturer.name
  - name: manufacturer_part_no
    description: The manufacturer's specific part number for the received item, used
      when users need to identify items by vendor-specific SKU rather than internal
      item codes.
  - name: expense_account
    description: The general ledger expense account to which the cost of this received
      item is posted, relevant when users need to track spending by accounting category
      or cost center.
    join_hint:
      table: tabAccount
      'on': expense_account = tabAccount.name
  - name: item_tax_rate
    description: Tax rate percentage applied to this purchased item for calculating
      tax amounts on the receipt.
  - name: wip_composite_asset
    description: Asset account used when the received item is part of a work-in-progress
      composite or bundled asset.
    join_hint:
      table: tabAsset
      'on': wip_composite_asset = tabAsset.name
  - name: provisional_expense_account
    description: Temporary expense account used to record costs when the purchase
      invoice has not yet been received or matched.
    join_hint:
      table: tabAccount
      'on': provisional_expense_account = tabAccount.name
  - name: project
    description: Project associated with this purchased item for tracking project-specific
      procurement costs and materials.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: cost_center
    description: Cost center to which this purchased item's expenses are allocated
      for departmental or divisional accounting.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: page_break
    description: Indicates whether a page break should occur before this item when
      printing the purchase receipt document.
  - name: sales_order
    description: Links the purchased item to the originating sales order when the
      purchase is made to fulfill a specific customer order (drop ship or make-to-order
      scenarios).
    join_hint:
      table: tabSales Order
      'on': sales_order = tabSales Order.name
  - name: sales_order_item
    description: Links to the specific line item on the sales order that this purchase
      receipt item fulfills.
  - name: subcontracting_receipt_item
    description: References the subcontracted item being received back from the subcontractor
      after processing or manufacturing.
  desc_done: true
- table: tabPurchase Receipt Item Supplied
  description: ''
  fields:
  - name: name
    description: Unique identifier for the supplied item record in the purchase receipt
  - name: main_item_code
    description: Finished or parent product code that was manufactured or assembled
      using the supplied raw material
    join_hint:
      table: tabItem
      'on': main_item_code = tabItem.name
  - name: rm_item_code
    description: Raw material or component item code that was supplied by the vendor
      for subcontracting or manufacturing
    join_hint:
      table: tabItem
      'on': rm_item_code = tabItem.name
  - name: item_name
    description: Raw material or component item supplied to subcontractor for manufacturing
      or processing.
  - name: bom_detail_no
    description: Reference to specific bill of materials line item that defines which
      component is being supplied.
  - name: description
    description: Additional details or specifications about the supplied item beyond
      the item name.
  - name: stock_uom
    description: Unit of measurement for the supplied item in inventory stock terms.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: conversion_factor
    description: Multiplier to convert between the purchase unit and stock unit for
      the supplied item.
  - name: reference_name
    description: Identifier linking this supplied item record to its source purchase
      order or receipt item.
  - name: rate
    description: Price per unit of the supplied item received in the purchase receipt.
  - name: amount
    description: Total monetary value of the supplied item quantity received (rate
      multiplied by quantity).
  - name: required_qty
    description: Quantity of the supplied item that was needed or requested for the
      purchase receipt.
  - name: consumed_qty
    description: Quantity of raw material consumed or used during the purchase receipt
      process for subcontracting or manufacturing.
  - name: current_stock
    description: Available stock quantity of the item at the time of the purchase
      receipt transaction.
  - name: batch_no
    description: Batch or lot number identifying the specific production batch of
      the supplied raw material or component.
    join_hint:
      table: tabBatch
      'on': batch_no = tabBatch.name
  - name: serial_no
    description: Unique identifier for tracking individual serialized items supplied
      in the purchase receipt.
  - name: purchase_order
    description: Reference to the original purchase order document that authorized
      this item receipt.
    join_hint:
      table: tabPurchase Order
      'on': purchase_order = tabPurchase Order.name
  desc_done: true
- table: tabPurchase Taxes and Charges
  description: ''
  fields:
  - name: name
    description: Unique identifier for the specific tax or charge line item in a purchase
      transaction
  - name: category
    description: Classification of the charge as either a tax type or an additional
      charge type applied to the purchase
    options:
    - Valuation and Total
    - Valuation
    - Total
  - name: add_deduct_tax
    description: Whether this tax or charge increases or decreases the total purchase
      amount
    options:
    - Add
    - Deduct
  - name: charge_type
    description: Whether this tax or charge is applied on the net total, previous
      row total, or as a flat amount.
    options:
    - Actual
    - On Net Total
    - On Previous Row Amount
    - On Previous Row Total
    - On Item Quantity
  - name: row_id
    description: Reference to a specific line item in the purchase order or invoice
      to which this tax or charge applies.
  - name: included_in_print_rate
    description: Whether this tax or charge amount is already included in the item
      rate shown on printed documents.
  - name: included_in_paid_amount
    description: Whether this tax or charge was already included in the amount paid
      to the supplier rather than added separately.
  - name: account_head
    description: The general ledger account where this tax or charge amount is posted
      for accounting purposes.
    join_hint:
      table: tabAccount
      'on': account_head = tabAccount.name
  - name: description
    description: Explanatory text describing the nature or purpose of this specific
      tax or charge line item.
  - name: is_tax_withholding_account
    description: Indicates whether this tax line represents a withholding tax deducted
      from supplier payment rather than an additional tax charge.
  - name: rate
    description: The percentage or fixed amount applied to calculate this specific
      tax or charge on the purchase transaction.
  - name: cost_center
    description: The cost center to which this particular tax or charge line is allocated
      for expense tracking and budgeting purposes.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: Project associated with this purchase tax or charge line item for
      cost allocation and tracking.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: account_currency
    description: Currency of the accounting ledger where this tax or charge is recorded.
    join_hint:
      table: tabCurrency
      'on': account_currency = tabCurrency.name
  - name: tax_amount
    description: Calculated monetary value of the tax or charge applied to the purchase
      transaction.
  - name: tax_amount_after_discount_amount
    description: Tax amount calculated after applying discounts to the purchase item
      or invoice.
  - name: total
    description: Total amount including both the base charge and tax for this purchase
      tax line item.
  - name: base_tax_amount
    description: Tax amount in the company's base currency before any discounts are
      applied.
  - name: base_total
    description: Total tax amount in company base currency before any discounts are
      applied to the tax.
  - name: base_tax_amount_after_discount_amount
    description: Tax amount in company base currency after applying discount on the
      tax itself.
  - name: item_wise_tax_detail
    description: Breakdown of tax amounts calculated separately for each item in the
      purchase transaction.
  desc_done: true
- table: tabPurchase Taxes and Charges Template
  description: Standard tax template that can be applied to all Purchase Transactions.
    This template can contain a list of tax heads and also other expense heads like
    "Shipping", "Insurance", "Handling", etc.
  fields:
  - name: name
    description: Unique identifier for the purchase taxes and charges template used
      in procurement transactions.
  - name: title
    description: Display name of the purchase taxes and charges template shown to
      users when selecting tax configurations for purchases.
  - name: is_default
    description: Indicates whether this purchase tax template is automatically applied
      to new purchase transactions.
  - name: disabled
    description: Whether this purchase tax template is inactive and unavailable for
      use in transactions.
  - name: company
    description: The specific company entity this purchase tax template applies to.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: tax_category
    description: The classification of tax type this template represents, such as
      VAT, GST, or customs duty categories.
    join_hint:
      table: tabTax Category
      'on': tax_category = tabTax Category.name
  - name: taxes
    description: List of individual tax line items with rates, amounts, and accounts
      that make up this purchase tax template.
  desc_done: true
- table: tabPush Notification Settings
  description: Enabling this will register your site on a central relay server to
    send push notifications for all installed apps through Firebase Cloud Messaging.
    This server only stores user tokens and error logs, and no messages are saved.
  fields:
  - name: name
    description: Unique identifier or label for the push notification configuration
  - name: enable_push_notification_relay
    description: Controls whether push notifications are actively relayed or sent
      to recipients
  - name: api_key
    description: Authentication credential used to authorize push notification service
      requests
  - name: api_secret
    description: Secret key or token used to authenticate and authorize push notification
      API requests to external services.
  desc_done: true
- table: tabPutaway Rule
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the putaway rule used when referencing
      or searching for specific putaway configurations
  - name: disable
    description: Indicates whether the putaway rule is currently active or inactive
      for warehouse operations
  - name: item_code
    description: Specific product or material identifier that this putaway rule applies
      to when determining storage locations
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: item_name
    description: Item being assigned a putaway location rule for warehouse storage
      placement.
  - name: warehouse
    description: Warehouse facility where the putaway rule applies for incoming item
      placement.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: priority
    description: Execution order when multiple putaway rules match the same item and
      warehouse combination.
  - name: company
    description: Identifies which company or business entity the putaway rule applies
      to in multi-company environments.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: capacity
    description: Maximum quantity or volume that can be stored in the location governed
      by this putaway rule.
  - name: uom
    description: Unit of measure for the capacity value, such as pallets, cases, kilograms,
      or cubic meters.
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: conversion_factor
    description: Factor to convert between the putaway unit of measure and the stock
      unit of measure for warehouse storage calculations.
  - name: stock_uom
    description: Unit of measure used for tracking inventory quantities in the warehouse
      location.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: stock_capacity
    description: Maximum quantity of items that can be stored in the warehouse location
      based on the stock unit of measure.
  desc_done: true
- table: tabQuality Action
  description: ''
  fields:
  - name: name
    description: Name or title of the quality action taken in response to a quality
      issue or inspection finding
  - name: corrective_preventive
    description: Whether the quality action addresses an existing problem (corrective)
      or prevents future occurrences (preventive)
    options:
    - Corrective
    - Preventive
  - name: review
    description: Review notes, comments, or evaluation details documenting the assessment
      or outcome of the quality action
    join_hint:
      table: tabQuality Review
      'on': review = tabQuality Review.name
  - name: feedback
    description: Comments or notes describing the corrective or preventive action
      taken in response to a quality issue
    join_hint:
      table: tabQuality Feedback
      'on': feedback = tabQuality Feedback.name
  - name: status
    description: Current state of the quality action such as open, in progress, completed,
      or closed
    options:
    - Open
    - Completed
  - name: date
    description: When the quality action was recorded, initiated, or is due for completion
  - name: goal
    description: Target or objective that the quality action aims to achieve or address
    join_hint:
      table: tabQuality Goal
      'on': goal = tabQuality Goal.name
  - name: procedure
    description: Steps or methods to be followed when executing the quality action
    join_hint:
      table: tabQuality Procedure
      'on': procedure = tabQuality Procedure.name
  - name: resolutions
    description: Outcomes, solutions, or corrective measures resulting from the quality
      action
  desc_done: true
- table: tabQuality Action Resolution
  description: ''
  fields:
  - name: name
    description: Unique identifier or title for the quality action used when tracking
      or referencing specific quality improvement initiatives.
  - name: problem
    description: Description of the quality issue or defect identified, used when
      analyzing root causes or searching for similar past problems.
  - name: resolution
    description: Documented solution or corrective action taken, used when looking
      up how quality issues were resolved or finding resolution patterns.
  - name: status
    description: Current state of the quality action resolution such as open, in progress,
      completed, or closed.
    options:
    - Open
    - Completed
  - name: responsible
    description: Person or team assigned to resolve or complete the quality action.
    join_hint:
      table: tabUser
      'on': responsible = tabUser.name
  - name: completion_by
    description: Target deadline or due date by which the quality action must be resolved.
  desc_done: true
- table: tabQuality Feedback
  description: ''
  fields:
  - name: name
    description: name
  - name: template
    description: template
    join_hint:
      table: tabQuality Feedback Template
      'on': template = tabQuality Feedback Template.name
  - name: document_type
    description: document_type
    options:
    - User
    - Customer
  - name: document_name
    description: Name or identifier of the quality feedback document or record being
      referenced
  - name: parameters
    description: Configuration settings or criteria defining quality standards, thresholds,
      or evaluation metrics for the feedback
  desc_done: true
- table: tabQuality Feedback Parameter
  description: ''
  fields:
  - name: name
    description: Identifies the specific quality feedback parameter being measured
      or evaluated in quality assessments and audits.
  - name: parameter
    description: Defines the measurable criterion or metric used to assess quality
      performance against standards.
  - name: rating
    description: Captures the score or evaluation result assigned to a quality parameter
      during inspection or review processes.
    options:
    - '1'
    - '2'
    - '3'
    - '4'
    - '5'
  - name: feedback
    description: Quality feedback comments or observations recorded about a product,
      process, or service defect or issue
  desc_done: true
- table: tabQuality Feedback Template
  description: ''
  fields:
  - name: name
    description: Name or title of the quality feedback template used to identify and
      select specific feedback forms
  - name: template
    description: Actual content or structure of the quality feedback form including
      questions, rating scales, and evaluation criteria
  - name: parameters
    description: Configuration settings or variables that customize how the quality
      feedback template behaves or what data it collects
  desc_done: true
- table: tabQuality Feedback Template Parameter
  description: ''
  fields:
  - name: name
    description: Name or title of the quality feedback template parameter for identification
      and selection
  - name: parameter
    description: Specific parameter or variable being measured or evaluated within
      the quality feedback template
  desc_done: true
- table: tabQuality Goal
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the quality goal used when referencing
      specific quality objectives in reports and tracking.
  - name: goal
    description: Target quality metric or performance threshold used when evaluating
      whether quality standards are being met.
  - name: frequency
    description: How often the quality goal is measured or reviewed, used when scheduling
      quality assessments and determining reporting periods.
    options:
    - None
    - Daily
    - Weekly
    - Monthly
    - Quarterly
  - name: procedure
    description: Quality control procedure or inspection method being tracked for
      goal-setting and performance measurement
    join_hint:
      table: tabQuality Procedure
      'on': procedure = tabQuality Procedure.name
  - name: weekday
    description: Day of the week for scheduled quality inspections or recurring quality
      goal targets
    options:
    - Monday
    - Tuesday
    - Wednesday
    - Thursday
    - Friday
    - Saturday
  - name: date
    description: Specific calendar date when a quality goal is set, measured, or due
      for achievement
    options:
    - '1'
    - '2'
