  - name: bom_batches
    description: Groups or collections of BOM updates processed together in a single
      batch run.
  - name: amended_from
    description: Links to the previous BOM update log entry when a BOM change record
      is amended or corrected after initial creation.
    join_hint:
      table: tabBOM Update Log
      'on': amended_from = tabBOM Update Log.name
