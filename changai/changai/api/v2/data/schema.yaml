  - name: no_of_months
    description: Duration in months for general time-based item calculations such
      as warranty periods, subscriptions, or service contracts.
  - name: item_defaults
    description: Default settings for warehouses, suppliers, expense accounts, selling
      cost centers, and buying cost centers applied when this item is used in transactions.
  - name: purchase_uom
    description: Unit of measurement used when purchasing this item from suppliers,
      which may differ from the stock or sales unit.
