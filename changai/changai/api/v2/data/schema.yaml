    - Item Attribute
    - Manufacturer
  - name: attributes
    description: Item variant attributes like size, color, or material that differentiate
      this product from other variants.
  - name: enable_deferred_expense
    description: Whether expense recognition is spread over time rather than recorded
      immediately at purchase.
  - name: no_of_months_exp
    description: Duration in months over which item expenses are amortized or recognized
