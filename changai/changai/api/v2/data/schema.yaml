  - name: amount
    description: Total monetary value of the component quantity consumed in this BOM
      explosion line.
  - name: include_item_in_manufacturing
    description: Whether this BOM item is included when manufacturing the parent item,
      used to filter active components in production planning and material requirements.
  - name: sourced_by_supplier
    description: Whether this BOM item is procured from an external supplier rather
      than manufactured in-house, used to distinguish purchased components from manufactured
      subassemblies.
