  - name: name
    description: Identifies the specific data import log entry for tracking and referencing
      individual import operations.
  - name: data_import
    description: Links to the parent data import configuration or batch to trace which
      import process generated this log entry.
    join_hint:
      table: tabData Import
      'on': data_import = tabData Import.name
  - name: row_indexes
    description: Captures the specific row numbers processed in this import operation
      for troubleshooting failed or successful record imports.
  - name: success
    description: Indicates whether the data import operation completed successfully
      or failed.
  - name: docname
    description: The name or identifier of the document or record that was imported.
  - name: messages
    description: Error messages, warnings, or status information generated during
      the import process.
  - name: exception
    description: Error message or exception details captured when a data import fails
      or encounters problems during processing.
  - name: log_index
    description: Sequential position or order number of this log entry within the
      data import batch or session.
  desc_done: true
