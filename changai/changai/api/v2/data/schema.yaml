- table: tabQuotation
  description: ''
  fields:
  - name: name
    description: Unique identifier or number assigned to the quotation document
  - name: title
    description: Customer or prospect name associated with the quotation
  - name: naming_series
    description: Prefix pattern used to generate the quotation number
    options:
    - SAL-QTN-.YYYY.-
  - name: quotation_to
    description: Specifies whether the quotation is issued to a customer, lead, or
      prospect entity type.
    join_hint:
      table: tabDocType
      'on': quotation_to = tabDocType.name
  - name: party_name
    description: The unique identifier or code of the entity receiving the quotation
      (customer ID, lead ID, or prospect ID).
  - name: customer_name
    description: The display name of the customer, lead, or prospect receiving the
      quotation.
  - name: transaction_date
    description: Date when the quotation was created or issued to the customer.
  - name: valid_till
    description: Expiration date until which the quoted prices and terms remain valid
      for customer acceptance.
  - name: order_type
    description: Category or classification of the quotation such as standard sale,
      service, project-based, or custom order type.
    options:
    - Sales
    - Maintenance
    - Shopping Cart
  - name: company
    description: The company entity that issued or owns this quotation.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: has_unit_price_items
    description: Indicates whether this quotation includes line items with individual
      unit pricing.
  - name: amended_from
    description: References the original quotation that this quotation amends or revises.
    join_hint:
      table: tabQuotation
      'on': amended_from = tabQuotation.name
  - name: currency
    description: Currency in which the quotation prices and amounts are denominated
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: Exchange rate used to convert quotation amounts from the quotation
      currency to the base company currency
  - name: selling_price_list
    description: Price list applied to determine item rates and pricing rules for
      this quotation
    join_hint:
      table: tabPrice List
      'on': selling_price_list = tabPrice List.name
  - name: price_list_currency
    description: Currency in which the quotation prices are listed and displayed to
      the customer.
    join_hint:
      table: tabCurrency
      'on': price_list_currency = tabCurrency.name
  - name: plc_conversion_rate
    description: Exchange rate used to convert price list currency amounts to the
      quotation's base currency.
  - name: ignore_pricing_rule
    description: Indicates whether automatic pricing rules and discounts are bypassed
      for this quotation.
  - name: scan_barcode
    description: Barcode scanned or associated with the quotation for tracking or
      identification purposes.
  - name: last_scanned_warehouse
    description: Warehouse location where the quotation or its items were most recently
      scanned.
  - name: items
    description: Line items or products included in the quotation with quantities
      and pricing details.
  - name: total_qty
    description: Total quantity of all items in the quotation across all line items
  - name: total_net_weight
    description: Combined net weight of all items in the quotation
  - name: base_total
    description: Quotation subtotal in base currency before taxes, discounts, and
      shipping charges
  - name: base_net_total
    description: Net total amount in company's base currency before taxes, used when
      analyzing quotation values across multiple currencies.
  - name: total
    description: Final quotation amount including all taxes, discounts, and charges,
      used when asking about the complete quotation value the customer sees.
  - name: net_total
    description: Subtotal amount in quotation currency after discounts but before
      taxes, used when asking about pre-tax quotation value.
  - name: tax_category
    description: Tax classification applied to the quotation determining which tax
      rules apply based on customer type, location, or product category.
    join_hint:
      table: tabTax Category
      'on': tax_category = tabTax Category.name
  - name: taxes_and_charges
    description: Specific tax template or charge configuration defining the actual
      tax rates, accounts, and calculation methods applied to this quotation.
    join_hint:
      table: tabSales Taxes and Charges Template
      'on': taxes_and_charges = tabSales Taxes and Charges Template.name
  - name: shipping_rule
    description: Shipping cost calculation rule applied to determine freight charges
      based on order value, weight, or destination.
    join_hint:
      table: tabShipping Rule
      'on': shipping_rule = tabShipping Rule.name
  - name: incoterm
    description: Shipping terms code defining buyer and seller responsibilities for
      delivery, risk, and costs (e.g., FOB, CIF, EXW).
    join_hint:
      table: tabIncoterm
      'on': incoterm = tabIncoterm.name
  - name: named_place
    description: Specific location associated with the incoterm where risk and cost
      transfer occurs (port, warehouse, or delivery address).
  - name: taxes
    description: Total tax amount or tax details applied to the quotation, separate
      from line item prices.
  - name: base_total_taxes_and_charges
    description: Total amount of all taxes and charges in base currency before any
      currency conversion or exchange rate adjustments.
  - name: total_taxes_and_charges
    description: Total amount of all taxes and charges in the quotation's transaction
      currency after applying exchange rates.
  - name: base_grand_total
    description: Final total amount of the quotation including all items, taxes, and
      charges in base currency before currency conversion.
  - name: base_rounding_adjustment
    description: Amount added or subtracted to round the quotation total to a convenient
      number in base currency.
  - name: base_rounded_total
    description: Final quotation total after applying rounding adjustment in base
      currency.
  - name: base_in_words
    description: Text representation of the quotation total amount in base currency,
      typically used for formal quotation documents.
  - name: grand_total
    description: Total quotation amount before any rounding adjustments are applied.
  - name: rounding_adjustment
    description: Amount added or subtracted to round the grand total to a convenient
      figure.
  - name: rounded_total
    description: Final quotation amount after applying rounding adjustment to the
      grand total.
  - name: disable_rounded_total
    description: Whether the quotation total should be displayed without rounding
      to the nearest whole number.
  - name: in_words
    description: The quotation total amount expressed as text words rather than numeric
      digits.
  - name: apply_discount_on
    description: Whether discounts are calculated on the grand total or on individual
      line items in the quotation.
    options:
    - Grand Total
    - Net Total
  - name: base_discount_amount
    description: Discount amount applied before any additional discounts or coupons,
      used when calculating the initial price reduction on the quotation.
  - name: coupon_code
    description: Promotional or marketing code entered by customer to receive special
      discounts or offers on the quotation.
    join_hint:
      table: tabCoupon Code
      'on': coupon_code = tabCoupon Code.name
  - name: additional_discount_percentage
    description: Extra percentage discount applied on top of base discounts, typically
      for negotiated deals or special customer pricing.
  - name: discount_amount
    description: Total discount value applied to the quotation in currency units,
      used when asking about discount totals or quotation price reductions.
  - name: referral_sales_partner
    description: External partner or agent who referred the customer for this quotation,
      used when tracking partner-sourced opportunities or commission eligibility.
    join_hint:
      table: tabSales Partner
      'on': referral_sales_partner = tabSales Partner.name
  - name: other_charges_calculation
    description: Additional fees or charges beyond line items such as handling fees,
      setup costs, or miscellaneous charges added to the quotation total.
  - name: packed_items
    description: Items grouped or bundled together in the quotation for packaging
      purposes.
  - name: pricing_rules
    description: Special pricing conditions or discount rules applied to this quotation.
  - name: customer_address
    description: Delivery or billing address associated with the customer for this
      quotation.
    join_hint:
      table: tabAddress
      'on': customer_address = tabAddress.name
  - name: address_display
    description: Formatted address of the customer or prospect receiving the quotation.
  - name: contact_person
    description: Name or identifier of the individual at the customer organization
      who is the primary contact for this quotation.
    join_hint:
      table: tabContact
      'on': contact_person = tabContact.name
  - name: contact_display
    description: Formatted display name and details of the contact person associated
      with this quotation.
  - name: contact_mobile
    description: Mobile phone number of the customer contact person for this quotation
  - name: contact_email
    description: Email address of the customer contact person for this quotation
  - name: shipping_address_name
    description: Name or label identifying the delivery location for quoted items
    join_hint:
      table: tabAddress
      'on': shipping_address_name = tabAddress.name
  - name: shipping_address
    description: Address where quoted goods will be delivered if the quotation is
      accepted and converted to an order.
  - name: company_address
    description: Address of the company issuing the quotation, used as the sender
      or return address.
    join_hint:
      table: tabAddress
      'on': company_address = tabAddress.name
  - name: company_address_display
    description: Formatted version of the company address for display on printed quotations
      and customer-facing documents.
  - name: company_contact_person
    description: The internal employee or representative from the selling company
      who is responsible for this quotation.
    join_hint:
      table: tabContact
      'on': company_contact_person = tabContact.name
  - name: payment_terms_template
    description: The predefined payment terms template applied to this quotation,
      such as Net 30 or COD.
    join_hint:
      table: tabPayment Terms Template
      'on': payment_terms_template = tabPayment Terms Template.name
  - name: payment_schedule
    description: The specific payment schedule or installment plan agreed upon for
      this quotation, detailing when payments are due.
  - name: tc_name
    description: Name of the terms and conditions template applied to the quotation
    join_hint:
      table: tabTerms and Conditions
      'on': tc_name = tabTerms and Conditions.name
  - name: terms
    description: Full text of the terms and conditions or special clauses included
      in the quotation
  - name: auto_repeat
    description: Whether this quotation is set to automatically recur or regenerate
      on a schedule
    join_hint:
      table: tabAuto Repeat
      'on': auto_repeat = tabAuto Repeat.name
  - name: letter_head
    description: Letterhead template used when printing or emailing this quotation
    join_hint:
      table: tabLetter Head
      'on': letter_head = tabLetter Head.name
  - name: group_same_items
