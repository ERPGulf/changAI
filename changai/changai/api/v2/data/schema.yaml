  - name: cost_per_unit
    description: Actual cost charged per unit for this operation in transaction currency,
      used when calculating total operation costs for production orders.
  - name: base_cost_per_unit
    description: Standard operation cost per unit in base currency before any quantity-based
      adjustments or currency conversion.
  - name: description
    description: Detailed explanation or notes about what work is performed in this
      manufacturing operation step.
  desc_done: true
- table: tabBOM Scrap Item
  description: ''
  fields:
  - name: name
    description: Unique identifier for this BOM scrap item record.
  - name: item_code
    description: Code of the item that is scrapped or wasted during the BOM production
      process.
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: item_name
    description: Name of the item that is scrapped or wasted during the BOM production
      process.
  - name: stock_qty
    description: Quantity of scrap material generated from the BOM production process.
  - name: rate
    description: Unit valuation or cost per unit of the scrap item.
  - name: amount
    description: Total monetary value of the scrap quantity, typically stock_qty multiplied
      by rate.
  - name: stock_uom
    description: Unit of measurement for the scrap item quantity in inventory (e.g.,
