    - MAT-RECO-.YYYY.-
  - name: company
    description: Company entity for which the stock reconciliation is being performed
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: purpose
    description: Reason or explanation for why the stock reconciliation was performed,
      such as physical inventory count, damaged goods adjustment, or opening stock
      entry.
    options:
    - Opening Stock
    - Stock Reconciliation
  - name: posting_date
    description: Date when the stock reconciliation transaction is recorded in the
      accounting ledger and affects inventory valuation.
  - name: posting_time
    description: Time of day when the stock reconciliation was posted to the system.
  - name: set_posting_time
    description: Indicates whether the reconciliation uses a custom posting date and
      time instead of the current timestamp.
