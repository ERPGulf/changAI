    description: Employee or system user who earned or was assigned the energy points
    join_hint:
      table: tabUser
      'on': user = tabUser.name
  - name: type
    description: Category or reason for the energy point transaction such as appreciation,
      review, or task completion
    options:
    - Auto
    - Appreciation
    - Criticism
    - Review
    - Revert
  - name: points
    description: Energy points awarded or deducted in this transaction
  - name: rule
    description: The specific energy point rule that triggered this point allocation
    join_hint:
      table: tabEnergy Point Rule
      'on': rule = tabEnergy Point Rule.name
  - name: reference_doctype
    description: The document type (like Sales Order, Task, Issue) that triggered
      the energy point award
    join_hint:
      table: tabDocType
      'on': reference_doctype = tabDocType.name
  - name: reference_name
    description: Unique identifier or name used to reference this specific energy
      point transaction or activity.
  - name: reverted
    description: Indicates whether this energy point entry has been reversed or cancelled.
  - name: revert_of
    description: Links to the original energy point log entry that this record reverses
      or cancels.
    join_hint:
      table: tabEnergy Point Log
      'on': revert_of = tabEnergy Point Log.name
  - name: reason
    description: Explanation or justification for why energy points were awarded or
      deducted in this transaction.
  - name: seen
    description: Indicates whether the user has viewed or acknowledged this energy
      point log entry.
  desc_done: true
- table: tabEnergy Point Rule
  description: ''
  fields:
  - name: name
    description: Unique identifier for the energy point rule record
  - name: enabled
    description: Whether the energy point rule is currently active and awarding points
  - name: rule_name
    description: Display name or title of the energy point rule describing what action
      earns points
  - name: reference_doctype
    description: The document type (e.g., Sales Order, Task) that triggers energy
      point allocation when events occur on it.
    join_hint:
      table: tabDocType
      'on': reference_doctype = tabDocType.name
  - name: for_doc_event
    description: The specific event action (e.g., submit, cancel, update) on the reference
      document that triggers energy points.
    options:
    - New
    - Submit
    - Cancel
    - Value Change
    - Custom
  - name: field_to_check
    description: The specific field name on the reference document whose value or
      change is evaluated to determine if energy points should be awarded.
  - name: points
    description: Number of energy points awarded or deducted when this rule is triggered
  - name: for_assigned_users
    description: Whether energy points are given to users assigned to a document rather
      than the document creator
  - name: user_field
    description: Specific field name in the document that identifies which user receives
      the energy points
  - name: multiplier_field
    description: Field name from the reference document whose value multiplies the
      base points earned.
  - name: max_points
    description: Maximum points that can be awarded per occurrence of this energy
      point rule.
  - name: apply_only_once
    description: Whether this rule awards points only on the first occurrence or can
      trigger multiple times.
  - name: condition
    description: Criteria or rule logic that must be met for energy points to be awarded
      or applied
