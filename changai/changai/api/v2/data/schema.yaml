    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: is_opening
    description: Indicates whether this entry represents opening balances brought
      forward from a prior period.
    options:
    - 'No'
    - 'Yes'
  - name: is_advance
    description: Indicates whether this entry represents an advance payment or prepayment
      transaction.
    options:
    - 'No'
    - 'Yes'
  - name: to_rename
    description: Indicates the entry is marked for renaming or correction in a future
      period.
  - name: is_cancelled
    description: Indicates the entry has been voided or reversed, excluding it from
      active financial reporting.
  - name: remarks
    description: Free-text notes or comments explaining the purpose, context, or special
      circumstances of the journal entry.
