- table: tabRepost Item Valuation
  description: ''
  fields:
  - name: name
    description: Unique identifier for the repost item valuation record
  - name: based_on
    description: Source document or transaction type that triggered the repost valuation
      entry
    options:
    - Transaction
    - Item and Warehouse
  - name: voucher_type
    description: Classification of the accounting voucher created during the repost
      valuation process
    join_hint:
      table: tabDocType
      'on': voucher_type = tabDocType.name
  - name: voucher_no
    description: Reference number of the repost transaction used to track or filter
      specific item valuation adjustments.
  - name: item_code
    description: Identifier of the product or material whose valuation is being reposted.
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: warehouse
    description: Storage location where the item valuation repost applies.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: posting_date
    description: Date when the item revaluation transaction was posted to the ledger.
  - name: posting_time
    description: Time when the item revaluation transaction was posted to the ledger.
  - name: status
    description: Current processing state of the revaluation entry such as draft,
      submitted, or cancelled.
    options:
    - Queued
    - In Progress
    - Completed
    - Skipped
    - Failed
  - name: company
    description: Company entity for which this item valuation record applies.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: allow_negative_stock
    description: Indicates whether stock quantity was permitted to go below zero for
