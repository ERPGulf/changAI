- table: tabBOM Update Tool
  description: 'Replace a particular BOM in all other BOMs where it is used. It will
    replace the old BOM link, update cost and regenerate "BOM Explosion Item" table
    as per new BOM.

    It also updates latest price in all the BOMs.'
  fields:
  - name: name
    description: Unique identifier for the BOM update operation or record
  - name: current_bom
    description: The existing bill of materials being replaced or modified in this
      update
    join_hint:
      table: tabBOM
      'on': current_bom = tabBOM.name
  - name: new_bom
    description: The replacement or updated bill of materials that will supersede
      the current BOM
    join_hint:
      table: tabBOM
      'on': new_bom = tabBOM.name
  desc_done: true
