      points
  - name: review_levels
    description: Approval thresholds or review stages required for energy point redemption
      or allocation
  - name: point_allocation_periodicity
    description: Frequency at which energy points are automatically allocated to users
      (daily, weekly, monthly).
    options:
    - Daily
    - Weekly
    - Monthly
  - name: last_point_allocation_date
    description: Most recent date when energy points were allocated to users in the
      system.
  desc_done: true
- table: tabEvent
  description: ''
  fields:
  - name: name
    description: Short identifier or title of the event
  - name: subject
    description: Detailed topic or matter that the event addresses
  - name: event_category
    description: Classification grouping events by type such as meeting, training,
      conference, or appointment
    options:
    - Event
    - Meeting
    - Call
    - Sent/Received Email
    - Other
  - name: event_type
    description: Category or classification of the event such as meeting, appointment,
      task, deadline, or training session.
    options:
    - Private
    - Public
  - name: color
    description: Visual color code assigned to the event for calendar display and
      categorization purposes.
  - name: send_reminder
    description: Whether a notification or alert should be sent to participants before
      the event occurs.
  - name: repeat_this_event
    description: Whether the event recurs on a regular schedule or is a one-time occurrence
  - name: starts_on
    description: The date and time when the event begins
  - name: ends_on
    description: The date and time when the event concludes
  - name: status
    description: Event confirmation status such as confirmed, tentative, or cancelled
    options:
    - Open
    - Completed
    - Closed
    - Cancelled
  - name: sender
    description: Person or entity who created or sent the event invitation
  - name: all_day
    description: Whether the event spans an entire day without specific start and
      end times
  - name: sync_with_google_calendar
    description: Whether the event is synchronized with Google Calendar for bi-directional
      updates.
  - name: add_video_conferencing
    description: Whether a video conferencing link should be automatically added to
      the event.
  - name: google_calendar
    description: The specific Google Calendar account or calendar name where the event
      is synced.
    join_hint:
      table: tabGoogle Calendar
      'on': google_calendar = tabGoogle Calendar.name
  - name: google_calendar_id
    description: Identifier linking this event to a specific Google Calendar where
      it was created or synced.
  - name: google_calendar_event_id
    description: Unique identifier for this event within Google Calendar's system,
      used to track the specific calendar entry.
  - name: google_meet_link
    description: URL for the Google Meet video conference associated with this event.
  - name: pulled_from_google_calendar
    description: Indicates whether the event was imported or synced from Google Calendar.
  - name: repeat_on
    description: Specifies which days of the week or dates the event recurs on for
      repeating events.
    options:
    - Daily
    - Weekly
    - Monthly
    - Yearly
  - name: repeat_till
    description: The end date when a recurring event stops repeating.
  - name: monday
    description: Indicates whether the event occurs on Mondays or Monday-specific
      scheduling flag
  - name: tuesday
    description: Indicates whether the event occurs on Tuesdays or Tuesday-specific
      scheduling flag
  - name: wednesday
    description: Indicates whether the event occurs on Wednesdays or Wednesday-specific
      scheduling flag
  - name: thursday
    description: Event occurs or is scheduled on Thursdays
  - name: friday
    description: Event occurs or is scheduled on Fridays
  - name: saturday
    description: Event occurs or is scheduled on Saturdays
  - name: sunday
    description: Whether the event occurs on Sundays or is scheduled for Sunday availability
  - name: description
    description: Text explaining the event's purpose, details, or notes that users
      search when looking for specific event information
  - name: event_participants
    description: People or entities attending or involved in the event
  - name: reference_doctype
    description: Type of document this event is linked to, such as Lead, Opportunity,
      Customer, or Project
    join_hint:
      table: tabDocType
      'on': reference_doctype = tabDocType.name
  - name: reference_docname
