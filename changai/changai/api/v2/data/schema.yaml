  - name: total_gain_loss
    description: Total calculated foreign exchange gain or loss amount from this revaluation,
      including both booked and unbooked amounts.
  - name: amended_from
    description: Reference to the previous exchange rate revaluation document that
      this record amends or corrects.
    join_hint:
      table: tabExchange Rate Revaluation
      'on': amended_from = tabExchange Rate Revaluation.name
