  - name: via_landed_cost_voucher
    description: Indicates whether this valuation adjustment was created through a
      landed cost voucher allocation.
  - name: allow_zero_rate
    description: Whether items with zero valuation rate are permitted in this repost
      valuation operation.
  - name: recreate_stock_ledgers
    description: Whether to rebuild stock ledger entries from scratch during the reposting
      process.
  - name: amended_from
    description: Reference to the original repost item valuation document that this
