    - Amount
  - name: margin_rate_or_amount
    description: The numerical margin value applied when this pricing rule calculates
      profit margins.
  - name: rate_or_discount
    description: Whether the pricing rule applies a final price rate or a discount
      reduction.
    options:
    - Rate
    - Discount Percentage
    - Discount Amount
  - name: apply_discount_on
    description: Specifies whether the pricing rule discount applies to grand total,
