  - name: deleted_doctype
    description: Type or category of the document that was deleted
  - name: restored
    description: Indicates whether a deleted document has been restored or recovered
      from deletion.
  - name: new_name
    description: The renamed filename or document name assigned when a deleted document
      is restored.
  - name: data
    description: The actual content or binary data of the deleted document that was
      removed from the system.
  desc_done: true
- table: tabDelivery Note
  description: ''
  fields:
  - name: name
    description: Unique identifier for the delivery note document, typically auto-generated
      based on naming series.
  - name: title
    description: Custom display name or label for the delivery note, used when users
      want to reference a specific delivery by a memorable name instead of the system
      identifier.
  - name: naming_series
    description: Prefix pattern that determines how delivery note identifiers are
      automatically formatted and numbered.
    options:
    - MAT-DN-.YYYY.-
    - MAT-DN-RET-.YYYY.-
  - name: customer
    description: Customer account identifier for the recipient of the delivered goods
    join_hint:
      table: tabCustomer
      'on': customer = tabCustomer.name
  - name: tax_id
    description: Tax identification number of the customer receiving the delivery
  - name: customer_name
    description: Name of the customer receiving the delivery, used when searching
      by company or person name rather than account code
  - name: posting_date
    description: Date when the delivery note is officially recorded in the accounting
      system, used for financial period tracking and reporting queries.
  - name: posting_time
    description: Time when the delivery note is officially recorded, used when precise
      timestamp queries are needed beyond just the date.
  - name: set_posting_time
    description: Indicates whether the posting date and time were manually specified
      rather than automatically set at creation.
  - name: company
    description: The company entity that issued or owns this delivery note.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: amended_from
    description: References the original delivery note that this document amends or
      corrects.
    join_hint:
      table: tabDelivery Note
      'on': amended_from = tabDelivery Note.name
  - name: is_return
    description: Indicates whether this delivery note represents a return of goods
      from customer back to supplier.
  - name: issue_credit_note
    description: Whether a credit note should be issued for this delivery note, typically
      queried when processing returns or customer refunds.
  - name: return_against
    description: Reference to the original delivery note that this return delivery
      is against, used to track which shipment is being returned.
    join_hint:
      table: tabDelivery Note
      'on': return_against = tabDelivery Note.name
  - name: cost_center
    description: The cost center assigned to this delivery for accounting allocation
      and expense tracking purposes.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: Project associated with the delivery for tracking shipments by project
      or job
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: currency
    description: Currency in which the delivery note transaction is recorded
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: Exchange rate used to convert delivery note amounts from transaction
      currency to base currency
  - name: selling_price_list
    description: Price list applied to determine item selling prices for this delivery
    join_hint:
      table: tabPrice List
      'on': selling_price_list = tabPrice List.name
  - name: price_list_currency
    description: Currency of the price list used for this delivery's item pricing
    join_hint:
      table: tabCurrency
      'on': price_list_currency = tabCurrency.name
  - name: plc_conversion_rate
    description: Exchange rate used to convert price list currency to delivery transaction
      currency
  - name: ignore_pricing_rule
    description: Whether pricing rules are bypassed for this delivery note, relevant
      when users ask about deliveries with manual pricing or exceptions to standard
      pricing.
  - name: scan_barcode
    description: Barcode value scanned during delivery processing, used when users
      search for deliveries by scanned barcode or track barcode-based fulfillment.
  - name: last_scanned_warehouse
    description: Most recent warehouse where a barcode scan occurred for this delivery,
      relevant when users ask which warehouse location last processed or scanned items.
  - name: set_warehouse
    description: Source warehouse from which items are being delivered or dispatched
      in this delivery note.
    join_hint:
      table: tabWarehouse
      'on': set_warehouse = tabWarehouse.name
  - name: set_target_warehouse
    description: Destination warehouse to which items are being transferred when the
      delivery note involves inter-warehouse stock movement.
    join_hint:
      table: tabWarehouse
      'on': set_target_warehouse = tabWarehouse.name
  - name: items
    description: Line items included in this delivery note, containing the products,
      quantities, and details being delivered.
  - name: total_qty
    description: Total quantity of all items in the delivery note, used when asking
      about total units delivered or shipped.
  - name: total_net_weight
    description: Combined net weight of all items in the delivery note, used when
      asking about shipment weight or logistics calculations.
  - name: base_total
    description: Total value of the delivery note in base currency before taxes and
      charges, used when asking about delivery value or goods amount.
  - name: base_net_total
    description: Net total amount in base currency before taxes and after discounts,
      used when querying delivery note values in company's default currency.
  - name: total
    description: Grand total amount including all taxes, charges, and discounts in
      transaction currency, used when querying final delivery note value.
  - name: net_total
    description: Net total amount in transaction currency before taxes and after discounts,
      used when querying pre-tax delivery note values in the currency of the transaction.
  - name: tax_category
    description: Tax classification applied to the delivery note determining which
      tax rates and rules apply to the shipment.
    join_hint:
      table: tabTax Category
      'on': tax_category = tabTax Category.name
  - name: taxes_and_charges
    description: Template or configuration defining the specific tax types, rates,
      and additional charges calculated on this delivery note.
    join_hint:
      table: tabSales Taxes and Charges Template
      'on': taxes_and_charges = tabSales Taxes and Charges Template.name
  - name: shipping_rule
    description: Rule or policy governing shipping costs, carrier selection, or delivery
      terms applied to this delivery note.
    join_hint:
      table: tabShipping Rule
      'on': shipping_rule = tabShipping Rule.name
  - name: incoterm
    description: Shipping terms code defining responsibility transfer point between
      seller and buyer such as FOB, CIF, or EXW for this delivery.
    join_hint:
      table: tabIncoterm
      'on': incoterm = tabIncoterm.name
  - name: named_place
    description: Specific geographic location associated with the incoterm where responsibility
      transfers, such as port name or warehouse address.
  - name: taxes
    description: Total tax amount charged on this delivery note including VAT, sales
      tax, or other applicable taxes.
  - name: base_total_taxes_and_charges
    description: Total amount of all taxes and charges in base currency, used when
      analyzing delivery note tax totals in company's default currency.
  - name: total_taxes_and_charges
    description: Total amount of all taxes and charges in transaction currency, used
      when querying delivery note tax totals in the currency of the specific transaction.
  - name: base_grand_total
    description: Final total amount including all items, taxes and charges in base
      currency, used when analyzing complete delivery note values in company's default
      currency.
  - name: base_rounding_adjustment
    description: Amount added or subtracted to round the total to a convenient value
      in base currency.
  - name: base_rounded_total
    description: Final total amount after applying rounding adjustment in base currency.
  - name: base_in_words
    description: Text representation of the base currency total amount written out
      in words for formal documentation.
  - name: grand_total
    description: Total delivery value before any rounding adjustments are applied
  - name: rounding_adjustment
    description: Amount added or subtracted to round the grand total to a convenient
      figure
  - name: rounded_total
    description: Final delivery total after applying rounding adjustment to the grand
      total
  - name: in_words
    description: Total amount expressed as text words for printing on delivery documents
  - name: disable_rounded_total
    description: Whether rounding is disabled for the delivery note total amount
  - name: apply_discount_on
    description: Whether discounts are calculated on grand total or net total before
      taxes
    options:
    - Grand Total
    - Net Total
  - name: base_discount_amount
    description: Discount amount calculated from line item discounts before applying
      any additional document-level discounts.
  - name: additional_discount_percentage
    description: Extra percentage discount applied at the delivery note level after
      base discounts.
  - name: discount_amount
    description: Total final discount amount on the delivery note combining base and
      additional discounts.
  - name: other_charges_calculation
    description: Additional fees or charges applied to the delivery beyond standard
