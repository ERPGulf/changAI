    description: Date when a scheduled payment installment is expected to be paid
      by the customer
  - name: invoice_portion
    description: Percentage or amount of the total invoice allocated to this specific
      payment installment
  - name: mode_of_payment
    description: Payment method specified for this scheduled installment such as cash,
      check, wire transfer, or credit card
    join_hint:
      table: tabMode of Payment
      'on': mode_of_payment = tabMode of Payment.name
  - name: due_date_based_on
    description: Determines the reference date from which payment due dates are calculated
      (e.g., invoice date, posting date, delivery date).
    options:
    - Day(s) after invoice date
    - Day(s) after the end of the invoice month
    - Month(s) after the end of the invoice month
  - name: credit_days
    description: Number of days added to the reference date to calculate the payment
      due date.
  - name: credit_months
    description: Number of months added to the reference date to calculate the payment
      due date, typically used for longer payment terms.
  - name: discount_date
    description: Date by which payment must be made to qualify for early payment discount
  - name: discount
    description: Discount amount or percentage applied when payment is made by the
      discount date
  - name: discount_type
    description: Indicates whether discount is a percentage or fixed amount
    options:
    - Percentage
    - Amount
  - name: discount_validity_based_on
    description: Determines whether the discount expiration is calculated from invoice
      date, posting date, or another reference date.
    options:
    - Day(s) after invoice date
    - Day(s) after the end of the invoice month
    - Month(s) after the end of the invoice month
  - name: discount_validity
    description: Number of days or specific date until which the early payment discount
      remains valid.
  - name: payment_amount
    description: The actual monetary amount due or scheduled to be paid for this installment.
  - name: outstanding
    description: Remaining unpaid balance on a scheduled payment after accounting
      for payments and discounts
  - name: paid_amount
    description: Total amount already paid toward this scheduled payment installment
  - name: discounted_amount
    description: Amount reduced from the scheduled payment due to early payment discounts
      or other reductions
  - name: base_payment_amount
    description: Total scheduled payment amount in base currency for this installment
      before any payments are applied.
  - name: base_outstanding
    description: Remaining unpaid balance in base currency for this scheduled payment
      after partial or full payments.
  - name: base_paid_amount
    description: Actual amount paid in base currency against this scheduled payment
      installment.
  desc_done: true
