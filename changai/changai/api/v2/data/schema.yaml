    description: Item is inactive and cannot be used in new transactions or purchases
  - name: allow_alternative_item
    description: Item can be substituted with alternative items when out of stock
      or unavailable
  - name: is_stock_item
    description: Item inventory levels are tracked in warehouses versus non-stock
      items like services or expenses
  - name: has_variants
    description: Indicates whether this item has multiple variants like different
      sizes, colors, or configurations that customers can choose from.
  - name: opening_stock
    description: The initial quantity of this item recorded when starting inventory
      tracking or at the beginning of an accounting period.
  - name: valuation_rate
    description: The per-unit cost used to calculate the total value of this item's
      inventory for accounting and financial reporting purposes.
  - name: standard_rate
    description: Default selling price per unit for this item when creating sales
      transactions or quotations.
  - name: is_fixed_asset
    description: Indicates whether this item represents a fixed asset like equipment,
      machinery, or property rather than inventory or consumables.
  - name: auto_create_assets
    description: Controls whether purchasing this item automatically generates individual
      asset records for tracking depreciation and maintenance.
  - name: is_grouped_asset
    description: Indicates whether this item represents a grouped or bundled asset
      rather than an individual asset.
  - name: asset_category
    description: The classification category for this item when it is treated as a
      fixed asset, used to determine depreciation and accounting treatment.
    join_hint:
      table: tabAsset Category
      'on': asset_category = tabAsset Category.name
  - name: asset_naming_series
    description: The naming convention or prefix pattern used to automatically generate
      identifiers for assets created from this item.
  - name: over_delivery_receipt_allowance
    description: Maximum percentage by which received quantity can exceed ordered
      quantity for this item without requiring approval.
  - name: over_billing_allowance
    description: Maximum percentage by which billed amount can exceed ordered amount
      for this item without requiring approval.
  - name: description
    description: Primary text description or name of the item used for display, search,
      and identification.
  - name: brand
    description: Brand name or manufacturer of the item, used when filtering or searching
      items by brand.
