    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: base_rate
    description: Price per unit of the scrap item in the company's base currency.
  - name: base_amount
    description: Total value of the scrap item in the company's base currency, calculated
      from quantity and rate.
  desc_done: true
- table: tabBOM Update Batch
