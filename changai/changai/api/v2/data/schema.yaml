    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: item_name
    description: Human-readable name or description of the item in the BOM creator
  - name: item_group
    description: Category or classification of the finished good item being created
      in the BOM.
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: fg_item
