      table: tabSerial No
      'on': item_serial_no = tabSerial No.name
  - name: batch_no
    description: Production batch or lot number for items inspected as a group
    join_hint:
      table: tabBatch
      'on': batch_no = tabBatch.name
  - name: sample_size
