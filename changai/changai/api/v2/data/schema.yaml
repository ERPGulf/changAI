      table: tabBrand
      'on': brand = tabBrand.name
  - name: uoms
    description: Units of measure available for the item (e.g., pieces, boxes, kilograms),
      used when querying how an item can be measured or sold.
  - name: shelf_life_in_days
    description: Number of days the item remains usable before expiration, used when
      checking perishability or expiration timeframes.
  - name: end_of_life
    description: Date when the item is discontinued or no longer available for sale
      or production.
  - name: default_material_request_type
    description: Whether material requests for this item default to purchase, transfer,
      manufacture, or customer provided.
