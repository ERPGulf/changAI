      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: Specific project to which the transaction is assigned for project-based
      accounting and profitability analysis.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: finance_book
    description: Accounting book or ledger set used when maintaining multiple parallel
      accounting standards or reporting requirements.
    join_hint:
      table: tabFinance Book
      'on': finance_book = tabFinance Book.name
  - name: company
    description: Company entity associated with the general ledger transaction for
