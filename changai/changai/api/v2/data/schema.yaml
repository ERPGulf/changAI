  - name: name
    description: Unique identifier or reference number for the bank transaction
  - name: naming_series
    description: Prefix pattern used to auto-generate transaction names or reference
      numbers
    options:
    - ACC-BTN-.YYYY.-
  - name: date
    description: Date when the bank transaction occurred or was recorded
  - name: status
    description: Current state of the bank transaction such as pending, cleared, reconciled,
      or cancelled.
    options:
    - Pending
    - Settled
    - Unreconciled
    - Reconciled
    - Cancelled
  - name: bank_account
    description: The specific bank account where this transaction occurred or was
      recorded.
    join_hint:
      table: tabBank Account
      'on': bank_account = tabBank Account.name
  - name: company
    description: The company entity that owns the bank account and to which this transaction
      belongs.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: amended_from
    description: References the original bank transaction that was corrected or modified
      by this transaction.
    join_hint:
      table: tabBank Transaction
      'on': amended_from = tabBank Transaction.name
  - name: deposit
    description: Amount of money added to the bank account in this transaction.
  - name: withdrawal
    description: Amount of money removed from the bank account in this transaction.
  - name: currency
    description: Currency code for the transaction amount, used when filtering or
      analyzing transactions by monetary denomination.
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: description
    description: Textual details or memo about the transaction purpose or nature,
      used when searching for specific transaction types or vendors.
  - name: reference_number
    description: Unique identifier or check number for the transaction, used when
      looking up specific transactions by their reference code.
  - name: transaction_id
    description: Unique identifier for referencing a specific bank transaction in
      queries about transaction details, reconciliation, or audit trails.
  - name: transaction_type
    description: Category of bank transaction such as deposit, withdrawal, transfer,
      or fee, used when filtering or analyzing transactions by their nature.
  - name: payment_entries
    description: Links to associated payment records that were processed through this
      bank transaction, relevant for matching payments to bank activity or reconciliation.
  - name: allocated_amount
    description: Amount from the bank transaction that has been matched or reconciled
      to invoices, payments, or other accounting documents.
  - name: unallocated_amount
    description: Amount from the bank transaction that remains unmatched and needs
      to be reconciled or assigned to accounting entries.
  - name: party_type
    description: Type of entity involved in the transaction such as Customer, Supplier,
      Employee, or Shareholder.
    join_hint:
      table: tabDocType
      'on': party_type = tabDocType.name
  - name: party
    description: Internal party (customer/supplier) linked to this transaction when
      matched to an invoice or payment.
  - name: bank_party_name
    description: External party name as it appears on the bank statement from the
      bank's records.
  - name: bank_party_account_number
    description: External party's bank account number as shown on the bank statement.
  - name: bank_party_iban
    description: International Bank Account Number of the counterparty involved in
      the transaction, used when searching for transactions by recipient or sender
      account number.
