    options:
    - Replace BOM
    - Update Cost
  - name: status
    description: Current state of the BOM update such as pending, approved, or rejected
    options:
    - Queued
    - In Progress
    - Completed
    - Failed
  - name: current_bom
    description: The bill of materials identifier that was active before the update
      occurred.
    join_hint:
      table: tabBOM
      'on': current_bom = tabBOM.name
  - name: new_bom
    description: The bill of materials identifier that became active after the update
      was applied.
    join_hint:
      table: tabBOM
      'on': new_bom = tabBOM.name
  - name: error_log
    description: Details of failures or issues encountered during the BOM update process.
    join_hint:
      table: tabError Log
      'on': error_log = tabError Log.name
  - name: current_level
    description: Indicates the hierarchical depth or tier in the bill of materials
