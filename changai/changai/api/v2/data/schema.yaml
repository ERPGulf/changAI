      issued during production.
    join_hint:
      table: tabWarehouse
      'on': source_warehouse = tabWarehouse.name
  - name: operation
    description: Manufacturing operation or workstation step where this BOM component
      is consumed or used.
    join_hint:
      table: tabOperation
      'on': operation = tabOperation.name
  - name: description
    description: Textual details or notes about the BOM explosion item explaining
      its purpose or specifications.
  - name: image_view
    description: Visual representation of the BOM item for identifying components
      by appearance in production or assembly queries.
  - name: stock_qty
    description: Available inventory quantity of the BOM component for checking material
      availability before production.
  - name: rate
    description: Unit cost or price of the BOM component used in calculating total
      material costs and production expenses.
  - name: qty_consumed_per_unit
    description: Quantity of this component material required to produce one unit
      of the parent item in the bill of materials.
  - name: stock_uom
    description: Unit of measurement for the component item's inventory quantity in
      this BOM explosion.
