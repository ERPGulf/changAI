  fields:
  - name: name
    description: The title or descriptive name of the sales opportunity
  - name: naming_series
    description: The prefix pattern used to generate the opportunity ID number
    options:
    - CRM-OPP-.YYYY.-
  - name: opportunity_from
    description: The source type of the opportunity indicating whether it originated
      from a Lead or an existing Customer
    join_hint:
      table: tabDocType
      'on': opportunity_from = tabDocType.name
  - name: party_name
    description: The legal entity or organization name associated with the opportunity,
      used when searching by official business name or parent company.
  - name: customer_name
    description: The customer-facing or doing-business-as name for the opportunity,
      used when searching by brand name or common customer identifier.
  - name: status
    description: Current stage of the opportunity in the sales pipeline such as prospecting,
      qualified, proposal, negotiation, won, or lost.
    options:
    - Open
    - Quotation
    - Converted
    - Lost
    - Replied
    - Closed
  - name: opportunity_type
    description: Category or classification of the sales opportunity such as new business,
      upsell, renewal, or cross-sell.
    join_hint:
      table: tabOpportunity Type
      'on': opportunity_type = tabOpportunity Type.name
  - name: source
    description: Origin or channel where the opportunity was generated such as referral,
      website, trade show, or cold call.
    join_hint:
      table: tabLead Source
      'on': source = tabLead Source.name
  - name: opportunity_owner
    description: Sales representative or team member responsible for managing and
      closing the opportunity.
    join_hint:
      table: tabUser
      'on': opportunity_owner = tabUser.name
  - name: sales_stage
    description: Current phase of the sales opportunity such as prospecting, qualification,
      proposal, negotiation, or closed won/lost.
    join_hint:
      table: tabSales Stage
      'on': sales_stage = tabSales Stage.name
  - name: expected_closing
    description: Anticipated date when the opportunity is forecasted to close or be
      won.
  - name: probability
    description: Percentage likelihood that the opportunity will be successfully won
      and closed.
  - name: no_of_employees
    description: Number of employees at the prospect or customer organization associated
      with this opportunity, used when qualifying opportunity size or segmenting by
      company headcount.
    options:
    - 1-10
    - 11-50
    - 51-200
    - 201-500
    - 501-1000
    - 1000+
  - name: annual_revenue
    description: Yearly revenue of the prospect or customer organization associated
      with this opportunity, used when assessing deal potential or filtering by company
      financial size.
  - name: customer_group
    description: Classification or segment category assigned to the customer associated
      with this opportunity, used when analyzing opportunities by customer type, tier,
      or strategic grouping.
    join_hint:
      table: tabCustomer Group
      'on': customer_group = tabCustomer Group.name
  - name: industry
    description: The industry vertical or sector of the customer or prospect associated
      with the opportunity, such as manufacturing, healthcare, or retail.
    join_hint:
      table: tabIndustry Type
      'on': industry = tabIndustry Type.name
  - name: market_segment
    description: The specific market segment or customer category within an industry,
      such as enterprise, mid-market, or SMB.
    join_hint:
      table: tabMarket Segment
      'on': market_segment = tabMarket Segment.name
  - name: website
    description: The web address or URL of the customer or prospect organization related
      to the opportunity.
  - name: city
    description: City where the opportunity or customer is located, used when filtering
      or analyzing opportunities by geographic city.
  - name: state
    description: State or province where the opportunity or customer is located, used
      when filtering or analyzing opportunities by geographic region.
  - name: country
    description: Country where the opportunity or customer is located, used when filtering
      or analyzing opportunities by geographic market or international presence.
    join_hint:
      table: tabCountry
      'on': country = tabCountry.name
  - name: territory
    description: Geographic or organizational sales region assigned to the opportunity
      for territory management and sales assignment purposes
    join_hint:
      table: tabTerritory
      'on': territory = tabTerritory.name
  - name: currency
    description: Currency denomination in which the opportunity amount and related
      financial values are expressed
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: Exchange rate used to convert the opportunity's currency amounts
      to the base or home currency
  - name: opportunity_amount
    description: Total potential revenue value of the sales opportunity in the transaction
      currency.
  - name: base_opportunity_amount
    description: Total potential revenue value of the sales opportunity converted
      to the company's base currency for consolidated reporting.
  - name: company
    description: The legal entity or business unit that owns or is pursuing this sales
      opportunity.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: campaign
    description: Marketing campaign that generated or is associated with this sales
      opportunity
    join_hint:
      table: tabCampaign
      'on': campaign = tabCampaign.name
  - name: transaction_date
    description: Date when the opportunity transaction occurred or was recorded
  - name: language
    description: Preferred language for communication with the opportunity contact
      or account
    join_hint:
      table: tabLanguage
      'on': language = tabLanguage.name
  - name: amended_from
    description: References the original opportunity that this opportunity was created
      from when amendments or revisions are made to an existing deal.
    join_hint:
      table: tabOpportunity
      'on': amended_from = tabOpportunity.name
  - name: title
    description: The name or headline of the sales opportunity used to identify and
      search for specific deals.
  - name: first_response_time
    description: Tracks when the sales team first responded or engaged with the opportunity
      after it was created or received.
  - name: lost_reasons
    description: Reasons why an opportunity was lost or closed unsuccessfully, typically
      selected from predefined categories.
  - name: order_lost_reason
    description: Specific reason why an order associated with this opportunity was
      lost, distinct from general opportunity loss reasons.
  - name: competitors
    description: Competitor companies or products that were involved in this sales
      opportunity.
  - name: contact_person
    description: Name of the individual at the customer organization who is the primary
      contact for this sales opportunity.
    join_hint:
      table: tabContact
      'on': contact_person = tabContact.name
  - name: job_title
    description: Professional role or position title of the contact person associated
      with this opportunity.
  - name: contact_email
    description: Email address of the contact person for communication regarding this
      sales opportunity.
  - name: contact_mobile
    description: Mobile phone number of the primary contact person associated with
      the opportunity.
  - name: whatsapp
    description: WhatsApp contact number for the opportunity, may differ from mobile
      or phone.
  - name: phone
    description: Primary landline or office phone number for the opportunity, distinct
      from mobile contact.
  - name: phone_ext
    description: Extension number for the opportunity contact's phone line
  - name: customer_address
    description: Billing or primary address of the customer associated with the opportunity
    join_hint:
      table: tabAddress
      'on': customer_address = tabAddress.name
  - name: address_display
    description: Formatted full address string for displaying the opportunity location
      or customer site
  - name: contact_display
    description: The name or identifier of the primary contact person associated with
      this sales opportunity.
  - name: items
    description: The individual products or services included in this opportunity's
      proposal or quote.
  - name: base_total
    description: The total value of the opportunity before any adjustments like taxes,
      discounts, or currency conversions.
  - name: total
    description: Total monetary value of the sales opportunity including all products
      and services being proposed to the customer
  - name: notes
    description: Free-form text comments and additional context about the opportunity
      such as customer requirements, competitive situation, or special considerations
  desc_done: true
- table: tabOpportunity Item
  description: ''
  fields:
  - name: name
    description: Unique identifier or title for this specific opportunity line item
  - name: item_code
    description: SKU or product code identifying the product or service being offered
      in this opportunity
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: item_name
    description: Descriptive name of the product or service being offered in this
      opportunity
  - name: uom
    description: Unit of measurement for the opportunity item quantity (e.g., pieces,
      boxes, kilograms).
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: qty
    description: Quantity of the item included in the opportunity.
  - name: brand
    description: Brand or manufacturer name of the product being offered in the opportunity.
    join_hint:
      table: tabBrand
      'on': brand = tabBrand.name
  - name: item_group
    description: Product category or classification of the opportunity line item for
      grouping similar products together
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: description
    description: Detailed text explaining what the opportunity line item is or includes
  - name: image_view
    description: Visual representation or picture of the opportunity line item
  - name: base_rate
    description: Unit price or rate in the company's base currency before any currency
      conversion adjustments.
  - name: base_amount
    description: Total line item amount in the company's base currency before any
      currency conversion adjustments.
  - name: rate
    description: Unit price or rate in the transaction currency as quoted to the customer.
  - name: amount
    description: Total monetary value of this specific product or service line item
      within the sales opportunity.
  desc_done: true
- table: tabOpportunity Lost Reason
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for this specific opportunity lost reason
      record
  - name: lost_reason
    description: The actual reason or explanation for why an opportunity was lost,
      such as pricing, competition, or timing issues
  desc_done: true
- table: tabOpportunity Lost Reason Detail
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for this specific opportunity lost reason
      detail record
  - name: lost_reason
    description: The reason why an opportunity was lost, such as pricing, competitor,
      timing, or other business factors
    join_hint:
      table: tabOpportunity Lost Reason
      'on': lost_reason = tabOpportunity Lost Reason.name
  desc_done: true
- table: tabOpportunity Type
  description: ''
  fields:
  - name: name
    description: Opportunity type name or category label that classifies the kind
      of sales opportunity
  - name: description
    description: Detailed explanation or notes about what this opportunity type represents
      and when to use it
  desc_done: true
- table: tabOverdue Payment
  description: ''
  fields:
  - name: name
    description: Unique identifier for the overdue payment record, used when tracking
      or referencing specific outstanding payment instances.
  - name: sales_invoice
    description: Links to the originating sales invoice document, used when investigating
      which invoice has overdue amounts or analyzing payment delays by invoice.
    join_hint:
      table: tabSales Invoice
      'on': sales_invoice = tabSales Invoice.name
  - name: payment_schedule
    description: References the specific payment schedule entry that is overdue, used
      when tracking installment-based payments or analyzing which scheduled payments
      are past due.
  - name: dunning_level
    description: Escalation stage or severity level of collection efforts for the
      overdue payment
  - name: payment_term
    description: Original agreed payment conditions or due date terms that were not
      met
    join_hint:
      table: tabPayment Term
      'on': payment_term = tabPayment Term.name
  - name: description
    description: Explanatory notes or details about why the payment is overdue or
      collection actions taken
  - name: due_date
    description: Original deadline when payment was expected before becoming overdue
  - name: overdue_days
    description: Number of days elapsed since the payment due date passed
  - name: mode_of_payment
    description: Payment method or channel used or expected for the overdue transaction
    join_hint:
      table: tabMode of Payment
      'on': mode_of_payment = tabMode of Payment.name
  - name: invoice_portion
    description: The specific portion or line item of an invoice that is overdue for
      payment.
  - name: payment_amount
    description: The amount of money that was paid or is expected to be paid against
      the overdue invoice.
  - name: outstanding
    description: The remaining unpaid balance that is still overdue after any payments
      have been applied.
  - name: paid_amount
    description: Amount actually paid by customer toward the overdue payment, used
      when asking how much was received or settled.
  - name: discounted_amount
    description: Amount reduced or waived from the original overdue balance, used
      when asking about payment reductions or forgiveness.
  - name: interest
    description: Additional charges accrued on the overdue payment, used when asking
      about late fees or penalty amounts.
  desc_done: true
- table: tabPOS Closing Entry
  description: ''
  fields:
  - name: name
    description: Unique identifier for the POS closing entry, typically referenced
      when looking up a specific closing shift or session.
  - name: period_start_date
    description: Start date and time of the POS shift or period being closed, used
      to find closings within a specific timeframe or that began on a certain date.
  - name: period_end_date
    description: End date and time of the POS shift or period being closed, used to
      identify when a closing was completed or to filter closings that ended on a
      specific date.
  - name: posting_date
    description: Date when the POS shift was closed and transactions were finalized
      for accounting purposes.
  - name: posting_time
    description: Time when the POS shift was closed and transactions were finalized.
  - name: pos_opening_entry
    description: Links to the corresponding POS shift opening record to match closing
      with opening entries.
    join_hint:
      table: tabPOS Opening Entry
      'on': pos_opening_entry = tabPOS Opening Entry.name
  - name: status
    description: Current state of the POS closing entry such as draft, submitted,
      or cancelled.
    options:
    - Draft
    - Submitted
    - Queued
    - Failed
    - Cancelled
  - name: company
    description: Company for which this POS closing entry was created.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: pos_profile
    description: POS profile or configuration used during the sales period being closed.
    join_hint:
      table: tabPOS Profile
      'on': pos_profile = tabPOS Profile.name
  - name: user
    description: Employee or cashier who performed the POS closing and is responsible
      for the shift reconciliation.
    join_hint:
      table: tabUser
      'on': user = tabUser.name
  - name: pos_transactions
    description: Count of sales transactions processed during the shift being closed.
  - name: payment_reconciliation
    description: Linked reconciliation document that matches expected versus actual
      cash and payment amounts at shift end.
  - name: grand_total
    description: Final total amount including all taxes, discounts, and charges for
      the POS closing entry.
  - name: net_total
    description: Total amount before taxes are applied but after item-level discounts
      in the POS closing entry.
  - name: total_quantity
    description: Total number of items or units sold across all transactions in the
      POS closing entry.
  - name: taxes
    description: Tax amounts collected during the POS shift or closing period, used
      when querying total tax revenue or tax breakdown by type.
  - name: error_message
    description: Error or validation message captured when the POS closing entry failed
      or encountered issues during processing.
  - name: amended_from
    description: Reference to the original POS closing entry that this entry corrects
      or replaces, used when tracking corrections or amendments.
    join_hint:
      table: tabPOS Closing Entry
      'on': amended_from = tabPOS Closing Entry.name
  desc_done: true
- table: tabPOS Closing Entry Detail
  description: ''
  fields:
  - name: name
    description: Unique identifier for the POS closing entry detail record
  - name: mode_of_payment
    description: Payment method used for transactions in this closing entry line (cash,
      card, check, etc.)
    join_hint:
      table: tabMode of Payment
      'on': mode_of_payment = tabMode of Payment.name
  - name: opening_amount
    description: Starting cash or payment method balance at the beginning of the POS
      shift
  - name: expected_amount
    description: Expected cash or payment amount that should be present based on transactions
      recorded during the shift or period.
  - name: closing_amount
    description: Actual cash or payment amount counted and declared at the end of
      the shift or period.
  - name: difference
    description: Variance between expected and actual closing amounts, indicating
      overages or shortages in the register.
  desc_done: true
- table: tabPOS Closing Entry Taxes
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the specific tax entry recorded during
      POS closing
  - name: account_head
    description: General ledger account where this tax amount is posted for accounting
      purposes
    join_hint:
      table: tabAccount
      'on': account_head = tabAccount.name
  - name: rate
    description: Tax percentage applied to calculate the tax amount for this entry
  - name: amount
    description: Tax amount collected or paid for a specific tax type during the POS
      closing period.
  desc_done: true
- table: tabPOS Customer Group
  description: ''
  fields:
  - name: name
    description: name
  - name: customer_group
    description: Unique identifier and label for the customer group used when filtering,
      segmenting, or analyzing customers by their assigned group category
    join_hint:
      table: tabCustomer Group
      'on': customer_group = tabCustomer Group.name
  desc_done: true
- table: tabPOS Field
  description: ''
  fields:
  - name: name
    description: Unique identifier for the POS field configuration record.
  - name: fieldname
    description: Technical database column name used to map POS data fields to system
      tables.
  - name: label
    description: User-facing display name shown in POS interface and reports for this
      field.
  - name: fieldtype
    description: Data type of the POS field such as Currency, Data, Link, or Select
      that determines how values are stored and displayed
  - name: options
    description: Configuration values or linked doctype name that defines valid choices
      or relationships for the POS field
  - name: default_value
    description: Pre-populated value automatically assigned to the POS field when
      creating new transactions
  - name: reqd
    description: Indicates whether this POS field is mandatory and must be filled
      in during transactions or data entry.
  - name: read_only
    description: Indicates whether this POS field can be edited by users or is locked
      from modification.
  desc_done: true
- table: tabPOS Invoice
  description: ''
  fields:
  - name: name
    description: Unique identifier for the POS invoice transaction
  - name: custom_ksa_einvoicing_xml
    description: XML format data for Saudi Arabia ZATCA e-invoicing compliance and
      submission
  - name: custom_zatca_tax_category
    description: Tax category classification code required for Saudi Arabian ZATCA
      e-invoicing regulations
    options:
    - Standard
    - Zero Rated
    - Exempted
    - Services outside scope of tax / Not subject to VAT
  - name: custom_exemption_reason_code
    description: Tax exemption reason code for invoices claiming exemption from VAT
      or other taxes.
    options:
    - VATEX-SA-29
    - VATEX-SA-29-7
    - VATEX-SA-30
    - VATEX-SA-32
    - VATEX-SA-33
    - VATEX-SA-34-1
    - VATEX-SA-34-2
    - VATEX-SA-34-3
    - VATEX-SA-34-4
    - VATEX-SA-34-5
    - VATEX-SA-35
    - VATEX-SA-36
    - VATEX-SA-EDU
    - VATEX-SA-HEA
    - VATEX-SA-MLTRY
    - VATEX-SA-OOS
  - name: custom_uuid
    description: Unique universal identifier for the POS invoice used for external
      system integration and tracking.
  - name: custom_zatca_status
    description: ZATCA (Saudi tax authority) compliance status indicating whether
      the invoice has been successfully submitted, approved, or rejected for e-invoicing.
  - name: title
    description: Display name or identifier for the POS invoice transaction
  - name: naming_series
    description: Prefix pattern used to generate the POS invoice number
    options:
    - ACC-PSINV-.YYYY.-
  - name: customer
    description: The customer who made the purchase in this POS transaction
    join_hint:
      table: tabCustomer
      'on': customer = tabCustomer.name
  - name: customer_name
    description: Name of the customer who made the purchase at the point of sale.
  - name: tax_id
    description: Tax identification number of the customer for tax reporting and compliance
      purposes.
  - name: pos_profile
    description: Configuration profile that determines POS settings like payment methods,
      pricing rules, and warehouse for this transaction.
    join_hint:
      table: tabPOS Profile
      'on': pos_profile = tabPOS Profile.name
  - name: consolidated_invoice
    description: Reference to the master invoice when multiple POS transactions are
      combined into a single consolidated billing document.
    join_hint:
      table: tabSales Invoice
      'on': consolidated_invoice = tabSales Invoice.name
  - name: is_pos
    description: Indicates whether this invoice originated from a point-of-sale transaction
      rather than a standard sales invoice.
  - name: is_return
    description: Indicates whether this invoice represents a product return or refund
      transaction rather than a sale.
  - name: update_billed_amount_in_sales_order
    description: Whether this POS invoice updates the billed amount back to the originating
      sales order for tracking fulfillment progress.
  - name: update_billed_amount_in_delivery_note
    description: Whether this POS invoice updates the billed amount back to the associated
      delivery note for reconciling shipped versus invoiced quantities.
  - name: company
    description: The legal entity or business unit that issued this POS invoice for
      financial reporting and multi-company operations.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: posting_date
    description: Date when the POS invoice transaction is officially recorded in accounting
      books
  - name: posting_time
    description: Time when the POS invoice transaction is officially recorded in accounting
      books
  - name: set_posting_time
    description: Indicates whether the posting date and time were manually specified
      instead of using current timestamp
  - name: due_date
    description: Date when payment for the POS invoice is expected or required from
      the customer.
  - name: amended_from
    description: Reference to the original POS invoice that this document amends or
      corrects.
    join_hint:
      table: tabPOS Invoice
      'on': amended_from = tabPOS Invoice.name
  - name: return_against
    description: Reference to the original POS invoice for which this document represents
      a return or credit.
    join_hint:
      table: tabPOS Invoice
      'on': return_against = tabPOS Invoice.name
  - name: custom_zatca_pos_name
    description: Point of sale terminal or device name for Saudi ZATCA tax compliance
      and invoice tracking.
    join_hint:
      table: tabZATCA Multiple Setting
      'on': custom_zatca_pos_name = tabZATCA Multiple Setting.name
  - name: project
    description: Project associated with this POS invoice for project-based revenue
      tracking and cost allocation.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: cost_center
    description: Cost center assigned to this POS invoice for departmental or location-based
      financial reporting.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: po_no
    description: Purchase order number from the customer used to match invoices to
      customer PO references or track order fulfillment.
  - name: po_date
    description: Date of the customer's purchase order used to identify when the order
      was placed or filter invoices by PO timing.
  - name: customer_address
    description: Billing or shipping address of the customer used to identify invoice
      location, filter by region, or verify delivery details.
    join_hint:
      table: tabAddress
      'on': customer_address = tabAddress.name
  - name: address_display
    description: Formatted billing or shipping address shown on the POS invoice for
      customer delivery or correspondence.
  - name: contact_person
    description: Individual person associated with the customer account for this POS
      transaction.
    join_hint:
      table: tabContact
      'on': contact_person = tabContact.name
  - name: contact_display
    description: Formatted customer or contact name displayed on the POS invoice header.
  - name: contact_mobile
    description: Mobile phone number of the customer for this POS transaction, used
      when searching invoices by customer contact information.
  - name: contact_email
    description: Email address of the customer for this POS transaction, used when
      searching invoices by customer contact details or for receipt delivery.
  - name: territory
    description: Sales territory or geographic region assigned to this POS invoice,
      used for location-based sales analysis and regional performance tracking.
    join_hint:
      table: tabTerritory
      'on': territory = tabTerritory.name
  - name: shipping_address_name
    description: Name of the person or business receiving the shipment at the delivery
      location.
    join_hint:
      table: tabAddress
      'on': shipping_address_name = tabAddress.name
  - name: shipping_address
    description: Full delivery address where the invoice items are shipped to the
      customer.
  - name: company_address
    description: Address of the company issuing the POS invoice, typically the seller's
      business location.
    join_hint:
      table: tabAddress
      'on': company_address = tabAddress.name
  - name: company_address_display
    description: Formatted company address appearing on POS invoices for customer-facing
      documents and receipts.
  - name: company_contact_person
    description: Designated contact person from the company for customer inquiries
      related to this POS invoice.
    join_hint:
      table: tabContact
      'on': company_contact_person = tabContact.name
  - name: currency
    description: Currency in which the POS invoice transaction amounts are denominated
      and processed.
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: Exchange rate applied to convert transaction amounts from price list
      currency to company base currency at time of invoice.
  - name: selling_price_list
    description: Name of the price list used to determine item prices for this POS
      invoice.
    join_hint:
      table: tabPrice List
      'on': selling_price_list = tabPrice List.name
  - name: price_list_currency
    description: Currency in which the selling price list prices are denominated,
      may differ from company base currency.
    join_hint:
      table: tabCurrency
      'on': price_list_currency = tabCurrency.name
  - name: plc_conversion_rate
    description: Exchange rate used to convert price list currency amounts to company
      base currency for this invoice.
  - name: ignore_pricing_rule
    description: Whether promotional discounts, volume pricing, and other automatic
      pricing rules were bypassed for this invoice.
  - name: set_warehouse
    description: Default warehouse location from which all items on this invoice are
      fulfilled or shipped.
    join_hint:
      table: tabWarehouse
      'on': set_warehouse = tabWarehouse.name
  - name: update_stock
    description: Whether this POS invoice automatically updates inventory stock levels
      upon submission.
  - name: scan_barcode
    description: Barcode value scanned at POS to quickly add items to the invoice.
  - name: last_scanned_warehouse
    description: Warehouse from which the most recently scanned item's stock will
      be deducted.
  - name: items
    description: Products or services sold in the point-of-sale transaction with quantities
      and prices
  - name: pricing_rules
    description: Discounts, promotions, or special pricing conditions applied to this
      invoice
  - name: packed_items
    description: Items that have been physically packed or prepared for delivery from
      this sale
  - name: timesheets
    description: References timesheet entries linked to this POS invoice for billing
      labor or service hours.
  - name: total_billing_amount
    description: Final amount charged to the customer including all items, taxes,
      and adjustments on this POS invoice.
  - name: total_qty
    description: Sum of quantities across all line items sold in this POS invoice
      transaction.
