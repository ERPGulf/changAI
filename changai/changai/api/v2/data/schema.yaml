    description: Sales opportunity or lead that originated or is associated with this
      request for quotation.
    join_hint:
      table: tabOpportunity
      'on': opportunity = tabOpportunity.name
  desc_done: true
- table: tabRequest for Quotation Item
  description: ''
  fields:
  - name: name
    description: Unique identifier or title for this specific line item in the request
      for quotation
  - name: item_code
    description: Internal product or material code being requested for quotation from
      suppliers
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: supplier_part_no
    description: Vendor's own part number or SKU for the item being quoted, as provided
      by the supplier
  - name: item_name
    description: The name or title of the product or service being requested for quotation.
  - name: schedule_date
    description: The expected delivery date or timeline when the quoted item should
      be supplied.
  - name: description
    description: Detailed specifications, requirements, or additional information
      about the item being quoted beyond its name.
  - name: item_group
    description: Product category or classification of the requested item for grouping
      similar materials or products together
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: brand
    description: Manufacturer or brand name of the requested item for vendor or quality
      specification purposes
    join_hint:
      table: tabBrand
      'on': brand = tabBrand.name
  - name: image_view
    description: Visual representation or picture of the requested item for identification
      and specification verification
  - name: qty
    description: Quantity of the item being requested from the supplier in the specified
      unit of measurement.
  - name: stock_uom
    description: Standard unit of measurement used for inventory tracking of this
      item in the warehouse.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: uom
    description: Unit of measurement for the quotation request, which may differ from
      the stock unit for purchasing purposes.
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: conversion_factor
    description: Factor used to convert between the requested unit of measure and
      the stock unit of measure for this item.
  - name: stock_qty
    description: Quantity of the item expressed in stock keeping units after applying
      the conversion factor.
  - name: warehouse
    description: Warehouse location where the requested item is expected to be sourced
      or delivered from.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: material_request
    description: Links to the originating material request document that triggered
      this RFQ item, used when tracing procurement back to internal requisitions.
    join_hint:
      table: tabMaterial Request
      'on': material_request = tabMaterial Request.name
  - name: material_request_item
    description: References the specific line item from the material request that
      corresponds to this RFQ item, used for detailed item-level traceability.
  - name: project_name
    description: Identifies the project this RFQ item will be charged to or used for,
      relevant when filtering procurement by project or analyzing project-specific
      purchasing.
    join_hint:
      table: tabProject
      'on': project_name = tabProject.name
  - name: page_break
    description: Indicates whether a page break should occur before this item when
      printing the request for quotation document.
  desc_done: true
- table: tabRequest for Quotation Supplier
  description: ''
  fields:
  - name: name
    description: name
  - name: supplier
    description: The vendor or company being asked to provide a price quote.
    join_hint:
      table: tabSupplier
      'on': supplier = tabSupplier.name
  - name: contact
    description: The specific person at the supplier organization who is the point
      of contact for this quotation request.
    join_hint:
      table: tabContact
      'on': contact = tabContact.name
  - name: quote_status
    description: Current status of the supplier's quotation response such as pending,
      submitted, accepted, or rejected.
    options:
    - Pending
    - Received
  - name: supplier_name
    description: Name of the supplier invited to provide a quotation for the request.
  - name: email_id
    description: Email address of the supplier contact for quotation communication
      and submission.
  - name: send_email
    description: Whether to send email notification to this supplier for the quotation
      request.
  - name: email_sent
    description: Whether the email notification has already been sent to this supplier.
  desc_done: true
- table: tabReview Level
  description: ''
  fields:
  - name: name
    description: Unique identifier for the review level used when filtering or grouping
      approval hierarchies.
  - name: level_name
    description: Display name of the review level used when searching for specific
      approval stages in workflows.
  - name: role
    description: Role or position assigned to this review level used when determining
      who can approve at each stage.
    join_hint:
      table: tabRole
      'on': role = tabRole.name
  - name: review_points
    description: Points or score assigned during a review level evaluation, used when
      querying performance ratings or approval thresholds
  desc_done: true
- table: tabRole Permission for Page and Report
  description: ''
  fields:
  - name: name
    description: Name or identifier of the role that has permissions assigned
  - name: set_role_for
    description: Indicates whether the permission applies to a page or report
    options:
    - Page
    - Report
  - name: page
    description: The specific page or report name that the role has access to
    join_hint:
      table: tabPage
      'on': page = tabPage.name
  - name: report
    description: The specific page or report name that permissions are being granted
      for.
    join_hint:
      table: tabReport
      'on': report = tabReport.name
  - name: enable_prepared_report
    description: Whether the role has permission to access or generate prepared versions
      of the report.
  - name: roles
    description: The role or roles that have been granted access permissions to the
      page or report.
  desc_done: true
- table: tabRole Profile
  description: ''
  fields:
  - name: name
    description: Name or title of the role profile used to identify and reference
      it in queries about user permissions and access configurations
  - name: role_profile
    description: Unique identifier code for the role profile used when searching by
      specific profile ID rather than descriptive name
  - name: roles
    description: List of individual roles assigned to this profile, relevant when
      querying which specific role permissions are grouped together
  desc_done: true
- table: tabRoute History
  description: ''
  fields:
  - name: name
    description: Identifies the specific route history record for tracking changes
      and auditing route modifications over time.
  - name: route
    description: Links to the route being tracked, used when analyzing route changes,
      modifications, or historical route configurations.
  - name: user
    description: Identifies who made the route change, essential for audit trails
      and accountability questions about route modifications.
    join_hint:
      table: tabUser
      'on': user = tabUser.name
  desc_done: true
- table: tabRouting
  description: ''
  fields:
  - name: name
    description: Unique identifier code for the routing record
  - name: routing_name
    description: Descriptive display name of the routing used in manufacturing operations
      and work orders
  - name: disabled
    description: Indicates whether this routing is currently inactive and unavailable
      for use in production
  - name: operations
    description: Manufacturing operations or steps required to produce an item, including
      work centers, sequence, and process details.
  desc_done: true
- table: tabS3 Backup Settings
  description: ''
  fields:
  - name: name
    description: Identifier or label for the S3 backup configuration
  - name: enabled
    description: Whether the S3 backup is currently active or turned on
  - name: access_key_id
    description: AWS access key credential used to authenticate S3 backup operations
  - name: secret_access_key
    description: AWS secret key credential for authenticating S3 backup operations.
  - name: notify_email
    description: Email address to receive backup notifications and alerts.
  - name: send_email_for_successful_backup
    description: Whether to send email notifications when backups complete successfully,
      not just on failures.
  - name: bucket
    description: S3 bucket name where backup files are stored
  - name: endpoint_url
    description: S3 service endpoint URL for connecting to the storage provider
  - name: backup_path
    description: Directory path or prefix within the bucket where backups are organized
  - name: frequency
    description: How often S3 backups run, such as daily, weekly, or hourly schedules.
    options:
    - Daily
    - Weekly
    - Monthly
    - None
  - name: backup_files
    description: List or count of files included in or produced by the S3 backup operation.
  desc_done: true
- table: tabSLA Fulfilled On Status
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the SLA fulfillment status record
  - name: status
    description: Current state indicating whether the SLA was met, missed, or is pending
  desc_done: true
- table: tabSMS Center
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the SMS message or campaign
  - name: send_to
    description: Mobile phone number or recipient identifier where the SMS will be
      delivered
    options:
    - All Contact
    - All Customer Contact
    - All Supplier Contact
    - All Sales Partner Contact
    - All Lead (Open)
    - All Employee (Active)
    - All Sales Person
  - name: customer
    description: Customer account linked to this SMS for tracking communication history
      or targeted messaging
    join_hint:
      table: tabCustomer
      'on': customer = tabCustomer.name
  - name: supplier
    description: Vendor or supplier associated with the SMS communication for purchase-related
      messaging.
    join_hint:
      table: tabSupplier
      'on': supplier = tabSupplier.name
  - name: sales_partner
    description: External sales partner or distributor linked to the SMS for partner
      communication tracking.
    join_hint:
      table: tabSales Partner
      'on': sales_partner = tabSales Partner.name
  - name: department
    description: Internal department responsible for or associated with the SMS message.
    join_hint:
      table: tabDepartment
      'on': department = tabDepartment.name
  - name: branch
    description: Branch or location associated with the SMS being sent or received.
    join_hint:
      table: tabBranch
      'on': branch = tabBranch.name
  - name: receiver_list
    description: List of phone numbers or contacts who will receive or have received
      the SMS.
  - name: message
    description: Text content of the SMS being sent or that was sent.
  - name: total_characters
    description: Character count of SMS content, relevant for queries about message
      length, character limits, or SMS billing calculations.
  - name: total_messages
    description: Number of SMS messages sent or processed, used for volume tracking,
      delivery counts, and messaging activity analysis.
  desc_done: true
- table: tabSMS Log
  description: ''
  fields:
  - name: name
    description: Unique identifier or reference code for the SMS log entry
  - name: sender_name
    description: Name of the person or system that sent the SMS message
  - name: sent_on
    description: Date and time when the SMS message was actually sent
  - name: message
    description: Text content of the SMS that was sent or attempted to be sent.
  - name: no_of_requested_sms
    description: Count of SMS messages requested to be sent in this transaction.
  - name: requested_numbers
    description: Phone numbers to which the SMS was requested to be delivered.
  - name: no_of_sent_sms
    description: Count of SMS messages sent in this log entry, used when querying
      total or aggregated message volumes.
  - name: sent_to
    description: Recipient phone number or contact identifier for the SMS, used when
      searching for messages sent to specific recipients.
  desc_done: true
- table: tabSMS Parameter
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the SMS parameter configuration entry
  - name: parameter
    description: The specific SMS setting or configuration option being defined (e.g.,
      sender ID, API endpoint, timeout)
  - name: value
    description: The assigned value or setting for the corresponding SMS parameter
  - name: header
    description: SMS message header or sender name displayed to recipients when sending
      SMS notifications or alerts
  desc_done: true
- table: tabSMS Settings
  description: ''
  fields:
  - name: name
    description: Unique identifier for the SMS settings configuration used when referencing
      or selecting specific SMS provider setups.
  - name: sms_gateway_url
    description: API endpoint URL for the SMS gateway service used when configuring
      outbound SMS message routing.
  - name: message_parameter
    description: Parameter name expected by the SMS gateway API for the message body
      content used when formatting SMS requests.
  - name: receiver_parameter
    description: Parameter name used to specify the recipient phone number when sending
      SMS messages through the configured gateway
  - name: parameters
    description: Additional configuration parameters required by the SMS gateway provider
      for authentication and message delivery
  - name: use_post
    description: Whether to send SMS requests using HTTP POST method instead of GET
      when communicating with the gateway
  desc_done: true
- table: tabSales Invoice
  description: ''
  fields:
  - name: name
    description: Unique identifier for the sales invoice used in queries about specific
      invoice numbers or invoice lookups
  - name: custom_ksa_einvoicing_xml
    description: XML data for Saudi Arabia e-invoicing compliance used when querying
      KSA tax authority submission requirements or ZATCA integration
  - name: title
    description: Customer or account name associated with the invoice used when searching
      invoices by customer identity
  - name: naming_series
    description: Prefix pattern for invoice numbering used when searching by invoice
      number format or series
    options:
    - ACC-SINV-.YYYY.-
    - ACC-SINV-RET-.YYYY.-
  - name: customer
    description: Customer name or ID who is being billed, used when querying invoices
      by customer
    join_hint:
      table: tabCustomer
      'on': customer = tabCustomer.name
  - name: custom_b2c
    description: Indicates whether this is a business-to-consumer transaction, used
      to filter retail vs business sales
  - name: customer_name
    description: Name of the customer who is being invoiced for goods or services
      sold.
  - name: tax_id
    description: Tax identification number of the customer for tax reporting and compliance
      purposes.
  - name: company
    description: The company entity that issued this sales invoice, relevant when
      operating multiple legal entities or subsidiaries.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: company_tax_id
    description: Tax identification number of the company issuing the sales invoice
      for tax compliance and reporting.
  - name: posting_date
    description: Date when the sales invoice was officially recorded in the accounting
      books, used for financial period analysis and revenue recognition.
  - name: posting_time
    description: Time when the sales invoice was posted to the accounting system,
      used for precise transaction sequencing and audit trails.
  - name: set_posting_time
    description: Indicates whether the invoice posting date and time were manually
      specified rather than automatically set at creation.
  - name: due_date
    description: The date by which payment for the invoice is expected or required
      from the customer.
  - name: custom_uuid
    description: A unique identifier for the sales invoice used for external system
      integration or custom tracking purposes.
  - name: custom_zatca_status
    description: Status of the invoice submission to ZATCA (Saudi Arabian tax authority)
      for e-invoicing compliance.
  - name: is_pos
    description: Indicates whether this invoice was created through a point-of-sale
      system rather than standard invoicing.
  - name: pos_profile
    description: The specific point-of-sale configuration or terminal profile used
      when creating this POS invoice.
    join_hint:
      table: tabPOS Profile
      'on': pos_profile = tabPOS Profile.name
  - name: is_consolidated
    description: Indicates whether this sales invoice combines multiple shipments
      or delivery notes into a single invoice.
  - name: is_return
    description: Indicates whether this sales invoice represents a customer return
      or credit note transaction.
  - name: return_against
    description: References the original sales invoice document that this return invoice
      is issued against.
    join_hint:
      table: tabSales Invoice
      'on': return_against = tabSales Invoice.name
  - name: update_outstanding_for_self
    description: Whether this invoice automatically updates its own outstanding amount
      when payments are received or credit notes are applied
  - name: update_billed_amount_in_sales_order
    description: Whether this invoice automatically updates the billed amount in the
      linked sales order when posted
  - name: update_billed_amount_in_delivery_note
    description: Whether this invoice automatically updates the billed amount in the
      linked delivery note when posted
  - name: is_debit_note
    description: Indicates whether this invoice is a debit note used to increase the
      amount owed by the customer due to additional charges or corrections.
  - name: amended_from
    description: References the original sales invoice that this document amends or
      corrects.
    join_hint:
      table: tabSales Invoice
      'on': amended_from = tabSales Invoice.name
  - name: custom_zatca_third_party_invoice
    description: Indicates whether this invoice involves a third party for Saudi ZATCA
      e-invoicing compliance purposes.
  - name: custom_zatca_nominal_invoice
    description: Indicates if this is a ZATCA-compliant nominal invoice for Saudi
      Arabia tax authority reporting purposes.
  - name: custom_zatca_export_invoice
    description: Indicates if this is a ZATCA-compliant export invoice for goods or
      services sold outside Saudi Arabia.
  - name: custom_summary_invoice
    description: Indicates if this is a summary invoice consolidating multiple transactions
      into a single billing document.
  - name: custom_self_billed_invoice
    description: Indicates whether the invoice was created by the buyer on behalf
      of the supplier rather than by the supplier themselves.
  - name: custom_user_invoice_number
    description: User-defined invoice number that differs from the system invoice
      number, often used for custom numbering schemes or external reference requirements.
  - name: custom_zatca_tax_category
    description: Saudi Arabia ZATCA tax classification code determining the applicable
      VAT treatment and reporting category for the invoice.
    options:
    - Standard
    - Zero Rated
    - Exempted
    - Services outside scope of tax / Not subject to VAT
  - name: custom_exemption_reason_code
    description: Code indicating why the invoice is exempt from tax or specific regulations.
    options:
    - Standard 15%
    - VATEX-SA-29
    - VATEX-SA-29-7
    - VATEX-SA-30
    - VATEX-SA-32
    - VATEX-SA-33
    - VATEX-SA-34-1
    - VATEX-SA-34-2
    - VATEX-SA-34-3
    - VATEX-SA-34-4
    - VATEX-SA-34-5
    - VATEX-SA-35
    - VATEX-SA-36
    - VATEX-SA-EDU
    - VATEX-SA-HEA
    - VATEX-SA-MLTRY
    - VATEX-SA-OOS
  - name: custom_zatca_discount_reason_code
    description: ZATCA-compliant code specifying the reason for applying a discount
      on the invoice.
  - name: custom_zatca_discount_reason
    description: Text description explaining why a discount was applied, for ZATCA
      compliance reporting.
  - name: custom_submit_line_item_discount_to_zatca
    description: Whether line item discounts are submitted to ZATCA (Saudi tax authority)
      for this sales invoice.
  - name: cost_center
    description: Cost center assigned to the sales invoice for financial tracking
      and allocation purposes.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: Project associated with the sales invoice for tracking revenue and
      costs by project.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: currency
    description: Currency in which the sales invoice total and line items are denominated
      and billed to the customer.
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: Exchange rate applied to convert foreign currency amounts to the
      company's base currency for this invoice.
  - name: selling_price_list
    description: Price list used to determine item rates and pricing rules applied
      when creating this sales invoice.
    join_hint:
      table: tabPrice List
      'on': selling_price_list = tabPrice List.name
  - name: price_list_currency
    description: Currency in which the price list is denominated, relevant when analyzing
      sales in original price list currency rather than transaction or company currency.
    join_hint:
      table: tabCurrency
      'on': price_list_currency = tabCurrency.name
  - name: plc_conversion_rate
    description: Exchange rate used to convert from price list currency to transaction
      currency, relevant when reconciling pricing differences across currencies.
  - name: ignore_pricing_rule
    description: Indicates whether automatic pricing rules were bypassed for this
      invoice, relevant when identifying manual pricing overrides or exceptions.
  - name: scan_barcode
    description: Barcode scanned during sales invoice processing for item identification
      and tracking.
  - name: update_stock
    description: Indicates whether this sales invoice triggers automatic inventory
      stock level reduction.
  - name: last_scanned_warehouse
    description: Warehouse location where the barcode was most recently scanned during
      invoice fulfillment.
  - name: set_warehouse
    description: Warehouse location from which all invoice items are delivered or
      sourced when user asks about fulfillment origin or stock depletion location
      for the entire sales invoice.
    join_hint:
      table: tabWarehouse
      'on': set_warehouse = tabWarehouse.name
  - name: set_target_warehouse
    description: Destination warehouse for stock transfers or inter-warehouse sales
      when user asks where goods are being moved or delivered to at the warehouse
      level.
    join_hint:
      table: tabWarehouse
      'on': set_target_warehouse = tabWarehouse.name
  - name: items
    description: Line items on the sales invoice including products sold, quantities,
      prices, and item-level details when user asks what was sold or invoice composition.
  - name: total_qty
    description: Total quantity of all items sold in the invoice, used when asking
      about units or volume sold.
  - name: total_net_weight
    description: Combined net weight of all items in the invoice, used when asking
      about shipping weight or physical mass of goods sold.
  - name: base_total
    description: Invoice subtotal in company's base currency before taxes and discounts,
      used when asking about pre-tax revenue or base amounts.
  - name: base_net_total
    description: Net total amount in company's base currency, used when analyzing
      sales across multiple currencies or for consolidated financial reporting.
  - name: total
    description: Final invoice amount including all taxes and charges, used when asking
      about the actual amount customer must pay.
  - name: net_total
    description: Invoice subtotal before taxes and additional charges in transaction
      currency, used when analyzing pre-tax sales revenue.
  - name: tax_category
    description: Tax classification determining which tax rates apply to the invoice
      based on customer type, location, or product category.
    join_hint:
      table: tabTax Category
      'on': tax_category = tabTax Category.name
  - name: taxes_and_charges
    description: Specific tax template or configuration defining the actual tax rates,
      accounts, and calculation rules applied to this invoice.
    join_hint:
      table: tabSales Taxes and Charges Template
      'on': taxes_and_charges = tabSales Taxes and Charges Template.name
  - name: shipping_rule
    description: Shipping cost calculation rule applied to determine freight charges
      based on order value, weight, or destination.
    join_hint:
      table: tabShipping Rule
      'on': shipping_rule = tabShipping Rule.name
  - name: incoterm
    description: International commercial term defining delivery responsibility and
      cost allocation between buyer and seller (e.g., FOB, CIF, EXW).
    join_hint:
      table: tabIncoterm
      'on': incoterm = tabIncoterm.name
  - name: named_place
    description: Specific geographic location associated with the incoterm where risk
      and cost transfer occurs.
  - name: taxes
    description: Total tax amount charged on the sales invoice including all applicable
      tax types.
  - name: base_total_taxes_and_charges
    description: Total amount of all taxes and charges in company's base currency,
      used when analyzing tax amounts across invoices with different transaction currencies.
  - name: total_taxes_and_charges
    description: Total amount of all taxes and charges in the invoice's transaction
      currency, used when reviewing tax amounts as they appear to the customer.
  - name: base_grand_total
    description: Final invoice amount including all items, taxes, and charges in company's
      base currency, used for financial reporting and cross-currency invoice analysis.
  - name: base_rounding_adjustment
    description: Amount added or subtracted to round the invoice total to the nearest
      whole number in base currency.
  - name: base_rounded_total
    description: Final invoice total after applying rounding adjustment in base currency.
  - name: base_in_words
    description: Text representation of the base currency invoice total amount spelled
      out in words for printing on documents.
  - name: grand_total
    description: Final total amount payable by customer after all taxes, discounts,
      and adjustments including rounding.
  - name: rounding_adjustment
    description: Amount added or subtracted to round the invoice total to nearest
      currency unit.
  - name: use_company_roundoff_cost_center
    description: Whether rounding adjustment amounts are allocated to the default
      company-level cost center instead of invoice line item cost centers.
  - name: rounded_total
    description: Final invoice amount after applying rounding adjustments to the grand
      total
  - name: in_words
    description: Grand total amount expressed as text words for printing on invoice
      documents
  - name: total_advance
    description: Sum of all advance payments received from customer prior to this
      invoice
  - name: outstanding_amount
    description: Remaining unpaid balance on the invoice after accounting for payments
      and credits
  - name: disable_rounded_total
    description: Whether invoice total rounding is turned off for this transaction
  - name: apply_discount_on
    description: Specifies whether discounts are calculated on grand total or net
      total before taxes
    options:
    - Grand Total
    - Net Total
  - name: base_discount_amount
    description: Discount amount in base currency before taxes and additional discounts,
      used when calculating total invoice value or analyzing discount trends.
  - name: is_cash_or_non_trade_discount
    description: Indicates whether the discount is a cash/prompt payment discount
      or non-trade discount rather than a standard trade discount, relevant for accounting
      classification and payment term analysis.
  - name: additional_discount_account
    description: General ledger account where additional discounts beyond standard
      trade discounts are posted, used when tracking discount expenses or reconciling
      discount accounting entries.
    join_hint:
      table: tabAccount
      'on': additional_discount_account = tabAccount.name
  - name: additional_discount_percentage
    description: Percentage discount applied to the entire invoice total after line-item
      discounts, used when users ask about overall invoice-level discount rates or
      additional discounts beyond item discounts.
  - name: discount_amount
    description: Absolute monetary value of total discounts on the invoice, used when
      users ask about the dollar amount of discounts given rather than percentages.
  - name: other_charges_calculation
    description: Formula or method used to calculate miscellaneous charges like shipping,
      handling, or fees added to the invoice, relevant when users ask how additional
      charges are computed.
  - name: pricing_rules
    description: Pricing rules or discounts applied to this sales invoice affecting
      item rates or totals.
  - name: packed_items
    description: Items that have been physically packed or prepared for delivery against
      this sales invoice.
  - name: timesheets
    description: Timesheet entries linked to this sales invoice for billing time-based
      services or labor hours.
  - name: total_billing_hours
    description: Total hours billed on this sales invoice, used when analyzing time-based
      billing or hourly service revenue.
  - name: total_billing_amount
    description: Total monetary amount billed on this sales invoice, used when querying
      invoice totals, revenue, or amounts owed by customers.
  - name: cash_bank_account
    description: Bank account designated for cash payments related to this sales invoice,
      used when tracking which account received or will receive payment.
    join_hint:
      table: tabAccount
      'on': cash_bank_account = tabAccount.name
  - name: payments
    description: Total amount received from customer payments applied to this invoice
  - name: base_paid_amount
    description: Amount paid in company's default accounting currency for multi-currency
      reporting
  - name: paid_amount
    description: Amount paid in the invoice's transaction currency
  - name: base_change_amount
    description: Change amount returned to customer in base currency when payment
      exceeds invoice total.
  - name: change_amount
    description: Change amount returned to customer in transaction currency when payment
      exceeds invoice total.
  - name: account_for_change_amount
    description: General ledger account where change amounts returned to customers
      are posted.
    join_hint:
      table: tabAccount
      'on': account_for_change_amount = tabAccount.name
  - name: allocate_advances_automatically
    description: Whether advance payments are automatically applied to this invoice
      without manual allocation
  - name: only_include_allocated_payments
    description: Whether to restrict payment display or processing to payments that
      have been explicitly allocated to this invoice
  - name: advances
    description: Advance payments received from the customer that can be applied against
      this invoice amount
  - name: write_off_amount
    description: Amount written off from the invoice in transaction currency when
      closing with a small remaining balance or bad debt.
  - name: base_write_off_amount
    description: Amount written off from the invoice converted to company base currency
      for consolidated reporting.
  - name: write_off_outstanding_amount_automatically
    description: Whether the system automatically writes off small remaining balances
      when the invoice is marked as paid.
  - name: write_off_account
    description: Account used when writing off small differences or rounding amounts
      on the invoice.
    join_hint:
      table: tabAccount
      'on': write_off_account = tabAccount.name
  - name: write_off_cost_center
    description: Cost center assigned to track write-off amounts for budgeting and
      financial analysis.
    join_hint:
      table: tabCost Center
      'on': write_off_cost_center = tabCost Center.name
  - name: redeem_loyalty_points
    description: Indicates whether customer loyalty points were redeemed as payment
      on this invoice.
  - name: loyalty_points
    description: Points earned or redeemed by the customer on this sales invoice transaction.
  - name: loyalty_amount
    description: Monetary value equivalent of loyalty points for this sales invoice.
  - name: loyalty_program
    description: Name or identifier of the loyalty program applied to this sales invoice.
    join_hint:
      table: tabLoyalty Program
      'on': loyalty_program = tabLoyalty Program.name
  - name: loyalty_redemption_account
    description: Accounting ledger account where loyalty points redeemed by the customer
      on this invoice are recorded as expense or contra-revenue.
    join_hint:
      table: tabAccount
      'on': loyalty_redemption_account = tabAccount.name
  - name: loyalty_redemption_cost_center
    description: Cost center allocated for tracking loyalty point redemptions applied
      to this invoice.
    join_hint:
      table: tabCost Center
      'on': loyalty_redemption_cost_center = tabCost Center.name
  - name: customer_address
    description: Billing or primary address of the customer associated with this sales
      invoice.
    join_hint:
      table: tabAddress
      'on': customer_address = tabAddress.name
  - name: address_display
    description: Formatted billing or shipping address shown on the sales invoice
      for customer correspondence and delivery purposes.
  - name: contact_person
    description: Individual person at the customer organization responsible for or
      associated with this sales invoice transaction.
    join_hint:
      table: tabContact
      'on': contact_person = tabContact.name
  - name: contact_display
    description: Formatted display name and details of the customer contact shown
      on the sales invoice.
  - name: contact_mobile
    description: Mobile phone number of the customer contact for this sales invoice
  - name: contact_email
    description: Email address of the customer contact for this sales invoice
  - name: territory
    description: Geographic sales territory or region assigned to this sales invoice
    join_hint:
      table: tabTerritory
      'on': territory = tabTerritory.name
  - name: shipping_address_name
    description: Name of the location or recipient where goods are to be delivered
      to the customer.
    join_hint:
      table: tabAddress
      'on': shipping_address_name = tabAddress.name
  - name: shipping_address
    description: Full address details where goods are to be delivered to the customer.
  - name: dispatch_address_name
    description: Name of the warehouse or location from which goods are shipped out.
    join_hint:
      table: tabAddress
      'on': dispatch_address_name = tabAddress.name
  - name: dispatch_address
    description: Address from which goods are shipped or dispatched to the customer
      for this sales invoice.
  - name: company_address
    description: Company's address used as the billing or legal address on this sales
      invoice.
    join_hint:
      table: tabAddress
      'on': company_address = tabAddress.name
  - name: company_address_display
    description: Formatted display version of the company address shown on the printed
      or rendered sales invoice.
  - name: company_contact_person
    description: Contact person representing the company issuing the sales invoice,
      used when identifying who from the seller's organization is responsible for
      the transaction.
    join_hint:
      table: tabContact
      'on': company_contact_person = tabContact.name
  - name: ignore_default_payment_terms_template
    description: Indicates whether to bypass the standard payment terms template for
      this specific sales invoice.
  - name: payment_terms_template
    description: Template defining payment conditions and schedules applied to this
      sales invoice, such as net 30 or installment terms.
    join_hint:
      table: tabPayment Terms Template
      'on': payment_terms_template = tabPayment Terms Template.name
  - name: payment_schedule
    description: Payment plan or installment schedule defining when and how invoice
      payments are due over time
  - name: tc_name
    description: Name of the terms and conditions template or agreement applied to
      this sales invoice
    join_hint:
      table: tabTerms and Conditions
      'on': tc_name = tabTerms and Conditions.name
  - name: terms
    description: Payment terms specifying the due date calculation such as net 30,
      due on receipt, or end of month
  - name: po_no
    description: Customer's purchase order number referenced when matching invoices
      to customer PO documents or tracking which customer order triggered the sale.
  - name: po_date
    description: Date on the customer's purchase order, used when verifying order
      timing or reconciling invoice dates against customer PO dates.
  - name: debit_to
    description: Accounts receivable ledger account debited for this invoice, used
      when identifying which customer account or receivable account was charged.
    join_hint:
      table: tabAccount
      'on': debit_to = tabAccount.name
  - name: party_account_currency
    description: Currency in which the customer's account balance is maintained, relevant
      when analyzing foreign currency transactions or customer-specific currency exposure.
    join_hint:
      table: tabCurrency
      'on': party_account_currency = tabCurrency.name
  - name: is_opening
    description: Indicates whether this sales invoice is an opening balance entry
      from a prior accounting period, used to filter out historical migration data.
    options:
    - 'No'
    - 'Yes'
  - name: unrealized_profit_loss_account
    description: Account where unrealized gains or losses from foreign exchange rate
      changes on this invoice are recorded before payment settlement.
    join_hint:
      table: tabAccount
      'on': unrealized_profit_loss_account = tabAccount.name
  - name: against_income_account
    description: Income account credited when posting this sales invoice revenue.
  - name: sales_partner
    description: External partner or affiliate who referred or facilitated this sale.
    join_hint:
      table: tabSales Partner
      'on': sales_partner = tabSales Partner.name
  - name: amount_eligible_for_commission
    description: Portion of invoice amount qualifying for commission calculation to
      sales partner or team.
  - name: commission_rate
    description: Percentage rate applied to calculate sales commission for this invoice.
  - name: total_commission
    description: Total commission amount earned from this invoice across all sales
      team members.
  - name: sales_team
    description: Sales team or group responsible for or credited with this invoice
      sale.
  - name: letter_head
    description: Letterhead template used when printing or emailing this sales invoice
    join_hint:
      table: tabLetter Head
      'on': letter_head = tabLetter Head.name
  - name: group_same_items
    description: Whether identical items are consolidated into single lines when printing
      this invoice
  - name: select_print_heading
    description: Custom heading text that appears on the printed sales invoice instead
      of the default title
    join_hint:
      table: tabPrint Heading
      'on': select_print_heading = tabPrint Heading.name
  - name: language
    description: Language code for the invoice document, relevant when filtering invoices
      by customer language preference or generating localized reports.
  - name: subscription
    description: Links invoice to a recurring subscription contract, used to identify
      subscription-based revenue versus one-time sales.
    join_hint:
      table: tabSubscription
      'on': subscription = tabSubscription.name
  - name: from_date
    description: Start date of the billing period covered by this invoice, particularly
      for subscription or service-based invoices spanning a date range.
  - name: auto_repeat
    description: Linked recurring invoice schedule that automatically generates this
      sales invoice at specified intervals.
    join_hint:
      table: tabAuto Repeat
      'on': auto_repeat = tabAuto Repeat.name
  - name: to_date
    description: End date of the billing period or service delivery timeframe covered
      by this sales invoice.
  - name: status
    description: Current state of the sales invoice such as draft, submitted, paid,
      unpaid, overdue, cancelled, or returned.
    options:
    - Draft
    - Return
    - Credit Note Issued
    - Submitted
    - Paid
    - Partly Paid
    - Unpaid
    - Unpaid and Discounted
    - Partly Paid and Discounted
    - Overdue and Discounted
    - Overdue
    - Cancelled
    - Internal Transfer
  - name: inter_company_invoice_reference
    description: Links to the corresponding invoice in another company entity when
      this invoice is part of an inter-company transaction between related legal entities.
    join_hint:
      table: tabPurchase Invoice
      'on': inter_company_invoice_reference = tabPurchase Invoice.name
  - name: campaign
    description: Marketing campaign associated with this sales invoice to track revenue
      attribution and campaign effectiveness.
    join_hint:
      table: tabCampaign
      'on': campaign = tabCampaign.name
  - name: represents_company
    description: The company entity that this invoice legally represents when operating
      in a multi-company or franchise structure.
    join_hint:
      table: tabCompany
      'on': represents_company = tabCompany.name
  - name: source
    description: Identifies the origin or channel through which the sales invoice
      was created, such as web, POS, or API integration.
    join_hint:
      table: tabLead Source
      'on': source = tabLead Source.name
  - name: customer_group
    description: Categorizes the customer into a segment or classification for pricing,
      discounts, or reporting purposes.
    join_hint:
      table: tabCustomer Group
      'on': customer_group = tabCustomer Group.name
  - name: custom_zatca_full_response
    description: Contains the complete response from ZATCA (Saudi tax authority) e-invoicing
      system for compliance and audit verification.
  - name: is_internal_customer
    description: Whether the invoice is for an internal customer or inter-company
      transaction rather than an external third-party customer.
  - name: is_discounted
    description: Whether any discount has been applied to the invoice, useful for
      filtering invoices with or without discounts.
  - name: remarks
    description: Additional notes or comments about the sales invoice such as special
      instructions, delivery notes, or payment terms.
  - name: custom_zatca_pos_name
    description: Point of sale terminal or device name for Saudi ZATCA e-invoicing
      compliance and tax reporting.
    join_hint:
      table: tabZATCA Multiple Setting
      'on': custom_zatca_pos_name = tabZATCA Multiple Setting.name
  desc_done: true
- table: tabSales Invoice Advance
  description: ''
  fields:
  - name: name
    description: Unique identifier for the sales invoice advance record
  - name: reference_type
    description: Type of document linked to this advance payment such as Sales Order
      or Payment Entry
    join_hint:
      table: tabDocType
      'on': reference_type = tabDocType.name
  - name: reference_name
    description: Specific document number or ID of the referenced transaction that
      this advance is allocated against
  - name: remarks
    description: Comments or notes explaining the reason for or details about the
      advance payment allocation.
  - name: reference_row
    description: Links to the specific row in the referenced advance document being
      allocated against this invoice.
  - name: advance_amount
    description: The monetary value of the advance payment being applied or allocated
      to this sales invoice.
  - name: allocated_amount
    description: Amount of advance payment that has been applied or allocated against
      the sales invoice.
  - name: exchange_gain_loss
    description: Gain or loss resulting from currency exchange rate differences between
      advance payment and invoice allocation.
  - name: ref_exchange_rate
    description: Exchange rate used to convert the advance payment currency to the
      invoice currency at time of allocation.
  - name: difference_posting_date
    description: Date when the difference amount between advance payment and actual
      invoice is posted to accounting ledger.
  desc_done: true
- table: tabSales Invoice Item
  description: ''
  fields:
  - name: name
    description: Unique identifier or code for the sales invoice item line
  - name: barcode
    description: Barcode value scanned or associated with the item at point of sale
  - name: has_item_scanned
    description: Indicates whether the item was added by scanning a barcode versus
      manual entry
  - name: item_code
    description: Internal product identifier used when asking about specific items
      sold, inventory SKUs, or product performance in sales.
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: item_name
    description: Product or service name as it appears on the sales invoice, used
      when searching by product description rather than code.
  - name: customer_item_code
    description: Customer's own product identifier for the item, used when customers
      reference their internal part numbers or SKUs in sales inquiries.
  - name: description
    description: Text description of the specific product or service sold on this
      invoice line item
  - name: item_group
    description: Product category or classification for grouping similar items in
      sales analysis
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: brand
    description: Manufacturer or brand name of the product sold
  - name: image_view
    description: Visual representation of the invoiced item for verification or display
      purposes in sales documents.
  - name: qty
    description: Quantity of the item sold on this invoice line, used when asking
      about units sold or invoice volume.
  - name: stock_uom
    description: Unit of measurement for the item quantity (e.g., pieces, kg, liters),
      used when specifying or filtering by measurement units.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: uom
    description: Unit of measurement for the item quantity on the sales invoice line
      (e.g., boxes, kilograms, pieces).
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: conversion_factor
    description: Multiplier to convert the invoice line item quantity from the transaction
      UOM to the base stock UOM.
  - name: stock_qty
    description: Quantity of the item in base stock units after applying the conversion
      factor from the transaction UOM.
  - name: price_list_rate
    description: Item's standard selling price from the price list in transaction
      currency before any discounts or margin adjustments.
  - name: base_price_list_rate
    description: Item's standard selling price from the price list converted to company's
      base currency.
  - name: margin_type
    description: Whether profit margin is calculated as a percentage or fixed amount
      on this line item.
    options:
    - Percentage
    - Amount
  - name: margin_rate_or_amount
    description: Profit margin added to base cost, used when calculating selling price
      from cost price or analyzing markup on items sold.
  - name: rate_with_margin
    description: Final item rate after applying margin to base cost, used when querying
      actual selling price including markup before discounts.
  - name: discount_percentage
    description: Percentage discount applied to item price, used when analyzing price
      reductions or promotional discounts given to customers.
  - name: discount_amount
    description: Direct discount applied to this invoice line item, used when calculating
      item-level price reductions or promotional discounts.
  - name: distributed_discount_amount
    description: Portion of invoice-level or header discount allocated to this line
      item, used when analyzing how document-wide discounts affect individual items.
  - name: base_rate_with_margin
    description: Item rate including profit margin before discounts, used when analyzing
      markup or comparing selling price to cost.
  - name: rate
    description: Unit price per item on the sales invoice line before applying quantity
      or discounts.
  - name: amount
    description: Total line item value after multiplying rate by quantity and applying
      any item-level discounts.
  - name: item_tax_template
    description: Tax rule or template applied to calculate taxes for this specific
      invoice line item.
    join_hint:
      table: tabItem Tax Template
      'on': item_tax_template = tabItem Tax Template.name
  - name: base_rate
    description: Unit price in company's base currency before any discounts, taxes,
      or currency conversion.
  - name: base_amount
    description: Total line amount in company's base currency (base_rate × quantity)
      before discounts and taxes.
  - name: pricing_rules
    description: Applied promotional or tiered pricing rules that determined the final
      rate for this item.
  - name: stock_uom_rate
    description: Rate per stock unit of measure when the item is sold in a different
      UOM than the base stock UOM.
  - name: is_free_item
    description: Indicates whether this item was given at no charge as part of a promotion
      or bundle.
  - name: grant_commission
    description: Indicates whether sales commission should be calculated and paid
      for this particular item.
  - name: net_rate
    description: Price per unit after applying item-level discounts but before taxes,
      used when asking about discounted unit pricing or margin calculations.
  - name: net_amount
    description: Total line item value after item-level discounts but before taxes,
      used when asking about discounted line totals or pre-tax revenue.
  - name: base_net_rate
    description: Price per unit after item-level discounts in company's base currency,
      used for multi-currency reporting or consolidated financial analysis.
  - name: base_net_amount
    description: Net invoice line amount in company base currency, used when analyzing
      revenue or invoice totals across multiple currencies.
  - name: delivered_by_supplier
    description: Indicates whether the item was shipped directly from supplier to
      customer in a drop-shipping scenario.
  - name: income_account
    description: General ledger revenue account where this invoice line item's income
      is recorded for financial reporting.
    join_hint:
      table: tabAccount
      'on': income_account = tabAccount.name
  - name: is_fixed_asset
    description: Indicates whether the sold item is a fixed asset requiring depreciation
      tracking rather than a regular inventory item.
  - name: asset
    description: References the specific fixed asset record being sold or disposed
      of in this invoice line.
    join_hint:
      table: tabAsset
      'on': asset = tabAsset.name
  - name: finance_book
    description: Specifies which accounting book or ledger to use for recording depreciation
      and asset transactions when selling fixed assets.
    join_hint:
      table: tabFinance Book
      'on': finance_book = tabFinance Book.name
  - name: expense_account
    description: Account where the cost of goods sold or expense for this invoice
      item is recorded when using perpetual inventory.
    join_hint:
      table: tabAccount
      'on': expense_account = tabAccount.name
  - name: discount_account
    description: Account where discounts given on this invoice item are recorded as
      contra-revenue or expense offsets.
    join_hint:
      table: tabAccount
      'on': discount_account = tabAccount.name
  - name: deferred_revenue_account
    description: Account where revenue for this invoice item is initially recorded
      when revenue recognition is delayed until delivery or service completion.
    join_hint:
      table: tabAccount
      'on': deferred_revenue_account = tabAccount.name
  - name: service_stop_date
    description: End date of service period for subscription or time-based items on
      the invoice, used when calculating revenue recognition or service duration.
  - name: enable_deferred_revenue
    description: Indicates whether this invoice item's revenue should be deferred
      and recognized over time rather than immediately upon invoicing.
  - name: service_start_date
    description: Start date of service period for subscription or time-based items
      on the invoice, used when calculating revenue recognition or service duration.
  - name: service_end_date
    description: End date of service period for subscription or service-based invoice
      line items.
  - name: weight_per_unit
    description: Weight of a single unit of the invoiced item, used for calculating
      shipping costs or logistics planning.
  - name: total_weight
    description: Combined weight of all units on this invoice line, calculated as
      quantity times weight per unit.
  - name: weight_uom
    description: Unit of measurement for the item's weight on this invoice line.
    join_hint:
      table: tabUOM
      'on': weight_uom = tabUOM.name
  - name: warehouse
    description: Warehouse from which the invoiced item was shipped or delivered.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: target_warehouse
    description: Destination warehouse for items being transferred or delivered to
      a different location than the source warehouse.
    join_hint:
      table: tabWarehouse
      'on': target_warehouse = tabWarehouse.name
  - name: quality_inspection
    description: References the quality inspection record associated with this invoice
      item when users need to verify inspection results or link invoices to quality
      checks.
    join_hint:
      table: tabQuality Inspection
      'on': quality_inspection = tabQuality Inspection.name
  - name: serial_and_batch_bundle
    description: Links to the bundled serial numbers and batch numbers for this invoice
      item when tracking specific units or lots sold.
    join_hint:
      table: tabSerial and Batch Bundle
      'on': serial_and_batch_bundle = tabSerial and Batch Bundle.name
  - name: use_serial_batch_fields
    description: Indicates whether this invoice item uses individual serial/batch
      field entries instead of bundles when users need to understand the tracking
      method applied.
  - name: allow_zero_valuation_rate
    description: Indicates whether this invoice item can have a zero valuation rate
      for inventory costing purposes.
  - name: incoming_rate
    description: The original purchase or stock valuation rate of the item at the
      time it entered inventory, used to calculate profit margins.
  - name: item_tax_rate
    description: The specific tax rate or tax configuration applied to this individual
      invoice item, which may differ from the default tax rate.
  - name: actual_batch_qty
    description: Quantity of items from a specific batch included in this invoice
      line, used when tracking batch-level inventory movements in sales.
  - name: serial_no
    description: Unique serial number of the individual item sold, used when querying
      sales of specific serialized products or tracking warranty and service history.
  - name: batch_no
    description: Batch or lot identifier for the items sold, used when tracing product
      batches for quality control, expiration tracking, or recall purposes.
    join_hint:
      table: tabBatch
      'on': batch_no = tabBatch.name
  - name: actual_qty
    description: Quantity of this item physically available in stock at the warehouse
      at the time of invoice creation.
  - name: company_total_stock
    description: Total quantity of this item available across all warehouses in the
      company at the time of invoice creation.
  - name: sales_order
    description: Reference to the originating sales order document that this invoice
      item was created from.
    join_hint:
      table: tabSales Order
      'on': sales_order = tabSales Order.name
  - name: so_detail
    description: Links invoice line item to the originating sales order line for tracking
      fulfillment and order-to-invoice reconciliation.
  - name: sales_invoice_item
    description: Unique identifier for this specific line item on the sales invoice.
  - name: delivery_note
    description: Links invoice line item to the delivery note that recorded the physical
      shipment of these goods.
    join_hint:
      table: tabDelivery Note
      'on': delivery_note = tabDelivery Note.name
  - name: dn_detail
    description: Links to the specific delivery note line item that fulfilled this
      invoice item, used when tracking which delivery corresponds to which invoice.
  - name: delivered_qty
    description: Actual quantity delivered to the customer for this invoice line,
      used when verifying fulfillment or comparing billed versus delivered amounts.
  - name: pos_invoice
    description: Indicates whether this invoice was created through the point-of-sale
      system, used when filtering retail versus regular sales transactions.
    join_hint:
      table: tabPOS Invoice
      'on': pos_invoice = tabPOS Invoice.name
  - name: pos_invoice_item
    description: Links to the point-of-sale invoice item when the sales invoice originated
      from a POS transaction.
  - name: purchase_order
    description: References the original purchase order when the sales invoice is
      related to a drop-ship or back-to-back sales scenario.
    join_hint:
      table: tabPurchase Order
      'on': purchase_order = tabPurchase Order.name
  - name: purchase_order_item
    description: References the specific purchase order line item when the sales invoice
      item is linked to procurement for drop-ship or back-to-back fulfillment.
  - name: cost_center
    description: Department or business unit to which this invoice line item's revenue
      or expense is allocated for financial tracking and analysis.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: Specific project associated with this invoice line item for project-based
      billing and cost allocation.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: page_break
    description: Indicates whether a page break should occur before this line item
      when printing the sales invoice.
  desc_done: true
- table: tabSales Invoice Payment
  description: ''
  fields:
  - name: name
    description: Unique identifier or reference number for the specific payment transaction
      on the sales invoice
  - name: default
    description: Indicates whether this is the default or primary payment method selected
      for the sales invoice
  - name: mode_of_payment
    description: The payment method used for this transaction such as cash, credit
      card, bank transfer, or check
    join_hint:
      table: tabMode of Payment
      'on': mode_of_payment = tabMode of Payment.name
  - name: amount
    description: Payment amount received or applied against the sales invoice
  - name: reference_no
    description: External reference number from the payment transaction such as check
      number, transaction ID, or bank reference
  - name: account
    description: Financial account or bank account where the payment was deposited
      or processed
    join_hint:
      table: tabAccount
      'on': account = tabAccount.name
  - name: type
    description: Identifies the payment method or instrument used (e.g., cash, check,
      credit card) when analyzing payment preferences or reconciliation.
  - name: base_amount
    description: The payment amount in the company's base currency, used when calculating
      total payments received or analyzing cash flow across invoices.
  - name: clearance_date
    description: The date when the payment was confirmed or cleared by the bank, used
      when reconciling payments or analyzing actual cash receipt timing.
  desc_done: true
- table: tabSales Invoice Timesheet
  description: ''
  fields:
  - name: name
    description: Unique identifier for the timesheet entry linked to the sales invoice
  - name: activity_type
    description: Category or type of billable activity performed during the timesheet
      period
    join_hint:
      table: tabActivity Type
      'on': activity_type = tabActivity Type.name
  - name: description
    description: Detailed notes or explanation of the work performed in this timesheet
      entry
  - name: from_time
    description: Start time of the timesheet entry for billing a specific work period
      on the sales invoice
  - name: to_time
    description: End time of the timesheet entry for billing a specific work period
      on the sales invoice
  - name: billing_hours
    description: Total billable hours calculated for this timesheet entry that will
      be invoiced to the customer
  - name: billing_amount
    description: Amount billed to customer for this timesheet entry on the sales invoice.
  - name: time_sheet
    description: Reference to the timesheet document from which this billable time
      was invoiced.
    join_hint:
      table: tabTimesheet
      'on': time_sheet = tabTimesheet.name
  - name: timesheet_detail
    description: Specific line item or detail row from the timesheet that corresponds
      to this invoice charge.
  - name: project_name
    description: Name of the project associated with the timesheet entries being invoiced.
  desc_done: true
- table: tabSales Order
  description: ''
  fields:
  - name: name
    description: Unique identifier for the sales order, typically auto-generated or
      manually entered based on naming series configuration.
  - name: title
    description: Customer's purchase order number or reference name they use to identify
      this order.
  - name: naming_series
    description: Prefix pattern used to generate the sales order name, determining
      the numbering format for orders.
    options:
    - SAL-ORD-.YYYY.-
  - name: customer
    description: Unique identifier linking to the customer account that placed the
      sales order.
    join_hint:
      table: tabCustomer
      'on': customer = tabCustomer.name
  - name: customer_name
    description: Display name of the customer for human-readable queries about who
      ordered.
  - name: tax_id
    description: Tax identification number of the customer for tax reporting and compliance
      queries.
  - name: order_type
    description: Category or classification of the sales order such as standard sale,
      return, exchange, or wholesale transaction.
    options:
    - Sales
    - Maintenance
    - Shopping Cart
  - name: transaction_date
    description: Date when the sales order was created or recorded in the system.
  - name: delivery_date
    description: Date when the order is scheduled to be delivered or was actually
      delivered to the customer.
  - name: po_no
    description: Customer's purchase order number used to match sales orders to customer
      procurement documents and inquiries.
  - name: po_date
    description: Date on the customer's purchase order, used to track customer order
      timing and resolve discrepancies between customer records and sales orders.
  - name: company
    description: Company entity that owns this sales order, used to filter orders
      by legal entity or business unit in multi-company environments.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: skip_delivery_note
    description: Whether this sales order bypasses delivery note creation and ships
      directly, relevant when users ask about orders with direct shipping or no intermediate
      delivery documentation.
  - name: has_unit_price_items
    description: Indicates if the sales order contains line items priced per unit
      rather than bulk or alternative pricing methods, useful for filtering orders
      by pricing structure type.
  - name: amended_from
    description: References the original sales order that this order amends or corrects,
      used when tracking order corrections, amendments, or version history.
    join_hint:
      table: tabSales Order
      'on': amended_from = tabSales Order.name
  - name: cost_center
    description: Department or business unit to which the sales order revenue or costs
      are allocated for internal accounting and profitability analysis.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: Specific project or job associated with the sales order for tracking
      project-based revenue and deliverables.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: currency
    description: Currency in which the sales order prices, totals, and payment are
      denominated.
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: Exchange rate applied to convert transaction currency to company
      base currency for this sales order
  - name: selling_price_list
    description: Name or identifier of the price list used to determine item prices
      for this sales order
    join_hint:
      table: tabPrice List
      'on': selling_price_list = tabPrice List.name
  - name: price_list_currency
    description: Currency in which the price list prices are denominated, may differ
      from transaction or base currency
    join_hint:
      table: tabCurrency
      'on': price_list_currency = tabCurrency.name
  - name: plc_conversion_rate
    description: Exchange rate used to convert price list currency to transaction
      currency for this sales order.
  - name: ignore_pricing_rule
    description: Indicates whether automatic pricing rules and discounts are bypassed
      for this sales order.
  - name: scan_barcode
    description: Barcode value scanned to quickly add items to the sales order.
  - name: last_scanned_warehouse
    description: Warehouse location captured from the most recent barcode or scanner
      input during order processing or fulfillment.
  - name: set_warehouse
    description: Default or assigned warehouse designated for fulfilling items on
      this sales order.
    join_hint:
      table: tabWarehouse
      'on': set_warehouse = tabWarehouse.name
  - name: reserve_stock
    description: Indicates whether inventory is reserved or allocated for this sales
      order to prevent overselling.
  - name: items
    description: Line items or products included in the sales order
  - name: total_qty
    description: Total quantity of all items ordered across all line items in the
      sales order
  - name: total_net_weight
    description: Combined net weight of all items in the sales order excluding packaging
  - name: base_total
    description: Grand total of the sales order in company's base currency including
      taxes and charges.
  - name: base_net_total
    description: Sum of all line item amounts in company's base currency before applying
      taxes, discounts, or additional charges.
  - name: total
    description: Grand total of the sales order in transaction currency including
      taxes and charges.
  - name: net_total
    description: Total sales order amount before applying any taxes or additional
      charges
  - name: tax_category
    description: Classification that determines which tax rules apply to this sales
      order based on customer type or location
    join_hint:
      table: tabTax Category
      'on': tax_category = tabTax Category.name
  - name: taxes_and_charges
    description: Template or rule set defining specific tax rates and additional charges
      applied to calculate the final order amount
    join_hint:
      table: tabSales Taxes and Charges Template
      'on': taxes_and_charges = tabSales Taxes and Charges Template.name
  - name: shipping_rule
    description: Defines how shipping charges are calculated or applied to the order,
      such as free shipping, flat rate, or carrier-based pricing.
    join_hint:
      table: tabShipping Rule
      'on': shipping_rule = tabShipping Rule.name
  - name: incoterm
    description: International commercial term specifying which party bears shipping
      costs, risks, and responsibilities during delivery (e.g., FOB, CIF, EXW).
    join_hint:
      table: tabIncoterm
      'on': incoterm = tabIncoterm.name
  - name: named_place
    description: Specific geographic location associated with the incoterm where risk
      and cost transfer occurs, such as port of loading or destination city.
  - name: taxes
    description: Line items detailing individual tax components applied to the sales
      order, including tax type, rate, and amount for each tax rule.
  - name: base_total_taxes_and_charges
    description: Total sum of all taxes and additional charges in the company's base
      currency before any currency conversion.
  - name: total_taxes_and_charges
    description: Total sum of all taxes and additional charges in the transaction
      currency after applying tax rules and rates.
  - name: base_grand_total
    description: Total sales order value in company base currency before any rounding
      adjustments are applied.
  - name: base_rounding_adjustment
    description: Amount added or subtracted in base currency to round the final total
      to a convenient number.
  - name: base_rounded_total
    description: Final sales order total in base currency after applying rounding
      adjustment, used for actual payment amount.
  - name: base_in_words
    description: Grand total amount expressed as text words for check writing or formal
      documentation purposes.
  - name: grand_total
    description: Final total amount of the sales order including all items, taxes,
      charges, and adjustments that the customer must pay.
  - name: rounding_adjustment
    description: Small amount added or subtracted to round the final total to a convenient
      number, typically to nearest whole currency unit.
  - name: rounded_total
    description: Final invoice amount after applying rounding adjustments to the grand
      total
  - name: in_words
    description: Grand total amount expressed as text words for printing on invoices
      and official documents
  - name: advance_paid
    description: Amount of advance payment or deposit received from customer before
      order fulfillment
  - name: disable_rounded_total
    description: Whether rounding is disabled for the total amount on this sales order,
      relevant when users ask about exact vs rounded totals.
  - name: apply_discount_on
    description: Specifies whether discounts are calculated on grand total or net
      total, used when users need to understand discount calculation basis.
    options:
    - Grand Total
    - Net Total
  - name: base_discount_amount
    description: Total discount amount in base currency before any currency conversion,
      used for multi-currency discount analysis and reporting.
  - name: coupon_code
    description: Promotional or marketing code applied to the sales order for tracking
      campaign-based discounts.
    join_hint:
      table: tabCoupon Code
      'on': coupon_code = tabCoupon Code.name
  - name: additional_discount_percentage
    description: Extra percentage discount applied beyond standard pricing or coupon
      discounts.
  - name: discount_amount
    description: Total monetary value of all discounts applied to the sales order.
  - name: other_charges_calculation
    description: Additional fees or charges applied to the sales order beyond standard
      item pricing, such as shipping, handling, or service fees.
  - name: packed_items
    description: Items that have been physically packed or bundled together for shipment
      in this sales order.
  - name: pricing_rules
    description: Special pricing conditions or discount rules applied to determine
      final prices for items in this sales order.
  - name: customer_address
    description: Specific address record linked to the customer where the order will
      be shipped or billed.
    join_hint:
      table: tabAddress
      'on': customer_address = tabAddress.name
  - name: address_display
    description: Formatted full address text showing the complete shipping or billing
      address for display purposes.
  - name: customer_group
    description: Classification or segment of the customer such as wholesale, retail,
      or VIP for pricing and business rules.
    join_hint:
      table: tabCustomer Group
      'on': customer_group = tabCustomer Group.name
  - name: territory
    description: Geographic sales region or area assigned to this sales order for
      regional performance tracking and commission allocation
    join_hint:
      table: tabTerritory
      'on': territory = tabTerritory.name
  - name: contact_person
    description: Primary contact person ID or reference at the customer organization
      for this sales order
    join_hint:
      table: tabContact
      'on': contact_person = tabContact.name
  - name: contact_display
    description: Formatted display name of the contact person for this sales order,
      used when showing human-readable contact information
  - name: contact_phone
    description: Primary landline or office phone number for reaching the customer
      about this sales order
  - name: contact_mobile
    description: Mobile or cell phone number for reaching the customer about this
      sales order
  - name: contact_email
    description: Email address for sending order confirmations, invoices, and updates
      to the customer
  - name: shipping_address_name
    description: Name or label identifying the shipping destination (e.g., 'Main Warehouse',
      'Customer Site B') where the order will be delivered.
    join_hint:
      table: tabAddress
      'on': shipping_address_name = tabAddress.name
  - name: shipping_address
    description: Full physical address details where the order will be shipped to
      the customer or end recipient.
  - name: dispatch_address_name
    description: Name or label identifying the origin location (e.g., 'Distribution
      Center A', 'Factory 1') from where the order will be dispatched or sent.
    join_hint:
      table: tabAddress
      'on': dispatch_address_name = tabAddress.name
  - name: dispatch_address
    description: Address where ordered goods will be shipped or delivered to the customer.
  - name: company_address
    description: Address of the company location or branch processing this sales order.
    join_hint:
      table: tabAddress
      'on': company_address = tabAddress.name
  - name: company_address_display
    description: Formatted version of the company address for display on documents
      like invoices and sales order printouts.
  - name: company_contact_person
    description: Primary contact person at the customer's company for this sales order.
    join_hint:
      table: tabContact
      'on': company_contact_person = tabContact.name
  - name: payment_terms_template
    description: Template defining standard payment conditions like net 30 or due
      on receipt applied to this order.
    join_hint:
      table: tabPayment Terms Template
      'on': payment_terms_template = tabPayment Terms Template.name
  - name: payment_schedule
    description: Custom installment or milestone-based payment plan for this specific
      sales order.
  - name: tc_name
    description: Terms and conditions document name or identifier associated with
      the sales order
    join_hint:
      table: tabTerms and Conditions
      'on': tc_name = tabTerms and Conditions.name
  - name: terms
    description: Payment terms specifying when payment is due such as net 30, due
      on receipt, or installment schedules
  - name: status
    description: Current state of the sales order such as draft, confirmed, shipped,
      invoiced, or cancelled
    options:
    - Draft
    - On Hold
    - To Deliver and Bill
    - To Bill
    - To Deliver
    - Completed
    - Cancelled
    - Closed
  - name: delivery_status
    description: Current fulfillment state of the order such as not delivered, partially
      delivered, fully delivered, or closed.
    options:
    - Not Delivered
    - Fully Delivered
    - Partly Delivered
    - Closed
    - Not Applicable
  - name: per_delivered
    description: Percentage of ordered quantity that has been physically delivered
      to the customer.
  - name: per_billed
    description: Percentage of the order value that has been invoiced to the customer.
  - name: per_picked
    description: Percentage of ordered items that have been physically picked from
      inventory for this sales order.
  - name: billing_status
    description: Current invoicing state of the sales order indicating whether it
      is unbilled, partially billed, or fully billed.
    options:
    - Not Billed
    - Fully Billed
    - Partly Billed
    - Closed
  - name: sales_partner
    description: External partner or intermediary who referred or facilitated this
      sales order and may receive commission.
    join_hint:
      table: tabSales Partner
      'on': sales_partner = tabSales Partner.name
  - name: amount_eligible_for_commission
    description: Sales order revenue amount that qualifies for commission calculation,
      excluding non-commissionable items or adjustments.
  - name: commission_rate
    description: Percentage rate applied to eligible amount to calculate sales commission
      for this order.
  - name: total_commission
    description: Final commission amount earned on this sales order after applying
      the commission rate to eligible amount.
  - name: sales_team
    description: Team or group responsible for closing this sales order, used when
      filtering or analyzing performance by team assignment.
  - name: loyalty_points
    description: Number of reward points earned or redeemed through this sales order
      transaction.
  - name: loyalty_amount
    description: Monetary value in currency associated with loyalty points for this
      sales order, used when calculating loyalty program costs or customer rewards
      in financial terms.
  - name: from_date
    description: Start date of the sales order validity period or delivery schedule.
  - name: to_date
    description: End date of the sales order validity period or delivery schedule.
  - name: auto_repeat
    description: Indicates whether this sales order automatically recurs on a scheduled
      basis.
    join_hint:
      table: tabAuto Repeat
      'on': auto_repeat = tabAuto Repeat.name
  - name: letter_head
    description: Letterhead template used when printing or emailing this sales order
      document
    join_hint:
      table: tabLetter Head
      'on': letter_head = tabLetter Head.name
  - name: group_same_items
    description: Whether identical items are consolidated into single lines when printing
      the sales order
  - name: select_print_heading
    description: Custom heading text that appears at the top of the printed sales
      order instead of the default title
    join_hint:
      table: tabPrint Heading
      'on': select_print_heading = tabPrint Heading.name
  - name: language
    description: Language preference for the sales order document and customer communications.
  - name: is_internal_customer
    description: Indicates whether the customer is an internal entity within the organization
      for inter-company transactions.
  - name: represents_company
    description: The company entity that this sales order represents in multi-company
      or subsidiary scenarios.
    join_hint:
      table: tabCompany
      'on': represents_company = tabCompany.name
  - name: source
    description: Origin or channel through which the sales order was created, such
      as website, phone, email, or partner referral.
    join_hint:
      table: tabLead Source
      'on': source = tabLead Source.name
  - name: inter_company_order_reference
    description: Reference to the corresponding purchase order when this sales order
      is between related company entities.
    join_hint:
      table: tabPurchase Order
      'on': inter_company_order_reference = tabPurchase Order.name
  - name: campaign
    description: Marketing campaign or promotion associated with this sales order
      for tracking campaign effectiveness and attribution.
    join_hint:
      table: tabCampaign
      'on': campaign = tabCampaign.name
  - name: party_account_currency
    description: Currency used for the customer's account balance and transactions
      in this sales order
    join_hint:
      table: tabCurrency
      'on': party_account_currency = tabCurrency.name
  desc_done: true
- table: tabSales Order Item
  description: ''
  fields:
  - name: name
    description: Unique identifier or auto-generated name for the sales order line
      item record
  - name: item_code
    description: Internal product/SKU code used to identify what item is being sold
      in this order line
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: customer_item_code
    description: Customer's own product code or SKU for the item, used when customer
      references items by their internal numbering system
  - name: ensure_delivery_based_on_produced_serial_no
    description: Whether this item requires delivery only after a specific serial
      number is manufactured or produced.
  - name: is_stock_item
    description: Whether this item is a physical inventory item that requires stock
      tracking, as opposed to a service or non-inventory item.
  - name: reserve_stock
    description: Whether inventory quantity is reserved or allocated for this sales
      order item to prevent overselling.
  - name: delivery_date
    description: Date when the ordered item is scheduled to be delivered to the customer
  - name: item_name
    description: Name or title of the product being sold in this order line
  - name: description
    description: Detailed text explaining the item specifications, features, or custom
      requirements for this order line
  - name: item_group
    description: Product category or classification for filtering and analyzing sales
      by product type.
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: brand
    description: Manufacturer or brand name of the sold item for brand-specific sales
      analysis.
    join_hint:
      table: tabBrand
      'on': brand = tabBrand.name
  - name: image_view
    description: Visual representation or photo of the item included in the sales
      order.
  - name: qty
    description: Quantity of the item ordered by the customer in the specified unit
      of measure.
  - name: stock_uom
    description: Base inventory unit of measure for the item as maintained in stock
      records.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: uom
    description: Unit of measure for the ordered quantity as specified on this sales
      order line, which may differ from the stock unit.
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: conversion_factor
    description: Multiplier to convert the sales order item quantity from its sales
      unit of measure to the stock/inventory unit of measure.
  - name: stock_qty
    description: Total quantity of the sales order item expressed in the stock/inventory
      unit of measure after applying conversion factor.
  - name: stock_reserved_qty
    description: Quantity of inventory physically reserved or allocated from warehouse
      stock specifically for this sales order item.
  - name: price_list_rate
    description: Item's standard catalog price in transaction currency before discounts
      or negotiations.
  - name: base_price_list_rate
    description: Item's standard catalog price converted to company base currency.
  - name: margin_type
    description: Whether profit margin is calculated as a percentage or fixed amount.
    options:
    - Percentage
    - Amount
  - name: margin_rate_or_amount
    description: Profit margin added to base cost, used when calculating selling price
      from cost or analyzing markup on individual line items.
  - name: rate_with_margin
    description: Final unit price after applying margin to base cost, used when comparing
      marked-up price versus discounted price or analyzing pre-discount selling price.
  - name: discount_percentage
    description: Percentage reduction applied to selling price, used when analyzing
      price concessions, promotional discounts, or customer-specific pricing adjustments.
  - name: discount_amount
    description: Discount applied directly to this sales order line item, used when
      calculating item-level price reductions or promotional discounts.
  - name: distributed_discount_amount
    description: Portion of order-level or header discount allocated to this line
      item, used when header discounts are apportioned across items.
  - name: base_rate_with_margin
    description: Item unit price including profit margin before discounts, used when
      analyzing pricing with markup or comparing to cost.
  - name: rate
    description: Unit price per item before taxes and discounts applied to the line
      item.
  - name: amount
    description: Total line item value after applying quantity, rate, and discounts
      but before taxes.
  - name: item_tax_template
    description: Tax configuration template applied to calculate taxes for this specific
      line item.
    join_hint:
      table: tabItem Tax Template
      'on': item_tax_template = tabItem Tax Template.name
  - name: base_rate
    description: Unit price of the item before applying pricing rules, discounts,
      or currency conversions.
  - name: base_amount
    description: Total line amount in base currency before applying pricing rules
      or discounts (base_rate × quantity).
  - name: pricing_rules
    description: Specific promotional or conditional pricing rules applied to calculate
      the final item price.
  - name: stock_uom_rate
    description: Rate per unit in the stock unit of measure, used when querying item
      pricing in base inventory units rather than sales units.
  - name: is_free_item
    description: Indicates whether the item is provided at no charge as a promotion
      or bundle component.
  - name: grant_commission
    description: Indicates whether this line item is eligible for sales commission
      calculation.
  - name: net_rate
    description: Price per unit after applying item-level discounts but before taxes,
      in transaction currency.
  - name: net_amount
    description: Total line item value after item-level discounts but before taxes,
      in transaction currency.
  - name: base_net_rate
    description: Price per unit after applying item-level discounts but before taxes,
      converted to company's base currency.
  - name: base_net_amount
    description: Net sales value of the line item in base currency after discounts
      but before taxes.
  - name: billed_amt
    description: Total amount already invoiced for this sales order line item, used
      to track billing progress against ordered quantity.
  - name: valuation_rate
    description: Cost or inventory valuation rate per unit used for margin analysis
      and COGS calculation, distinct from selling price.
  - name: gross_profit
    description: Profit amount for this sales order line item calculated as revenue
      minus cost of goods sold.
  - name: delivered_by_supplier
    description: Indicates whether this item is shipped directly from the supplier
      to the customer rather than from company inventory.
  - name: supplier
    description: The vendor who supplies or drop-ships this specific item on the sales
      order.
    join_hint:
      table: tabSupplier
      'on': supplier = tabSupplier.name
  - name: weight_per_unit
    description: Weight of a single unit of the ordered item, used when calculating
      shipping costs or comparing product weights per piece.
  - name: total_weight
    description: Combined weight of all units in this order line item, used for total
      shipment weight and freight calculations.
  - name: weight_uom
    description: Unit of measurement for weight fields (e.g., kg, lbs, oz), used to
      interpret weight_per_unit and total_weight values.
    join_hint:
      table: tabUOM
      'on': weight_uom = tabUOM.name
  - name: warehouse
    description: Warehouse from which the ordered item will be delivered or fulfilled
      to the customer.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: target_warehouse
    description: Destination warehouse where the item should be transferred or moved
      as part of the sales order.
    join_hint:
      table: tabWarehouse
      'on': target_warehouse = tabWarehouse.name
  - name: prevdoc_docname
    description: Reference to the preceding document that generated this sales order
      item, such as a quotation or sales inquiry number.
    join_hint:
      table: tabQuotation
      'on': prevdoc_docname = tabQuotation.name
  - name: quotation_item
    description: Links this sales order line item to the original quotation line item
      it was created from.
  - name: against_blanket_order
    description: Indicates whether this sales order item is fulfilling a blanket order
      agreement.
  - name: blanket_order
    description: References the specific blanket order contract that this sales order
      item is drawn against.
    join_hint:
      table: tabBlanket Order
      'on': blanket_order = tabBlanket Order.name
  - name: blanket_order_rate
    description: Price per unit from a blanket purchase agreement applied to this
      sales order line item.
  - name: actual_qty
    description: Quantity of this item currently available in stock at the time of
      the sales order.
  - name: company_total_stock
    description: Total quantity of this item available across all warehouses company-wide
      when the sales order was created.
  - name: bom_no
    description: Bill of materials number for manufactured or assembled items on the
      sales order line.
    join_hint:
      table: tabBOM
      'on': bom_no = tabBOM.name
  - name: projected_qty
    description: Expected available quantity after accounting for pending stock movements
      and reservations.
  - name: ordered_qty
    description: Quantity of the item that the customer ordered on this sales order
      line.
  - name: planned_qty
    description: Quantity planned for delivery or fulfillment on this sales order
      line item.
  - name: production_plan_qty
    description: Quantity allocated to production planning for manufacturing this
      item to fulfill the sales order.
  - name: work_order_qty
    description: Quantity already issued to active work orders for manufacturing this
      sales order item.
  - name: delivered_qty
    description: Quantity of items actually delivered to the customer for this sales
      order line.
  - name: produced_qty
    description: Quantity of items manufactured or produced to fulfill this sales
      order line.
  - name: returned_qty
    description: Quantity of items returned by the customer after delivery for this
      sales order line.
  - name: picked_qty
    description: Quantity of items physically picked from inventory for this order
      line, used when tracking fulfillment progress or comparing picked versus ordered
      amounts.
  - name: additional_notes
    description: Free-text notes or comments specific to this individual order line
      item, used when searching for special instructions or item-level remarks.
  - name: page_break
    description: Controls whether a page break occurs before this line item when printing
      or generating sales order documents.
  - name: item_tax_rate
    description: Tax percentage applied to this specific line item for calculating
      tax amounts on the ordered product.
  - name: transaction_date
    description: Date when the sales order transaction was recorded or posted in the
      system.
  - name: material_request
    description: Reference to the material request document that triggered or is linked
      to this sales order item.
    join_hint:
      table: tabMaterial Request
      'on': material_request = tabMaterial Request.name
  - name: purchase_order
    description: Customer's purchase order number or reference provided when placing
      the sales order.
    join_hint:
      table: tabPurchase Order
      'on': purchase_order = tabPurchase Order.name
  - name: material_request_item
    description: Link to the internal material request item that triggered or is fulfilled
      by this sales order item.
  - name: purchase_order_item
    description: Link to the purchase order item when this sales order item is directly
      tied to procurement or drop-shipping.
  - name: cost_center
    description: Department or business unit to which the sales order item's revenue
      or costs are allocated for financial tracking and internal accounting.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: Specific project or job to which the sales order item is linked for
      project-based billing, tracking, and profitability analysis.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  desc_done: true
- table: tabSales Partner
  description: A third party distributor / dealer / commission agent / affiliate /
    reseller who sells the companies products for a commission.
  fields:
  - name: name
    description: Unique identifier code or short name for the sales partner record
  - name: partner_name
    description: Full official business name of the sales partner organization
  - name: partner_type
    description: Category or classification of the sales partner such as distributor,
      reseller, agent, or affiliate
    join_hint:
      table: tabSales Partner Type
      'on': partner_type = tabSales Partner Type.name
  - name: territory
    description: Geographic region or area assigned to the sales partner for managing
      sales activities and customer accounts
    join_hint:
      table: tabTerritory
      'on': territory = tabTerritory.name
  - name: commission_rate
    description: Percentage or rate used to calculate commission earnings for the
      sales partner based on their sales performance
  - name: targets
    description: Sales goals or quotas set for the sales partner to achieve within
      a specific time period
  - name: show_in_website
    description: Whether this sales partner is displayed or visible on the public
      website or partner portal.
  - name: referral_code
    description: Unique code used by this sales partner to track referrals, commissions,
      or customer acquisitions attributed to them.
  - name: route
    description: URL slug or web path for accessing this sales partner's dedicated
      page or profile on the website.
  - name: partner_website
    description: URL of the sales partner's official website for contact or reference
      purposes
  - name: introduction
    description: Brief summary or tagline about the sales partner, typically used
      for quick identification or overview
  - name: description
    description: Detailed information about the sales partner including capabilities,
      specializations, or business relationship details
  desc_done: true
- table: tabSales Partner Item
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the specific item associated with
      the sales partner
  - name: sales_partner
    description: The partner, distributor, or third-party entity involved in selling
      this item
    join_hint:
      table: tabSales Partner
      'on': sales_partner = tabSales Partner.name
  desc_done: true
- table: tabSales Partner Type
  description: ''
  fields:
  - name: name
    description: Name or label of the sales partner type for display and identification
      purposes
  - name: sales_partner_type
    description: Unique identifier code or key for the sales partner type used in
      transactions and classifications
  desc_done: true
- table: tabSales Person
  description: All Sales Transactions can be tagged against multiple Sales Persons
    so that you can set and monitor targets.
  fields:
  - name: name
    description: Unique identifier code or ID for the sales person record
  - name: sales_person_name
    description: Full display name of the sales person used for reporting and user-facing
      contexts
  - name: parent_sales_person
    description: Manager or supervising sales person in the sales hierarchy
    join_hint:
      table: tabSales Person
      'on': parent_sales_person = tabSales Person.name
  - name: commission_rate
    description: Percentage or rate used to calculate commission earned by the sales
      person on their sales transactions.
  - name: is_group
    description: Indicates whether this represents a team or group of sales people
      rather than an individual sales person.
  - name: enabled
    description: Indicates whether the sales person is currently active and available
      for assignment to new sales transactions.
  - name: employee
    description: Links to the employee record representing this salesperson for identifying
      who made sales or managing sales team members.
    join_hint:
      table: tabEmployee
      'on': employee = tabEmployee.name
  - name: department
    description: The department this salesperson belongs to for filtering sales by
      organizational unit or team.
    join_hint:
      table: tabDepartment
      'on': department = tabDepartment.name
  - name: lft
    description: Left boundary value in nested set model for representing salesperson
      hierarchy or territory structure.
  - name: rgt
    description: Right boundary value in nested set model for sales person hierarchy
      positioning and organizational structure queries.
  - name: old_parent
    description: Previous parent sales person before organizational reassignment or
      territory restructuring.
  - name: targets
    description: Sales targets or quotas assigned to the sales person for performance
      tracking and goal achievement queries.
  desc_done: true
- table: tabSales Stage
  description: ''
  fields:
  - name: name
    description: Unique identifier or code for the sales stage
  - name: stage_name
    description: Descriptive label of the sales stage such as Lead, Qualified, Proposal,
      Negotiation, or Closed Won
  desc_done: true
- table: tabSales Taxes and Charges
  description: ''
  fields:
  - name: name
    description: Unique identifier for the specific sales tax or charge line item
  - name: charge_type
    description: Categorizes whether this is a tax (VAT, GST, sales tax) or other
      charge (shipping, handling, customs duty)
    options:
    - Actual
    - On Net Total
    - On Previous Row Amount
    - On Previous Row Total
    - On Item Quantity
  - name: row_id
    description: Sequential position of this tax or charge within the parent sales
      document
  - name: account_head
    description: Ledger account where this sales tax or charge amount is posted for
      accounting purposes
    join_hint:
      table: tabAccount
      'on': account_head = tabAccount.name
  - name: description
    description: Text explanation of the specific tax or charge line item appearing
      on the sales document
  - name: included_in_print_rate
    description: Whether this tax or charge is already included in the displayed item
      rate or added separately
  - name: included_in_paid_amount
    description: Whether this tax or charge was already included in the payment amount
      received from the customer.
  - name: cost_center
    description: Cost center to which this sales tax or charge is allocated for expense
      tracking and financial analysis.
    join_hint:
      table: tabCost Center
      'on': cost_center = tabCost Center.name
  - name: project
    description: Project to which this sales tax or charge is linked for project-specific
      cost tracking and profitability analysis.
    join_hint:
      table: tabProject
      'on': project = tabProject.name
  - name: rate
    description: Tax or charge percentage applied to the transaction base amount
  - name: account_currency
    description: Currency of the accounting ledger where this tax or charge is posted
    join_hint:
      table: tabCurrency
      'on': account_currency = tabCurrency.name
  - name: tax_amount
    description: Calculated monetary value of the tax or charge in transaction currency
  - name: total
    description: Cumulative tax total including this charge and all previous charges
      in the tax calculation sequence.
  - name: tax_amount_after_discount_amount
    description: Tax amount calculated after applying any item-level or invoice-level
      discounts.
  - name: base_tax_amount
    description: Tax amount in the company's base currency before any currency conversion.
  - name: base_total
    description: Total tax amount in company base currency before applying any discounts
      to the tax itself.
  - name: base_tax_amount_after_discount_amount
    description: Final tax amount in company base currency after applying discounts
      to the tax charge.
  - name: item_wise_tax_detail
    description: Breakdown showing how this tax charge applies to each individual
      item in the transaction.
  - name: dont_recompute_tax
    description: Indicates whether tax amounts should remain fixed and not be automatically
      recalculated when transaction values change.
  desc_done: true
- table: tabSales Taxes and Charges Template
  description: Standard tax template that can be applied to all Sales Transactions.
    This template can contain a list of tax heads and also other expense/income heads
    like "Shipping", "Insurance", "Handling" etc.
  fields:
  - name: name
    description: Unique identifier for the sales tax and charges template
  - name: title
    description: Display name of the sales tax and charges template shown to users
  - name: is_default
    description: Whether this template is automatically applied to new sales transactions
  - name: disabled
    description: Whether this sales tax template is currently inactive and unavailable
      for use in transactions.
  - name: company
    description: The specific company entity to which this sales tax template applies.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: tax_category
    description: The classification of tax type such as VAT, service tax, or GST that
      this template represents.
    join_hint:
      table: tabTax Category
      'on': tax_category = tabTax Category.name
  - name: taxes
    description: List of individual tax line items with their rates, amounts, and
      account assignments within this sales tax template
  desc_done: true
- table: tabSales Team
  description: ''
  fields:
  - name: name
    description: Name of the sales team or group for identifying and organizing sales
      territories or divisions
  - name: sales_person
    description: Individual salesperson assigned to or member of this sales team
    join_hint:
      table: tabSales Person
      'on': sales_person = tabSales Person.name
  - name: contact_no
    description: Phone number to reach this sales team
  - name: allocated_percentage
    description: Percentage of sales or revenue assigned to this team member for quota
      or territory allocation purposes.
  - name: allocated_amount
    description: Specific dollar or currency amount allocated to this team member
      as quota, budget, or target.
  - name: commission_rate
    description: Percentage rate used to calculate commission earnings for this sales
      team member based on their sales performance.
  - name: incentives
    description: Compensation bonuses or commission structures offered to the sales
      team for achieving targets or closing deals.
  desc_done: true
- table: tabSalutation
  description: ''
  fields:
  - name: name
    description: Name of the salutation record for internal identification or reference
      purposes
  - name: salutation
    description: Formal greeting or title used to address a person in communications,
      such as Mr., Ms., Dr., or Prof.
  desc_done: true
- table: tabScheduled Job Log
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the scheduled job execution instance
  - name: status
    description: Current execution state of the scheduled job such as completed, failed,
      running, or pending
    options:
    - Scheduled
    - Complete
    - Failed
  - name: scheduled_job_type
    description: Category or type of scheduled job being executed such as backup,
      report generation, data sync, or maintenance task
    join_hint:
      table: tabScheduled Job Type
      'on': scheduled_job_type = tabScheduled Job Type.name
  - name: details
    description: Human-readable summary or status message about what the scheduled
      job did or any issues encountered during execution.
  - name: debug_log
    description: Technical diagnostic information and verbose execution traces used
      when troubleshooting scheduled job failures or performance issues.
  desc_done: true
- table: tabScheduled Job Type
  description: ''
  fields:
  - name: name
    description: Name or identifier of the scheduled job type that users reference
      when asking about specific automated tasks or recurring processes.
  - name: stopped
    description: Indicates whether the scheduled job type is currently inactive or
      paused, relevant when users ask which jobs are not running.
  - name: method
    description: The specific function or procedure executed by this scheduled job
      type, used when users need to know what action the job performs.
  - name: server_script
    description: The Python script or code that executes when this scheduled job runs
    join_hint:
      table: tabServer Script
      'on': server_script = tabServer Script.name
  - name: scheduler_event
    description: The timing trigger or event type that determines when this job executes
      (e.g., daily, hourly, weekly, cron)
    join_hint:
      table: tabScheduler Event
      'on': scheduler_event = tabScheduler Event.name
  - name: frequency
    description: How often the scheduled job runs, specified as a time interval or
      recurrence pattern
    options:
    - All
    - Hourly
    - Hourly Long
    - Hourly Maintenance
    - Daily
    - Daily Long
    - Daily Maintenance
    - Weekly
    - Weekly Long
    - Monthly
    - Monthly Long
    - Cron
    - Yearly
    - Annual
  - name: cron_format
    description: Schedule pattern defining when the job runs using cron syntax.
  - name: create_log
    description: Whether execution logs are created each time this scheduled job runs.
  - name: last_execution
    description: Timestamp of the most recent time this scheduled job was executed.
  - name: next_execution
    description: When the scheduled job is planned to run next, used to find jobs
      about to execute or check upcoming automation timing.
  desc_done: true
- table: tabScheduler Event
  description: ''
  fields:
  - name: name
    description: Name or title of the scheduled event used to identify and search
      for specific automated tasks or jobs
  - name: scheduled_against
    description: The document type or module that this scheduled event operates on
      or targets for execution
    join_hint:
      table: tabDocType
      'on': scheduled_against = tabDocType.name
  - name: method
    description: The specific function or procedure name that gets executed when this
      scheduled event runs
  desc_done: true
- table: tabSelling Settings
  description: Settings for Selling Module
  fields:
  - name: name
    description: Unique identifier for the selling settings configuration record
  - name: cust_master_name
    description: Naming series pattern or template used for generating customer IDs
    options:
    - Customer Name
    - Naming Series
    - Auto Name
  - name: customer_group
    description: Default customer group assigned to new customers when none is specified
    join_hint:
      table: tabCustomer Group
      'on': customer_group = tabCustomer Group.name
  - name: territory
    description: Default sales territory assigned to new customers and transactions
      for regional sales tracking and commission allocation.
    join_hint:
      table: tabTerritory
      'on': territory = tabTerritory.name
  - name: selling_price_list
    description: Default price list applied to sales transactions to determine item
      pricing for customers.
    join_hint:
      table: tabPrice List
      'on': selling_price_list = tabPrice List.name
  - name: maintain_same_rate_action
    description: Action taken when item prices change mid-transaction, controlling
      whether to keep original rates or update to new prices.
    options:
    - Stop
    - Warn
  - name: role_to_override_stop_action
    description: Role permitted to bypass stop actions on blocked customers or credit
      limit violations during sales transactions.
    join_hint:
      table: tabRole
      'on': role_to_override_stop_action = tabRole.name
  - name: maintain_same_sales_rate
    description: Whether to keep the original sales rate unchanged when converting
      between sales documents like quotations to orders.
  - name: fallback_to_default_price_list
    description: Whether to automatically use the default price list when a customer-specific
      price list is unavailable or missing items.
  - name: editable_price_list_rate
    description: Controls whether sales users can manually modify price list rates
      during transaction entry.
  - name: validate_selling_price
    description: Enforces validation that selling prices must meet or exceed valuation
      rates to prevent selling below cost.
  - name: editable_bundle_item_rates
    description: Allows modification of individual item prices within product bundles
      during sales transactions.
  - name: allow_negative_rates_for_items
    description: Controls whether items can have negative prices in sales transactions.
  - name: so_required
    description: Determines if a Sales Order is mandatory before creating Delivery
      Notes or Sales Invoices.
    options:
    - 'No'
    - 'Yes'
  - name: dn_required
    description: Determines if a Delivery Note is mandatory before creating Sales
      Invoices.
    options:
    - 'No'
    - 'Yes'
  - name: sales_update_frequency
    description: How often sales data or metrics are refreshed or recalculated in
      the system.
    options:
    - Monthly
    - Each Transaction
    - Daily
  - name: blanket_order_allowance
    description: Maximum percentage or amount allowed for blanket orders to exceed
      their original value.
  - name: allow_multiple_items
    description: Whether sales transactions can include more than one item or product
      line.
  - name: allow_against_multiple_purchase_orders
    description: Controls whether a single sales order or delivery can reference and
      fulfill items from multiple purchase orders simultaneously.
  - name: allow_sales_order_creation_for_expired_quotation
    description: Determines if sales orders can be created from quotations that have
      passed their valid until date.
  - name: dont_reserve_sales_order_qty_on_sales_return
    description: Controls whether returned items from sales returns should bypass
      automatic quantity reservation against existing sales orders.
  - name: hide_tax_id
    description: Controls whether tax identification numbers are hidden on sales documents
      like invoices and quotations.
  - name: enable_discount_accounting
    description: Determines if discounts are tracked in separate accounting ledger
      entries rather than reducing line item amounts directly.
  - name: allow_zero_qty_in_quotation
    description: Permits creating quotation line items with zero quantity, useful
      for displaying optional or informational items.
  - name: allow_zero_qty_in_sales_order
    description: Whether sales orders can be created with line items having zero quantity,
      relevant when users ask about creating placeholder or template orders without
      actual quantities.
  desc_done: true
- table: tabSerial No
  description: Distinct unit of an Item
  fields:
  - name: name
    description: Unique identifier for this serial number record
  - name: serial_no
    description: Actual serial number value assigned to a specific item unit for tracking
      individual pieces
  - name: item_code
    description: Product or item type that this serial number belongs to
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: batch_no
    description: Batch identifier for tracking groups of serialized items that were
      manufactured or purchased together.
    join_hint:
      table: tabBatch
      'on': batch_no = tabBatch.name
  - name: warehouse
    description: Storage location where this specific serialized item is currently
      held.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: purchase_rate
    description: Unit cost paid when this serialized item was originally purchased.
  - name: customer
    description: Customer who purchased or received the serialized item
    join_hint:
      table: tabCustomer
      'on': customer = tabCustomer.name
  - name: status
    description: Current state of the serial number such as available, delivered,
      or inactive
    options:
    - Active
    - Inactive
    - Consumed
    - Delivered
    - Expired
  - name: item_name
    description: Product or item associated with this serial number
  - name: description
    description: Text description or name of the serialized item for identifying what
      the serial number represents
  - name: item_group
    description: Product category or classification that the serialized item belongs
      to for grouping similar items
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: brand
    description: Manufacturer or brand name of the serialized item for filtering by
      vendor or make
    join_hint:
      table: tabBrand
      'on': brand = tabBrand.name
  - name: asset
    description: Links the serial number to a specific fixed asset or equipment item
      being tracked.
    join_hint:
      table: tabAsset
      'on': asset = tabAsset.name
  - name: asset_status
    description: Current operational or lifecycle status of the serialized asset (e.g.,
      active, in maintenance, retired).
    options:
    - Issue
    - Receipt
    - Transfer
  - name: location
    description: Physical location or warehouse where the serialized item is currently
      stored or deployed.
    join_hint:
      table: tabLocation
      'on': location = tabLocation.name
  - name: employee
    description: Employee assigned to or responsible for this serialized item
    join_hint:
      table: tabEmployee
      'on': employee = tabEmployee.name
  - name: warranty_expiry_date
    description: Date when the manufacturer's warranty coverage ends for this serial
      numbered item
  - name: amc_expiry_date
    description: Date when the Annual Maintenance Contract service period ends for
      this serial numbered item
  - name: maintenance_status
    description: Current maintenance state of the serialized item such as under maintenance,
      operational, or out of service.
    options:
    - Under Warranty
    - Out of Warranty
    - Under AMC
    - Out of AMC
  - name: warranty_period
    description: Duration or timeframe during which the serialized item is covered
      under warranty.
  - name: company
    description: Company entity that owns or is associated with this serial numbered
      item.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: work_order
    description: Work order or manufacturing order associated with this serial number
      for production tracking
    join_hint:
      table: tabWork Order
      'on': work_order = tabWork Order.name
  - name: purchase_document_no
    description: Purchase receipt or purchase order document number when this serial
      numbered item was received or procured
  desc_done: true
- table: tabSerial and Batch Bundle
  description: ''
  fields:
  - name: name
    description: Unique identifier for the serial and batch bundle record
  - name: naming_series
    description: Prefix pattern used to auto-generate the bundle name
    options:
    - SABB-.########
  - name: company
    description: Company that owns or manages this serial and batch bundle
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: item_name
    description: Item for which serial numbers or batch numbers are being tracked
      and bundled.
  - name: has_serial_no
    description: Whether this item uses serial number tracking for individual unit
      identification.
  - name: has_batch_no
    description: Whether this item uses batch number tracking for grouping units by
      production lot or expiry.
  - name: item_code
    description: Identifies which product or material the serial/batch bundle applies
      to.
    join_hint:
      table: tabItem
      'on': item_code = tabItem.name
  - name: warehouse
    description: Specifies the storage location where the serial/batch bundle is held
      or transacted.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: type_of_transaction
    description: Indicates whether the bundle transaction is inbound, outbound, or
      another movement type.
    options:
    - Inward
    - Outward
    - Maintenance
    - Asset Repair
  - name: entries
    description: Child table containing individual serial numbers or batch numbers
      with their quantities for the bundled item.
  - name: total_qty
    description: Aggregate quantity across all serial/batch entries in this bundle.
  - name: item_group
    description: Product category or classification that the bundled serial/batch
      items belong to.
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: avg_rate
    description: Average rate per unit calculated across all serial numbers or batches
      in this bundle.
  - name: total_amount
    description: Total monetary value of all serial numbers or batches combined in
      this bundle.
  - name: voucher_type
    description: Type of transaction document that created or references this serial
      and batch bundle.
    join_hint:
      table: tabDocType
      'on': voucher_type = tabDocType.name
  - name: voucher_no
    description: Transaction document number linking serial and batch bundles to their
      source voucher
  - name: voucher_detail_no
    description: Line item number within the voucher identifying the specific transaction
      detail for this bundle
  - name: posting_date
    description: Date when the serial and batch bundle transaction was posted to the
      ledger
  - name: posting_time
    description: Time when the serial and batch bundle transaction was posted or recorded.
  - name: returned_against
    description: Reference to the original serial and batch bundle document that this
      return transaction is reversing.
  - name: is_cancelled
    description: Indicates whether this serial and batch bundle transaction has been
      cancelled or voided.
  - name: is_rejected
    description: Indicates whether the serial and batch bundle has been rejected during
      quality inspection or receiving process.
  - name: amended_from
    description: Links to the original serial and batch bundle document that this
      record corrects or replaces after amendment.
    join_hint:
      table: tabSerial and Batch Bundle
      'on': amended_from = tabSerial and Batch Bundle.name
  desc_done: true
- table: tabSerial and Batch Entry
  description: ''
  fields:
  - name: name
    description: Unique identifier for this serial and batch entry record
  - name: serial_no
    description: Individual serial number assigned to a specific item unit for tracking
      unique pieces of inventory
    join_hint:
      table: tabSerial No
      'on': serial_no = tabSerial No.name
  - name: batch_no
    description: Batch or lot number assigned to a group of items manufactured or
      received together for tracking production runs or shipments
    join_hint:
      table: tabBatch
      'on': batch_no = tabBatch.name
  - name: qty
    description: Quantity of items assigned to a specific serial number or batch in
      the transaction.
  - name: warehouse
    description: Storage location where the serial or batch numbered items are kept
      or transferred.
    join_hint:
      table: tabWarehouse
      'on': warehouse = tabWarehouse.name
  - name: delivered_qty
    description: Actual quantity of serial or batch numbered items that have been
      physically delivered to the customer.
  - name: incoming_rate
    description: Valuation rate per unit for items being received or added to inventory
      in this serial/batch transaction.
  - name: outgoing_rate
    description: Valuation rate per unit for items being issued, consumed, or removed
      from inventory in this serial/batch transaction.
  - name: stock_value_difference
    description: Net change in total inventory value resulting from this serial/batch
      transaction.
  - name: is_outward
    description: Indicates whether the serial/batch transaction represents inventory
      leaving the warehouse (sales, material issue) versus incoming stock.
  - name: stock_queue
    description: FIFO/LIFO queue data structure tracking the chronological order and
      valuation of serial numbers or batches for consumption sequencing.
  desc_done: true
- table: tabServer Script
  description: ''
  fields:
  - name: name
    description: Unique identifier or label for the server script
  - name: script_type
    description: Type of server script execution context such as API, DocType Event,
      Permission Query, or Scheduler Event
    options:
    - DocType Event
    - Scheduler Event
    - Permission Query
    - API
  - name: reference_doctype
    description: The specific DocType that this server script is associated with or
      operates on
    join_hint:
      table: tabDocType
      'on': reference_doctype = tabDocType.name
  - name: event_frequency
    description: How often the server script runs, such as hourly, daily, weekly,
      or on a custom schedule.
    options:
    - All
    - Hourly
    - Daily
    - Weekly
    - Monthly
    - Yearly
    - Hourly Long
    - Daily Long
    - Weekly Long
    - Monthly Long
    - Cron
  - name: cron_format
    description: The cron expression defining the exact schedule when the script executes
      (e.g., '0 0 * * *' for daily at midnight).
  - name: doctype_event
    description: The specific document event that triggers the script, such as before
      save, after insert, on update, or on submit.
    options:
    - Before Insert
    - Before Validate
    - Before Save
    - After Insert
    - After Save
    - Before Rename
    - After Rename
    - Before Submit
    - After Submit
    - Before Cancel
    - After Cancel
    - Before Delete
    - After Delete
    - Before Save (Submitted Document)
    - After Save (Submitted Document)
    - Before Print
    - On Payment Authorization
  - name: api_method
    description: The specific API endpoint or method name that this server script
      exposes or handles
  - name: allow_guest
    description: Whether unauthenticated or guest users can execute this server script
      without logging in
  - name: module
    description: The application module or functional area that this server script
      belongs to for organizational grouping
    join_hint:
      table: tabModule Def
      'on': module = tabModule Def.name
  - name: disabled
    description: Whether the server script is currently inactive and will not execute
  - name: script
    description: The actual code or logic that executes when the server script runs
  - name: enable_rate_limit
    description: Whether execution frequency restrictions are applied to prevent excessive
      server script calls
  - name: rate_limit_count
    description: Maximum number of executions allowed within the rate limit time window
      for this server script.
  - name: rate_limit_seconds
    description: Time window in seconds during which the rate limit count applies
      for this server script.
  desc_done: true
