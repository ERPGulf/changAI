  - name: timeout
    description: Maximum execution time limit for the report query before it is automatically
      terminated
  - name: filters
    description: Criteria or conditions applied to limit which records are included
      in the report results
  - name: columns
    description: Specific data fields or attributes selected to display in the report
      output
  - name: query
    description: SQL query that retrieves the data displayed in the report
  - name: report_script
    description: Server-side script that processes or transforms report data before
      rendering
  - name: javascript
    description: Client-side JavaScript code that controls report interactivity and
      display behavior in the browser
  - name: json
    description: Full report definition including layout, filters, columns, groupings,
      and formatting configuration
  - name: roles
    description: User roles or permission groups that have access to view or run this
      report
