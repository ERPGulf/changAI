    join_hint:
      table: tabItem
      'on': fg_item = tabItem.name
  - name: source_warehouse
    description: Warehouse location from which raw materials or components are sourced
      for this BOM.
    join_hint:
      table: tabWarehouse
      'on': source_warehouse = tabWarehouse.name
  - name: is_expandable
    description: Indicates whether this BOM item can be further broken down into sub-components
      or child items.
  - name: sourced_by_supplier
    description: Indicates whether this BOM item is procured externally from a supplier
      rather than manufactured internally.
  - name: bom_created
    description: Indicates whether a bill of materials has been successfully created
      for this item.
  - name: allow_alternative_item
    description: Whether substitute items can be used in place of this BOM component
      during production or material shortages.
  - name: description
    description: Descriptive text or notes about this BOM item component explaining
      its purpose or specifications.
  - name: qty
    description: Quantity of this item required in the bill of materials for producing
      one unit of the finished product.
  - name: rate
    description: Price or cost per unit of the BOM item component used in cost calculations
      and valuation.
  - name: uom
    description: Unit of measurement for the BOM item component (e.g., kg, pieces,
      liters) as specified in the bill of materials.
    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: stock_qty
    description: Quantity of the BOM item component in stock/inventory UOM, accounting
      for UOM conversion from the BOM UOM.
  - name: conversion_factor
    description: Multiplier to convert the BOM item quantity from its unit of measure
      to the stock unit of measure.
  - name: stock_uom
    description: Standard unit of measure used for inventory tracking and stock management
      of this BOM item.
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: amount
    description: Total monetary value or cost of this item in the bill of materials.
  - name: base_rate
    description: Rate per unit of this BOM item in base currency before any adjustments
      or conversions.
  - name: base_amount
    description: Total cost of this BOM item in base currency, typically rate multiplied
      by quantity.
  - name: do_not_explode
    description: Flag indicating whether this BOM item should be treated as a single
      unit rather than expanded into its sub-components during BOM explosion or manufacturing.
  - name: parent_row_no
    description: Row number of the parent item in the BOM structure to establish hierarchical
      relationships between components.
  - name: fg_reference_id
    description: Reference identifier for the finished good that this BOM item belongs
      to or produces.
  - name: instruction
    description: Manufacturing or assembly instructions specific to this BOM item
      for production guidance.
