    join_hint:
      table: tabUOM
      'on': uom = tabUOM.name
  - name: rm_cost_as_per
    description: Pricing basis for raw material costs in the BOM, used when users
      inquire about cost calculation methods or valuation sources for materials
    options:
    - Valuation Rate
    - Last Purchase Rate
    - Price List
  - name: set_rate_based_on_warehouse
    description: Whether item rates are determined by specific warehouse locations,
      relevant when users ask about location-dependent pricing or warehouse-specific
      costing
  - name: buying_price_list
    description: Price list used to determine purchase costs for raw materials and
      components in this BOM
    join_hint:
      table: tabPrice List
      'on': buying_price_list = tabPrice List.name
  - name: price_list_currency
    description: Currency in which the buying price list prices are denominated
    join_hint:
      table: tabCurrency
      'on': price_list_currency = tabCurrency.name
  - name: plc_conversion_rate
    description: Exchange rate to convert buying price list currency to company base
      currency for cost calculations
  - name: currency
    description: Currency in which BOM costs and prices are denominated for this bill
      of materials
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: conversion_rate
    description: Exchange rate used to convert BOM costs from the BOM currency to
      the company's base currency
  - name: default_warehouse
    description: Warehouse from which raw materials and components for this BOM are
      sourced by default
    join_hint:
      table: tabWarehouse
      'on': default_warehouse = tabWarehouse.name
  - name: company
    description: Company entity that owns or manages the bill of materials being created.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: items
    description: List of components, materials, or sub-assemblies included in the
      bill of materials.
  - name: raw_material_cost
    description: Total cost of raw materials required to produce the item defined
      in this BOM.
  - name: remarks
    description: User-entered notes or comments about the BOM creation process or
      configuration.
  - name: status
    description: Current state of the BOM creation workflow such as draft, in progress,
      completed, or failed.
    options:
    - Draft
    - Submitted
    - In Progress
    - Completed
    - Failed
    - Cancelled
  - name: error_log
    description: Error messages or failure details encountered during BOM creation
      or processing.
  - name: amended_from
    description: Links to the original BOM Creator document that this version was
      amended from, used when tracking BOM revision history or finding the source
      document before amendments.
    join_hint:
      table: tabBOM Creator
      'on': amended_from = tabBOM Creator.name
  desc_done: true
