  - name: company
    description: Name of the company or organization the prospect represents or is
      affiliated with
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: leads
    description: Potential customers or contacts who have shown initial interest but
      have not yet been qualified or converted into active sales opportunities.
  - name: opportunities
    description: Qualified sales prospects with defined potential value, timeline,
      and probability of closing a deal.
  - name: notes
    description: Free-text comments, observations, or additional information recorded
      about the prospect's interactions, preferences, or status.
  desc_done: true
- table: tabProspect Lead
  description: ''
  fields:
  - name: name
    description: Unique identifier or full name of the prospect lead record used to
      reference and track individual leads throughout the sales pipeline.
  - name: lead
    description: Foreign key linking to the lead record, used when querying prospect
      conversion status or analyzing lead source effectiveness.
    join_hint:
      table: tabLead
      'on': lead = tabLead.name
  - name: lead_name
    description: Display name of the associated lead, used for reporting and filtering
      prospects by their originating lead information.
  - name: email
    description: Email address of the prospect for contact and communication purposes.
  - name: mobile_no
    description: Mobile phone number of the prospect for direct contact.
  - name: lead_owner
    description: Sales representative or team member responsible for managing and
      following up with this prospect.
  - name: status
    description: Current stage of the prospect lead in the sales pipeline, such as
      new, contacted, qualified, or converted.
  desc_done: true
- table: tabProspect Opportunity
  description: ''
  fields:
  - name: name
    description: Identifies the prospect or customer associated with the opportunity
      for filtering and reporting on specific accounts.
  - name: opportunity
    description: Describes the sales opportunity or deal being pursued, used when
      searching for specific deals or opportunity types.
    join_hint:
      table: tabOpportunity
      'on': opportunity = tabOpportunity.name
  - name: amount
    description: Contains the monetary value of the opportunity, used when analyzing
      deal sizes, revenue forecasts, or filtering by value thresholds.
  - name: stage
    description: Current sales pipeline stage of the opportunity such as prospecting,
      qualification, proposal, negotiation, or closed.
  - name: deal_owner
    description: Sales representative or team member responsible for managing and
      closing this opportunity.
  - name: probability
    description: Likelihood percentage that this opportunity will close successfully
      and convert to a sale.
  - name: expected_closing
    description: Date when the sales opportunity is anticipated to close or convert
      to a won deal.
  - name: currency
    description: Currency in which the opportunity value and revenue amounts are denominated.
    join_hint:
      table: tabCurrency
      'on': currency = tabCurrency.name
  - name: contact_person
    description: Primary contact or decision-maker associated with this sales opportunity
      at the prospect organization.
    join_hint:
      table: tabContact
      'on': contact_person = tabContact.name
  desc_done: true
- table: tabPurchase Invoice
  description: ''
  fields:
  - name: name
    description: Unique identifier for the purchase invoice used in queries asking
      for a specific invoice by its number or ID
  - name: title
    description: Supplier name associated with the purchase invoice, used when searching
      invoices by vendor or supplier
  - name: naming_series
    description: Prefix pattern that determines how purchase invoice numbers are automatically
      formatted and sequenced
    options:
    - ACC-PINV-.YYYY.-
    - ACC-PINV-RET-.YYYY.-
  - name: supplier
    description: Unique identifier for the vendor who issued the purchase invoice,
      used when filtering or joining supplier records.
    join_hint:
      table: tabSupplier
      'on': supplier = tabSupplier.name
  - name: supplier_name
    description: Display name of the vendor on the purchase invoice, used when searching
      by vendor name or displaying human-readable reports.
  - name: tax_id
    description: Tax registration number of the supplier on the purchase invoice,
      used for tax compliance queries and vendor verification.
  - name: company
    description: The company entity that received goods or services and is responsible
      for paying this purchase invoice.
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: posting_date
    description: The date when this purchase invoice was officially recorded in the
      accounting ledger, used for financial period reporting and aging analysis.
  - name: posting_time
    description: The time of day when this purchase invoice was posted to the accounting
      system, used when precise transaction timing matters for audit trails or same-day
      sequencing.
  - name: set_posting_time
    description: Indicates whether the posting date was manually specified rather
      than defaulting to the transaction creation time.
  - name: due_date
    description: The date by which payment for this purchase invoice must be made
      to the supplier.
  - name: is_paid
    description: Indicates whether the purchase invoice has been fully paid or remains
      outstanding.
  - name: is_return
    description: Indicates whether this purchase invoice represents a return of goods
      to the supplier rather than a new purchase.
  - name: return_against
    description: References the original purchase invoice document that this return
      invoice is reversing or crediting.
    join_hint:
      table: tabPurchase Invoice
      'on': return_against = tabPurchase Invoice.name
  - name: update_outstanding_for_self
    description: Controls whether this purchase invoice updates its own outstanding
      amount when it is also referenced as a return document by another invoice.
  - name: update_billed_amount_in_purchase_order
    description: Whether this invoice updates the billed amount on the linked purchase
      order to track billing progress against the order.
  - name: update_billed_amount_in_purchase_receipt
    description: Whether this invoice updates the billed amount on the linked purchase
      receipt to track billing against received goods.
  - name: apply_tds
    description: Whether tax deducted at source is applied to this purchase invoice
      for withholding tax compliance.
  - name: tax_withholding_category
    description: Category for tax withholding applied to this purchase invoice, used
      when filtering or reporting on invoices by withholding tax type.
    join_hint:
      table: tabTax Withholding Category
      'on': tax_withholding_category = tabTax Withholding Category.name
  - name: amended_from
    description: Reference to the original purchase invoice that this invoice amends
      or corrects.
    join_hint:
      table: tabPurchase Invoice
      'on': amended_from = tabPurchase Invoice.name
  - name: custom_zatca_summary_invoice
    description: Indicates whether this purchase invoice is a ZATCA-compliant summary
      invoice for Saudi Arabian tax reporting.
  - name: custom_zatca_3rd_party_invoice
    description: Indicates if this purchase invoice was issued by a third party on
      behalf of the supplier for ZATCA compliance purposes.
  - name: custom_zatca_self_billed_invoice
    description: Indicates if this purchase invoice was created by the buyer instead
      of the supplier for ZATCA compliance purposes.
  - name: custom_zatca_import_invoice
    description: Indicates if this purchase invoice is for imported goods requiring
      ZATCA import tax treatment.
  - name: custom_zatca_nominal_invoice
