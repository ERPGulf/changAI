    join_hint:
      table: tabDocType
      'on': party_type = tabDocType.name
  - name: party
    description: Specific entity (customer, supplier, or employee) who owns or is
      associated with this subscription
  - name: company
    description: The company entity that owns or is billed for this subscription
    join_hint:
      table: tabCompany
      'on': company = tabCompany.name
  - name: status
    description: Current state of the subscription such as active, cancelled, expired,
      or trial
    options:
    - Trialling
    - Active
    - Past Due Date
    - Cancelled
    - Unpaid
    - Completed
  - name: start_date
    description: The date when the subscription began or becomes effective
  - name: end_date
    description: When a subscription's scheduled termination or renewal date occurs,
      regardless of whether it was canceled early.
  - name: cancelation_date
    description: When a user actively canceled their subscription, which may occur
      before the end_date.
  - name: trial_period_start
    description: When a subscription's free trial began, used to identify trial users
      or calculate trial duration.
  - name: trial_period_end
    description: Date when the subscription trial period expires and billing begins.
