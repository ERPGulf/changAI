  - name: apply_recursion_over
    description: Dimension over which the pricing rule repeats, such as time periods,
      quantity tiers, or transaction count.
  - name: valid_from
    description: Start date from which the pricing rule becomes active and applicable
      to transactions.
  - name: valid_upto
    description: End date when the pricing rule expires or stops being applicable
