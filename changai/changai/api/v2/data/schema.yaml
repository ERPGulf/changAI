  - name: item_group
    description: Product category or classification used when filtering or grouping
      inventory items by type
    join_hint:
      table: tabItem Group
      'on': item_group = tabItem Group.name
  - name: default_warehouse
    description: Primary storage location automatically assigned for stock transactions
      when no specific warehouse is specified
    join_hint:
      table: tabWarehouse
      'on': default_warehouse = tabWarehouse.name
  - name: sample_retention_warehouse
    description: Dedicated storage location for holding quality control or testing
      samples separate from regular inventory
    join_hint:
      table: tabWarehouse
      'on': sample_retention_warehouse = tabWarehouse.name
  - name: stock_uom
    description: Default unit of measurement for inventory items when no specific
      UOM is defined
    join_hint:
      table: tabUOM
      'on': stock_uom = tabUOM.name
  - name: auto_insert_price_list_rate_if_missing
    description: Whether to automatically add item prices to price lists when they
      don't exist
  - name: update_price_list_based_on
    description: Source basis for automatically updating price list rates such as
      last purchase price or valuation rate
    options:
    - Rate
    - Price List Rate
  - name: update_existing_price_list_rate
    description: Whether price list rates are automatically updated when item prices
      change in stock transactions.
  - name: allow_to_edit_stock_uom_qty_for_sales
    description: Whether users can manually modify stock unit of measure quantities
      during sales transactions instead of using conversion factors.
  - name: allow_to_edit_stock_uom_qty_for_purchase
    description: Whether users can manually modify stock unit of measure quantities
      during purchase transactions instead of using conversion factors.
  - name: allow_uom_with_conversion_rate_defined_in_item
    description: Whether units of measure with conversion rates defined at the item
      level are permitted in stock transactions.
  - name: over_delivery_receipt_allowance
    description: Percentage threshold for accepting delivery receipts that exceed
      the ordered quantity.
  - name: mr_qty_allowance
    description: Percentage tolerance for material request quantities to exceed or
      fall short of planned amounts.
  - name: over_picking_allowance
    description: Percentage threshold that allows picking more items than ordered
      in sales or delivery transactions.
  - name: role_allowed_to_over_deliver_receive
    description: User role permitted to exceed standard delivery or receipt quantities
      beyond configured limits.
    join_hint:
      table: tabRole
      'on': role_allowed_to_over_deliver_receive = tabRole.name
  - name: allow_negative_stock
    description: Whether inventory can go below zero, enabling sales or issues without
      available stock.
  - name: show_barcode_field
    description: Controls whether barcode input fields are displayed in stock transactions
      and item forms.
  - name: clean_description_html
    description: Removes HTML formatting from item descriptions when displaying or
      printing stock documents.
  - name: allow_internal_transfer_at_arms_length_price
    description: Permits stock transfers between company entities to use market-rate
      pricing instead of cost price for transfer pricing compliance.
  - name: allow_existing_serial_no
    description: Whether the system permits reusing serial numbers that already exist
      in inventory transactions.
  - name: do_not_use_batchwise_valuation
    description: Whether inventory valuation is calculated at item level instead of
      separately for each batch.
  - name: auto_create_serial_and_batch_bundle_for_outward
    description: Whether serial and batch bundles are automatically generated when
      items leave inventory in outward transactions.
  - name: pick_serial_and_batch_based_on
    description: Determines the default selection criteria (FIFO, LIFO, expiry date)
      for automatically picking serial numbers and batch numbers during stock transactions.
    options:
    - FIFO
    - LIFO
    - Expiry
  - name: disable_serial_no_and_batch_selector
    description: Controls whether the interactive selector interface for choosing
      serial numbers and batches is turned off, forcing manual entry or automatic
      selection.
  - name: use_serial_batch_fields
    description: Enables dedicated fields for serial and batch number entry in stock
      transactions instead of using the selector interface.
  - name: do_not_update_serial_batch_on_creation_of_auto_bundle
    description: Controls whether serial numbers and batch numbers are automatically
      updated when auto-bundling inventory items during transactions.
  - name: set_serial_and_batch_bundle_naming_based_on_naming_series
    description: Determines if serial and batch bundle identifiers follow the configured
      naming series pattern instead of default naming.
  - name: use_naming_series
    description: Enables automatic sequential naming for stock-related documents using
      predefined prefix and number patterns.
  - name: naming_series_prefix
    description: Prefix used when generating automatic stock transaction document
      numbers
  - name: enable_stock_reservation
    description: Controls whether inventory can be reserved for future orders or transactions
      before actual delivery
  - name: allow_partial_reservation
    description: Controls whether orders can reserve less inventory than requested
      when full quantity is unavailable
  - name: auto_reserve_stock_for_sales_order_on_purchase
    description: Whether stock is automatically reserved for sales orders when purchase
      orders are created or received.
  - name: auto_reserve_serial_and_batch
    description: Whether serialized or batched items are automatically reserved during
      stock transactions.
  - name: action_if_quality_inspection_is_not_submitted
    description: What happens when quality inspection is required but not completed
      for stock receipts or deliveries.
    options:
    - Stop
    - Warn
  - name: action_if_quality_inspection_is_rejected
    description: Defines what happens when incoming materials fail quality inspection,
      such as rejecting the purchase receipt or blocking stock entry.
    options:
    - Stop
    - Warn
  - name: allow_to_make_quality_inspection_after_purchase_or_delivery
    description: Controls whether quality checks can be performed after goods have
      already been received or delivered instead of requiring inspection before acceptance.
  - name: auto_indent
    description: Automatically creates material requests or purchase orders when stock
      falls below reorder levels without manual intervention.
  - name: reorder_email_notify
    description: Whether email notifications are sent when stock reaches reorder level
      or triggers replenishment alerts.
  - name: allow_from_dn
    description: Whether stock transactions can be created or sourced from delivery
      notes.
  - name: allow_from_pr
    description: Whether stock transactions can be created or sourced from purchase
      receipts.
  - name: stock_frozen_upto
    description: Date until which stock transactions are frozen and cannot be modified
      or created, used when asking about stock freeze cutoff dates or locked periods.
  - name: stock_frozen_upto_days
    description: Number of days from today that stock transactions are frozen, used
      when asking about the duration or length of the stock freeze period.
  - name: role_allowed_to_create_edit_back_dated_transactions
    description: User role permitted to create or modify stock transactions with dates
