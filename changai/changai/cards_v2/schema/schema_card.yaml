- table: "tabEmployee"
  synonyms_en:
    - "employee master"
    - "staff record"
    - "hr employee"
    - "employee profile"
  description: "Stores master data for each employee, including personal details, employment information, status, contact details, and HR-related metadata."

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique ID / primary key for the employee record"
      synonyms_en: ["employee id", "employee record id", "employee document name"]

    - name: "creation"
      type: "DATETIME"
      role: ["metadata", "timestamp"]
      description: "Date and time when the employee record was created"
      synonyms_en: ["creation date", "created on", "entry time"]

    - name: "modified"
      type: "DATETIME"
      role: ["metadata", "timestamp"]
      description: "Date and time when the employee record was last modified"
      synonyms_en: ["last modified", "updated on", "modified date"]

    - name: "modified_by"
      type: "VARCHAR"
      role: ["metadata", "user"]
      description: "User who last modified the employee record"
      synonyms_en: ["last updated by", "modified by user"]

    - name: "owner"
      type: "VARCHAR"
      role: ["metadata", "user"]
      description: "User who created the employee record"
      synonyms_en: ["record owner", "created by"]

    - name: "docstatus"
      type: "INT"
      role: ["metadata", "status"]
      description: "Document status (0 = Draft, 1 = Submitted, 2 = Cancelled)"
      synonyms_en: ["document status", "record status flag"]

    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Index field used internally for ordering child records"
      synonyms_en: ["row index", "internal index"]

    - name: "employee"
      type: "VARCHAR"
      role: ["code", "business_key"]
      description: "Employee code or number used as a business identifier"
      synonyms_en: ["employee code", "employee number", "staff code"]

    - name: "naming_series"
      type: "VARCHAR"
      role: ["metadata"]
      description: "Naming series used for generating the employee document ID"
      synonyms_en: ["naming series", "id series"]

    - name: "first_name"
      type: "VARCHAR"
      role: ["dimension", "personal_info"]
      description: "Employee first name"
      synonyms_en: ["first name", "given name"]

    - name: "middle_name"
      type: "VARCHAR"
      role: ["dimension", "personal_info"]
      description: "Employee middle name"
      synonyms_en: ["middle name"]

    - name: "last_name"
      type: "VARCHAR"
      role: ["dimension", "personal_info"]
      description: "Employee last name or family name"
      synonyms_en: ["last name", "surname", "family name"]

    - name: "employee_name"
      type: "VARCHAR"
      role: ["display", "personal_info"]
      description: "Full display name for the employee"
      synonyms_en: ["employee full name", "staff name", "employee display name"]

    - name: "gender"
      type: "VARCHAR"
      role: ["dimension", "demographic"]
      description: "Gender of the employee"
      synonyms_en: ["gender"]

    - name: "date_of_birth"
      type: "DATE"
      role: ["timestamp", "personal_info"]
      description: "Date of birth of the employee"
      synonyms_en: ["date of birth", "dob", "birth date"]

    - name: "salutation"
      type: "VARCHAR"
      role: ["personal_info"]
      description: "Salutation or title used for the employee"
      synonyms_en: ["salutation", "title", "honorific"]

    - name: "date_of_joining"
      type: "DATE"
      role: ["timestamp", "employment"]
      description: "Date when the employee joined the company"
      synonyms_en: ["date of joining", "joining date", "hire date", "employment start date"]

    - name: "image"
      type: "TEXT"
      role: ["media"]
      description: "Path or reference to the employee's profile image"
      synonyms_en: ["photo", "profile image", "employee picture"]

    - name: "status"
      type: "VARCHAR"
      role: ["status", "filter"]
      description: "Current employment status of the employee (e.g., Active, Left)"
      synonyms_en: ["employee status", "employment status", "active or inactive"]

    - name: "user_id"
      type: "VARCHAR"
      role: ["link", "security"]
      description: "Linked system user ID associated with the employee"
      synonyms_en: ["user id", "linked user", "system user"]

    - name: "create_user_permission"
      type: "INT"
      role: ["security", "flag"]
      description: "Flag indicating whether user permission should be created for this employee"
      synonyms_en: ["create user permission", "auto create permission"]

    - name: "company"
      type: "VARCHAR"
      role: ["dimension", "company"]
      description: "Company to which the employee belongs"
      synonyms_en: ["company", "employing company", "organization"]

    - name: "department"
      type: "VARCHAR"
      role: ["dimension", "department"]
      description: "Department of the employee within the company"
      synonyms_en: ["department", "employee department", "team"]

    - name: "employee_number"
      type: "VARCHAR"
      role: ["code", "business_key"]
      description: "Alternate employee number or HR reference number"
      synonyms_en: ["employee number", "hr number", "staff number"]

    - name: "designation"
      type: "VARCHAR"
      role: ["dimension", "position"]
      description: "Job title or designation of the employee"
      synonyms_en: ["designation", "job title", "position", "role"]

    - name: "reports_to"
      type: "VARCHAR"
      role: ["relation", "manager"]
      description: "Employee or manager to whom this employee reports"
      synonyms_en: ["reports to", "line manager", "supervisor"]

    - name: "branch"
      type: "VARCHAR"
      role: ["dimension", "location"]
      description: "Branch or location where the employee is based"
      synonyms_en: ["branch", "office location", "work location"]

    - name: "scheduled_confirmation_date"
      type: "DATE"
      role: ["timestamp", "hr_process"]
      description: "Scheduled date for employee confirmation"
      synonyms_en: ["scheduled confirmation date", "probation end date"]

    - name: "final_confirmation_date"
      type: "DATE"
      role: ["timestamp", "hr_process"]
      description: "Final date when the employee was confirmed"
      synonyms_en: ["confirmation date", "employee confirmation date"]

    - name: "contract_end_date"
      type: "DATE"
      role: ["timestamp", "employment"]
      description: "Contract end date for contract employees"
      synonyms_en: ["contract end date", "employment end date"]

    - name: "notice_number_of_days"
      type: "INT"
      role: ["hr_policy"]
      description: "Number of notice days required as per policy"
      synonyms_en: ["notice period days", "notice days"]

    - name: "date_of_retirement"
      type: "DATE"
      role: ["timestamp", "employment"]
      description: "Retirement date of the employee, if applicable"
      synonyms_en: ["retirement date"]

    - name: "cell_number"
      type: "VARCHAR"
      role: ["contact"]
      description: "Mobile phone number of the employee"
      synonyms_en: ["mobile number", "cell phone", "contact number"]

    - name: "personal_email"
      type: "VARCHAR"
      role: ["contact"]
      description: "Personal email address of the employee"
      synonyms_en: ["personal email", "private email"]

    - name: "company_email"
      type: "VARCHAR"
      role: ["contact", "official"]
      description: "Official company email address of the employee"
      synonyms_en: ["company email", "work email", "official email"]

    - name: "prefered_contact_email"
      type: "VARCHAR"
      role: ["preference"]
      description: "Preferred email type to contact the employee"
      synonyms_en: ["preferred contact email", "primary email type"]

    - name: "prefered_email"
      type: "VARCHAR"
      role: ["preference"]
      description: "Preferred email address for communication"
      synonyms_en: ["preferred email", "primary email address"]

    - name: "unsubscribed"
      type: "INT"
      role: ["flag", "communication"]
      description: "Flag to indicate if the employee has unsubscribed from emails"
      synonyms_en: ["email unsubscribed", "opt-out flag"]

    - name: "current_address"
      type: "TEXT"
      role: ["address"]
      description: "Current residential address of the employee"
      synonyms_en: ["current address", "present address"]

    - name: "current_accommodation_type"
      type: "VARCHAR"
      role: ["address"]
      description: "Type of current accommodation (e.g., rented, company-provided)"
      synonyms_en: ["current accommodation type"]

    - name: "permanent_address"
      type: "TEXT"
      role: ["address"]
      description: "Permanent residential address of the employee"
      synonyms_en: ["permanent address", "home address"]

    - name: "permanent_accommodation_type"
      type: "VARCHAR"
      role: ["address"]
      description: "Type of permanent accommodation"
      synonyms_en: ["permanent accommodation type"]

    - name: "person_to_be_contacted"
      type: "VARCHAR"
      role: ["emergency_contact"]
      description: "Name of the emergency contact person"
      synonyms_en: ["emergency contact person", "contact in case of emergency"]

    - name: "emergency_phone_number"
      type: "VARCHAR"
      role: ["emergency_contact"]
      description: "Phone number of the emergency contact person"
      synonyms_en: ["emergency contact number", "emergency phone"]

    - name: "relation"
      type: "VARCHAR"
      role: ["emergency_contact"]
      description: "Relationship of the emergency contact person to the employee"
      synonyms_en: ["relationship", "relation to employee"]

    - name: "attendance_device_id"
      type: "VARCHAR"
      role: ["integration", "id"]
      description: "Identifier of the employee in biometric or attendance device systems"
      synonyms_en: ["attendance device id", "biometric id", "time system id"]

    - name: "holiday_list"
      type: "VARCHAR"
      role: ["hr_policy"]
      description: "Holiday list assigned to the employee"
      synonyms_en: ["holiday list", "holiday calendar"]

    - name: "ctc"
      type: "DECIMAL"
      role: ["metric", "salary"]
      description: "Cost to company for the employee"
      synonyms_en: ["ctc", "annual ctc", "total compensation"]

    - name: "salary_currency"
      type: "VARCHAR"
      role: ["currency", "salary"]
      description: "Currency in which the employee's salary is defined"
      synonyms_en: ["salary currency", "pay currency"]

    - name: "salary_mode"
      type: "VARCHAR"
      role: ["salary", "payment"]
      description: "Mode of salary payment (e.g., Bank, Cash)"
      synonyms_en: ["salary mode", "payment mode"]

    - name: "bank_name"
      type: "VARCHAR"
      role: ["banking"]
      description: "Bank name where the employee's salary is deposited"
      synonyms_en: ["bank name", "salary bank"]

    - name: "bank_ac_no"
      type: "VARCHAR"
      role: ["banking"]
      description: "Bank account number of the employee"
      synonyms_en: ["bank account number", "salary account"]

    - name: "iban"
      type: "VARCHAR"
      role: ["banking"]
      description: "IBAN of the employee's bank account"
      synonyms_en: ["iban", "international bank account number"]

    - name: "marital_status"
      type: "VARCHAR"
      role: ["demographic"]
      description: "Marital status of the employee"
      synonyms_en: ["marital status"]

    - name: "family_background"
      type: "TEXT"
      role: ["hr_notes"]
      description: "Family background information of the employee"
      synonyms_en: ["family background", "family details"]

    - name: "blood_group"
      type: "VARCHAR"
      role: ["health"]
      description: "Blood group of the employee"
      synonyms_en: ["blood group"]

    - name: "health_details"
      type: "TEXT"
      role: ["health"]
      description: "Health-related details or medical notes for the employee"
      synonyms_en: ["health details", "medical details"]

    - name: "passport_number"
      type: "VARCHAR"
      role: ["id", "travel"]
      description: "Passport number of the employee"
      synonyms_en: ["passport number"]

    - name: "valid_upto"
      type: "DATE"
      role: ["travel"]
      description: "Passport validity end date"
      synonyms_en: ["passport valid till", "passport expiry date"]

    - name: "date_of_issue"
      type: "DATE"
      role: ["travel"]
      description: "Passport date of issue"
      synonyms_en: ["passport issue date"]

    - name: "place_of_issue"
      type: "VARCHAR"
      role: ["travel"]
      description: "Place where the passport was issued"
      synonyms_en: ["passport place of issue"]

    - name: "bio"
      type: "LONGTEXT"
      role: ["notes"]
      description: "Freeform biography or additional info about the employee"
      synonyms_en: ["bio", "employee bio", "about employee"]

    - name: "resignation_letter_date"
      type: "DATE"
      role: ["exit"]
      description: "Date when the employee submitted the resignation letter"
      synonyms_en: ["resignation letter date"]

    - name: "relieving_date"
      type: "DATE"
      role: ["exit"]
      description: "Relieving date or last working day of the employee"
      synonyms_en: ["relieving date", "last working day"]

    - name: "held_on"
      type: "DATE"
      role: ["exit"]
      description: "Date on which exit interview or related event was held"
      synonyms_en: ["exit interview date", "held on date"]

    - name: "new_workplace"
      type: "VARCHAR"
      role: ["exit"]
      description: "New workplace or organization the employee is joining"
      synonyms_en: ["new workplace", "next employer"]

    - name: "leave_encashed"
      type: "VARCHAR"
      role: ["exit", "benefits"]
      description: "Indicates whether leave was encashed at exit"
      synonyms_en: ["leave encashed", "leave encashment status"]

    - name: "encashment_date"
      type: "DATE"
      role: ["exit", "benefits"]
      description: "Date on which leave encashment was processed"
      synonyms_en: ["leave encashment date"]

    - name: "reason_for_leaving"
      type: "TEXT"
      role: ["exit"]
      description: "Reason provided by the employee for leaving the organization"
      synonyms_en: ["reason for leaving", "exit reason"]

    - name: "feedback"
      type: "TEXT"
      role: ["exit", "feedback"]
      description: "Feedback collected from the employee during exit"
      synonyms_en: ["exit feedback", "employee feedback"]

    - name: "lft"
      type: "INT"
      role: ["system", "tree"]
      description: "Left index used for nested set hierarchy of employees"
      synonyms_en: ["left index", "tree left"]

    - name: "rgt"
      type: "INT"
      role: ["system", "tree"]
      description: "Right index used for nested set hierarchy of employees"
      synonyms_en: ["right index", "tree right"]

    - name: "old_parent"
      type: "VARCHAR"
      role: ["system", "tree"]
      description: "Previous parent node in the employee hierarchy"
      synonyms_en: ["old parent", "previous parent"]

    - name: "_user_tags"
      type: "TEXT"
      role: ["metadata"]
      description: "Tags assigned to the employee record for quick filtering"
      synonyms_en: ["user tags", "record tags"]

    - name: "_comments"
      type: "TEXT"
      role: ["metadata", "comments"]
      description: "System-stored comments and timeline for the employee record"
      synonyms_en: ["comments", "timeline comments"]

    - name: "_assign"
      type: "TEXT"
      role: ["metadata", "assignment"]
      description: "Assignment information for workflows and tasks"
      synonyms_en: ["assigned to", "assignment info"]

    - name: "_liked_by"
      type: "TEXT"
      role: ["metadata"]
      description: "Stores a list of users who liked or acknowledged the employee document"
      synonyms_en: ["liked by", "acknowledged by", "favorited by"]

  notes: |
    - Core HR master doctype for storing employee personal, contact, and employment information.
    - Use `status` (e.g., Active, Left) and `docstatus` to filter current active employees.
    - `company`, `department`, `branch`, and `designation` are key dimensions for HR and payroll reporting.
    - `date_of_joining`, `date_of_retirement`, `resignation_letter_date`, and `relieving_date` are important for tenure and exit analytics.
    - `user_id` links the employee to a system user account for permissions and access control.
    - `attendance_device_id` connects the record with biometric or attendance systems.
    - Nested-set fields `lft` and `rgt` allow hierarchical organization of employees (e.g., org charts).
    - Contact fields like `cell_number`, `personal_email`, and `company_email` support communication and notifications.
    - Salary-related fields such as `ctc`, `salary_currency`, `bank_name`, and `bank_ac_no` are used for payroll and payment integrations.

- table: "tabCustomer"
  synonyms_en:
    - "client"
    - "buyer"
    - "customer record"
    - "customer master"
    - "account holder"
  description: "Details of customers including name, type, classification, contact, and financial defaults."
  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique customer ID / primary key"
      synonyms_en: ["customer id", "customer code", "customer number", "customer key"]
      synonyms_ar: ["معرّف العميل", "رمز العميل", "رقم العميل", "مفتاح العميل"]

    - name: "creation"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the customer record was created"
      synonyms_en: ["created at", "creation time", "record created on", "created date"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

    - name: "modified"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the customer record was last modified"
      synonyms_en: ["updated at", "last updated", "last modified", "modified time"]
      synonyms_ar: ["تاريخ التعديل", "آخر تحديث", "تم التعديل في"]

    - name: "modified_by"
      type: "VARCHAR"
      role: ["system"]
      description: "User who last modified the record"
      synonyms_en: ["updated by", "modified user", "last editor", "edited by"]
      synonyms_ar: ["تم التعديل بواسطة", "آخر من عدّل", "المحرر"]

    - name: "owner"
      type: "VARCHAR"
      role: ["system"]
      description: "User who originally created the record"
      synonyms_en: ["created by", "record owner", "initiated by", "creator"]
      synonyms_ar: ["تم الإنشاء بواسطة", "مالك السجل", "المنشئ"]

    - name: "docstatus"
      type: "INT"
      role: ["lifecycle"]
      description: "Document status: 0=Draft, 1=Active, 2=Cancelled"
      synonyms_en: ["status code", "document state", "record status"]
      synonyms_ar: ["حالة المستند", "رمز الحالة", "حالة السجل"]

    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Internal index used for ordering"
      synonyms_en: ["record index", "internal index", "row index"]
      synonyms_ar: ["فهرس السجل", "الترتيب الداخلي", "رقم الصف"]

    - name: "naming_series"
      type: "VARCHAR"
      role: ["system"]
      description: "Naming series used for generating customer ID"
      synonyms_en: ["customer series", "numbering format", "naming pattern"]
      synonyms_ar: ["سلسلة التسمية", "نمط الترقيم", "نمط التسمية"]

    - name: "salutation"
      type: "VARCHAR"
      role: ["attribute"]
      description: "Salutation or prefix (e.g., Mr., Ms., Dr.)"
      synonyms_en: ["title", "prefix", "honorific", "greeting"]
      synonyms_ar: ["اللقب", "التحية", "صفة المخاطبة"]

    - name: "customer_name"
      type: "VARCHAR"
      role: ["party", "dimension"]
      description: "Display name of the customer"
      synonyms_en: ["client name", "buyer name", "account name"]
      synonyms_ar: ["اسم العميل", "اسم الزبون", "اسم المشتري"]

    - name: "customer_type"
      type: "VARCHAR"
      role: ["classification"]
      description: "Type of customer, e.g., Company or Individual"
      synonyms_en: ["customer category", "type", "classification"]
      synonyms_ar: ["نوع العميل", "فئة العميل", "تصنيف العميل"]

    - name: "customer_group"
      type: "VARCHAR"
      role: ["classification"]
      description: "Group or category under which the customer falls"
      synonyms_en: ["customer category", "client group", "buyer segment"]
      synonyms_ar: ["مجموعة العملاء", "فئة العميل", "قطاع العميل"]

    - name: "territory"
      type: "VARCHAR"
      role: ["dimension"]
      description: "Geographical region or business territory of the customer"
      synonyms_en: ["region", "area", "zone", "territory name"]
      synonyms_ar: ["المنطقة", "الإقليم", "القطاع الجغرافي"]

    - name: "gender"
      type: "VARCHAR"
      role: ["attribute"]
      description: "Gender of the customer (if applicable)"
      synonyms_en: ["sex", "gender type"]
      synonyms_ar: ["الجنس", "النوع"]

    - name: "lead_name"
      type: "VARCHAR"
      role: ["relation"]
      description: "Linked lead record from which this customer was created"
      synonyms_en: ["lead id", "lead reference", "lead record"]
      synonyms_ar: ["اسم العميل المتوقع", "مرجع العميل المتوقع", "معرّف العميل المحتمل"]

    - name: "opportunity_name"
      type: "VARCHAR"
      role: ["relation"]
      description: "Linked opportunity record (if created from sales opportunity)"
      synonyms_en: ["opportunity id", "sales opportunity", "deal reference"]
      synonyms_ar: ["اسم الفرصة", "الفرصة البيعية", "مرجع الصفقة"]

    - name: "prospect_name"
      type: "VARCHAR"
      role: ["relation"]
      description: "Linked prospect record (if created from prospect)"
      synonyms_en: ["prospect id", "potential customer", "prospect record"]
      synonyms_ar: ["اسم العميل المحتمل", "مرجع العميل المحتمل", "سجل العميل المحتمل"]

    - name: "account_manager"
      type: "VARCHAR"
      role: ["personnel"]
      description: "Assigned account manager responsible for the customer"
      synonyms_en: ["sales manager", "customer manager", "relationship manager"]
      synonyms_ar: ["مدير الحساب", "مدير المبيعات", "مدير العلاقات"]

    - name: "image"
      type: "TEXT"
      role: ["media"]
      description: "Customer image or logo (stored as file path or URL)"
      synonyms_en: ["photo", "profile picture", "logo"]
      synonyms_ar: ["صورة العميل", "شعار العميل", "الملف الشخصي"]

    - name: "default_currency"
      type: "VARCHAR"
      role: ["finance"]
      description: "Default currency used for transactions with this customer"
      synonyms_en: ["currency", "customer currency", "default money unit"]
      synonyms_ar: ["العملة الافتراضية", "عملة العميل", "العملة"]

    - name: "default_bank_account"
      type: "VARCHAR"
      role: ["finance"]
      description: "Default bank account linked to the customer"
      synonyms_en: ["bank account", "default bank", "customer bank"]
      synonyms_ar: ["الحساب البنكي الافتراضي", "البنك الافتراضي", "حساب العميل"]

    - name: "default_price_list"
      type: "VARCHAR"
      role: ["finance"]
      description: "Default price list applied for sales transactions"
      synonyms_en: ["price list", "rate chart", "pricing list"]
      synonyms_ar: ["قائمة الأسعار الافتراضية", "جدول الأسعار", "قائمة التسعير"]

    - name: "is_internal_customer"
      type: "INT"
      role: ["flag"]
      description: "Indicates whether the customer is internal (0=No, 1=Yes)"
      synonyms_en: ["internal flag", "is internal", "internal customer"]
      synonyms_ar: ["عميل داخلي", "علم داخلي", "هل العميل داخلي"]

    - name: "represents_company"
      type: "VARCHAR"
      role: ["relation"]
      description: "Company represented by the customer (if applicable)"
      synonyms_en: ["associated company", "represented entity", "linked company"]
      synonyms_ar: ["الشركة الممثلة", "الكيان المرتبط", "الشركة التابعة"]

    - name: "market_segment"
      type: "VARCHAR"
      role: ["classification"]
      description: "Market segment or sector the customer belongs to"
      synonyms_en: ["business segment", "customer segment", "market category"]
      synonyms_ar: ["القطاع السوقي", "شريحة السوق", "فئة السوق"]

    - name: "industry"
      type: "VARCHAR"
      role: ["classification"]
      description: "Industry or line of business of the customer"
      synonyms_en: ["business industry", "sector", "trade type"]
      synonyms_ar: ["الصناعة", "القطاع", "نوع النشاط"]

