  notes: |
    - This doctype is the root of financial and organizational configuration.
    - Most modules, including accounting, HR, payroll, tax, and assets, depend on company settings.
    - The structure supports multi-company setups and nested company hierarchies using `lft` and `rgt`.
    - Many fields act as defaults for other transactions like journals, sales, purchases and inventory operations.


- table: "tabPurchase Receipt Item"
  synonyms_en:
    - "goods receipt item"
    - "purchase receipt line"
    - "received goods entry"
    - "material receipt item"
    - "purchase GRN detail"
  description: "Individual item entries under a Purchase Receipt, recording details of goods received from suppliers."

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique identifier for each purchase receipt item record."
      synonyms_en: ["item record id", "purchase receipt item id", "entry id"]
      synonyms_ar: ["معرّف البند", "رمز عنصر استلام الشراء", "معرّف السجل"]

    - name: "creation"
      type: "DATETIME"
      role: ["audit"]
      description: "Timestamp when the record was created."
      synonyms_en: ["creation time", "created on", "record created at"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

    - name: "modified"
      type: "DATETIME"
      role: ["audit"]
      description: "Timestamp of the last modification of the record."
      synonyms_en: ["modified on", "updated on", "last updated time"]
      synonyms_ar: ["تاريخ التعديل", "آخر تعديل", "تم التعديل في"]

    - name: "modified_by"
      type: "VARCHAR"
      role: ["audit"]
      description: "User who last modified the record."
      synonyms_en: ["modified by", "updated by", "last editor"]
      synonyms_ar: ["عُدّل بواسطة", "تم التحديث بواسطة", "آخر من عدّل"]

    - name: "owner"
      type: "VARCHAR"
      role: ["audit"]
      description: "User who originally created the record."
      synonyms_en: ["owner", "created by", "record creator"]
      synonyms_ar: ["المالك", "أنشأ بواسطة", "منشئ السجل"]

    - name: "docstatus"
      type: "INT"
      role: ["status"]
      description: "Document status (0 = Draft, 1 = Submitted, 2 = Cancelled)."
      synonyms_en: ["document status", "record state", "approval status"]
      synonyms_ar: ["حالة المستند", "حالة السجل", "حالة الموافقة"]

    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Index used for maintaining order of items in the Purchase Receipt."
      synonyms_en: ["index", "row order", "sequence number"]
      synonyms_ar: ["الفهرس", "ترتيب الصف", "رقم التسلسل"]

    - name: "barcode"
      type: "VARCHAR"
      role: ["reference"]
      description: "Barcode assigned to the item for identification or scanning."
      synonyms_en: ["item barcode", "product code", "scan code"]
      synonyms_ar: ["الرمز الشريطي", "رمز المنتج", "رمز المسح"]

    - name: "has_item_scanned"
      type: "INT"
      role: ["flag"]
      description: "Indicates if the item has been scanned (1 = Yes, 0 = No)."
      synonyms_en: ["item scanned", "scan flag", "barcode verified"]
      synonyms_ar: ["تم مسح العنصر", "علامة المسح", "رمز تم التحقق منه"]

    - name: "item_code"
      type: "VARCHAR"
      role: ["reference"]
      description: "Code that identifies the specific item being received."
      synonyms_en: ["item code", "product id", "sku", "inventory code"]
      synonyms_ar: ["رمز العنصر", "رمز المنتج", "رمز المخزون", "رمز السلعة"]

    - name: "product_bundle"
      type: "VARCHAR"
      role: ["reference"]
      description: "Reference to the product bundle that includes this item, if applicable."
      synonyms_en: ["bundle code", "product bundle", "kit reference"]
      synonyms_ar: ["حزمة المنتج", "رمز الحزمة", "مرجع المجموعة"]

    - name: "supplier_part_no"
      type: "VARCHAR"
      role: ["reference"]
      description: "Part number assigned by the supplier for this item."
      synonyms_en: ["supplier part number", "vendor part id", "supplier item code"]
      synonyms_ar: ["رقم جزء المورد", "رمز المورد", "رمز العنصر من المورد"]

    - name: "item_name"
      type: "VARCHAR"
      role: ["attribute"]
      description: "The name of the received item as per the item master or supplier record."
      synonyms_en: ["item name", "product name", "goods name"]
      synonyms_ar: ["اسم العنصر", "اسم المنتج", "اسم البضاعة"]

    - name: "description"
      type: "LONGTEXT"
      role: ["attribute"]
      description: "Detailed description of the item received, including specifications or remarks."
      synonyms_en: ["item description", "product details", "specification"]
      synonyms_ar: ["وصف العنصر", "تفاصيل المنتج", "المواصفات"]

    - name: "brand"
      type: "VARCHAR"
      role: ["attribute"]
      description: "Brand name of the received item."
      synonyms_en: ["brand", "manufacturer", "make"]
      synonyms_ar: ["العلامة التجارية", "المُصنّع", "النوع"]

    - name: "item_group"
      type: "VARCHAR"
      role: ["classification"]
      description: "Category or group under which the item falls."
      synonyms_en: ["item group", "category", "product group"]
      synonyms_ar: ["مجموعة العناصر", "الفئة", "مجموعة المنتجات"]

    - name: "image"
      type: "TEXT"
      role: ["reference"]
      description: "Link or path to the product image."
      synonyms_en: ["image link", "product image", "item photo"]
      synonyms_ar: ["صورة المنتج", "رابط الصورة", "صورة العنصر"]

    - name: "received_qty"
      type: "DECIMAL"
      role: ["quantity"]
      description: "Actual quantity received from the supplier."
      synonyms_en: ["received quantity", "qty received", "delivered quantity"]
      synonyms_ar: ["الكمية المستلمة", "كمية التسليم", "عدد الوحدات المستلمة"]

    - name: "qty"
      type: "DECIMAL"
      role: ["quantity"]
      description: "Ordered quantity or quantity intended to be received."
      synonyms_en: ["ordered quantity", "expected qty", "purchase quantity"]
      synonyms_ar: ["الكمية المطلوبة", "الكمية المتوقعة", "كمية الشراء"]

    - name: "rejected_qty"
      type: "DECIMAL"
      role: ["quantity"]
      description: "Quantity rejected during inspection or quality control."
      synonyms_en: ["rejected quantity", "defective qty", "returned qty"]
      synonyms_ar: ["الكمية المرفوضة", "كمية مرفوضة", "كمية مرفوضة من الفحص"]

    - name: "uom"
      type: "VARCHAR"
      role: ["unit"]
      description: "Unit of Measure used for the transaction (e.g., Nos, Kg, Box)."
      synonyms_en: ["unit of measure", "uom", "measurement unit"]
      synonyms_ar: ["وحدة القياس", "الوحدة", "مقياس الكمية"]

    - name: "stock_uom"
      type: "VARCHAR"
      role: ["unit"]
      description: "Base stock unit used in inventory for this item."
      synonyms_en: ["stock unit", "inventory uom", "base unit"]
      synonyms_ar: ["وحدة المخزون", "الوحدة الأساسية", "مقياس التخزين"]

    - name: "conversion_factor"
      type: "DECIMAL"
      role: ["calculation"]
      description: "Conversion rate between transaction UOM and stock UOM."
      synonyms_en: ["conversion factor", "uom conversion", "unit conversion"]
      synonyms_ar: ["عامل التحويل", "معدل التحويل", "تحويل الوحدة"]

    - name: "retain_sample"
      type: "INT"
      role: ["flag"]
      description: "Indicates if a sample is retained for testing (1 = Yes, 0 = No)."
      synonyms_en: ["retain sample", "sample retained", "test sample kept"]
      synonyms_ar: ["الاحتفاظ بالعينة", "تم الاحتفاظ بعينة", "عينة للفحص"]

    - name: "sample_quantity"
      type: "INT"
      role: ["quantity"]
      description: "Quantity of sample retained for testing or quality control."
      synonyms_en: ["sample quantity", "test sample qty", "retained qty"]
      synonyms_ar: ["كمية العينة", "كمية الفحص", "كمية محتجزة"]

    - name: "received_stock_qty"
      type: "DECIMAL"
      role: ["quantity"]
      description: "Quantity of items received, converted to stock UOM."
      synonyms_en: ["received stock quantity", "stock qty received", "inventory received qty"]
      synonyms_ar: ["كمية المخزون المستلمة", "الكمية المخزنة", "كمية استلام المخزون"]

    - name: "stock_qty"
      type: "DECIMAL"
      role: ["quantity"]
      description: "Total stock quantity considering conversion factor."
      synonyms_en: ["stock quantity", "converted qty", "inventory quantity"]
      synonyms_ar: ["كمية المخزون", "كمية محوّلة", "عدد الوحدات في المخزون"]

    - name: "returned_qty"
      type: "DECIMAL"
      role: ["quantity"]
      description: "Quantity returned to the supplier after inspection."
      synonyms_en: ["returned quantity", "supplier return qty", "qty sent back"]
      synonyms_ar: ["الكمية المعادة", "كمية تم إرجاعها", "الكمية المرتجعة"]

    - name: "price_list_rate"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Rate of the item as per the price list."
      synonyms_en: ["price list rate", "catalog rate", "listed price"]
      synonyms_ar: ["سعر القائمة", "سعر الكتالوج", "السعر المدرج"]

    - name: "base_price_list_rate"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Base rate from the price list in the company’s base currency."
      synonyms_en: ["base price list rate", "base catalog rate", "base listed price"]
      synonyms_ar: ["سعر القائمة الأساسي", "السعر الأساسي", "السعر في العملة الأساسية"]

    - name: "margin_type"
      type: "VARCHAR"
      role: ["pricing"]
      description: "Type of margin applied (e.g., Percentage, Amount)."
      synonyms_en: ["margin type", "profit margin type", "markup type"]
      synonyms_ar: ["نوع الهامش", "نوع الربح", "فئة الهامش"]

    - name: "margin_rate_or_amount"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Margin value applied to the rate, either as a percentage or fixed amount."
      synonyms_en: ["margin rate", "profit margin", "markup value"]
      synonyms_ar: ["معدل الهامش", "قيمة الربح", "قيمة الزيادة"]

    - name: "rate_with_margin"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Final rate after applying margin adjustments."
      synonyms_en: ["rate with margin", "final rate", "selling rate"]
      synonyms_ar: ["السعر بعد الهامش", "السعر النهائي", "السعر المعدّل"]

    - name: "discount_percentage"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Discount percentage applied on the item."
      synonyms_en: ["discount percent", "discount rate", "percentage off"]
      synonyms_ar: ["نسبة الخصم", "معدل الخصم", "خصم مئوي"]

    - name: "discount_amount"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Discount amount deducted from the item’s price."
      synonyms_en: ["discount amount", "discount value", "price reduction"]
      synonyms_ar: ["مبلغ الخصم", "قيمة الخصم", "الخصم النقدي"]

    - name: "distributed_discount_amount"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Distributed portion of total discount allocated to this item."
      synonyms_en: ["distributed discount", "allocated discount", "item-level discount"]
      synonyms_ar: ["الخصم الموزع", "الخصم المخصص", "خصم على مستوى العنصر"]

    - name: "base_rate_with_margin"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Base currency rate after margin adjustment, used for accounting and reporting."
      synonyms_en: ["base rate with margin", "adjusted base rate", "base selling rate"]
      synonyms_ar: ["السعر الأساسي بعد الهامش", "السعر المعدّل الأساسي", "سعر البيع الأساسي"]

    - name: "rate"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Rate per unit of the item in the transaction currency."
      synonyms_en: ["rate", "item rate", "unit price"]
      synonyms_ar: ["السعر", "سعر الوحدة", "سعر العنصر"]

    - name: "amount"
      type: "DECIMAL"
      role: ["pricing", "calculation"]
      description: "Total amount for the item (rate × quantity) before discounts and taxes."
      synonyms_en: ["amount", "total amount", "line total"]
      synonyms_ar: ["المبلغ", "المجموع الفرعي", "القيمة الإجمالية"]

    - name: "base_rate"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Rate of the item in the company’s base currency."
      synonyms_en: ["base rate", "base unit price", "rate in base currency"]
      synonyms_ar: ["السعر الأساسي", "سعر الوحدة الأساسي", "السعر بالعملة الأساسية"]

    - name: "base_amount"
      type: "DECIMAL"
      role: ["pricing", "calculation"]
      description: "Total amount in base currency (base_rate × quantity)."
      synonyms_en: ["base amount", "total in base currency", "converted amount"]
      synonyms_ar: ["المبلغ الأساسي", "القيمة بالعملة الأساسية", "المبلغ المحوّل"]

    - name: "pricing_rules"
      type: "TEXT"
      role: ["reference"]
      description: "List of pricing rules or conditions applied to this item."
      synonyms_en: ["pricing rules", "price conditions", "discount rules"]
      synonyms_ar: ["قواعد التسعير", "شروط السعر", "قواعد الخصم"]

    - name: "stock_uom_rate"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Item rate per stock unit after UOM conversion."
      synonyms_en: ["stock uom rate", "inventory rate", "rate per stock unit"]
      synonyms_ar: ["سعر وحدة المخزون", "سعر المخزون", "سعر لكل وحدة أساسية"]

    - name: "is_free_item"
      type: "INT"
      role: ["flag"]
      description: "Indicates if the item is given free of charge (1 = Yes, 0 = No)."
      synonyms_en: ["is free item", "free of cost", "complimentary item"]
      synonyms_ar: ["عنصر مجاني", "مجانًا", "سلعة مجانية"]

    - name: "apply_tds"
      type: "INT"
      role: ["flag"]
      description: "Specifies whether Tax Deducted at Source (TDS) is applicable (1 = Yes, 0 = No)."
      synonyms_en: ["apply tds", "tds applicable", "tax deduction source"]
      synonyms_ar: ["تطبيق الضريبة عند المصدر", "خاضع للضريبة المقتطعة", "اقتطاع الضريبة"]

    - name: "net_rate"
      type: "DECIMAL"
      role: ["pricing", "calculation"]
