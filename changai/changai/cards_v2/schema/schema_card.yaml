    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Row index within the Material Request document"
      synonyms_en: ["row number", "line number", "index"]
      synonyms_ar: ["رقم الصف", "رقم السطر", "الترتيب"]

    - name: "item_code"
      type: "VARCHAR"
      role: ["id", "product"]
      description: "Unique code identifying the requested item"
      synonyms_en: ["item code", "product code", "sku", "material code"]
      synonyms_ar: ["رمز الصنف", "رمز المنتج", "رمز المادة"]

    - name: "item_name"
      type: "VARCHAR"
      role: ["product"]
      description: "Name of the requested item"
      synonyms_en: ["item name", "product name", "material name"]
      synonyms_ar: ["اسم الصنف", "اسم المنتج", "اسم المادة"]

    - name: "schedule_date"
      type: "DATE"
      role: ["date"]
      description: "Planned date for receiving or using the item"
      synonyms_en: ["required date", "delivery date", "schedule date"]
      synonyms_ar: ["تاريخ الجدولة", "تاريخ التسليم", "تاريخ الاستلام"]

    - name: "description"
      type: "TEXT"
      role: ["comment"]
      description: "Detailed description of the requested item"
      synonyms_en: ["item description", "details", "remarks"]
      synonyms_ar: ["الوصف", "تفاصيل الصنف", "ملاحظات"]

    - name: "item_group"
      type: "VARCHAR"
      role: ["category"]
      description: "Group or category of the requested item"
      synonyms_en: ["item group", "product category", "item category"]
      synonyms_ar: ["مجموعة الصنف", "فئة المنتج", "تصنيف العنصر"]

    - name: "brand"
      type: "VARCHAR"
      role: ["attribute"]
      description: "Brand associated with the requested item"
      synonyms_en: ["brand", "manufacturer", "label"]
      synonyms_ar: ["العلامة التجارية", "المنتج", "المُصنّع"]

    - name: "image"
      type: "TEXT"
