    - name: "remarks"
      type: "TEXT"
      description: "Additional notes or comments describing the payment details."
      synonyms_en: ["comments", "payment notes"]
      synonyms_ar: ["ملاحظات", "تعليقات الدفعة"]

    - name: "base_in_words"
      type: "TEXT"
      description: "Total base amount written in words in the company's base currency."
      synonyms_en: ["base total in words", "base amount words"]
      synonyms_ar: ["المبلغ الأساسي بالحروف", "الإجمالي بعملة الأساس بالحروف"]

    - name: "is_opening"
      type: "VARCHAR(140)"
      description: "Indicates whether this payment entry represents an opening balance."
      synonyms_en: ["opening entry flag", "opening balance indicator"]
      synonyms_ar: ["إدخال افتتاحي", "رصيد افتتاحي"]

    - name: "letter_head"
      type: "VARCHAR(140)"
      description: "Letterhead template used when printing this payment document."
      synonyms_en: ["document letterhead", "print header"]
      synonyms_ar: ["رأس الخطاب", "نموذج الطباعة"]

    - name: "print_heading"
      type: "VARCHAR(140)"
      description: "Custom title displayed on printed versions of this payment entry."
      synonyms_en: ["print title", "print heading"]
      synonyms_ar: ["عنوان الطباعة", "رأس الطباعة"]

    - name: "bank"
      type: "VARCHAR(140)"
      description: "Name of the bank used for this payment transaction."
      synonyms_en: ["bank name", "associated bank"]
      synonyms_ar: ["اسم البنك", "البنك المرتبط"]

    - name: "bank_account_no"
      type: "VARCHAR(140)"
      description: "Bank account number from which or to which the payment is made."
      synonyms_en: ["bank account number", "account number"]
      synonyms_ar: ["رقم الحساب البنكي", "رقم الحساب"]

    - name: "payment_order"
      type: "VARCHAR(140)"
      description: "Reference to the associated payment order document."
      synonyms_en: ["payment order reference", "linked payment order"]
      synonyms_ar: ["أمر الدفع", "مرجع الدفع"]

    - name: "in_words"
      type: "TEXT"
      description: "Total paid amount written in words in the transaction currency."
      synonyms_en: ["amount in words", "payment amount in words"]
      synonyms_ar: ["المبلغ بالحروف", "إجمالي الدفع بالحروف"]

    - name: "auto_repeat"
      type: "VARCHAR(140)"
      description: "Specifies if this payment entry is linked to an auto-repeat schedule."
      synonyms_en: ["auto repeat", "recurring payment reference"]
      synonyms_ar: ["تكرار تلقائي", "دفعة متكررة"]

    - name: "amended_from"
      type: "VARCHAR(140)"
      description: "Reference to the original payment entry if this document is an amendment."
      synonyms_en: ["amended from document", "revision source"]
      synonyms_ar: ["تعديل من", "مستند معدل"]

    - name: "title"
      type: "VARCHAR(140)"
      description: "Custom title of this payment entry used for display or identification."
      synonyms_en: ["document title", "payment entry title"]
      synonyms_ar: ["عنوان المستند", "عنوان الدفع"]

    - name: "_user_tags"
      type: "TEXT"
      description: "User-defined tags for categorizing or filtering this payment entry."
      synonyms_en: ["user tags", "custom labels"]
      synonyms_ar: ["الوسوم", "العلامات"]

    - name: "_comments"
      type: "TEXT"
      description: "Internal user comments or system notes associated with the document."
      synonyms_en: ["comments", "notes"]
      synonyms_ar: ["التعليقات", "ملاحظات"]

    - name: "_assign"
      type: "TEXT"
      description: "Details of user assignments for this payment entry."
      synonyms_en: ["assignments", "assigned users"]
      synonyms_ar: ["التعيينات", "المستخدمون المعينون"]

    - name: "_liked_by"
      type: "TEXT"
      description: "List of users who liked or starred this payment entry."
      synonyms_en: ["liked by users", "favorites"]
      synonyms_ar: ["المعجبون", "المفضلون"]

  notes: |
    - Core doctype for POS session payment reconciliation.
    - Use `docstatus = 1` to filter submitted POS closing entries.
    - Key joins: `mode_of_payment` → `tabMode of Payment Account`, `parent` → `tabPOS Closing Entry`.
    - `opening_amount`, `expected_amount`, and `closing_amount` track daily cash flow per mode of payment.
    - `difference` highlights shortages or overages between expected and counted cash.
    - Useful for cash management, audit, and POS reconciliation reports.
    - Indexed fields like `mode_of_payment`, `parent`, and `creation` improve query performance.


- table: "tabSales Invoice"
  synonyms_en:
    - "customer bill"
    - "sales receipt"
    - "sales invoice"
    - "invoice"
    - "customer invoice"
    - "sales bill"
    - "sales record"
    - "sales document"
    - "billing record"
    - "transaction slip"
  description: "Record of goods or services sold to a customer, including pricing, taxes, and payment terms."
  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Invoice ID / primary key"
      synonyms_en: ["invoice id", "invoice number","inv no","bill number","si id"]
      synonyms_ar: ["رقم الفاتورة", "معرّف الفاتورة", "رمز الفاتورة", "تسلسل الفاتورة"]

    - name: "creation"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the invoice was created"
      synonyms_en: ["created at", "creation time", "invoice created on", "created date"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

    - name: "modified"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the invoice was last modified"
      synonyms_en: ["updated at", "last updated", "last modified", "modified time"]
      synonyms_ar: ["تاريخ التعديل", "آخر تحديث", "تم التعديل في"]

    - name: "modified_by"
      type: "VARCHAR"
      role: ["system"]
      description: "User who last modified the invoice"
      synonyms_en: ["updated by", "modified user", "last editor", "edited by"]
      synonyms_ar: ["تم التعديل بواسطة", "آخر من عدّل", "المحرر"]

    - name: "owner"
      type: "VARCHAR"
      role: ["system"]
      description: "User who originally created the invoice"
      synonyms_en: ["created by", "invoice owner", "initiated by", "creator"]
      synonyms_ar: ["تم الإنشاء بواسطة", "مالك الفاتورة", "المنشئ"]

    - name: "docstatus"
      type: "INT"
      role: ["lifecycle"]
      description: "Document status: 0=Draft, 1=Submitted, 2=Cancelled"
      synonyms_en: ["status code", "submission state", "document state", "invoice status"]
      synonyms_ar: ["حالة المستند", "رمز الحالة", "حالة الفاتورة", "حالة الإرسال"]
    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Index used internally for ordering child records"
      synonyms_en: ["record index", "internal index", "row index", "order number"]
      synonyms_ar: ["فهرس السجل", "الترتيب الداخلي", "رقم الصف", "رقم الفهرس"]

    - name: "title"
      type: "VARCHAR"
      role: ["display"]
      description: "Display title of the invoice, defaults to customer name"
      synonyms_en: ["invoice title", "display title", "invoice heading", "bill title"]
      synonyms_ar: ["عنوان الفاتورة", "العنوان الظاهر", "رأس الفاتورة"]

    - name: "naming_series"
      type: "VARCHAR"
      role: ["system"]
      description: "Naming series used for invoice ID generation"
      synonyms_en: ["invoice series", "numbering format", "naming pattern", "ID prefix"]
      synonyms_ar: ["سلسلة التسمية", "نمط الترقيم", "نمط التسمية", "بادئة رقم الفاتورة"]

    - name: "customer"
      type: "VARCHAR"
      role: ["party_id"]
      description: "Link to Customer master (ID)"
      synonyms_en: ["client", "buyer", "consumer", "patron", "purchaser"]
      synonyms_ar: ["عميل", "مشتري", "مستهلك", "زبون", "الطرف"]

    - name: "customer_name"
      type: "TEXT"
      role: ["party", "dimension"]
      description: "Customer display name"
      synonyms_en: ["client", "buyer", "customer", "customer name", "client name"]
      synonyms_ar: ["العميل", "اسم العميل", "اسم الزبون", "اسم المشتري"]

    - name: "tax_id"
      type: "VARCHAR"
      role: ["tax", "identifier"]
      description: "Tax identification number of the customer"
      synonyms_en: ["tax id", "tax identification number", "TIN", "VAT number", "tax number"]
      synonyms_ar: ["رقم الضريبة", "رقم التعريف الضريبي", "الرقم الضريبي", "رقم ضريبة القيمة المضافة"]

    - name: "company"
      type: "VARCHAR"
      role: ["org", "filter"]
      description: "Company for which the invoice is recorded"
      synonyms_en: ["company", "organization", "business unit", "legal entity"]
      synonyms_ar: ["الشركة", "المنظمة", "الوحدة التجارية", "الكيان القانوني"]

    - name: "company_tax_id"
      type: "VARCHAR"
      role: ["tax", "identifier"]
      description: "Company's tax identification number"
      synonyms_en: ["company tax id", "VAT number", "company tax number", "TIN", "tax registration"]
      synonyms_ar: ["الرقم الضريبي للشركة", "رقم ضريبة الشركة", "الرقم الضريبي", "رقم التسجيل الضريبي"]

    - name: "posting_date"
      type: "DATE"
      role: ["date", "filter"]
      description: "This can be used for any date filters."
      synonyms_en: ["invoice date", "posting date", "sales date", "bill date","today","month"]
      synonyms_ar: ["تاريخ الفاتورة", "تاريخ التسجيل", "تاريخ البيع", "تاريخ الإدخال المحاسبي"]

    - name: "posting_time"
      type: "TIME"
      role: ["time", "filter"]
      description: "Time of day when the invoice was posted"
      synonyms_en: ["invoice time", "posting time", "sales time", "bill time"]
      synonyms_ar: ["وقت الفاتورة", "وقت التسجيل", "وقت البيع", "وقت الإدخال"]

    - name: "set_posting_time"
      type: "INT"
      role: ["flag"]
