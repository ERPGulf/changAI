    - name: "party_account_currency"
      type: "VARCHAR(140)"
      role: ["attribute","relation"]
      description: "Currency of customer account"
      synonyms_en: ["party acc currency","customer account currency"]
      synonyms_ar: ["عملة حساب الطرف"]

    - name: "loyalty_amount"
      type: "DECIMAL(21,9)"
      role: ["computed","attribute"]
      description: "Converted value for loyalty discount"
      synonyms_ar: ["قيمة الولاء","مبلغ خصم النقاط"]

    - name: "_user_tags"
      type: "TEXT"
      role: ["meta"]
