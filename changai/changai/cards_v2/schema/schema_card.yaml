      synonyms_en: ["contact id", "main contact", "primary contact id"]
      synonyms_ar: ["معرّف جهة الاتصال", "جهة الاتصال الرئيسية", "الاتصال الأساسي"]

    - name: "mobile_no"
      type: "VARCHAR"
      role: ["contact"]
      description: "Primary mobile number of the customer"
      synonyms_en: ["mobile", "phone", "cell number", "contact number"]
      synonyms_ar: ["رقم الجوال", "رقم الهاتف", "رقم الاتصال"]

    - name: "email_id"
      type: "VARCHAR"
      role: ["contact"]
      description: "Primary email address of the customer"
      synonyms_en: ["email", "email address", "contact email"]
      synonyms_ar: ["البريد الإلكتروني", "عنوان البريد الإلكتروني", "إيميل العميل"]

    - name: "tax_id"
      type: "VARCHAR"
      role: ["finance"]
      description: "Tax Identification Number of the customer"
      synonyms_en: ["tin", "tax number", "vat number", "tax registration"]
      synonyms_ar: ["رقم الضريبة", "الرقم الضريبي", "رقم التسجيل الضريبي"]

    - name: "tax_category"
      type: "VARCHAR"
      role: ["finance"]
      description: "Tax category applied to the customer"
      synonyms_en: ["tax class", "tax type", "vat category"]
      synonyms_ar: ["فئة الضريبة", "نوع الضريبة", "تصنيف الضريبة"]

    - name: "tax_withholding_category"
      type: "VARCHAR"
      role: ["finance"]
      description: "Tax withholding category applicable to the customer"
      synonyms_en: ["withholding type", "retention category", "tds category"]
      synonyms_ar: ["فئة حجز الضريبة", "نوع الحجز", "تصنيف الضريبة المقتطعة"]

    - name: "payment_terms"
      type: "VARCHAR"
      role: ["finance"]
      description: "Default payment terms assigned to the customer"
      synonyms_en: ["credit terms", "payment conditions", "payment schedule"]
      synonyms_ar: ["شروط الدفع", "فترة السداد", "بنود الدفع"]

    - name: "loyalty_program"
      type: "VARCHAR"
      role: ["marketing"]
      description: "Loyalty program that the customer is enrolled in"
      synonyms_en: ["reward program", "points program", "customer loyalty plan"]
      synonyms_ar: ["برنامج الولاء", "نظام النقاط", "خطة الولاء"]

    - name: "loyalty_program_tier"
      type: "VARCHAR"
      role: ["marketing"]
      description: "Tier or level of the customer in the loyalty program"
      synonyms_en: ["membership tier", "loyalty level", "reward level"]
      synonyms_ar: ["فئة الولاء", "مستوى الولاء", "رتبة العضوية"]

    - name: "default_sales_partner"
      type: "VARCHAR"
      role: ["relation"]
      description: "Default sales partner associated with the customer"
      synonyms_en: ["sales partner", "distributor", "sales associate"]
      synonyms_ar: ["شريك المبيعات", "الموزع", "الشريك الافتراضي"]

    - name: "default_commission_rate"
      type: "DECIMAL"
      role: ["finance"]
      description: "Default commission rate (%) for sales linked to this customer"
      synonyms_en: ["commission", "sales commission", "default rate"]
      synonyms_ar: ["نسبة العمولة", "العمولة الافتراضية", "معدل العمولة"]

    - name: "so_required"
      type: "INT(1)"
      role: ["requirement", "flag"]
      description: "Indicates whether a Sales Order is required before creating an invoice for this customer"
      synonyms_en: ["sales order required", "so required", "need sales order"]
      synonyms_ar: ["يتطلب أمر مبيعات", "مطلوب أمر المبيعات"]

    - name: "dn_required"
      type: "INT(1)"
      role: ["requirement", "flag"]
      description: "Indicates whether a Delivery Note is required before invoicing this customer"
      synonyms_en: ["delivery note required", "dn required", "need delivery note"]
      synonyms_ar: ["يتطلب إشعار تسليم", "مطلوب إشعار التسليم"]

    - name: "is_frozen"
      type: "INT(1)"
      role: ["status"]
      description: "Indicates whether the customer record is frozen"
      synonyms_en: ["frozen", "locked", "inactive record"]
      synonyms_ar: ["مجمد", "غير نشط"]

    - name: "disabled"
      type: "INT(1)"
      role: ["status"]
      description: "Indicates whether the customer is disabled and cannot be used in transactions"
      synonyms_en: ["disabled", "inactive", "blocked"]
      synonyms_ar: ["معطل", "غير نشط"]

    - name: "_user_tags"
      type: "TEXT"
      role: ["metadata"]
      description: "User-defined tags associated with the customer record"
      synonyms_en: ["user tags", "tags", "labels"]
      synonyms_ar: ["الوسوم", "علامات المستخدم"]

    - name: "_comments"
      type: "TEXT"
      role: ["metadata", "communication"]
      description: "System-stored comments or notes for this customer"
      synonyms_en: ["comments", "notes", "remarks"]
      synonyms_ar: ["ملاحظات", "تعليقات"]

    - name: "_assign"
      type: "TEXT"
      role: ["system", "assignment"]
      description: "Assigned users for customer-related tasks"
      synonyms_en: ["assigned to", "assigned users", "assignments"]
      synonyms_ar: ["مخصص إلى", "المسندين"]

    - name: "_liked_by"
      type: "TEXT"
      role: ["system", "interaction"]
      description: "List of users who have liked or starred this customer record"
      synonyms_en: ["liked by", "favourited by", "starred by"]
      synonyms_ar: ["المعجبون"]

    - name: "zatca_customer_name_in_arabic"
      type: "VARCHAR(140)"
      role: ["localization", "name"]
      description: "Customer name in Arabic for ZATCA e-invoicing compliance"
      synonyms_en: ["zatca name", "arabic customer name"]
      synonyms_ar: ["اسم العميل بالعربية"]

    - name: "custom_b2c"
      type: "INT(1)"
      role: ["classification"]
      description: "Indicates if the customer is B2C (Business to Consumer)"
      synonyms_en: ["b2c flag", "is b2c", "business to consumer"]
      synonyms_ar: ["عميل فردي", "بي تو سي"]

    - name: "custom_buyer_id_type"
      type: "VARCHAR(140)"
      role: ["identity", "tax"]
      description: "Type of buyer identification such as TIN, CRN, or National ID"
      synonyms_en: ["buyer id type", "id type", "identification type"]
      synonyms_ar: ["نوع هوية المشتري"]

    - name: "custom_buyer_id"
      type: "VARCHAR(140)"
      role: ["identity"]
      description: "Buyer identification number used for ZATCA compliance"
      synonyms_en: ["buyer id", "customer id", "tax identification number"]
      synonyms_ar: ["هوية المشتري", "الرقم التعريفي"]

    - name: "primary_key"
      type: "KEY"
      role: ["constraint"]
      description: "Primary key on 'name' column for unique customer identification"
      synonyms_en: ["primary key", "unique id"]

    - name: "unique_key_represents_company"
      type: "KEY"
      role: ["constraint"]
      description: "Ensures uniqueness of the 'represents_company' field"
      synonyms_en: ["unique company key", "company constraint"]

    - name: "key_customer_name"
      type: "KEY"
      role: ["index"]
      description: "Index on customer_name for faster lookup"
      synonyms_en: ["customer name index", "name key"]

    - name: "key_customer_group"
      type: "KEY"
      role: ["index"]
      description: "Index on customer_group for filtering and grouping"
      synonyms_en: ["customer group index", "group key"]

    - name: "key_modified"
      type: "KEY"
      role: ["index"]
      description: "Index on modified date for sorting or filtering by last update"
      synonyms_en: ["modified index", "update key"]
  notes: |
      - Core doctype for managing customer master data in Sales and Accounting.
      - Each record uniquely identified by `name` (Customer ID).
      - Linked to transactions such as `Sales Invoice`, `Sales Order`, and `Delivery Note`.
      - `customer_type`, `customer_group`, and `territory` categorize customers.
      - Financial defaults such as `credit_limit`, `payment_terms`, and `default_currency` define customer-specific settings.
      - Contact and address details are stored via dynamic links in `tabDynamic Link`.
      - Used in AR reports, credit control, and customer aging.
      - Indexed fields (`customer_name`, `customer_group`, `territory`) improve performance.
      - ZATCA/e-invoicing fields (`custom_zatca_*`) exist for Saudi compliance.    


- table: "tabPurchase Invoice Item"
  synonyms_en:
    - "purchase invoice item"
    - "purchase bill line"
    - "invoice line item"
    - "purchase entry detail"
    - "supplier bill item"
  description: "Individual line items under a Purchase Invoice, containing item details, quantity, pricing, and cost information."
  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique ID for each purchase invoice item record."
      synonyms_en: ["record id", "item row id", "purchase invoice item id"]
      synonyms_ar: ["معرّف العنصر", "رمز سجل عنصر الفاتورة", "رقم العنصر"]

    - name: "creation"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the purchase invoice item was created."
      synonyms_en: ["created at", "creation time", "created on"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

    - name: "modified"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the record was last modified."
      synonyms_en: ["last modified", "updated at"]
      synonyms_ar: ["آخر تعديل", "تاريخ التحديث"]

    - name: "modified_by"
      type: "VARCHAR"
      role: ["system"]
      description: "User who last modified the record."
      synonyms_en: ["modified user", "updated by"]
      synonyms_ar: ["تم التعديل بواسطة"]

    - name: "owner"
      type: "VARCHAR"
      role: ["system"]
      description: "User who originally created the record."
      synonyms_en: ["created by", "record owner"]
      synonyms_ar: ["أنشأها", "مالك السجل"]

    - name: "docstatus"
      type: "INT"
      role: ["system"]
      description: "Document status (0 = Draft, 1 = Submitted, 2 = Cancelled)."
      synonyms_en: ["document status", "status code"]
      synonyms_ar: ["حالة المستند"]

    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Index of the item in the invoice; determines ordering."
      synonyms_en: ["row index", "line number"]
      synonyms_ar: ["فهرس الصف", "رقم السطر"]

    - name: "item_code"
      type: "VARCHAR"
      role: ["inventory", "foreign key"]
      description: "Code of the purchased item."
      synonyms_en: ["product code", "sku", "stock code"]
      synonyms_ar: ["رمز العنصر", "رمز المنتج", "رمز المخزون"]

    - name: "product_bundle"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Product bundle reference if this item is part of a bundled product."
      synonyms_en: ["bundle id", "product kit"]
      synonyms_ar: ["حزمة المنتج", "مجموعة المنتجات"]

    - name: "item_name"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Name of the purchased item."
      synonyms_en: ["product name", "item title"]
      synonyms_ar: ["اسم العنصر", "اسم المنتج"]

    - name: "description"
      type: "LONGTEXT"
      role: ["inventory", "info"]
      description: "Detailed description of the item."
      synonyms_en: ["item description", "details", "specification"]
      synonyms_ar: ["الوصف", "تفاصيل العنصر", "مواصفات"]

    - name: "brand"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Brand associated with the item."
      synonyms_en: ["brand name", "manufacturer"]
      synonyms_ar: ["العلامة التجارية", "الشركة المصنعة"]

    - name: "item_group"
      type: "VARCHAR"
      role: ["inventory", "categorization"]
      description: "Group or category under which the item falls."
      synonyms_en: ["item category", "product group"]
      synonyms_ar: ["مجموعة العناصر", "فئة المنتج"]

    - name: "image"
      type: "TEXT"
      role: ["inventory", "info"]
      description: "Image reference or URL for the purchased item."
      synonyms_en: ["item image", "product picture", "image link"]
      synonyms_ar: ["صورة العنصر", "رابط الصورة", "صورة المنتج"]

    - name: "received_qty"
      type: "DECIMAL(21,9)"
      role: ["inventory", "quantity"]
      description: "Quantity of the item received against this purchase invoice."
      synonyms_en: ["received quantity", "qty received", "received units"]
      synonyms_ar: ["الكمية المستلمة", "الوحدات المستلمة"]

    - name: "qty"
      type: "DECIMAL(21,9)"
      role: ["inventory", "quantity"]
      description: "Total quantity of the item in the invoice."
      synonyms_en: ["quantity", "ordered quantity", "invoice qty"]
      synonyms_ar: ["الكمية", "كمية الطلب", "كمية الفاتورة"]

    - name: "rejected_qty"
      type: "DECIMAL(21,9)"
      role: ["inventory", "quality control"]
      description: "Quantity of the item rejected upon receipt."
      synonyms_en: ["rejected quantity", "defective qty", "returned quantity"]
      synonyms_ar: ["الكمية المرفوضة", "الكمية المرتجعة", "الكمية التالفة"]

    - name: "uom"
      type: "VARCHAR"
      role: ["inventory", "measurement"]
      description: "Unit of Measure used in the purchase invoice."
      synonyms_en: ["unit of measure", "measurement unit", "uom"]
      synonyms_ar: ["وحدة القياس", "وحدة الكمية"]

    - name: "conversion_factor"
      type: "DECIMAL(21,9)"
      role: ["inventory", "conversion"]
      description: "Conversion factor between the invoice UOM and the stock UOM."
      synonyms_en: ["uom conversion factor", "conversion ratio"]
      synonyms_ar: ["عامل التحويل", "نسبة التحويل"]

    - name: "stock_uom"
      type: "VARCHAR"
      role: ["inventory", "measurement"]
      description: "Stock Unit of Measure used in warehouse tracking."
      synonyms_en: ["stock unit", "inventory uom"]
      synonyms_ar: ["وحدة المخزون", "وحدة المستودع"]

    - name: "stock_qty"
      type: "DECIMAL(21,9)"
      role: ["inventory", "quantity"]
      description: "Quantity converted to stock unit of measure."
      synonyms_en: ["stock quantity", "inventory quantity"]
      synonyms_ar: ["كمية المخزون", "كمية المستودع"]

    - name: "price_list_rate"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Rate of the item from the purchase price list."
      synonyms_en: ["price list rate", "list rate", "catalog price"]
      synonyms_ar: ["سعر قائمة الأسعار", "السعر المبدئي"]

    - name: "base_price_list_rate"
      type: "DECIMAL(21,9)"
      role: ["pricing", "currency"]
      description: "Base currency rate from the price list."
      synonyms_en: ["base list rate", "price list rate in base currency"]
      synonyms_ar: ["سعر الأساس", "سعر قائمة الأسعار بالعملة الأساسية"]

    - name: "margin_type"
      type: "VARCHAR"
      role: ["pricing", "margin"]
      description: "Type of margin applied to the item (Amount or Percentage)."
      synonyms_en: ["margin type", "markup type"]
      synonyms_ar: ["نوع الهامش", "نوع الزيادة"]

    - name: "margin_rate_or_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing", "margin"]
      description: "Margin rate or amount applied to the item."
      synonyms_en: ["margin amount", "markup value"]
      synonyms_ar: ["قيمة الهامش", "مبلغ الزيادة"]

    - name: "rate_with_margin"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Final rate after margin is added."
      synonyms_en: ["rate after margin", "final rate"]
      synonyms_ar: ["السعر بعد الهامش", "السعر النهائي"]

    - name: "discount_percentage"
      type: "DECIMAL(21,9)"
      role: ["pricing", "discount"]
      description: "Percentage discount applied to this item."
      synonyms_en: ["discount percent", "discount rate"]
      synonyms_ar: ["نسبة الخصم", "معدل الخصم"]

    - name: "discount_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing", "discount"]
      description: "Monetary discount applied to this item."
      synonyms_en: ["discount value", "discount in amount"]
      synonyms_ar: ["قيمة الخصم", "مبلغ الخصم"]

    - name: "distributed_discount_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing", "discount"]
      description: "Proportionate discount amount distributed across items."
      synonyms_en: ["allocated discount", "distributed discount"]
      synonyms_ar: ["الخصم الموزع", "الخصم المخصص"]

    - name: "base_rate_with_margin"
      type: "DECIMAL(21,9)"
      role: ["pricing", "currency"]
      description: "Item rate after margin in base currency."
      synonyms_en: ["base final rate", "rate with margin in base currency"]
      synonyms_ar: ["السعر الأساسي بعد الهامش"]

    - name: "rate"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Rate per unit for the item in the invoice currency."
      synonyms_en: ["item rate", "unit price", "price per unit"]
      synonyms_ar: ["سعر الوحدة", "سعر العنصر"]

    - name: "amount"
      type: "DECIMAL(21,9)"
      role: ["pricing", "finance"]
      description: "Total amount for the item (rate × quantity) in the invoice currency."
      synonyms_en: ["item amount", "line total", "item total"]
      synonyms_ar: ["إجمالي العنصر", "قيمة البند"]

    - name: "item_tax_template"
      type: "VARCHAR"
      role: ["tax"]
      description: "Tax template applied to this purchase item"
      synonyms_en: ["item tax template", "tax template", "tax rule"]
      synonyms_ar: ["قالب ضريبة الصنف", "نموذج الضريبة", "إعداد الضريبة"]

    - name: "base_rate"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Rate per item in company currency"
      synonyms_en: ["base item rate", "rate in company currency"]
      synonyms_ar: ["السعر بالعملة الأساسية", "سعر الصنف بالعملة المحلية"]

    - name: "base_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Total base amount for the item (qty × base rate)"
      synonyms_en: ["base total", "company currency amount"]
      synonyms_ar: ["إجمالي المبلغ الأساسي", "المجموع بالعملة المحلية"]

    - name: "pricing_rules"
      type: "TEXT"
      role: ["pricing"]
      description: "Applied pricing rule references"
      synonyms_en: ["pricing rule", "discount rule", "promotion rule"]
      synonyms_ar: ["قواعد التسعير", "قواعد الخصم", "قواعد العروض"]

    - name: "stock_uom_rate"
      type: "DECIMAL(21,9)"
      role: ["inventory"]
      description: "Item rate per stock UOM"
      synonyms_en: ["stock rate", "unit price per stock uom"]
      synonyms_ar: ["السعر لكل وحدة مخزون", "سعر وحدة المخزون"]

    - name: "is_free_item"
      type: "INT(1)"
      role: ["flag"]
      description: "Indicates whether the item was given for free"
      synonyms_en: ["free item", "complimentary item", "zero priced item"]
      synonyms_ar: ["صنف مجاني", "عنصر مجاني", "بدون تكلفة"]

    - name: "apply_tds"
      type: "INT(1)"
      role: ["tax"]
      description: "Flag to determine if TDS applies on this item"
      synonyms_en: ["apply tds", "tds applicable", "tax deducted at source"]
      synonyms_ar: ["تطبيق ضريبة الخصم", "تطبيق خصم عند المصدر"]

    - name: "net_rate"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Final rate after discounts and adjustments"
      synonyms_en: ["net price", "final rate", "discounted rate"]
      synonyms_ar: ["السعر الصافي", "السعر النهائي"]

    - name: "net_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Final amount after discounts (qty × net rate)"
      synonyms_en: ["net total", "discounted amount"]
      synonyms_ar: ["المبلغ الصافي", "الإجمالي بعد الخصم"]

    - name: "base_net_rate"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Net rate in company currency"
      synonyms_en: ["base net rate", "company net rate"]
      synonyms_ar: ["السعر الصافي بالعملة الأساسية"]

    - name: "base_net_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Net amount in company currency"
      synonyms_en: ["base net total", "company net total"]
      synonyms_ar: ["الإجمالي الصافي بالعملة المحلية"]

    - name: "valuation_rate"
      type: "DECIMAL(21,9)"
