- table: "tabWork Order"
  synonyms_en:
    - "work order"
    - "production job"
    - "manufacturing order"
    - "work order record"
  synonyms_ar:
    - "أمر العمل"
    - "أمر التصنيع"
    - "طلب الإنتاج"
  description: "Work order to track manufacturing item, BOM, quantities and process status."

  fields:
    - name: "name"
      type: "VARCHAR(140)"
      role: ["id"]
      description: "Primary key. Unique Work Order document ID"
      synonyms_en: ["order id","wo id","record id"]
      synonyms_ar: ["رمز أمر العمل","معرّف","المفتاح الرئيسي"]

    - name: "creation"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp when the record was created"
      synonyms_en: ["created at","creation time","created on"]
      synonyms_ar: ["تاريخ الإنشاء","وقت الإنشاء","تم الإنشاء في"]

    - name: "modified"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp when the record was last modified"
      synonyms_en: ["updated at","last updated","modified on"]
      synonyms_ar: ["تاريخ التعديل","وقت التعديل","تم التعديل في"]

    - name: "modified_by"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "User who last modified the record"
      synonyms_en: ["edited by","last editor","updated by"]
      synonyms_ar: ["تم التعديل بواسطة","المحرّر","آخر من عدّل"]

    - name: "owner"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "User who originally created the record"
      synonyms_en: ["creator","created by","owner user"]
      synonyms_ar: ["المنشئ","تم الإنشاء بواسطة","owner"]

    - name: "docstatus"
      type: "INT(1)"
      role: ["system"]
      description: "Document status code: 0 = Draft, 1 = Submitted, 2 = Cancelled"
      synonyms_en: ["document state","status","work order status code"]
      synonyms_ar: ["حالة المستند","رمز الحالة","وضع السجل"]

    - name: "idx"
      type: "INT(8)"
      role: ["system"]
      description: "Row index used for ordering"
      synonyms_en: ["row order","position index","sequence"]
      synonyms_ar: ["الفهرس","ترتيب الصف","الترتيب"]

    - name: "naming_series"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "Naming series used to generate Work Order names"
      synonyms_en: ["series prefix","name series","naming rule"]
      synonyms_ar: ["سلسلة التسمية","بادئة التسمية","naming series"]

    - name: "status"
      type: "VARCHAR(140)"
      role: ["attribute","system"]
      description: "Work order current status text"
      synonyms_en: ["work order status","production state"]
      synonyms_ar: ["حالة أمر العمل","الوضع","status"]

    - name: "production_item"
      type: "VARCHAR(140)"
      role: ["attribute","relation"]
      description: "Item code being produced/manufactured"
      synonyms_en: ["manufactured item","finished item","product item code"]
      synonyms_ar: ["رمز الصنف المنتج","item code","الصنف"]

    - name: "item_name"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Display name of the manufacturing item"
      synonyms_en: ["product name","item label","display name"]
      synonyms_ar: ["اسم الصنف","اسم العنصر"]

    - name: "image"
      type: "TEXT"
      role: ["attribute"]
      description: "Image URL or file path for the item"
      synonyms_en: ["item image","photo","image url","file image"]
      synonyms_ar: ["رابط الصورة","صورة الصنف","مسار الصورة"]

    - name: "bom_no"
      type: "VARCHAR(140)"
      role: ["relation","attribute"]
      description: "Linked Bill of Materials document ID"
      synonyms_en: ["bill of materials","bom id","materials list ref"]
      synonyms_ar: ["رقم BOM","رمز المواد","معرّف BOM"]

    - name: "sales_order"
      type: "VARCHAR(140)"
      role: ["relation"]
      description: "Linked Sales Order document ID"
      synonyms_en: ["so id","customer order ref","sales order id"]
      synonyms_ar: ["مرجع المبيعات","رمز SO","أمر المبيعات"]

    - name: "company"
      type: "VARCHAR(140)"
      role: ["relation","system"]
      description: "Company associated with this Work Order"
      synonyms_en: ["organization","wo company"]
      synonyms_ar: ["الشركة","Company"]

    - name: "qty"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute"]
      description: "Planned quantity to manufacture"
      synonyms_en: ["planned qty","order quantity","manufacturing qty"]
      synonyms_ar: ["الكمية المخططة","qty","كمية الإنتاج"]

    - name: "material_transferred_for_manufacturing"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute"]
      description: "Quantity of materials transferred to manufacturing"
      synonyms_en: ["issued qty","materials transferred","material issued"]
      synonyms_ar: ["كمية المواد المحوّلة","مواد مصروفة","issued qty"]

    - name: "produced_qty"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute"]
      description: "Completed manufactured quantity so far"
      synonyms_en: ["output qty","finished qty","produced output"]
      synonyms_ar: ["الكمية المنتجة","مخرجات","qty المنتجة"]

    - name: "process_loss_qty"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute"]
      description: "Quantity lost during the manufacturing process"
      synonyms_en: ["loss qty","scrap","process scrap","wastage qty"]
      synonyms_ar: ["كمية الفاقد","هدر","سكراب","wastage"]

    - name: "project"
      type: "VARCHAR(140)"
      role: ["relation","attribute"]
      description: "Linked Project document ID"
      synonyms_en: ["project ref","linked project","job project"]
      synonyms_ar: ["مرجع المشروع","project","المشروع المرتبط"]

    - name: "allow_alternative_item"
      type: "INT(1)"
      role: ["attribute"]
      description: "Flag to allow alternative production item"
      synonyms_en: ["allow substitute","alternative allowed"]
      synonyms_ar: ["السماح بالبديل","بديل مسموح"]

    - name: "use_multi_level_bom"
      type: "INT(1)"
      role: ["attribute","system"]
      description: "Flag to explode multi-level BOM"
      synonyms_en: ["multi-level bom","use nested bom"]
      synonyms_ar: ["BOM متعدد المستويات","bom متداخل"]

    - name: "skip_transfer"
      type: "INT(1)"
      role: ["attribute","system"]
      description: "Flag to skip material transfer"
      synonyms_en: ["skip issue","no transfer"]
      synonyms_ar: ["تخطي صرف المواد","بدون تحويل"]

    - name: "from_wip_warehouse"
      type: "INT(1)"
      role: ["attribute","system","relation"]
      description: "Flag to indicate source is WIP warehouse"
      synonyms_en: ["wip source","from in-process store"]
      synonyms_ar: ["من مخزن تحت التشغيل","wip المصدر"]

    - name: "update_consumed_material_cost_in_project"
      type: "INT(1)"
      role: ["attribute","system","relation"]
      description: "Flag to update consumed material cost in project"
      synonyms_en: ["update project costing","material cost to project"]
      synonyms_ar: ["تحديث تكلفة المشروع","تكلفة المواد للمشروع"]

    - name: "source_warehouse"
      type: "VARCHAR(140)"
      role: ["attribute","relation"]
      description: "Warehouse issuing raw materials"
      synonyms_en: ["issue warehouse","material source warehouse"]
      synonyms_ar: ["مخزن صرف المواد","source warehouse","مصدر المخزن"]

    - name: "wip_warehouse"
      type: "VARCHAR(140)"
      role: ["attribute","relation"]
      description: "Work-In-Progress warehouse"
      synonyms_en: ["in-process warehouse","production floor store"]
      synonyms_ar: ["مخزن تحت التشغيل","WIP المخزن"]

    - name: "fg_warehouse"
      type: "VARCHAR(140)"
      role: ["attribute","relation"]
      description: "Finished Goods receiving warehouse"
      synonyms_en: ["finished warehouse","output warehouse","fg store"]
      synonyms_ar: ["مخزن البضاعة الجاهزة","FG المخزن"]

    - name: "scrap_warehouse"
      type: "VARCHAR(140)"
      role: ["attribute","relation"]
      description: "Warehouse receiving scrap or wastage"
      synonyms_en: ["scrap store","rejected material warehouse","wastage store"]
      synonyms_ar: ["مخزن الفاقد","مخزن السكراب"]

    - name: "has_serial_no"
      type: "INT(1)"
      role: ["attribute","system"]
      description: "Flag indicating item uses serial tracking"
      synonyms_en: ["serial tracked","is serial item"]
      synonyms_ar: ["يتتبع بالسيريال","سيريال مفعّل"]

    - name: "has_batch_no"
      type: "INT(1)"
      role: ["attribute","system"]
      description: "Flag indicating item uses batch tracking"
      synonyms_en: ["batch tracked","is batch item"]
      synonyms_ar: ["يتتبع بالدفعة","batch مفعّل"]

    - name: "batch_size"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute","system"]
      description: "Manufacturing batch size quantity"
      synonyms_en: ["lot size","production batch size"]
      synonyms_ar: ["حجم الدفعة","batch size"]

    - name: "transfer_material_against"
      type: "VARCHAR(140)"
      role: ["relation","attribute","system"]
      description: "Document reference type used for material transfer"
      synonyms_en: ["issue reference","transfer against doc"]
      synonyms_ar: ["مرجع التحويل مقابل","نوع مستند الصرف"]

    - name: "planned_start_date"
      type: "DATETIME(6)"
      role: ["attribute","system"]
      description: "Scheduled start timestamp"
      synonyms_en: ["schedule start","planned start"]
      synonyms_ar: ["تاريخ البدء المخطط","وقت البدء"]

    - name: "planned_end_date"
      type: "DATETIME(6)"
      role: ["attribute","system"]
      description: "Scheduled end timestamp"
      synonyms_en: ["schedule end","planned finish"]
      synonyms_ar: ["تاريخ الانتهاء المخطط","وقت الانتهاء"]

    - name: "expected_delivery_date"
      type: "DATE"
      role: ["attribute","system"]
      description: "Planned delivery/completion date"
      synonyms_en: ["delivery target date","expected delivery"]
      synonyms_ar: ["تاريخ التسليم المتوقع","موعد التسليم"]

    - name: "actual_start_date"
      type: "DATETIME(6)"
      role: ["attribute","system"]
      description: "Real start timestamp of production"
      synonyms_en: ["actual start","real start"]
      synonyms_ar: ["تاريخ البدء الفعلي","وقت البدء الفعلي"]

    - name: "actual_end_date"
      type: "DATETIME(6)"
      role: ["attribute","system"]
      description: "Real end timestamp of production"
      synonyms_en: ["actual finish","completion time","real end"]
      synonyms_ar: ["تاريخ الانتهاء الفعلي","وقت الإكمال"]

    - name: "lead_time"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute","system"]
      description: "Estimated lead time for production in hours/days"
      synonyms_en: ["production lead time","manufacturing lead"]
      synonyms_ar: ["وقت التنفيذ","زمن الإنتاج"]

    - name: "planned_operating_cost"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute","system"]
      description: "Estimated operating/production cost (planned)"
      synonyms_en: ["estimated op cost","production plan cost"]
      synonyms_ar: ["تكلفة التشغيل المخططة","Op cost المتوقع"]

    - name: "actual_operating_cost"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute","system"]
      description: "Operating/production cost recorded after execution"
      synonyms_en: ["real op cost","executed cost"]
      synonyms_ar: ["تكلفة التشغيل الفعلي","Op cost الحقيقي"]

    - name: "additional_operating_cost"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute","system"]
      description: "Extra/overhead cost added during production"
      synonyms_en: ["extra op cost","overhead addition"]
      synonyms_ar: ["تكلفة إضافية","Op cost زائد"]

    - name: "corrective_operation_cost"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute","system"]
      description: "Corrective or adjustment cost applied post process"
      synonyms_en: ["correction cost","adjustment op cost"]
      synonyms_ar: ["تكلفة التصحيح","تكلفة التعديل"]

    - name: "total_operating_cost"
      type: "DECIMAL(21,9)"
      role: ["measure","attribute","system"]
      description: "Total operating cost recorded"
      synonyms_en: ["total op cost","operating cost total","sum of operating cost"]
      synonyms_ar: ["إجمالي تكلفة التشغيل","المجموع التشغيلي","التكلفة التشغيلية الكلية"]

    - name: "description"
      type: "TEXT"
      role: ["attribute"]
      description: "Text description or details"
      synonyms_en: ["details","work summary","order description"]
      synonyms_ar: ["الوصف","التفاصيل","نبذة العمل"]

    - name: "stock_uom"
      type: "VARCHAR(140)"
      role: ["attribute","relation"]
      description: "Stock Unit of Measure"
      synonyms_en: ["inventory uom","store unit","stock measuring unit"]
      synonyms_ar: ["وحدة قياس المخزون","وحدة المخزن","UOM المخزن"]

    - name: "material_request"
      type: "VARCHAR(140)"
      role: ["relation","attribute"]
      description: "Linked Material Request ID"
      synonyms_en: ["mr id","material requistion","material request ref"]
      synonyms_ar: ["رمز طلب المواد","مرجع MR","أمر الصرف للمواد"]

    - name: "material_request_item"
      type: "VARCHAR(140)"
      role: ["relation","attribute"]
      description: "Linked Material Request Item ID"
      synonyms_en: ["mr item id","material req item ref"]
      synonyms_ar: ["رمز عنصر طلب المواد","مرجع العنصر في MR"]

    - name: "sales_order_item"
      type: "VARCHAR(140)"
      role: ["relation","attribute"]
      description: "Linked Sales Order Item ID"
      synonyms_en: ["so item id","sales order line item","linked sales order item"]
      synonyms_ar: ["رمز عنصر أمر المبيعات","SO line item","مرجع العنصر في SO"]

    - name: "production_plan"
      type: "VARCHAR(140)"
      role: ["relation","attribute"]
      description: "Linked Production Plan ID"
      synonyms_en: ["prod plan id","production plan ref","manufacturing plan"]
      synonyms_ar: ["رمز خطة الإنتاج","مرجع خطة الإنتاج"]

    - name: "production_plan_item"
      type: "VARCHAR(140)"
      role: ["relation","attribute"]
      description: "Linked Production Plan Item ID"
      synonyms_en: ["production plan line","prod plan item id"]
      synonyms_ar: ["رمز عنصر خطة الإنتاج","مرجع العنصر في خطة الإنتاج"]

    - name: "production_plan_sub_assembly_item"
      type: "VARCHAR(140)"
      role: ["relation","attribute"]
      description: "Sub-assembly item in Production Plan"
      synonyms_en: ["sub assembly plan item","sub assembly plan ref"]
      synonyms_ar: ["عنصر التجميع الفرعي في الخطة","sub assembly مرجع"]

    - name: "product_bundle_item"
      type: "VARCHAR(140)"
      role: ["relation","attribute"]
      description: "Linked Product Bundle Item ID"
      synonyms_en: ["bundle line item","product bundle item ref"]
      synonyms_ar: ["رمز عنصر الباقة","مرجع عنصر الباقة"]

    - name: "amended_from"
      type: "VARCHAR(140)"
      role: ["relation","system"]
      description: "Reference ID from original document if amended"
      synonyms_en: ["amend source","amended doc ref","revision from"]
      synonyms_ar: ["تم التعديل من","مرجع المستند المعدّل"]

    - name: "_user_tags"
      type: "TEXT"
      role: ["metadata","system"]
      description: "User tag metadata"
      synonyms_en: ["user tags","tags"]
      synonyms_ar: ["علامات المستخدم","التاغات"]

    - name: "_comments"
      type: "TEXT"
      role: ["metadata","system"]
      description: "Comment metadata"
      synonyms_en: ["user comments","record comments"]
      synonyms_ar: ["التعليقات","تعليقات السجل"]

    - name: "_assign"
      type: "TEXT"
      role: ["metadata","system"]
      description: "Assignment metadata"
      synonyms_en: ["assigned to data","assign log"]
      synonyms_ar: ["بيانات الإسناد","سجل الإسناد"]

    - name: "_liked_by"
      type: "TEXT"
      role: ["metadata","system"]
      description: "Liked by user metadata"
      synonyms_en: ["liked by users","user likes"]
      synonyms_ar: ["أعجب به","liked by بيانات"]

    - name: "_seen"
      type: "TEXT"
      role: ["metadata","system"]
      description: "Seen by user metadata"
      synonyms_en: ["seen by users","viewed log"]
      synonyms_ar: ["شاهده","سجل المشاهدات"]

  notes: |
    - Child table supporting theme exclusion rules.
    - No accounting impact.
    - Joined on parent index and ordered via idx.

- table: "tabBOM"

  synonyms_en:
    - "bill of materials"
    - "manufacturing bom"
    - "product structure"
    - "component list"
    - "assembly bom"
    - "material recipe"

  description: "Defines the Bill of Materials for an item, including quantities, costing rules, routing, operations, and configuration used in manufacturing."

  fields:
    - name: "name"
      type: "VARCHAR(140)"
      role: ["id"]
      description: "Unique BOM ID"
      synonyms_en: ["bom id", "document id"]
      synonyms_ar: ["معرف القائمة", "معرف المستند"]

    - name: "creation"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Record creation timestamp"
      synonyms_en: ["created at"]
      synonyms_ar: ["تاريخ الإنشاء"]

    - name: "modified"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Last modified timestamp"
      synonyms_en: ["updated at"]
      synonyms_ar: ["تاريخ التعديل"]

    - name: "modified_by"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "User who last modified the BOM"
      synonyms_en: ["updated by"]
      synonyms_ar: ["تم التعديل بواسطة"]

    - name: "owner"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "Creator of the BOM record"
      synonyms_en: ["created by"]
      synonyms_ar: ["تم الإنشاء بواسطة"]

    - name: "docstatus"
      type: "INT(1)"
      role: ["system"]
      description: "Document workflow status"
      synonyms_en: ["status"]
      synonyms_ar: ["حالة المستند"]

    - name: "idx"
      type: "INT(8)"
      role: ["system"]
      description: "Row index"
      synonyms_en: ["index"]
      synonyms_ar: ["فهرس"]

    - name: "item"
      type: "VARCHAR(140)"
      role: ["relation"]
      description: "Item for which this BOM is defined"
      synonyms_en: ["product", "finished item"]
      synonyms_ar: ["الصنف", "المنتج"]

    - name: "company"
      type: "VARCHAR(140)"
      role: ["relation"]
      description: "Company owning this BOM"
      synonyms_en: ["company"]
      synonyms_ar: ["الشركة"]

    - name: "uom"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Unit of measure for finished quantity"
      synonyms_en: ["unit"]
      synonyms_ar: ["وحدة القياس"]

    - name: "quantity"
      type: "DECIMAL(21,9)"
      role: ["attribute"]
      description: "Finished goods quantity produced per BOM"
      synonyms_en: ["fg quantity"]
      synonyms_ar: ["كمية الناتج"]

    - name: "is_active"
      type: "INT(1)"
      role: ["flag"]
      description: "Indicates if BOM is active"
      synonyms_en: ["active"]
      synonyms_ar: ["نشط"]

    - name: "is_default"
      type: "INT(1)"
      role: ["flag"]
      description: "Marks this BOM as the default for its item"
      synonyms_en: ["default bom"]
      synonyms_ar: ["القائمة الافتراضية"]

    - name: "allow_alternative_item"
      type: "INT(1)"
      role: ["flag"]
      description: "Whether alternate items are allowed"
      synonyms_en: ["allow substitute"]
      synonyms_ar: ["السماح بالبديل"]

    - name: "set_rate_of_sub_assembly_item_based_on_bom"
      type: "INT(1)"
      role: ["config"]
      description: "Whether rate of subassemblies is based on their BOM"
      synonyms_en: ["subassembly rate"]
      synonyms_ar: ["تكلفة التجميع الفرعي"]

    - name: "project"
      type: "VARCHAR(140)"
      role: ["relation"]
      description: "Linked project, if applicable"
      synonyms_en: ["project"]
      synonyms_ar: ["المشروع"]

    - name: "image"
      type: "TEXT"
      role: ["attribute"]
      description: "Item or BOM image"
      synonyms_en: ["image"]
      synonyms_ar: ["صورة"]

    - name: "rm_cost_as_per"
      type: "VARCHAR(140)"
      role: ["config"]
      description: "Method for calculating raw material cost"
      synonyms_en: ["rm cost calculation"]
      synonyms_ar: ["تكلفة المواد الخام"]

    - name: "buying_price_list"
      type: "VARCHAR(140)"
      role: ["relation"]
      description: "Price list for raw material cost valuation"
      synonyms_en: ["buying price list"]
      synonyms_ar: ["قائمة الأسعار"]

    - name: "price_list_currency"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Currency of price list"
      synonyms_en: ["currency"]
      synonyms_ar: ["العملة"]

    - name: "plc_conversion_rate"
      type: "DECIMAL(21,9)"
      role: ["attribute"]
      description: "Conversion rate from price list currency"
      synonyms_en: ["conversion rate"]
      synonyms_ar: ["معدل التحويل"]

    - name: "currency"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Document currency"
      synonyms_en: ["currency"]
      synonyms_ar: ["العملة"]

    - name: "conversion_rate"
      type: "DECIMAL(21,9)"
      role: ["attribute"]
      description: "Base conversion rate"
      synonyms_en: ["currency rate"]
      synonyms_ar: ["معدل التحويل"]

    - name: "with_operations"
      type: "INT(1)"
      role: ["flag"]
      description: "Indicates if operations are included"
      synonyms_en: ["has operations"]
      synonyms_ar: ["يتضمن عمليات"]

    - name: "transfer_material_against"
      type: "VARCHAR(140)"
      role: ["config"]
      description: "Basis for transferring raw materials"
      synonyms_en: ["transfer material rule"]
      synonyms_ar: ["قاعدة تحويل المواد"]

    - name: "routing"
      type: "VARCHAR(140)"
      role: ["relation"]
      description: "Routing linked to this BOM"
      synonyms_en: ["manufacturing routing"]
      synonyms_ar: ["مسار الإنتاج"]

    - name: "fg_based_operating_cost"
      type: "INT(1)"
      role: ["config"]
      description: "Whether the operating cost is based on FG quantity"
      synonyms_en: ["fg cost"]
