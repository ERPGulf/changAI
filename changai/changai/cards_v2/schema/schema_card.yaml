- table: "tabSales Invoice"
  synonyms_en:
    - "customer bill"
    - "sales receipt"
    - "invoice"
    - "sales document"
    - "billing record"
    - "transaction slip"
  description: "Record of goods or services sold to a customer, including pricing, taxes, and payment terms."
  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Invoice ID / primary key"
      synonyms_en: ["invoice id", "invoice number","inv no","bill number","si id"]
      synonyms_ar: ["رقم الفاتورة", "معرّف الفاتورة", "رمز الفاتورة", "تسلسل الفاتورة"]

    - name: "creation"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the invoice was created"
      synonyms_en: ["created at", "creation time", "invoice created on", "created date"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

    - name: "modified"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the invoice was last modified"
      synonyms_en: ["updated at", "last updated", "last modified", "modified time"]
      synonyms_ar: ["تاريخ التعديل", "آخر تحديث", "تم التعديل في"]

    - name: "modified_by"
      type: "VARCHAR"
      role: ["system"]
      description: "User who last modified the invoice"
      synonyms_en: ["updated by", "modified user", "last editor", "edited by"]
      synonyms_ar: ["تم التعديل بواسطة", "آخر من عدّل", "المحرر"]

    - name: "owner"
      type: "VARCHAR"
      role: ["system"]
      description: "User who originally created the invoice"
      synonyms_en: ["created by", "invoice owner", "initiated by", "creator"]
      synonyms_ar: ["تم الإنشاء بواسطة", "مالك الفاتورة", "المنشئ"]

    - name: "docstatus"
      type: "INT"
      role: ["lifecycle"]
      description: "Document status: 0=Draft, 1=Submitted, 2=Cancelled"
      synonyms_en: ["status code", "submission state", "document state", "invoice status"]
      synonyms_ar: ["حالة المستند", "رمز الحالة", "حالة الفاتورة", "حالة الإرسال"]
    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Index used internally for ordering child records"
      synonyms_en: ["record index", "internal index", "row index", "order number"]
      synonyms_ar: ["فهرس السجل", "الترتيب الداخلي", "رقم الصف", "رقم الفهرس"]

    - name: "title"
      type: "VARCHAR"
      role: ["display"]
      description: "Display title of the invoice, defaults to customer name"
      synonyms_en: ["invoice title", "display title", "invoice heading", "bill title"]
      synonyms_ar: ["عنوان الفاتورة", "العنوان الظاهر", "رأس الفاتورة"]

    - name: "naming_series"
      type: "VARCHAR"
      role: ["system"]
      description: "Naming series used for invoice ID generation"
      synonyms_en: ["invoice series", "numbering format", "naming pattern", "ID prefix"]
      synonyms_ar: ["سلسلة التسمية", "نمط الترقيم", "نمط التسمية", "بادئة رقم الفاتورة"]

    - name: "customer"
      type: "VARCHAR"
      role: ["party_id"]
      description: "Link to Customer master (ID)"
      synonyms_en: ["client", "buyer", "consumer", "patron", "purchaser"]
      synonyms_ar: ["عميل", "مشتري", "مستهلك", "زبون", "الطرف"]

    - name: "customer_name"
      type: "TEXT"
      role: ["party", "dimension"]
      description: "Customer display name"
      synonyms_en: ["client", "buyer", "customer", "customer name", "client name"]
      synonyms_ar: ["العميل", "اسم العميل", "اسم الزبون", "اسم المشتري"]

    - name: "tax_id"
      type: "VARCHAR"
      role: ["tax", "identifier"]
      description: "Tax identification number of the customer"
      synonyms_en: ["tax id", "tax identification number", "TIN", "VAT number", "tax number"]
      synonyms_ar: ["رقم الضريبة", "رقم التعريف الضريبي", "الرقم الضريبي", "رقم ضريبة القيمة المضافة"]

    - name: "company"
