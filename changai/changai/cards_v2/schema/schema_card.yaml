    - name: "state"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Customer state or province"
      synonyms_ar: ["الولاية", "المحافظة"]

    - name: "country"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Customer country"
      synonyms_ar: ["الدولة"]

    - name: "territory"
      type: "VARCHAR(140)"
      role: ["hierarchy"]
      description: "Sales territory region"
      synonyms_en: ["region", "sales region"]
      synonyms_ar: ["منطقة المبيعات"]

    - name: "currency"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Currency for opportunity value"
      synonyms_ar: ["العملة"]

    - name: "conversion_rate"
      type: "DECIMAL(21,9)"
      role: ["system"]
