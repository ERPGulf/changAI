- table: "tabPurchase Order Item"
  synonyms_en:
    - "po line item"
    - "po item"
    - "ordered product"
    - "purchase line"
    - "supplier order item"
    - "ordered items"
    - "items in po"
    - "po products"
    - "items we purchased"
    - "supplier items"
    - "vendor items"
    - "purchased products"
    - "purchase items"
    - "items on purchase order"
    - "what we bought"
    - "materials ordered"
    - "products ordered"
    - "items requested from supplier"
    - "buy order items"
    - "goods ordered"

  description: "Line-level details of each product or service included in a Purchase Order. Stores item, quantity, pricing, and delivery schedule information."

  fields:
    - name: "name"
      type: "VARCHAR(140)"
      role: ["id"]
      description: "Unique ID for the purchase order item (primary key)"
      synonyms_en: ["item id", "row id", "po item id"]
      synonyms_ar: ["معرّف البند", "رمز البند", "تسلسل بند الطلب"]

    - name: "creation"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp when the purchase order item was created"
      synonyms_en: ["created on", "creation time", "created at"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

    - name: "modified"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp of the last modification to this record"
      synonyms_en: ["modified on", "last updated"]
      synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

    - name: "modified_by"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "User who last modified the record"
      synonyms_en: ["updated by", "modified user"]
      synonyms_ar: ["تم التعديل بواسطة", "المستخدم المعدل"]

    - name: "owner"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "User who created the record"
      synonyms_en: ["created by", "record owner"]
      synonyms_ar: ["تم الإنشاء بواسطة", "صاحب السجل"]

    - name: "docstatus"
      type: "INT(1)"
      role: ["system"]
      description: "Document status: 0 = Draft, 1 = Submitted, 2 = Cancelled"
      synonyms_en: ["document status", "record state"]
      synonyms_ar: ["حالة المستند", "حالة السجل"]

    - name: "idx"
      type: "INT(8)"
      role: ["system"]
      description: "Index order of the item in the purchase order document"
      synonyms_en: ["row index", "item sequence", "line order"]
      synonyms_ar: ["ترتيب البند", "تسلسل الصف"]

    - name: "fg_item"
      type: "VARCHAR(140)"
      role: ["reference"]
      description: "Finished good item associated with this purchase line (if applicable)"
      synonyms_en: ["finished good", "fg code", "fg item reference"]
      synonyms_ar: ["المنتج النهائي", "رمز المنتج النهائي"]

    - name: "fg_item_qty"
      type: "DECIMAL(21,9)"
      role: ["quantity"]
      description: "Quantity of finished good item linked to this purchase order item"
      synonyms_en: ["finished good quantity", "fg qty"]
      synonyms_ar: ["كمية المنتج النهائي", "عدد المنتج النهائي"]

    - name: "item_code"
      type: "VARCHAR(140)"
      role: ["reference"]
      description: "Code of the purchased item"
      synonyms_en: ["product code", "material code", "sku"]
      synonyms_ar: ["رمز الصنف", "كود المادة", "رمز المنتج"]

    - name: "supplier_part_no"
      type: "VARCHAR(140)"
      role: ["reference"]
      description: "Supplier's part number for this item"
      synonyms_en: ["vendor part number", "supplier item code"]
      synonyms_ar: ["رمز المورد", "كود الصنف من المورد"]

    - name: "item_name"
      type: "VARCHAR(140)"
      role: ["description"]
      description: "Display name of the purchased item"
      synonyms_en: ["product name", "material name", "item title"]
      synonyms_ar: ["اسم الصنف", "اسم المادة"]

    - name: "brand"
      type: "VARCHAR(140)"
      role: ["classification"]
      description: "Brand associated with the purchased item"
      synonyms_en: ["product brand", "manufacturer brand"]
      synonyms_ar: ["العلامة التجارية", "الماركة"]

    - name: "product_bundle"
      type: "VARCHAR(140)"
      role: ["reference"]
      description: "Linked product bundle if the item belongs to a grouped offer"
      synonyms_en: ["bundle", "product package", "kit"]
      synonyms_ar: ["حزمة المنتج", "مجموعة المنتجات"]

    - name: "schedule_date"
      type: "DATE"
      role: ["logistics"]
      description: "Planned date for receiving the item as per schedule"
      synonyms_en: ["scheduled date", "delivery schedule", "expected date"]
      synonyms_ar: ["تاريخ الجدولة", "تاريخ التسليم المخطط"]

    - name: "expected_delivery_date"
      type: "DATE"
      role: ["logistics"]
      description: "Expected date of delivery based on supplier confirmation"
      synonyms_en: ["delivery expected date", "supplier delivery date"]
      synonyms_ar: ["تاريخ التسليم المتوقع", "تاريخ تسليم المورد"]

    - name: "item_group"
      type: "VARCHAR(140)"
      role: ["classification"]
      description: "Group or category under which the item falls"
      synonyms_en: ["item category", "product group", "material group"]
      synonyms_ar: ["مجموعة الصنف", "فئة المنتج"]

    - name: "description"
      type: "LONGTEXT"
