      synonyms_ar: ["المعجبون", "المفضلون"]

  notes: |
    - Core doctype for POS session payment reconciliation.
    - Use `docstatus = 1` to filter submitted POS closing entries.
    - Key joins: `mode_of_payment` → `tabMode of Payment Account`, `parent` → `tabPOS Closing Entry`.
    - `opening_amount`, `expected_amount`, and `closing_amount` track daily cash flow per mode of payment.
    - `difference` highlights shortages or overages between expected and counted cash.
    - Useful for cash management, audit, and POS reconciliation reports.
    - Indexed fields like `mode_of_payment`, `parent`, and `creation` improve query performance.


