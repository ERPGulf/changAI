    - Production Plan is used to generate Work Orders and Material Requests.
    - KPI calculations should rely on `total_planned_qty` vs `total_produced_qty` only.
    - Do not include metadata fields in production success metrics.
    - Join path for analytics: Production Plan → Work Order → Stock Ledger → Delivery Note/Sales Order → Customer.
    - Convert INT flags into boolean or enums in data layers before using in Power BI or pipelines.

