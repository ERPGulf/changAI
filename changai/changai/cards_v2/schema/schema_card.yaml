      description: "Accounting date of the invoice"
      synonyms_en: ["invoice date", "posting date", "sales date", "bill date"]
      synonyms_ar: ["تاريخ الفاتورة", "تاريخ التسجيل", "تاريخ البيع", "تاريخ الإدخال المحاسبي"]

    - name: "posting_time"
      type: "TIME"
      role: ["time", "filter"]
      description: "Time of day when the invoice was posted"
      synonyms_en: ["invoice time", "posting time", "sales time", "bill time"]
      synonyms_ar: ["وقت الفاتورة", "وقت التسجيل", "وقت البيع", "وقت الإدخال"]

    - name: "set_posting_time"
      type: "INT"
      role: ["flag"]
