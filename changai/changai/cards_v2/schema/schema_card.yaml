      description: "Linked address record ID for the customer's primary address"
      synonyms_en: ["address id", "main address link", "primary address id"]
      synonyms_ar: ["معرّف العنوان الرئيسي", "رابط العنوان", "عنوان العميل"]

    - name: "primary_address"
      type: "TEXT"
      role: ["contact"]
      description: "Full text of the customer’s primary address"
      synonyms_en: ["main address", "billing address", "registered address"]
      synonyms_ar: ["العنوان الرئيسي", "عنوان الفاتورة", "العنوان المسجل"]

    - name: "customer_primary_contact"
      type: "VARCHAR"
      role: ["relation"]
