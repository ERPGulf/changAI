- table: "tabEmployee"
  synonyms_en:
    - "employee"
    - "employee master"
    - "hr employee"

  description: >
    Stores employee master data including personal info, employment details,
    status, contact information, and HR metadata. Use only when the question
    is about employees, staff, HR, attendance, payroll, or worker details.

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Primary key for employee record"

    - name: "creation"
      type: "DATETIME"
      role: ["metadata"]
      description: "Creation timestamp"

    - name: "modified"
      type: "DATETIME"
      role: ["metadata"]
      description: "Last modified timestamp"

    - name: "modified_by"
      type: "VARCHAR"
      role: ["metadata"]
      description: "User who last modified"

    - name: "owner"
      type: "VARCHAR"
      role: ["metadata"]
      description: "Record creator"

    - name: "docstatus"
      type: "INT"
      role: ["metadata"]
      description: "Document status"

    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Internal ordering index"

    - name: "employee"
      type: "VARCHAR"
      role: ["business_key"]
      description: "Employee code or number"

    - name: "naming_series"
      type: "VARCHAR"
      role: ["metadata"]
      description: "Naming series"

    - name: "first_name"
      type: "VARCHAR"
      role: ["personal_info"]
      description: "First name"

    - name: "middle_name"
      type: "VARCHAR"
      role: ["personal_info"]
      description: "Middle name"

    - name: "last_name"
      type: "VARCHAR"
      role: ["personal_info"]
      description: "Last name"

    - name: "employee_name"
      type: "VARCHAR"
      role: ["display"]
      description: "Full employee name"

    - name: "gender"
      type: "VARCHAR"
      role: ["demographic"]
      description: "Gender"

    - name: "date_of_birth"
      type: "DATE"
      role: ["personal_info"]
      description: "Date of birth"

    - name: "salutation"
      type: "VARCHAR"
      role: ["personal_info"]
      description: "Title or honorific"

    - name: "date_of_joining"
      type: "DATE"
      role: ["employment"]
      description: "Joining date"

    - name: "image"
      type: "TEXT"
      role: ["media"]
      description: "Profile image"

    - name: "status"
      type: "VARCHAR"
      role: ["status"]
      description: "Employment status (e.g., Active, Left)"

    - name: "user_id"
      type: "VARCHAR"
      role: ["security"]
      description: "Linked system user"

    - name: "create_user_permission"
      type: "INT"
      role: ["security"]
      description: "Flag to auto-create user permissions"

    - name: "company"
      type: "VARCHAR"
      role: ["dimension"]
      description: "Employee's company"

    - name: "department"
      type: "VARCHAR"
      role: ["dimension"]
      description: "Employee's department"

    - name: "employee_number"
      type: "VARCHAR"
      role: ["business_key"]
      description: "Alternate employee number"

    - name: "designation"
      type: "VARCHAR"
      role: ["position"]
      description: "Job title"

    - name: "reports_to"
      type: "VARCHAR"
      role: ["relation"]
      description: "Manager or supervisor"

    - name: "branch"
      type: "VARCHAR"
      role: ["location"]
      description: "Branch location"

    - name: "scheduled_confirmation_date"
      type: "DATE"
      role: ["hr_process"]
      description: "Scheduled confirmation date"

    - name: "final_confirmation_date"
      type: "DATE"
      role: ["hr_process"]
      description: "Final confirmation date"

    - name: "contract_end_date"
      type: "DATE"
      role: ["employment"]
      description: "Contract end date"

    - name: "notice_number_of_days"
      type: "INT"
      role: ["hr_policy"]
      description: "Notice period days"

    - name: "date_of_retirement"
      type: "DATE"
      role: ["employment"]
      description: "Retirement date"

    - name: "cell_number"
      type: "VARCHAR"
      role: ["contact"]
      description: "Mobile number"

    - name: "personal_email"
      type: "VARCHAR"
      role: ["contact"]
      description: "Personal email"

    - name: "company_email"
      type: "VARCHAR"
      role: ["contact"]
      description: "Company email"

    - name: "prefered_contact_email"
      type: "VARCHAR"
      role: ["preference"]
      description: "Preferred email type"

    - name: "prefered_email"
      type: "VARCHAR"
      role: ["preference"]
      description: "Preferred email address"

    - name: "unsubscribed"
      type: "INT"
      role: ["communication"]
      description: "Email unsubscribe flag"

    - name: "current_address"
      type: "TEXT"
      role: ["address"]
      description: "Current address"

    - name: "current_accommodation_type"
      type: "VARCHAR"
      role: ["address"]
      description: "Current accommodation type"

    - name: "permanent_address"
      type: "TEXT"
      role: ["address"]
      description: "Permanent address"

    - name: "permanent_accommodation_type"
      type: "VARCHAR"
      role: ["address"]
      description: "Permanent accommodation type"

    - name: "person_to_be_contacted"
      type: "VARCHAR"
      role: ["emergency_contact"]
      description: "Emergency contact person"

    - name: "emergency_phone_number"
      type: "VARCHAR"
      role: ["emergency_contact"]
      description: "Emergency phone number"

    - name: "relation"
      type: "VARCHAR"
      role: ["emergency_contact"]
      description: "Emergency contact relation"

    - name: "attendance_device_id"
      type: "VARCHAR"
      role: ["integration"]
      description: "Attendance device ID"

    - name: "holiday_list"
      type: "VARCHAR"
      role: ["hr_policy"]
      description: "Assigned holiday list"

    - name: "ctc"
      type: "DECIMAL"
      role: ["salary"]
      description: "Cost to company"

    - name: "salary_currency"
      type: "VARCHAR"
      role: ["salary"]
      description: "Salary currency"

    - name: "salary_mode"
      type: "VARCHAR"
      role: ["salary"]
      description: "Salary payment mode"

    - name: "bank_name"
      type: "VARCHAR"
      role: ["banking"]
      description: "Bank name"

    - name: "bank_ac_no"
      type: "VARCHAR"
      role: ["banking"]
      description: "Bank account number"

    - name: "iban"
      type: "VARCHAR"
      role: ["banking"]
      description: "IBAN number"

    - name: "marital_status"
      type: "VARCHAR"
      role: ["demographic"]
      description: "Marital status"

    - name: "family_background"
      type: "TEXT"
      role: ["hr_notes"]
      description: "Family background"

    - name: "blood_group"
      type: "VARCHAR"
      role: ["health"]
      description: "Blood group"

    - name: "health_details"
      type: "TEXT"
      role: ["health"]
      description: "Health details"

    - name: "passport_number"
      type: "VARCHAR"
      role: ["travel"]
      description: "Passport number"

    - name: "valid_upto"
      type: "DATE"
      role: ["travel"]
      description: "Passport validity date"

    - name: "date_of_issue"
      type: "DATE"
      role: ["travel"]
      description: "Passport issue date"

    - name: "place_of_issue"
      type: "VARCHAR"
      role: ["travel"]
      description: "Passport issue place"

    - name: "bio"
      type: "LONGTEXT"
      role: ["notes"]
      description: "Employee biography"

    - name: "resignation_letter_date"
      type: "DATE"
      role: ["exit"]
      description: "Resignation letter date"

    - name: "relieving_date"
      type: "DATE"
      role: ["exit"]
      description: "Relieving date"

    - name: "held_on"
      type: "DATE"
      role: ["exit"]
      description: "Exit interview date"

    - name: "new_workplace"
      type: "VARCHAR"
      role: ["exit"]
      description: "Next employer"

    - name: "leave_encashed"
      type: "VARCHAR"
      role: ["benefits"]
      description: "Leave encashment flag"

    - name: "encashment_date"
      type: "DATE"
      role: ["benefits"]
      description: "Encashment date"

    - name: "reason_for_leaving"
      type: "TEXT"
      role: ["exit"]
      description: "Reason for leaving"

    - name: "feedback"
      type: "TEXT"
      role: ["exit"]
      description: "Exit feedback"

    - name: "lft"
      type: "INT"
      role: ["system"]
      description: "Nested set left index"

    - name: "rgt"
      type: "INT"
      role: ["system"]
      description: "Nested set right index"

    - name: "old_parent"
      type: "VARCHAR"
      role: ["system"]
      description: "Previous parent node"

- table: "tabCustomer"
  synonyms_en:
    - "customer"
    - "client"
    - "buyer"
    - "customer master"

  description: >
    Stores customer master data: identity, classification, contact details, and
    financial defaults. Use for any question about customers, clients, buyers,
    or customer-wise sales, balances, or invoices.

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique customer ID / primary key"
      synonyms_en:
        - "customer id"
        - "customer code"

    - name: "creation"
      type: "DATETIME"
      role: ["system"]
      description: "Record creation timestamp"

    - name: "modified"
      type: "DATETIME"
      role: ["system"]
      description: "Last modified timestamp"

    - name: "modified_by"
      type: "VARCHAR"
      role: ["system"]
      description: "User who last modified the record"

    - name: "owner"
      type: "VARCHAR"
      role: ["system"]
      description: "User who created the record"

    - name: "docstatus"
      type: "INT"
      role: ["lifecycle"]
      description: "Document status (0=Draft, 1=Active, 2=Cancelled)"

    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Internal row index"

    - name: "naming_series"
      type: "VARCHAR"
      role: ["system"]
      description: "Naming series for customer ID"

    - name: "salutation"
      type: "VARCHAR"
      role: ["attribute"]
      description: "Title (Mr., Ms., Dr., etc.)"

    - name: "customer_name"
      type: "VARCHAR"
      role: ["party", "dimension"]
      description: "Display name of the customer"

    - name: "customer_type"
      type: "VARCHAR"
      role: ["classification"]
      description: "Type of customer (e.g., Company, Individual)"

    - name: "customer_group"
      type: "VARCHAR"
      role: ["classification"]
      description: "Customer group or category"

    - name: "territory"
      type: "VARCHAR"
      role: ["dimension"]
      description: "Region or territory of the customer"

    - name: "gender"
      type: "VARCHAR"
      role: ["attribute"]
      description: "Gender (if applicable)"

    - name: "lead_name"
      type: "VARCHAR"
      role: ["relation"]
      description: "Linked lead from which this customer was created"

    - name: "opportunity_name"
      type: "VARCHAR"
      role: ["relation"]
      description: "Linked opportunity record"

    - name: "prospect_name"
      type: "VARCHAR"
      role: ["relation"]
      description: "Linked prospect record"

    - name: "account_manager"
      type: "VARCHAR"
      role: ["personnel"]
      description: "Assigned account / relationship manager"

    - name: "image"
      type: "TEXT"
      role: ["media"]
      description: "Customer image or logo"

    - name: "default_currency"
      type: "VARCHAR"
      role: ["finance"]
      description: "Default transaction currency for this customer"

    - name: "default_bank_account"
      type: "VARCHAR"
      role: ["finance"]
      description: "Default bank account linked to the customer"

    - name: "default_price_list"
      type: "VARCHAR"
      role: ["finance"]
      description: "Default price list for sales"

    - name: "is_internal_customer"
      type: "INT"
      role: ["flag"]
      description: "1 if internal customer, 0 otherwise"

    - name: "represents_company"
      type: "VARCHAR"
      role: ["relation"]
      description: "Company represented by this customer"

    - name: "market_segment"
      type: "VARCHAR"
      role: ["classification"]
      description: "Market segment or sector"

    - name: "industry"
      type: "VARCHAR"
      role: ["classification"]
      description: "Industry or line of business"

    - name: "customer_pos_id"
      type: "VARCHAR"
      role: ["integration"]
      description: "Customer ID in POS system"

    - name: "website"
      type: "VARCHAR"
      role: ["contact"]
      description: "Customer website URL"

    - name: "language"
      type: "VARCHAR"
      role: ["communication"]
      description: "Preferred communication language"

    - name: "customer_details"
      type: "TEXT"
      role: ["notes"]
      description: "Additional details or remarks"

    - name: "customer_primary_address"
      type: "VARCHAR"
      role: ["relation"]
      description: "Linked primary address record ID"

    - name: "primary_address"
      type: "TEXT"
      role: ["contact"]
      description: "Primary address text"

    - name: "customer_primary_contact"
      type: "VARCHAR"
      role: ["relation"]
      description: "Linked primary contact record ID"

    - name: "mobile_no"
      type: "VARCHAR"
      role: ["contact"]
      description: "Primary mobile number"

    - name: "email_id"
      type: "VARCHAR"
      role: ["contact"]
      description: "Primary email address"

    - name: "tax_id"
      type: "VARCHAR"
      role: ["finance"]
      description: "Tax identification / VAT number"

    - name: "tax_category"
      type: "VARCHAR"
      role: ["finance"]
      description: "Tax category for this customer"

    - name: "tax_withholding_category"
      type: "VARCHAR"
      role: ["finance"]
      description: "Tax withholding category"

    - name: "payment_terms"
      type: "VARCHAR"
      role: ["finance"]
      description: "Default payment terms"

    - name: "loyalty_program"
      type: "VARCHAR"
      role: ["marketing"]
      description: "Loyalty program the customer is enrolled in"

    - name: "loyalty_program_tier"
      type: "VARCHAR"
      role: ["marketing"]
      description: "Tier/level in the loyalty program"

    - name: "default_sales_partner"
      type: "VARCHAR"
      role: ["relation"]
      description: "Default sales partner for this customer"

    - name: "default_commission_rate"
      type: "DECIMAL"
      role: ["finance"]
      description: "Default sales commission rate (%)"

    - name: "so_required"
      type: "INT(1)"
      role: ["requirement", "flag"]
      description: "1 if Sales Order is required before invoicing"

    - name: "dn_required"
      type: "INT(1)"
      role: ["requirement", "flag"]
      description: "1 if Delivery Note is required before invoicing"

    - name: "is_frozen"
      type: "INT(1)"
      role: ["status"]
      description: "1 if the customer record is frozen"

    - name: "disabled"
      type: "INT(1)"
      role: ["status"]
      description: "1 if customer is disabled / inactive"

    - name: "zatca_customer_name_in_arabic"
      type: "VARCHAR(140)"
      role: ["localization", "name"]
      description: "Customer name in Arabic (ZATCA compliance)"

    - name: "custom_b2c"
      type: "INT(1)"
      role: ["classification"]
      description: "1 if B2C customer"

    - name: "custom_buyer_id_type"
      type: "VARCHAR(140)"
      role: ["identity", "tax"]
      description: "Buyer ID type (TIN, CRN, National ID, etc.)"

    - name: "custom_buyer_id"
      type: "VARCHAR(140)"
      role: ["identity"]
      description: "Buyer ID number for ZATCA compliance"

    - name: "primary_key"
      type: "KEY"
      role: ["constraint"]
      description: "Primary key on name"

    - name: "unique_key_represents_company"
      type: "KEY"
      role: ["constraint"]
      description: "Uniqueness constraint on represents_company"

    - name: "key_customer_name"
      type: "KEY"
      role: ["index"]
      description: "Index on customer_name"

    - name: "key_customer_group"
      type: "KEY"
      role: ["index"]
      description: "Index on customer_group"

    - name: "key_modified"
      type: "KEY"
      role: ["index"]
      description: "Index on modified timestamp"
- table: "tabPurchase Invoice Item"
  synonyms_en:
    - "purchase invoice item"
    - "purchase bill line"
    - "invoice line item"

  description: >
    Line items of a Purchase Invoice, storing item, quantity, pricing, tax, and
    cost information for each supplier bill row.

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique ID for the purchase invoice item record."

    - name: "creation"
      type: "DATETIME"
      role: ["system"]
      description: "Creation timestamp."

    - name: "modified"
      type: "DATETIME"
      role: ["system"]
      description: "Last modified timestamp."

    - name: "modified_by"
      type: "VARCHAR"
      role: ["system"]
      description: "User who last modified the record."

    - name: "owner"
      type: "VARCHAR"
      role: ["system"]
      description: "User who created the record."

    - name: "docstatus"
      type: "INT"
      role: ["system"]
      description: "Document status (0=Draft, 1=Submitted, 2=Cancelled)."

    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Row index within the Purchase Invoice."

    - name: "item_code"
      type: "VARCHAR"
      role: ["inventory", "foreign key"]
      description: "Code of the purchased item."

    - name: "product_bundle"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Product bundle reference, if part of a bundle."

    - name: "item_name"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Name of the purchased item."

    - name: "description"
      type: "LONGTEXT"
      role: ["inventory", "info"]
      description: "Detailed description of the item."

    - name: "brand"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Brand of the item."

    - name: "item_group"
      type: "VARCHAR"
      role: ["inventory", "categorization"]
      description: "Item group or category."

    - name: "image"
      type: "TEXT"
      role: ["inventory", "info"]
      description: "Image reference or URL for the item."

    - name: "received_qty"
      type: "DECIMAL(21,9)"
      role: ["inventory", "quantity"]
      description: "Quantity received against this invoice."

    - name: "qty"
      type: "DECIMAL(21,9)"
      role: ["inventory", "quantity"]
      description: "Quantity in the invoice."

    - name: "rejected_qty"
      type: "DECIMAL(21,9)"
      role: ["inventory", "quality control"]
      description: "Quantity rejected upon receipt."

    - name: "uom"
      type: "VARCHAR"
      role: ["inventory", "measurement"]
      description: "Unit of measure in the invoice."

    - name: "conversion_factor"
      type: "DECIMAL(21,9)"
      role: ["inventory", "conversion"]
      description: "Factor between invoice UOM and stock UOM."

    - name: "stock_uom"
      type: "VARCHAR"
      role: ["inventory", "measurement"]
      description: "Stock unit of measure."

    - name: "stock_qty"
      type: "DECIMAL(21,9)"
      role: ["inventory", "quantity"]
      description: "Quantity in stock UOM."

    - name: "price_list_rate"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Rate from the purchase price list."

    - name: "base_price_list_rate"
      type: "DECIMAL(21,9)"
      role: ["pricing", "currency"]
      description: "Price list rate in company currency."

    - name: "margin_type"
      type: "VARCHAR"
      role: ["pricing", "margin"]
      description: "Type of margin (Amount or Percentage)."

    - name: "margin_rate_or_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing", "margin"]
      description: "Margin rate or amount applied."

    - name: "rate_with_margin"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Rate after margin is applied."

    - name: "discount_percentage"
      type: "DECIMAL(21,9)"
      role: ["pricing", "discount"]
      description: "Discount percentage."

    - name: "discount_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing", "discount"]
      description: "Discount amount."

    - name: "distributed_discount_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing", "discount"]
      description: "Discount amount allocated to this item."

    - name: "base_rate_with_margin"
      type: "DECIMAL(21,9)"
      role: ["pricing", "currency"]
      description: "Rate with margin in company currency."

    - name: "rate"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Rate per unit in invoice currency."

    - name: "amount"
      type: "DECIMAL(21,9)"
      role: ["pricing", "finance"]
      description: "Amount (rate × qty) in invoice currency."

    - name: "item_tax_template"
      type: "VARCHAR"
      role: ["tax"]
      description: "Tax template applied to this item."

    - name: "base_rate"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Rate per unit in company currency."

    - name: "base_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Total amount in company currency."

    - name: "pricing_rules"
      type: "TEXT"
      role: ["pricing"]
      description: "Applied pricing rules."

    - name: "stock_uom_rate"
      type: "DECIMAL(21,9)"
      role: ["inventory"]
      description: "Rate per stock UOM."

    - name: "is_free_item"
      type: "INT(1)"
      role: ["flag"]
      description: "1 if the item is free of charge."

    - name: "apply_tds"
      type: "INT(1)"
      role: ["tax"]
      description: "1 if TDS applies."

    - name: "net_rate"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Net rate after discounts."

    - name: "net_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Net amount (qty × net rate)."

    - name: "base_net_rate"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Net rate in company currency."

    - name: "base_net_amount"
      type: "DECIMAL(21,9)"
      role: ["pricing"]
      description: "Net amount in company currency."

    - name: "valuation_rate"
      type: "DECIMAL(21,9)"
      role: ["inventory"]
      description: "Rate used for stock valuation."

    - name: "sales_incoming_rate"
      type: "DECIMAL(21,9)"
      role: ["inventory"]
      description: "Incoming rate used for valuation."

    - name: "item_tax_amount"
      type: "DECIMAL(21,9)"
      role: ["tax"]
      description: "Item-level tax amount."

    - name: "landed_cost_voucher_amount"
      type: "DECIMAL(21,9)"
      role: ["costing"]
      description: "Landed cost allocated to this item."

    - name: "rm_supp_cost"
      type: "DECIMAL(21,9)"
      role: ["manufacturing"]
      description: "Raw material supplier cost."

    - name: "warehouse"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Warehouse where the item is stored."

    - name: "serial_and_batch_bundle"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Serial and batch bundle reference."

    - name: "use_serial_batch_fields"
      type: "INT(1)"
      role: ["flag"]
      description: "1 if serial/batch tracking is used."

    - name: "from_warehouse"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Source warehouse for stock movement."

    - name: "quality_inspection"
      type: "VARCHAR"
      role: ["quality"]
      description: "Linked quality inspection document."

    - name: "rejected_warehouse"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Warehouse for rejected items."

    - name: "rejected_serial_and_batch_bundle"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Serial/batch bundle for rejected items."

    - name: "serial_no"
      type: "TEXT"
      role: ["inventory"]
      description: "Serial numbers assigned to the item."

    - name: "rejected_serial_no"
      type: "TEXT"
      role: ["inventory"]
