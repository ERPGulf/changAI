    - name: "parent"
      type: "VARCHAR"
      role: ["system", "link"]
      description: "Parent document name (Purchase Invoice)"
      synonyms_en: ["parent id", "linked document name"]
      synonyms_ar: ["المستند الأب", "اسم المستند الرئيسي"]

    - name: "parentfield"
      type: "VARCHAR"
      role: ["system"]
      description: "Fieldname in the parent document that links this record"
      synonyms_en: ["parent field", "linked field"]
      synonyms_ar: ["حقل الأب", "الحقل المرتبط"]

    - name: "parenttype"
      type: "VARCHAR"
      role: ["system"]
      description: "Type of the parent document"
      synonyms_en: ["parent type", "document type"]
      synonyms_ar: ["نوع المستند الأب", "نوع المستند الرئيسي"]
  notes: |
    - Child doctype of `tabPurchase Invoice` storing individual item details for each supplier bill.
    - Each record represents one item line linked to a parent Purchase Invoice via the `parent` field.
    - Core fields like `item_code`, `item_name`, `description`, and `item_group` describe the purchased product or service.
    - `brand` and `product_bundle` are useful for categorization, brand-wise tracking, and bundle-based purchases.
    - Quantity, pricing, and tax-related fields (e.g., `qty`, `rate`, `amount`, `base_rate`, `base_amount`) determine cost and valuation.
    - `docstatus = 1` indicates that the parent invoice is submitted (used for filtering finalized transactions).
    - `idx` maintains the line item order within the invoice document.
    - Joins:
        - `parent` → `tabPurchase Invoice`.`name` (to link with invoice header)
        - `item_code` → `tabItem`.`name` (to fetch master data like UOM, brand, and group)

- table: "tabPurchase Order"
  synonyms_en:
    - "purchase order"
    - "po"
    - "buying order"
    - "supplier order"
    - "procurement document"
    - "purchase record"
  description: "Document representing a formal request to a supplier to provide goods or services under agreed terms and pricing."

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique Purchase Order ID / primary key"
      synonyms_en: ["purchase order id", "po id", "order number", "po number"]
      synonyms_ar: ["رقم أمر الشراء", "رمز أمر الشراء", "معرّف أمر الشراء"]

    - name: "creation"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the purchase order was created"
      synonyms_en: ["created at", "creation time", "po created on", "created date"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

    - name: "modified"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp of the last modification made to the purchase order"
      synonyms_en: ["modified at", "updated on", "last updated"]
      synonyms_ar: ["تاريخ التعديل", "آخر تحديث", "وقت التعديل"]

    - name: "modified_by"
