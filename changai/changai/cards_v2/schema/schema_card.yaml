  notes: |
    - Core doctype for supplier bills and accounts payable.
    - Use `docstatus = 1` to filter submitted invoices.
    - Key joins: `supplier` → `tabSupplier`, `name` → `tabPurchase Invoice Item`.`parent`.
    - Use `grand_total` for invoice currency and `base_grand_total` for company currency.
    - `outstanding_amount` is crucial for AP aging and payments.
    - Discounts and taxes controlled via `discount_amount`, `taxes_and_charges`, `tax_category`.
    - `status` reflects lifecycle (Draft, Submitted, Paid, etc.).
    - `is_return` and `return_against` track credit notes/returns.
    - ZATCA fields (`custom_zatca_*`) are important for e-invoicing compliance.
    - Indexed fields like `supplier`, `posting_date`, and `bill_no` improve query performance.
