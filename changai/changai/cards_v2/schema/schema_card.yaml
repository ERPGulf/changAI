      synonyms_en: ["report page break", "break after item"]
      synonyms_ar: ["فاصل صفحة"]

    - name: "parent"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "Parent document name for this record"
      synonyms_en: ["parent ID", "linked document"]
      synonyms_ar: ["المستند الرئيسي"]

    - name: "parentfield"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "Field name used to link child record to parent document"
      synonyms_en: ["child field name", "link field"]
      synonyms_ar: ["حقل الارتباط"]

    - name: "parenttype"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "Parent document type name"
      synonyms_en: ["parent type", "document type"]
      synonyms_ar: ["نوع المستند الرئيسي"]

  notes: |
    - Core doctype for POS billing and retail sales tracking.
    - Each record represents an individual product or service item in a POS Invoice.
    - Use `docstatus = 1` to filter finalized (submitted) invoices.
    - Key joins: `parent` → `tabPOS Invoice`, `item_code` → `tabItem`, `warehouse` → `tabWarehouse`.
    - Pricing fields include `rate`, `amount`, `discount_percentage`, `discount_amount`, and `net_amount`.
    - Margin fields (`margin_type`, `margin_rate_or_amount`, `rate_with_margin`) manage markups and margins.
    - `net_rate` and `net_amount` capture post-discount, pre-tax values.
    - `income_account`, `expense_account`, and `cost_center` map revenue and expense accounts.

- table: "tabPayment Entry"
  synonyms_en:
    - "payment transaction"
    - "bank payment"
    - "cash receipt"
    - "incoming payment"
    - "outgoing payment"
    - "fund transfer"
  description: "Record of payments made or received, including mode of payment, party details, references to invoices, and accounting impact on company ledgers."
  fields:

    - name: "name"
      type: "VARCHAR(140)"
      role: ["system", "primary_key"]
      description: "Unique name or ID of the payment entry document"
      synonyms_en: ["document id", "payment entry id", "record name"]
      synonyms_ar: ["اسم السجل", "معرف السجل"]

    - name: "creation"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp when the document was created"
      synonyms_en: ["created on", "creation date"]
      synonyms_ar: ["تاريخ الإنشاء"]

    - name: "modified"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp when the document was last modified"
      synonyms_en: ["modified on", "last updated"]
      synonyms_ar: ["تاريخ التعديل"]

    - name: "modified_by"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "User who last modified the document"
      synonyms_en: ["updated by", "edited by"]
      synonyms_ar: ["تم التعديل بواسطة"]

    - name: "owner"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "User who created the document"
      synonyms_en: ["created by", "document owner"]
      synonyms_ar: ["تم الإنشاء بواسطة"]

    - name: "docstatus"
      type: "INT(1)"
      role: ["system"]
      description: "Document status (0: Draft, 1: Submitted, 2: Cancelled)"
      synonyms_en: ["document status", "status code"]
      synonyms_ar: ["حالة المستند"]

    - name: "idx"
      type: "INT(8)"
      role: ["system"]
      description: "Index for internal ordering"
      synonyms_en: ["index", "order index"]
      synonyms_ar: ["ترتيب"]

    - name: "naming_series"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "Naming series pattern used for auto-generated document names"
      synonyms_en: ["series code", "naming pattern"]
      synonyms_ar: ["نمط التسمية", "رمز السلسلة"]

    - name: "payment_type"
      type: "VARCHAR(140)"
      description: "Indicates whether the payment is incoming, outgoing, or transfer."
      synonyms_en: ["payment direction", "transaction type", "receipt or payment"]
      synonyms_ar: ["نوع الدفع", "اتجاه المعاملة"]

    - name: "payment_order_status"
      type: "VARCHAR(140)"
      description: "Status of linked payment order, showing whether it is pending, processed, or cancelled."
      synonyms_en: ["payment order state", "order status"]
      synonyms_ar: ["حالة أمر الدفع"]

    - name: "posting_date"
      type: "DATE"
      description: "The date on which the payment is recorded in the company’s books."
      synonyms_en: ["transaction date", "record date"]
      synonyms_ar: ["تاريخ القيد", "تاريخ المعاملة"]

    - name: "company"
      type: "VARCHAR(140)"
      description: "Company for which this payment entry is recorded."
      synonyms_en: ["organization", "entity name"]
      synonyms_ar: ["الشركة"]

    - name: "mode_of_payment"
      type: "VARCHAR(140)"
