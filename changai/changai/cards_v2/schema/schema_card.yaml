    - name: "project"
      type: "VARCHAR(140)"
      role: ["project_management"]
      description: "Linked project reference"
      synonyms_en: ["project code", "project reference"]
      synonyms_ar: ["المشروع"]

    - name: "page_break"
      type: "INT(1)"
      role: ["reporting"]
