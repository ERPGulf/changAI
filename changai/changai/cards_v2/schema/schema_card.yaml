      synonyms_en: ["from warehouse", "source warehouse", "dispatch warehouse"]
      synonyms_ar: ["من المستودع", "مستودع المصدر"]

    - name: "set_warehouse"
      type: "VARCHAR(140)"
      description: "Default target warehouse where materials will be received"
      synonyms_en: ["to warehouse", "destination warehouse", "receiving warehouse"]
      synonyms_ar: ["إلى المستودع", "مستودع الوجهة"]

    - name: "tc_name"
      type: "VARCHAR(140)"
      description: "Terms and conditions template name linked to the request"
      synonyms_en: ["terms template", "tc name", "contract terms"]
      synonyms_ar: ["اسم الشروط", "قالب الشروط"]

    - name: "terms"
      type: "LONGTEXT"
      description: "Detailed terms and conditions for this material request"
      synonyms_en: ["terms and conditions", "agreement", "policy text"]
      synonyms_ar: ["الشروط والأحكام", "الاتفاقية"]

    - name: "status"
      type: "VARCHAR(140)"
      description: "Current status of the material request (e.g., Draft, Submitted, Stopped, Ordered)"
      synonyms_en: ["document status", "state", "workflow status"]
      synonyms_ar: ["الحالة", "حالة المستند"]

    - name: "per_ordered"
      type: "DECIMAL(21,9)"
      description: "Percentage of items from this material request that have been ordered"
      synonyms_en: ["percent ordered", "ordered percentage", "progress ordered"]
      synonyms_ar: ["النسبة المطلوبة", "نسبة الطلب"]

    - name: "transfer_status"
      type: "VARCHAR(140)"
      description: "Status of stock transfer related to this material request"
      synonyms_en: ["stock transfer status", "transfer state"]
      synonyms_ar: ["حالة التحويل", "حالة النقل"]

    - name: "per_received"
      type: "DECIMAL(21,9)"
      description: "Percentage of materials received against the material request"
      synonyms_en: ["percent received", "received percentage", "progress received"]
      synonyms_ar: ["النسبة المستلمة", "نسبة التسليم"]

    - name: "letter_head"
      type: "VARCHAR(140)"
      description: "Letterhead template used for printing the material request document"
      synonyms_en: ["letterhead template", "document header"]
      synonyms_ar: ["ترويسة المستند", "نموذج الترويسة"]

    - name: "select_print_heading"
      type: "VARCHAR(140)"
      description: "Custom heading to appear on printed copies of the material request"
      synonyms_en: ["print heading", "document title", "header label"]
      synonyms_ar: ["عنوان الطباعة", "رأس الطباعة"]

    - name: "job_card"
      type: "VARCHAR(140)"
      description: "Linked job card for material requests related to production or maintenance"
      synonyms_en: ["work card", "job reference", "production job card"]
      synonyms_ar: ["بطاقة العمل", "بطاقة الإنتاج"]

    - name: "work_order"
      type: "VARCHAR(140)"
      description: "Linked work order associated with this material request"
      synonyms_en: ["work order reference", "manufacturing order", "production order"]
      synonyms_ar: ["أمر العمل", "أمر الإنتاج"]

    - name: "_user_tags"
      type: "TEXT"
      description: "User-defined tags for categorization or search"
      synonyms_en: ["tags", "labels", "user tags"]
      synonyms_ar: ["العلامات", "وسوم المستخدم"]

    - name: "_comments"
      type: "TEXT"
      description: "Internal comments or notes added by users"
      synonyms_en: ["notes", "remarks", "user comments"]
      synonyms_ar: ["التعليقات", "ملاحظات"]

    - name: "_assign"
      type: "TEXT"
      description: "Assignment details showing users responsible for the document"
      synonyms_en: ["assigned to", "task assignment"]
      synonyms_ar: ["تعيين", "تم الإسناد إلى"]

    - name: "_liked_by"
      type: "TEXT"
      description: "List of users who liked or followed this material request"
      synonyms_en: ["liked by", "followers", "watchers"]
      synonyms_ar: ["أعجب به", "متابعون"]

  notes: |
    - Core doctype for managing internal or external requests for materials.
    - Used to initiate procurement, production, or stock transfer based on `material_request_type` (Purchase, Manufacture, Transfer, etc.).
    - Use `docstatus = 1` to filter submitted material requests.
    - Key joins:
        • `name` → `tabMaterial Request Item`.`parent`
        • `company` → `tabCompany`.`name`
        • `customer` → `tabCustomer`.`name`
    - `transaction_date` represents request creation; `schedule_date` indicates when materials are needed.
    - `set_warehouse` and `set_from_warehouse` define source and target locations for transfer or issue.
    - Status flow: Draft → Submitted → Ordered → Received → Closed.
    - Important for MRP and stock planning — drives Purchase Orders, Stock Entries, and Work Orders.
    - `per_ordered` and `per_received` track fulfillment progress.
    - Linked doctypes: Purchase Order, Work Order, Job Card.
    - Indexed fields like `material_request_type`, `status`, and `company` improve query performance.


- table: "tabMaterial Request Item"
  synonyms_en:
    - "material request line"
    - "requested item"
    - "purchase request item"
    - "requisition item"
    - "mr item"
  description: "Each record represents an individual item within a Material Request document, including item code, name, quantity, and schedule date."

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique ID / primary key for this material request item"
      synonyms_en: ["item id", "row id", "line id"]
      synonyms_ar: ["معرّف العنصر", "رمز العنصر", "رقم الصف"]

    - name: "creation"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when this item record was created"
      synonyms_en: ["created at", "creation time", "added on"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

    - name: "modified"
      type: "DATETIME"
      role: ["system"]
      description: "Last modification time of the item record"
      synonyms_en: ["last updated", "modified on", "updated time"]
      synonyms_ar: ["آخر تعديل", "تاريخ التحديث"]

    - name: "modified_by"
      type: "VARCHAR"
      role: ["system"]
      description: "User who last modified the record"
      synonyms_en: ["updated by", "modified by"]
      synonyms_ar: ["تم التعديل بواسطة", "المحرر"]

    - name: "owner"
      type: "VARCHAR"
      role: ["system"]
      description: "User who created the record"
      synonyms_en: ["created by", "owner", "requested by"]
      synonyms_ar: ["المنشئ", "أنشأ بواسطة", "المالك"]

    - name: "docstatus"
      type: "INT"
      role: ["system"]
      description: "Document status (0: Draft, 1: Submitted, 2: Cancelled)"
      synonyms_en: ["document status", "status code", "record status"]
