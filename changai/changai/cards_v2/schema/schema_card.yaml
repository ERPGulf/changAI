  notes: |
    - Core doctype for POS billing and retail sales tracking.
    - Each record represents an individual product or service item in a POS Invoice.
    - Use `docstatus = 1` to filter finalized (submitted) invoices.
    - Key joins: `parent` → `tabPOS Invoice`, `item_code` → `tabItem`, `warehouse` → `tabWarehouse`.
    - Pricing fields include `rate`, `amount`, `discount_percentage`, `discount_amount`, and `net_amount`.
    - Margin fields (`margin_type`, `margin_rate_or_amount`, `rate_with_margin`) manage markups and margins.
    - `net_rate` and `net_amount` capture post-discount, pre-tax values.
    - `income_account`, `expense_account`, and `cost_center` map revenue and expense accounts.

- table: "tabPayment Entry"
  synonyms_en:
    - "payment transaction"
    - "bank payment"
    - "cash receipt"
    - "incoming payment"
    - "outgoing payment"
    - "fund transfer"
  description: "Record of payments made or received, including mode of payment, party details, references to invoices, and accounting impact on company ledgers."
  fields:

    - name: "name"
      type: "VARCHAR(140)"
      role: ["system", "primary_key"]
      description: "Unique name or ID of the payment entry document"
      synonyms_en: ["document id", "payment entry id", "record name"]
      synonyms_ar: ["اسم السجل", "معرف السجل"]

    - name: "creation"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp when the document was created"
