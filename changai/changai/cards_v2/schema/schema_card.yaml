    - name: "paid_to_account_currency"
      type: "VARCHAR(140)"
      description: "Currency of the account receiving the payment."
      synonyms_en: ["destination account currency", "credit account currency"]
      synonyms_ar: ["عملة الحساب المدفوع إليه"]

    - name: "paid_to_account_balance"
      type: "DECIMAL(21,9)"
      description: "Current balance of the destination account before the transaction."
