      description: "Received quantity in certain flows (e.g., returns or transfers)."

    - name: "installed_qty"
      type: "DECIMAL"
      role: ["qty", "installation"]
      description: "Quantity installed at the customer (for installable items)."

    - name: "packed_qty"
      type: "DECIMAL"
      role: ["qty", "packing"]
      description: "Quantity packed for this delivery, if using Packing Slip."

    - name: "expense_account"
      type: "VARCHAR"
      role: ["account"]
      description: "Expense account linked to this delivery item, used in accounting."

    - name: "material_request"
      type: "VARCHAR"
      role: ["link"]
      description: "Linked Material Request from which this delivery originated."

    - name: "material_request_item"
      type: "VARCHAR"
      role: ["link"]
      description: "Linked Material Request Item row."

    - name: "purchase_order"
      type: "VARCHAR"
      role: ["link"]
      description: "Linked Purchase Order, common in drop-shipping scenarios."

    - name: "purchase_order_item"
      type: "VARCHAR"
      role: ["link"]
      description: "Linked Purchase Order Item row."

    - name: "project"
      type: "VARCHAR"
      role: ["project"]
      description: "Linked project for project-wise delivery tracking."

    - name: "cost_center"
      type: "VARCHAR"
      role: ["cost_center"]
      description: "Cost center for allocating costs/revenue of this delivery."

    - name: "page_break"
      type: "INT"
      role: ["layout"]
      description: "Adds a page break before this item on print formats."

    - name: "owner"
      type: "VARCHAR"
      role: ["meta"]
      description: "User who created the record."

    - name: "modified_by"
      type: "VARCHAR"
      role: ["meta"]
      description: "User who last modified the record."

    - name: "creation"
      type: "DATETIME"
      role: ["meta"]
      description: "Record creation timestamp."

    - name: "modified"
      type: "DATETIME"
      role: ["meta"]
      description: "Last modified timestamp."

  notes: |
    - Child table of `tabDelivery Note` storing delivered item details.
    - Key joins: `parent` → Delivery Note, `item_code` → Item, `warehouse` → Warehouse,
      `against_sales_order` → Sales Order, `so_detail` → Sales Order Item.
    - Useful for delivery qty, return qty, and warehouse/batch/serial tracking.

- table: "tabJournal Entry"
  synonyms_en:
    - "journal entry"
    - "je"
    - "manual accounting entry"
    - "adjustment entry"
    - "accounting journal"
    - "financial journal"

  description: >
    Main accounting document used to record manual or system-generated journal postings
    such as adjustments, accruals, write-offs, inter-company entries, and miscellaneous
    debit/credit transactions.

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique Journal Entry ID."

    - name: "posting_date"
      type: "DATE"
      role: ["date"]
      description: "Posting date for the journal entry."

    - name: "company"
      type: "VARCHAR"
      role: ["company"]
      description: "Company for which the entry is posted."

    - name: "voucher_type"
      type: "VARCHAR"
      role: ["type"]
      description: "Type of the journal entry (e.g., Bank Entry, Credit Note)."

    - name: "title"
      type: "VARCHAR"
      role: ["label"]
      description: "User-friendly title or remark."

    - name: "total_debit"
      type: "DECIMAL"
      role: ["amount"]
      description: "Sum of all debit amounts."

    - name: "total_credit"
      type: "DECIMAL"
      role: ["amount"]
      description: "Sum of all credit amounts."

    - name: "difference"
      type: "DECIMAL"
      role: ["amount"]
      description: "Difference between debit and credit (should typically be zero)."

    - name: "multi_currency"
      type: "INT"
      role: ["flag"]
      description: "Indicates whether multiple currencies are used."

    - name: "remark"
      type: "TEXT"
      role: ["text"]
      description: "Narration for the journal entry."

    - name: "cheque_no"
      type: "VARCHAR"
      role: ["ref"]
      description: "Cheque reference number, if applicable."

    - name: "cheque_date"
      type: "DATE"
      role: ["ref"]
      description: "Cheque date."

    - name: "clearance_date"
      type: "DATE"
      role: ["date"]
      description: "Bank clearance date for the cheque."

    - name: "is_system_generated"
      type: "INT"
      role: ["flag"]
      description: "Marks if entry was auto-generated by the system."

    - name: "bill_no"
      type: "VARCHAR"
      role: ["ref"]
      description: "Linked bill or invoice number, if used."

    - name: "user_remark"
      type: "TEXT"
      role: ["text"]
      description: "User-entered remark."

    - name: "creation"
      type: "DATETIME"
      role: ["meta"]
      description: "Record creation timestamp."

    - name: "modified"
      type: "DATETIME"
      role: ["meta"]
      description: "Last modification timestamp."

  notes: |
    - Parent document for JE Items (debits and credits).
    - Key joins: `name` → `tabGL Entry`.`voucher_no`.
    - Used for adjustments, write-offs, corrections, and manual postings.
- table: "tabGL Entry"
  synonyms_en:
    - "gl entry"
    - "ledger entry"
    - "accounting entry"
    - "journal line"
    - "transaction line"
    - "debit credit entry"
    - "account movement"
    - "ledger transaction"

  description: >
    Represents individual accounting ledger postings generated from invoices, payments,
    journal entries, stock entries, and other financial transactions. Each entry records
    debit/credit amounts for an account on a specific posting date.

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique ledger entry ID."

    - name: "posting_date"
      type: "DATE"
      role: ["date", "filter", "primary_date"]
      description: >
        Main accounting date of the document. Use this for time-based filters
        like today, this week, this month, this quarter, this year, last month,
        last year, and any reporting period unless the question explicitly says
        due date.
      synonyms_en:
        - "posting date"
        - "entry date"
        - "date raised"
        - "this month"
        - "this week"
        - "today"
        - "yesterday"
        - "last month"
        - "last year"
      synonyms_ar:
        - "تاريخ الفاتورة"
        - "تاريخ التسجيل"
        - "تاريخ البيع"
        - "تاريخ الشراء"
        - "تاريخ المعاملة"


    - name: "account"
      type: "VARCHAR"
      role: ["account"]
      description: "Account being debited or credited."

    - name: "party_type"
      type: "VARCHAR"
      role: ["party"]
      description: "Party type (Customer, Supplier, Employee, etc.)."

    - name: "party"
      type: "VARCHAR"
      role: ["party"]
      description: "Linked party name."

    - name: "voucher_type"
      type: "VARCHAR"
      role: ["source"]
      description: "Document type that created the entry (e.g., Sales Invoice, JE)."

    - name: "voucher_no"
      type: "VARCHAR"
      role: ["source"]
      description: "Document name that created the entry."

    - name: "debit"
      type: "DECIMAL"
      role: ["amount"]
      description: "Debit amount in company currency."

    - name: "credit"
      type: "DECIMAL"
      role: ["amount"]
      description: "Credit amount in company currency."

    - name: "debit_in_account_currency"
      type: "DECIMAL"
      role: ["amount"]
      description: "Debit amount in account currency."

    - name: "credit_in_account_currency"
      type: "DECIMAL"
      role: ["amount"]
      description: "Credit amount in account currency."

    - name: "transaction_exchange_rate"
      type: "DECIMAL"
      role: ["currency"]
      description: "Exchange rate used."

    - name: "account_currency"
      type: "VARCHAR"
      role: ["currency"]
      description: "Currency of the account."

    - name: "transaction_currency"
      type: "VARCHAR"
      role: ["currency"]
      description: "Currency of the originating transaction."

    - name: "against"
      type: "TEXT"
      role: ["meta"]
      description: "Comma-separated list of opposite accounts."

    - name: "cost_center"
      type: "VARCHAR"
      role: ["cost_center"]
      description: "Cost center associated with the entry."

    - name: "project"
      type: "VARCHAR"
      role: ["project"]
      description: "Project linked with the transaction."

    - name: "company"
      type: "VARCHAR"
      role: ["company"]
      description: "Company for which the entry is posted."

    - name: "remarks"
      type: "TEXT"
      role: ["text"]
      description: "Narration for the entry."

    - name: "creation"
      type: "DATETIME"
      role: ["meta"]
      description: "Record creation timestamp."

    - name: "modified"
      type: "DATETIME"
      role: ["meta"]
      description: "Last modified timestamp."

  notes: |
    - Core accounting table containing all debit/credit postings.
    - Key joins: `voucher_no` → source document, `account` → Account, `party` → Party.
    - Useful for financial reports, trial balance, ledger views, and audit trails.

- table: "tabPayment Entry Reference"
  synonyms_en:
    - "payment reference"
    - "linked invoice"
    - "payment applied to"
    - "invoice reference"
    - "bill reference"
    - "payment allocation"
    - "payment mapping"
    - "allocation row"

  description: >
    Child table under Payment Entry that stores the invoices, orders, or documents
    to which a payment is allocated. Used for tracking outstanding amounts, allocated
    amounts, due dates, and exchange differences.

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique row ID / primary key."

    - name: "parent"
      type: "VARCHAR"
      role: ["link", "header"]
      description: "Linked Payment Entry ID."

    - name: "parenttype"
      type: "VARCHAR"
      role: ["meta"]
      description: "Parent doctype (typically `Payment Entry`)."

    - name: "parentfield"
      type: "VARCHAR"
      role: ["meta"]
      description: "Internal field name linking this row to Payment Entry."

    - name: "reference_doctype"
      type: "VARCHAR"
      role: ["doctype"]
      description: "Document type being paid (e.g., Sales Invoice, Purchase Invoice)."

    - name: "reference_name"
      type: "VARCHAR"
      role: ["link"]
      description: "Document name (invoice/bill) to which payment is allocated."

    - name: "due_date"
      type: "DATE"
      role: ["date"]
      description: "Original due date of the reference document."

    - name: "bill_no"
      type: "VARCHAR"
      role: ["ref"]
      description: "Supplier or customer bill number if provided."

    - name: "payment_term"
      type: "VARCHAR"
      role: ["payment_term"]
      description: "Payment term applied for this reference."

    - name: "payment_term_outstanding"
      type: "DECIMAL"
      role: ["amount"]
      description: "Outstanding amount related to a specific payment term."

    - name: "total_amount"
      type: "DECIMAL"
      role: ["amount"]
      description: "Total amount of the referenced document."

    - name: "outstanding_amount"
      type: "DECIMAL"
      role: ["amount", "receivable", "collections"]
      description: >
        Remaining unpaid amount for this invoice. Use this for overdue, pending,
        aging, and collection-related questions.
      synonyms_en:
        - "outstanding"
        - "balance due"
        - "pending amount"
        - "unpaid amount"
        - "due amount"


    - name: "allocated_amount"
      type: "DECIMAL"
      role: ["amount", "allocated"]
      description: "Amount applied/paid from this Payment Entry."

    - name: "account_type"
      type: "VARCHAR"
      role: ["account"]
      description: "Account type of the linked reference (e.g., Receivable)."

    - name: "payment_type"
      type: "VARCHAR"
      role: ["type"]
      description: "Payment context (Receive, Pay, Internal)."

    - name: "account"
      type: "VARCHAR"
      role: ["account"]
      description: "Account used for allocation, if applicable."

    - name: "exchange_rate"
      type: "DECIMAL"
      role: ["currency"]
      description: "Exchange rate applied during payment allocation."

    - name: "exchange_gain_loss"
      type: "DECIMAL"
      role: ["amount"]
      description: "Exchange gain/loss due to currency rate difference."

    - name: "payment_request"
      type: "VARCHAR"
      role: ["link"]
      description: "Linked Payment Request, if present."

    - name: "reconcile_effect_on"
      type: "DATE"
      role: ["date"]
      description: "Date when reconciliation affects financial books."

    - name: "creation"
      type: "DATETIME"
      role: ["meta"]
      description: "Record creation timestamp."

    - name: "modified"
      type: "DATETIME"
      role: ["meta"]
      description: "Last modified timestamp."

    - name: "modified_by"
      type: "VARCHAR"
      role: ["meta"]
      description: "User who last modified the record."

    - name: "owner"
      type: "VARCHAR"
      role: ["meta"]
      description: "Record creator."

  notes: |
    - Child table of `tabPayment Entry` storing invoice/bill allocation details.
    - Key joins: `reference_name` → relevant invoice/bill, `parent` → Payment Entry.
    - Useful for outstanding tracking, allocation amounts, and reconciliation.

- table: "tabStock Ledger Entry"
  synonyms_en:
    - "stock ledger entry"
    - "sle"
    - "inventory ledger"
    - "stock movement"
    - "item movement log"
    - "inventory transaction"
    - "stock movement"
    - "item movement"
    - "item in out"
    - "inventory movement"
    - "stock in"
    - "stock out"
    - "item flow"
    - "transaction history"
    - "stock history"
    - "inventory history"


  description: >
    Core inventory movement log capturing every stock transaction in the system.
    Each row represents a single adjustment of quantity or value for an item in a
    warehouse, generated by documents like Purchase Receipt, Stock Entry, Sales Invoice,
    Delivery Note, etc. Used for answering questions about item movement, stock balance
    history, valuation, FIFO queues, and warehouse-wise quantities.

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique Stock Ledger Entry ID / primary key."

    - name: "item_code"
      type: "VARCHAR"
      role: ["link", "item"]
      description: "Item affected in the transaction. Links to `tabItem`."

    - name: "warehouse"
      type: "VARCHAR"
      role: ["link", "warehouse"]
      description: "Warehouse where the stock move occurred. Links to `tabWarehouse`."

    - name: "posting_date"
      type: "DATE"
      role: ["date"]
      description: "The posting date of the stock transaction."

    - name: "posting_time"
      type: "TIME"
      role: []
      description: "The posting time of the stock transaction."

    - name: "posting_datetime"
      type: "DATETIME"
      role: ["datetime"]
      description: "Combined timestamp for precise sorting and filtering of stock movement."

    - name: "voucher_type"
      type: "VARCHAR"
      role: ["enum", "source"]
      description: "Type of document that generated this stock entry (e.g., Purchase Receipt, Sales Invoice, Stock Entry)."

    - name: "voucher_no"
      type: "VARCHAR"
      role: ["link"]
      description: "Document number of the source voucher (header)."

    - name: "voucher_detail_no"
      type: "VARCHAR"
      role: ["link"]
      description: "Detail row reference from the source document (child table row)."

    - name: "actual_qty"
      type: "DECIMAL"
      role: ["qty", "numeric"]
      description: "Quantity added or removed. Positive = incoming, negative = outgoing."

    - name: "qty_after_transaction"
      type: "DECIMAL"
      role: ["numeric"]
      description: "Running balance quantity in the warehouse after this entry."

    - name: "incoming_rate"
      type: "DECIMAL"
      role: ["rate", "valuation"]
      description: "Rate applied for incoming stock."

    - name: "outgoing_rate"
      type: "DECIMAL"
      role: ["rate", "valuation"]
      description: "Rate applied when outgoing stock is removed."

    - name: "valuation_rate"
      type: "DECIMAL"
      role: ["rate", "valuation"]
      description: "Final valuation rate used after FIFO/Moving Average adjustment."

    - name: "stock_value"
      type: "DECIMAL"
      role: ["amount", "valuation"]
      description: "Total stock value after this transaction."

    - name: "stock_value_difference"
      type: "DECIMAL"
      role: ["amount", "valuation"]
      description: "Change in stock value caused by this transaction."

    - name: "stock_queue"
      type: "LONGTEXT"
      role: ["json", "fifo"]
      description: "FIFO queue storage in JSON for valuation; mostly for internal engine use."

    - name: "company"
      type: "VARCHAR"
      role: ["company"]
      description: "Company for which this stock movement belongs."

    - name: "project"
      type: "VARCHAR"
      role: ["project"]
      description: "Linked project, if relevant."

    - name: "fiscal_year"
      type: "VARCHAR"
      role: ["fiscal"]
      description: "Fiscal year of the posting date."

    - name: "stock_uom"
      type: "VARCHAR"
      role: ["uom"]
      description: "Default stock UOM in which the transaction is recorded."

    - name: "has_batch_no"
      type: "INT"
      role: ["flag", "batch"]
      description: "Indicates if the transaction involves batch numbers."

    - name: "has_serial_no"
      type: "INT"
      role: ["flag", "serial"]
      description: "Indicates if serial numbers were involved."

    - name: "serial_no"
      type: "LONGTEXT"
      role: ["serial"]
      description: "Serial numbers involved in this stock movement."

    - name: "batch_no"
      type: "VARCHAR"
      role: ["batch"]
      description: "Batch number linked with the transaction."

    - name: "is_adjustment_entry"
      type: "INT"
      role: ["flag"]
      description: "Marks if the entry is an adjustment (not from standard documents)."

    - name: "is_cancelled"
      type: "INT"
      role: ["flag"]
      description: "Indicates if this stock ledger entry was cancelled."

    - name: "owner"
      type: "VARCHAR"
      role: ["meta"]
      description: "User who created the record."

    - name: "modified_by"
      type: "VARCHAR"
      role: ["meta"]
      description: "User who last modified the record."

    - name: "creation"
      type: "DATETIME"
      role: ["meta"]
      description: "Record creation timestamp."

    - name: "modified"
      type: "DATETIME"
      role: ["meta"]
      description: "Last modified timestamp."

    - name: "_user_tags"
      type: "TEXT"
      role: ["meta"]
      description: "Tags added by the user."

    - name: "_comments"
      type: "TEXT"
      role: ["meta"]
      description: "User comments."

    - name: "_assign"
      type: "TEXT"
      role: ["meta"]
      description: "Assigned user list."

    - name: "_liked_by"
      type: "TEXT"
      role: ["meta"]
      description: "List of users who liked this document."

  notes: |
    - System-generated table that maintains the ground truth of stock quantity and value.
    - Heavily used in valuation, stock balance reports, FIFO calculations, and audit.
    - Key joins:
        - `item_code` → `tabItem`.`name`
        - `warehouse` → `tabWarehouse`.`name`
        - `voucher_no` → Various parent doctypes (Sales Invoice, Purchase Receipt, Stock Entry, etc.)
        - `voucher_detail_no` → Child tables of those parent documents
    - Sorting by `posting_datetime` is crucial for accurate stock balance calculations.
    - Use `is_cancelled = 0` to filter valid stock entries.

