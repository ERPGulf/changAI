    - name: "custom_zatca_full_response"
      type: "LONGTEXT"
      role: ["zatca", "payload", "response"]
      description: "Raw ZATCA API response payload for the submission"
      synonyms_en: ["ZATCA full response", "e-invoice API response", "ZATCA payload"]
      synonyms_ar: ["استجابة ZATCA الكاملة", "استجابة واجهة الفوترة الإلكترونية", "حمولة الاستجابة"]

    - name: "custom_zatca_pos_name"
      type: "VARCHAR"
      role: ["zatca", "pos", "reference"]
      description: "POS terminal/profile name used for ZATCA submission"
      synonyms_en: ["ZATCA POS name", "POS profile name", "terminal name"]
      synonyms_ar: ["اسم نقطة البيع ZATCA", "اسم ملف نقطة البيع", "اسم الجهاز"]
  notes: |
    - `tabSales Invoice` is one of the core transactional tables in ERPNext.
    - For most analytical queries, use `docstatus = 1` to filter only submitted invoices.
    - Use `base_grand_total` for company currency calculations; `grand_total` reflects the transaction currency.
    - Fields like `customer` (Link) and `project` are frequently joined to master tables for dimension analysis.
    - ZATCA-related fields (`custom_*`) are critical for e-invoicing compliance in KSA; use these for status checks, filtering, and reporting.
    - Parent-child relationships exist with `tabSales Invoice Item` through `name` → `parent`.
    - POS-specific and B2C invoices can be identified through fields like `custom_b2c` and `custom_zatca_pos_name`.
    - Avoid using system fields (e.g., `creation`, `modified`) in business-level aggregations unless needed for audit or activity reports.
    - Always validate date fields like `posting_date` and `due_date` for time-bound reporting.

- table: "tabCustomer"
  description: "Stores core customer information including identity, classification, contact details, and commercial settings for sales and billing transactions."
  synonyms_en: ["customer", "client", "buyer", "consumer", "patron"]
  synonyms_ar: ["العميل", "الزبون", "المستهلك", "المشتري", "الطرف"]

  fields:
