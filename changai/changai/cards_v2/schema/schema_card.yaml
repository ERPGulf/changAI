      role: ["qty", "stock"]
      description: "Actual stock quantity at the warehouse at time of posting."

    - name: "actual_batch_qty"
      type: "DECIMAL"
      role: ["qty", "batch"]
      description: "Actual available quantity in the batch at the time of posting."

    - name: "company_total_stock"
      type: "DECIMAL"
      role: ["qty", "stock"]
      description: "Company-wide total stock for this item at the time of posting."

    - name: "received_qty"
