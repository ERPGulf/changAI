  notes: |
    - Core doctype for supplier purchase orders and procurement management.
    - Use `docstatus = 1` to filter submitted and confirmed orders.
    - `transaction_date` represents the order issue date; `schedule_date` indicates expected delivery.
    - `total`, `net_total`, and `base_total` store order values in both supplier and company currencies.
    - `apply_tds` and `tax_withholding_category` manage TDS compliance for applicable suppliers.
    - `is_subcontracted` identifies subcontracting POs used for job work or material supply.
    - `cost_center` and `project` track departmental or project-based expenditures.
    - `order_confirmation_no` and `order_confirmation_date` capture supplier acknowledgment details.
    - `status` reflects document stage (Draft, Submitted, To Receive, Completed, Cancelled).
    - ZATCA fields (`custom_zatca_*`) handle e-invoicing and compliance data in GCC regions.
    - Indexed fields such as `supplier`, `transaction_date`, and `company` improve query and report performance.


