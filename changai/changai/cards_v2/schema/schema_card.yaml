    - name: "custom_submit_line_item_discount_to_zatca"
      type: "INT"
      role: ["zatca", "flag"]
      description: "Flag to submit per-line discounts to ZATCA instead of only header level"
      synonyms_en: ["submit line item discount", "line discount to ZATCA", "per-item discount flag"]
