      synonyms_en: ["intercompany reference", "cross-company link"]
      synonyms_ar: ["مرجع بين الشركات"]

    - name: "remarks"
      type: "TEXT"
      description: "General remarks or comments related to the purchase receipt."
      synonyms_en: ["notes", "comments"]
      synonyms_ar: ["ملاحظات", "تعليقات"]
    - name: "range"
      type: "VARCHAR"
      role: ["metadata"]
      description: "Specifies the range or category this document falls under, often used internally for grouping."
      synonyms_en: ["range category", "group range", "doc range"]
      synonyms_ar: ["النطاق", "فئة النطاق", "مدى المستند"]

    - name: "amended_from"
      type: "VARCHAR"
      role: ["reference"]
