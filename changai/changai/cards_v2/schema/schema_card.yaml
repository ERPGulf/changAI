      synonyms_ar: ["اسم الصنف", "اسم المنتج"]

    - name: "item_group"
      type: "VARCHAR"
      role: ["classification"]
      description: "Category or group under which the item is classified"
      synonyms_en: ["product category", "item category", "group name"]
      synonyms_ar: ["مجموعة الصنف", "فئة المنتج"]

    - name: "stock_uom"
      type: "VARCHAR"
      role: ["measurement"]
      description: "Default unit of measurement used for stock tracking"
      synonyms_en: ["unit of measure", "uom", "stock unit"]
      synonyms_ar: ["وحدة القياس", "وحدة المخزون"]

    - name: "disabled"
      type: "INT"
      role: ["status"]
      description: "Indicates whether the item is inactive (1=Disabled)"
      synonyms_en: ["inactive", "is disabled", "item blocked"]
      synonyms_ar: ["معطل", "غير نشط"]
    - name: "allow_alternative_item"
      type: "INT"
      role: ["business_rule"]
      description: "Indicates whether alternative items are allowed for substitution during transactions (1=Allowed)"
      synonyms_en: ["allow substitute item", "alternative allowed", "replacement item"]
      synonyms_ar: ["السماح بصنف بديل", "عنصر بديل مسموح"]

    - name: "is_stock_item"
      type: "INT"
      role: ["classification"]
      description: "Indicates whether the item is tracked in inventory as a stock item (1=Yes)"
      synonyms_en: ["inventory item", "stock tracked", "is inventory"]
      synonyms_ar: ["صنف مخزون", "يتم تتبعه في المخزون"]

    - name: "has_variants"
      type: "INT"
      role: ["classification"]
      description: "Specifies whether the item has variant options such as color, size, or model"
      synonyms_en: ["item variants", "product variations", "configurable item"]
      synonyms_ar: ["يحتوي على متغيرات", "نماذج متعددة"]

    - name: "opening_stock"
      type: "DECIMAL"
      role: ["inventory"]
      description: "Initial stock quantity available at the time of opening balance"
      synonyms_en: ["opening balance stock", "initial stock", "opening quantity"]
      synonyms_ar: ["المخزون الافتتاحي", "رصيد أول المدة"]

    - name: "valuation_rate"
      type: "DECIMAL"
      role: ["financial"]
      description: "Rate used to value stock for accounting purposes"
      synonyms_en: ["stock valuation rate", "inventory value rate"]
      synonyms_ar: ["معدل تقييم المخزون", "قيمة المخزون"]

    - name: "standard_rate"
      type: "DECIMAL"
      role: ["pricing"]
      description: "Standard selling rate or base price for the item"
      synonyms_en: ["base price", "selling price", "standard selling rate"]
      synonyms_ar: ["السعر القياسي", "سعر البيع الأساسي"]

    - name: "is_fixed_asset"
      type: "INT"
      role: ["asset"]
      description: "Indicates whether the item is treated as a fixed asset (1=Yes)"
      synonyms_en: ["fixed asset item", "capital item"]
      synonyms_ar: ["أصل ثابت", "عنصر رأسمالي"]

    - name: "auto_create_assets"
      type: "INT"
      role: ["asset"]
      description: "Automatically create asset records when this item is purchased (1=Yes)"
      synonyms_en: ["auto asset creation", "automatic asset entry"]
      synonyms_ar: ["إنشاء أصل تلقائي", "تسجيل أصل تلقائي"]

    - name: "is_grouped_asset"
      type: "INT"
      role: ["asset"]
      description: "Indicates if the asset is grouped with other items for tracking (1=Yes)"
      synonyms_en: ["asset group", "grouped asset"]
      synonyms_ar: ["أصل مجمّع", "مجموعة أصول"]

    - name: "asset_category"
      type: "VARCHAR"
      role: ["asset"]
      description: "Category or classification under which the asset belongs"
      synonyms_en: ["asset type", "fixed asset category"]
      synonyms_ar: ["فئة الأصل", "نوع الأصل"]

    - name: "asset_naming_series"
      type: "VARCHAR"
      role: ["system"]
      description: "Naming series used for auto-generating asset codes"
      synonyms_en: ["asset series", "naming prefix"]
      synonyms_ar: ["سلسلة تسمية الأصل"]

    - name: "over_delivery_receipt_allowance"
      type: "DECIMAL"
      role: ["tolerance"]
      description: "Percentage allowance for over-receipt during delivery"
      synonyms_en: ["delivery tolerance", "over receipt limit"]
      synonyms_ar: ["حد التسليم الزائد", "نسبة التسامح بالتسليم"]

    - name: "over_billing_allowance"
      type: "DECIMAL"
      role: ["tolerance"]
      description: "Percentage allowance for over-billing during invoicing"
      synonyms_en: ["billing tolerance", "over invoice limit"]
      synonyms_ar: ["حد الفاتورة الزائد", "نسبة التسامح بالفواتير"]

    - name: "image"
      type: "TEXT"
      role: ["reference"]
      description: "Image or visual representation of the item"
      synonyms_en: ["product image", "item photo"]
      synonyms_ar: ["صورة المنتج", "صورة الصنف"]

    - name: "description"
      type: "LONGTEXT"
      role: ["reference"]
      description: "Detailed description of the item including features and specifications"
      synonyms_en: ["item details", "product description"]
      synonyms_ar: ["وصف الصنف", "تفاصيل المنتج"]

    - name: "brand"
      type: "VARCHAR"
      role: ["classification"]
      description: "Brand associated with the item"
      synonyms_en: ["product brand", "manufacturer name"]
      synonyms_ar: ["العلامة التجارية", "المُصنّع"]

    - name: "shelf_life_in_days"
      type: "INT"
      role: ["quality"]
      description: "Number of days the item remains usable or saleable"
      synonyms_en: ["shelf life", "expiry duration", "usable days"]
      synonyms_ar: ["مدة الصلاحية", "الأيام الصالحة"]

    - name: "end_of_life"
      type: "DATE"
      role: ["lifecycle"]
      description: "Date when the item becomes obsolete or unavailable"
      synonyms_en: ["expiry date", "discontinue date", "end date"]
      synonyms_ar: ["تاريخ الانتهاء", "تاريخ الإيقاف"]

    - name: "default_material_request_type"
      type: "VARCHAR"
      role: ["inventory"]
      description: "Default type of material request associated with the item"
      synonyms_en: ["material request type", "requisition type"]
      synonyms_ar: ["نوع طلب المواد", "فئة الطلب"]

    - name: "valuation_method"
      type: "VARCHAR"
      role: ["financial"]
      description: "Stock valuation method such as FIFO or Moving Average"
      synonyms_en: ["stock valuation method", "inventory costing method"]
      synonyms_ar: ["طريقة تقييم المخزون", "أسلوب التكلفة"]

    - name: "warranty_period"
      type: "VARCHAR"
      role: ["after_sales"]
      description: "Warranty period for the item, usually mentioned in months or years"
      synonyms_en: ["warranty duration", "guarantee period"]
      synonyms_ar: ["مدة الضمان", "فترة الكفالة"]

    - name: "weight_per_unit"
      type: "DECIMAL"
      role: ["measurement"]
      description: "Weight of a single unit of the item"
      synonyms_en: ["unit weight", "item weight"]
      synonyms_ar: ["وزن الوحدة", "وزن المنتج"]

    - name: "weight_uom"
      type: "VARCHAR"
      role: ["measurement"]
      description: "Unit of measure for item weight"
      synonyms_en: ["weight unit", "weight measurement unit"]
      synonyms_ar: ["وحدة الوزن"]

    - name: "allow_negative_stock"
      type: "INT"
      role: ["inventory_rule"]
      description: "Allows transactions even if stock goes negative (1=Yes)"
      synonyms_en: ["negative stock allowed", "below zero stock"]
      synonyms_ar: ["السماح بالمخزون السالب"]

    - name: "has_batch_no"
      type: "INT"
      role: ["inventory_tracking"]
      description: "Indicates whether the item requires batch number tracking (1=Yes)"
      synonyms_en: ["batch tracking", "lot number tracking"]
      synonyms_ar: ["تتبع الدفعة", "رقم التشغيلة"]

    - name: "create_new_batch"
      type: "INT"
      role: ["inventory_tracking"]
      description: "Automatically create a new batch when stock is received (1=Yes)"
      synonyms_en: ["auto batch creation", "generate batch number"]
      synonyms_ar: ["إنشاء دفعة تلقائية"]

    - name: "batch_number_series"
      type: "VARCHAR"
      role: ["inventory_tracking"]
      description: "Naming series for batch number generation"
      synonyms_en: ["batch series", "batch prefix"]
      synonyms_ar: ["سلسلة الدفعة", "بادئة رقم الدفعة"]

    - name: "has_expiry_date"
      type: "INT"
      role: ["inventory_tracking"]
      description: "Specifies if the item has an expiry date (1=Yes)"
      synonyms_en: ["expiry tracking", "has expiry", "item expiry"]
      synonyms_ar: ["له تاريخ انتهاء", "تتبع الصلاحية"]

    - name: "retain_sample"
      type: "INT"
      role: ["quality_control"]
      description: "Indicates whether a sample should be retained for quality checks (1=Yes)"
      synonyms_en: ["sample retention", "keep sample"]
      synonyms_ar: ["الاحتفاظ بعينة", "عينة مراقبة الجودة"]

    - name: "sample_quantity"
      type: "INT"
      role: ["quality_control"]
      description: "Quantity of the item to retain as sample"
      synonyms_en: ["sample qty", "retained quantity"]
      synonyms_ar: ["كمية العينة", "كمية محتجزة"]
    - name: "has_serial_no"
      type: "INT"
      role: ["inventory_tracking"]
      description: "Specifies if the item has serial number tracking enabled (1=Yes)"
      synonyms_en: ["serial tracking", "has serial", "serial number enabled"]
      synonyms_ar: ["تتبع الرقم التسلسلي", "له رقم تسلسلي"]

    - name: "serial_no_series"
      type: "VARCHAR"
      role: ["inventory_tracking"]
      description: "Naming series used for generating serial numbers automatically"
      synonyms_en: ["serial series", "serial prefix", "serial code pattern"]
      synonyms_ar: ["سلسلة الأرقام التسلسلية", "بادئة الرقم التسلسلي"]

    - name: "variant_of"
      type: "VARCHAR"
      role: ["classification"]
      description: "Indicates the parent item if this item is a variant of another"
      synonyms_en: ["base item", "parent item", "original item"]
      synonyms_ar: ["عنصر أساسي", "العنصر الأب", "متغير من"]

    - name: "variant_based_on"
      type: "VARCHAR"
      role: ["classification"]
      description: "Defines the attribute on which variants are based (e.g., Item Attribute)"
      synonyms_en: ["variant attribute", "variation based on"]
      synonyms_ar: ["مبني على السمة", "تغيّر بناءً على"]

    - name: "enable_deferred_expense"
      type: "INT"
      role: ["accounting"]
      description: "Enables deferred expense recognition for this item (1=Yes)"
      synonyms_en: ["defer expense", "expense deferral", "delayed expense"]
      synonyms_ar: ["تأجيل المصروف", "مصروف مؤجل"]

    - name: "no_of_months_exp"
      type: "INT"
      role: ["accounting"]
      description: "Number of months over which deferred expenses will be recognized"
      synonyms_en: ["expense months", "expense period"]
      synonyms_ar: ["فترة المصروف", "عدد الأشهر"]

    - name: "enable_deferred_revenue"
      type: "INT"
      role: ["accounting"]
      description: "Enables deferred revenue recognition for this item (1=Yes)"
      synonyms_en: ["defer revenue", "revenue deferral", "delayed income"]
      synonyms_ar: ["تأجيل الإيرادات", "دخل مؤجل"]

    - name: "no_of_months"
      type: "INT"
      role: ["accounting"]
      description: "Number of months over which deferred revenue will be recognized"
      synonyms_en: ["revenue months", "deferral period"]
      synonyms_ar: ["فترة الإيراد", "عدد الأشهر"]

    - name: "purchase_uom"
      type: "VARCHAR"
      role: ["procurement"]
      description: "Default unit of measure used during purchase transactions"
      synonyms_en: ["purchase unit", "buying unit", "procurement uom"]
      synonyms_ar: ["وحدة شراء", "وحدة القياس للشراء"]

    - name: "min_order_qty"
      type: "DECIMAL"
      role: ["procurement"]
      description: "Minimum order quantity required when purchasing the item"
      synonyms_en: ["minimum quantity", "minimum order amount"]
      synonyms_ar: ["الحد الأدنى للطلب", "كمية الشراء الدنيا"]

    - name: "safety_stock"
      type: "DECIMAL"
      role: ["inventory_planning"]
      description: "Safety stock level to avoid stockouts"
      synonyms_en: ["buffer stock", "minimum stock level", "reserve stock"]
      synonyms_ar: ["مخزون الأمان", "الحد الأدنى للمخزون"]

    - name: "is_purchase_item"
      type: "INT"
      role: ["procurement"]
      description: "Specifies if the item can be purchased (1=Yes)"
      synonyms_en: ["purchasable", "buyable item"]
      synonyms_ar: ["عنصر قابل للشراء"]

    - name: "lead_time_days"
      type: "INT"
      role: ["procurement"]
      description: "Expected number of days required to receive the item after ordering"
      synonyms_en: ["lead time", "delivery time", "supply time"]
      synonyms_ar: ["مدة التوريد", "زمن التسليم"]

    - name: "last_purchase_rate"
      type: "DECIMAL"
      role: ["procurement"]
      description: "Rate at which the item was last purchased"
      synonyms_en: ["last buy rate", "previous purchase price"]
      synonyms_ar: ["سعر الشراء الأخير", "أحدث سعر شراء"]

    - name: "is_customer_provided_item"
      type: "INT"
      role: ["supply_chain"]
      description: "Indicates whether the item is provided by the customer (1=Yes)"
      synonyms_en: ["customer supplied", "customer owned item"]
      synonyms_ar: ["عنصر مقدم من العميل", "صنف العميل"]

    - name: "customer"
      type: "VARCHAR"
      role: ["relationship"]
      description: "Customer associated with this item if it is customer-provided"
      synonyms_en: ["associated customer", "linked customer"]
      synonyms_ar: ["العميل المرتبط", "عميل الصنف"]

    - name: "delivered_by_supplier"
      type: "INT"
      role: ["logistics"]
      description: "Indicates whether the item is delivered directly by the supplier to customer (1=Yes)"
      synonyms_en: ["supplier delivery", "dropship item"]
      synonyms_ar: ["يُسلَّم من المورد", "توصيل المورد"]

    - name: "country_of_origin"
      type: "VARCHAR"
      role: ["trade"]
      description: "Country where the item was manufactured or sourced from"
      synonyms_en: ["origin country", "manufacturing country"]
      synonyms_ar: ["بلد المنشأ", "بلد الصنع"]

    - name: "customs_tariff_number"
      type: "VARCHAR"
      role: ["trade"]
      description: "Customs tariff or HS code used for international trade and taxation"
      synonyms_en: ["tariff code", "hs code", "customs code"]
      synonyms_ar: ["رمز التعرفة الجمركية", "رمز النظام المنسق"]

    - name: "sales_uom"
      type: "VARCHAR"
      role: ["sales"]
      description: "Default unit of measure used during sales transactions"
      synonyms_en: ["sales unit", "selling unit"]
      synonyms_ar: ["وحدة المبيعات", "وحدة القياس للبيع"]

    - name: "grant_commission"
      type: "INT"
      role: ["sales"]
      description: "Specifies if sales commissions are granted for selling this item (1=Yes)"
      synonyms_en: ["allow commission", "commission applicable"]
      synonyms_ar: ["منح عمولة", "عمولة البيع"]
    
    - name: "is_sales_item"
      type: "INT"
      default: 1
      role: ["sales", "inventory"]
      description: "Indicates whether the item can be sold"
      synonyms_en: ["sales item", "sellable item"]
      synonyms_ar: ["عنصر مبيعات"]

    - name: "max_discount"
      type: "DECIMAL(21,9)"
      default: 0.000000000
      role: ["sales", "pricing"]
      description: "Maximum discount percentage allowed for this item"
      synonyms_en: ["maximum discount", "item discount limit"]
      synonyms_ar: ["الحد الأقصى للخصم"]

    - name: "inspection_required_before_purchase"
      type: "INT"
      default: 0
      role: ["purchase", "quality"]
      description: "Specifies if quality inspection is required before purchase"
      synonyms_en: ["pre-purchase inspection"]
      synonyms_ar: ["فحص قبل الشراء"]

    - name: "quality_inspection_template"
      type: "VARCHAR"
      role: ["quality"]
      description: "Template used for quality inspection"
      synonyms_en: ["inspection template", "quality check form"]
      synonyms_ar: ["نموذج فحص الجودة"]

    - name: "inspection_required_before_delivery"
      type: "INT"
      default: 0
      role: ["sales", "quality"]
      description: "Specifies if inspection is required before delivery"
      synonyms_en: ["pre-delivery inspection"]
      synonyms_ar: ["فحص قبل التسليم"]

    - name: "include_item_in_manufacturing"
      type: "INT"
      default: 1
      role: ["manufacturing"]
      description: "Indicates whether the item is used in manufacturing processes"
      synonyms_en: ["used in manufacturing"]
      synonyms_ar: ["عنصر مستخدم في التصنيع"]

    - name: "is_sub_contracted_item"
      type: "INT"
      default: 0
      role: ["purchase", "manufacturing"]
      description: "Indicates if the item is subcontracted"
      synonyms_en: ["subcontracted item"]
      synonyms_ar: ["عنصر مقاول فرعي"]

    - name: "default_bom"
      type: "VARCHAR"
      role: ["manufacturing"]
      description: "Default Bill of Materials for this item"
      synonyms_en: ["default BOM", "bill of materials"]
      synonyms_ar: ["قائمة المواد الافتراضية"]

    - name: "customer_code"
      type: "TEXT"
      role: ["sales", "customer"]
      description: "Customer-specific item code"
      synonyms_en: ["customer item code"]
      synonyms_ar: ["رمز العميل"]

    - name: "default_item_manufacturer"
      type: "VARCHAR"
      role: ["purchase", "inventory"]
      description: "Default manufacturer linked to this item"
      synonyms_en: ["manufacturer name"]
      synonyms_ar: ["المُصنّع الافتراضي"]

    - name: "default_manufacturer_part_no"
      type: "VARCHAR"
      role: ["purchase", "inventory"]
      description: "Manufacturer's part number for this item"
      synonyms_en: ["manufacturer part number", "MPN"]
      synonyms_ar: ["رقم جزء الشركة المصنعة"]

    - name: "total_projected_qty"
      type: "DECIMAL(21,9)"
      default: 0.000000000
      role: ["inventory", "planning"]
      description: "Total projected quantity based on planned production and stock"
      synonyms_en: ["projected quantity", "expected stock"]
      synonyms_ar: ["الكمية المتوقعة"]

    - name: "_user_tags"
      type: "TEXT"
      role: ["system"]
      description: "User-defined tags for categorization"
      synonyms_en: ["user tags"]
      synonyms_ar: ["علامات المستخدم"]

    - name: "_comments"
      type: "TEXT"
      role: ["system"]
      description: "User comments or notes"
      synonyms_en: ["comments"]
      synonyms_ar: ["التعليقات"]

    - name: "_assign"
      type: "TEXT"
      role: ["system"]
      description: "User assignments for workflow"
      synonyms_en: ["assigned to", "task owner"]
      synonyms_ar: ["تعيين"]

    - name: "_liked_by"
      type: "TEXT"
      role: ["system"]
      description: "List of users who liked this record"
      synonyms_en: ["liked by users"]
      synonyms_ar: ["المستخدمون المعجبون"]
  notes: |
    - Core doctype for all products, raw materials, and services used across Purchase, Sales, Manufacturing, and Inventory modules.
    - `item_code` serves as the unique identifier for each item and is referenced across all transactional doctypeS.
    - `is_stock_item` controls whether inventory is maintained for the item; if disabled, quantity tracking is skipped.
    - `item_group` enables item classification for reporting, pricing, and tax purposes.
    - `stock_uom`, `purchase_uom`, and `sales_uom` define units of measurement for stock tracking, purchase, and sales respectively.
    - `valuation_rate` and `standard_rate` are used for stock valuation and selling price calculations.
    - Quality checks are governed by `inspection_required_before_purchase` and `inspection_required_before_delivery`.
    - Items with `has_batch_no` or `has_serial_no` enabled allow batch or serial tracking during stock transactions.
    - Asset items (`is_fixed_asset = 1`) integrate with the Asset Management module for automated capitalization and depreciation.
    - `total_projected_qty` helps in demand forecasting and stock availability reports.
    - Indexed fields like `item_code`, `item_group`, and `is_stock_item` improve query and reporting performance.



- table: "tabMaterial Request"
  synonyms_en:
    - "material requisition"
    - "purchase request"
    - "stock request"
    - "inventory requisition"
    - "material demand"
  description: "Represents an internal or external request for materials, goods, or stock, used to plan purchasing, manufacturing, or transfer activities."

  fields:
    - name: "name"
      type: "VARCHAR(140)"
      role: ["id"]
      description: "Unique identifier of the material request (Primary Key)"
      synonyms_en: ["request id", "material request id", "mr id", "requisition id"]
      synonyms_ar: ["رقم طلب المواد", "معرّف الطلب", "رمز الطلب"]

    - name: "creation"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp when the material request was created"
      synonyms_en: ["created at", "creation date", "created on"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

    - name: "modified"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp when the material request was last modified"
      synonyms_en: ["last modified on", "updated at", "modified time"]
      synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

    - name: "modified_by"
      type: "VARCHAR(140)"
      description: "User who last modified the material request"
      synonyms_en: ["updated by", "last edited by"]
      synonyms_ar: ["تم التعديل بواسطة"]

    - name: "owner"
      type: "VARCHAR(140)"
      description: "User who created the material request"
      synonyms_en: ["created by", "author", "requested by"]
      synonyms_ar: ["أنشأ بواسطة", "المالك"]

    - name: "docstatus"
      type: "INT(1)"
      description: "Document status (0 = Draft, 1 = Submitted, 2 = Cancelled)"
      synonyms_en: ["document state", "status", "approval status"]
      synonyms_ar: ["حالة المستند", "الحالة"]

    - name: "idx"
      type: "INT(8)"
      description: "Index used for document sorting or ordering"
      synonyms_en: ["index", "record position"]
      synonyms_ar: ["فهرس", "ترتيب"]

    - name: "naming_series"
      type: "VARCHAR(140)"
      description: "Naming pattern or series used for document numbering"
      synonyms_en: ["document series", "id format", "number series"]
      synonyms_ar: ["سلسلة التسمية", "نمط الترقيم"]

    - name: "title"
      type: "VARCHAR(140)"
      description: "Title or label for the material request, typically the request type"
      synonyms_en: ["request title", "document title"]
      synonyms_ar: ["عنوان الطلب", "عنوان المستند"]

    - name: "material_request_type"
      type: "VARCHAR(140)"
      description: "Specifies the type of material request, e.g., Purchase, Transfer, or Manufacture"
