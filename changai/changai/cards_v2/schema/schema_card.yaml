    - `tabSupplier` stores vendor master data used in purchasing workflows.
    - Common joins: purchase orders (`tabPurchase Order`), invoices (`tabPurchase Invoice`), and supplier quotations.
    - For reporting, use `supplier_group`, `country`, `is_frozen`, and `disabled` for segmentation.
    - `on_hold`, `warn_*`, and `prevent_*` flags support procurement control workflows.
    - `tax_category` and `tax_withholding_category` are used for tax compliance in purchasing.
    - `default_currency` and `payment_terms` help determine default financial settings.

