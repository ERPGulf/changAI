  notes: |
    - Handles material issue, receipt and inter-warehouse stock transfer records.
    - `purpose` explains the business reason for stock movement.
    - `add_to_transit` indicates if goods are marked in transit.
    - Production or subcontract movements link using `work_order` or `subcontracting_order`.
    - Delivery and invoice linked using note numbers when applicable.
    - State maintained using `docstatus`.
    - Does not directly impact main accounting modules.

- table: "tabStock Entry Detail"
  synonyms_en:
    - "stock detail"
    - "inventory movement detail"
    - "warehouse transfer line"
  description: "Line level details of stock entry transactions."

  fields:
