      type: "VARCHAR"
      role: ["id"]
      description: "Unique identifier for the customer record"
      synonyms_en: ["customer id", "customer code", "client id", "party id"]
      synonyms_ar: ["معرّف العميل", "رمز العميل", "كود العميل", "معرف الزبون"]

    - name: "creation"
