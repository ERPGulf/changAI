  notes: |
    - Core doctype for daily POS transaction closures and reconciliation.  
    - Use `docstatus = 1` to filter submitted closing entries.  
    - Key link: `pos_opening_entry` → `tabPOS Opening Entry`.`name`.  
    - Captures sales summary through `grand_total`, `net_total`, and `total_quantity`.  
    - `posting_date` and `posting_time` indicate the end of the POS session.  
    - `status` reflects workflow (Draft, Submitted, Closed).  
    - `company`, `pos_profile`, and `user` ensure proper session mapping.  
    - `error_message` helps identify reconciliation or posting issues.  


- table: "tabPOS Closing Entry Detail"
  synonyms_en:
    - "pos payment summary"
    - "pos mode of payment record"
    - "pos closing detail"
    - "payment reconciliation entry"
    - "cash drawer summary"
  description: "Stores detailed breakdown of POS closing amounts for each mode of payment, including opening, expected, and actual closing balances."

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Primary key / unique identifier for POS closing entry detail"
      synonyms_en: ["detail id", "record id", "pos detail number"]

    - name: "creation"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the POS closing detail was created"
      synonyms_en: ["created at", "creation time", "created on"]

    - name: "modified"
      type: "DATETIME"
      role: ["system"]
      description: "Timestamp when the POS closing detail was last modified"
      synonyms_en: ["updated at", "last modified on"]

    - name: "modified_by"
      type: "VARCHAR"
      role: ["system"]
      description: "User who last modified this record"
      synonyms_en: ["modified user", "last updated by"]

    - name: "owner"
      type: "VARCHAR"
      role: ["system"]
      description: "User who created the record"
      synonyms_en: ["created by", "record owner"]

    - name: "docstatus"
      type: "INT"
      role: ["system"]
      description: "Document status (0 = Draft, 1 = Submitted, 2 = Cancelled)"
      synonyms_en: ["status code", "document state"]

    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Row index for ordering child table entries"
      synonyms_en: ["index", "row order"]

    - name: "mode_of_payment"
      type: "VARCHAR"
      role: ["payment"]
      description: "Mode of payment such as Cash, Card, UPI, etc."
      synonyms_en: ["payment method", "payment mode", "mop"]

    - name: "opening_amount"
      type: "DECIMAL(21,9)"
      role: ["finance"]
      description: "Opening amount available for the specified mode of payment at the start of the POS period"
      synonyms_en: ["opening balance", "starting amount", "initial cash"]

    - name: "expected_amount"
      type: "DECIMAL(21,9)"
      role: ["finance"]
      description: "Expected amount at the end of the POS period based on recorded transactions"
      synonyms_en: ["calculated total", "predicted amount", "system expected"]

    - name: "closing_amount"
      type: "DECIMAL(21,9)"
      role: ["finance"]
      description: "Actual closing amount physically available at the end of the POS period"
      synonyms_en: ["actual total", "final amount", "closing balance"]

    - name: "difference"
      type: "DECIMAL(21,9)"
      role: ["finance"]
      description: "Difference between expected and actual closing amount"
      synonyms_en: ["variance", "discrepancy", "amount difference"]

    - name: "parent"
      type: "VARCHAR"
      role: ["relationship"]
      description: "Parent document this detail belongs to (usually tabPOS Closing Entry)"
      synonyms_en: ["parent entry", "linked document", "main entry"]

    - name: "parentfield"
      type: "VARCHAR"
      role: ["system"]
      description: "Fieldname in the parent document that links this child record"
      synonyms_en: ["parent field", "reference field"]

    - name: "parenttype"
      type: "VARCHAR"
      role: ["system"]
      description: "Type of the parent document this record is linked to"
      synonyms_en: ["parent document type", "linked parent type"]

  notes: |
    - Child table linked to `tabPOS Closing Entry` capturing payment-wise closing details.  
    - Use `parent` → `tabPOS Closing Entry`.`name` for relationship mapping.  
    - Each row represents one Mode of Payment (cash, card, UPI, etc.).  
    - `opening_amount` reflects the opening balance at the start of the POS session.  
    - `expected_amount` is the system-calculated total based on transactions.  
    - `closing_amount` is the physically counted or reported amount at session close.  
    - `difference` = `closing_amount` - `expected_amount`, used to detect variances.  
    - Supports audit and reconciliation between recorded and actual cash/card balances.  
    - Key field for financial accuracy and fraud prevention in POS operations.


