      synonyms_en: ["amended from", "source document", "previous invoice", "original reference"]
      synonyms_ar: ["تم التعديل من", "الوثيقة الأصلية", "المرجع السابق", "الفاتورة السابقة"]

    - name: "is_old_subcontracting_flow"
      type: "INT"
      role: ["flag"]
      description: "Flag indicating whether this document follows the old subcontracting workflow (1 = Yes, 0 = No)."
      synonyms_en: ["old subcontracting flag", "legacy subcontracting", "previous subcontract flow"]
      synonyms_ar: ["تدفق المقاولة القديم", "علامة النظام القديم", "إشارة المقاولة السابقة"]

    - name: "_user_tags"
      type: "TEXT"
      role: ["metadata"]
      description: "User-defined tags associated with the document for filtering or grouping."
      synonyms_en: ["user tags", "labels", "custom tags", "metadata tags"]
      synonyms_ar: ["علامات المستخدم", "الوسوم", "الوسوم المخصصة", "بيانات التعريف"]

    - name: "_comments"
      type: "TEXT"
      role: ["metadata"]
      description: "Stores user comments or notes added to the document."
      synonyms_en: ["comments", "notes", "remarks", "feedback"]
      synonyms_ar: ["تعليقات", "ملاحظات", "ملاحظات المستخدم", "ملاحظات المستند"]

    - name: "_assign"
      type: "TEXT"
      role: ["workflow"]
      description: "Tracks user assignments or ownership information for the document."
      synonyms_en: ["assignments", "owners", "assigned to", "responsible user"]
      synonyms_ar: ["تعيين", "المسؤول", "المستخدم المعين", "المكلف"]

    - name: "_liked_by"
      type: "TEXT"
      role: ["metadata"]
      description: "Stores a list of users who liked or acknowledged the document."
      synonyms_en: ["liked by", "acknowledged by", "approved by", "favorited by"]
      synonyms_ar: ["المعجبون", "من أقر المستند", "من وافق عليه", "من فضّل المستند"]
  notes: |
    - Core doctype for recording goods or materials received from a supplier against a Purchase Order.
    - Use `docstatus = 1` to filter submitted receipts.
    - Key joins: `supplier` → `tabSupplier`, `name` → `tabPurchase Receipt Item`.`parent`.
    - `posting_date` and `posting_time` define the actual goods receipt date and time.
    - `grand_total` and `base_grand_total` capture receipt value in transaction and company currency.
    - `is_return` and `return_against` track returned or rejected goods.
    - `warehouse` and `rejected_warehouse` fields determine stock movement and rejection handling.
    - `taxes_and_charges`, `tax_category`, and `discount_amount` manage receipt-level adjustments.
    - `status` reflects document lifecycle (Draft, Submitted, Cancelled).
    - `supplier_address`, `dispatch_address`, and `shipping_address` store logistics and delivery details.
    - Commonly used for GRN (Goods Receipt Note), supplier delivery tracking, and stock valuation.
    - Indexed fields like `supplier`, `posting_date`, and `company` improve reporting performance.


- table: "tabPurchase Receipt Item"
  synonyms_en:
    - "goods receipt item"
    - "purchase receipt line"
    - "received goods entry"
    - "material receipt item"
    - "purchase GRN detail"
  description: "Individual item entries under a Purchase Receipt, recording details of goods received from suppliers."

  fields:
    - name: "name"
      type: "VARCHAR"
      role: ["id"]
      description: "Unique identifier for each purchase receipt item record."
      synonyms_en: ["item record id", "purchase receipt item id", "entry id"]
      synonyms_ar: ["معرّف البند", "رمز عنصر استلام الشراء", "معرّف السجل"]

    - name: "creation"
      type: "DATETIME"
      role: ["audit"]
      description: "Timestamp when the record was created."
      synonyms_en: ["creation time", "created on", "record created at"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

    - name: "modified"
      type: "DATETIME"
      role: ["audit"]
      description: "Timestamp of the last modification of the record."
      synonyms_en: ["modified on", "updated on", "last updated time"]
      synonyms_ar: ["تاريخ التعديل", "آخر تعديل", "تم التعديل في"]

    - name: "modified_by"
      type: "VARCHAR"
      role: ["audit"]
      description: "User who last modified the record."
      synonyms_en: ["modified by", "updated by", "last editor"]
      synonyms_ar: ["عُدّل بواسطة", "تم التحديث بواسطة", "آخر من عدّل"]

    - name: "owner"
      type: "VARCHAR"
      role: ["audit"]
      description: "User who originally created the record."
      synonyms_en: ["owner", "created by", "record creator"]
      synonyms_ar: ["المالك", "أنشأ بواسطة", "منشئ السجل"]

    - name: "docstatus"
      type: "INT"
      role: ["status"]
      description: "Document status (0 = Draft, 1 = Submitted, 2 = Cancelled)."
      synonyms_en: ["document status", "record state", "approval status"]
      synonyms_ar: ["حالة المستند", "حالة السجل", "حالة الموافقة"]

    - name: "idx"
      type: "INT"
      role: ["system"]
      description: "Index used for maintaining order of items in the Purchase Receipt."
      synonyms_en: ["index", "row order", "sequence number"]
      synonyms_ar: ["الفهرس", "ترتيب الصف", "رقم التسلسل"]

    - name: "barcode"
      type: "VARCHAR"
