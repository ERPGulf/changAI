    synonyms_ar: ["المعجبون"]

  notes: |
    - BOM defines the complete structure and cost of manufacturing an item.
    - Supports costing, routing, operations, alternatives, and sub-assembly logic.
    - Integrated with manufacturing, website, and quality workflows.
    - Can be marked active, default, or variant-specific.
    - Cost fields store raw material, scrap, operating, and total cost values.
    - Item, project, routing, and inspection templates act as relational links.

- table: "tabOpportunity"
  synonyms_en:
  - "opportunity"
  - "sales lead"
  - "potential deal"
  - "customer opportunity"
  - "business opportunity"
  - "deal opportunity"
  description: "Tracks potential sales deals or customer opportunities, including source, stage, amount, probability, and\
    \ contact details."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique Opportunity ID (primary key)"
    synonyms_en: ["opportunity id", "deal id", "lead id", "record id"]
    synonyms_ar: ["معرّف الفرصة", "معرّف الصفقة", "رقم السجل"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the opportunity was created"
    synonyms_en: ["created at", "creation time"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the opportunity was last updated"
    synonyms_en: ["updated at", "last modified"]
    synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last updated the record"
    synonyms_en: ["updated by", "last editor"]
    synonyms_ar: ["تم التعديل بواسطة", "آخر من عدّل"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the record"
    synonyms_en: ["created by", "opportunity creator"]
    synonyms_ar: ["تم الإنشاء بواسطة", "المنشئ"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document status: 0=Draft, 1=Submitted, 2=Cancelled"
    synonyms_en: ["status code", "record state"]
    synonyms_ar: ["حالة المستند", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row index for ordering"
    synonyms_en: ["index", "position"]
    synonyms_ar: ["ترتيب الصف", "الفهرس"]

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Series used for naming format"
    synonyms_en: ["number series", "code series"]
    synonyms_ar: ["سلسلة التسمية"]
    options:
    - CRM-OPP-.YYYY.-

  - name: "opportunity_from"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Indicates source document type where opportunity originated"
    synonyms_en: ["lead source type"]
    synonyms_ar: ["مصدر الفرصة"]
    join_hint: tabOpportunity.opportunity_from = tabDocType.name

  - name: "party_name"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked customer or party record"
    synonyms_en: ["client", "customer"]
    synonyms_ar: ["العميل", "اسم الطرف"]

  - name: "customer_name"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Name of the customer associated with opportunity"
    synonyms_en: ["client name"]
    synonyms_ar: ["اسم العميل"]

  - name: "status"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Opportunity status (default: Open)"
    synonyms_en: ["lead status", "deal status"]
    synonyms_ar: ["حالة الفرصة"]
    options:
    - Open
    - Quotation
    - Converted
    - Lost
    - Replied
    - Closed

  - name: "opportunity_type"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Type of opportunity (default: Sales)"
    synonyms_en: ["deal type"]
    synonyms_ar: ["نوع الفرصة"]
    join_hint: tabOpportunity.opportunity_type = tabOpportunity Type.name

  - name: "source"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Channel where opportunity originated"
    synonyms_en: ["origin source"]
    synonyms_ar: ["المصدر"]
    join_hint: tabOpportunity.source = tabLead Source.name

  - name: "opportunity_owner"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Assigned sales owner for this opportunity"
    synonyms_en: ["sales owner", "responsible person"]
    synonyms_ar: ["مسؤول المبيعات", "مالك الفرصة"]
    join_hint: tabOpportunity.opportunity_owner = tabUser.name

  - name: "sales_stage"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Stage in sales cycle (default: Prospecting)"
    synonyms_en: ["deal stage"]
    synonyms_ar: ["مرحلة المبيعات"]
    join_hint: tabOpportunity.sales_stage = tabSales Stage.name

  - name: "expected_closing"
    type: "DATE"
    role: ["attribute"]
    description: "Expected deal closing date"
    synonyms_en: ["closing date", "expected close"]
    synonyms_ar: ["تاريخ الإغلاق المتوقع"]

  - name: "probability"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Success probability percentage"
    synonyms_en: ["chance percentage"]
    synonyms_ar: ["نسبة الاحتمالية"]

  - name: "no_of_employees"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Employee headcount of the customer"
    synonyms_en: ["company size"]
    synonyms_ar: ["عدد الموظفين"]
    options:
    - 1-10
    - 11-50
    - 51-200
    - 201-500
    - 501-1000
    - 1000+

  - name: "annual_revenue"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Customer annual revenue"
    synonyms_en: ["yearly revenue"]
    synonyms_ar: ["الإيرادات السنوية"]

  - name: "customer_group"
    type: "VARCHAR(140)"
    role: ["hierarchy"]
    description: "Category or group the customer belongs to"
    synonyms_en: ["customer category"]
    synonyms_ar: ["مجموعة العملاء"]
    join_hint: tabOpportunity.customer_group = tabCustomer Group.name

  - name: "industry"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Customer industry classification"
    synonyms_en: ["business industry"]
    synonyms_ar: ["الصناعة"]
    join_hint: tabOpportunity.industry = tabIndustry Type.name

  - name: "market_segment"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Market segment classification"
    synonyms_en: ["segment"]
    synonyms_ar: ["قطاع السوق"]
    join_hint: tabOpportunity.market_segment = tabMarket Segment.name

  - name: "website"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Customer website link"
    synonyms_en: ["company website", "url"]
    synonyms_ar: ["الموقع الإلكتروني", "رابط"]

  - name: "city"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Customer city"
    synonyms_en: ["location city"]
    synonyms_ar: ["المدينة"]

  - name: "state"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Customer state or province"
    synonyms_ar: ["الولاية", "المحافظة"]

  - name: "country"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Customer country"
    synonyms_ar: ["الدولة"]
    join_hint: tabOpportunity.country = tabCountry.name

  - name: "territory"
    type: "VARCHAR(140)"
    role: ["hierarchy"]
    description: "Sales territory region"
    synonyms_en: ["region", "sales region"]
    synonyms_ar: ["منطقة المبيعات"]
    join_hint: tabOpportunity.territory = tabTerritory.name

  - name: "currency"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Currency for opportunity value"
    synonyms_ar: ["العملة"]
    join_hint: tabOpportunity.currency = tabCurrency.name

  - name: "conversion_rate"
    type: "DECIMAL(21,9)"
    role: ["system"]
    description: "Rate used to convert opportunity amount into base currency"
    synonyms_en: ["exchange rate"]
    synonyms_ar: ["سعر التحويل"]

  - name: "opportunity_amount"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total deal opportunity value"
    synonyms_en: ["amount", "deal value"]
    synonyms_ar: ["قيمة الفرصة"]

  - name: "base_opportunity_amount"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Deal value in company base currency"
    synonyms_ar: ["القيمة بالعملة الأساسية"]

  - name: "company"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked company record"
    synonyms_ar: ["الشركة"]
    join_hint: tabOpportunity.company = tabCompany.name

  - name: "campaign"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Marketing campaign linked to opportunity"
    synonyms_ar: ["الحملة التسويقية"]
    join_hint: tabOpportunity.campaign = tabCampaign.name

  - name: "transaction_date"
    type: "DATE"
    role: ["attribute"]
    description: "Deal or lead transaction date"
    synonyms_ar: ["تاريخ المعاملة"]

  - name: "language"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Preferred communication language"
    synonyms_ar: ["اللغة المفضلة"]
    join_hint: tabOpportunity.language = tabLanguage.name

  - name: "first_response_time"
    type: "DECIMAL(21,9)"
    role: ["metric"]
    description: "Time taken for first customer response"
    synonyms_en: ["initial response time"]
    synonyms_ar: ["وقت الاستجابة الأول"]

  - name: "order_lost_reason"
    type: "TEXT"
    role: ["attribute"]
    description: "Reason if the opportunity was lost"
    synonyms_en: ["lost reason"]
    synonyms_ar: ["سبب خسارة الفرصة"]

  - name: "contact_person"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked contact person"
    synonyms_ar: ["الشخص المسؤول", "جهة الاتصال"]
    join_hint: tabOpportunity.contact_person = tabContact.name

  - name: "job_title"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Job title of contact person"
    synonyms_ar: ["المسمى الوظيفي"]

  - name: "contact_email"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Email of the contact"
    synonyms_ar: ["البريد الإلكتروني"]

  - name: "contact_mobile"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Mobile number of contact"
    synonyms_ar: ["رقم الجوال"]

  - name: "whatsapp"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "WhatsApp number"
    synonyms_ar: ["رقم الواتساب"]

  - name: "customer_address"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked address record"
    synonyms_ar: ["عنوان العميل"]
    join_hint: tabOpportunity.customer_address = tabAddress.name

  - name: "address_display"
    type: "TEXT"
    role: ["attribute"]
    description: "Formatted address view"
    synonyms_ar: ["العنوان الكامل المعروض"]

  - name: "base_total"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total value in base currency"
    synonyms_ar: ["الإجمالي بالأساس"]

  - name: "total"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total opportunity value"
    synonyms_ar: ["الإجمالي"]

  notes: |
    - Used to track sales opportunities from lead to closing stage.
    - Fields `territory` and `customer_group` can be used to create reporting hierarchies.
    - `probability` helps forecast conversion.
    - Amount fields support multi-currency reporting.
    - Contact details stored separately for sales reference.
    - Does not directly impact accounting modules unless converted into an order.
    - Indexed fields include `customer_group`, `territory`, `company`, and `modified` for faster joins.

- table: "tabLead"

  synonyms_en:
  - "lead"
  - "prospect"
  - "sales lead"
  - "potential client"

  synonyms_ar:
  - "عميل محتمل"
  - "فرصة مبيعات"
  - "مرشح عميل"

  description: "Lead master used in CRM to store personal, contact and sourcing details."

  fields:

  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique identifier of the lead"
    synonyms_en: ["lead id", "record id"]
    synonyms_ar: ["معرف العميل", "رقم السجل"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when lead was created"
    synonyms_en: ["created at", "creation time"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Time when lead was last updated"
    synonyms_en: ["last modified", "updated at"]
    synonyms_ar: ["آخر تعديل", "تم التعديل في"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last updated the lead"
    synonyms_en: ["modified by", "updated by"]
    synonyms_ar: ["تم التعديل بواسطة"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the lead"
    synonyms_en: ["record owner", "created by"]
    synonyms_ar: ["مالك السجل", "تم الإنشاء بواسطة"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document workflow status"
    synonyms_en: ["status code", "document status"]
    synonyms_ar: ["حالة المستند"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row index"
    synonyms_en: ["row index", "position"]
    synonyms_ar: ["فهرس", "ترتيب"]

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["property"]
    description: "Series format used to generate lead names"
    synonyms_en: ["series", "numbering pattern"]
