    description: "Series format used for generating document IDs"
    synonyms_en: ["naming format", "series code"]
    synonyms_ar: ["نمط الترقيم", "رمز السلسلة"]
    options: &id001
    - MAT-PRE-.YYYY.-
    - MAT-PR-RET-.YYYY.-

  - name: "supplier"
    type: "VARCHAR"
    role: ["foreign_key", "supplier"]
    description: "Supplier ID linked to this receipt"
    synonyms_en: ["supplier id", "vendor", "supplier code"]
    synonyms_ar: ["رمز المورد", "معرّف المورد", "البائع"]
    join_hint: tabPurchase Receipt.supplier = tabSupplier.name

  - name: "supplier_name"
