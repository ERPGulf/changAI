    synonyms_en: ["updated by", "modified user"]
    synonyms_ar: ["تم التعديل بواسطة", "آخر من عدّل", "المحرر"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created this record"
    synonyms_en: ["created by", "record owner"]
    synonyms_ar: ["تم الإنشاء بواسطة", "مالك السجل"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Workflow status of the document"
    synonyms_en: ["document status", "status code"]
    synonyms_ar: ["حالة المستند", "رمز الحالة", "وضع السجل"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Ordering index of the row"
    synonyms_en: ["row index", "row order"]
    synonyms_ar: ["فهرس الصف", "ترتيب الصف"]

  - name: "invoice_number"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Opening invoice number"
    synonyms_en: ["invoice no", "opening invoice number"]
    synonyms_ar: ["رقم الفاتورة", "رقم فاتورة البداية"]

  - name: "party_type"
    type: "VARCHAR(140)"
    role: ["classification"]
    description: "Type of party associated with the invoice"
