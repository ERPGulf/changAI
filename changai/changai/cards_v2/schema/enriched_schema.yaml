    synonyms_ar: ["عامل التحويل", "تحويل الوحدة", "معامل الوحدة"]

  - name: "bom_detail_no"
    type: "VARCHAR"
    role: ["reference", "manufacturing"]
    description: "Reference to Bill of Materials (BOM) detail number"
