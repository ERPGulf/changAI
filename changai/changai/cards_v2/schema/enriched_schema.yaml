    synonyms_en: ["entry purpose", "transaction purpose", "movement reason"]
    synonyms_ar: ["الغرض من القيد", "سبب الحركة", "الغرض"]
    options:
    - Material Issue
    - Material Receipt
    - Material Transfer
    - Material Transfer for Manufacture
    - Material Consumption for Manufacture
    - Manufacture
    - Repack
    - Send to Subcontractor
    - Disassemble

