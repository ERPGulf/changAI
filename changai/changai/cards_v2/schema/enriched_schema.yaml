    role: ["reference"]
    description: "Link to the original invoice if this document was amended"
    synonyms_en: ["amended from", "revised from", "original document", "previous version"]
    synonyms_ar: ["تعديل من", "مستند معدل", "النسخة الأصلية", "الوثيقة السابقة"]
    join_hint: tabSales Invoice.amended_from = tabSales Invoice.name
