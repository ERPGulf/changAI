    synonyms_ar: ["رقم تفاصيل قائمة المواد", "مرجع قائمة المواد", "تفاصيل التصنيع"]

  - name: "reference_name"
    type: "VARCHAR"
    role: ["reference"]
    description: "Reference to the parent Purchase Order or related document"
    synonyms_en: ["reference name", "linked document", "parent reference"]
    synonyms_ar: ["اسم المرجع", "الوثيقة المرتبطة", "مرجع الأصل"]

  - name: "rate"
    type: "DECIMAL(21,9)"
    role: ["financial"]
    description: "Rate per unit for the raw material item"
    synonyms_en: ["rate", "price per unit", "unit rate"]
    synonyms_ar: ["السعر لكل وحدة", "المعدل", "سعر الوحدة"]

  - name: "amount"
    type: "DECIMAL(21,9)"
    role: ["financial"]
    description: "Total amount for the supplied item (qty × rate)"
    synonyms_en: ["amount", "total amount", "value"]
    synonyms_ar: ["المبلغ الإجمالي", "القيمة", "إجمالي السعر"]

  - name: "required_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "input"]
    description: "Quantity of raw material required for production or supply"
    synonyms_en: ["required quantity", "needed qty", "demand quantity"]
    synonyms_ar: ["الكمية المطلوبة", "كمية الحاجة"]

  - name: "supplied_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "output"]
    description: "Quantity of raw material actually supplied"
    synonyms_en: ["supplied quantity", "provided qty", "issued quantity"]
    synonyms_ar: ["الكمية الموردة", "الكمية المسلمة"]

  - name: "consumed_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "usage"]
    description: "Quantity of material consumed from the supplied amount"
    synonyms_en: ["consumed quantity", "used qty", "utilized quantity"]
    synonyms_ar: ["الكمية المستهلكة", "الكمية المستخدمة"]

  - name: "returned_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "return"]
    description: "Quantity of supplied material returned or unused"
    synonyms_en: ["returned quantity", "returned qty", "unused material"]
    synonyms_ar: ["الكمية المرتجعة", "كمية غير مستخدمة"]

  - name: "total_supplied_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "summary"]
    description: "Cumulative quantity of material supplied for the item"
    synonyms_en: ["total supplied quantity", "aggregate supplied qty"]
    synonyms_ar: ["إجمالي الكمية الموردة", "الكمية الإجمالية"]

  - name: "parent"
    type: "VARCHAR"
    role: ["relationship", "foreign_key"]
    description: "Parent Purchase Order reference"
    synonyms_en: ["parent id", "purchase order id", "po reference"]
    synonyms_ar: ["مرجع أمر الشراء", "الأصل", "معرّف الأصل"]
    join_hint: tabPurchase Order Item Supplied.parent = tabPurchase Order.name

  - name: "parentfield"
    type: "VARCHAR"
    role: ["meta"]
    description: "Parent field link reference within the parent document"
    synonyms_en: ["parent field", "link field"]
    synonyms_ar: ["حقل الأصل", "المرجع الحقل"]

  - name: "parenttype"
    type: "VARCHAR"
    role: ["meta"]
    description: "Parent document type name"
    synonyms_en: ["parent type", "document type reference"]
    synonyms_ar: ["نوع المستند الأصلي", "فئة الأصل"]

  notes: |
    - Child doctype of `tabPurchase Order Item` used when materials are supplied for subcontracted items.
    - Each record represents a raw material or component supplied against a parent Purchase Order Item.
    - Key joins: `parent` → `tabPurchase Order Item`.`name`, `main_item_code` → `tabItem`.`name`.
    - Tracks `rm_item_code`, `warehouse`, `required_qty`, and `consumed_qty` for material issue management.
    - Used primarily in subcontracting workflows to monitor raw materials sent to suppliers.
    - `rate`, `amount`, and `base_amount` store material cost details in both supplier and base currencies.
    - Supports reconciliation between issued materials and received finished goods.
    - `warehouse` indicates the storage or dispatch location for the supplied material.
    - Critical for job work traceability, consumption reporting, and stock accounting.
    - Indexed fields such as `rm_item_code`, `main_item_code`, and `warehouse` improve query performance.

