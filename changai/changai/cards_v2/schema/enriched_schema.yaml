    synonyms_en: ["expense cost center"]
    synonyms_ar: ["مركز التكلفة", "مركز تكلفة فروقات المخزون"]
    join_hint: tabStock Reconciliation.cost_center = tabCost Center.name

  - name: "_user_tags"
    type: "TEXT"
    role: ["system"]
    description: "User tag values"
    synonyms_en: ["user tags"]
    synonyms_ar: ["وسوم المستخدم"]

  - name: "_comments"
    type: "TEXT"
    role: ["system"]
    description: "User comments on the record"
    synonyms_en: ["comment log"]
    synonyms_ar: ["تعليقات"]

  - name: "_assign"
    type: "TEXT"
    role: ["system"]
    description: "Assigned users"
