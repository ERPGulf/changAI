    - Draft
    - Open
    - Replied
    - Partially Ordered
    - Ordered
    - Lost
    - Cancelled
    - Expired

  - name: "customer_group"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked customer group ID"
    synonyms_en: ["customer group id"]
    synonyms_ar: ["رمز مجموعة العملاء"]
    join_hint: tabQuotation.customer_group = tabCustomer Group.name

  - name: "territory"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked territory ID"
    synonyms_en: ["territory id"]
    synonyms_ar: ["رمز المنطقة"]
    join_hint: tabQuotation.territory = tabTerritory.name

  - name: "campaign"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked campaign ID"
    synonyms_en: ["campaign id"]
    synonyms_ar: ["رمز الحملة"]
    join_hint: tabQuotation.campaign = tabCampaign.name

  - name: "source"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Lead or quote source reference"
    synonyms_en: ["source"]
    synonyms_ar: ["المصدر"]
    join_hint: tabQuotation.source = tabLead Source.name

  - name: "opportunity"
    type: "VARCHAR(140)"
    role: ["relation"]
