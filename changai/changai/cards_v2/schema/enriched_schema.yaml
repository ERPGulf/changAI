    synonyms_ar: ["حالة المستند", "الحالة"]

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Row index in system"
    synonyms_en: ["index", "row index"]
    synonyms_ar: ["الفهرس", "رقم السطر"]

  - name: "title"
    type: "VARCHAR"
    role: ["display"]
    description: "Document title (defaults to supplier name)"
    synonyms_en: ["title", "invoice title"]
    synonyms_ar: ["العنوان", "عنوان الفاتورة"]

  - name: "naming_series"
    type: "VARCHAR"
    role: ["naming"]
    description: "Naming series for generating invoice number"
    synonyms_en: ["naming series"]
    synonyms_ar: ["سلسلة التسمية"]
    options:
    - ACC-PINV-.YYYY.-
    - ACC-PINV-RET-.YYYY.-

  - name: "supplier"
    type: "VARCHAR"
    role: ["link"]
    description: "Linked Supplier ID for the invoice"
    synonyms_en: ["supplier", "vendor", "supplier id"]
    synonyms_ar: ["المورد", "البائع", "معرّف المورد"]
    join_hint: tabPurchase Invoice.supplier = tabSupplier.name

  - name: "supplier_name"
    type: "VARCHAR"
    role: ["display"]
    description: "Supplier display name"
    synonyms_en: ["supplier name", "vendor name"]
    synonyms_ar: ["اسم المورد", "اسم البائع"]

  - name: "tax_id"
    type: "VARCHAR"
    role: ["tax"]
    description: "Supplier tax identification number"
    synonyms_en: ["tax id", "vat number", "tax number"]
    synonyms_ar: ["رقم الضريبة", "رقم ضريبة القيمة المضافة", "الرقم الضريبي"]

  - name: "company"
