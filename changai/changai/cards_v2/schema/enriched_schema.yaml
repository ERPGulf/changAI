    synonyms_ar: ["قواعد التسعير", "شروط السعر", "قواعد الخصم"]

  - name: "stock_uom_rate"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Item rate per stock unit after UOM conversion."
