    synonyms_ar: ["وحدة المخزون", "وحدة القياس"]
    join_hint: tabPOS Invoice Item.stock_uom = tabUOM.name

  - name: "uom"
    type: "VARCHAR(140)"
    description: "Unit of measurement applied in this POS transaction"
    synonyms_en: ["uom", "unit of measure", "sale unit"]
    synonyms_ar: ["وحدة القياس", "الوحدة"]
    join_hint: tabPOS Invoice Item.uom = tabUOM.name

  - name: "conversion_factor"
    type: "DECIMAL(21,9)"
    description: "Conversion factor between stock UOM and transaction UOM"
    synonyms_en: ["conversion factor", "uom conversion rate"]
    synonyms_ar: ["عامل التحويل", "معدل التحويل"]

  - name: "stock_qty"
