    synonyms_ar: ["وحدة المخزون", "الوحدة الأساسية", "مقياس التخزين"]
    join_hint: tabPurchase Receipt Item.stock_uom = tabUOM.name

  - name: "conversion_factor"
    type: "DECIMAL"
    role: ["calculation"]
    description: "Conversion rate between transaction UOM and stock UOM."
    synonyms_en: ["conversion factor", "uom conversion", "unit conversion"]
    synonyms_ar: ["عامل التحويل", "معدل التحويل", "تحويل الوحدة"]

  - name: "retain_sample"
    type: "INT"
    role: ["flag"]
    description: "Indicates if a sample is retained for testing (1 = Yes, 0 = No)."
    synonyms_en: ["retain sample", "sample retained", "test sample kept"]
    synonyms_ar: ["الاحتفاظ بالعينة", "تم الاحتفاظ بعينة", "عينة للفحص"]

  - name: "sample_quantity"
    type: "INT"
    role: ["quantity"]
    description: "Quantity of sample retained for testing or quality control."
    synonyms_en: ["sample quantity", "test sample qty", "retained qty"]
    synonyms_ar: ["كمية العينة", "كمية الفحص", "كمية محتجزة"]

  - name: "received_stock_qty"
    type: "DECIMAL"
    role: ["quantity"]
    description: "Quantity of items received, converted to stock UOM."
    synonyms_en: ["received stock quantity", "stock qty received", "inventory received qty"]
