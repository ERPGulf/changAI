      like today, this week, this month, this quarter, this year, last month,
      last year, and any reporting period unless the question explicitly says
      due date.
    synonyms_en:
    - "posting date"
    - "invoice date"
    - "bill date"
    - "transaction date"
    - "sales date"
    - "purchase date"
    - "entry date"
    - "date of invoice"
    - "date of bill"
    - "date of transaction"
    - "date raised"
    - "this month"
    - "this week"
    - "today"
    - "yesterday"
    - "last month"
    - "last year"
    synonyms_ar:
    - "تاريخ الفاتورة"
    - "تاريخ التسجيل"
    - "تاريخ البيع"
    - "تاريخ الشراء"
    - "تاريخ المعاملة"


  - name: "posting_time"
