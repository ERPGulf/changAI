    description: "Selling rate after applying the margin"
    synonyms_en: ["rate with margin", "selling price", "final rate"]
    synonyms_ar: ["السعر مع الهامش", "سعر البيع"]

  - name: "discount_percentage"
    type: "DECIMAL(21,9)"
    description: "Discount percentage applied to this item"
    synonyms_en: ["discount percent", "discount rate", "percentage off"]
    synonyms_ar: ["نسبة الخصم", "معدل الخصم"]

  - name: "discount_amount"
    type: "DECIMAL(21,9)"
    description: "Monetary value of discount applied"
    synonyms_en: ["discount amount", "discount value", "price reduction"]
    synonyms_ar: ["قيمة الخصم", "مبلغ الخصم"]

  - name: "distributed_discount_amount"
    type: "DECIMAL(21,9)"
    description: "Portion of total discount distributed to this item"
    synonyms_en: ["distributed discount", "allocated discount"]
    synonyms_ar: ["الخصم الموزع", "الخصم المخصص"]

  - name: "base_rate_with_margin"
    type: "DECIMAL(21,9)"
    description: "Base currency rate after applying margin"
    synonyms_en: ["base rate with margin", "base selling rate"]
    synonyms_ar: ["السعر الأساسي مع الهامش"]

  - name: "rate"
    type: "DECIMAL(21,9)"
    description: "Selling rate per unit after applying margin and discount"
    synonyms_en: ["rate", "unit price", "selling price per unit"]
    synonyms_ar: ["السعر", "سعر الوحدة"]

  - name: "amount"
    type: "DECIMAL(21,9)"
    description: "Total amount before taxes for this item line"
    synonyms_en: ["amount", "line total", "item total"]
    synonyms_ar: ["المبلغ", "الإجمالي"]

  - name: "item_tax_template"
    type: "VARCHAR(140)"
    description: "Tax template applied to this item"
    synonyms_en: ["item tax template", "tax category", "tax code"]
    synonyms_ar: ["قالب الضريبة", "فئة الضريبة"]
    join_hint: tabPOS Invoice Item.item_tax_template = tabItem Tax Template.name

  - name: "base_rate"
    type: "DECIMAL(21,9)"
    description: "Rate in company’s base currency"
    synonyms_en: ["base rate", "base price", "converted rate"]
    synonyms_ar: ["السعر بالعملة الأساسية", "السعر المحول"]

  - name: "base_amount"
    type: "DECIMAL(21,9)"
    description: "Total item amount in base currency"
    synonyms_en: ["base amount", "converted total", "local currency total"]
    synonyms_ar: ["المبلغ بالعملة الأساسية", "الإجمالي بالعملة المحلية"]

  - name: "pricing_rules"
    type: "TEXT"
    description: "Details or references to pricing rules applied for this item"
    synonyms_en: ["pricing rules", "price policy", "pricing condition"]
    synonyms_ar: ["قواعد التسعير", "سياسة التسعير"]

  - name: "is_free_item"
    type: "INT(1)"
    description: "Indicates if the item is given free of cost (1 = Yes, 0 = No)"
    synonyms_en: ["free item", "complimentary item", "giveaway"]
    synonyms_ar: ["عنصر مجاني", "هدية مجانية"]

  - name: "grant_commission"
    type: "INT(1)"
    description: "Specifies whether commission is applicable on this item"
    synonyms_en: ["grant commission", "commission applicable"]
    synonyms_ar: ["يمنح عمولة", "خاضع للعمولة"]
  - name: "net_rate"
    type: "DECIMAL(21,9)"
    role: ["financial"]
    description: "Net rate per unit after discounts"
    synonyms_en: ["final unit rate", "adjusted rate", "net price per unit"]
    synonyms_ar: ["السعر الصافي", "سعر الوحدة الصافي"]

  - name: "net_amount"
    type: "DECIMAL(21,9)"
    role: ["financial"]
    description: "Net total amount after discounts"
    synonyms_en: ["final amount", "net total"]
    synonyms_ar: ["المبلغ الصافي", "الإجمالي الصافي"]

  - name: "base_net_rate"
    type: "DECIMAL(21,9)"
    role: ["financial"]
    description: "Net rate per unit in base currency"
    synonyms_en: ["base currency net rate", "base adjusted rate"]
    synonyms_ar: ["السعر الصافي بالعملة الأساسية"]

  - name: "base_net_amount"
    type: "DECIMAL(21,9)"
    role: ["financial"]
    description: "Net total amount in base currency"
    synonyms_en: ["base currency net total", "base adjusted amount"]
    synonyms_ar: ["المبلغ الصافي بالعملة الأساسية"]

  - name: "delivered_by_supplier"
    type: "INT(1)"
    role: ["logistics"]
    description: "Indicates if item is directly delivered by supplier"
    synonyms_en: ["supplier delivered", "direct delivery"]
    synonyms_ar: ["تم التسليم من المورد"]

  - name: "income_account"
    type: "VARCHAR(140)"
    role: ["financial"]
    description: "Account where income from this item is recorded"
    synonyms_en: ["sales account", "revenue account"]
    synonyms_ar: ["حساب الدخل"]
    join_hint: tabPOS Invoice Item.income_account = tabAccount.name

  - name: "is_fixed_asset"
    type: "INT(1)"
    role: ["accounting"]
    description: "Specifies if the item is a fixed asset"
    synonyms_en: ["fixed asset flag", "asset indicator"]
    synonyms_ar: ["أصل ثابت"]

  - name: "asset"
    type: "VARCHAR(140)"
    role: ["asset_management"]
    description: "Reference to asset if the item is capitalized"
    synonyms_en: ["asset code", "asset reference"]
    synonyms_ar: ["رمز الأصل"]
    join_hint: tabPOS Invoice Item.asset = tabAsset.name

  - name: "finance_book"
    type: "VARCHAR(140)"
    role: ["accounting"]
    description: "Reference to finance book used for accounting entries"
    synonyms_en: ["financial ledger", "accounting book"]
    synonyms_ar: ["دفتر المالية"]
    join_hint: tabPOS Invoice Item.finance_book = tabFinance Book.name

  - name: "expense_account"
    type: "VARCHAR(140)"
    role: ["financial"]
    description: "Account where expense for this item is booked"
    synonyms_en: ["cost account", "expense ledger"]
    synonyms_ar: ["حساب المصروفات"]
    join_hint: tabPOS Invoice Item.expense_account = tabAccount.name

  - name: "deferred_revenue_account"
    type: "VARCHAR(140)"
