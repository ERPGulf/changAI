  - name: "allow_zero_valuation_rate"
    type: "INT(1)"
    role: ["inventory"]
    description: "Allows item with zero valuation rate"
    synonyms_en: ["zero valuation allowed", "allow no value"]
    synonyms_ar: ["السماح بتقييم صفري"]

  - name: "item_tax_rate"
    type: "TEXT"
    role: ["financial"]
    description: "Tax rate applied to the item"
    synonyms_en: ["tax rate", "item tax"]
    synonyms_ar: ["نسبة الضريبة"]

  - name: "actual_batch_qty"
    type: "DECIMAL(21,9)"
    role: ["inventory"]
    description: "Actual batch quantity for the item"
    synonyms_en: ["real batch qty", "actual lot quantity"]
    synonyms_ar: ["الكمية الفعلية للدفعة"]

  - name: "actual_qty"
    type: "DECIMAL(21,9)"
    role: ["inventory"]
    description: "Actual quantity of the item processed"
    synonyms_en: ["real quantity", "actual processed qty"]
    synonyms_ar: ["الكمية الفعلية"]

  - name: "serial_no"
    type: "TEXT"
    role: ["inventory"]
    description: "Serial numbers associated with the item"
    synonyms_en: ["serial numbers", "item serials"]
    synonyms_ar: ["الأرقام التسلسلية"]

  - name: "batch_no"
    type: "VARCHAR(140)"
    role: ["inventory"]
    description: "Batch number of the item"
    synonyms_en: ["lot number", "batch ID"]
    synonyms_ar: ["رقم الدفعة"]
    join_hint: tabPOS Invoice Item.batch_no = tabBatch.name

  - name: "sales_order"
    type: "VARCHAR(140)"
    role: ["sales"]
    description: "Reference to linked Sales Order"
    synonyms_en: ["SO reference", "sales order ID"]
    synonyms_ar: ["طلب المبيعات"]
    join_hint: tabPOS Invoice Item.sales_order = tabSales Order.name

  - name: "so_detail"
    type: "VARCHAR(140)"
    role: ["sales"]
    description: "Reference to Sales Order detail row"
    synonyms_en: ["SO item reference", "sales order detail"]
    synonyms_ar: ["تفاصيل طلب المبيعات"]

  - name: "pos_invoice_item"
    type: "VARCHAR(140)"
    role: ["sales"]
    description: "Reference to related POS Invoice Item"
    synonyms_en: ["POS item reference", "linked POS item"]
    synonyms_ar: ["عنصر الفاتورة في نقطة البيع"]

  - name: "delivery_note"
    type: "VARCHAR(140)"
    role: ["logistics"]
    description: "Linked Delivery Note reference"
    synonyms_en: ["delivery note ID", "dispatch reference"]
    synonyms_ar: ["إشعار التسليم"]
    join_hint: tabPOS Invoice Item.delivery_note = tabDelivery Note.name

  - name: "dn_detail"
    type: "VARCHAR(140)"
    role: ["logistics"]
    description: "Reference to Delivery Note detail row"
    synonyms_en: ["delivery note item", "dispatch detail"]
    synonyms_ar: ["تفاصيل إشعار التسليم"]

  - name: "delivered_qty"
    type: "DECIMAL(21,9)"
    role: ["logistics"]
    description: "Quantity delivered for the item"
    synonyms_en: ["delivered quantity", "shipped qty"]
    synonyms_ar: ["الكمية المسلمة"]

  - name: "cost_center"
    type: "VARCHAR(140)"
    role: ["financial"]
    description: "Cost center associated with this item"
    synonyms_en: ["expense center", "department code"]
    synonyms_ar: ["مركز التكلفة"]
    join_hint: tabPOS Invoice Item.cost_center = tabCost Center.name

  - name: "project"
    type: "VARCHAR(140)"
    role: ["project_management"]
    description: "Linked project reference"
    synonyms_en: ["project code", "project reference"]
    synonyms_ar: ["المشروع"]
    join_hint: tabPOS Invoice Item.project = tabProject.name



  - name: "parent"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "Parent document name for this record"
    synonyms_en: ["parent ID", "linked document"]
    synonyms_ar: ["المستند الرئيسي"]
    join_hint: tabPOS Invoice Item.parent = tabPOS Invoice.name

  - name: "parentfield"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "Field name used to link child record to parent document"
    synonyms_en: ["child field name", "link field"]
    synonyms_ar: ["حقل الارتباط"]

  - name: "parenttype"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "Parent document type name"
    synonyms_en: ["parent type", "document type"]
    synonyms_ar: ["نوع المستند الرئيسي"]

  notes: |
    - Core doctype for POS billing and retail sales tracking.
    - Each record represents an individual product or service item in a POS Invoice.
    - Use `docstatus = 1` to filter finalized (submitted) invoices.
    - Key joins: `parent` → `tabPOS Invoice`, `item_code` → `tabItem`, `warehouse` → `tabWarehouse`.
    - Pricing fields include `rate`, `amount`, `discount_percentage`, `discount_amount`, and `net_amount`.
    - Margin fields (`margin_type`, `margin_rate_or_amount`, `rate_with_margin`) manage markups and margins.
    - `net_rate` and `net_amount` capture post-discount, pre-tax values.
    - `income_account`, `expense_account`, and `cost_center` map revenue and expense accounts.

- table: "tabPayment Entry"
  synonyms_en:
  - "payment transaction"
  - "bank payment"
  - "cash receipt"
  - "incoming payment"
  - "outgoing payment"
  - "fund transfer"
  description: "Record of payments made or received, including mode of payment, party details, references to invoices, and\
    \ accounting impact on company ledgers."
  fields:

  - name: "name"
    type: "VARCHAR(140)"
    role: ["system", "primary_key"]
    description: "Unique name or ID of the payment entry document"
    synonyms_en: ["document id", "payment entry id", "record name"]
    synonyms_ar: ["اسم السجل", "معرف السجل"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the document was created"
    synonyms_en: ["created on", "creation date"]
    synonyms_ar: ["تاريخ الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the document was last modified"
    synonyms_en: ["modified on", "last updated"]
    synonyms_ar: ["تاريخ التعديل"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified the document"
    synonyms_en: ["updated by", "edited by"]
    synonyms_ar: ["تم التعديل بواسطة"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the document"
    synonyms_en: ["created by", "document owner"]
    synonyms_ar: ["تم الإنشاء بواسطة"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document status (0: Draft, 1: Submitted, 2: Cancelled)"
    synonyms_en: ["document status", "status code"]
    synonyms_ar: ["حالة المستند"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Index for internal ordering"
    synonyms_en: ["index", "order index"]
    synonyms_ar: ["ترتيب"]

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "Naming series pattern used for auto-generated document names"
    synonyms_en: ["series code", "naming pattern"]
    synonyms_ar: ["نمط التسمية", "رمز السلسلة"]
    options:
    - ACC-PAY-.YYYY.-

  - name: "payment_type"
    type: "VARCHAR(140)"
    description: "Indicates whether the payment is incoming, outgoing, or transfer."
    synonyms_en: ["payment direction", "transaction type", "receipt or payment"]
    synonyms_ar: ["نوع الدفع", "اتجاه المعاملة"]
    options:
    - Receive
    - Pay
    - Internal Transfer

  - name: "payment_order_status"
    type: "VARCHAR(140)"
    description: "Status of linked payment order, showing whether it is pending, processed, or cancelled."
    synonyms_en: ["payment order state", "order status"]
    synonyms_ar: ["حالة أمر الدفع"]
    options:
    - Initiated
    - Payment Ordered

  - name: "posting_date"
    type: "DATE"
    description: "The date on which the payment is recorded in the company’s books."
    synonyms_en: ["transaction date", "record date"]
    synonyms_ar: ["تاريخ القيد", "تاريخ المعاملة"]

  - name: "company"
    type: "VARCHAR(140)"
    description: "Company for which this payment entry is recorded."
    synonyms_en: ["organization", "entity name"]
    synonyms_ar: ["الشركة"]
    join_hint: tabPayment Entry.company = tabCompany.name

  - name: "mode_of_payment"
    type: "VARCHAR(140)"
    description: "Specifies how the payment was made or received (e.g., Bank, Cash, UPI)."
    synonyms_en: ["payment method", "transaction medium"]
    synonyms_ar: ["طريقة الدفع", "وسيلة الدفع"]
    join_hint: tabPayment Entry.mode_of_payment = tabMode of Payment.name

  - name: "party_type"
    type: "VARCHAR(140)"
    description: "Indicates whether the party is a Customer, Supplier, or Employee."
    synonyms_en: ["partner type", "counterparty type"]
    synonyms_ar: ["نوع الطرف"]
    join_hint: tabPayment Entry.party_type = tabDocType.name

  - name: "party"
    type: "VARCHAR(140)"
    description: "Linked party (Customer, Supplier, or Employee) involved in this transaction."
    synonyms_en: ["linked partner", "counterparty name"]
    synonyms_ar: ["الطرف"]

  - name: "party_name"
    type: "VARCHAR(140)"
    description: "Display name of the party involved in the payment."
    synonyms_en: ["partner name", "beneficiary name"]
    synonyms_ar: ["اسم الطرف"]

  - name: "book_advance_payments_in_separate_party_account"
    type: "INT(1)"
    description: "Flag indicating if advance payments should be booked separately in party accounts."
    synonyms_en: ["separate advance booking flag"]
    synonyms_ar: ["تسجيل الدفعات المسبقة في حساب منفصل"]

  - name: "reconcile_on_advance_payment_date"
    type: "INT(1)"
    description: "Specifies if advance payments should be reconciled based on their payment date."
    synonyms_en: ["reconcile on advance date", "match advance by date"]
    synonyms_ar: ["تسوية على تاريخ الدفعة المسبقة"]

  - name: "bank_account"
    type: "VARCHAR(140)"
    description: "Company bank account used for this transaction."
    synonyms_en: ["company bank", "payment source account"]
    synonyms_ar: ["الحساب البنكي للشركة"]
    join_hint: tabPayment Entry.bank_account = tabBank Account.name

  - name: "party_bank_account"
    type: "VARCHAR(140)"
    description: "Bank account of the customer or supplier receiving or sending the payment."
    synonyms_en: ["partner bank account", "beneficiary account"]
    synonyms_ar: ["الحساب البنكي للطرف"]
    join_hint: tabPayment Entry.party_bank_account = tabBank Account.name

  - name: "contact_person"
    type: "VARCHAR(140)"
    description: "Contact person associated with the party for this payment."
    synonyms_en: ["party contact", "representative name"]
    synonyms_ar: ["شخص الاتصال"]
    join_hint: tabPayment Entry.contact_person = tabContact.name

  - name: "contact_email"
    type: "VARCHAR(140)"
    description: "Email address of the contact person."
    synonyms_en: ["contact email ID", "party email"]
    synonyms_ar: ["البريد الإلكتروني للاتصال"]

  - name: "party_balance"
    type: "DECIMAL(21,9)"
    description: "The outstanding balance of the party before this transaction."
    synonyms_en: ["balance before payment", "party outstanding amount"]
    synonyms_ar: ["رصيد الطرف"]

  - name: "paid_from"
    type: "VARCHAR(140)"
    description: "Ledger account from which payment is made (for outgoing payments)."
    synonyms_en: ["source account", "debit account"]
    synonyms_ar: ["الحساب المدفوع منه"]
    join_hint: tabPayment Entry.paid_from = tabAccount.name

  - name: "paid_from_account_type"
    type: "VARCHAR(140)"
    description: "Specifies the type of account used for payment (e.g., Bank, Cash)."
    synonyms_en: ["source account type"]
    synonyms_ar: ["نوع الحساب المدفوع منه"]

  - name: "paid_from_account_currency"
    type: "VARCHAR(140)"
    description: "Currency of the account from which the payment is made."
    synonyms_en: ["source account currency", "debit account currency"]
    synonyms_ar: ["عملة الحساب المدفوع منه"]
    join_hint: tabPayment Entry.paid_from_account_currency = tabCurrency.name

  - name: "paid_from_account_balance"
    type: "DECIMAL(21,9)"
    description: "Current balance of the source account before the payment transaction."
    synonyms_en: ["source account balance", "debit account balance"]
