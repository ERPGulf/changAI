    synonyms_en: ["margin type", "markup type", "profit type"]
    synonyms_ar: ["نوع الهامش", "نوع الربح"]
    options:
    - Percentage
    - Amount

  - name: "margin_rate_or_amount"
    type: "DECIMAL(21,9)"
