    synonyms_en: ["document status", "record status", "approval state"]
    synonyms_ar: ["حالة المستند", "حالة السجل", "حالة الاعتماد"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Index for ordering child table entries"
