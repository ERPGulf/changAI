    synonyms_ar: ["قاعدة تحويل المواد"]
    options:
    - Work Order
    - Job Card

  - name: "routing"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Routing linked to this BOM"
    synonyms_en: ["manufacturing routing"]
    synonyms_ar: ["مسار الإنتاج"]
    join_hint: tabBOM.routing = tabRouting.name

  - name: "fg_based_operating_cost"
    type: "INT(1)"
    role: ["config"]
    description: "Whether the operating cost is based on FG quantity"
    synonyms_en: ["fg cost"]
    synonyms_ar: ["تكلفة الناتج"]

  - name: "operating_cost_per_bom_quantity"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Operating cost per finished quantity"
    synonyms_en: ["operating cost"]
    synonyms_ar: ["التكلفة التشغيلية"]

  - name: "process_loss_percentage"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Percentage loss during process"
    synonyms_en: ["process loss"]
    synonyms_ar: ["فاقد العملية"]

  - name: "process_loss_qty"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Quantity lost during process"
    synonyms_en: ["loss qty"]
    synonyms_ar: ["كمية الفاقد"]

  - name: "operating_cost"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Total operating cost"
    synonyms_en: ["total operating cost"]
    synonyms_ar: ["التكلفة التشغيلية الكلية"]

  - name: "raw_material_cost"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Total raw material cost"
    synonyms_en: ["rm cost"]
    synonyms_ar: ["تكلفة المواد الخام"]

  - name: "scrap_material_cost"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Cost of scrap materials"
    synonyms_en: ["scrap cost"]
    synonyms_ar: ["تكلفة الخردة"]

  - name: "base_operating_cost"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Operating cost in base currency"
    synonyms_en: ["base operating cost"]
    synonyms_ar: ["التكلفة الأساسية"]

  - name: "base_raw_material_cost"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Raw material cost in base currency"
    synonyms_en: ["base rm cost"]
    synonyms_ar: ["تكلفة المواد الخام الأساسية"]

  - name: "base_scrap_material_cost"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Scrap cost in base currency"
    synonyms_en: ["base scrap cost"]
    synonyms_ar: ["تكلفة الخردة الأساسية"]

  - name: "total_cost"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Total BOM cost"
    synonyms_en: ["total cost"]
    synonyms_ar: ["التكلفة الإجمالية"]

  - name: "base_total_cost"
    type: "DECIMAL(21,9)"
    role: ["calculated"]
    description: "Total cost in base currency"
    synonyms_en: ["base total cost"]
    synonyms_ar: ["التكلفة الإجمالية الأساسية"]

  - name: "item_name"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Item name"
    synonyms_en: ["product name"]
    synonyms_ar: ["اسم الصنف"]

  - name: "description"
    type: "TEXT"
    role: ["attribute"]
    description: "Detailed BOM description"
    synonyms_en: ["description"]
    synonyms_ar: ["الوصف"]

  - name: "has_variants"
    type: "INT(1)"
    role: ["flag"]
    description: "Indicates if the item has variants"
    synonyms_en: ["variants"]
    synonyms_ar: ["متغيرات"]

  - name: "inspection_required"
    type: "INT(1)"
    role: ["flag"]
    description: "Whether inspection is required"
    synonyms_en: ["inspection"]
    synonyms_ar: ["فحص"]

  - name: "quality_inspection_template"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Inspection template"
    synonyms_en: ["inspection template"]
    synonyms_ar: ["نموذج الفحص"]
    join_hint: tabBOM.quality_inspection_template = tabQuality Inspection Template.name

  - name: "show_in_website"
    type: "INT(1)"
    role: ["flag"]
    description: "Whether BOM is shown on website"
    synonyms_en: ["website visibility"]
    synonyms_ar: ["إظهار في الموقع"]

  - name: "route"
    type: "TEXT"
    role: ["attribute"]
    description: "Website route"
    synonyms_en: ["route"]
    synonyms_ar: ["المسار"]

  - name: "website_image"
    type: "TEXT"
    role: ["attribute"]
    description: "Website display image"
    synonyms_en: ["web image"]
    synonyms_ar: ["صورة الموقع"]

  - name: "thumbnail"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Thumbnail image"
    synonyms_en: ["thumbnail"]
    synonyms_ar: ["صورة مصغرة"]

  - name: "show_items"
    type: "INT(1)"
    role: ["flag"]
    description: "Show BOM items on website"
    synonyms_en: ["show items"]
    synonyms_ar: ["إظهار الأصناف"]

  - name: "show_operations"
    type: "INT(1)"
    role: ["flag"]
    description: "Show operations on website"
    synonyms_en: ["show operations"]
    synonyms_ar: ["إظهار العمليات"]

  - name: "web_long_description"
    type: "LONGTEXT"
    role: ["attribute"]
    description: "Long description for website display"
    synonyms_en: ["web description"]
    synonyms_ar: ["وصف الموقع"]

  - name: "bom_creator"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Creator doctype from which BOM was generated"
    synonyms_en: ["bom source"]
    synonyms_ar: ["مصدر الإنشاء"]
    join_hint: tabBOM.bom_creator = tabBOM Creator.name

  - name: "bom_creator_item"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Source item for BOM creation"
    synonyms_en: ["source item"]
    synonyms_ar: ["الصنف المصدر"]

  - name: "amended_from"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Previous BOM from which this one was amended"
    synonyms_en: ["amended from"]
    synonyms_ar: ["معدلة من"]
    join_hint: tabBOM.amended_from = tabBOM.name

  - name: "_user_tags"
    type: "TEXT"
    role: ["system"]
    description: "System tags"
    synonyms_en: ["tags"]
    synonyms_ar: ["علامات"]

  - name: "_comments"
    type: "TEXT"
    role: ["system"]
    description: "Comments metadata"
    synonyms_en: ["comments"]
    synonyms_ar: ["التعليقات"]

  - name: "_assign"
    type: "TEXT"
    role: ["system"]
    description: "Assignment metadata"
    synonyms_en: ["assignment"]
    synonyms_ar: ["التعيين"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["system"]
    description: "Like metadata"
    synonyms_en: ["liked by"]
    synonyms_ar: ["المعجبون"]

  notes: |
    - BOM defines the complete structure and cost of manufacturing an item.
    - Supports costing, routing, operations, alternatives, and sub-assembly logic.
    - Integrated with manufacturing, website, and quality workflows.
    - Can be marked active, default, or variant-specific.
    - Cost fields store raw material, scrap, operating, and total cost values.
    - Item, project, routing, and inspection templates act as relational links.

- table: "tabOpportunity"
  synonyms_en:
  - "opportunity"
  - "sales lead"
  - "potential deal"
  - "customer opportunity"
  - "business opportunity"
  - "deal opportunity"
  description: "Tracks potential sales deals or customer opportunities, including source, stage, amount, probability, and\
    \ contact details."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique Opportunity ID (primary key)"
    synonyms_en: ["opportunity id", "deal id", "lead id", "record id"]
    synonyms_ar: ["معرّف الفرصة", "معرّف الصفقة", "رقم السجل"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the opportunity was created"
    synonyms_en: ["created at", "creation time"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the opportunity was last updated"
    synonyms_en: ["updated at", "last modified"]
    synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last updated the record"
    synonyms_en: ["updated by", "last editor"]
    synonyms_ar: ["تم التعديل بواسطة", "آخر من عدّل"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the record"
    synonyms_en: ["created by", "opportunity creator"]
    synonyms_ar: ["تم الإنشاء بواسطة", "المنشئ"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document status: 0=Draft, 1=Submitted, 2=Cancelled"
    synonyms_en: ["status code", "record state"]
    synonyms_ar: ["حالة المستند", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row index for ordering"
    synonyms_en: ["index", "position"]
    synonyms_ar: ["ترتيب الصف", "الفهرس"]

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Series used for naming format"
    synonyms_en: ["number series", "code series"]
    synonyms_ar: ["سلسلة التسمية"]
    options:
    - CRM-OPP-.YYYY.-

  - name: "opportunity_from"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Indicates source document type where opportunity originated"
    synonyms_en: ["lead source type"]
    synonyms_ar: ["مصدر الفرصة"]
    join_hint: tabOpportunity.opportunity_from = tabDocType.name

  - name: "party_name"
    type: "VARCHAR(140)"
    role: ["relation"]
