  - name: "supplier_quotation"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked supplier quotation ID"
    synonyms_en: ["supplier quotation id"]
    synonyms_ar: ["رمز عرض السعر المورد"]
    join_hint: tabQuotation.supplier_quotation = tabSupplier Quotation.name

  - name: "_user_tags"
    type: "TEXT"
    role: ["attribute"]
    description: "User tags"
    synonyms_en: ["user tags"]
    synonyms_ar: ["علامات المستخدم"]

  - name: "_comments"
    type: "TEXT"
    role: ["attribute"]
    description: "Comments"
    synonyms_en: ["comments"]
    synonyms_ar: ["التعليقات"]

  - name: "_assign"
    type: "TEXT"
    role: ["attribute"]
    description: "Assigned users"
    synonyms_en: ["assigned to"]
    synonyms_ar: ["مُسند إلى"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["attribute"]
    description: "Liked by"
    synonyms_en: ["liked by"]
    synonyms_ar: ["أُعجب به من"]

  notes: |
    - Represents a sales quotation or estimate for a Customer or Lead.
    - Contains validity dates and pricing summary fields.
    - Supports multi-currency and exchange rate conversion.
    - Can be amended using `amended_from`.
    - Discount can be applied via coupon or flat discount.
    - Indexed fields improve query performance: `party_name`, `transaction_date`, `modified`.
    - Core financial fields stored in both base and quote currency.

- table: "tabQuotation Item"
  synonyms_en:
  - "quotation item"
  - "sales quote line"
  - "quoted product"
  - "quote item"
  - "estimate item"
  - "proposal item"
  description: "Individual items or product lines inside a Quotation document with quantity, UOM, and pricing-related fields."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique quotation item line ID (primary key)"
    synonyms_en: ["quote line id", "item row id", "quotation item id"]
    synonyms_ar: ["معرّف العنصر", "رقم السطر", "المفتاح الرئيسي للسطر"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the item line was created"
    synonyms_en: ["created at", "line creation time"]
    synonyms_ar: ["تاريخ إنشاء السطر", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the item line was last modified"
    synonyms_en: ["updated at", "modified at", "line modified time"]
    synonyms_ar: ["تاريخ تعديل السطر", "آخر تحديث للسطر"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified the item record"
    synonyms_en: ["edited by", "updated by"]
    synonyms_ar: ["تم التعديل بواسطة", "محرر السطر"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who originally created the quotation item line"
    synonyms_en: ["created by", "creator of line"]
    synonyms_ar: ["تم الإنشاء بواسطة", "منشئ السطر"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Line document status (0 = Draft, 1 = Submitted, 2 = Cancelled)"
    synonyms_en: ["line status", "status code"]
    synonyms_ar: ["حالة السطر", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row index for ordering inside the quotation"
    synonyms_en: ["row order", "line position", "index"]
    synonyms_ar: ["ترتيب الصف", "موضع السطر", "فهرس"]

  - name: "item_code"
    type: "VARCHAR(140)"
    role: ["attribute", "relation"]
    description: "Reference ID of the item being quoted"
    synonyms_en: ["product code", "quoted item id", "item id"]
    synonyms_ar: ["رمز الصنف", "معرّف الصنف", "كود المنتج"]
    join_hint: tabQuotation Item.item_code = tabItem.name

  - name: "customer_item_code"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Item code used by the customer (if mapped)"
    synonyms_en: ["client item code", "customer product code"]
    synonyms_ar: ["رمز الصنف لدى العميل", "كود العميل للمنتج"]

  - name: "item_name"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Display name of the quoted item"
    synonyms_en: ["product name", "quoted product name"]
    synonyms_ar: ["اسم الصنف", "اسم المنتج"]

  - name: "description"
    type: "LONGTEXT"
    role: ["attribute"]
    description: "Item details or specifications shown in the quote"
    synonyms_en: ["item details", "quote line description", "specifications"]
    synonyms_ar: ["الوصف", "تفاصيل الصنف", "المواصفات"]

  - name: "item_group"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Reference to item category/group"
    synonyms_en: ["category", "item category", "product group"]
    synonyms_ar: ["مجموعة الصنف", "فئة", "تصنيف المنتج"]
    join_hint: tabQuotation Item.item_group = tabItem Group.name

  - name: "brand"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked brand document"
    synonyms_en: ["item brand", "product brand"]
    synonyms_ar: ["العلامة التجارية", "ماركة"]
    join_hint: tabQuotation Item.brand = tabBrand.name

  - name: "image"
    type: "TEXT"
    role: ["attribute"]
    description: "Image URL or path representing the quoted item"
    synonyms_en: ["product image", "item photo", "image link"]
    synonyms_ar: ["صورة المنتج", "رابط الصورة"]

  - name: "qty"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Quoted quantity"
    synonyms_en: ["quoted quantity", "order quantity"]
    synonyms_ar: ["الكمية", "كمية العرض"]

  - name: "stock_uom"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Default stock unit of measure"
    synonyms_en: ["stock unit", "inventory uom"]
    synonyms_ar: ["وحدة قياس المخزون", "وحدة المخزون"]
    join_hint: tabQuotation Item.stock_uom = tabUOM.name

  - name: "uom"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Quoted unit of measure in quotation"
    synonyms_en: ["quotation uom", "quote unit"]
    synonyms_ar: ["وحدة القياس", "وحدة العرض"]
    join_hint: tabQuotation Item.uom = tabUOM.name

  - name: "conversion_factor"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Factor to convert quoted UOM to stock UOM"
    synonyms_en: ["uom multiplier", "unit conversion factor"]
    synonyms_ar: ["معامل التحويل", "نسبة التحويل بين الوحدات"]

  - name: "stock_qty"
    type: "DECIMAL(21,9)"
    role: ["attribute", "computed"]
    description: "Quantity converted into stock unit measure"
    synonyms_en: ["inventory quantity", "converted stock qty"]
    synonyms_ar: ["كمية المخزون بعد التحويل"]

  - name: "actual_qty"
    type: "DECIMAL(21,9)"
    role: ["attribute", "computed"]
    description: "Available stock quantity at time of quotation"
    synonyms_en: ["available stock", "inventory available qty"]
    synonyms_ar: ["الكمية المتاحة في المخزون"]

  - name: "company_total_stock"
    type: "DECIMAL(21,9)"
    role: ["attribute", "computed"]
    description: "Total stock available in the company at quotation time"
    synonyms_en: ["company stock qty", "total company stock", "inventory company total"]
    synonyms_ar: ["إجمالي مخزون الشركة", "كمية المخزون في الشركة"]

  - name: "price_list_rate"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Unit rate from the selected price list (quote currency)"
    synonyms_en: ["list price", "price list unit rate", "catalog rate"]
    synonyms_ar: ["سعر قائمة الأسعار", "سعر اللائحة للوحدة"]

  - name: "base_price_list_rate"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Price list rate converted into base currency"
    synonyms_en: ["list price base", "price list rate (base currency)"]
    synonyms_ar: ["سعر قائمة الأسعار بالعملة الأساسية", "سعر اللائحة الأساسي"]

  - name: "margin_type"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Margin calculation type (Percentage or Amount)"
    synonyms_en: ["profit margin type", "margin mode"]
    synonyms_ar: ["نوع الهامش", "وضع حساب الهامش"]
    options:
    - Percentage
    - Amount

  - name: "margin_rate_or_amount"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Margin value applied (percentage or flat amount)"
    synonyms_en: ["margin value", "profit margin", "markup margin"]
    synonyms_ar: ["قيمة الهامش", "نسبة أو مبلغ الهامش"]

  - name: "rate_with_margin"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Item unit price after adding margin"
    synonyms_en: ["price after margin", "margin inclusive rate"]
    synonyms_ar: ["السعر بعد إضافة الهامش", "سعر شامل الهامش"]

  - name: "discount_percentage"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Discount percentage applied on the item"
    synonyms_en: ["item discount %", "discount rate percentage"]
    synonyms_ar: ["نسبة الخصم", "خصم بالنسبة المئوية"]

  - name: "discount_amount"
    type: "DECIMAL(21,9)"
    role: ["attribute", "computed"]
    description: "Discount value for this line in quote currency"
    synonyms_en: ["item discount amount", "line discount value"]
    synonyms_ar: ["مبلغ الخصم", "قيمة خصم السطر"]

  - name: "distributed_discount_amount"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Discount portion distributed during total-level discount allocation"
    synonyms_en: ["proportional discount share", "allocated discount"]
    synonyms_ar: ["جزء الخصم الموزّع", "حصة الخصم المخصّصة"]

  - name: "rate"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Final item rate before line discount and taxes"
    synonyms_en: ["final unit rate", "item rate"]
    synonyms_ar: ["السعر النهائي للوحدة", "سعر الصنف"]

  - name: "net_rate"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Effective item unit rate after line-level discounts"
    synonyms_en: ["discounted unit rate", "item net price"]
    synonyms_ar: ["السعر بعد الخصم", "السعر الصافي"]

  - name: "amount"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Line total amount before taxes after margin and discounts (quote currency)"
    synonyms_en: ["line total", "item total amount"]
    synonyms_ar: ["إجمالي السطر", "مبلغ السطر"]

  - name: "net_amount"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Line total after item discount without taxes"
    synonyms_en: ["discounted line total", "line net total"]
    synonyms_ar: ["قيمة السطر بعد الخصم", "صافي مبلغ السطر"]

  - name: "item_tax_template"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked tax template applied to the item"
    synonyms_en: ["tax rule", "tax template"]
    synonyms_ar: ["قالب الضريبة", "قاعدة الضريبة"]
    join_hint: tabQuotation Item.item_tax_template = tabItem Tax Template.name

  - name: "pricing_rules"
    type: "TEXT"
    role: ["metadata"]
    description: "List of pricing rules applied on the item"
    synonyms_en: ["applied pricing rules", "pricing rule log"]
    synonyms_ar: ["قواعد التسعير المطبقة", "سجل التسعير"]

  - name: "stock_uom_rate"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Item unit rate converted into stock UOM"
    synonyms_en: ["inventory uom rate", "stock unit rate"]
    synonyms_ar: ["سعر وحدة المخزون", "سعر قياس المخزون"]

  - name: "is_free_item"
    type: "INT(1)"
    role: ["attribute"]
    description: "Flag indicating if this item is a free item"
    synonyms_en: ["free item", "complimentary item", "zero priced item"]
    synonyms_ar: ["عنصر مجاني", "صنف مجاني", "بدون سعر"]

  - name: "is_alternative"
    type: "INT(1)"
    role: ["attribute"]
    description: "Flag indicating if this is an alternative item option"
    synonyms_en: ["alternative", "substitute option", "variant option"]
    synonyms_ar: ["عنصر بديل", "خيار بديل", "صنف بديل"]

  - name: "has_alternative_item"
    type: "INT(1)"
    role: ["attribute", "computed"]
    description: "Indicates if this line has linked alternative items"
    synonyms_en: ["contains alternative", "has substitute", "has alternative linked"]
    synonyms_ar: ["يوجد بديل", "تم ربط بديل"]

  - name: "valuation_rate"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Stock valuation rate per unit at quotation time"
    synonyms_en: ["cost valuation rate", "inventory valuation rate"]
    synonyms_ar: ["سعر التقييم", "قيمة تقييم المخزون"]

  - name: "gross_profit"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Gross profit for this quotation item line"
    synonyms_en: ["profit", "gross margin amount"]
    synonyms_ar: ["الربح الإجمالي", "الهامش الإجمالي"]

  - name: "weight_per_unit"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Weight of one unit of the quoted item"
    synonyms_en: ["unit weight", "per unit weight"]
    synonyms_ar: ["وزن الوحدة", "الوزن لكل وحدة"]

  - name: "total_weight"
    type: "DECIMAL(21,9)"
    role: ["computed"]
    description: "Total weight = qty * weight per unit"
    synonyms_en: ["line total weight", "calculated total weight"]
    synonyms_ar: ["إجمالي الوزن", "الوزن الكلي"]

  - name: "weight_uom"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Unit of measure for weight"
    synonyms_en: ["weight unit", "weight measurement unit"]
    synonyms_ar: ["وحدة الوزن", "قياس الوزن"]
    join_hint: tabQuotation Item.weight_uom = tabUOM.name

  - name: "warehouse"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Source warehouse for quoted stock"
    synonyms_en: ["warehouse code", "inventory source"]
    synonyms_ar: ["المستودع", "رمز المستودع"]
    join_hint: tabQuotation Item.warehouse = tabWarehouse.name

  - name: "against_blanket_order"
    type: "INT(1)"
    role: ["attribute"]
    description: "Flag indicating if this quote line is against a blanket order"
    synonyms_en: ["linked to blanket order", "against contract order"]
    synonyms_ar: ["مرتبط بطلب شامل", "مقابل طلب شامل"]

  - name: "blanket_order"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked Blanket Order document name"
    synonyms_en: ["contract order id", "blanket order id"]
    synonyms_ar: ["رقم الطلب الشامل", "معرّف الطلب الشامل"]
    join_hint: tabQuotation Item.blanket_order = tabBlanket Order.name

  - name: "blanket_order_rate"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Rate locked from the blanket order pricing (quote currency)"
    synonyms_en: ["blanket rate", "contract rate"]
