    description: "Category or group under which the item falls."
    synonyms_en: ["item group", "category", "product group"]
    synonyms_ar: ["مجموعة العناصر", "الفئة", "مجموعة المنتجات"]
    join_hint: tabPurchase Receipt Item.item_group = tabItem Group.name

  - name: "image"
    type: "TEXT"
    role: ["reference"]
    description: "Link or path to the product image."
    synonyms_en: ["image link", "product image", "item photo"]
    synonyms_ar: ["صورة المنتج", "رابط الصورة", "صورة العنصر"]

  - name: "received_qty"
    type: "DECIMAL"
    role: ["quantity"]
    description: "Actual quantity received from the supplier."
    synonyms_en: ["received quantity", "qty received", "delivered quantity"]
    synonyms_ar: ["الكمية المستلمة", "كمية التسليم", "عدد الوحدات المستلمة"]

  - name: "qty"
    type: "DECIMAL"
    role: ["quantity"]
    description: "Ordered quantity or quantity intended to be received."
    synonyms_en: ["ordered quantity", "expected qty", "purchase quantity"]
    synonyms_ar: ["الكمية المطلوبة", "الكمية المتوقعة", "كمية الشراء"]

  - name: "rejected_qty"
    type: "DECIMAL"
    role: ["quantity"]
