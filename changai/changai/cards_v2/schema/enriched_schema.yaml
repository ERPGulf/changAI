    synonyms_en: ["created on", "creation time"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the record was last modified"
    synonyms_en: ["last modified", "updated on"]
    synonyms_ar: ["تاريخ التعديل", "آخر تعديل"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified the record"
