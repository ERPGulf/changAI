    description: "Document status: 0 = Draft, 1 = Submitted, 2 = Cancelled"
    synonyms_en: ["status", "document status"]
    synonyms_ar: ["حالة المستند"]

  - name: "idx"
    type: "INT(8)"
    description: "Index position of this record (used internally)"
    synonyms_en: ["row index", "order index"]
    synonyms_ar: ["فهرس الصف"]

  - name: "item_code"
    type: "VARCHAR(140)"
    role: ["item"]
    description: "Item code for which this stock record exists"
    synonyms_en: ["item", "product code", "sku"]
    synonyms_ar: ["رمز الصنف"]
    join_hint: tabBin.item_code = tabItem.name

  - name: "warehouse"
    type: "VARCHAR(140)"
    role: ["warehouse"]
    description: "Warehouse where the item is stored"
    synonyms_en: ["warehouse name", "storage location"]
    synonyms_ar: ["المستودع"]
    join_hint: tabBin.warehouse = tabWarehouse.name

  - name: "actual_qty"
    type: "DECIMAL(21,9)"
    description: "Physical on-hand quantity available in the warehouse"
    synonyms_en: ["actual quantity", "on-hand qty", "available stock"]
    synonyms_ar: ["الكمية الفعلية"]

  - name: "planned_qty"
    type: "DECIMAL(21,9)"
    description: "Quantity planned for production or replenishment"
    synonyms_en: ["planned quantity", "planned stock"]
    synonyms_ar: ["الكمية المخطط لها"]

  - name: "indented_qty"
    type: "DECIMAL(21,9)"
    description: "Quantity requested via Material Requests"
    synonyms_en: ["indented quantity", "requested qty"]
    synonyms_ar: ["الكمية المطلوبة"]

  - name: "ordered_qty"
    type: "DECIMAL(21,9)"
    description: "Quantity ordered from suppliers but not yet received"
    synonyms_en: ["ordered quantity", "po qty"]
    synonyms_ar: ["الكمية المطلوبة"]

  - name: "projected_qty"
    type: "DECIMAL(21,9)"
    description: "Projected stock after considering all incoming and outgoing transactions"
    synonyms_en: ["projected quantity", "future stock"]
    synonyms_ar: ["الكمية المتوقعة"]

  - name: "reserved_qty"
    type: "DECIMAL(21,9)"
    description: "Quantity reserved for Sales Orders"
    synonyms_en: ["reserved quantity", "so reserved qty"]
    synonyms_ar: ["الكمية المحجوزة"]

  - name: "reserved_qty_for_production"
    type: "DECIMAL(21,9)"
    description: "Quantity reserved for production orders"
    synonyms_en: ["production reserved qty"]
    synonyms_ar: ["كمية محجوزة للإنتاج"]

  - name: "reserved_qty_for_sub_contract"
    type: "DECIMAL(21,9)"
    description: "Quantity reserved for subcontracting"
    synonyms_en: ["subcontract reserved qty"]
    synonyms_ar: ["كمية محجوزة للمقاولة"]

  - name: "reserved_qty_for_production_plan"
    type: "DECIMAL(21,9)"
    description: "Quantity reserved as part of production planning"
    synonyms_en: ["production plan reserved qty"]
    synonyms_ar: ["كمية محجوزة لخطة الإنتاج"]

  - name: "reserved_stock"
    type: "DECIMAL(21,9)"
    description: "Total reserved stock including various reservations"
    synonyms_en: ["reserved stock total"]
    synonyms_ar: ["المخزون المحجوز"]

  - name: "stock_uom"
    type: "VARCHAR(140)"
    description: "Stock unit of measure for the item"
    synonyms_en: ["unit", "uom"]
    synonyms_ar: ["وحدة القياس"]
    join_hint: tabBin.stock_uom = tabUOM.name

  - name: "valuation_rate"
    type: "DECIMAL(21,9)"
    description: "Current valuation rate of the stock"
    synonyms_en: ["valuation rate", "stock valuation"]
    synonyms_ar: ["معدل التقييم"]

  - name: "stock_value"
    type: "DECIMAL(21,9)"
    description: "Total value of stock (actual_qty × valuation_rate)"
    synonyms_en: ["stock value", "inventory value"]
    synonyms_ar: ["قيمة المخزون"]

  - name: "_user_tags"
    type: "TEXT"
    description: "User tags applied to the document"
    synonyms_en: ["tags"]
    synonyms_ar: ["العلامات"]

  - name: "_comments"
    type: "TEXT"
    description: "System comments added to the document"
    synonyms_en: ["comments"]
    synonyms_ar: ["التعليقات"]

  - name: "_assign"
    type: "TEXT"
    description: "Assigned users for this document"
    synonyms_en: ["assignments"]
    synonyms_ar: ["التعيينات"]

  - name: "_liked_by"
    type: "TEXT"
    description: "Users who liked this document"
    synonyms_en: ["liked by"]
    synonyms_ar: ["أعجب به"]

  notes: |
    - Represents the core stock balance for an item in a warehouse.
    - Unique constraint `(item_code, warehouse)` ensures only one bin record per item-warehouse pair.
    - Key joins:
        • `item_code` → `tabItem`.`name`
        • `warehouse` → `tabWarehouse`.`name`
    - `actual_qty`, `reserved_qty`, `projected_qty` are critical for stock availability checks.
    - Used by ERPNext stock ledger, reorder level, MRP, manufacturing planning, and stock forecast.
    - `valuation_rate` and `stock_value` contribute to stock valuation and financial reports.
    - Indexed fields like `warehouse` and `modified` improve lookup performance.

- table: "tabMaterial Request Item"
  synonyms_en:
  - "material request line"
  - "requested item"
  - "purchase request item"
  - "requisition item"
  - "mr item"
  description: "Each record represents an individual item within a Material Request document, including item code, name, quantity,\
    \ and schedule date."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique ID / primary key for this material request item"
    synonyms_en: ["item id", "row id", "line id"]
    synonyms_ar: ["معرّف العنصر", "رمز العنصر", "رقم الصف"]

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when this item record was created"
    synonyms_en: ["created at", "creation time", "added on"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Last modification time of the item record"
    synonyms_en: ["last updated", "modified on", "updated time"]
    synonyms_ar: ["آخر تعديل", "تاريخ التحديث"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified the record"
    synonyms_en: ["updated by", "modified by"]
    synonyms_ar: ["تم التعديل بواسطة", "المحرر"]

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created the record"
    synonyms_en: ["created by", "owner", "requested by"]
    synonyms_ar: ["المنشئ", "أنشأ بواسطة", "المالك"]

  - name: "docstatus"
    type: "INT"
    role: ["system"]
    description: "Document status (0: Draft, 1: Submitted, 2: Cancelled)"
    synonyms_en: ["document status", "status code", "record status"]
    synonyms_ar: ["حالة المستند", "رمز الحالة", "وضع الوثيقة"]

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Row index within the Material Request document"
    synonyms_en: ["row number", "line number", "index"]
    synonyms_ar: ["رقم الصف", "رقم السطر", "الترتيب"]

  - name: "item_code"
    type: "VARCHAR"
    role: ["id", "product"]
    description: "Unique code identifying the requested item"
    synonyms_en: ["item code", "product code", "sku", "material code"]
    synonyms_ar: ["رمز الصنف", "رمز المنتج", "رمز المادة"]
    join_hint: tabMaterial Request Item.item_code = tabItem.name

  - name: "item_name"
    type: "VARCHAR"
    role: ["product"]
    description: "Name of the requested item"
    synonyms_en: ["item name", "product name", "material name"]
    synonyms_ar: ["اسم الصنف", "اسم المنتج", "اسم المادة"]

  - name: "schedule_date"
    type: "DATE"
    role: ["date"]
    description: "Planned date for receiving or using the item"
    synonyms_en: ["required date", "delivery date", "schedule date"]
    synonyms_ar: ["تاريخ الجدولة", "تاريخ التسليم", "تاريخ الاستلام"]

  - name: "description"
    type: "TEXT"
    role: ["comment"]
    description: "Detailed description of the requested item"
    synonyms_en: ["item description", "details", "remarks"]
    synonyms_ar: ["الوصف", "تفاصيل الصنف", "ملاحظات"]

  - name: "item_group"
    type: "VARCHAR"
    role: ["category"]
    description: "Group or category of the requested item"
    synonyms_en: ["item group", "product category", "item category"]
    synonyms_ar: ["مجموعة الصنف", "فئة المنتج", "تصنيف العنصر"]
    join_hint: tabMaterial Request Item.item_group = tabItem Group.name

  - name: "brand"
    type: "VARCHAR"
    role: ["attribute"]
    description: "Brand associated with the requested item"
    synonyms_en: ["brand", "manufacturer", "label"]
    synonyms_ar: ["العلامة التجارية", "المنتج", "المُصنّع"]
    join_hint: tabMaterial Request Item.brand = tabBrand.name

  - name: "image"
    type: "TEXT"
    role: ["media"]
    description: "Image or visual reference of the item"
    synonyms_en: ["item image", "product image", "picture"]
    synonyms_ar: ["صورة المنتج", "صورة العنصر", "المرجع البصري"]

  - name: "qty"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Requested quantity of the item"
    synonyms_en: ["quantity", "requested qty", "item quantity", "units required"]
    synonyms_ar: ["الكمية", "الكمية المطلوبة", "عدد الوحدات"]
  - name: "stock_uom"
    type: "VARCHAR"
    role: ["measure", "unit"]
    description: "Stock unit of measurement for the item"
    synonyms_en: ["stock unit", "stock uom", "base unit"]
    synonyms_ar: ["وحدة المخزون", "وحدة القياس", "وحدة الأساس"]
    join_hint: tabMaterial Request Item.stock_uom = tabUOM.name

  - name: "from_warehouse"
    type: "VARCHAR"
    role: ["location"]
    description: "Source warehouse from which items are transferred or issued"
    synonyms_en: ["from warehouse", "source warehouse", "origin warehouse"]
    synonyms_ar: ["من المستودع", "المخزن المصدر", "المستودع الأصلي"]
    join_hint: tabMaterial Request Item.from_warehouse = tabWarehouse.name

  - name: "warehouse"
    type: "VARCHAR"
    role: ["location"]
    description: "Destination warehouse where items will be received or stored"
    synonyms_en: ["warehouse", "to warehouse", "destination warehouse", "storage location"]
    synonyms_ar: ["المستودع", "مخزن الوجهة", "مكان التخزين"]
    join_hint: tabMaterial Request Item.warehouse = tabWarehouse.name

  - name: "uom"
    type: "VARCHAR"
    role: ["measure", "unit"]
    description: "Unit of measurement for the requested quantity"
    synonyms_en: ["unit of measure", "uom", "unit"]
    synonyms_ar: ["وحدة القياس", "الوحدة"]
    join_hint: tabMaterial Request Item.uom = tabUOM.name

  - name: "conversion_factor"
    type: "DECIMAL(21,9)"
    role: ["calculation"]
    description: "Conversion factor between UOM and Stock UOM"
    synonyms_en: ["conversion rate", "uom factor", "unit conversion ratio"]
    synonyms_ar: ["معامل التحويل", "نسبة التحويل", "معدل التحويل"]

  - name: "stock_qty"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total quantity in stock UOM after conversion"
    synonyms_en: ["stock quantity", "converted qty", "qty in stock uom"]
    synonyms_ar: ["الكمية بالمخزون", "الكمية المحوّلة"]

  - name: "min_order_qty"
    type: "DECIMAL(21,9)"
    role: ["constraint"]
    description: "Minimum quantity that can be ordered for this item"
    synonyms_en: ["minimum order quantity", "min order", "order threshold"]
    synonyms_ar: ["الحد الأدنى للطلب", "كمية الطلب الدنيا"]

  - name: "projected_qty"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Projected available quantity after pending transactions"
    synonyms_en: ["projected quantity", "expected qty", "available projection"]
    synonyms_ar: ["الكمية المتوقعة", "الكمية المتاحة المتوقعة"]

  - name: "actual_qty"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Actual quantity available in the warehouse"
    synonyms_en: ["actual quantity", "current stock", "available qty"]
    synonyms_ar: ["الكمية الفعلية", "المخزون الحالي"]

  - name: "ordered_qty"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total quantity ordered but not yet received"
    synonyms_en: ["ordered quantity", "qty ordered", "pending order qty"]
    synonyms_ar: ["الكمية المطلوبة", "كمية الطلب المعلقة"]

  - name: "received_qty"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Quantity already received against the material request"
    synonyms_en: ["received quantity", "qty received", "delivered qty"]
    synonyms_ar: ["الكمية المستلمة", "الكمية المسلّمة"]

  - name: "rate"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Rate per unit for the item"
    synonyms_en: ["rate", "unit price", "price per unit"]
    synonyms_ar: ["السعر لكل وحدة", "معدل الوحدة"]

  - name: "price_list_rate"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Standard price list rate for the item"
    synonyms_en: ["price list rate", "catalog price", "list price"]
    synonyms_ar: ["سعر القائمة", "السعر المعياري"]

  - name: "amount"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Total amount for the item (quantity × rate)"
    synonyms_en: ["amount", "total", "item total", "line total"]
    synonyms_ar: ["المبلغ", "الإجمالي", "إجمالي الصنف"]

  - name: "expense_account"
    type: "VARCHAR"
    role: ["finance"]
    description: "Expense account associated with this material item"
    synonyms_en: ["expense account", "cost account", "expense ledger"]
    synonyms_ar: ["حساب المصروفات", "حساب التكلفة"]
    join_hint: tabMaterial Request Item.expense_account = tabAccount.name

  - name: "wip_composite_asset"
    type: "VARCHAR"
    role: ["asset", "manufacturing"]
    description: "Reference to the Work-in-Progress composite asset"
    synonyms_en: ["wip composite asset", "work in progress asset", "manufacturing asset"]
    synonyms_ar: ["أصل العمل الجاري", "الأصل المركب قيد التنفيذ"]
    join_hint: tabMaterial Request Item.wip_composite_asset = tabAsset.name
  - name: "manufacturer"
    type: "VARCHAR(140)"
    description: "Manufacturer of the item"
    synonyms_en: ["item manufacturer", "product maker"]
    synonyms_ar: ["الشركة المصنعة"]
    join_hint: tabMaterial Request Item.manufacturer = tabManufacturer.name

  - name: "manufacturer_part_no"
    type: "VARCHAR(140)"
    description: "Manufacturer part number or product code"
    synonyms_en: ["manufacturer part number", "mfg part code", "product number"]
    synonyms_ar: ["رقم جزء الشركة المصنعة"]

  - name: "bom_no"
    type: "VARCHAR(140)"
    description: "Linked Bill of Materials number"
    synonyms_en: ["bill of materials no", "bom id", "bom reference"]
    synonyms_ar: ["رقم قائمة المواد"]
    join_hint: tabMaterial Request Item.bom_no = tabBOM.name

  - name: "project"
    type: "VARCHAR(140)"
    description: "Associated project reference"
    synonyms_en: ["project id", "linked project"]
    synonyms_ar: ["المشروع المرتبط"]
    join_hint: tabMaterial Request Item.project = tabProject.name

  - name: "cost_center"
    type: "VARCHAR(140)"
    description: "Cost center related to this item for accounting"
    synonyms_en: ["expense center", "department cost center"]
    synonyms_ar: ["مركز التكلفة"]
    join_hint: tabMaterial Request Item.cost_center = tabCost Center.name

  - name: "lead_time_date"
    type: "DATE"
    description: "Expected lead time date for the item delivery"
    synonyms_en: ["lead time", "expected delivery date"]
    synonyms_ar: ["تاريخ المهلة"]

  - name: "sales_order"
    type: "VARCHAR(140)"
    description: "Linked Sales Order reference"
    synonyms_en: ["sales order no", "so reference"]
    synonyms_ar: ["رقم أمر البيع"]
    join_hint: tabMaterial Request Item.sales_order = tabSales Order.name

  - name: "sales_order_item"
    type: "VARCHAR(140)"
    description: "Linked Sales Order Item reference"
    synonyms_en: ["sales order line item", "so item"]
    synonyms_ar: ["عنصر أمر البيع"]

  - name: "production_plan"
    type: "VARCHAR(140)"
    description: "Linked Production Plan reference"
    synonyms_en: ["production plan id", "manufacturing plan reference"]
    synonyms_ar: ["خطة الإنتاج"]
    join_hint: tabMaterial Request Item.production_plan = tabProduction Plan.name

  - name: "material_request_plan_item"
    type: "VARCHAR(140)"
    description: "Reference to Material Request Plan Item"
    synonyms_en: ["mrp plan item", "material plan item"]
    synonyms_ar: ["عنصر خطة طلب المواد"]

  - name: "job_card_item"
    type: "VARCHAR(140)"
    description: "Linked Job Card Item reference"
    synonyms_en: ["job card line", "work order item"]
    synonyms_ar: ["عنصر بطاقة العمل"]

  - name: "parent"
    type: "VARCHAR(140)"
    description: "Parent Material Request document reference"
    synonyms_en: ["parent id", "main document id"]
    synonyms_ar: ["المستند الرئيسي"]
    join_hint: tabMaterial Request Item.parent = tabMaterial Request.name

  - name: "parentfield"
    type: "VARCHAR(140)"
    description: "Fieldname under which this child record is stored in the parent document"
    synonyms_en: ["parent field name", "linked field"]
    synonyms_ar: ["اسم الحقل الرئيسي"]

  - name: "parenttype"
    type: "VARCHAR(140)"
    description: "Type of the parent document"
    synonyms_en: ["parent document type", "parent doctype"]
    synonyms_ar: ["نوع المستند الرئيسي"]

  notes: |
    - Child table of `tabMaterial Request` storing item-level details for each material request.
    - Use `parent` → `tabMaterial Request`.`name` to link with the main document.
    - Contains quantity, warehouse, and scheduling details for requested materials.
    - `item_code`, `item_name`, and `description` identify the material.
    - `qty` and `stock_qty` represent requested quantity and its stock unit equivalent.
    - `warehouse` and `from_warehouse` determine source and destination locations.
    - `schedule_date` indicates when the material is required.
    - `ordered_qty` and `received_qty` track fulfillment against linked Purchase Orders or Stock Entries.

- table: "tabMode of Payment"
  synonyms_en:
  - "payment method"
  - "payment mode"
  - "payment option"
  - "method of payment"
  - "transaction method"

  description: "Defines various modes of payment such as cash, bank transfer, cheque, or online methods."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique ID / primary key for the payment mode record"
    synonyms_en: ["payment mode id", "mop id", "record id"]
    synonyms_ar: ["معرّف طريقة الدفع", "رمز طريقة الدفع", "رقم السجل"]

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the payment mode record was created"
    synonyms_en: ["created at", "creation date", "record created on"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the payment mode record was last modified"
    synonyms_en: ["last modified", "updated at", "modified date"]
    synonyms_ar: ["تاريخ التعديل", "آخر تحديث", "تم التعديل في"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified this record"
    synonyms_en: ["updated by", "modified user", "last editor"]
    synonyms_ar: ["تم التعديل بواسطة", "آخر مستخدم عدل", "محدث السجل"]

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created this record"
    synonyms_en: ["created by", "record owner", "initiator"]
    synonyms_ar: ["أنشأه", "مالك السجل", "المُنشئ"]

  - name: "docstatus"
    type: "INT"
    role: ["system"]
    description: "Document status flag (0 = Draft, 1 = Submitted, 2 = Cancelled)"
    synonyms_en: ["document status", "status code", "doc state"]
    synonyms_ar: ["حالة المستند", "رمز الحالة", "حالة الوثيقة"]

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Index or sequence number of the record"
    synonyms_en: ["index", "record position", "order number"]
    synonyms_ar: ["فهرس", "تسلسل", "رقم الترتيب"]

  - name: "mode_of_payment"
    type: "VARCHAR"
    role: ["business"]
    description: "Specifies the payment mode name (e.g., Cash, Credit Card, Bank Transfer)"
    synonyms_en: ["payment type", "payment name", "mode", "mop"]
    synonyms_ar: ["اسم طريقة الدفع", "نوع الدفع", "طريقة السداد"]

  - name: "enabled"
    type: "INT"
    role: ["business"]
    description: "Indicates whether this payment mode is active (1 = Enabled, 0 = Disabled)"
    synonyms_en: ["active", "status", "is enabled"]
    synonyms_ar: ["مفعل", "نشط", "تمكين"]

  - name: "type"
    type: "VARCHAR"
    role: ["business"]
    description: "Category of payment (e.g., Cash, Bank, Card, Mobile)"
    synonyms_en: ["payment category", "payment class", "payment group"]
    synonyms_ar: ["نوع الدفع", "فئة الدفع", "مجموعة الدفع"]
    options:
    - Cash
    - Bank
    - General
    - Phone

  notes: |
    - Child table of `tabMaterial Request` storing item-level details for each material request.
    - Use `parent` → `tabMaterial Request`.`name` to link with the main document.
    - Contains quantity, warehouse, and scheduling details for requested materials.
    - `item_code`, `item_name`, and `description` identify the material.
    - `qty` and `stock_qty` represent requested quantity and its stock unit equivalent.
    - `warehouse` and `from_warehouse` determine source and destination locations.
    - `schedule_date` indicates when the material is required.
    - `ordered_qty` and `received_qty` track fulfillment against linked Purchase Orders or Stock Entries.
    - Key fields for planning: `projected_qty`, `actual_qty`, and `lead_time_date`.
    - Supports manufacturing integration via `bom_no`, `job_card_item`, and `production_plan`.
    - Financial tracking via `expense_account` and `cost_center`.
    - Indexed fields like `item_code`, `warehouse`, and `parent` improve performance in MRP and procurement reports.

- table: "tabMode of Payment Account"
  synonyms_en:
  - "payment mode account"
  - "mode of payment account"
  - "mop account"
  - "payment configuration"
  - "account mapping for mode of payment"
  description: "Links a Mode of Payment to its default accounting ledger and company for financial transactions."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Primary key / unique record name"
    synonyms_en: ["record id", "entry id", "mop account id"]

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Date and time when the record was created"
    synonyms_en: ["created at", "creation timestamp", "entry created on"]

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Date and time when the record was last modified"
    synonyms_en: ["last updated", "modified at", "updated on"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified this record"
    synonyms_en: ["last updated by", "modified by user"]

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created this record"
    synonyms_en: ["created by", "record owner"]

  - name: "docstatus"
    type: "INT"
    role: ["system"]
    description: "Document status: 0 = Draft, 1 = Submitted, 2 = Cancelled"
    synonyms_en: ["document status", "status code"]

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Row index for ordering child table records"
    synonyms_en: ["index", "row order"]

  - name: "company"
    type: "VARCHAR"
    role: ["key"]
    description: "Company linked to this payment mode account"
    synonyms_en: ["company name", "organization", "business entity"]
    join_hint: tabMode of Payment Account.company = tabCompany.name

  - name: "default_account"
    type: "VARCHAR"
    role: ["financial"]
    description: "Ledger account associated with the mode of payment"
    synonyms_en: ["account head", "ledger", "default ledger account"]
    join_hint: tabMode of Payment Account.default_account = tabAccount.name

  - name: "parent"
    type: "VARCHAR"
    role: ["relationship"]
    description: "Link to parent document (Mode of Payment)"
    synonyms_en: ["parent name", "linked document"]
    join_hint: tabMode of Payment Account.parent = tabMode of Payment.name

  - name: "parentfield"
    type: "VARCHAR"
    role: ["relationship"]
    description: "Fieldname in parent document that holds this child table"
    synonyms_en: ["parent field", "parent link"]

  - name: "parenttype"
    type: "VARCHAR"
    role: ["relationship"]
    description: "Parent document type"
    synonyms_en: ["parent document type", "doctype link"]

  notes: |
    - Child table of `tabMode of Payment`, defining company-specific account mappings for each payment mode.
    - Use `parent` → `tabMode of Payment`.`name` to link with the parent mode.
    - `company` specifies which company the payment account belongs to.
    - `default_account` represents the ledger account used for that payment method in the specified company.
    - Essential for multi-company setups where the same payment mode uses different accounts per company.
    - Used in sales, purchase, and payment transactions to automatically select the correct account.
    - Commonly joined with `tabPayment Entry` and `tabSales Invoice` during financial postings.

- table: "tabPOS Closing Entry"
  synonyms_en:
  - "point of sale closing"
  - "pos end of day"
  - "daily cash closing"
  - "cash register closing"
  - "pos settlement"
  description: "Represents the closing summary of a Point of Sale (POS) period, capturing all sales transactions, payments,\
    \ and cash balances at the end of a shift or day."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Primary key / unique POS closing entry identifier"
    synonyms_en: ["entry id", "closing id", "pos closing number"]

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the POS closing entry was created"
    synonyms_en: ["created at", "creation date", "created on"]

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the POS closing entry was last modified"
    synonyms_en: ["updated at", "last modified on"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified this record"
    synonyms_en: ["last updated by", "modified user"]

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created the record"
    synonyms_en: ["created by", "record owner"]

  - name: "docstatus"
    type: "INT"
    role: ["system"]
    description: "Document status (0 = Draft, 1 = Submitted, 2 = Cancelled)"
    synonyms_en: ["status code", "document state"]

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Row index for ordering in lists or child tables"
    synonyms_en: ["index", "row order"]

  - name: "period_start_date"
    type: "DATETIME"
    role: ["date"]
    description: "Start date and time of the POS period being closed"
    synonyms_en: ["from date", "opening time", "start time"]

  - name: "period_end_date"
    type: "DATETIME"
    role: ["date"]
    description: "End date and time of the POS period being closed"
    synonyms_en: ["to date", "closing time", "end time"]

  - name: "posting_date"
    type: "DATE"
    role: ["date"]
    description: "Date when the POS closing entry is posted in the system"
    synonyms_en: ["transaction date", "posting day", "entry date"]

  - name: "posting_time"
    type: "TIME"
    role: ["time"]
    description: "Exact time when the POS closing entry is posted"
    synonyms_en: ["posted at", "entry time", "transaction time"]

  - name: "pos_opening_entry"
    type: "VARCHAR"
    role: ["relationship"]
    description: "Linked POS Opening Entry that this closing corresponds to"
    synonyms_en: ["pos opening reference", "opening entry link", "linked opening"]
    join_hint: tabPOS Closing Entry.pos_opening_entry = tabPOS Opening Entry.name
  - name: "status"
    type: "VARCHAR"
    role: ["status"]
    description: "Current status of the POS closing entry (e.g., Draft, Submitted, Closed)"
    synonyms_en: ["pos status", "closing status", "document status"]
    options:
    - Draft
    - Submitted
    - Queued
    - Failed
    - Cancelled

  - name: "company"
    type: "VARCHAR"
    role: ["entity"]
    description: "Company associated with this POS closing entry"
    synonyms_en: ["organization", "business unit", "branch"]
    join_hint: tabPOS Closing Entry.company = tabCompany.name

  - name: "pos_profile"
    type: "VARCHAR"
    role: ["relationship"]
    description: "Linked POS Profile used for this closing entry"
    synonyms_en: ["profile name", "pos configuration", "terminal profile"]
    join_hint: tabPOS Closing Entry.pos_profile = tabPOS Profile.name

  - name: "user"
    type: "VARCHAR"
    role: ["user"]
    description: "User who performed the POS closing operation"
    synonyms_en: ["cashier", "sales person", "operator"]
    join_hint: tabPOS Closing Entry.user = tabUser.name

  - name: "grand_total"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Total amount of sales during the POS period, including taxes"
    synonyms_en: ["total amount", "gross total", "sales amount"]

  - name: "net_total"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Total sales amount excluding taxes and charges"
    synonyms_en: ["net sales", "sub total", "sales before tax"]

  - name: "total_quantity"
    type: "DECIMAL(21,9)"
    role: ["quantity"]
    description: "Total quantity of items sold during the POS period"
    synonyms_en: ["sold quantity", "qty sold", "item count"]

  - name: "error_message"
    type: "TEXT"
    role: ["system"]
    description: "Error message logged if there was an issue during POS closing"
    synonyms_en: ["error log", "failure reason", "issue message"]

  - name: "amended_from"
    type: "VARCHAR"
    role: ["reference"]
    description: "Reference to the original document if this one was amended"
    synonyms_en: ["revised from", "previous document", "amendment source"]
    join_hint: tabPOS Closing Entry.amended_from = tabPOS Closing Entry.name

  notes: |
    - Core doctype for daily POS transaction closures and reconciliation.  
    - Use `docstatus = 1` to filter submitted closing entries.  
    - Key link: `pos_opening_entry` → `tabPOS Opening Entry`.`name`.  
    - Captures sales summary through `grand_total`, `net_total`, and `total_quantity`.  
    - `posting_date` and `posting_time` indicate the end of the POS session.  
    - `status` reflects workflow (Draft, Submitted, Closed).  
    - `company`, `pos_profile`, and `user` ensure proper session mapping.  
    - `error_message` helps identify reconciliation or posting issues.  

- table: "tabPOS Closing Entry Detail"
  synonyms_en:
  - "pos payment summary"
  - "pos mode of payment record"
  - "pos closing detail"
  - "payment reconciliation entry"
  - "cash drawer summary"
  description: "Stores detailed breakdown of POS closing amounts for each mode of payment, including opening, expected, and\
    \ actual closing balances."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Primary key / unique identifier for POS closing entry detail"
    synonyms_en: ["detail id", "record id", "pos detail number"]

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the POS closing detail was created"
    synonyms_en: ["created at", "creation time", "created on"]

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the POS closing detail was last modified"
    synonyms_en: ["updated at", "last modified on"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified this record"
    synonyms_en: ["modified user", "last updated by"]

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created the record"
    synonyms_en: ["created by", "record owner"]

  - name: "docstatus"
    type: "INT"
    role: ["system"]
    description: "Document status (0 = Draft, 1 = Submitted, 2 = Cancelled)"
    synonyms_en: ["status code", "document state"]

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Row index for ordering child table entries"
    synonyms_en: ["index", "row order"]

  - name: "mode_of_payment"
    type: "VARCHAR"
    role: ["payment"]
    description: "Mode of payment such as Cash, Card, UPI, etc."
    synonyms_en: ["payment method", "payment mode", "mop"]
    join_hint: tabPOS Closing Entry Detail.mode_of_payment = tabMode of Payment.name

  - name: "opening_amount"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Opening amount available for the specified mode of payment at the start of the POS period"
    synonyms_en: ["opening balance", "starting amount", "initial cash"]

  - name: "expected_amount"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Expected amount at the end of the POS period based on recorded transactions"
    synonyms_en: ["calculated total", "predicted amount", "system expected"]

  - name: "closing_amount"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Actual closing amount physically available at the end of the POS period"
    synonyms_en: ["actual total", "final amount", "closing balance"]

  - name: "difference"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Difference between expected and actual closing amount"
    synonyms_en: ["variance", "discrepancy", "amount difference"]

  - name: "parent"
    type: "VARCHAR"
    role: ["relationship"]
    description: "Parent document this detail belongs to (usually tabPOS Closing Entry)"
    synonyms_en: ["parent entry", "linked document", "main entry"]
    join_hint: tabPOS Closing Entry Detail.parent = tabPOS Closing Entry.name

  - name: "parentfield"
    type: "VARCHAR"
    role: ["system"]
    description: "Fieldname in the parent document that links this child record"
    synonyms_en: ["parent field", "reference field"]

  - name: "parenttype"
    type: "VARCHAR"
    role: ["system"]
    description: "Type of the parent document this record is linked to"
    synonyms_en: ["parent document type", "linked parent type"]

  notes: |
    - Child table linked to `tabPOS Closing Entry` capturing payment-wise closing details.  
    - Use `parent` → `tabPOS Closing Entry`.`name` for relationship mapping.  
    - Each row represents one Mode of Payment (cash, card, UPI, etc.).  
    - `opening_amount` reflects the opening balance at the start of the POS session.  
    - `expected_amount` is the system-calculated total based on transactions.  
    - `closing_amount` is the physically counted or reported amount at session close.  
    - `difference` = `closing_amount` - `expected_amount`, used to detect variances.  
    - Supports audit and reconciliation between recorded and actual cash/card balances.  
    - Key field for financial accuracy and fraud prevention in POS operations.

