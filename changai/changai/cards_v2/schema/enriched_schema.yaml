    synonyms_ar: ["المشروع", "رمز المشروع"]
    join_hint: tabSales Invoice Item.project = tabProject.name


  notes: |
    - Parent-child relation: join `tabSales Invoice Item`.`parent` = `tabSales Invoice`.`name`.
    - For listing invoice lines, select identifying fields like `parent`, `name`, `item_code`, `item_name`, `qty`, `rate`, `amount`.
    - Use `net_rate` / `net_amount` when you need post-discount values; use `base_*` for company currency.
    - When grouping analytics, prefer dimensions like `item_group`, `brand`, `warehouse`, `project`, `cost_center`.
    - Serial/Batch scenarios: rely on `serial_no`, `batch_no`, and `serial_and_batch_bundle`.
    - Delivery/fulfillment context: `delivery_note`, `delivered_qty`, links to SO (`sales_order`, `so_detail`) and POS (`pos_invoice`, `pos_invoice_item`).
    - Pricing sources: `price_list_rate`, `pricing_rules`, `discount_%/amount`, and margin fields determine final `rate`/`amount`.

- table: "tabSupplier"
  synonyms_en:
  - "vendor"
  - "supplier"
  - "provider"
  - "partner"
  - "seller"
  - "external party"
  synonyms_ar:
  - "مورد"
  - "مزود"
  - "بائع"
  - "شريك"
  - "طرف خارجي"
  description: "Master table storing supplier/vendor information, including contact details, tax info, and purchasing configuration."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Supplier unique ID / primary key"
    synonyms_en: ["supplier id", "vendor id", "supplier code"]
    synonyms_ar: ["معرّف المورد", "رمز المورد", "رقم المورد"]

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the supplier record was created"
    synonyms_en: ["created on", "creation time"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the record was last modified"
    synonyms_en: ["last modified", "updated on"]
    synonyms_ar: ["تاريخ التعديل", "آخر تعديل"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified the record"
    synonyms_en: ["modified by", "last edited by"]
    synonyms_ar: ["عدله المستخدم", "آخر محرر"]

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created the record"
    synonyms_en: ["owner", "created by"]
    synonyms_ar: ["المالك", "أنشأ بواسطة"]

  - name: "docstatus"
    type: "INT"
    role: ["lifecycle"]
    description: "Document status (0=Draft, 1=Submitted, 2=Cancelled)"
    synonyms_en: ["status", "document status"]
    synonyms_ar: ["حالة المستند", "الحالة"]

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Index of record (system)"
    synonyms_en: ["index", "row index"]
    synonyms_ar: ["الفهرس", "رقم السطر"]

  - name: "naming_series"
    type: "VARCHAR"
    role: ["naming"]
    description: "Naming series for supplier IDs"
    synonyms_en: ["naming series"]
    synonyms_ar: ["سلسلة التسمية"]
    options:
    - SUP-.YYYY.-

  - name: "supplier_name"
    type: "VARCHAR"
    role: ["display"]
    description: "Full display name of the supplier"
    synonyms_en: ["supplier name", "vendor name"]
    synonyms_ar: ["اسم المورد", "اسم البائع"]

  - name: "country"
    type: "VARCHAR"
    role: ["geo"]
    description: "Country of the supplier"
    synonyms_en: ["country", "supplier country"]
    synonyms_ar: ["الدولة", "بلد المورد"]
    join_hint: tabSupplier.country = tabCountry.name

  - name: "supplier_group"
    type: "VARCHAR"
    role: ["dimension"]
    description: "Supplier group classification"
    synonyms_en: ["supplier group", "vendor group"]
    synonyms_ar: ["مجموعة المورد", "تصنيف المورد"]
    join_hint: tabSupplier.supplier_group = tabSupplier Group.name

  - name: "supplier_type"
    type: "VARCHAR"
    role: ["type"]
    description: "Supplier type (e.g., Company, Individual)"
