    synonyms_en: ["ksa einv qr", "zatca qr code", "saudi einvoice qr"]
    synonyms_ar: ["رمز الاستجابة السريع للفوترة الإلكترونية", "رمز زاتكا"]

  - name: "custom_ksa_einvoicing_xml"
    type: "VARCHAR(140)"
    description: "XML file name or reference generated for KSA e-invoicing submission"
    synonyms_en: ["ksa xml", "einvoicing xml", "zatca xml"]
    synonyms_ar: ["ملف XML للفوترة الإلكترونية", "ملف زاتكا"]

  - name: "custom_zatca_tax_category"
    type: "VARCHAR(140)"
    description: "ZATCA-defined tax category for the invoice, used in KSA e-invoicing"
    synonyms_en: ["zatca tax category", "ksa tax type", "tax classification"]
    synonyms_ar: ["فئة الضريبة", "تصنيف الضريبة", "فئة زاتكا"]
    options:
    - Standard
    - Zero Rated
    - Exempted
    - Services outside scope of tax / Not subject to VAT

  - name: "custom_exemption_reason_code"
    type: "VARCHAR(140)"
    description: "Reason code provided to ZATCA when an invoice is exempted from VAT"
    synonyms_en: ["vat exemption reason", "exemption code", "tax exemption reason"]
    synonyms_ar: ["رمز سبب الإعفاء", "سبب الإعفاء من ضريبة القيمة المضافة"]
    options:
    - VATEX-SA-29
    - VATEX-SA-29-7
    - VATEX-SA-30
    - VATEX-SA-32
    - VATEX-SA-33
    - VATEX-SA-34-1
    - VATEX-SA-34-2
    - VATEX-SA-34-3
    - VATEX-SA-34-4
    - VATEX-SA-34-5
    - VATEX-SA-35
    - VATEX-SA-36
    - VATEX-SA-EDU
    - VATEX-SA-HEA
    - VATEX-SA-MLTRY
    - VATEX-SA-OOS

  - name: "custom_uuid"
    type: "VARCHAR(140)"
    description: "Unique Universal Identifier generated for ZATCA e-invoicing submission"
    synonyms_en: ["zatca uuid", "invoice uuid", "einv uuid"]
    synonyms_ar: ["المعرف الفريد للفوترة الإلكترونية", "رمز UUID"]

  - name: "custom_zatca_status"
    type: "VARCHAR(140)"
    description: "Submission status of the invoice to ZATCA (e.g., Not Submitted, Submitted, Accepted)"
    synonyms_en: ["zatca status", "submission status", "einv status"]
    synonyms_ar: ["حالة زاتكا", "حالة الإرسال"]

  - name: "custom_zatca_pos_name"
    type: "VARCHAR(140)"
    description: "Name of the POS (Point of Sale) system or terminal used for the invoice"
    synonyms_en: ["pos name", "point of sale name", "zatca pos name"]
    synonyms_ar: ["اسم نقطة البيع", "اسم الجهاز"]
    join_hint: tabPOS Invoice.custom_zatca_pos_name = tabZATCA Multiple Setting.name

  - name: "custom_zatca_full_response"
    type: "LONGTEXT"
    description: "Complete response payload returned from ZATCA after invoice submission"
    synonyms_en: ["zatca response", "einvoice response", "submission response"]
    synonyms_ar: ["الاستجابة الكاملة من زاتكا", "رد الفوترة الإلكترونية"]

  notes: |
    - Core doctype for POS (Point of Sale) transactions capturing retail sales data.  
    - Each record represents a single invoice created via POS terminals or online sales channels.  
    - `customer` → `tabCustomer` defines the buyer; `pos_profile` links to sales configurations.  
    - `is_pos = 1` ensures this invoice belongs to POS operations.  
    - `grand_total`, `net_total`, and `total_taxes_and_charges` capture invoice valuation in detail.  
    - `base_grand_total` and `base_total` hold amounts in company currency (for multi-currency handling).  
    - `posting_date` and `posting_time` mark the transaction timestamp for accounting.  
    - `status` reflects transaction lifecycle (Draft, Paid, Cancelled, etc.).  
    - `outstanding_amount` and `paid_amount` support payment reconciliation and cash control.   
    - `write_off_amount` and `write_off_account` used to adjust small balance differences.  
    - `ksa_einv_qr`, `custom_zatca_*` fields ensure Saudi ZATCA e-invoicing compliance.  
    - `update_stock = 1` triggers stock deduction from warehouses during invoice submission.  

- table: "tabPOS Invoice Item"
  synonyms_en:
  - "pos item"
  - "sales item"
  - "invoice line item"
  - "product entry"
  - "billing item"
  description: "Individual items listed under a POS invoice, capturing details like item code, description, quantity, and\
    \ pricing."
  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique identifier for each POS Invoice Item entry"
    synonyms_en: ["item id", "record id", "pos item id", "line item id"]
    synonyms_ar: ["معرف العنصر", "رقم السجل", "رمز البند"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the POS item record was created"
    synonyms_en: ["created at", "creation date", "record created on"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp of last modification to this record"
    synonyms_en: ["modified at", "updated on", "last edited"]
    synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified the record"
    synonyms_en: ["modified by", "updated by", "last edited by"]
    synonyms_ar: ["تم التعديل بواسطة", "المستخدم المعدل"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the record"
    synonyms_en: ["created by", "record owner"]
    synonyms_ar: ["أنشأ بواسطة", "مالك السجل"]

  - name: "docstatus"
    type: "INT(1)"
    description: "Document status indicator (0 = Draft, 1 = Submitted, 2 = Cancelled)"
    synonyms_en: ["document status", "status code"]
    synonyms_ar: ["حالة المستند", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    description: "Index position of the item in the POS Invoice"
    synonyms_en: ["index", "sequence number", "item position"]
    synonyms_ar: ["فهرس", "ترتيب العنصر"]

  - name: "barcode"
    type: "VARCHAR(140)"
    description: "Barcode associated with the item for scanning purposes"
    synonyms_en: ["barcode", "product code", "scan code"]
    synonyms_ar: ["الرمز الشريطي", "رمز المنتج"]

  - name: "has_item_scanned"
    type: "INT(1)"
    description: "Indicates if the item was added through barcode scanning (1 = Yes, 0 = No)"
    synonyms_en: ["item scanned", "scanned flag"]
    synonyms_ar: ["تم المسح بالباركود", "علم المسح"]

  - name: "item_code"
    type: "VARCHAR(140)"
    description: "Unique code representing the item in the inventory"
    synonyms_en: ["item code", "product code", "sku"]
    synonyms_ar: ["رمز العنصر", "رمز المنتج", "رمز المخزون"]
    join_hint: tabPOS Invoice Item.item_code = tabItem.name

  - name: "item_name"
    type: "VARCHAR(140)"
    description: "Display name or label of the item"
    synonyms_en: ["item name", "product name", "item title"]
    synonyms_ar: ["اسم العنصر", "اسم المنتج"]

  - name: "customer_item_code"
    type: "VARCHAR(140)"
    description: "Item code as specified by the customer (if applicable)"
    synonyms_en: ["customer item code", "client item code"]
    synonyms_ar: ["رمز العنصر الخاص بالعميل", "رمز العميل"]

  - name: "description"
    type: "LONGTEXT"
    description: "Detailed description of the item or its specifications"
    synonyms_en: ["item description", "product details", "item info"]
    synonyms_ar: ["وصف العنصر", "تفاصيل المنتج"]

  - name: "item_group"
    type: "VARCHAR(140)"
    description: "Group or category under which the item falls"
    synonyms_en: ["item group", "product category", "item category"]
    synonyms_ar: ["مجموعة العناصر", "فئة المنتج", "تصنيف العنصر"]
    join_hint: tabPOS Invoice Item.item_group = tabItem Group.name
  - name: "brand"
    type: "VARCHAR(140)"
    description: "Brand name of the product or item"
    synonyms_en: ["brand name", "product brand", "manufacturer"]
    synonyms_ar: ["العلامة التجارية", "المُصنِّع"]

  - name: "image"
    type: "TEXT"
    description: "Image or URL of the product associated with this line item"
