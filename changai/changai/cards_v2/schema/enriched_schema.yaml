    - Use `net_rate` / `net_amount` when you need post-discount values; use `base_*` for company currency.
    - When grouping analytics, prefer dimensions like `item_group`, `brand`, `warehouse`, `project`, `cost_center`.
    - Serial/Batch scenarios: rely on `serial_no`, `batch_no`, and `serial_and_batch_bundle`.
    - Delivery/fulfillment context: `delivery_note`, `delivered_qty`, links to SO (`sales_order`, `so_detail`) and POS (`pos_invoice`, `pos_invoice_item`).
    - Pricing sources: `price_list_rate`, `pricing_rules`, `discount_%/amount`, and margin fields determine final `rate`/`amount`.

