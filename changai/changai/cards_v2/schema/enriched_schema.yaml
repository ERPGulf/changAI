- table: "tabEmployee"
  synonyms_en:
  - "employee"
  - "employee master"
  - "hr employee"

  description: >
    Stores employee master data including personal info, employment details,
    status, contact information, and HR metadata. Use only when the question
    is about employees, staff, HR, attendance, payroll, or worker details.

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Primary key for employee record"

  - name: "creation"
    type: "DATETIME"
    role: ["metadata"]
    description: "Creation timestamp"

  - name: "modified"
    type: "DATETIME"
    role: ["metadata"]
    description: "Last modified timestamp"

  - name: "modified_by"
    type: "VARCHAR"
    role: ["metadata"]
    description: "User who last modified"

  - name: "owner"
    type: "VARCHAR"
    role: ["metadata"]
    description: "Record creator"

  - name: "docstatus"
    type: "INT"
    role: ["metadata"]
    description: "Document status"

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Internal ordering index"

  - name: "employee"
    type: "VARCHAR"
    role: ["business_key"]
    description: "Employee code or number"

  - name: "naming_series"
    type: "VARCHAR"
    role: ["metadata"]
    description: "Naming series"

    options:
    - HR-EMP-
  - name: "first_name"
    type: "VARCHAR"
    role: ["personal_info"]
    description: "First name"

  - name: "middle_name"
    type: "VARCHAR"
    role: ["personal_info"]
    description: "Middle name"

  - name: "last_name"
    type: "VARCHAR"
    role: ["personal_info"]
    description: "Last name"

  - name: "employee_name"
    type: "VARCHAR"
    role: ["display"]
    description: "Full employee name"

  - name: "gender"
    type: "VARCHAR"
    role: ["demographic"]
    description: "Gender"
    options:
    - Male
    - Female
    - Other
    join_hint: "tabEmployee.gender = tabGender.name"

  - name: "date_of_birth"
    type: "DATE"
    role: ["personal_info"]
    description: "Date of birth"

  - name: "salutation"
    type: "VARCHAR"
    role: ["personal_info"]
    description: "Title or honorific"
    join_hint: "tabEmployee.salutation = tabSalutation.name"

  - name: "date_of_joining"
    type: "DATE"
    role: ["employment"]
    description: "Joining date"

  - name: "image"
    type: "TEXT"
    role: ["media"]
    description: "Profile image"


  - name: "status"
    type: "VARCHAR"
    role: ["status"]
    description: "Employment status"
    options:
    - Active
    - Inactive
    - Suspended
    - Left

  - name: "user_id"
    type: "VARCHAR"
    role: ["security"]
    description: "Linked system user"
    join_hint: "tabEmployee.user_id = tabUser.name"

  - name: "create_user_permission"
    type: "INT"
    role: ["security"]
    description: "Flag to auto-create user permissions"

  - name: "company"
    type: "VARCHAR"
    role: ["dimension"]
    description: "Employee's company"
    join_hint: "tabEmployee.company = tabCompany.name"

  - name: "department"
    type: "VARCHAR"
    role: ["dimension"]
    description: "Employee's department"
    join_hint: "tabEmployee.department = tabDepartment.name"

  - name: "employee_number"
    type: "VARCHAR"
    role: ["business_key"]
    description: "Alternate employee number"

  - name: "designation"
    type: "VARCHAR"
    role: ["position"]
    description: "Job title"
    join_hint: "tabEmployee.designation = tabDesignation.name"

  - name: "reports_to"
    type: "VARCHAR"
    role: ["relation"]
    description: "Manager or supervisor"
    join_hint: "tabEmployee.reports_to = tabEmployee.name"

  - name: "branch"
    type: "VARCHAR"
    role: ["location"]
    description: "Branch location"
    join_hint: "tabEmployee.branch = tabBranch.name"

  - name: "scheduled_confirmation_date"
    type: "DATE"
    role: ["hr_process"]
    description: "Scheduled confirmation date"

  - name: "final_confirmation_date"
    type: "DATE"
    role: ["hr_process"]
    description: "Final confirmation date"

  - name: "contract_end_date"
    type: "DATE"
    role: ["employment"]
    description: "Contract end date"

  - name: "notice_number_of_days"
    type: "INT"
    role: ["hr_policy"]
    description: "Notice period days"

  - name: "date_of_retirement"
    type: "DATE"
    role: ["employment"]
    description: "Retirement date"

  - name: "cell_number"
    type: "VARCHAR"
    role: ["contact"]
    description: "Mobile number"

  - name: "personal_email"
    type: "VARCHAR"
    role: ["contact"]
    description: "Personal email"

  - name: "company_email"
    type: "VARCHAR"
    role: ["contact"]
    description: "Company email"

  - name: "prefered_contact_email"
    type: "VARCHAR"
    role: ["preference"]
    description: "Preferred email type"
    options:
    - Company Email
    - Personal Email
    - User ID


  - name: "prefered_email"
    type: "VARCHAR"
    role: ["preference"]
    description: "Preferred email address"

  - name: "unsubscribed"
    type: "INT"
    role: ["communication"]
    description: "Email unsubscribe flag"

  - name: "current_address"
    type: "TEXT"
    role: ["address"]
    description: "Current address"

  - name: "current_accommodation_type"
    type: "VARCHAR"
    role: ["address"]
    description: "Current accommodation type"
    options:
    - Rented
    - Owned

  - name: "permanent_address"
    type: "TEXT"
    role: ["address"]
    description: "Permanent address"

  - name: "permanent_accommodation_type"
    type: "VARCHAR"
    role: ["address"]
    description: "Permanent accommodation type"
    options:
    - Rented
    - Owned

  - name: "person_to_be_contacted"
    type: "VARCHAR"
    role: ["emergency_contact"]
    description: "Emergency contact person"

  - name: "emergency_phone_number"
    type: "VARCHAR"
    role: ["emergency_contact"]
    description: "Emergency phone number"

  - name: "relation"
    type: "VARCHAR"
    role: ["emergency_contact"]
    description: "Emergency contact relation"

  - name: "attendance_device_id"
    type: "VARCHAR"
    role: ["integration"]
    description: "Attendance device ID"

  - name: "holiday_list"
    type: "VARCHAR"
    role: ["hr_policy"]
    description: "Assigned holiday list"
    join_hint: "tabEmployee.holiday_list = `tabHoliday List`.name"

  - name: "ctc"
    type: "DECIMAL"
    role: ["salary"]
    description: "Cost to company"

  - name: "salary_currency"
    type: "VARCHAR"
    role: ["salary"]
    description: "Salary currency"
    join_hint: "tabEmployee.salary_currency = tabCurrency.name"

  - name: "salary_mode"
    type: "VARCHAR"
    role: ["salary"]
    description: "Salary payment mode"
    options:
    - Bank
    - Cash
    - Cheque

  - name: "bank_name"
    type: "VARCHAR"
    role: ["banking"]
    description: "Bank name"

  - name: "bank_ac_no"
    type: "VARCHAR"
    role: ["banking"]
    description: "Bank account number"

  - name: "iban"
    type: "VARCHAR"
    role: ["banking"]
    description: "IBAN number"

  - name: "marital_status"
    type: "VARCHAR"
    role: ["demographic"]
    description: "Marital status"
    options:
    - Single
    - Married
    - Divorced
    - Widowed

  - name: "family_background"
    type: "TEXT"
    role: ["hr_notes"]
    description: "Family background"

  - name: "blood_group"
    type: "VARCHAR"
    role: ["health"]
    description: "Blood group"
    options:
    - A+
    - A-
    - B+
    - B-
    - AB+
    - AB-
    - O+
    - O-

  - name: "health_details"
    type: "TEXT"
    role: ["health"]
    description: "Health details"

  - name: "passport_number"
    type: "VARCHAR"
    role: ["travel"]
    description: "Passport number"

  - name: "valid_upto"
    type: "DATE"
    role: ["travel"]
    description: "Passport validity date"

  - name: "date_of_issue"
    type: "DATE"
    role: ["travel"]
    description: "Passport issue date"

  - name: "place_of_issue"
    type: "VARCHAR"
    role: ["travel"]
    description: "Passport issue place"

  - name: "bio"
    type: "LONGTEXT"
    role: ["notes"]
    description: "Employee biography"

  - name: "resignation_letter_date"
    type: "DATE"
    role: ["exit"]
    description: "Resignation letter date"

  - name: "relieving_date"
    type: "DATE"
    role: ["exit"]
    description: "Relieving date"

  - name: "held_on"
    type: "DATE"
    role: ["exit"]
    description: "Exit interview date"

  - name: "new_workplace"
    type: "VARCHAR"
    role: ["exit"]
    description: "Next employer"

  - name: "leave_encashed"
    type: "VARCHAR"
    role: ["benefits"]
    description: "Leave encashment flag"
    options:
    - Yes
    - No

  - name: "encashment_date"
    type: "DATE"
    role: ["benefits"]
    description: "Encashment date"

  - name: "reason_for_leaving"
    type: "TEXT"
    role: ["exit"]
    description: "Reason for leaving"

  - name: "feedback"
    type: "TEXT"
    role: ["exit"]
    description: "Exit feedback"

  - name: "lft"
    type: "INT"
    role: ["system"]
    description: "Nested set left index"

  - name: "rgt"
    type: "INT"
    role: ["system"]
    description: "Nested set right index"

  - name: "old_parent"
    type: "VARCHAR"
    role: ["system"]
    description: "Previous parent node"



- table: "tabCustomer"
  synonyms_en:
  - "customer"
  - "client"
  - "buyer"
  - "customer master"

  description: >
    Stores customer master data: identity, classification, contact details, and
    financial defaults. Use for any question about customers, clients, buyers,
    or customer-wise sales, balances, or invoices.

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique customer ID / primary key"
    synonyms_en:
    - "customer id"
    - "customer code"

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Record creation timestamp"

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Last modified timestamp"

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified the record"

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created the record"

  - name: "docstatus"
    type: "INT"
    role: ["lifecycle"]
    description: "Document status (0=Draft, 1=Active, 2=Cancelled)"

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Internal row index"

  - name: "naming_series"
    type: "VARCHAR"
    role: ["system"]
    description: "Naming series for customer ID"

    options: &id006
    - CUST-.YYYY.-
  - name: "salutation"
    type: "VARCHAR"
    role: ["attribute"]
    description: "Title (Mr., Ms., Dr., etc.)"
    join_hint: "tabCustomer.salutation = tabSalutation.name"

  - name: "customer_name"
    type: "VARCHAR"
    role: ["party", "dimension"]
    description: "Display name of the customer"

  - name: "customer_type"
    type: "VARCHAR"
    role: ["classification"]
    description: "Type of customer"
    options:
    - Company
    - Individual
    - Partnership

  - name: "customer_group"
    type: "VARCHAR"
    role: ["classification"]
    description: "Customer group or category"
    join_hint: "tabCustomer.customer_group = `tabCustomer Group`.name"

  - name: "territory"
    type: "VARCHAR"
    role: ["dimension"]
    description: "Region or territory of the customer"
    join_hint: "tabCustomer.territory = tabTerritory.name"

  - name: "gender"
    type: "VARCHAR"
    role: ["attribute"]
    description: "Gender (if applicable)"
    join_hint: "tabCustomer.gender = tabGender.name"

  - name: "lead_name"
    type: "VARCHAR"
    role: ["relation"]
    description: "Linked lead from which this customer was created"
    join_hint: "tabCustomer.lead_name = tabLead.name"

  - name: "opportunity_name"
    type: "VARCHAR"
    role: ["relation"]
    description: "Linked opportunity record"
    join_hint: "tabCustomer.opportunity_name = tabOpportunity.name"

  - name: "prospect_name"
    type: "VARCHAR"
    role: ["relation"]
    description: "Linked prospect record"
    join_hint: "tabCustomer.prospect_name = tabProspect.name"

  - name: "account_manager"
    type: "VARCHAR"
    role: ["personnel"]
    description: "Assigned account / relationship manager"
    join_hint: "tabCustomer.account_manager = tabUser.name"

  - name: "image"
    type: "TEXT"
    role: ["media"]
    description: "Customer image or logo"

  - name: "default_currency"
    type: "VARCHAR"
    role: ["finance"]
    description: "Default transaction currency for this customer"
    join_hint: "tabCustomer.default_currency = tabCurrency.name"

  - name: "default_bank_account"
    type: "VARCHAR"
    role: ["finance"]
    description: "Default bank account linked to the customer"
    join_hint: "tabCustomer.default_bank_account = `tabBank Account`.name"

  - name: "default_price_list"
    type: "VARCHAR"
    role: ["finance"]
    description: "Default price list for sales"
    join_hint: "tabCustomer.default_price_list = `tabPrice List`.name"

  - name: "is_internal_customer"
    type: "INT"
    role: ["flag"]
    description: "1 if internal customer, 0 otherwise"

  - name: "represents_company"
    type: "VARCHAR"
    role: ["relation"]
    description: "Company represented by this customer"
    join_hint: "tabCustomer.represents_company = tabCompany.name"

  - name: "market_segment"
    type: "VARCHAR"
    role: ["classification"]
    description: "Market segment or sector"
    join_hint: "tabCustomer.market_segment = tabMarket Segment.name"

  - name: "industry"
    type: "VARCHAR"
    role: ["classification"]
    description: "Industry or line of business"
    join_hint: "tabCustomer.industry = tabIndustry.name"

  - name: "customer_pos_id"
    type: "VARCHAR"
    role: ["integration"]
    description: "Customer ID in POS system"

  - name: "website"
    type: "VARCHAR"
    role: ["contact"]
    description: "Customer website URL"

  - name: "language"
    type: "VARCHAR"
    role: ["communication"]
    description: "Preferred communication language"
    join_hint: "tabCustomer.language = tabLanguage.name"

  - name: "customer_details"
    type: "TEXT"
    role: ["notes"]
    description: "Additional details or remarks"

  - name: "customer_primary_address"
    type: "VARCHAR"
    role: ["relation"]
    description: "Linked primary address record ID"
    join_hint: "tabCustomer.customer_primary_address = tabAddress.name"

  - name: "primary_address"
    type: "TEXT"
    role: ["contact"]
    description: "Primary address text"

  - name: "customer_primary_contact"
    type: "VARCHAR"
    role: ["relation"]
    description: "Linked primary contact record ID"
    join_hint: "tabCustomer.customer_primary_contact = tabContact.name"

  - name: "mobile_no"
    type: "VARCHAR"
    role: ["contact"]
    description: "Primary mobile number"

  - name: "email_id"
    type: "VARCHAR"
    role: ["contact"]
    description: "Primary email address"

  - name: "tax_id"
    type: "VARCHAR"
    role: ["finance"]
    description: "Tax identification / VAT number"

  - name: "tax_category"
    type: "VARCHAR"
    role: ["finance"]
    description: "Tax category for this customer"
    join_hint: "tabCustomer.tax_category = `tabTax Category`.name"

  - name: "tax_withholding_category"
    type: "VARCHAR"
    role: ["finance"]
    description: "Tax withholding category"
    join_hint: "tabCustomer.tax_withholding_category = `tabTax Withholding Category`.name"

  - name: "payment_terms"
    type: "VARCHAR"
    role: ["finance"]
    description: "Default payment terms"
    join_hint: "tabCustomer.payment_terms = `tabPayment Terms Template`.name"

  - name: "loyalty_program"
    type: "VARCHAR"
    role: ["marketing"]
    description: "Loyalty program the customer is enrolled in"
    join_hint: "tabCustomer.loyalty_program = `tabLoyalty Program`.name"

  - name: "loyalty_program_tier"
    type: "VARCHAR"
    role: ["marketing"]
    description: "Tier/level in the loyalty program"

  - name: "default_sales_partner"
    type: "VARCHAR"
    role: ["relation"]
    description: "Default sales partner for this customer"
    join_hint: "tabCustomer.default_sales_partner = `tabSales Partner`.name"

  - name: "default_commission_rate"
    type: "DECIMAL"
    role: ["finance"]
    description: "Default sales commission rate (%)"

  - name: "so_required"
    type: "INT(1)"
    role: ["requirement", "flag"]
    description: "1 if Sales Order is required before invoicing"

  - name: "dn_required"
    type: "INT(1)"
    role: ["requirement", "flag"]
    description: "1 if Delivery Note is required before invoicing"

  - name: "is_frozen"
    type: "INT(1)"
    role: ["status"]
    description: "1 if the customer record is frozen"

  - name: "disabled"
    type: "INT(1)"
    role: ["status"]
    description: "1 if customer is disabled / inactive"

  - name: "zatca_customer_name_in_arabic"
    type: "VARCHAR(140)"
    role: ["localization", "name"]
    description: "Customer name in Arabic (ZATCA compliance)"

  - name: "custom_b2c"
    type: "INT(1)"
    role: ["classification"]
    description: "1 if B2C customer"

  - name: "custom_buyer_id_type"
    type: "VARCHAR(140)"
    role: ["identity", "tax"]
    description: "Buyer ID type (TIN, CRN, National ID, etc.)"
    options:
    - CRN
    - TIN
    - MOM
    - MLS
    - "700"
    - SAG
    - NAT
    - GCC
    - IQA
    - PAS
    - OTH

  - name: "custom_buyer_id"
    type: "VARCHAR(140)"
    role: ["identity"]
    description: "Buyer ID number for ZATCA compliance"

- table: "tabPurchase Invoice Item"
  synonyms_en:
  - "purchase invoice item"
  - "purchase bill line"
  - "invoice line item"

  description: >
    Line items of a Purchase Invoice, storing item, quantity, pricing, tax, and
    cost information for each supplier bill row.

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique ID for the purchase invoice item record."

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Creation timestamp."

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Last modified timestamp."

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified the record."

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created the record."

  - name: "docstatus"
    type: "INT"
    role: ["system"]
    description: "Document status (0=Draft, 1=Submitted, 2=Cancelled)."

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Row index within the Purchase Invoice."

  - name: "item_code"
    type: "VARCHAR"
    role: ["inventory", "foreign_key"]
    description: "Code of the purchased item."
    join_hint: "tabPurchase Invoice Item.item_code = tabItem.name"

  - name: "product_bundle"
    type: "VARCHAR"
    role: ["inventory"]
    description: "Product bundle reference, if part of a bundle."
    join_hint: "tabPurchase Invoice Item.product_bundle = `tabProduct Bundle`.name"

  - name: "item_name"
    type: "VARCHAR"
    role: ["inventory"]
    description: "Name of the purchased item."

  - name: "description"
    type: "LONGTEXT"
    role: ["inventory", "info"]
    description: "Detailed description of the item."

  - name: "brand"
    type: "VARCHAR"
    role: ["inventory"]
    description: "Brand of the item."
    join_hint: "tabPurchase Invoice Item.brand = tabBrand.name"

  - name: "item_group"
    type: "VARCHAR"
    role: ["inventory", "categorization"]
    description: "Item group or category."
    join_hint: "tabPurchase Invoice Item.item_group = `tabItem Group`.name"

  - name: "image"
    type: "TEXT"
    role: ["inventory", "info"]
    description: "Image reference or URL for the item."

  - name: "received_qty"
    type: "DECIMAL(21,9)"
    role: ["inventory", "quantity"]
    description: "Quantity received against this invoice."

  - name: "qty"
    type: "DECIMAL(21,9)"
    role: ["inventory", "quantity"]
    description: "Quantity in the invoice."

  - name: "rejected_qty"
    type: "DECIMAL(21,9)"
    role: ["inventory", "quality_control"]
    description: "Quantity rejected upon receipt."

  - name: "uom"
    type: "VARCHAR"
    role: ["inventory", "measurement"]
    description: "Unit of measure in the invoice."
    join_hint: "tabPurchase Invoice Item.uom = tabUOM.name"


  - name: "conversion_factor"
    type: "DECIMAL(21,9)"
    role: ["inventory", "conversion"]
    description: "Factor between invoice UOM and stock UOM."

  - name: "stock_uom"
    type: "VARCHAR"
    role: ["inventory", "measurement"]
    description: "Stock unit of measure."
    join_hint: "tabPurchase Invoice Item.stock_uom = tabUOM.name"

  - name: "stock_qty"
    type: "DECIMAL(21,9)"
    role: ["inventory", "quantity"]
    description: "Quantity in stock UOM."

  - name: "price_list_rate"
    type: "DECIMAL(21,9)"
    role: ["pricing"]
    description: "Rate from the purchase price list."

  - name: "base_price_list_rate"
    type: "DECIMAL(21,9)"
    role: ["pricing", "currency"]
    description: "Price list rate in company currency."

  - name: "margin_type"
    type: "VARCHAR"
    role: ["pricing", "margin"]
    description: "Type of margin (Amount or Percentage)."
    options:
    - Percentage
    - Amount

  - name: "margin_rate_or_amount"
    type: "DECIMAL(21,9)"
    role: ["pricing", "margin"]
    description: "Margin rate or amount applied."

  - name: "rate_with_margin"
    type: "DECIMAL(21,9)"
    role: ["pricing"]
    description: "Rate after margin is applied."

  - name: "discount_percentage"
    type: "DECIMAL(21,9)"
    role: ["pricing", "discount"]
    description: "Discount percentage."

  - name: "discount_amount"
    type: "DECIMAL(21,9)"
    role: ["pricing", "discount"]
    description: "Discount amount."

  - name: "distributed_discount_amount"
    type: "DECIMAL(21,9)"
    role: ["pricing", "discount"]
    description: "Discount amount allocated to this item."

  - name: "base_rate_with_margin"
    type: "DECIMAL(21,9)"
    role: ["pricing", "currency"]
    description: "Rate with margin in company currency."

  - name: "rate"
    type: "DECIMAL(21,9)"
    role: ["pricing"]
    description: "Rate per unit in invoice currency."

  - name: "amount"
    type: "DECIMAL(21,9)"
    role: ["pricing", "finance"]
    description: "Amount (rate × qty) in invoice currency."

  - name: "item_tax_template"
    type: "VARCHAR"
    role: ["tax"]
    description: "Tax template applied to this item."
    join_hint: "tabPurchase Invoice Item.item_tax_template = `tabItem Tax Template`.name"

  - name: "base_rate"
    type: "DECIMAL(21,9)"
    role: ["pricing"]
    description: "Rate per unit in company currency."

  - name: "base_amount"
    type: "DECIMAL(21,9)"
    role: ["pricing"]
    description: "Total amount in company currency."

  - name: "pricing_rules"
    type: "TEXT"
