    role: ["attribute"]
    description: "Additional delivery instructions"
    synonyms_en: ["instructions", "delivery instructions"]
    synonyms_ar: ["التعليمات"]

  - name: "_user_tags"
    type: "TEXT"
    role: ["system"]
    description: "User-defined tags stored for the document"
    synonyms_en: ["tags", "user tags"]
    synonyms_ar: ["وسوم المستخدم"]

  - name: "_comments"
    type: "TEXT"
    role: ["system"]
    description: "Comments added to the document"
    synonyms_en: ["comments", "notes"]
    synonyms_ar: ["التعليقات"]

  - name: "_assign"
    type: "TEXT"
    role: ["system"]
    description: "Assignment info showing users responsible for the document"
    synonyms_en: ["assignments", "assign info"]
    synonyms_ar: ["التعيينات"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["system"]
    description: "User list of likes for the document"
    synonyms_en: ["liked by", "likes"]
    synonyms_ar: ["الإعجابات"]

  - name: "_seen"
    type: "TEXT"
    role: ["system"]
    description: "User view-tracking data"
    synonyms_en: ["seen", "viewed by"]
    synonyms_ar: ["تمت رؤيته"]

  notes: |
    - Represents the official record of goods delivered to a customer, reducing stock from warehouses and updating fulfillment status.
    - Drives stock ledger entries based on delivered quantities, valuation rates, and warehouse selections.
    - Links with Sales Orders, allowing partial or complete delivery tracking through fields like per_billed, per_installed, and per_returned.
    - Supports both standard and return delivery flows using is_return and return_against to handle credit notes and reverse postings.
    - Manages all pricing layers including item prices, taxes, discounts, margin adjustments, shipping rules, and multi-currency conversions.

- table: "tabDelivery Note Item"
  synonyms_en:
  - "delivery note item"
  - "delivery item"
  - "items in delivery note"
  - "delivered items"
  - "shipped items"
  - "dispatched items"
  - "goods delivered"
  - "items sent to customer"
  - "delivery line"
  - "delivery line item"

  description: >
    Line-level details of each product or service delivered to the customer via a
    Delivery Note. Stores item, quantity, warehouse, pricing, and links back to
    Sales Orders, Sales Invoices, Pick Lists, and Purchase Orders. Use for questions
    about what was delivered, shipped quantities vs ordered, delivery performance,
    and item-wise dispatch details.

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique Delivery Note Item row ID / primary key."

  - name: "parent"
    type: "VARCHAR"
    role: ["link", "header"]
    description: "Linked Delivery Note ID. Joins to `tabDelivery Note`.`name`."
    join_hint:
      table: "tabDelivery Note"
      on: "parent = tabDelivery Note.name"

  - name: "parenttype"
    type: "VARCHAR"
    role: ["meta"]
    description: "Parent doctype (normally `Delivery Note`)."

  - name: "parentfield"
    type: "VARCHAR"
    role: ["meta"]
    description: "Internal field name used to link this child row to its parent."

  - name: "item_code"
    type: "VARCHAR"
    role: ["link", "item"]
    description: "Item being delivered. Links to `tabItem`.`name`."
    join_hint:
      table: "tabItem"
      on: "item_code = tabItem.name"

  - name: "item_name"
    type: "VARCHAR"
    role: ["label"]
    description: "Readable item name shown on the Delivery Note."

  - name: "customer_item_code"
    type: "VARCHAR"
    role: ["customer_ref"]
    description: "Customer-specific item code or reference."

  - name: "description"
    type: "LONGTEXT"
    role: ["text"]
    description: "Full description printed on the Delivery Note for this item."

  - name: "item_group"
    type: "VARCHAR"
    role: ["category"]
    description: "Item group / category for reporting and analysis."

    join_hint: tabDelivery Note Item.item_group = tabItem Group.name
  - name: "brand"
    type: "VARCHAR"
    role: ["brand"]
    description: "Brand of the item, useful for brand-wise delivery analysis."

    join_hint: tabDelivery Note Item.brand = tabBrand.name
  - name: "barcode"
    type: "VARCHAR"
    role: ["barcode"]
    description: "Barcode scanned/used for this item, if any."

  - name: "has_item_scanned"
    type: "INT"
    role: ["flag"]
    description: "Indicates whether the item was scanned using a barcode."

  - name: "qty"
    type: "DECIMAL"
    role: ["qty", "delivered"]
    description: "Delivered quantity in the delivery UOM."

  - name: "returned_qty"
    type: "DECIMAL"
    role: ["qty", "returned"]
    description: "Quantity returned against this delivery line."

  - name: "uom"
    type: "VARCHAR"
    role: ["uom"]
    description: "UOM used on the Delivery Note (e.g., Nos, Box)."

    join_hint: tabDelivery Note Item.uom = tabUOM.name
  - name: "stock_uom"
    type: "VARCHAR"
    role: ["uom", "stock"]
    description: "Base stock UOM in which stock is maintained."

    join_hint: tabDelivery Note Item.stock_uom = tabUOM.name
  - name: "conversion_factor"
    type: "DECIMAL"
    role: ["conversion"]
    description: "Conversion factor from Delivery UOM to Stock UOM."

  - name: "stock_qty"
    type: "DECIMAL"
    role: ["qty", "stock"]
    description: "Delivered quantity expressed in Stock UOM (`qty * conversion_factor`)."

  - name: "price_list_rate"
    type: "DECIMAL"
    role: ["rate", "pricing"]
    description: "Standard price list rate for this item in transaction currency."

  - name: "base_price_list_rate"
    type: "DECIMAL"
    role: ["rate", "pricing", "base"]
    description: "Price list rate converted to company (base) currency."

  - name: "discount_percentage"
    type: "DECIMAL"
    role: ["discount"]
    description: "Discount percentage applied to this line."

  - name: "discount_amount"
    type: "DECIMAL"
    role: ["discount", "amount"]
    description: "Discount amount applied to this delivery line."

  - name: "distributed_discount_amount"
    type: "DECIMAL"
    role: ["discount", "amount"]
    description: "Distributed discount share from document-level discounts."

  - name: "rate"
    type: "DECIMAL"
    role: ["rate", "pricing"]
    description: "Final selling rate per unit after discount in transaction currency."

  - name: "amount"
    type: "DECIMAL"
    role: ["amount", "revenue"]
    description: "Line amount = `qty * rate` in transaction currency."

  - name: "base_rate"
    type: "DECIMAL"
    role: ["rate", "base"]
    description: "Final rate per unit in company currency."

  - name: "base_amount"
    type: "DECIMAL"
    role: ["amount", "base"]
    description: "Line amount in company currency."

  - name: "net_rate"
    type: "DECIMAL"
    role: ["rate", "net"]
    description: "Net rate after all discounts, excluding taxes."

  - name: "net_amount"
    type: "DECIMAL"
    role: ["amount", "net"]
    description: "Net line amount after discounts, excluding taxes."

  - name: "base_net_rate"
    type: "DECIMAL"
    role: ["rate", "net", "base"]
    description: "Net rate in company currency."

  - name: "base_net_amount"
    type: "DECIMAL"
    role: ["amount", "net", "base"]
    description: "Net amount in company currency."

  - name: "item_tax_template"
    type: "VARCHAR"
    role: ["tax"]
    description: "Item-level tax template (if used via Delivery Note settings)."

    join_hint: tabDelivery Note Item.item_tax_template = tabItem Tax Template.name
  - name: "item_tax_rate"
    type: "TEXT"
    role: ["tax", "json"]
    description: "Serialized tax rate mapping for this delivery line."

  - name: "is_free_item"
    type: "INT"
    role: ["flag", "promotion"]
    description: "Marks whether this is a free-of-charge promotional item."

  - name: "grant_commission"
    type: "INT"
    role: ["flag", "commission"]
    description: "Indicates whether this item qualifies for sales commission."

  - name: "stock_uom_rate"
    type: "DECIMAL"
    role: ["rate", "stock"]
    description: "Rate per stock UOM, useful when UOM differs from stock UOM."

  - name: "incoming_rate"
    type: "DECIMAL"
    role: ["cost", "valuation"]
    description: "Incoming valuation rate used in stock accounting for this delivery."

  - name: "warehouse"
    type: "VARCHAR"
    role: ["warehouse", "source"]
    description: "Warehouse from which goods are delivered. Joins to `tabWarehouse`.`name`."
    join_hint:
      table: "tabWarehouse"
      on: "warehouse = tabWarehouse.name"

  - name: "target_warehouse"
    type: "VARCHAR"
    role: ["warehouse", "target"]
    description: "Target warehouse for internal transfers (if applicable)."
    join_hint:
      table: "tabWarehouse"
      on: "target_warehouse = tabWarehouse.name"

  - name: "weight_per_unit"
    type: "DECIMAL"
    role: ["weight"]
    description: "Weight per unit of the item."

  - name: "total_weight"
    type: "DECIMAL"
    role: ["weight"]
    description: "Total weight for this line (`qty * weight_per_unit`)."

  - name: "weight_uom"
    type: "VARCHAR"
    role: ["uom", "weight"]
    description: "UOM for weight (e.g., Kg, g)."

    join_hint: tabDelivery Note Item.weight_uom = tabUOM.name
  - name: "quality_inspection"
    type: "VARCHAR"
    role: ["quality"]
    description: "Linked Quality Inspection document, if any."
    join_hint:
      table: "tabQuality Inspection"
      on: "quality_inspection = tabQuality Inspection.name"

  - name: "allow_zero_valuation_rate"
    type: "INT"
    role: ["flag"]
    description: "Allows posting with zero valuation rate for this item."

  - name: "against_sales_order"
    type: "VARCHAR"
    role: ["link", "sales_order"]
    description: "Linked Sales Order from which this Delivery Note was created."
    join_hint:
      table: "tabSales Order"
      on: "against_sales_order = tabSales Order.name"

  - name: "so_detail"
    type: "VARCHAR"
    role: ["link", "sales_order_item"]
    description: "Linked Sales Order Item row corresponding to this delivery line."
    join_hint:
      table: "tabSales Order Item"
      on: "so_detail = tabSales Order Item.name"

  - name: "against_sales_invoice"
    type: "VARCHAR"
    role: ["link", "sales_invoice"]
    description: "Linked Sales Invoice, if delivery is based on an invoice."
    join_hint:
      table: "tabSales Invoice"
      on: "against_sales_invoice = tabSales Invoice.name"

  - name: "si_detail"
    type: "VARCHAR"
    role: ["link", "sales_invoice_item"]
    description: "Linked Sales Invoice Item row."
    join_hint:
      table: "tabSales Invoice Item"
      on: "si_detail = tabSales Invoice Item.name"

  - name: "dn_detail"
    type: "VARCHAR"
    role: ["link"]
    description: "Reference to another Delivery Note Item row (for returns or adjustments)."
    join_hint:
      table: "tabDelivery Note Item"
      on: "dn_detail = tabDelivery Note Item.name"

  - name: "against_pick_list"
    type: "VARCHAR"
    role: ["link", "pick_list"]
    description: "Linked Pick List used to pick this item before delivery."
    join_hint:
      table: "tabPick List"
      on: "against_pick_list = tabPick List.name"

  - name: "pick_list_item"
    type: "VARCHAR"
    role: ["link", "pick_list_item"]
    description: "Linked Pick List Item row."
    join_hint:
      table: "tabPick List Item"
      on: "pick_list_item = tabPick List Item.name"

  - name: "serial_and_batch_bundle"
    type: "VARCHAR"
    role: ["serial", "batch"]
    description: "Reference bundle that stores combined serial and batch details."
    join_hint:
      table: "tabSerial and Batch Bundle"
      on: "serial_and_batch_bundle = tabSerial and Batch Bundle.name"

  - name: "use_serial_batch_fields"
    type: "INT"
    role: ["flag", "serial", "batch"]
    description: "Indicates whether serial_no and batch_no fields are used directly."

  - name: "serial_no"
    type: "TEXT"
    role: ["serial"]
    description: "Serial numbers delivered for this item."

  - name: "batch_no"
    type: "VARCHAR"
    role: ["batch"]
    description: "Batch number from which the item was delivered."
    join_hint:
      table: "tabBatch"
      on: "batch_no = tabBatch.name"

  - name: "actual_qty"
    type: "DECIMAL"
    role: ["qty", "stock"]
    description: "Actual stock quantity at the warehouse at time of posting."

  - name: "actual_batch_qty"
    type: "DECIMAL"
    role: ["qty", "batch"]
    description: "Actual available quantity in the batch at the time of posting."

  - name: "company_total_stock"
    type: "DECIMAL"
    role: ["qty", "stock"]
    description: "Company-wide total stock for this item at the time of posting."

  - name: "received_qty"
    type: "DECIMAL"
    role: ["qty"]
    description: "Received quantity in certain flows (e.g., returns or transfers)."

  - name: "installed_qty"
    type: "DECIMAL"
    role: ["qty", "installation"]
    description: "Quantity installed at the customer (for installable items)."

  - name: "packed_qty"
    type: "DECIMAL"
    role: ["qty", "packing"]
    description: "Quantity packed for this delivery, if using Packing Slip."

  - name: "expense_account"
    type: "VARCHAR"
    role: ["account"]
    description: "Expense account linked to this delivery item, used in accounting."
    join_hint:
      table: "tabAccount"
      on: "expense_account = tabAccount.name"

  - name: "material_request"
    type: "VARCHAR"
    role: ["link"]
    description: "Linked Material Request from which this delivery originated."
    join_hint:
      table: "tabMaterial Request"
      on: "material_request = tabMaterial Request.name"

  - name: "material_request_item"
    type: "VARCHAR"
    role: ["link"]
    description: "Linked Material Request Item row."
    join_hint:
      table: "tabMaterial Request Item"
      on: "material_request_item = tabMaterial Request Item.name"

  - name: "purchase_order"
    type: "VARCHAR"
    role: ["link"]
    description: "Linked Purchase Order, common in drop-shipping scenarios."
    join_hint:
      table: "tabPurchase Order"
      on: "purchase_order = tabPurchase Order.name"

  - name: "purchase_order_item"
    type: "VARCHAR"
    role: ["link"]
    description: "Linked Purchase Order Item row."
    join_hint:
      table: "tabPurchase Order Item"
      on: "purchase_order_item = tabPurchase Order Item.name"

  - name: "project"
    type: "VARCHAR"
    role: ["project"]
    description: "Linked project for project-wise delivery tracking."
    join_hint:
      table: "tabProject"
      on: "project = tabProject.name"

  - name: "cost_center"
    type: "VARCHAR"
    role: ["cost_center"]
    description: "Cost center for allocating costs/revenue of this delivery."
    join_hint:
      table: "tabCost Center"
      on: "cost_center = tabCost Center.name"

  - name: "page_break"
    type: "INT"
    role: ["layout"]
    description: "Adds a page break before this item on print formats."

  - name: "owner"
    type: "VARCHAR"
    role: ["meta"]
    description: "User who created the record."

  - name: "modified_by"
    type: "VARCHAR"
    role: ["meta"]
    description: "User who last modified the record."

  - name: "creation"
    type: "DATETIME"
    role: ["meta"]
    description: "Record creation timestamp."

  - name: "modified"
    type: "DATETIME"
    role: ["meta"]
    description: "Last modified timestamp."

  notes: |
    - Child table of `tabDelivery Note` storing delivered item details.
    - Key joins: `parent` → Delivery Note, `item_code` → Item, `warehouse` → Warehouse,
      `against_sales_order` → Sales Order, `so_detail` → Sales Order Item.
    - Useful for delivery qty, return qty, and warehouse/batch/serial tracking.

- table: "tabJournal Entry"
  synonyms_en:
  - "journal entry"
  - "je"
  - "manual accounting entry"
  - "adjustment entry"
  - "accounting journal"
  - "financial journal"

  description: >
    Main accounting document used to record manual or system-generated journal postings
    such as adjustments, accruals, write-offs, inter-company entries, and miscellaneous
    debit/credit transactions.

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique Journal Entry ID."

  - name: "posting_date"
    type: "DATE"
    role: ["date"]
    description: "Posting date for the journal entry."

  - name: "company"
    type: "VARCHAR"
    role: ["company"]
    description: "Company for which the entry is posted."
    join_hint:
      table: "tabCompany"
      on: "company = tabCompany.name"

  - name: "voucher_type"
    type: "VARCHAR"
    role: ["type"]
    description: "Type of the journal entry (e.g., Bank Entry, Credit Note)."

    options:
    - Journal Entry
    - Inter Company Journal Entry
    - Bank Entry
    - Cash Entry
    - Credit Card Entry
    - Debit Note
    - Credit Note
    - Contra Entry
    - Excise Entry
    - Write Off Entry
    - Opening Entry
    - Depreciation Entry
    - Exchange Rate Revaluation
    - Exchange Gain Or Loss
    - Deferred Revenue
    - Deferred Expense
  - name: "title"
    type: "VARCHAR"
    role: ["label"]
    description: "User-friendly title or remark."

  - name: "total_debit"
    type: "DECIMAL"
    role: ["amount"]
    description: "Sum of all debit amounts."

  - name: "total_credit"
    type: "DECIMAL"
    role: ["amount"]
    description: "Sum of all credit amounts."

  - name: "difference"
    type: "DECIMAL"
    role: ["amount"]
    description: "Difference between debit and credit (should typically be zero)."

  - name: "multi_currency"
    type: "INT"
    role: ["flag"]
    description: "Indicates whether multiple currencies are used."

  - name: "remark"
    type: "TEXT"
    role: ["text"]
    description: "Narration for the journal entry."

  - name: "cheque_no"
    type: "VARCHAR"
    role: ["ref"]
    description: "Cheque reference number, if applicable."

  - name: "cheque_date"
    type: "DATE"
    role: ["ref"]
    description: "Cheque date."

  - name: "clearance_date"
    type: "DATE"
    role: ["date"]
    description: "Bank clearance date for the cheque."

  - name: "is_system_generated"
    type: "INT"
    role: ["flag"]
    description: "Marks if entry was auto-generated by the system."

  - name: "bill_no"
    type: "VARCHAR"
    role: ["ref"]
    description: "Linked bill or invoice number, if used."

  - name: "user_remark"
    type: "TEXT"
    role: ["text"]
    description: "User-entered remark."

  - name: "creation"
    type: "DATETIME"
    role: ["meta"]
    description: "Record creation timestamp."

  - name: "modified"
    type: "DATETIME"
    role: ["meta"]
    description: "Last modification timestamp."

  notes: |
    - Parent document for JE Items (debits and credits).
    - Key joins: `name` → `tabGL Entry`.`voucher_no`.
    - Used for adjustments, write-offs, corrections, and manual postings.
- table: "tabGL Entry"
  synonyms_en:
  - "gl entry"
  - "ledger entry"
  - "accounting entry"
  - "journal line"
  - "transaction line"
  - "debit credit entry"
  - "account movement"
  - "ledger transaction"

  description: >
    Represents individual accounting ledger postings generated from invoices, payments,
    journal entries, stock entries, and other financial transactions. Each entry records
    debit/credit amounts for an account on a specific posting date.

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique ledger entry ID."

  - name: "posting_date"
    type: "DATE"
    role: ["date", "filter", "primary_date"]
    description: >
      Main accounting date of the document. Use this for time-based filters
      like today, this week, this month, this quarter, this year, last month,
      last year, and any reporting period unless the question explicitly says
      due date.
    synonyms_en:
    - "posting date"
    - "entry date"
    - "date raised"
    - "this month"
    - "this week"
    - "today"
    - "yesterday"
    - "last month"
    - "last year"
    synonyms_ar:
    - "تاريخ الفاتورة"
    - "تاريخ التسجيل"
    - "تاريخ البيع"
    - "تاريخ الشراء"
    - "تاريخ المعاملة"

  - name: "account"
    type: "VARCHAR"
    role: ["account"]
    description: "Account being debited or credited."

    join_hint: tabGL Entry.account = tabAccount.name
  - name: "party_type"
    type: "VARCHAR"
    role: ["party"]
    description: "Party type (Customer, Supplier, Employee, etc.)."

    join_hint: tabGL Entry.party_type = tabDocType.name
  - name: "party"
    type: "VARCHAR"
    role: ["party"]
    description: "Linked party name."

  - name: "voucher_type"
    type: "VARCHAR"
    role: ["source"]
    description: "Document type that created the entry (e.g., Sales Invoice, JE)."

    join_hint: tabGL Entry.voucher_type = tabDocType.name
  - name: "voucher_no"
    type: "VARCHAR"
    role: ["source"]
    description: "Document name that created the entry."

  - name: "debit"
    type: "DECIMAL"
    role: ["amount"]
    description: "Debit amount in company currency."

  - name: "credit"
    type: "DECIMAL"
    role: ["amount"]
    description: "Credit amount in company currency."
  - name: "debit_in_account_currency"
    type: "DECIMAL"
    role: ["amount"]
    description: "Debit amount in account currency."

  - name: "credit_in_account_currency"
    type: "DECIMAL"
    role: ["amount"]
    description: "Credit amount in account currency."

  - name: "transaction_exchange_rate"
    type: "DECIMAL"
    role: ["currency"]
    description: "Exchange rate used."

  - name: "account_currency"
    type: "VARCHAR"
    role: ["currency"]
    description: "Currency of the account."

    join_hint: tabGL Entry.account_currency = tabCurrency.name
  - name: "transaction_currency"
    type: "VARCHAR"
    role: ["currency"]
    description: "Currency of the originating transaction."

    join_hint: tabGL Entry.transaction_currency = tabCurrency.name
  - name: "against"
    type: "TEXT"
    role: ["meta"]
    description: "Comma-separated list of opposite accounts."

  - name: "cost_center"
    type: "VARCHAR"
    role: ["cost_center"]
    description: "Cost center associated with the entry."

    join_hint: tabGL Entry.cost_center = tabCost Center.name
  - name: "project"
    type: "VARCHAR"
    role: ["project"]
    description: "Project linked with the transaction."

    join_hint: tabGL Entry.project = tabProject.name
  - name: "company"
    type: "VARCHAR"
    role: ["company"]
    description: "Company for which the entry is posted."

    join_hint: tabGL Entry.company = tabCompany.name
  - name: "remarks"
    type: "TEXT"
    role: ["text"]
    description: "Narration for the entry."

  - name: "creation"
    type: "DATETIME"
    role: ["meta"]
    description: "Record creation timestamp."

  - name: "modified"
    type: "DATETIME"
    role: ["meta"]
    description: "Last modified timestamp."

  notes: |
    - Core accounting table containing all debit/credit postings.
    - Key joins: `voucher_no` → source document, `account` → Account, `party` → Party.
    - Useful for financial reports, trial balance, ledger views, and audit trails.

- table: "tabPayment Entry Reference"
  synonyms_en:
  - "payment reference"
  - "linked invoice"
  - "payment applied to"
  - "invoice reference"
  - "bill reference"
  - "payment allocation"
  - "payment mapping"
  - "allocation row"

  description: >
    Child table under Payment Entry that stores the invoices, orders, or documents
    to which a payment is allocated. Used for tracking outstanding amounts, allocated
    amounts, due dates, and exchange differences.

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique row ID / primary key."

  - name: "parent"
    type: "VARCHAR"
    role: ["link", "header"]
    description: "Linked Payment Entry ID."

    join_hint: tabPayment Entry Reference.parent = tabPayment Entry.name
  - name: "parenttype"
    type: "VARCHAR"
    role: ["meta"]
    description: "Parent doctype (typically `Payment Entry`)."

  - name: "parentfield"
    type: "VARCHAR"
    role: ["meta"]
    description: "Internal field name linking this row to Payment Entry."

  - name: "reference_doctype"
