    - name: "_liked_by"
      type: "TEXT"
      role: ["system"]
      description: "System field for user likes in JSON format"

  notes: |
    - Stores final debit and credit balances of accounts on the `closing_date`.
    - Generated during **period or year-end closing** via `Period Closing Voucher`.
    - `debit` and `credit` are in company currency; `_in_account_currency` fields show native currency values.
    - Key joins: `account` → `tabAccount`.`name`, `company` → `tabCompany`.`name`.
    - Filter `docstatus = 1` for submitted entries.


