    synonyms_ar: ["الرقم الضريبي", "معرف الضريبة", "رقم ضريبة القيمة المضافة"]

  - name: "tax_category"
    type: "VARCHAR"
    role: ["tax"]
    description: "Tax category applicable to the customer"
    synonyms_en: ["tax category", "tax group", "tax type"]
    synonyms_ar: ["فئة الضريبة", "تصنيف الضريبة", "نوع الضريبة"]
    join_hint: tabCustomer.tax_category = tabTax Category.name

  - name: "tax_withholding_category"
    type: "VARCHAR"
    role: ["tax"]
    description: "Tax withholding category for the customer"
    synonyms_en: ["withholding category", "tax withholding", "TDS category"]
    synonyms_ar: ["فئة حجز الضريبة", "حجز الضريبة", "فئة الاستقطاع"]
    join_hint: tabCustomer.tax_withholding_category = tabTax Withholding Category.name

  - name: "payment_terms"
    type: "VARCHAR"
    role: ["payment", "terms"]
    description: "Default payment terms for this customer"
    synonyms_en: ["payment terms", "credit terms", "terms of payment"]
    synonyms_ar: ["شروط الدفع", "بنود الدفع", "شروط الائتمان"]
    join_hint: tabCustomer.payment_terms = tabPayment Terms Template.name

  - name: "loyalty_program"
    type: "VARCHAR"
    role: ["loyalty", "marketing"]
    description: "Loyalty program assigned to the customer"
    synonyms_en: ["loyalty program", "rewards program", "points program"]
    synonyms_ar: ["برنامج الولاء", "برنامج المكافآت", "نظام النقاط"]
    join_hint: tabCustomer.loyalty_program = tabLoyalty Program.name

  - name: "loyalty_program_tier"
    type: "VARCHAR"
    role: ["loyalty", "tier"]
    description: "Tier level of the loyalty program"
    synonyms_en: ["loyalty tier", "reward level", "membership level"]
    synonyms_ar: ["مستوى الولاء", "مستوى المكافآت", "مستوى العضوية"]

  - name: "default_sales_partner"
    type: "VARCHAR"
    role: ["sales", "partner"]
    description: "Default sales partner associated with the customer"
    synonyms_en: ["sales partner", "partner", "default partner"]
    synonyms_ar: ["شريك المبيعات", "الشريك", "الشريك الافتراضي"]
    join_hint: tabCustomer.default_sales_partner = tabSales Partner.name
  - name: "default_commission_rate"
    type: "DECIMAL"
    role: ["sales", "commission"]
    description: "Default commission rate assigned to this customer"
    synonyms_en: ["commission rate", "default commission", "sales commission"]
    synonyms_ar: ["معدل العمولة", "العمولة الافتراضية", "عمولة المبيعات"]

  - name: "so_required"
    type: "INT"
    role: ["sales", "requirement"]
    description: "Flag indicating whether a Sales Order is required before invoicing"
    synonyms_en: ["sales order required", "so required", "require sales order"]
    synonyms_ar: ["مطلوب أمر مبيعات", "طلب مبيعات إلزامي"]

  - name: "dn_required"
    type: "INT"
    role: ["sales", "requirement"]
    description: "Flag indicating whether a Delivery Note is required before invoicing"
    synonyms_en: ["delivery note required", "dn required", "require delivery note"]
    synonyms_ar: ["مطلوب إذن تسليم", "إذن تسليم إلزامي"]

  - name: "is_frozen"
    type: "INT"
    role: ["status", "control"]
    description: "Indicates if the customer record is frozen and cannot be modified"
    synonyms_en: ["frozen", "locked", "read-only customer"]
    synonyms_ar: ["مجمد", "مغلق", "قيد القراءة فقط"]

  - name: "disabled"
    type: "INT"
    role: ["status", "control"]
    description: "Indicates if the customer is disabled and cannot be used in transactions"
    synonyms_en: ["disabled", "inactive", "blocked customer"]
    synonyms_ar: ["معطل", "غير نشط", "محظور"]


  - name: "zatca_customer_name_in_arabic"
    type: "VARCHAR"
    role: ["compliance", "ZATCA"]
    description: "Customer name in Arabic for ZATCA e-invoicing"
    synonyms_en: ["arabic customer name", "zatca name", "name in arabic"]
    synonyms_ar: ["اسم العميل بالعربية", "اسم زاتكا", "الاسم العربي"]

  - name: "custom_b2c"
    type: "INT"
    role: ["ZATCA", "compliance"]
    description: "Indicates if the customer is a B2C customer under ZATCA"
    synonyms_en: ["b2c customer", "consumer customer", "zatca b2c"]
    synonyms_ar: ["عميل فردي", "عميل بيع بالتجزئة", "بي تو سي"]

  - name: "custom_buyer_id_type"
    type: "VARCHAR"
    role: ["ZATCA", "compliance"]
    description: "Type of buyer identification used for ZATCA compliance"
    synonyms_en: ["buyer id type", "id type", "zatca buyer type"]
    synonyms_ar: ["نوع هوية المشتري", "نوع الهوية", "نوع معرف زاتكا"]
    options:
    - CRN
    - TIN
    - MOM
    - MLS
    - '700'
    - SAG
    - NAT
    - GCC
    - IQA
    - PAS
    - OTH

  - name: "custom_buyer_id"
    type: "VARCHAR"
    role: ["ZATCA", "compliance"]
    description: "Buyer identification number for ZATCA"
    synonyms_en: ["buyer id", "buyer identification", "zatca id"]
    synonyms_ar: ["هوية المشتري", "معرف المشتري", "رقم زاتكا"]

  notes: |
    - Master tables store key identifiers and classification fields used in multiple transactions.  
    - They enable accurate entity resolution in natural language queries.  
    - Users may refer to entities using partial names, informal terms, or synonyms.  
    - Embedding master data improves matching accuracy and reduces ambiguity.  
    - Correct master data retrieval ensures proper joins, filters, and query generation.

- table: "tabSales Invoice Item"
  synonyms_en:
  - "invoice line"
  - "line item"
  - "sales line"
  - "invoice item"
  - "product line"
  - "SI item"
  synonyms_ar:
  - "بند الفاتورة"
  - "سطر الفاتورة"
  - "عنصر المبيعات"
  description: "Child rows of Sales Invoice representing each billed item, quantity, price, discounts, taxes, and delivery\
    \ references."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Primary key of the line item"
    synonyms_en: ["line id", "row id"]
    synonyms_ar: ["معرّف السطر", "معرّف البند"]

  - name: "parent"
    type: "VARCHAR"
    role: ["parent_link"]
    description: "Links to parent Sales Invoice (tabSales Invoice.name)"
    synonyms_en: ["invoice id (parent)", "parent invoice"]
    synonyms_ar: ["فاتورة الأصل", "رابط الأصل"]
    join_hint: tabSales Invoice Item.parent = tabSales Invoice.name

  - name: "parenttype"
    type: "VARCHAR"
    role: ["system"]
    description: "Parent doctype (should be 'Sales Invoice')"
    synonyms_en: ["parent doctype", "parent type", "source doctype", "origin doctype"]
    synonyms_ar: ["نوع المستند الأصل", "نوع الأصل", "نوع المصدر"]

  - name: "parentfield"
    type: "VARCHAR"
    role: ["system"]
    description: "Child table fieldname on parent (usually 'items')"
    synonyms_en: ["child table fieldname", "parent fieldname", "items field", "child link field"]
    synonyms_ar: ["اسم حقل الجدول الفرعي", "اسم حقل الأصل", "حقل العناصر"]

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the line was created"
    synonyms_en: ["created at", "creation time", "created date", "invoice item created on"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the line was last modified"
    synonyms_en: ["last modified", "updated at", "modification time", "last updated date"]
    synonyms_ar: ["آخر تعديل", "تاريخ التعديل", "وقت التعديل"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified the line"
    synonyms_en: ["updated by", "last modified by", "user who modified", "edited by"]
    synonyms_ar: ["تم التعديل بواسطة", "آخر من عدّل", "المستخدم المعدّل"]

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created the line"
    synonyms_en: ["created by", "owner", "user who created", "creator"]
    synonyms_ar: ["تم الإنشاء بواسطة", "المالك", "منشئ السجل"]

  - name: "docstatus"
    type: "INT"
    role: ["lifecycle"]
    description: "Document status inherited from parent (0=Draft, 1=Submitted, 2=Cancelled)"
    synonyms_en: ["document status", "status code", "record status", "doc state"]
    synonyms_ar: ["حالة المستند", "رمز الحالة", "حالة السجل"]

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Row order index inside the invoice"
    synonyms_en: ["row index", "line number", "row position", "item index"]
    synonyms_ar: ["ترتيب السطر", "رقم السطر", "موقع السطر"]

  - name: "barcode"
    type: "VARCHAR"
    role: ["reference", "scan"]
    description: "Scanned barcode associated with the item line"
    synonyms_en: ["barcode", "scanner code", "product barcode", "item barcode"]
    synonyms_ar: ["الباركود", "رمز المسح", "رمز المنتج"]

  - name: "has_item_scanned"
    type: "INT"
    role: ["flag"]
    description: "Flag indicating an item was scanned via barcode"
    synonyms_en: ["scanned flag", "barcode scanned", "item scanned indicator"]
    synonyms_ar: ["تم مسحه", "تم قراءة الباركود", "إشارة المسح"]

  - name: "item_code"
    type: "VARCHAR"
    role: ["item_id", "link"]
    description: "Item master code"
    synonyms_en: ["sku", "product code", "item id"]
    synonyms_ar: ["رمز الصنف", "معرّف الصنف"]
    join_hint: tabSales Invoice Item.item_code = tabItem.name

  - name: "item_name"
    type: "VARCHAR"
    role: ["item_name", "display"]
    description: "Item display name"
    synonyms_en: ["product name", "item title"]
    synonyms_ar: ["اسم الصنف", "اسم المنتج"]
  - name: "customer_item_code"
    type: "VARCHAR"
    role: ["reference"]
    description: "Customer-specific item code"
    synonyms_en: ["customer code", "client item code", "buyer code", "customer-specific code"]
    synonyms_ar: ["رمز العميل", "رمز الصنف للعميل", "رمز المشتري"]

  - name: "description"
    type: "LONGTEXT"
    role: ["text"]
    description: "Item description printed on the invoice"
    synonyms_en: ["item description", "product description", "line description", "details"]
    synonyms_ar: ["وصف الصنف", "وصف المنتج", "وصف السطر", "تفاصيل"]

  - name: "item_group"
    type: "VARCHAR"
    role: ["dimension"]
    description: "Item group/segment for analytics"
    synonyms_en: ["category", "product group", "product category", "item category"]
    synonyms_ar: ["مجموعة الأصناف", "فئة المنتج", "تصنيف الصنف"]
    join_hint: tabSales Invoice Item.item_group = tabItem Group.name

  - name: "brand"
    type: "VARCHAR"
    role: ["dimension"]
    description: "Brand of the item"
    synonyms_en: ["product brand", "label", "maker", "manufacturer brand"]
    synonyms_ar: ["العلامة التجارية", "الماركة", "العلامة"]

  - name: "image"
    type: "TEXT"
    role: ["reference"]
    description: "Optional image reference"
    synonyms_en: ["item image", "product image", "image URL", "photo"]
    synonyms_ar: ["صورة المنتج", "صورة الصنف", "رابط الصورة", "صورة"]

  - name: "qty"
    type: "DECIMAL"
    role: ["quantity", "metric"]
    description: "Billed quantity in selling UOM"
    synonyms_en: ["quantity", "qty"]
    synonyms_ar: ["الكمية"]
  - name: "stock_uom"
    type: "VARCHAR"
    role: ["uom"]
    description: "Stock UOM"
    synonyms_en: ["base uom", "inventory uom", "default uom", "stock unit"]
    synonyms_ar: ["وحدة القياس الأساسية", "وحدة المخزون", "وحدة القياس"]
    join_hint: tabSales Invoice Item.stock_uom = tabUOM.name

  - name: "uom"
    type: "VARCHAR"
    role: ["uom"]
    description: "Selling UOM used for the line"
    synonyms_en: ["selling uom", "sales unit", "unit of measure"]
    synonyms_ar: ["وحدة البيع", "وحدة القياس", "وحدة الصنف"]
    join_hint: tabSales Invoice Item.uom = tabUOM.name

  - name: "conversion_factor"
    type: "DECIMAL"
    role: ["uom", "calc"]
    description: "Multiplier between selling UOM and stock UOM"
    synonyms_en: ["uom conversion factor", "unit conversion", "uom ratio"]
    synonyms_ar: ["معامل التحويل", "تحويل وحدة القياس", "نسبة التحويل"]

  - name: "stock_qty"
    type: "DECIMAL"
    role: ["quantity", "metric"]
    description: "Quantity converted to stock UOM"
    synonyms_en: ["stock quantity", "converted quantity", "base quantity"]
    synonyms_ar: ["كمية المخزون", "الكمية الأساسية", "الكمية المحولة"]

  - name: "price_list_rate"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Price list rate in transaction currency"
    synonyms_en: ["price list price", "catalog price", "selling rate", "listed price"]
    synonyms_ar: ["سعر القائمة", "سعر الكتالوج", "سعر البيع"]

  - name: "base_price_list_rate"
    type: "DECIMAL"
    role: ["pricing", "company_currency"]
    description: "Price list rate in company currency"
    synonyms_en: ["base price list price", "company currency list rate", "base catalog price"]
    synonyms_ar: ["سعر القائمة بالعملة الأساسية", "سعر الكتالوج الأساسي", "سعر الشركة"]

  - name: "margin_type"
    type: "VARCHAR"
    role: ["pricing"]
    description: "Margin calculation method (e.g., Percentage/Amount)"
    synonyms_en: ["margin method", "margin mode", "profit margin type"]
    synonyms_ar: ["نوع الهامش", "طريقة احتساب الهامش", "نمط الهامش"]
    options:
    - Percentage
    - Amount
  - name: "margin_rate_or_amount"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Margin applied per unit"
    synonyms_en: ["margin amount", "margin per unit", "profit per unit", "margin value"]
    synonyms_ar: ["هامش الربح", "قيمة الهامش", "هامش الربح لكل وحدة"]

  - name: "rate_with_margin"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Selling rate after margin (txn currency)"
    synonyms_en: ["final rate", "price after margin", "adjusted selling rate"]
    synonyms_ar: ["السعر بعد الهامش", "السعر النهائي", "سعر البيع المعدل"]

  - name: "discount_percentage"
    type: "DECIMAL"
    role: ["discount"]
    description: "Discount percent on the item"
    synonyms_en: ["disc%", "line discount%"]
    synonyms_ar: ["نسبة الخصم"]

  - name: "discount_amount"
    type: "DECIMAL"
    role: ["discount", "amount"]
    description: "Absolute discount amount (txn currency)"
    synonyms_ar: ["مبلغ الخصم"]

  - name: "distributed_discount_amount"
    type: "DECIMAL"
    role: ["discount", "allocation"]
    description: "Allocated discount from header-level discount"
    synonyms_en: ["allocated discount", "distributed discount", "shared discount amount", "header discount allocation"]
    synonyms_ar: ["الخصم الموزع", "الخصم المخصص", "قيمة الخصم المشتركة", "توزيع الخصم"]

  - name: "rate"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Final unit rate in transaction currency"
    synonyms_en: ["unit price", "selling rate"]
    synonyms_ar: ["السعر"]

  - name: "amount"
    type: "DECIMAL"
    role: ["amount", "metric"]
    description: "Line amount (rate × qty), txn currency"
    synonyms_en: ["line total"]
    synonyms_ar: ["المبلغ"]

  - name: "item_tax_template"
    type: "VARCHAR"
    role: ["tax", "link"]
    description: "Tax template applied to the line"
    synonyms_en: ["tax template", "tax rule", "tax config"]
    synonyms_ar: ["قالب الضريبة", "قواعد الضريبة", "إعداد الضريبة"]
    join_hint: tabSales Invoice Item.item_tax_template = tabItem Tax Template.name

  - name: "base_rate"
    type: "DECIMAL"
    role: ["pricing", "company_currency"]
    description: "Final unit rate in company currency"
    synonyms_en: ["base unit rate", "company currency rate", "base price"]
    synonyms_ar: ["السعر الأساسي", "سعر العملة الأساسية", "سعر الوحدة الأساسي"]

  - name: "base_amount"
    type: "DECIMAL"
    role: ["amount", "company_currency"]
    description: "Line amount in company currency"
    synonyms_en: ["base amount", "company currency amount", "base line total"]
    synonyms_ar: ["المبلغ الأساسي", "قيمة العملة الأساسية", "المبلغ الإجمالي الأساسي"]

  - name: "pricing_rules"
    type: "TEXT"
    role: ["pricing", "reference"]
    description: "Applied pricing rule details"
    synonyms_en: ["pricing rules", "discount rules", "price configuration"]
    synonyms_ar: ["قواعد التسعير", "قواعد الخصم", "إعدادات السعر"]

  - name: "stock_uom_rate"
    type: "DECIMAL"
    role: ["pricing", "uom"]
    description: "Rate normalized to stock UOM"
    synonyms_en: ["uom rate", "stock unit rate", "normalized rate"]
    synonyms_ar: ["سعر وحدة المخزون", "سعر موحد", "معدل الوحدة"]

  - name: "is_free_item"
    type: "INT"
    role: ["flag"]
    description: "Indicates free-of-charge item"
    synonyms_en: ["free item", "complimentary", "zero price item"]
    synonyms_ar: ["عنصر مجاني", "مجاني", "بلا مقابل"]

  - name: "grant_commission"
    type: "INT"
    role: ["flag"]
    description: "Eligible for commission calculation"
    synonyms_en: ["eligible commission", "grant commission flag"]
    synonyms_ar: ["مؤهل للعمولة", "سماح بالعمولة"]

  - name: "net_rate"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Rate after discounts (txn currency)"
    synonyms_en: ["net rate", "discounted rate", "final rate"]
    synonyms_ar: ["السعر الصافي", "السعر بعد الخصم", "السعر النهائي"]

  - name: "net_amount"
    type: "DECIMAL"
    role: ["amount"]
    description: "Amount after discounts (txn currency)"
    synonyms_en: ["net amount", "discounted amount", "final amount"]
    synonyms_ar: ["المبلغ الصافي", "المبلغ بعد الخصم", "المبلغ النهائي"]

  - name: "base_net_rate"
    type: "DECIMAL"
    role: ["pricing", "company_currency"]
    description: "Net rate in company currency"
    synonyms_en: ["base net rate", "net rate company currency"]
    synonyms_ar: ["السعر الصافي الأساسي", "السعر الصافي بعملة الشركة"]

  - name: "base_net_amount"
    type: "DECIMAL"
    role: ["amount", "company_currency"]
    description: "Net amount in company currency"
    synonyms_en: ["base net amount", "net amount company currency"]
    synonyms_ar: ["المبلغ الصافي الأساسي", "المبلغ الصافي بعملة الشركة"]

  - name: "delivered_by_supplier"
    type: "INT"
    role: ["flag"]
    description: "Supplier directly delivers item to customer"
    synonyms_en: ["delivered by supplier", "supplier delivery"]
    synonyms_ar: ["تم التسليم من المورد", "تسليم المورد"]

  - name: "income_account"
    type: "VARCHAR"
    role: ["accounting", "link"]
    description: "Revenue account for this line"
    synonyms_en: ["income account", "revenue account"]
    synonyms_ar: ["حساب الإيرادات", "حساب الدخل"]
    join_hint: tabSales Invoice Item.income_account = tabAccount.name

  - name: "expense_account"
    type: "VARCHAR"
    role: ["accounting", "link"]
    description: "Expense account (if applicable)"
