    role: ["date"]
    description: "Payment due date of the invoice"
    synonyms_en: ["due date", "payment due date"]
    synonyms_ar: ["تاريخ الاستحقاق", "تاريخ الدفع"]

  - name: "is_paid"
    type: "INT"
    role: ["flag"]
