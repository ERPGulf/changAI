  - name: "warn_pos"
    type: "INT"
    role: ["flag"]
    description: "Warn on Purchase Order Submission"
    synonyms_en: ["warn po", "po warning"]
    synonyms_ar: ["تحذير أمر الشراء", "تحذير PO"]

  - name: "prevent_rfqs"
    type: "INT"
    role: ["flag"]
    description: "Prevent RFQs to this supplier"
    synonyms_en: ["block rfq"]
