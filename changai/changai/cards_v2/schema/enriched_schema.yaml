  notes: |
    - Tracks inventory quantity and valuation changes.
    - References a voucher when stock changes originate from a transaction.
    - `docstatus` controls workflow lifecycle.
    - Warehouse → item mapping indexed for reporting and joins.

- table: "tabStock Entry"
  synonyms_en:
  - "inventory entry"
  - "stock movement entry"
  - "material transfer entry"
  - "warehouse stock entry"
  - "goods transit entry"
  description: "Stores stock transactions like material issue, receipt, transfers, subcontract movement and goods put into\
    \ transit."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique stock entry ID (primary key)"
    synonyms_en: ["record id", "entry id", "stock entry number", "document id"]
    synonyms_ar: ["معرّف السجل", "رقم القيد", "رمز إدخال المخزون"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when record was created"
    synonyms_en: ["created at", "creation time", "record created on", "created date"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when record was last modified"
    synonyms_en: ["updated at", "last updated", "last modified", "modified time"]
    synonyms_ar: ["تاريخ التعديل", "وقت آخر تحديث", "تم التعديل في"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified record"
    synonyms_en: ["updated by", "modified user", "last editor", "edited by"]
    synonyms_ar: ["تم التعديل بواسطة", "آخر من عدّل", "المحرر"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the record"
    synonyms_en: ["created by", "entry owner", "creator", "initiated by"]
    synonyms_ar: ["تم الإنشاء بواسطة", "مالك القيد", "المنشئ"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document status: 0=Draft, 1=Submitted, 2=Cancelled"
    synonyms_en: ["document status", "status code", "entry state"]
    synonyms_ar: ["حالة المستند", "وضع القيد", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row index used for ordering"
    synonyms_en: ["index", "row position", "record order"]
    synonyms_ar: ["فهرس", "موضع الصف", "ترتيب الصف"]

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "ID generation series pattern"
    synonyms_en: ["series", "naming format", "number series"]
    synonyms_ar: ["سلسلة التسمية", "نمط الترقيم", "مسلسل"]
    options:
    - MAT-STE-.YYYY.-

  - name: "stock_entry_type"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Type of stock transaction"
    synonyms_en: ["movement type", "stock entry type", "transaction type"]
    synonyms_ar: ["نوع حركة المخزون", "نوع القيد", "نوع الحركة"]
    join_hint: tabStock Entry.stock_entry_type = tabStock Entry Type.name

  - name: "outgoing_stock_entry"
