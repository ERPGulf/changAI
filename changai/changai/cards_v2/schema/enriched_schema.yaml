  - name: "bom_detail_no"
    type: "VARCHAR"
    role: ["reference", "manufacturing"]
    description: "Reference to Bill of Materials (BOM) detail number"
    synonyms_en: ["bom detail no", "bom reference", "bom item id"]
    synonyms_ar: ["رقم تفاصيل قائمة المواد", "مرجع قائمة المواد", "تفاصيل التصنيع"]

  - name: "reference_name"
    type: "VARCHAR"
    role: ["reference"]
    description: "Reference to the parent Purchase Order or related document"
    synonyms_en: ["reference name", "linked document", "parent reference"]
    synonyms_ar: ["اسم المرجع", "الوثيقة المرتبطة", "مرجع الأصل"]

  - name: "rate"
    type: "DECIMAL(21,9)"
    role: ["financial"]
    description: "Rate per unit for the raw material item"
    synonyms_en: ["rate", "price per unit", "unit rate"]
    synonyms_ar: ["السعر لكل وحدة", "المعدل", "سعر الوحدة"]

  - name: "amount"
    type: "DECIMAL(21,9)"
    role: ["financial"]
    description: "Total amount for the supplied item (qty × rate)"
    synonyms_en: ["amount", "total amount", "value"]
    synonyms_ar: ["المبلغ الإجمالي", "القيمة", "إجمالي السعر"]

  - name: "required_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "input"]
    description: "Quantity of raw material required for production or supply"
    synonyms_en: ["required quantity", "needed qty", "demand quantity"]
    synonyms_ar: ["الكمية المطلوبة", "كمية الحاجة"]

  - name: "supplied_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "output"]
    description: "Quantity of raw material actually supplied"
    synonyms_en: ["supplied quantity", "provided qty", "issued quantity"]
    synonyms_ar: ["الكمية الموردة", "الكمية المسلمة"]

  - name: "consumed_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "usage"]
    description: "Quantity of material consumed from the supplied amount"
    synonyms_en: ["consumed quantity", "used qty", "utilized quantity"]
    synonyms_ar: ["الكمية المستهلكة", "الكمية المستخدمة"]

  - name: "returned_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "return"]
    description: "Quantity of supplied material returned or unused"
    synonyms_en: ["returned quantity", "returned qty", "unused material"]
    synonyms_ar: ["الكمية المرتجعة", "كمية غير مستخدمة"]

  - name: "total_supplied_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "summary"]
    description: "Cumulative quantity of material supplied for the item"
    synonyms_en: ["total supplied quantity", "aggregate supplied qty"]
    synonyms_ar: ["إجمالي الكمية الموردة", "الكمية الإجمالية"]

  - name: "parent"
    type: "VARCHAR"
    role: ["relationship", "foreign_key"]
    description: "Parent Purchase Order reference"
    synonyms_en: ["parent id", "purchase order id", "po reference"]
    synonyms_ar: ["مرجع أمر الشراء", "الأصل", "معرّف الأصل"]
    join_hint: tabPurchase Order Item Supplied.parent = tabPurchase Order.name

  - name: "parentfield"
    type: "VARCHAR"
    role: ["meta"]
    description: "Parent field link reference within the parent document"
    synonyms_en: ["parent field", "link field"]
    synonyms_ar: ["حقل الأصل", "المرجع الحقل"]

  - name: "parenttype"
    type: "VARCHAR"
    role: ["meta"]
    description: "Parent document type name"
    synonyms_en: ["parent type", "document type reference"]
    synonyms_ar: ["نوع المستند الأصلي", "فئة الأصل"]

  notes: |
    - Child doctype of `tabPurchase Order Item` used when materials are supplied for subcontracted items.
    - Each record represents a raw material or component supplied against a parent Purchase Order Item.
    - Key joins: `parent` → `tabPurchase Order Item`.`name`, `main_item_code` → `tabItem`.`name`.
    - Tracks `rm_item_code`, `warehouse`, `required_qty`, and `consumed_qty` for material issue management.
    - Used primarily in subcontracting workflows to monitor raw materials sent to suppliers.
    - `rate`, `amount`, and `base_amount` store material cost details in both supplier and base currencies.
    - Supports reconciliation between issued materials and received finished goods.
    - `warehouse` indicates the storage or dispatch location for the supplied material.
    - Critical for job work traceability, consumption reporting, and stock accounting.
    - Indexed fields such as `rm_item_code`, `main_item_code`, and `warehouse` improve query performance.

- table: "tabPurchase Receipt"
  synonyms_en:
  - "purchase goods receipt"
  - "goods received note"
  - "supplier receipt"
  - "material receipt"
  - "purchase delivery record"
  description: "Represents the record of goods or materials received from a supplier against a Purchase Order, including supplier\
    \ details, delivery note, and receipt information."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique ID / primary key for the purchase receipt"
    synonyms_en: ["receipt id", "receipt number", "purchase receipt id"]
    synonyms_ar: ["رقم إيصال الشراء", "معرّف الإيصال", "رمز استلام المشتريات"]

  - name: "creation"
    type: "DATETIME"
    role: ["metadata", "timestamp"]
    description: "Date and time when the record was created"
    synonyms_en: ["creation date", "created on", "entry time"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME"
    role: ["metadata", "timestamp"]
    description: "Date and time when the record was last modified"
    synonyms_en: ["last modified", "updated on", "modified date"]
    synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["metadata", "user"]
    description: "User who last modified the record"
    synonyms_en: ["updated by", "last editor", "modified user"]
    synonyms_ar: ["تم التعديل بواسطة", "المستخدم المعدل"]

  - name: "owner"
    type: "VARCHAR"
    role: ["metadata", "user"]
    description: "User who created the record"
    synonyms_en: ["created by", "record owner", "entered by"]
    synonyms_ar: ["أنشأه", "المالك", "تم الإدخال بواسطة"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["status"]
    description: "Document status: 0 = Draft, 1 = Submitted, 2 = Cancelled"
    synonyms_en: ["document status", "status code"]
    synonyms_ar: ["حالة المستند", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["index"]
    description: "Internal indexing for ordering child table records"
    synonyms_en: ["index", "position id", "row number"]
    synonyms_ar: ["رقم الفهرس", "تسلسل الصف"]

  - name: "title"
    type: "VARCHAR"
    role: ["display"]
    description: "Title of the receipt, usually derived from supplier name"
    synonyms_en: ["receipt title", "display name"]
    synonyms_ar: ["عنوان الإيصال", "اسم العرض"]

  - name: "naming_series"
    type: "VARCHAR"
    role: ["metadata"]
    description: "Series format used for generating document IDs"
    synonyms_en: ["naming format", "series code"]
    synonyms_ar: ["نمط الترقيم", "رمز السلسلة"]
    options: *id001

  - name: "supplier"
    type: "VARCHAR"
    role: ["foreign_key", "supplier"]
    description: "Supplier ID linked to this receipt"
    synonyms_en: ["supplier id", "vendor", "supplier code"]
    synonyms_ar: ["رمز المورد", "معرّف المورد", "البائع"]
    join_hint: tabPurchase Receipt.supplier = tabSupplier.name

  - name: "supplier_name"
    type: "VARCHAR"
    role: ["name"]
    description: "Full name of the supplier"
    synonyms_en: ["vendor name", "supplier company name"]
    synonyms_ar: ["اسم المورد", "اسم البائع"]

  - name: "supplier_delivery_note"
    type: "VARCHAR"
    role: ["reference"]
    description: "Supplier’s delivery note number or reference"
    synonyms_en: ["delivery note", "supplier note", "delivery ref"]
    synonyms_ar: ["ملاحظة التسليم", "رقم إيصال المورد"]

  - name: "subcontracting_receipt"
    type: "VARCHAR"
    role: ["reference"]
    description: "Reference to a subcontracting receipt, if applicable"
    synonyms_en: ["subcontracting receipt id", "subcontracting reference"]
    synonyms_ar: ["مرجع التوريد من الباطن", "إيصال المقاول الفرعي"]
    join_hint: tabPurchase Receipt.subcontracting_receipt = tabSubcontracting Receipt.name
  - name: "posting_date"
    type: "DATE"
    role: ["timestamp", "posting"]
    description: "This can be used for any date filters."
    synonyms_en: ["receipt date", "posting date", "entry date", "today", "month"]
    synonyms_ar: ["تاريخ التسجيل", "تاريخ الاستلام"]

  - name: "posting_time"
    type: "TIME(6)"
    role: ["timestamp"]
    description: "Time at which the purchase receipt was posted"
    synonyms_en: ["receipt time", "posting time"]
    synonyms_ar: ["وقت التسجيل", "وقت الاستلام"]

  - name: "set_posting_time"
    type: "INT(1)"
    role: ["flag"]
    description: "Flag indicating whether manual posting time was set (1 = Yes, 0 = No)"
    synonyms_en: ["manual posting time", "custom posting time"]
    synonyms_ar: ["تعيين وقت النشر", "تعيين يدوي لوقت النشر"]

  - name: "company"
    type: "VARCHAR"
    role: ["organization"]
    description: "Company under which the receipt is recorded"
    synonyms_en: ["company name", "organization", "entity"]
    synonyms_ar: ["الشركة", "المنظمة", "الكيان"]
    join_hint: tabPurchase Receipt.company = tabCompany.name

  - name: "apply_putaway_rule"
    type: "INT(1)"
    role: ["flag"]
    description: "Indicates whether to apply putaway rules for warehouse allocation"
    synonyms_en: ["apply putaway", "auto warehouse rule"]
    synonyms_ar: ["تطبيق قاعدة التخزين", "تطبيق قاعدة الإيداع"]

  - name: "is_return"
    type: "INT(1)"
    role: ["flag"]
    description: "Indicates whether this receipt is a return (1 = Return, 0 = Normal)"
    synonyms_en: ["return flag", "is returned", "return document"]
    synonyms_ar: ["إيصال مرتجع", "هل مرتجع"]

  - name: "return_against"
    type: "VARCHAR"
    role: ["reference"]
    description: "Reference to the original Purchase Receipt or Purchase Order being returned"
    synonyms_en: ["return reference", "return against receipt"]
    synonyms_ar: ["مرجع الإرجاع", "إرجاع مقابل"]
    join_hint: tabPurchase Receipt.return_against = tabPurchase Receipt.name

  - name: "cost_center"
    type: "VARCHAR"
    role: ["finance", "allocation"]
    description: "Cost center associated with this receipt for accounting allocation"
    synonyms_en: ["accounting cost center", "finance cost center"]
    synonyms_ar: ["مركز التكلفة", "مركز المحاسبة"]
    join_hint: tabPurchase Receipt.cost_center = tabCost Center.name

  - name: "project"
    type: "VARCHAR"
    role: ["reference"]
    description: "Project associated with the purchase receipt, if any"
    synonyms_en: ["project id", "linked project"]
    synonyms_ar: ["المشروع", "معرف المشروع"]
    join_hint: tabPurchase Receipt.project = tabProject.name

  - name: "currency"
    type: "VARCHAR"
    role: ["finance", "currency"]
    description: "Currency in which the purchase receipt is recorded"
    synonyms_en: ["transaction currency", "document currency"]
    synonyms_ar: ["العملة", "عملة المستند"]
    join_hint: tabPurchase Receipt.currency = tabCurrency.name

  - name: "conversion_rate"
    type: "DECIMAL(21,9)"
    role: ["finance", "rate"]
    description: "Conversion rate from document currency to company currency"
    synonyms_en: ["exchange rate", "currency rate"]
    synonyms_ar: ["سعر التحويل", "سعر الصرف"]

  - name: "buying_price_list"
    type: "VARCHAR"
    role: ["reference", "pricing"]
    description: "Price list used for evaluating item prices in this receipt"
    synonyms_en: ["price list", "buying price list"]
    synonyms_ar: ["قائمة الأسعار", "قائمة الشراء"]
    join_hint: tabPurchase Receipt.buying_price_list = tabPrice List.name

  - name: "price_list_currency"
    type: "VARCHAR"
    role: ["finance", "currency"]
    description: "Currency in which the price list is maintained"
    synonyms_en: ["price list currency", "list currency"]
    synonyms_ar: ["عملة قائمة الأسعار", "عملة القائمة"]
    join_hint: tabPurchase Receipt.price_list_currency = tabCurrency.name

  - name: "plc_conversion_rate"
    type: "DECIMAL(21,9)"
    role: ["finance", "rate"]
    description: "Conversion rate from price list currency to company currency"
    synonyms_en: ["price list conversion rate", "price rate"]
    synonyms_ar: ["سعر تحويل قائمة الأسعار"]

  - name: "ignore_pricing_rule"
    type: "INT(1)"
    role: ["flag"]
    description: "Flag indicating whether pricing rules were ignored (1 = Yes, 0 = No)"
    synonyms_en: ["ignore pricing", "bypass pricing rule"]
    synonyms_ar: ["تجاهل قاعدة التسعير"]

  - name: "scan_barcode"
    type: "VARCHAR"
    role: ["reference", "input"]
    description: "Barcode value scanned during item entry"
    synonyms_en: ["barcode", "scanned code"]
    synonyms_ar: ["رمز الباركود", "الرمز الممسوح"]

  - name: "set_warehouse"
    type: "VARCHAR"
    role: ["warehouse"]
    description: "Default warehouse where items are received"
    synonyms_en: ["target warehouse", "receiving warehouse"]
    synonyms_ar: ["المخزن", "مستودع الاستلام"]
    join_hint: tabPurchase Receipt.set_warehouse = tabWarehouse.name

  - name: "set_from_warehouse"
    type: "VARCHAR"
    role: ["warehouse"]
    description: "Warehouse from which goods are moved or transferred"
    synonyms_en: ["source warehouse", "from warehouse"]
    synonyms_ar: ["من المخزن", "مستودع المصدر"]
    join_hint: tabPurchase Receipt.set_from_warehouse = tabWarehouse.name

  - name: "rejected_warehouse"
    type: "VARCHAR"
    role: ["warehouse"]
    description: "Warehouse designated for rejected or defective items"
    synonyms_en: ["rejection warehouse", "return warehouse"]
    synonyms_ar: ["مخزن المرفوضات", "مستودع المرتجعات"]
    join_hint: tabPurchase Receipt.rejected_warehouse = tabWarehouse.name

  - name: "is_subcontracted"
    type: "INT(1)"
    role: ["flag"]
    description: "Indicates whether the purchase receipt is subcontracted (1 = Yes, 0 = No)"
    synonyms_en: ["subcontracted flag", "is subcontracted"]
    synonyms_ar: ["توريد من الباطن", "هل مقاول فرعي"]

  - name: "supplier_warehouse"
    type: "VARCHAR"
    role: ["warehouse", "supplier"]
    description: "Warehouse belonging to or managed by the supplier"
    synonyms_en: ["supplier warehouse", "vendor warehouse"]
    synonyms_ar: ["مستودع المورد", "مخزن البائع"]
    join_hint: tabPurchase Receipt.supplier_warehouse = tabWarehouse.name

  - name: "total_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity", "summary"]
    description: "Total quantity of all items received in this receipt"
    synonyms_en: ["total quantity", "total received qty"]
    synonyms_ar: ["إجمالي الكمية", "إجمالي الكمية المستلمة"]

  - name: "total_net_weight"
    type: "DECIMAL(21,9)"
    role: ["weight", "summary"]
    description: "Total net weight of items received"
    synonyms_en: ["net weight", "total item weight"]
    synonyms_ar: ["الوزن الصافي", "إجمالي الوزن"]

  - name: "base_total"
    type: "DECIMAL(21,9)"
    role: ["finance", "amount"]
    description: "Total amount in company currency before taxes and discounts"
    synonyms_en: ["base total amount", "company currency total"]
    synonyms_ar: ["إجمالي المبلغ الأساسي", "الإجمالي بعملة الشركة"]

  - name: "base_net_total"
    type: "DECIMAL(21,9)"
    role: ["finance", "amount"]
    description: "Net total amount in company currency after discounts but before taxes"
    synonyms_en: ["base net total", "net amount in company currency"]
    synonyms_ar: ["الإجمالي الصافي الأساسي", "صافي المبلغ بعملة الشركة"]

  - name: "total"
    type: "DECIMAL(21,9)"
    role: ["finance", "amount"]
    description: "Total amount in document currency before taxes and discounts"
    synonyms_en: ["total amount", "document total"]
    synonyms_ar: ["إجمالي المبلغ", "إجمالي المستند"]

  - name: "net_total"
    type: "DECIMAL(21,9)"
    description: "Total value of received goods before taxes and charges."
    synonyms_en: ["net amount", "subtotal", "net value"]
    synonyms_ar: ["الإجمالي الصافي", "صافي المبلغ"]

  - name: "tax_withholding_net_total"
    type: "DECIMAL(21,9)"
    description: "Net total after applying tax withholding."
    synonyms_en: ["tax withheld amount", "withholding total"]
    synonyms_ar: ["إجمالي الاستقطاع الضريبي", "صافي بعد الضريبة"]

  - name: "base_tax_withholding_net_total"
    type: "DECIMAL(21,9)"
    description: "Tax withholding net total in base currency."
    synonyms_en: ["base withholding amount"]
    synonyms_ar: ["الاستقطاع الضريبي بالعملة الأساسية"]

  - name: "tax_category"
    type: "VARCHAR(140)"
    description: "Tax category applied to the receipt."
    synonyms_en: ["tax type", "tax classification"]
    synonyms_ar: ["فئة الضريبة", "نوع الضريبة"]
    join_hint: tabPurchase Receipt.tax_category = tabTax Category.name

  - name: "taxes_and_charges"
    type: "VARCHAR(140)"
    description: "Reference to taxes and charges template applied."
    synonyms_en: ["tax rule", "tax template"]
    synonyms_ar: ["الضرائب والرسوم", "قالب الضريبة"]
    join_hint: tabPurchase Receipt.taxes_and_charges = tabPurchase Taxes and Charges Template.name

  - name: "shipping_rule"
    type: "VARCHAR(140)"
    description: "Shipping rule applied to this purchase receipt."
    synonyms_en: ["shipping policy", "freight rule"]
    synonyms_ar: ["قاعدة الشحن", "سياسة الشحن"]
    join_hint: tabPurchase Receipt.shipping_rule = tabShipping Rule.name

  - name: "incoterm"
    type: "VARCHAR(140)"
    description: "International commercial terms (Incoterm) used for this receipt."
    synonyms_en: ["trade term", "delivery term"]
    synonyms_ar: ["شرط تجاري دولي", "إنكوترمز"]
    join_hint: tabPurchase Receipt.incoterm = tabIncoterm.name

  - name: "named_place"
    type: "VARCHAR(140)"
    description: "Named place or delivery location specified in Incoterm."
    synonyms_en: ["delivery location", "destination"]
    synonyms_ar: ["المكان المحدد", "موقع التسليم"]

  - name: "base_taxes_and_charges_added"
    type: "DECIMAL(21,9)"
    description: "Total additional taxes and charges in base currency."
    synonyms_en: ["base added taxes"]
    synonyms_ar: ["الضرائب المضافة بالعملة الأساسية"]

  - name: "base_taxes_and_charges_deducted"
    type: "DECIMAL(21,9)"
    description: "Total deducted taxes and charges in base currency."
    synonyms_en: ["base deducted taxes"]
    synonyms_ar: ["الضرائب المخصومة بالعملة الأساسية"]

  - name: "base_total_taxes_and_charges"
    type: "DECIMAL(21,9)"
    description: "Total of all taxes and charges in base currency."
    synonyms_en: ["base tax total"]
    synonyms_ar: ["إجمالي الضرائب بالعملة الأساسية"]

  - name: "taxes_and_charges_added"
    type: "DECIMAL(21,9)"
    description: "Total of all taxes and charges added."
    synonyms_en: ["added taxes"]
    synonyms_ar: ["الضرائب المضافة"]

  - name: "taxes_and_charges_deducted"
    type: "DECIMAL(21,9)"
    description: "Total of all taxes and charges deducted."
    synonyms_en: ["deducted taxes"]
    synonyms_ar: ["الضرائب المخصومة"]

  - name: "total_taxes_and_charges"
    type: "DECIMAL(21,9)"
    description: "Total of all taxes and charges applied."
    synonyms_en: ["total tax"]
    synonyms_ar: ["إجمالي الضرائب"]

  - name: "base_grand_total"
    type: "DECIMAL(21,9)"
    description: "Grand total in base currency after taxes and discounts."
    synonyms_en: ["base final total"]
    synonyms_ar: ["الإجمالي الكلي بالعملة الأساسية"]

  - name: "base_rounding_adjustment"
    type: "DECIMAL(21,9)"
    description: "Rounding adjustment in base currency."
    synonyms_en: ["base rounding"]
    synonyms_ar: ["تعديل التقريب بالعملة الأساسية"]

  - name: "base_rounded_total"
    type: "DECIMAL(21,9)"
    description: "Rounded grand total in base currency."
    synonyms_en: ["base rounded amount"]
    synonyms_ar: ["الإجمالي المقرب بالعملة الأساسية"]

  - name: "base_in_words"
    type: "VARCHAR(240)"
    description: "Grand total in words (base currency)."
    synonyms_en: ["amount in words (base)"]
    synonyms_ar: ["الإجمالي كتابةً (العملة الأساسية)"]

  - name: "grand_total"
    type: "DECIMAL"
    role: ["amount", "aggregation", "primary_amount"]
    description: >
      Final  amount including taxes and charges in the **invoice currency**.
      Use this for questions like total sales, total invoice value, biggest invoice,
      monthly sales, or customer-wise sales totals.
    synonyms_en:
    - "grand total"
    - "bill amount"
    - "total amount with tax"
    - "final amount"


  - name: "rounding_adjustment"
    type: "DECIMAL(21,9)"
    description: "Adjustment made due to rounding differences."
    synonyms_en: ["round-off adjustment"]
    synonyms_ar: ["تعديل التقريب"]

  - name: "rounded_total"
    type: "DECIMAL(21,9)"
    description: "Final rounded total of the purchase receipt."
    synonyms_en: ["rounded grand total"]
    synonyms_ar: ["الإجمالي المقرب"]

  - name: "in_words"
    type: "VARCHAR(240)"
    description: "Grand total written in words."
    synonyms_en: ["amount in words"]
    synonyms_ar: ["الإجمالي كتابةً"]

  - name: "disable_rounded_total"
    type: "INT(1)"
    description: "Flag to disable rounding of total."
    synonyms_en: ["rounding off disabled"]
    synonyms_ar: ["تعطيل التقريب"]

  - name: "apply_discount_on"
    type: "VARCHAR(140)"
    default: "Grand Total"
    description: "Indicates whether discount is applied on net total or grand total."
    synonyms_en: ["discount base", "apply discount based on"]
    synonyms_ar: ["تطبيق الخصم على"]
    options: *id002

  - name: "base_discount_amount"
    type: "DECIMAL(21,9)"
