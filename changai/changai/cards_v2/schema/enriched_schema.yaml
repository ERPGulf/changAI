    synonyms_en: ["rejected quantity", "defective qty", "returned qty"]
    synonyms_ar: ["الكمية المرفوضة", "كمية مرفوضة", "كمية مرفوضة من الفحص"]

  - name: "uom"
    type: "VARCHAR"
    role: ["unit"]
