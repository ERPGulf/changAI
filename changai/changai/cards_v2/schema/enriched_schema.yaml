    role: ["relation"]
    description: "Field linking this child line to parent"
    synonyms_en: ["link field", "parent link column"]
    synonyms_ar: ["حقل الأصل", "عمود الربط"]

  - name: "parenttype"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Parent doctype name"
    synonyms_en: ["parent document type"]
    synonyms_ar: ["نوع الأصل"]

  notes: |
    - These fields belong to **tabQuotation Item**, a child table under Quotation.
    - Contains pricing, stock snapshot, optional alternative items, weight and tax details.
    - `valuation_rate`, `gross_profit`, `projected_qty`, `total_weight`, and tax fields are computed and stored for reference, not posted to ledgers.
    - `warehouse` is indexed via parent joins, does not update stock directly.
    - Parent-level totals and taxes are finalized in the Quotation document.


