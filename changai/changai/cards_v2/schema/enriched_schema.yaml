    synonyms_ar: ["السعر الأساسي", "سعر الوحدة الأساسي", "السعر بالعملة الأساسية"]

  - name: "base_amount"
    type: "DECIMAL"
    role: ["pricing", "calculation"]
    description: "Total amount in base currency (base_rate × quantity)."
