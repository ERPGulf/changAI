- table: "tabPurchase Order"
  synonyms_en:
  - "purchase order"
  - "po"
  - "supplier order"

  description: >
    Purchase Order header document used to request goods or services from a
    supplier. Use for questions about POs, ordered quantities, values,
    supplier-wise purchases, or procurement status.

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique Purchase Order ID / primary key."

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Record creation timestamp."

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Last modified timestamp."

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified the document."

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created the document."

  - name: "docstatus"
    type: "INT"
    role: ["status"]
    description: "0=Draft, 1=Submitted, 2=Cancelled."

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Internal index for ordering."

  - name: "title"
    type: "VARCHAR"
    role: ["metadata"]
    description: "Display title of the PO (often supplier name)."

  - name: "naming_series"
    type: "VARCHAR"
    role: ["metadata"]
    description: "Series used to generate PO numbers."

    options:
    - PUR-ORD-.YYYY.-
  - name: "supplier"
    type: "VARCHAR"
    role: ["reference"]
    description: "Linked supplier ID."
    join_hint: "tabPurchase Order.supplier = tabSupplier.name"

  - name: "supplier_name"
    type: "VARCHAR"
    role: ["dimension"]
    description: "Supplier name."

  - name: "order_confirmation_no"
    type: "VARCHAR"
    role: ["transaction"]
    description: "Supplier order confirmation number."

  - name: "order_confirmation_date"
    type: "DATE"
    role: ["transaction"]
    description: "Date when supplier confirmed the order."

  - name: "transaction_date"
    type: "DATE"
    role: ["transaction"]
    description: "Purchase Order issue date."

  - name: "schedule_date"
    type: "DATE"
    role: ["delivery"]
    description: "Expected delivery / schedule date."

  - name: "company"
    type: "VARCHAR"
    role: ["organization"]
    description: "Company under which the PO is created."
    join_hint: "tabPurchase Order.company = tabCompany.name"

  - name: "apply_tds"
    type: "INT"
    role: ["tax"]
    description: "1 if TDS applies."

  - name: "tax_withholding_category"
    type: "VARCHAR"
    role: ["tax"]
    description: "Tax withholding category."
    join_hint: "tabPurchase Order.tax_withholding_category = `tabTax Withholding Category`.name"

  - name: "is_subcontracted"
    type: "INT"
    role: ["procurement"]
    description: "1 if PO is for subcontracted work."

  - name: "has_unit_price_items"
    type: "INT"
    role: ["pricing"]
    description: "1 if PO has unit-priced items."

  - name: "supplier_warehouse"
    type: "VARCHAR"
    role: ["inventory"]
    description: "Supplier warehouse (if applicable)."
    join_hint: "tabPurchase Order.supplier_warehouse = tabWarehouse.name"

  - name: "amended_from"
    type: "VARCHAR"
    role: ["reference"]
    description: "Original PO name if this is an amendment."
    join_hint: "tabPurchase Order.amended_from = `tabPurchase Order`.name"

  - name: "cost_center"
    type: "VARCHAR"
    role: ["finance"]
    description: "Default cost center for PO expenses."
    join_hint: "tabPurchase Order.cost_center = `tabCost Center`.name"

  - name: "project"
    type: "VARCHAR"
    role: ["project"]
    description: "Linked project for this PO."
    join_hint: "tabPurchase Order.project = tabProject.name"

  - name: "currency"
    type: "VARCHAR"
    role: ["finance"]
    description: "PO currency."
    join_hint: "tabPurchase Order.currency = tabCurrency.name"

  - name: "conversion_rate"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Rate from PO currency to company currency."

  - name: "buying_price_list"
    type: "VARCHAR"
    role: ["pricing"]
    description: "Buying price list."
    join_hint: "tabPurchase Order.buying_price_list = `tabPrice List`.name"

  - name: "price_list_currency"
    type: "VARCHAR"
    role: ["pricing"]
    description: "Currency of the price list."
    join_hint: "tabPurchase Order.price_list_currency = tabCurrency.name"

  - name: "plc_conversion_rate"
    type: "DECIMAL(21,9)"
    role: ["pricing"]
    description: "Rate from price list currency to company currency."

  - name: "ignore_pricing_rule"
    type: "INT"
    role: ["pricing"]
    description: "1 to ignore pricing rules."


  - name: "scan_barcode"
    type: "VARCHAR"
    role: ["inventory"]
    description: "Scanned barcode value."

  - name: "set_from_warehouse"
    type: "VARCHAR"
    role: ["inventory"]
    description: "Default source warehouse."
    join_hint: "tabPurchase Order.set_from_warehouse = tabWarehouse.name"

  - name: "set_warehouse"
    type: "VARCHAR"
    role: ["inventory"]
    description: "Default target/receiving warehouse."
    join_hint: "tabPurchase Order.set_warehouse = tabWarehouse.name"

  - name: "total_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity"]
    description: "Total quantity of all items."

  - name: "total_net_weight"
    type: "DECIMAL(21,9)"
    role: ["logistics"]
    description: "Total net weight of all items."

  - name: "base_total"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Total before taxes in company currency."

  - name: "base_net_total"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Net total after discounts in company currency."

  - name: "total"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Total before taxes in PO currency."

  - name: "net_total"
    type: "DECIMAL(21,9)"
    role: ["finance"]
    description: "Net total after discounts in PO currency."

  - name: "tax_withholding_net_total"
    type: "DECIMAL(21,9)"
    role: ["tax"]
    description: "Net total after withholding tax in PO currency."

  - name: "base_tax_withholding_net_total"
    type: "DECIMAL(21,9)"
    role: ["tax"]
    description: "Net total after withholding tax in company currency."

  - name: "set_reserve_warehouse"
    type: "VARCHAR"
    role: ["inventory"]
    description: "Warehouse used for reserving stock."
    join_hint: "tabPurchase Order.set_reserve_warehouse = tabWarehouse.name"

  - name: "tax_category"
    type: "VARCHAR"
    role: ["tax"]
    description: "Tax category for this PO."
    join_hint: "tabPurchase Order.tax_category = `tabTax Category`.name"

  - name: "taxes_and_charges"
    type: "VARCHAR"
    role: ["tax"]
    description: "Tax and charges template."
    join_hint: "tabPurchase Order.taxes_and_charges = `tabPurchase Taxes and Charges Template`.name"

  - name: "shipping_rule"
    type: "VARCHAR"
    role: ["logistics"]
    description: "Shipping rule."
    join_hint: "tabPurchase Order.shipping_rule = `tabShipping Rule`.name"

  - name: "incoterm"
    type: "VARCHAR"
    role: ["logistics", "finance"]
    description: "Incoterm used for this PO."
    join_hint: "tabPurchase Order.incoterm = tabIncoterm.name"

  - name: "named_place"
    type: "VARCHAR"
    role: ["logistics"]
    description: "Named delivery place (per Incoterm)."

  - name: "base_taxes_and_charges_added"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Added taxes/charges in company currency."

  - name: "base_taxes_and_charges_deducted"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Deducted taxes/charges in company currency."

  - name: "base_total_taxes_and_charges"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Net taxes/charges in company currency."

  - name: "taxes_and_charges_added"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Added taxes/charges in PO currency."

  - name: "taxes_and_charges_deducted"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Deducted taxes/charges in PO currency."

  - name: "total_taxes_and_charges"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Net taxes/charges in PO currency."

  - name: "base_grand_total"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Grand total before rounding in company currency."

  - name: "base_rounding_adjustment"
    type: "DECIMAL(21,9)"
    role: ["adjustment"]
    description: "Rounding difference in company currency."

  - name: "base_in_words"
    type: "VARCHAR(240)"
    role: ["text"]
    description: "Grand total in words (company currency)."

  - name: "base_rounded_total"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Rounded grand total in company currency."

  - name: "grand_total"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Grand total before rounding in PO currency."

  - name: "rounding_adjustment"
    type: "DECIMAL(21,9)"
    role: ["adjustment"]
    description: "Rounding difference in PO currency."

  - name: "rounded_total"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Rounded grand total in PO currency."

  - name: "disable_rounded_total"
    type: "INT(1)"
    role: ["flag"]
    description: "1 to disable rounded_total."

  - name: "in_words"
    type: "VARCHAR(240)"
    role: ["text"]
    description: "Grand total in words (PO currency)."

  - name: "advance_paid"
    type: "DECIMAL(21,9)"
    role: ["financial_metric"]
    description: "Advance amount paid against this PO."

  - name: "apply_discount_on"
    type: "VARCHAR(140)"
    role: ["parameter"]
    description: "Base used for discount (Net Total or Grand Total)."
    options:
    - Grand Total
    - Net Total


- table: "tabPurchase Order Item"
  synonyms_en:
  - "po line item"
  - "po item"
  - "ordered product"
  - "purchase line"
  - "supplier order item"
  - "ordered items"
  - "items in po"
  - "po products"
  - "items we purchased"
  - "supplier items"
  - "vendor items"
  - "purchased products"
  - "purchase items"
  - "items on purchase order"
  - "what we bought"
  - "materials ordered"
  - "products ordered"
  - "items requested from supplier"
  - "buy order items"
  - "goods ordered"

  description: "Line-level details of each product or service included in a Purchase Order. Stores item, quantity, pricing,\
    \ and delivery schedule information."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique ID for the purchase order item (primary key)"

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the purchase order item was created"

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp of the last modification to this record"

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified the record"

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the record"

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document status: 0 = Draft, 1 = Submitted, 2 = Cancelled"

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Index order of the item in the purchase order document"

  - name: "fg_item"
    type: "VARCHAR(140)"
    role: ["reference"]
    description: "Finished good item associated with this purchase line (if applicable)"
    join_hint: "tabPurchase Order Item.fg_item = tabItem.name"

  - name: "fg_item_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity"]
    description: "Quantity of finished good item linked to this purchase order item"

  - name: "item_code"
    type: "VARCHAR(140)"
    role: ["reference"]
    description: "Code of the purchased item"
    join_hint: "tabPurchase Order Item.item_code = tabItem.name"

  - name: "supplier_part_no"
    type: "VARCHAR(140)"
    role: ["reference"]
    description: "Supplier's part number for this item"

  - name: "item_name"
    type: "VARCHAR(140)"
    role: ["description"]
    description: "Display name of the purchased item"

  - name: "brand"
    type: "VARCHAR(140)"
    role: ["classification"]
    description: "Brand associated with the purchased item"
    join_hint: "tabPurchase Order Item.brand = tabBrand.name"

  - name: "product_bundle"
    type: "VARCHAR(140)"
    role: ["reference"]
    description: "Linked product bundle if the item belongs to a grouped offer"
    join_hint: "tabPurchase Order Item.product_bundle = `tabProduct Bundle`.name"

  - name: "schedule_date"
    type: "DATE"
    role: ["logistics"]
    description: "Planned date for receiving the item as per schedule"

  - name: "expected_delivery_date"
    type: "DATE"
    role: ["logistics"]
    description: "Expected date of delivery based on supplier confirmation"

  - name: "item_group"
    type: "VARCHAR(140)"
    role: ["classification"]
    description: "Group or category under which the item falls"
    join_hint: "tabPurchase Order Item.item_group = `tabItem Group`.name"

  - name: "description"
    type: "LONGTEXT"
    role: ["description"]
    description: "Detailed description of the purchased item"

  - name: "image"
    type: "TEXT"
    role: ["metadata"]
    description: "Image or attachment reference of the item"

  - name: "qty"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Quantity of item ordered in the Purchase Order"

  - name: "stock_uom"
    type: "VARCHAR(140)"
    role: ["unit"]
    description: "Stock unit of measurement used in the inventory"
    join_hint: "tabPurchase Order Item.stock_uom = tabUOM.name"

  - name: "subcontracted_quantity"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Quantity of materials sent to subcontractor for manufacturing"

  - name: "uom"
    type: "VARCHAR(140)"
    role: ["unit"]
    description: "Unit of measurement in which item quantity is specified"
    join_hint: "tabPurchase Order Item.uom = tabUOM.name"

  - name: "conversion_factor"
    type: "DECIMAL(21,9)"
    role: ["calculation"]
    description: "Factor used to convert item quantity from UOM to stock UOM"

  - name: "stock_qty"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Quantity of item converted into stock UOM"

  - name: "price_list_rate"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Item rate fetched from the selected price list"

  - name: "last_purchase_rate"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Last recorded purchase rate for the same item"

  - name: "base_price_list_rate"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Price list rate converted to base currency"

  - name: "margin_type"
    type: "VARCHAR(140)"
    role: ["category"]
    description: "Defines how margin is calculated — Amount or Percentage"
    options:
    - Percentage
    - Amount

  - name: "margin_rate_or_amount"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Value of margin based on margin type (percentage or amount)"

  - name: "rate_with_margin"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Item rate including margin but before discounts"

  - name: "discount_percentage"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Discount percentage applied to the item"

  - name: "discount_amount"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Discount amount applied to this item"

  - name: "distributed_discount_amount"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Discount distributed proportionally across all items"

  - name: "base_rate_with_margin"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Rate with margin converted to base currency"

  - name: "rate"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Final rate per unit after applying discounts and margin"

  - name: "amount"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total amount for the item (rate × qty)"

  - name: "item_tax_template"
    type: "VARCHAR(140)"
    role: ["reference"]
    description: "Linked tax template applied to the item"
    join_hint: "tabPurchase Order Item.item_tax_template = `tabItem Tax Template`.name"

  - name: "base_rate"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Rate per item converted to base currency"

  - name: "base_amount"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total amount of the item converted to base currency"

  - name: "pricing_rules"
    type: "TEXT"
    role: ["metadata"]
    description: "Pricing rules or conditions applied to the item during rate calculation"


  - name: "stock_uom_rate"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Rate of the item per stock unit of measure"

  - name: "is_free_item"
    type: "INT(1)"
    role: ["flag"]
    description: "Indicates whether the item is provided free of cost"

  - name: "apply_tds"
    type: "INT(1)"
    role: ["flag"]
    description: "Indicates if TDS (Tax Deducted at Source) should be applied for this item"

  - name: "net_rate"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Final rate after all discounts and taxes applied per unit"

  - name: "net_amount"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total item amount after discounts but before taxes"

  - name: "base_net_rate"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Net rate per item converted to base currency"

  - name: "base_net_amount"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Net amount converted to base currency"

  - name: "from_warehouse"
    type: "VARCHAR(140)"
    role: ["reference"]
    description: "Warehouse from which the item will be transferred or delivered"
    join_hint: "tabPurchase Order Item.from_warehouse = tabWarehouse.name"

  - name: "warehouse"
    type: "VARCHAR(140)"
    role: ["reference"]
    description: "Warehouse where the item will be stored or received"
    join_hint: "tabPurchase Order Item.warehouse = tabWarehouse.name"

  - name: "actual_qty"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Actual quantity of the item available in the warehouse"

  - name: "company_total_stock"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total stock quantity of the item across all warehouses in the company"

  - name: "material_request"
    type: "VARCHAR(140)"
    role: ["reference"]
    description: "Reference to the linked Material Request document"
    join_hint: "tabPurchase Order Item.material_request = `tabMaterial Request`.name"

  - name: "material_request_item"
    type: "VARCHAR(140)"
    role: ["reference"]
    description: "Reference to the specific Material Request Item row"
    join_hint: "tabPurchase Order Item.material_request_item = `tabMaterial Request Item`.name"

  - name: "sales_order"
    type: "VARCHAR"
    role: ["reference"]
    description: "Linked Sales Order reference for the purchase item"
    join_hint: "tabPurchase Order Item.sales_order = `tabSales Order`.name"

  - name: "sales_order_item"
    type: "VARCHAR"
    role: ["reference"]
    description: "Linked Sales Order Item reference"
    join_hint: "tabPurchase Order Item.sales_order_item = `tabSales Order Item`.name"

  - name: "sales_order_packed_item"
    type: "VARCHAR"
    role: ["reference"]
    description: "Reference to the packed item from Sales Order"
    join_hint: "tabPurchase Order Item.sales_order_packed_item = `tabPacked Item`.name"

  - name: "supplier_quotation"
    type: "VARCHAR"
    role: ["reference"]
    description: "Linked Supplier Quotation reference"
    join_hint: "tabPurchase Order Item.supplier_quotation = `tabSupplier Quotation`.name"

  - name: "supplier_quotation_item"
    type: "VARCHAR"
    role: ["reference"]
    description: "Linked Supplier Quotation Item reference"
    join_hint: "tabPurchase Order Item.supplier_quotation_item = `tabSupplier Quotation Item`.name"

  - name: "delivered_by_supplier"
    type: "INT(1)"
    role: ["flag"]
    description: "Indicates whether the item is delivered directly by the supplier (1 = Yes, 0 = No)"

  - name: "against_blanket_order"
    type: "INT(1)"
    role: ["flag"]
    description: "Indicates whether this item is linked to a blanket order"

  - name: "blanket_order"
    type: "VARCHAR"
    role: ["reference"]
    description: "Linked Blanket Order reference"
    join_hint: "tabPurchase Order Item.blanket_order = `tabBlanket Order`.name"

  - name: "blanket_order_rate"
    type: "DECIMAL(21,9)"
    role: ["rate"]
    description: "Rate as per the Blanket Order agreement"

  - name: "received_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity"]
    description: "Total quantity received for the item"

  - name: "returned_qty"
    type: "DECIMAL(21,9)"
    role: ["quantity"]
    description: "Quantity of items returned"

  - name: "billed_amt"
    type: "DECIMAL(21,9)"
    role: ["amount"]
    description: "Amount billed to date for this item"

  - name: "expense_account"
    type: "VARCHAR"
    role: ["account"]
    description: "Expense account associated with this purchase item"
    join_hint: "tabPurchase Order Item.expense_account = tabAccount.name"

  - name: "wip_composite_asset"
    type: "VARCHAR"
    role: ["reference"]
    description: "Reference to Work-In-Progress composite asset"
    join_hint: "tabPurchase Order Item.wip_composite_asset = `tabComposite Asset`.name"

  - name: "manufacturer"
    type: "VARCHAR"
    role: ["reference"]
    description: "Manufacturer of the item"
    join_hint: "tabPurchase Order Item.manufacturer = tabManufacturer.name"

  - name: "manufacturer_part_no"
    type: "VARCHAR"
    role: ["identifier"]
    description: "Manufacturer’s part number"

  - name: "bom"
    type: "VARCHAR"
    role: ["reference"]
    description: "Linked Bill of Materials reference"
    join_hint: "tabPurchase Order Item.bom = tabBOM.name"

  - name: "include_exploded_items"
    type: "INT(1)"
    role: ["flag"]
    description: "Indicates whether exploded BOM items are included"

  - name: "weight_per_unit"
    type: "DECIMAL(21,9)"
    role: ["weight"]
    description: "Weight per single unit of the item"

  - name: "total_weight"
    type: "DECIMAL(21,9)"
    role: ["weight"]
    description: "Total weight of the item quantity"

  - name: "weight_uom"
    type: "VARCHAR"
    role: ["unit"]
    description: "Unit of measurement for weight"
    join_hint: "tabPurchase Order Item.weight_uom = tabUOM.name"

  - name: "project"
    type: "VARCHAR"
    role: ["reference"]
    description: "Linked project reference (if applicable)"
    join_hint: "tabPurchase Order Item.project = tabProject.name"

  - name: "cost_center"
    type: "VARCHAR"
    role: ["reference", "finance"]
    description: "Specifies the Cost Center to which this item’s expense or revenue is allocated"
    join_hint: "tabPurchase Order Item.cost_center = `tabCost Center`.name"

  - name: "is_fixed_asset"
    type: "INT(1)"
    role: ["flag"]
    description: "Indicates whether the item is a fixed asset (1 = Yes, 0 = No)"

  - name: "item_tax_rate"
    type: "LONGTEXT"
    role: ["tax"]
    description: "JSON or text representation of applicable tax rates for the item"

  - name: "production_plan"
    type: "VARCHAR"
    role: ["reference"]
    description: "Linked Production Plan reference related to this item"
    join_hint: "tabPurchase Order Item.production_plan = `tabProduction Plan`.name"

  - name: "production_plan_item"
    type: "VARCHAR"
    role: ["reference"]
    description: "Linked Production Plan Item reference"
    join_hint: "tabPurchase Order Item.production_plan_item = `tabProduction Plan Item`.name"

  - name: "production_plan_sub_assembly_item"
    type: "VARCHAR"
    role: ["reference"]
    description: "Reference for sub-assembly item within Production Plan"
    join_hint: "tabPurchase Order Item.production_plan_sub_assembly_item = `tabProduction Plan Sub Assembly Item`.name"

  - name: "parent"
    type: "VARCHAR"
    role: ["hierarchy", "reference"]
    description: "Parent document to which this record belongs (e.g., Purchase Order ID)"
    join_hint: "tabPurchase Order Item.parent = `tabPurchase Order`.name"

  - name: "parentfield"
    type: "VARCHAR"
    role: ["system"]
    description: "Internal ERP field name linking this record to its parent document"

  - name: "parenttype"
    type: "VARCHAR"
    role: ["system"]
    description: "Specifies the type of parent document (e.g., Purchase Order, Sales Invoice)"

  notes: |
    - Child doctype of `tabPurchase Order` storing line-item details for each order.
    - Use `docstatus = 1` on the parent to filter finalized and submitted orders.
    - Key joins: `parent` → `tabPurchase Order`.`name`, `item_code` → `tabItem`.`name`.
    - Contains product-level details such as `item_code`, `item_name`, `description`, and `item_group`.
    - Quantity and pricing captured through `qty`, `rate`, `amount`, `base_rate`, and `base_amount`.
    - `schedule_date` defines the planned delivery date for each ordered item.
    - `warehouse` indicates the receiving location for goods.
    - `brand` and `product_bundle` help in product categorization and bundled item tracking.
    - `idx` maintains the display order of items in the document.
    - Indexed fields such as `item_code`, `item_group`, and `warehouse` improve query and reporting performance.

- table: "tabSales Order"
  synonyms_en:
  - "sales order"
  - "customer order"
  - "SO record"
  - "order header"
  - "client purchase order ref"

  description: >
    Stores Sales Order header details including customer info, delivery timeline,
    document series and unit price behavior.

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique Sales Order ID (primary key)"
    synonyms_en: ["order id", "sales order id"]
    synonyms_ar: ["رقم أمر المبيعات", "معرّف الطلب", "المفتاح الرئيسي"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the sales order was created"
    synonyms_en: ["created at", "order created on"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the order was last modified"
    synonyms_en: ["updated at", "last modified"]
    synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last edited this order"
    synonyms_en: ["updated by", "edited by"]
    synonyms_ar: ["تم التعديل بواسطة", "المحرر"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the sales order"
    synonyms_en: ["created by", "creator"]
    synonyms_ar: ["تم الإنشاء بواسطة", "مالك السجل"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Order state: 0 = Draft, 1 = Submitted, 2 = Cancelled"
    synonyms_en: ["status code", "order status"]
    synonyms_ar: ["حالة الطلب", "وضع المستند"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Document index for internal ordering"
    synonyms_en: ["row index", "sorting index"]
    synonyms_ar: ["الفهرس", "ترتيب السجل"]

  - name: "title"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Dynamic or actual title of the sales order, defaults to customer name"
    synonyms_en: ["order title", "document title"]
    synonyms_ar: ["عنوان الطلب"]

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["attribute", "relation"]
    description: "Series pattern used for document naming"
    synonyms_en: ["series code", "document naming series"]
    synonyms_ar: ["تسلسل التسمية", "سلسلة التسمية"]
    options:
    - SAL-ORD-.YYYY.-

  - name: "customer"
    type: "VARCHAR(140)"
    role: ["relation", "attribute"]
    description: "Linked Customer ID"
    join_hint: "tabSales Order.customer = tabCustomer.name"
    synonyms_en: ["customer id", "client id"]
    synonyms_ar: ["معرّف العميل", "اسم العميل"]

  - name: "customer_name"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Customer display name stored at order time"
    synonyms_en: ["client full name", "customer display name"]
    synonyms_ar: ["اسم العميل", "الاسم الكامل للعميل"]

  - name: "tax_id"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Customer tax identification number or GST/VAT ID"
    synonyms_en: ["GST/VAT id", "tax registration number"]
    synonyms_ar: ["الرقم الضريبي", "رقم التسجيل الضريبي"]

  - name: "order_type"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Business order category, default 'Sales'"
    synonyms_en: ["type of order", "transaction type"]
    synonyms_ar: ["نوع الطلب", "نوع المعاملة"]
    options:
    - Sales
    - Maintenance
    - Shopping Cart

  - name: "transaction_date"
    type: "DATE"
    role: ["attribute", "system"]
    description: "Order creation/business date"
    synonyms_en: ["order date", "transaction day"]
    synonyms_ar: ["تاريخ الطلب", "تاريخ المعاملة"]

- name: "delivery_date"
  type: "DATE"
  role: ["attribute"]
  description: "Promised or planned delivery date"
  synonyms_en: ["expected delivery", "planned delivery"]
  synonyms_ar: ["تاريخ التسليم المتوقع", "تاريخ التسليم"]

- name: "po_no"
  type: "VARCHAR(140)"
  role: ["attribute"]
  description: "Customer Purchase Order reference number"
  synonyms_en: ["client PO number", "purchase order no"]
  synonyms_ar: ["رقم PO العميل"]

- name: "po_date"
  type: "DATE"
  role: ["attribute"]
  description: "Customer Purchase Order reference date"
  synonyms_en: ["client PO date"]
  synonyms_ar: ["تاريخ PO العميل"]

- name: "company"
  type: "VARCHAR(140)"
  role: ["relation", "attribute"]
  description: "Linked internal Company/Org ID issuing the order"
  synonyms_en: ["issued by company", "org id"]
  synonyms_ar: ["الشركة", "اسم الشركة"]
  join_hint:
    table: "tabCompany"
    on: "company = tabCompany.name"

- name: "skip_delivery_note"
  type: "INT(1)"
  role: ["attribute", "system"]
  description: "Flag to skip Delivery Note generation for this sales order (0/1)"
  synonyms_en: ["skip DN flag"]
  synonyms_ar: ["تخطي سند التسليم"]
  options: [0, 1]

- name: "has_unit_price_items"
  type: "INT(1)"
  role: ["computed", "attribute"]
  description: "Flag indicating if unit-price based billing lines exist"
  synonyms_en: ["uses unit pricing"]
  synonyms_ar: ["يحتوي على تسعير للوحدة"]
  options: [0, 1]

- name: "amended_from"
  type: "VARCHAR(140)"
  role: ["relation", "attribute"]
  description: "Original Sales Order ID if this order was amended"
  synonyms_en: ["amended from order", "original SO id"]
  synonyms_ar: ["رقم الطلب الأصلي", "مرجع التعديل"]
  join_hint:
    table: "tabSales Order"
    on: "amended_from = tabSales Order.name"

- name: "cost_center"
  type: "VARCHAR(140)"
  role: ["relation", "attribute"]
  description: "Linked Cost Center for financial allocation reference"
  synonyms_en: ["department cost center", "expense cost center"]
  synonyms_ar: ["مركز التكلفة", "مركز المصاريف"]
  join_hint:
    table: "tabCost Center"
    on: "cost_center = tabCost Center.name"

- name: "project"
  type: "VARCHAR(140)"
  role: ["relation", "attribute"]
  description: "Linked Project ID for order grouping or costing reference"
  synonyms_en: ["linked project", "project id"]
  synonyms_ar: ["رمز المشروع", "المشروع المرتبط"]
  join_hint:
    table: "tabProject"
    on: "project = tabProject.name"

- name: "currency"
  type: "VARCHAR(140)"
  role: ["attribute", "relation"]
  description: "Currency used in Sales Order"
  synonyms_en: ["order currency", "SO currency"]
  synonyms_ar: ["عملة الطلب", "العملة"]
  join_hint:
    table: "tabCurrency"
    on: "currency = tabCurrency.name"

- name: "conversion_rate"
  type: "DECIMAL(21,9)"
  role: ["attribute", "computed"]
  description: "Rate to convert SO currency into company base currency"
  synonyms_en: ["SO to base fx rate", "currency conversion rate"]

- name: "selling_price_list"
  type: "VARCHAR(140)"
  role: ["attribute", "relation"]
  description: "Price list reference used for item pricing"
  synonyms_en: ["catalog price list", "SO price list"]
  synonyms_ar: ["قائمة أسعار البيع", "كتالوج الأسعار"]
  join_hint:
    table: "tabPrice List"
    on: "selling_price_list = tabPrice List.name"

- name: "price_list_currency"
  type: "VARCHAR(140)"
  role: ["attribute", "relation"]
  description: "Currency used in the selected price list"
  synonyms_en: ["catalog currency", "price list fx currency"]

- name: "plc_conversion_rate"
  type: "DECIMAL(21,9)"
  role: ["attribute", "computed"]
  description: "Rate to convert price list currency to base currency"

- name: "ignore_pricing_rule"
  type: "INT(1)"
  role: ["attribute", "system"]
  description: "Flag to bypass pricing rules (1 = Yes, 0 = No)"
  synonyms_en: ["bypass pricing rule flag", "ignore pricing"]
  synonyms_ar: ["تجاهل قواعد التسعير", "تخطي التسعير"]
  options: [0, 1]

- name: "scan_barcode"
  type: "VARCHAR(140)"
  role: ["attribute"]
  description: "Temporary barcode scanned input reference"

- name: "set_warehouse"
  type: "VARCHAR(140)"
  role: ["attribute", "relation"]
  description: "Default warehouse reference set at order level"
  synonyms_en: ["default dispatch warehouse", "order warehouse"]
  synonyms_ar: ["المستودع المحدد", "المخزن الافتراضي"]
  join_hint:
    table: "tabWarehouse"
    on: "set_warehouse = tabWarehouse.name"

- name: "reserve_stock"
  type: "INT(1)"
  role: ["attribute", "computed"]
  description: "Flag indicating if stock reservation is enabled for order (0/1)"
  synonyms_en: ["stock reserved flag", "inventory reserved"]
  synonyms_ar: ["تم حجز المخزون", "حالة الحجز"]
  options: [0, 1]

- name: "total_qty"
  type: "DECIMAL(21,9)"
  role: ["computed", "attribute"]
  description: "Total ordered quantity of all items"

- name: "total_net_weight"
  type: "DECIMAL(21,9)"
  role: ["computed", "attribute"]
  description: "Total net weight of all ordered items"

- name: "base_total"
  type: "DECIMAL(21,9)"
  role: ["computed"]
  description: "Total before tax/discount in base currency"

- name: "base_net_total"
  type: "DECIMAL(21,9)"
  role: ["computed"]
  description: "Net total after discount before tax in base currency"

- name: "total"
  type: "DECIMAL(21,9)"
  role: ["computed", "attribute"]
  description: "Total amount before tax/discount"

- name: "net_total"
  type: "DECIMAL(21,9)"
  role: ["computed", "attribute"]
  description: "Total after discount excluding taxes"

- name: "tax_category"
  type: "VARCHAR(140)"
  role: ["attribute", "relation"]
  description: "Tax category reference applied on order"
  join_hint:
    table: "tabTax Category"
    on: "tax_category = tabTax Category.name"

- name: "taxes_and_charges"
  type: "VARCHAR(140)"
  role: ["attribute", "relation"]
  description: "Taxes and charges template linked reference"
  join_hint:
    table: "tabSales Taxes and Charges Template"
    on: "taxes_and_charges = tabSales Taxes and Charges Template.name"

- name: "shipping_rule"
  type: "VARCHAR(140)"
  role: ["attribute", "relation"]
  description: "Shipping rule reference applied"
  join_hint:
    table: "tabShipping Rule"
    on: "shipping_rule = tabShipping Rule.name"

- name: "incoterm"
  type: "VARCHAR(140)"
  role: ["attribute", "relation"]
  description: "Incoterm reference for shipping terms"
  join_hint:
    table: "tabIncoterm"
    on: "incoterm = tabIncoterm.name"


- name: "named_place"
  type: "VARCHAR(140)"
  role: ["attribute"]
  description: "Location linked to incoterm"
  synonyms_en: ["shipping location"]
  synonyms_ar: ["مكان الشحن", "المكان المحدد"]

- name: "base_total_taxes_and_charges"
  type: "DECIMAL(21,9)"
  role: ["computed", "attribute"]
  description: "Total taxes/charges in base currency"
  synonyms_en: ["base taxes total", "base charges total", "taxes and charges base currency"]
  synonyms_ar: ["إجمالي الضرائب بعملة الأساس", "إجمالي الرسوم بالأساس"]

- name: "total_taxes_and_charges"
  type: "DECIMAL(21,9)"
  role: ["computed", "attribute"]
  description: "Total taxes/charges in order currency"
  synonyms_en: ["order taxes total", "charges total"]
  synonyms_ar: ["إجمالي الضرائب", "مجموع الرسوم"]

- name: "base_grand_total"
  type: "DECIMAL(21,9)"
  role: ["computed"]
  description: "Grand total in base currency"
  synonyms_en: ["overall base total", "final total base currency"]
  synonyms_ar: ["الإجمالي النهائي بالأساس"]

- name: "base_rounding_adjustment"
  type: "DECIMAL(21,9)"
  role: ["computed"]
  description: "Rounding adjustment in base currency"
  synonyms_ar: ["تعديل التقريب بعملة الأساس"]

- name: "base_rounded_total"
  type: "DECIMAL(21,9)"
  role: ["computed"]
  description: "Rounded total in base currency"
  synonyms_en: ["rounded overall total base currency"]
  synonyms_ar: ["الإجمالي المقرّب بالأساس"]

- name: "base_in_words"
  type: "VARCHAR(240)"
  role: ["computed", "attribute"]
  description: "Grand total written in words in base currency"
  synonyms_en: ["base total in words"]
  synonyms_ar: ["الإجمالي بالكلمات بالأساس"]

- name: "grand_total"
  type: "DECIMAL(21,9)"
  role: ["computed", "attribute"]
  description: "Grand total in order currency"
  synonyms_en: ["overall total", "final total"]
  synonyms_ar: ["الإجمالي النهائي", "المجموع"]

- name: "rounding_adjustment"
  type: "DECIMAL(21,9)"
  role: ["computed", "attribute"]
  description: "Rounding adjustment in order currency"
  synonyms_en: ["rounding difference"]
  synonyms_ar: ["فرق التقريب"]

- name: "rounded_total"
  type: "DECIMAL(21,9)"
  role: ["computed", "attribute"]
  description: "Rounded total in order currency"
  synonyms_en: ["final rounded total"]
  synonyms_ar: ["المجموع المقرّب"]

- name: "in_words"
  type: "VARCHAR(240)"
  role: ["computed", "attribute"]
  description: "Grand total written in words in order currency"
  synonyms_en: ["total in words"]
  synonyms_ar: ["المجموع بالكلمات"]

- name: "advance_paid"
  type: "DECIMAL(21,9)"
  role: ["attribute"]
  description: "Total advance paid for this sales order"
  synonyms_en: ["advance paid amount", "customer advance paid"]
  synonyms_ar: ["إجمالي السلفة المدفوعة", "المقدم المدفوع"]

- name: "disable_rounded_total"
  type: "INT(1)"
  role: ["attribute", "system"]
  description: "Flag to disable rounding (1 = Yes, 0 = No)"
  synonyms_en: ["rounding disabled"]
  synonyms_ar: ["تعطيل التقريب", "إيقاف التقريب"]
  options: [0, 1]

- name: "apply_discount_on"
  type: "VARCHAR(140)"
  role: ["attribute"]
  description: "Discount application base such as Grand Total"
  synonyms_en: ["discount base field", "apply discount on"]
  synonyms_ar: ["تطبيق الخصم على", "أساس الخصم"]
  options:
  - "Grand Total"
  - "Net Total"

- name: "base_discount_amount"
  type: "DECIMAL(21,9)"
  role: ["computed", "attribute"]
  description: "Discount amount in base currency"
  synonyms_en: ["base discount value"]
  synonyms_ar: ["مبلغ الخصم بالأساس"]

- name: "coupon_code"
  type: "VARCHAR(140)"
  role: ["attribute", "relation"]
