    synonyms_en: ["unit of measure", "uom", "measurement unit"]
    synonyms_ar: ["وحدة القياس", "الوحدة", "مقياس الكمية"]
    join_hint: tabPurchase Receipt Item.uom = tabUOM.name

  - name: "stock_uom"
    type: "VARCHAR"
    role: ["unit"]
    description: "Base stock unit used in inventory for this item."
    synonyms_en: ["stock unit", "inventory uom", "base unit"]
    synonyms_ar: ["وحدة المخزون", "الوحدة الأساسية", "مقياس التخزين"]
    join_hint: tabPurchase Receipt Item.stock_uom = tabUOM.name

  - name: "conversion_factor"
    type: "DECIMAL"
    role: ["calculation"]
    description: "Conversion rate between transaction UOM and stock UOM."
    synonyms_en: ["conversion factor", "uom conversion", "unit conversion"]
    synonyms_ar: ["عامل التحويل", "معدل التحويل", "تحويل الوحدة"]

  - name: "retain_sample"
    type: "INT"
    role: ["flag"]
    description: "Indicates if a sample is retained for testing (1 = Yes, 0 = No)."
    synonyms_en: ["retain sample", "sample retained", "test sample kept"]
    synonyms_ar: ["الاحتفاظ بالعينة", "تم الاحتفاظ بعينة", "عينة للفحص"]

  - name: "sample_quantity"
    type: "INT"
    role: ["quantity"]
    description: "Quantity of sample retained for testing or quality control."
    synonyms_en: ["sample quantity", "test sample qty", "retained qty"]
    synonyms_ar: ["كمية العينة", "كمية الفحص", "كمية محتجزة"]

  - name: "received_stock_qty"
    type: "DECIMAL"
    role: ["quantity"]
    description: "Quantity of items received, converted to stock UOM."
    synonyms_en: ["received stock quantity", "stock qty received", "inventory received qty"]
    synonyms_ar: ["كمية المخزون المستلمة", "الكمية المخزنة", "كمية استلام المخزون"]

  - name: "stock_qty"
    type: "DECIMAL"
    role: ["quantity"]
    description: "Total stock quantity considering conversion factor."
    synonyms_en: ["stock quantity", "converted qty", "inventory quantity"]
    synonyms_ar: ["كمية المخزون", "كمية محوّلة", "عدد الوحدات في المخزون"]

  - name: "returned_qty"
    type: "DECIMAL"
    role: ["quantity"]
    description: "Quantity returned to the supplier after inspection."
    synonyms_en: ["returned quantity", "supplier return qty", "qty sent back"]
    synonyms_ar: ["الكمية المعادة", "كمية تم إرجاعها", "الكمية المرتجعة"]

  - name: "price_list_rate"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Rate of the item as per the price list."
    synonyms_en: ["price list rate", "catalog rate", "listed price"]
    synonyms_ar: ["سعر القائمة", "سعر الكتالوج", "السعر المدرج"]

  - name: "base_price_list_rate"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Base rate from the price list in the company’s base currency."
    synonyms_en: ["base price list rate", "base catalog rate", "base listed price"]
    synonyms_ar: ["سعر القائمة الأساسي", "السعر الأساسي", "السعر في العملة الأساسية"]

  - name: "margin_type"
    type: "VARCHAR"
    role: ["pricing"]
    description: "Type of margin applied (e.g., Percentage, Amount)."
    synonyms_en: ["margin type", "profit margin type", "markup type"]
    synonyms_ar: ["نوع الهامش", "نوع الربح", "فئة الهامش"]
    options: &id004
    - Percentage
    - Amount

  - name: "margin_rate_or_amount"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Margin value applied to the rate, either as a percentage or fixed amount."
    synonyms_en: ["margin rate", "profit margin", "markup value"]
    synonyms_ar: ["معدل الهامش", "قيمة الربح", "قيمة الزيادة"]

  - name: "rate_with_margin"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Final rate after applying margin adjustments."
    synonyms_en: ["rate with margin", "final rate", "selling rate"]
    synonyms_ar: ["السعر بعد الهامش", "السعر النهائي", "السعر المعدّل"]

  - name: "discount_percentage"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Discount percentage applied on the item."
    synonyms_en: ["discount percent", "discount rate", "percentage off"]
    synonyms_ar: ["نسبة الخصم", "معدل الخصم", "خصم مئوي"]

  - name: "discount_amount"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Discount amount deducted from the item’s price."
    synonyms_en: ["discount amount", "discount value", "price reduction"]
    synonyms_ar: ["مبلغ الخصم", "قيمة الخصم", "الخصم النقدي"]

  - name: "distributed_discount_amount"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Distributed portion of total discount allocated to this item."
    synonyms_en: ["distributed discount", "allocated discount", "item-level discount"]
    synonyms_ar: ["الخصم الموزع", "الخصم المخصص", "خصم على مستوى العنصر"]

  - name: "base_rate_with_margin"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Base currency rate after margin adjustment, used for accounting and reporting."
    synonyms_en: ["base rate with margin", "adjusted base rate", "base selling rate"]
    synonyms_ar: ["السعر الأساسي بعد الهامش", "السعر المعدّل الأساسي", "سعر البيع الأساسي"]

  - name: "rate"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Rate per unit of the item in the transaction currency."
    synonyms_en: ["rate", "item rate", "unit price"]
    synonyms_ar: ["السعر", "سعر الوحدة", "سعر العنصر"]

  - name: "amount"
    type: "DECIMAL"
    role: ["pricing", "calculation"]
    description: "Total amount for the item (rate × quantity) before discounts and taxes."
    synonyms_en: ["amount", "total amount", "line total"]
    synonyms_ar: ["المبلغ", "المجموع الفرعي", "القيمة الإجمالية"]

  - name: "base_rate"
    type: "DECIMAL"
    role: ["pricing"]
    description: "Rate of the item in the company’s base currency."
