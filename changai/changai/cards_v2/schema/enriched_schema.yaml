  - name: "quality_inspection_template"
    type: "VARCHAR"
    role: ["quality"]
    description: "Template used for quality inspection"
    synonyms_en: ["inspection template", "quality check form"]
    synonyms_ar: ["نموذج فحص الجودة"]
    join_hint: tabItem.quality_inspection_template = tabQuality Inspection Template.name

  - name: "inspection_required_before_delivery"
    type: "INT"
