  synonyms_en: ["liked by users"]
  synonyms_ar: ["الإعجابات"]


  notes: |
    - Header table for **Sales Order**, child item tables store product lines separately.
    - PO references (`po_no`, `po_date`) are for linkage/audit only, not financial postings.
    - Delivery Note creation is controlled by handler logic, flagged by `skip_delivery_note`.
    - No inventory or accounting impact until order is processed by fulfillment and posting jobs.


- table: "tabAddress"
  synonyms_en:
    - "address"
    - "location record"
    - "contact address"
    - "party address"
    - "company address"
    - "shipping address entry"
  description: "Stores structured address information used across customers, suppliers, employees, and company entities, including contact details, location fields, and meta flags."

  fields:
    - name: "name"
      type: "VARCHAR(140)"
      role: ["id"]
      description: "Unique document ID, primary key"
      synonyms_en: ["record id", "address id", "document id"]
      synonyms_ar: ["معرّف السجل", "معرّف العنوان", "المفتاح الرئيسي"]

    - name: "creation"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp when the record was created"
      synonyms_en: ["created at", "creation time"]
      synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

    - name: "modified"
      type: "DATETIME(6)"
      role: ["system"]
      description: "Timestamp when the record was last modified"
      synonyms_en: ["updated at", "last modified"]
      synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

    - name: "modified_by"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "User who last modified the record"
      synonyms_en: ["updated by", "modified user"]
      synonyms_ar: ["تم التعديل بواسطة", "المحرر"]

    - name: "owner"
      type: "VARCHAR(140)"
      role: ["system"]
      description: "User who created the record"
      synonyms_en: ["created by", "record owner"]
      synonyms_ar: ["تم الإنشاء بواسطة", "مالك السجل"]

    - name: "docstatus"
      type: "INT(1)"
      role: ["system"]
      description: "Document status, 0 draft, 1 submitted, 2 cancelled"
      synonyms_en: ["document status", "status code"]
      synonyms_ar: ["حالة المستند", "رمز الحالة"]

    - name: "idx"
      type: "INT(8)"
      role: ["system"]
      description: "Row index used for ordering"
      synonyms_en: ["index", "row order"]
      synonyms_ar: ["فهرس", "ترتيب"]

    - name: "address_title"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Display title for this address such as Office or Main Branch"
      synonyms_en: ["title", "display name", "address label"]
      synonyms_ar: ["عنوان العنوان", "اسم العرض"]

    - name: "address_type"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Category of the address such as Billing, Shipping, Office, Home"
      synonyms_en: ["type", "address category"]
      synonyms_ar: ["نوع العنوان", "تصنيف العنوان"]

    - name: "address_line1"
      type: "VARCHAR(240)"
      role: ["attribute"]
      description: "Primary street address line"
      synonyms_en: ["street line 1", "line 1"]
      synonyms_ar: ["سطر العنوان 1", "العنوان الأول"]

    - name: "address_line2"
      type: "VARCHAR(240)"
      role: ["attribute"]
      description: "Optional second line of the street address"
      synonyms_en: ["street line 2", "line 2"]
      synonyms_ar: ["سطر العنوان 2", "العنوان الثاني"]

    - name: "city"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "City name"
      synonyms_en: ["city name", "municipality"]
      synonyms_ar: ["المدينة"]

    - name: "county"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "County or regional division"
      synonyms_en: ["region", "county name"]
      synonyms_ar: ["المقاطعة", "المنطقة"]

    - name: "state"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "State or province"
      synonyms_en: ["province", "state name"]
      synonyms_ar: ["الولاية", "المقاطعة"]

    - name: "country"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Country name"
      synonyms_en: ["nation", "country field"]
      synonyms_ar: ["الدولة", "البلد"]

    - name: "pincode"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Postal or ZIP code"
      synonyms_en: ["postal code", "zip code"]
      synonyms_ar: ["الرمز البريدي"]

    - name: "email_id"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Email address associated with this location"
      synonyms_en: ["email", "contact email"]
      synonyms_ar: ["البريد الإلكتروني"]

    - name: "phone"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Phone number for this address"
      synonyms_en: ["contact number", "telephone"]
      synonyms_ar: ["رقم الهاتف"]

    - name: "fax"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Fax number"
      synonyms_en: ["fax number"]
      synonyms_ar: ["فاكس"]

    - name: "is_primary_address"
      type: "INT(1)"
      role: ["flag"]
      description: "1 if this is the party's primary address"
      synonyms_en: ["primary flag", "main address"]
      synonyms_ar: ["العنوان الأساسي"]

    - name: "is_shipping_address"
      type: "INT(1)"
      role: ["flag"]
      description: "1 if this is the shipping address"
      synonyms_en: ["shipping flag", "delivery address"]
      synonyms_ar: ["عنوان الشحن"]

    - name: "disabled"
      type: "INT(1)"
      role: ["flag"]
      description: "1 if this address is inactive"
      synonyms_en: ["inactive flag", "disabled flag"]
      synonyms_ar: ["معطل", "غير نشط"]

    - name: "_user_tags"
      type: "TEXT"
      role: ["system"]
      description: "Tags applied by users"
      synonyms_en: ["user tags"]
      synonyms_ar: ["علامات المستخدم"]

    - name: "_comments"
      type: "TEXT"
      role: ["system"]
      description: "JSON comments stored for this record"
      synonyms_en: ["comments", "comment log"]
      synonyms_ar: ["التعليقات"]

    - name: "_assign"
      type: "TEXT"
      role: ["system"]
      description: "Assignment JSON data"
      synonyms_en: ["assignments"]
      synonyms_ar: ["التعيينات"]

    - name: "_liked_by"
      type: "TEXT"
      role: ["system"]
      description: "List of users who liked this record"
      synonyms_en: ["likes", "liked by"]
      synonyms_ar: ["إعجابات"]

    - name: "tax_category"
      type: "VARCHAR(140)"
      role: ["attribute"]
      description: "Tax category used for billing or compliance"
      synonyms_en: ["tax group", "tax classification"]
      synonyms_ar: ["فئة الضريبة"]

    - name: "is_your_company_address"
      type: "INT(1)"
      role: ["flag"]
      description: "1 if this address belongs to your own company entity"
      synonyms_en: ["company address flag"]
      synonyms_ar: ["عنوان الشركة"]

    - name: "custom_building_number"
      type: "VARCHAR(4)"
      role: ["attribute"]
      description: "Optional building number often used in ZATCA compliant formats"
      synonyms_en: ["building no", "structure number"]
      synonyms_ar: ["رقم المبنى"]

  notes: |
    - This table centralizes address data used across multiple modules.
    - Can link to Customers, Suppliers, Employees, or Company records.
    - Supports regional and tax categorization for compliance.
    - Indexed fields: city, country, pincode, modified for faster filtering.
    - Flags (primary, shipping, company) help determine functional role of each address.

- table: "tabAddress Template"

  synonyms_en:
    - "address format template"
    - "country address template"
    - "address layout"
    - "address structure"
