  notes: |
    - This doctype is the root of financial and organizational configuration.
    - Most modules, including accounting, HR, payroll, tax, and assets, depend on company settings.
    - The structure supports multi-company setups and nested company hierarchies using `lft` and `rgt`.
    - Many fields act as defaults for other transactions like journals, sales, purchases and inventory operations.


- table: "tabPurchase Receipt Item"
  synonyms_en:
  - "goods receipt item"
  - "purchase receipt line"
  - "received goods entry"
  - "material receipt item"
  - "purchase GRN detail"
  description: "Individual item entries under a Purchase Receipt, recording details of goods received from suppliers."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique identifier for each purchase receipt item record."
    synonyms_en: ["item record id", "purchase receipt item id", "entry id"]
    synonyms_ar: ["معرّف البند", "رمز عنصر استلام الشراء", "معرّف السجل"]

  - name: "creation"
    type: "DATETIME"
    role: ["audit"]
    description: "Timestamp when the record was created."
    synonyms_en: ["creation time", "created on", "record created at"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

  - name: "modified"
    type: "DATETIME"
    role: ["audit"]
    description: "Timestamp of the last modification of the record."
    synonyms_en: ["modified on", "updated on", "last updated time"]
    synonyms_ar: ["تاريخ التعديل", "آخر تعديل", "تم التعديل في"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["audit"]
    description: "User who last modified the record."
    synonyms_en: ["modified by", "updated by", "last editor"]
    synonyms_ar: ["عُدّل بواسطة", "تم التحديث بواسطة", "آخر من عدّل"]

  - name: "owner"
    type: "VARCHAR"
    role: ["audit"]
    description: "User who originally created the record."
    synonyms_en: ["owner", "created by", "record creator"]
    synonyms_ar: ["المالك", "أنشأ بواسطة", "منشئ السجل"]

  - name: "docstatus"
    type: "INT"
    role: ["status"]
    description: "Document status (0 = Draft, 1 = Submitted, 2 = Cancelled)."
    synonyms_en: ["document status", "record state", "approval status"]
    synonyms_ar: ["حالة المستند", "حالة السجل", "حالة الموافقة"]

  - name: "idx"
    type: "INT"
    role: ["system"]
    description: "Index used for maintaining order of items in the Purchase Receipt."
    synonyms_en: ["index", "row order", "sequence number"]
    synonyms_ar: ["الفهرس", "ترتيب الصف", "رقم التسلسل"]

  - name: "barcode"
    type: "VARCHAR"
    role: ["reference"]
    description: "Barcode assigned to the item for identification or scanning."
    synonyms_en: ["item barcode", "product code", "scan code"]
    synonyms_ar: ["الرمز الشريطي", "رمز المنتج", "رمز المسح"]

  - name: "has_item_scanned"
    type: "INT"
    role: ["flag"]
    description: "Indicates if the item has been scanned (1 = Yes, 0 = No)."
    synonyms_en: ["item scanned", "scan flag", "barcode verified"]
    synonyms_ar: ["تم مسح العنصر", "علامة المسح", "رمز تم التحقق منه"]

  - name: "item_code"
    type: "VARCHAR"
    role: ["reference"]
    description: "Code that identifies the specific item being received."
    synonyms_en: ["item code", "product id", "sku", "inventory code"]
    synonyms_ar: ["رمز العنصر", "رمز المنتج", "رمز المخزون", "رمز السلعة"]
    join_hint: tabPurchase Receipt Item.item_code = tabItem.name

  - name: "product_bundle"
    type: "VARCHAR"
    role: ["reference"]
    description: "Reference to the product bundle that includes this item, if applicable."
    synonyms_en: ["bundle code", "product bundle", "kit reference"]
    synonyms_ar: ["حزمة المنتج", "رمز الحزمة", "مرجع المجموعة"]
    join_hint: tabPurchase Receipt Item.product_bundle = tabProduct Bundle.name

  - name: "supplier_part_no"
    type: "VARCHAR"
    role: ["reference"]
    description: "Part number assigned by the supplier for this item."
    synonyms_en: ["supplier part number", "vendor part id", "supplier item code"]
    synonyms_ar: ["رقم جزء المورد", "رمز المورد", "رمز العنصر من المورد"]

  - name: "item_name"
    type: "VARCHAR"
    role: ["attribute"]
    description: "The name of the received item as per the item master or supplier record."
    synonyms_en: ["item name", "product name", "goods name"]
    synonyms_ar: ["اسم العنصر", "اسم المنتج", "اسم البضاعة"]

  - name: "description"
    type: "LONGTEXT"
    role: ["attribute"]
    description: "Detailed description of the item received, including specifications or remarks."
    synonyms_en: ["item description", "product details", "specification"]
    synonyms_ar: ["وصف العنصر", "تفاصيل المنتج", "المواصفات"]

  - name: "brand"
    type: "VARCHAR"
    role: ["attribute"]
    description: "Brand name of the received item."
    synonyms_en: ["brand", "manufacturer", "make"]
    synonyms_ar: ["العلامة التجارية", "المُصنّع", "النوع"]
    join_hint: tabPurchase Receipt Item.brand = tabBrand.name

  - name: "item_group"
    type: "VARCHAR"
