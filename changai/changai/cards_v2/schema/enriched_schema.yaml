  - name: "is_sales_item"
    type: "INT"
    default: 1
    role: ["sales", "inventory"]
    description: "Indicates whether the item can be sold"
    synonyms_en: ["sales item", "sellable item"]
    synonyms_ar: ["عنصر مبيعات"]

  - name: "max_discount"
    type: "DECIMAL(21,9)"
    default: 0.000000000
    role: ["sales", "pricing"]
    description: "Maximum discount percentage allowed for this item"
    synonyms_en: ["maximum discount", "item discount limit"]
    synonyms_ar: ["الحد الأقصى للخصم"]

  - name: "inspection_required_before_purchase"
    type: "INT"
    default: 0
    role: ["purchase", "quality"]
    description: "Specifies if quality inspection is required before purchase"
    synonyms_en: ["pre-purchase inspection"]
