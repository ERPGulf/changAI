    synonyms_en: ["renewal token"]
    synonyms_ar: ["رمز التحديث", "رمز التجديد"]

  - name: "expiration_time"
    type: "DATETIME(6)"
    role: ["attribute"]
    description: "Exact expiration timestamp of the access token"
    synonyms_en: ["token expiry time", "expires at"]
    synonyms_ar: ["وقت انتهاء الصلاحية", "ينتهي في"]

  - name: "expires_in"
    type: "INT(11)"
    default: 0
    role: ["attribute"]
    description: "Seconds until token expires"
    synonyms_en: ["expiry duration", "valid for seconds"]
    synonyms_ar: ["مدة الصلاحية بالثواني"]

  - name: "status"
    type: "VARCHAR(140)"
    role: ["state"]
    description: "Current state of the token"
    synonyms_en: ["token status"]
    synonyms_ar: ["حالة الرمز"]
    options:
    - Active
    - Revoked

  - name: "_user_tags"
    type: "TEXT"
    role: ["meta"]
    description: "Custom user tags for this token record"
    synonyms_en: ["tags"]
    synonyms_ar: ["وسوم", "علامات"]

  - name: "_comments"
    type: "TEXT"
    role: ["meta"]
    description: "Internal comments or notes"
    synonyms_en: ["comments", "notes"]
    synonyms_ar: ["تعليقات داخلية"]

  - name: "_assign"
    type: "TEXT"
    role: ["meta"]
    description: "Assigned user or task references"
    synonyms_en: ["assignments"]
    synonyms_ar: ["تعيينات"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["meta"]
    description: "Users who liked this token record"
    synonyms_en: ["likes"]
    synonyms_ar: ["الإعجابات"]

  notes: |
    - Used for API authentication using OAuth2 Bearer tokens.
    - Includes both access and refresh tokens.
    - access_token is unique and indexed for fast lookup.
    - expiration can be checked using expiration_time or expires_in.
    - Linked to an OAuth client app and a user record.

- table: "tabOAuth Authorization Code"

  synonyms_en:
  - "oauth authorization code"
  - "authorization token code"
  - "oauth code"
  - "auth code"

  synonyms_ar:
  - "رمز تفويض OAuth"
  - "رمز المصادقة"
  - "رمز التفويض"

  description: "Stores OAuth authorization codes used for secure login and access delegation."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique record identifier"
    synonyms_en: ["auth record id", "oauth id"]
    synonyms_ar: ["معرف رمز التفويض", "رقم السجل"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Record created timestamp"
    synonyms_en: ["created at", "generated on"]
    synonyms_ar: ["تاريخ الإنشاء", "تم الإنشاء في"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Last modified timestamp"
    synonyms_en: ["updated at", "modified time"]
    synonyms_ar: ["آخر تعديل في", "تاريخ التعديل"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last updated the record"
    synonyms_en: ["updated by", "last editor"]
    synonyms_ar: ["تم التعديل بواسطة", "آخر من عدّل"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who generated the authorization code"
    synonyms_en: ["created by", "code owner"]
    synonyms_ar: ["مالك الرمز", "تم الإنشاء بواسطة"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Workflow status"
    synonyms_en: ["code state", "document status"]
    synonyms_ar: ["حالة الرمز"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row ordering index"
    synonyms_en: ["index", "order"]
    synonyms_ar: ["الفهرس", "الترتيب"]

  - name: "client"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "OAuth client application requesting access"
    synonyms_en: ["auth client", "client app"]
    synonyms_ar: ["التطبيق العميل", "برنامج الربط"]
    join_hint: tabOAuth Authorization Code.client = tabOAuth Client.name

  - name: "user"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "User receiving the authorization code"
    synonyms_en: ["authorized user", "auth user"]
    synonyms_ar: ["المستخدم المصرّح له"]
    join_hint: tabOAuth Authorization Code.user = tabUser.name

  - name: "scopes"
    type: "TEXT"
    role: ["property"]
    description: "Permissions requested by the client"
    synonyms_en: ["oauth scope", "access scope", "permissions"]
    synonyms_ar: ["نطاق الصلاحيات", "الأذونات", "الصلاحيات المطلوبة"]

  - name: "authorization_code"
    type: "VARCHAR(140)"
    unique: true
    role: ["token"]
    description: "Generated OAuth authorization code"
    synonyms_en: ["oauth code", "auth code", "login code"]
    synonyms_ar: ["رمز التفويض", "رمز المصادقة"]

  - name: "expiration_time"
    type: "DATETIME(6)"
    role: ["property"]
    description: "When the code expires"
    synonyms_en: ["expiry time", "valid till"]
    synonyms_ar: ["وقت انتهاء الصلاحية"]

  - name: "redirect_uri_bound_to_authorization_code"
    type: "VARCHAR(140)"
    role: ["property"]
    description: "Redirect URI linked to this OAuth code"
    synonyms_en: ["callback url", "redirect url"]
    synonyms_ar: ["رابط إعادة التوجيه", "عنوان الرجوع"]

  - name: "validity"
    type: "VARCHAR(140)"
    role: ["property"]
    description: "Validity description or duration tag"
    synonyms_en: ["validity period", "code validity"]
    synonyms_ar: ["مدة الصلاحية", "صالحية الرمز"]
    options:
    - Valid
    - Invalid

  - name: "nonce"
    type: "VARCHAR(140)"
    role: ["security"]
    description: "Random value to prevent replay attacks"
    synonyms_en: ["security nonce", "auth nonce"]
    synonyms_ar: ["رقم عشوائي للأمان"]

  - name: "code_challenge"
    type: "VARCHAR(140)"
    role: ["security"]
    description: "PKCE challenge string"
    synonyms_en: ["pkce challenge", "code verifier challenge"]
    synonyms_ar: ["تحدي PKCE", "قيمة التحدي للأمان"]

  - name: "code_challenge_method"
    type: "VARCHAR(140)"
    role: ["property"]
    description: "Method used for PKCE challenge"
    synonyms_en: ["challenge method", "pkce method"]
    synonyms_ar: ["طريقة التحدي", "منهج PKCE"]
    options:
    - s256
    - plain

  - name: "_user_tags"
    type: "TEXT"
    role: ["meta"]
    description: "Tags added by system or user"
    synonyms_en: ["tags", "label tags"]
    synonyms_ar: ["الوسوم", "علامات"]

  - name: "_comments"
    type: "TEXT"
    role: ["meta"]
    description: "Internal comments about the code"
    synonyms_en: ["comments", "internal notes"]
    synonyms_ar: ["تعليقات داخلية"]

  - name: "_assign"
    type: "TEXT"
    role: ["meta"]
    description: "Assignment references"
    synonyms_en: ["assign", "assigned data"]
    synonyms_ar: ["بيانات التعيين"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["meta"]
    description: "Like tracking field"
    synonyms_en: ["liked by users"]
    synonyms_ar: ["أعجب به", "إعجابات"]

  notes: |
    - Used in OAuth 2.0 login flows.
    - Supports PKCE security with code challenge.
    - Each code is unique and has expiry.
    - Linked with client apps and authorized users.
    - Contains permission scopes for access control.
    - Helps manage secure redirect callback URLs.

- table: "tabQuotation"
  synonyms_en:
  - "quotation"
  - "sales quote"
  - "customer quotation"
  - "quote document"
  - "proposal quote"
  - "client quotation"
  - "quotation header"
  - "quote master"

  description: "Stores quotation records created for customers or parties, tracks validity, ownership, transaction dates and\
    \ quotation direction."

  fields:
  - name: "name"
