    synonyms_en: ["source item"]
    synonyms_ar: ["الصنف المصدر"]

  - name: "amended_from"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Previous BOM from which this one was amended"
    synonyms_en: ["amended from"]
    synonyms_ar: ["معدلة من"]
    join_hint: tabBOM.amended_from = tabBOM.name

