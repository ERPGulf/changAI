  - name: "company_contact_person"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked company contact person ID"
    synonyms_en: ["company contact id"]
    synonyms_ar: ["رمز اتصال الشركة"]
    join_hint: tabQuotation.company_contact_person = tabContact.name

  - name: "payment_terms_template"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked payment terms template ID"
    synonyms_en: ["payment terms template id"]
    synonyms_ar: ["رمز قالب شروط الدفع"]
