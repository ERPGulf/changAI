    synonyms_ar: ["رقم الجوال", "رقم الهاتف", "رقم الاتصال"]

  - name: "email_id"
    type: "VARCHAR"
    role: ["contact"]
    description: "Customer's primary email address"
    synonyms_en: ["email", "email address", "customer email"]
    synonyms_ar: ["البريد الإلكتروني", "إيميل العميل", "عنوان البريد"]

  - name: "tax_id"
    type: "VARCHAR"
