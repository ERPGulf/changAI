    synonyms_en: ["parent doc", "linked document", "main document"]
    synonyms_ar: ["المستند الرئيسي", "الوثيقة الأم", "المرجع الرئيسي"]
    join_hint: tabPurchase Receipt Item.parent = tabPurchase Receipt.name

  - name: "parentfield"
    type: "VARCHAR(140)"
    description: "Parent field under which this item is stored"
    synonyms_en: ["parent field name", "linked field", "field reference"]
    synonyms_ar: ["حقل الأصل", "الحقل المرتبط", "اسم الحقل"]

  - name: "parenttype"
    type: "VARCHAR(140)"
    description: "Type of parent document"
    synonyms_en: ["document type", "parent doc type", "doctype reference"]
    synonyms_ar: ["نوع المستند", "نوع الوثيقة الأم", "نوع المستند الرئيسي"]

  notes: |
    - Child table of `tabPurchase Receipt` containing individual item details for received goods.
    - Each record represents one item line in a purchase receipt.
    - Use `parent` → `tabPurchase Receipt`.`name` to link items with their main receipt.
    - Key quantities: `received_qty`, `rejected_qty`, and `stock_qty` define accepted and rejected stock.
    - `warehouse` and `rejected_warehouse` track where materials are stored or rejected.
    - `purchase_order` and `purchase_order_item` link to original Purchase Order details.
    - `rate`, `amount`, `net_rate`, and `net_amount` store valuation and pricing details.
    - `valuation_rate` and `landed_cost_voucher_amount` affect inventory valuation.
    - `is_fixed_asset` identifies items recorded as capital assets.
    - Indexed fields like `item_code`, `warehouse`, and `purchase_order` improve reporting and performance.  


- table: "tabPurchase Receipt"
  synonyms_en:
  - "purchase goods receipt"
  - "goods received note"
  - "supplier receipt"
  - "material receipt"
  - "purchase delivery record"
  description: "Represents the record of goods or materials received from a supplier against a Purchase Order, including supplier\
    \ details, delivery note, and receipt information."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique ID / primary key for the purchase receipt"
    synonyms_en: ["receipt id", "receipt number", "purchase receipt id"]
    synonyms_ar: ["رقم إيصال الشراء", "معرّف الإيصال", "رمز استلام المشتريات"]

  - name: "creation"
    type: "DATETIME"
    role: ["metadata", "timestamp"]
    description: "Date and time when the record was created"
    synonyms_en: ["creation date", "created on", "entry time"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME"
    role: ["metadata", "timestamp"]
    description: "Date and time when the record was last modified"
    synonyms_en: ["last modified", "updated on", "modified date"]
    synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["metadata", "user"]
    description: "User who last modified the record"
    synonyms_en: ["updated by", "last editor", "modified user"]
    synonyms_ar: ["تم التعديل بواسطة", "المستخدم المعدل"]

  - name: "owner"
    type: "VARCHAR"
    role: ["metadata", "user"]
    description: "User who created the record"
    synonyms_en: ["created by", "record owner", "entered by"]
    synonyms_ar: ["أنشأه", "المالك", "تم الإدخال بواسطة"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["status"]
    description: "Document status: 0 = Draft, 1 = Submitted, 2 = Cancelled"
    synonyms_en: ["document status", "status code"]
    synonyms_ar: ["حالة المستند", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["index"]
    description: "Internal indexing for ordering child table records"
    synonyms_en: ["index", "position id", "row number"]
    synonyms_ar: ["رقم الفهرس", "تسلسل الصف"]

  - name: "title"
    type: "VARCHAR"
    role: ["display"]
    description: "Title of the receipt, usually derived from supplier name"
    synonyms_en: ["receipt title", "display name"]
    synonyms_ar: ["عنوان الإيصال", "اسم العرض"]

  - name: "naming_series"
    type: "VARCHAR"
