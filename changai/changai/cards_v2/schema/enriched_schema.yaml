    role: ["system"]
    description: "Timestamp of last modification"
    synonyms_en: ["updated at", "last modified"]
    synonyms_ar: ["تاريخ تعديل الخطة", "آخر تحديث"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified the plan"
    synonyms_en: ["edited by", "updated by"]
    synonyms_ar: ["تم التعديل بواسطة", "المحرّر"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who owns or created the plan"
