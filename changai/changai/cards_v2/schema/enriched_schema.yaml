    role: ["service"]
    description: "Date when the service linked to this item stops"
    synonyms_en: ["service end date", "termination date"]
    synonyms_ar: ["تاريخ توقف الخدمة"]

  - name: "enable_deferred_revenue"
    type: "INT(1)"
    role: ["financial"]
    description: "Indicates if deferred revenue is enabled for this item"
    synonyms_en: ["deferred revenue enabled", "unearned revenue flag"]
    synonyms_ar: ["تمكين الإيرادات المؤجلة"]

  - name: "service_start_date"
