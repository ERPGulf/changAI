  role: ["meta"]
  description: "Assignment metadata"
  synonyms_en: ["assigned users"]
  synonyms_ar: ["تعيينات"]

- name: "_liked_by"
  type: "TEXT"
  role: ["meta"]
  description: "Liked by metadata"
  synonyms_en: ["liked by users"]
  synonyms_ar: ["الإعجابات"]


  notes: |
    - Header table for **Sales Order**, child item tables store product lines separately.
    - PO references (`po_no`, `po_date`) are for linkage/audit only, not financial postings.
    - Delivery Note creation is controlled by handler logic, flagged by `skip_delivery_note`.
    - No inventory or accounting impact until order is processed by fulfillment and posting jobs.


- table: "tabSales Order Item"
  synonyms_en:
  - "sales order item"
  - "so item"
  - "items in sales order"
  - "order line"
  - "order line item"
  - "ordered items"
  - "products ordered"
  - "goods ordered"
  - "customer order items"
  - "items customer ordered"

  description: >
    Line-level details of each product or service included in a Sales Order.
    Stores item, quantity, pricing, delivery date, warehouse, and linkage to
    production / purchase / material requests. Use for questions about items on
    sales orders, ordered quantities, delivery status, revenue from orders, and
    SO item-level profitability.

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Unique Sales Order Item row ID / primary key."

  - name: "parent"
    type: "VARCHAR"
    role: ["link", "header"]
    description: "Linked Sales Order ID. Joins to `tabSales Order`.`name`."
    join_hint:
      table: "tabSales Order"
      on: "parent = tabSales Order.name"

  - name: "parenttype"
    type: "VARCHAR"
    role: ["meta"]
    description: "Parent doctype (normally `Sales Order`)."
    options:
    - "Sales Order"

  - name: "parentfield"
    type: "VARCHAR"
    role: ["meta"]
    description: "Internal field name used to link this child row to its parent."
    options:
    - "items"

  - name: "item_code"
    type: "VARCHAR"
    role: ["link", "item"]
    description: "Item being sold on this Sales Order line. Links to `tabItem`.`name`."
    join_hint:
      table: "tabItem"
      on: "item_code = tabItem.name"

  - name: "customer_item_code"
    type: "VARCHAR"
    role: ["customer_ref"]
    description: "Customer-specific item code or reference as given by the customer."

  - name: "item_name"
    type: "VARCHAR"
    role: ["label"]
    description: "Readable item name shown on the Sales Order."

  - name: "description"
    type: "LONGTEXT"
    role: ["text"]
    description: "Full description printed on the Sales Order for this item."

  - name: "item_group"
    type: "VARCHAR"
    role: ["category"]
    description: "Item Group / category for reporting and analysis."
    join_hint:
      table: "tabItem Group"
      on: "item_group = tabItem Group.name"

  - name: "brand"
    type: "VARCHAR"
    role: ["brand"]
    description: "Brand of the item, used for brand-wise reporting."
    join_hint:
      table: "tabBrand"
      on: "brand = tabBrand.name"

  - name: "delivery_date"
    type: "DATE"
    role: ["date", "delivery"]
    description: "Planned delivery date for this Sales Order item."

  - name: "qty"
    type: "DECIMAL"
    role: ["qty"]
    description: "Ordered quantity in the Sales Order UOM."

  - name: "uom"
    type: "VARCHAR"
    role: ["uom"]
    description: "Sales UOM in which the quantity is specified (e.g., Nos, Box)."
    join_hint:
      table: "tabUOM"
      on: "uom = tabUOM.name"

  - name: "stock_uom"
    type: "VARCHAR"
    role: ["uom", "stock"]
    description: "Base stock UOM in which stock is maintained."
    join_hint:
      table: "tabUOM"
      on: "stock_uom = tabUOM.name"

  - name: "conversion_factor"
    type: "DECIMAL"
    role: ["conversion"]
    description: "Conversion factor from Sales UOM to Stock UOM."

  - name: "stock_qty"
    type: "DECIMAL"
    role: ["qty", "stock"]
    description: "Ordered quantity expressed in Stock UOM (`qty * conversion_factor`)."

  - name: "stock_reserved_qty"
    type: "DECIMAL"
    role: ["qty", "reserved"]
    description: "Quantity reserved in stock for this Sales Order item."

  - name: "price_list_rate"
    type: "DECIMAL"
    role: ["rate", "pricing"]
    description: "Standard rate from the price list in the transaction currency."

  - name: "base_price_list_rate"
    type: "DECIMAL"
    role: ["rate", "pricing", "base"]
    description: "Price list rate converted to company (base) currency."

  - name: "discount_percentage"
    type: "DECIMAL"
    role: ["discount"]
    description: "Discount applied on this line as a percentage."

  - name: "discount_amount"
    type: "DECIMAL"
    role: ["discount", "amount"]
    description: "Discount amount applied on this item line."

  - name: "rate"
    type: "DECIMAL"
    role: ["rate", "pricing"]
    description: "Final selling rate per unit after discount in transaction currency."

  - name: "amount"
    type: "DECIMAL"
    role: ["amount", "revenue"]
    description: "Line amount = `qty * rate` in transaction currency."

  - name: "base_rate"
    type: "DECIMAL"
    role: ["rate", "base"]
    description: "Final rate per unit in company currency."

  - name: "base_amount"
    type: "DECIMAL"
    role: ["amount", "revenue", "base"]
    description: "Line amount in company currency."

  - name: "net_rate"
    type: "DECIMAL"
    role: ["rate", "net"]
    description: "Rate after all discounts and adjustments, excluding taxes."

  - name: "net_amount"
    type: "DECIMAL"
    role: ["amount", "net"]
    description: "Net line amount after discounts, excluding taxes."

  - name: "base_net_rate"
    type: "DECIMAL"
    role: ["rate", "net", "base"]
    description: "Net rate in company currency."

  - name: "base_net_amount"
    type: "DECIMAL"
    role: ["amount", "net", "base"]
    description: "Net amount in company currency."

  - name: "item_tax_template"
    type: "VARCHAR"
    role: ["tax"]
    description: "Item-level tax template applied for this line."
    join_hint:
      table: "tabItem Tax Template"
      on: "item_tax_template = tabItem Tax Template.name"

  - name: "item_tax_rate"
    type: "LONGTEXT"
    role: ["tax", "json"]
    description: "Serialized tax rate mapping for this item line."

  - name: "is_free_item"
    type: "INT"
    role: ["flag", "promotion"]
    description: "Marks whether this is a free-of-charge promotional item."
    options: [0, 1]

  - name: "grant_commission"
    type: "INT"
    role: ["flag", "commission"]
    description: "Indicates whether this item qualifies for sales commission."
    options: [0, 1]

  - name: "valuation_rate"
    type: "DECIMAL"
    role: ["cost", "valuation"]
    description: "Valuation (cost) rate used for gross profit calculation."

  - name: "gross_profit"
    type: "DECIMAL"
    role: ["profit"]
    description: "Gross profit amount from this Sales Order item."

  - name: "warehouse"
    type: "VARCHAR"
    role: ["warehouse", "source"]
    description: "Warehouse from which the item is planned to be delivered."
    join_hint:
      table: "tabWarehouse"
      on: "warehouse = tabWarehouse.name"

  - name: "target_warehouse"
    type: "VARCHAR"
    role: ["warehouse", "target"]
    description: "Target warehouse, mainly for internal transfers or specific flows."
    join_hint:
      table: "tabWarehouse"
      on: "target_warehouse = tabWarehouse.name"

  - name: "delivered_qty"
    type: "DECIMAL"
    role: ["qty", "delivered"]
    description: "Quantity already delivered against this Sales Order item."

  - name: "billed_amt"
    type: "DECIMAL"
    role: ["amount", "billed"]
    description: "Amount already billed on Sales Invoices for this line."

  - name: "returned_qty"
    type: "DECIMAL"
    role: ["qty", "returned"]
    description: "Quantity returned against this Sales Order item."

  - name: "picked_qty"
    type: "DECIMAL"
    role: ["qty", "picked"]
    description: "Quantity picked for delivery via Pick List / delivery process."

  - name: "project"
    type: "VARCHAR"
    role: ["project"]
    description: "Linked project for project-wise sales tracking."
    join_hint:
      table: "tabProject"
      on: "project = tabProject.name"

  - name: "cost_center"
    type: "VARCHAR"
    role: ["cost_center"]
    description: "Cost center for booking revenue and costs."
    join_hint:
      table: "tabCost Center"
      on: "cost_center = tabCost Center.name"

  - name: "transaction_date"
    type: "DATE"
    role: ["date"]
    description: "Transaction date (copied from parent Sales Order or reference)."

  - name: "material_request"
    type: "VARCHAR"
    role: ["link"]
    description: "Linked Material Request if Sales Order was created from a request."
    join_hint:
      table: "tabMaterial Request"
      on: "material_request = tabMaterial Request.name"

  - name: "material_request_item"
    type: "VARCHAR"
    role: ["link"]
    description: "Linked Material Request Item row."

  - name: "purchase_order"
    type: "VARCHAR"
    role: ["link", "back_to_back"]
    description: "Linked Purchase Order (for drop-ship/back-to-back fulfillment)."
    join_hint:
      table: "tabPurchase Order"
      on: "purchase_order = tabPurchase Order.name"

  - name: "purchase_order_item"
    type: "VARCHAR"
    role: ["link", "back_to_back"]
    description: "Linked Purchase Order Item row."

  - name: "bom_no"
    type: "VARCHAR"
    role: ["bom", "manufacturing"]
    description: "BOM used for manufacturing this item via Work Orders."
    join_hint:
      table: "tabBOM"
      on: "bom_no = tabBOM.name"

  - name: "ordered_qty"
    type: "DECIMAL"
    role: ["qty", "planning"]
    description: "Quantity considered while planning production or purchase."

  - name: "planned_qty"
    type: "DECIMAL"
    role: ["qty", "planning"]
    description: "Quantity planned for production (from Production Plan / MRP)."

  - name: "production_plan_qty"
    type: "DECIMAL"
    role: ["qty", "planning"]
    description: "Quantity linked to a Production Plan."

  - name: "work_order_qty"
    type: "DECIMAL"
    role: ["qty", "manufacturing"]
    description: "Quantity covered by Work Orders."


  - name: "produced_qty"
    type: "DECIMAL"
    role: ["qty", "manufacturing"]
    description: "Quantity actually produced for this item."
    join_hint:
      table: "tabWork Order"
      on: "produced_qty derived from Work Order production entries"

  - name: "actual_qty"
    type: "DECIMAL"
    role: ["qty", "stock"]
    description: "Current actual stock quantity snapshot at the time of order."
    join_hint:
      table: "tabBin"
      on: "actual_qty = tabBin.actual_qty AND item_code = tabBin.item_code"

  - name: "company_total_stock"
    type: "DECIMAL"
    role: ["qty", "stock"]
    description: "Total stock across company warehouses at the time of order."
    join_hint:
      table: "tabBin"
      on: "SUM(tabBin.actual_qty) GROUP BY item_code"

  - name: "projected_qty"
    type: "DECIMAL"
    role: ["qty", "planning"]
    description: "Projected quantity considering incoming and outgoing stock."
    join_hint:
      table: "tabBin"
      on: "projected_qty = tabBin.projected_qty AND item_code = tabBin.item_code"

  - name: "weight_per_unit"
    type: "DECIMAL"
    role: ["weight"]
    description: "Weight per unit of the item."
    join_hint:
      table: "tabItem"
      on: "weight_per_unit = tabItem.weight_per_unit"

  - name: "total_weight"
    type: "DECIMAL"
    role: ["weight"]
    description: "Total weight for this line (`qty * weight_per_unit`)."

  - name: "weight_uom"
    type: "VARCHAR"
    role: ["uom", "weight"]
    description: "UOM for weight (e.g., Kg, g)."
    join_hint:
      table: "tabUOM"
      on: "weight_uom = tabUOM.name"
    options:
    - Kg
    - g
    - lb

  - name: "additional_notes"
    type: "TEXT"
    role: ["text"]
    description: "Any extra notes specific to this Sales Order item."

  - name: "page_break"
    type: "INT"
    role: ["layout"]
    description: "Adds a page break before this item on print formats."
    options:
    - 0
    - 1

  - name: "owner"
    type: "VARCHAR"
    role: ["meta"]
    description: "User who created the record."
    join_hint:
      table: "tabUser"
      on: "owner = tabUser.name"

  - name: "modified_by"
    type: "VARCHAR"
    role: ["meta"]
    description: "User who last modified the record."
    join_hint:
      table: "tabUser"
      on: "modified_by = tabUser.name"

  - name: "creation"
    type: "DATETIME"
    role: ["meta"]
    description: "Record creation timestamp."

  - name: "modified"
    type: "DATETIME"
    role: ["meta"]
    description: "Last modified timestamp."

  notes: |
    - Child table of `tabSales Order` storing ordered item details.
    - Key joins: `parent` → Sales Order, `item_code` → Item, `warehouse` → Warehouse.
    - Useful for item-wise order qty, delivery tracking, and pricing amounts.

- table: "tabDelivery Note"
  synonyms_en:
  - "delivery note"
  - "goods dispatch note"
  - "shipment note"
  - "delivery record"
  - "outbound delivery"
  - "customer delivery"

  description: "A document used to record the delivery of goods to a customer, including customer details, posting time, pricing\
    \ data, taxes, transportation information, and return tracking."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique Delivery Note ID (primary key)"
    synonyms_en: ["record id", "delivery note id", "document id"]
    synonyms_ar: ["معرف السجل", "رقم مذكرة التسليم", "المعرف الرئيسي"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the delivery note was created"
    synonyms_en: ["created at", "creation time"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Last modification timestamp"
    synonyms_en: ["last updated", "modified at"]
    synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified the document"
    synonyms_en: ["updated by", "edited by"]
    synonyms_ar: ["تم التعديل بواسطة", "المحرر"]
    join_hint:
      table: "tabUser"
      on: "modified_by = tabUser.name"

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the document"
    synonyms_en: ["created by", "owner"]
    synonyms_ar: ["أنشئ بواسطة", "المالك"]
    join_hint:
      table: "tabUser"
      on: "owner = tabUser.name"

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document status: 0=Draft, 1=Submitted, 2=Cancelled"
    synonyms_en: ["document status", "status code"]
    synonyms_ar: ["حالة المستند", "رمز الحالة"]
    options:
    - 0
    - 1
    - 2

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row index for internal ordering"
    synonyms_en: ["index", "row number"]
    synonyms_ar: ["فهرس", "رقم الصف"]

  - name: "title"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Delivery Note title, usually based on customer name"
    synonyms_en: ["title", "document title"]
    synonyms_ar: ["العنوان", "عنوان المستند"]

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Series used to generate the Delivery Note number"
    synonyms_en: ["naming series", "numbering series"]
    synonyms_ar: ["سلسلة التسمية", "سلسلة الترقيم"]
    options:
    - MAT-DN-.YYYY.-
    - MAT-DN-RET-.YYYY.-

  - name: "customer"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Customer linked to this delivery note"
    synonyms_en: ["customer id", "customer"]
    synonyms_ar: ["العميل", "معرف العميل"]
    join_hint:
      table: "tabCustomer"
      on: "customer = tabCustomer.name"

  - name: "tax_id"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Customer tax identification number"
    synonyms_en: ["tax id", "tax number"]
    synonyms_ar: ["الرقم الضريبي", "معرف الضريبة"]

  - name: "customer_name"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Full name of the customer"
    synonyms_en: ["customer name", "client name"]
    synonyms_ar: ["اسم العميل", "اسم الزبون"]

  - name: "posting_date"
    type: "DATE"
    role: ["attribute"]
    description: "Date on which the delivery note was posted"
    synonyms_en: ["posting date", "document date"]
    synonyms_ar: ["تاريخ القيد", "تاريخ المستند"]

  - name: "posting_time"
    type: "TIME(6)"
    role: ["attribute"]
    description: "Time at which the document was posted"
    synonyms_en: ["posting time", "document time"]
    synonyms_ar: ["وقت القيد", "وقت المستند"]

  - name: "set_posting_time"
    type: "INT(1)"
    role: ["attribute"]
    description: "Enables manual control of posting time"
    synonyms_en: ["manual posting time", "set posting time"]
    synonyms_ar: ["تعيين وقت القيد", "التحكم بوقت القيد"]
    options:
    - 0
    - 1

  - name: "company"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Company responsible for issuing the delivery note"
    synonyms_en: ["company", "issuing company"]
    synonyms_ar: ["الشركة", "الشركة المصدرة"]
    join_hint:
      table: "tabCompany"
      on: "company = tabCompany.name"

  - name: "amended_from"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Reference to the previous document this one was amended from"
    synonyms_en: ["amended from", "previous document"]
    synonyms_ar: ["معدل من", "المستند السابق"]
    join_hint:
      table: "tabDelivery Note"
      on: "amended_from = `tabDelivery Note`.name"

  - name: "is_return"
    type: "INT(1)"
    role: ["attribute"]
    description: "Indicates whether this delivery note represents a return"
    synonyms_en: ["is return", "return flag"]
    synonyms_ar: ["مرتجع", "مستند إرجاع"]
    options:
    - 0
    - 1

  - name: "issue_credit_note"
    type: "INT(1)"
    role: ["attribute"]
    description: "Indicates whether a credit note should be issued"
    synonyms_en: ["issue credit note", "credit note flag"]
    synonyms_ar: ["إصدار إشعار دائن", "إشعار دائن"]
    options:
    - 0
    - 1

  - name: "return_against"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Reference to the original document when this delivery note is a return"
    synonyms_en: ["return against", "return reference"]
    synonyms_ar: ["مرجع الإرجاع", "إرجاع ضد"]
    join_hint:
      table: "tabDelivery Note"
      on: "return_against = `tabDelivery Note`.name"

  - name: "cost_center"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Cost center associated with the delivery transaction"
    synonyms_en: ["cost center", "expense center"]
    synonyms_ar: ["مركز التكلفة", "مركز المصاريف"]
    join_hint:
      table: "tabCost Center"
      on: "cost_center = `tabCost Center`.name"

  - name: "project"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Project linked to the delivery"
    synonyms_en: ["project", "project reference"]
    synonyms_ar: ["المشروع", "مرجع المشروع"]
    join_hint:
      table: "tabProject"
      on: "project = tabProject.name"

  - name: "currency"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Currency used for this delivery note"
    synonyms_en: ["currency", "transaction currency"]
    synonyms_ar: ["العملة", "عملة المعاملة"]
    join_hint:
      table: "tabCurrency"
      on: "currency = tabCurrency.name"

  - name: "conversion_rate"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Conversion rate from the transaction currency to the company currency"
    synonyms_en: ["conversion rate", "currency rate"]
    synonyms_ar: ["سعر الصرف", "معدل التحويل"]

  - name: "selling_price_list"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Selling price list applied to calculate item prices"
    synonyms_en: ["price list", "selling price list"]
    synonyms_ar: ["قائمة الأسعار", "قائمة أسعار البيع"]
    join_hint:
      table: "tabPrice List"
      on: "selling_price_list = `tabPrice List`.name"

  - name: "price_list_currency"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Currency used in the price list"
    synonyms_en: ["price list currency"]
    synonyms_ar: ["عملة قائمة الأسعار"]
    join_hint: tabDelivery Note.price_list_currency = tabCurrency.name

  - name: "plc_conversion_rate"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Conversion rate between price list currency and transaction currency"
    synonyms_en: ["plc conversion rate", "price list conversion rate"]
    synonyms_ar: ["معدل تحويل قائمة الأسعار"]

  - name: "ignore_pricing_rule"
    type: "INT(1)"
    role: ["attribute"]
    description: "If enabled, pricing rules will not be applied"
    synonyms_en: ["ignore pricing rule", "disable pricing rules"]
    synonyms_ar: ["تجاهل قواعد التسعير", "تعطيل قواعد التسعير"]
    options:
    - 0
    - 1

  - name: "scan_barcode"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Scanned barcode input used to fetch items automatically"
    synonyms_en: ["barcode", "scan barcode"]
    synonyms_ar: ["الباركود", "مسح الباركود"]

  - name: "set_warehouse"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Warehouse from which items are delivered"
    synonyms_en: ["warehouse", "source warehouse"]
    synonyms_ar: ["المخزن", "المستودع المصدر"]
    join_hint:
      table: "tabWarehouse"
      on: "set_warehouse = tabWarehouse.name"

  - name: "set_target_warehouse"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Warehouse to which items are transferred during inter-warehouse deliveries"
    synonyms_en: ["target warehouse", "destination warehouse"]
    synonyms_ar: ["المخزن المستهدف", "المستودع الوجهة"]
    join_hint:
      table: "tabWarehouse"
      on: "set_target_warehouse = tabWarehouse.name"

  - name: "total_qty"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Total quantity of all items delivered"
    synonyms_en: ["total qty", "total quantity"]
    synonyms_ar: ["إجمالي الكمية"]

  - name: "total_net_weight"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Total net weight of the delivered items"
    synonyms_en: ["net weight", "total net weight"]
    synonyms_ar: ["الوزن الصافي", "إجمالي الوزن الصافي"]

  - name: "base_total"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Total amount in the company base currency"
    synonyms_en: ["base total", "company currency total"]
    synonyms_ar: ["الإجمالي الأساسي", "إجمالي عملة الشركة"]

  - name: "base_net_total"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Net total amount in the company base currency"
    synonyms_en: ["base net total", "company net total"]
    synonyms_ar: ["صافي الإجمالي الأساسي"]

  - name: "total"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Total amount in transaction currency"
    synonyms_en: ["total amount", "grand total"]
    synonyms_ar: ["الإجمالي", "إجمالي المبلغ"]

  - name: "net_total"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Net total amount before taxes"
    synonyms_en: ["net total", "net amount"]
    synonyms_ar: ["صافي الإجمالي"]

  - name: "tax_category"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Tax category applied to this delivery"
    synonyms_en: ["tax category", "tax group"]
    synonyms_ar: ["فئة الضريبة"]
    join_hint:
      table: "tabTax Category"
      on: "tax_category = `tabTax Category`.name"

  - name: "taxes_and_charges"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Tax template applied for calculating taxes"
    synonyms_en: ["tax template", "taxes and charges"]
    synonyms_ar: ["ضرائب ورسوم", "قالب الضرائب"]
    join_hint:
      table: "tabSales Taxes and Charges Template"
      on: "taxes_and_charges = `tabSales Taxes and Charges Template`.name"

  - name: "shipping_rule"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Shipping rule used to calculate shipping charges"
    synonyms_en: ["shipping rule", "delivery rule"]
    synonyms_ar: ["قاعدة الشحن"]
    join_hint:
      table: "tabShipping Rule"
      on: "shipping_rule = `tabShipping Rule`.name"

  - name: "incoterm"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "International commercial terms associated with the shipment"
    synonyms_en: ["incoterm", "shipping term"]
    synonyms_ar: ["شروط التجارة الدولية"]
    join_hint:
      table: "tabIncoterm"
      on: "incoterm = tabIncoterm.name"

  - name: "named_place"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Location defined in the Incoterm agreement"
    synonyms_en: ["named place", "incoterm location"]
    synonyms_ar: ["المكان المحدد"]

  - name: "base_total_taxes_and_charges"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Total taxes and charges in company base currency"
    synonyms_en: ["base total taxes", "base taxes and charges"]
    synonyms_ar: ["إجمالي الضرائب الأساسي"]

  - name: "total_taxes_and_charges"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Total taxes and charges in transaction currency"
    synonyms_en: ["total taxes", "taxes and charges"]
    synonyms_ar: ["إجمالي الضرائب"]

  - name: "base_grand_total"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Grand total in company base currency before rounding adjustments"
    synonyms_en: ["base grand total", "company currency grand total"]
    synonyms_ar: ["الإجمالي الكبير الأساسي", "الإجمالي بعملة الشركة"]

  - name: "base_rounding_adjustment"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Rounding difference applied in base currency"
    synonyms_en: ["base rounding adjustment", "rounding difference"]
    synonyms_ar: ["تسوية التقريب الأساسية"]

  - name: "base_rounded_total"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Total amount after rounding in company base currency"
    synonyms_en: ["base rounded total", "rounded base amount"]
    synonyms_ar: ["الإجمالي بعد التقريب الأساسي"]

  - name: "base_in_words"
    type: "VARCHAR(240)"
    role: ["attribute"]
    description: "Grand total in words (base currency)"
    synonyms_en: ["amount in words", "base amount words"]
    synonyms_ar: ["المبلغ كتابة", "المبلغ بالكلمات"]

  - name: "grand_total"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Grand total amount in the transaction currency"
    synonyms_en: ["grand total", "total payable"]
    synonyms_ar: ["الإجمالي الكبير", "إجمالي الدفع"]

  - name: "rounding_adjustment"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Rounding adjustment value in transaction currency"
    synonyms_en: ["rounding adjustment", "rounding difference"]
    synonyms_ar: ["تسوية التقريب"]

  - name: "rounded_total"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Total after rounding in transaction currency"
    synonyms_en: ["rounded total", "final rounded amount"]
    synonyms_ar: ["الإجمالي بعد التقريب"]

  - name: "in_words"
    type: "VARCHAR(240)"
    role: ["attribute"]
    description: "Grand total written in words"
    synonyms_en: ["amount in words", "total in words"]
    synonyms_ar: ["المبلغ كتابة", "المبلغ بالكلمات"]

  - name: "disable_rounded_total"
    type: "INT(1)"
    role: ["attribute"]
    description: "Disable rounding total calculation"
    synonyms_en: ["disable rounding", "ignore rounded total"]
    synonyms_ar: ["تعطيل التقريب"]
    options: [0, 1]

  - name: "apply_discount_on"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Basis on which discount is applied, e.g. Grand Total or Net Total"
    synonyms_en: ["apply discount on", "discount base"]
    synonyms_ar: ["أساس الخصم"]
    options:
    - Grand Total
    - Net Total

  - name: "base_discount_amount"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Discount amount in base currency"
    synonyms_en: ["base discount amount", "discount (base currency)"]
    synonyms_ar: ["مبلغ الخصم الأساسي"]

  - name: "additional_discount_percentage"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Additional discount percentage applied on total"
    synonyms_en: ["discount percent", "additional discount %"]
    synonyms_ar: ["نسبة الخصم الإضافي"]

  - name: "discount_amount"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Discount amount in transaction currency"
    synonyms_en: ["discount amount", "discount value"]
    synonyms_ar: ["مبلغ الخصم"]

  - name: "other_charges_calculation"
    type: "LONGTEXT"
    role: ["attribute"]
    description: "Serialized calculation table for other charges"
    synonyms_en: ["charges calculation", "other charges table"]
    synonyms_ar: ["حساب الرسوم الأخرى"]

  - name: "customer_address"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked address record of the customer"
    synonyms_en: ["customer address", "billing address"]
    synonyms_ar: ["عنوان العميل"]
    join_hint:
      table: "tabAddress"
      on: "customer_address = tabAddress.name"

  - name: "address_display"
    type: "TEXT"
    role: ["attribute"]
    description: "Formatted display of the customer address"
    synonyms_en: ["address display", "full address"]
    synonyms_ar: ["عرض العنوان", "العنوان الكامل"]

  - name: "contact_person"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Contact person linked to the customer"
    synonyms_en: ["contact person", "customer contact"]
    synonyms_ar: ["جهة الاتصال"]
    join_hint:
      table: "tabContact"
      on: "contact_person = tabContact.name"

  - name: "contact_display"
    type: "TEXT"
