    - Lead represents an early-stage prospect before becoming a Customer.
    - Fields cover demographics, contact information, qualification status and marketing attribution.
    - Lead can be converted into Opportunity, Customer or Quotation.
    - Status and qualification fields are key for CRM pipeline tracking.
    - Email, mobile, and WhatsApp numbers are often used for automated outreach.
    - System meta fields (_user_tags, _comments, _assign, _liked_by) support collaboration within CRM teams.

- table: "tabCurrency"
  synonyms_en:
  - "currency"
  - "money unit"
  - "monetary system"
  - "legal tender"
  - "financial denomination"
  description: "Stores master data for currencies including name, symbol, fractions, and formatting rules."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique document ID (primary key)"
    synonyms_en: ["currency id", "record id"]
    synonyms_ar: ["معرّف العملة"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the currency record was created"
    synonyms_en: ["created at", "creation time"]
    synonyms_ar: ["تاريخ الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the currency record was last modified"
    synonyms_en: ["updated at", "last modified"]
    synonyms_ar: ["تاريخ التعديل"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified the currency record"
    synonyms_en: ["updated by", "last editor"]
    synonyms_ar: ["تم التعديل بواسطة"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who originally created the currency record"
    synonyms_en: ["created by", "record owner"]
    synonyms_ar: ["تم الإنشاء بواسطة"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document status: 0 = Draft, 1 = Submitted, 2 = Cancelled"
    synonyms_en: ["document status", "status code"]
    synonyms_ar: ["حالة المستند"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row index used mainly for ordering"
    synonyms_en: ["index", "row order"]
    synonyms_ar: ["فهرس"]

  - name: "currency_name"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Official name of the currency"
    synonyms_en: ["currency name", "money name"]
    synonyms_ar: ["اسم العملة"]

  - name: "enabled"
    type: "INT(1)"
    role: ["attribute"]
    description: "Indicates if the currency is enabled (0 = No, 1 = Yes)"
    synonyms_en: ["enabled", "active"]
    synonyms_ar: ["مفعل"]

  - name: "fraction"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Name of the fractional unit (e.g., cents, paise)"
    synonyms_en: ["fraction name", "subunit"]
    synonyms_ar: ["الوحدة الجزئية"]

  - name: "fraction_units"
    type: "INT(11)"
    role: ["attribute"]
    description: "Number of fractional units that make up one currency unit"
    synonyms_en: ["fraction units", "subunit count"]
    synonyms_ar: ["عدد الوحدات الجزئية"]

  - name: "smallest_currency_fraction_value"
    type: "DECIMAL(21,9)"
    role: ["attribute"]
    description: "Smallest value of the currency fraction"
    synonyms_en: ["smallest fraction value", "minimum denomination"]
    synonyms_ar: ["أصغر قيمة جزئية"]

  - name: "symbol"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Symbol representing the currency (e.g., $, €, ₹)"
    synonyms_en: ["currency symbol", "money symbol"]
    synonyms_ar: ["رمز العملة"]

  - name: "symbol_on_right"
    type: "INT(1)"
    role: ["attribute"]
    description: "Indicates if the symbol is displayed on the right (0 = Left, 1 = Right)"
    synonyms_en: ["symbol position", "symbol on right"]
    synonyms_ar: ["موضع الرمز"]

  - name: "number_format"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Preferred number format for the currency"
    synonyms_en: ["number format", "numeric style"]
    synonyms_ar: ["تنسيق الأرقام"]
    options: &id005
    - '#,###.##'
    - '#.###,##'
    - '# ###.##'
    - '# ###,##'
    - '#''###.##'
    - '#, ###.##'
    - '#,##,###.##'
    - '#,###.###'
    - '#.###'
    - '#,###'

  - name: "_user_tags"
    type: "TEXT"
    role: ["system"]
    description: "Tags added by users"
    synonyms_en: ["user tags", "labels"]
    synonyms_ar: ["وسوم المستخدم"]

  - name: "_comments"
    type: "TEXT"
    role: ["system"]
    description: "Comments added to the currency record"
    synonyms_en: ["comments", "notes"]
    synonyms_ar: ["تعليقات"]

  - name: "_assign"
    type: "TEXT"
    role: ["system"]
    description: "Assignment details for workflow"
    synonyms_en: ["assignments", "task allocation"]
    synonyms_ar: ["تعيينات"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["system"]
    description: "Users who liked the record"
    synonyms_en: ["liked by", "favorites"]
    synonyms_ar: ["أعجب به"]

  notes: |
    - Stores master data for currencies used across financial transactions and reporting.  
    - `currency_name` is unique, ensuring no duplicate entries.  
    - Supports localization with symbols, fractions, and number formatting for accurate display.  

- table: "tabAccount"
  synonyms_en:
  - "account master"
  - "ledger account"
  - "financial account"
  - "chart of accounts entry"
  - "coa record"
  description: "Master record for financial accounts, used to classify transactions under Assets, Liabilities, Income, and\
    \ Expenses."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique account identifier (primary key)"
    synonyms_en: ["account id", "account name", "ledger id"]
    synonyms_ar: ["معرّف الحساب", "اسم الحساب", "رمز الحساب"]

  - name: "creation"
    type: "DATETIME(6)"
    description: "Timestamp when the account record was created"
    synonyms_en: ["created on", "creation date"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    description: "Timestamp when the account was last modified"
    synonyms_en: ["last modified", "updated on"]
    synonyms_ar: ["آخر تعديل", "تاريخ التحديث"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    description: "User who last modified the account record"
    synonyms_en: ["updated by", "modified user"]
    synonyms_ar: ["المستخدم المعدّل", "تم التعديل بواسطة"]

  - name: "owner"
    type: "VARCHAR(140)"
    description: "User who created the account record"
    synonyms_en: ["created by", "record owner"]
    synonyms_ar: ["أنشأها", "مالك السجل"]

  - name: "docstatus"
    type: "INT(1)"
    default: 0
    description: "Document status (0 = Draft, 1 = Submitted, 2 = Cancelled)"
    synonyms_en: ["status", "document state"]
    synonyms_ar: ["حالة المستند", "حالة الفاتورة"]

  - name: "idx"
    type: "INT(8)"
    default: 0
    description: "Row index used for internal ordering"
    synonyms_en: ["index", "row order"]
    synonyms_ar: ["فهرس", "ترتيب الصف"]
  - name: "disabled"
    type: "INT(1)"
    default: 0
    description: "Indicates whether the account is disabled (1 = disabled, 0 = active)"
    synonyms_en: ["is disabled", "inactive account", "account status"]
    synonyms_ar: ["معطل", "غير نشط", "إيقاف الحساب"]

  - name: "account_name"
    type: "VARCHAR(140)"
    description: "Human-readable account name"
    synonyms_en: ["account title", "ledger name", "account label"]
    synonyms_ar: ["اسم الحساب", "عنوان الحساب", "اسم الدفتر"]

  - name: "account_number"
    type: "VARCHAR(140)"
    description: "External or ERP system account number/code"
    synonyms_en: ["account code", "account id", "ledger number"]
    synonyms_ar: ["رقم الحساب", "رمز الحساب", "كود الحساب"]

  - name: "is_group"
    type: "INT(1)"
    default: 0
    description: "Defines whether the account is a group (1) or leaf (0); group accounts cannot have direct postings"
    synonyms_en: ["group account", "parent node", "summary account"]
    synonyms_ar: ["مجموعة الحساب", "حساب تجميعي", "حساب رئيسي"]

  - name: "company"
    type: "VARCHAR(140)"
    description: "Company or legal entity to which this account belongs"
    synonyms_en: ["organization", "entity", "business unit"]
    synonyms_ar: ["شركة", "مؤسسة", "كيان قانوني"]
    join_hint: tabAccount.company = tabCompany.name

  - name: "root_type"
    type: "VARCHAR(140)"
    description: "Top-level account category — Asset, Liability, Equity, Income, or Expense"
    synonyms_en: ["account category", "root classification", "financial type"]
    synonyms_ar: ["نوع الجذر", "فئة الحساب", "التصنيف المالي"]
    options:
    - Asset
    - Liability
    - Income
    - Expense
    - Equity

  - name: "report_type"
    type: "VARCHAR(140)"
    description: "Financial report classification — Balance Sheet or Profit and Loss"
    synonyms_en: ["report category", "statement type", "financial report type"]
    synonyms_ar: ["نوع التقرير", "بيان مالي", "تصنيف التقرير"]
    options:
    - Balance Sheet
    - Profit and Loss

  - name: "account_currency"
    type: "VARCHAR(140)"
    description: "Currency used for this account, which may differ from the company’s base currency"
    synonyms_en: ["ledger currency", "currency code", "account currency type"]
    synonyms_ar: ["عملة الحساب", "رمز العملة", "العملة"]
    join_hint: tabAccount.account_currency = tabCurrency.name

  - name: "parent_account"
    type: "VARCHAR(140)"
    description: "Parent account under which this account is grouped in the chart of accounts hierarchy"
    synonyms_en: ["parent ledger", "main account", "parent node"]
    synonyms_ar: ["الحساب الرئيسي", "الحساب الأب", "الدفتر الرئيسي"]
    join_hint: tabAccount.parent_account = tabAccount.name
  - name: "tax_rate"
    type: "DECIMAL(21,9)"
    default: 0.000000000
    description: "Default tax rate applicable to this account, if any"
    synonyms_en: ["default tax", "tax percentage", "vat rate"]
    synonyms_ar: ["معدل الضريبة", "نسبة الضريبة", "نسبة ضريبة القيمة المضافة"]

  - name: "freeze_account"
    type: "VARCHAR(140)"
    description: "Indicates whether account postings are frozen (e.g., 'Yes' prevents further transactions)"
    synonyms_en: ["account freeze", "freeze control", "locked account"]
    synonyms_ar: ["تجميد الحساب", "قفل الحساب", "منع الحركات"]
    options:
    - 'No'
    - 'Yes'

  - name: "balance_must_be"
    type: "VARCHAR(140)"
    description: "Constraint defining whether the account should always have a Debit or Credit balance"
    synonyms_en: ["balance rule", "expected balance", "debit or credit rule"]
    synonyms_ar: ["قيد الرصيد", "نوع الرصيد", "يجب أن يكون الرصيد"]
    options:
    - Debit
    - Credit

  - name: "lft"
    type: "INT(11)"
    default: 0
    description: "Left boundary marker for nested set hierarchy (used in tree structures)"
    synonyms_en: ["left index", "tree left", "lft boundary"]
    synonyms_ar: ["الحد الأيسر", "مؤشر يسار", "حد الشجرة الأيسر"]

  - name: "rgt"
    type: "INT(11)"
    default: 0
    description: "Right boundary marker for nested set hierarchy (used in tree structures)"
    synonyms_en: ["right index", "tree right", "rgt boundary"]
    synonyms_ar: ["الحد الأيمن", "مؤشر يمين", "حد الشجرة الأيمن"]

