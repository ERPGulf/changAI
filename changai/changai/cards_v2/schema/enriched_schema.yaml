    description: "Indicates whether the item requires batch number tracking (1=Yes)"
    synonyms_en: ["batch tracking", "lot number tracking"]
    synonyms_ar: ["تتبع الدفعة", "رقم التشغيلة"]

  - name: "create_new_batch"
    type: "INT"
    role: ["inventory_tracking"]
    description: "Automatically create a new batch when stock is received (1=Yes)"
    synonyms_en: ["auto batch creation", "generate batch number"]
    synonyms_ar: ["إنشاء دفعة تلقائية"]

  - name: "batch_number_series"
    type: "VARCHAR"
    role: ["inventory_tracking"]
    description: "Naming series for batch number generation"
    synonyms_en: ["batch series", "batch prefix"]
    synonyms_ar: ["سلسلة الدفعة", "بادئة رقم الدفعة"]

  - name: "has_expiry_date"
    type: "INT"
    role: ["inventory_tracking"]
    description: "Specifies if the item has an expiry date (1=Yes)"
    synonyms_en: ["expiry tracking", "has expiry", "item expiry"]
    synonyms_ar: ["له تاريخ انتهاء", "تتبع الصلاحية"]

  - name: "retain_sample"
    type: "INT"
    role: ["quality_control"]
    description: "Indicates whether a sample should be retained for quality checks (1=Yes)"
    synonyms_en: ["sample retention", "keep sample"]
    synonyms_ar: ["الاحتفاظ بعينة", "عينة مراقبة الجودة"]

  - name: "sample_quantity"
    type: "INT"
    role: ["quality_control"]
    description: "Quantity of the item to retain as sample"
    synonyms_en: ["sample qty", "retained quantity"]
    synonyms_ar: ["كمية العينة", "كمية محتجزة"]
  - name: "has_serial_no"
    type: "INT"
    role: ["inventory_tracking"]
    description: "Specifies if the item has serial number tracking enabled (1=Yes)"
    synonyms_en: ["serial tracking", "has serial", "serial number enabled"]
    synonyms_ar: ["تتبع الرقم التسلسلي", "له رقم تسلسلي"]

  - name: "serial_no_series"
    type: "VARCHAR"
    role: ["inventory_tracking"]
    description: "Naming series used for generating serial numbers automatically"
    synonyms_en: ["serial series", "serial prefix", "serial code pattern"]
    synonyms_ar: ["سلسلة الأرقام التسلسلية", "بادئة الرقم التسلسلي"]

  - name: "variant_of"
    type: "VARCHAR"
    role: ["classification"]
    description: "Indicates the parent item if this item is a variant of another"
    synonyms_en: ["base item", "parent item", "original item"]
    synonyms_ar: ["عنصر أساسي", "العنصر الأب", "متغير من"]
    join_hint: tabItem.variant_of = tabItem.name

  - name: "variant_based_on"
    type: "VARCHAR"
    role: ["classification"]
    description: "Defines the attribute on which variants are based (e.g., Item Attribute)"
    synonyms_en: ["variant attribute", "variation based on"]
    synonyms_ar: ["مبني على السمة", "تغيّر بناءً على"]
    options:
    - Item Attribute
    - Manufacturer

  - name: "enable_deferred_expense"
    type: "INT"
    role: ["accounting"]
    description: "Enables deferred expense recognition for this item (1=Yes)"
    synonyms_en: ["defer expense", "expense deferral", "delayed expense"]
    synonyms_ar: ["تأجيل المصروف", "مصروف مؤجل"]

  - name: "no_of_months_exp"
    type: "INT"
    role: ["accounting"]
    description: "Number of months over which deferred expenses will be recognized"
    synonyms_en: ["expense months", "expense period"]
    synonyms_ar: ["فترة المصروف", "عدد الأشهر"]

  - name: "enable_deferred_revenue"
    type: "INT"
    role: ["accounting"]
    description: "Enables deferred revenue recognition for this item (1=Yes)"
    synonyms_en: ["defer revenue", "revenue deferral", "delayed income"]
    synonyms_ar: ["تأجيل الإيرادات", "دخل مؤجل"]

  - name: "no_of_months"
    type: "INT"
    role: ["accounting"]
    description: "Number of months over which deferred revenue will be recognized"
    synonyms_en: ["revenue months", "deferral period"]
    synonyms_ar: ["فترة الإيراد", "عدد الأشهر"]

  - name: "purchase_uom"
    type: "VARCHAR"
    role: ["procurement"]
    description: "Default unit of measure used during purchase transactions"
    synonyms_en: ["purchase unit", "buying unit", "procurement uom"]
    synonyms_ar: ["وحدة شراء", "وحدة القياس للشراء"]
    join_hint: tabItem.purchase_uom = tabUOM.name

  - name: "min_order_qty"
    type: "DECIMAL"
    role: ["procurement"]
    description: "Minimum order quantity required when purchasing the item"
    synonyms_en: ["minimum quantity", "minimum order amount"]
    synonyms_ar: ["الحد الأدنى للطلب", "كمية الشراء الدنيا"]

  - name: "safety_stock"
    type: "DECIMAL"
    role: ["inventory_planning"]
    description: "Safety stock level to avoid stockouts"
    synonyms_en: ["buffer stock", "minimum stock level", "reserve stock"]
    synonyms_ar: ["مخزون الأمان", "الحد الأدنى للمخزون"]

  - name: "is_purchase_item"
    type: "INT"
    role: ["procurement"]
    description: "Specifies if the item can be purchased (1=Yes)"
    synonyms_en: ["purchasable", "buyable item"]
    synonyms_ar: ["عنصر قابل للشراء"]

  - name: "lead_time_days"
    type: "INT"
    role: ["procurement"]
    description: "Expected number of days required to receive the item after ordering"
    synonyms_en: ["lead time", "delivery time", "supply time"]
    synonyms_ar: ["مدة التوريد", "زمن التسليم"]

  - name: "last_purchase_rate"
    type: "DECIMAL"
    role: ["procurement"]
    description: "Rate at which the item was last purchased"
    synonyms_en: ["last buy rate", "previous purchase price"]
    synonyms_ar: ["سعر الشراء الأخير", "أحدث سعر شراء"]

  - name: "is_customer_provided_item"
    type: "INT"
    role: ["supply_chain"]
    description: "Indicates whether the item is provided by the customer (1=Yes)"
    synonyms_en: ["customer supplied", "customer owned item"]
    synonyms_ar: ["عنصر مقدم من العميل", "صنف العميل"]

  - name: "customer"
    type: "VARCHAR"
    role: ["relationship"]
    description: "Customer associated with this item if it is customer-provided"
    synonyms_en: ["associated customer", "linked customer"]
    synonyms_ar: ["العميل المرتبط", "عميل الصنف"]
    join_hint: tabItem.customer = tabCustomer.name

  - name: "delivered_by_supplier"
    type: "INT"
    role: ["logistics"]
    description: "Indicates whether the item is delivered directly by the supplier to customer (1=Yes)"
    synonyms_en: ["supplier delivery", "dropship item"]
    synonyms_ar: ["يُسلَّم من المورد", "توصيل المورد"]

  - name: "country_of_origin"
    type: "VARCHAR"
    role: ["trade"]
    description: "Country where the item was manufactured or sourced from"
    synonyms_en: ["origin country", "manufacturing country"]
    synonyms_ar: ["بلد المنشأ", "بلد الصنع"]
    join_hint: tabItem.country_of_origin = tabCountry.name

  - name: "customs_tariff_number"
    type: "VARCHAR"
    role: ["trade"]
    description: "Customs tariff or HS code used for international trade and taxation"
    synonyms_en: ["tariff code", "hs code", "customs code"]
    synonyms_ar: ["رمز التعرفة الجمركية", "رمز النظام المنسق"]
    join_hint: tabItem.customs_tariff_number = tabCustoms Tariff Number.name

  - name: "sales_uom"
    type: "VARCHAR"
    role: ["sales"]
    description: "Default unit of measure used during sales transactions"
    synonyms_en: ["sales unit", "selling unit"]
    synonyms_ar: ["وحدة المبيعات", "وحدة القياس للبيع"]
    join_hint: tabItem.sales_uom = tabUOM.name

  - name: "grant_commission"
    type: "INT"
    role: ["sales"]
    description: "Specifies if sales commissions are granted for selling this item (1=Yes)"
    synonyms_en: ["allow commission", "commission applicable"]
    synonyms_ar: ["منح عمولة", "عمولة البيع"]
  - name: "is_sales_item"
    type: "INT"
    default: 1
    role: ["sales", "inventory"]
    description: "Indicates whether the item can be sold"
    synonyms_en: ["sales item", "sellable item"]
    synonyms_ar: ["عنصر مبيعات"]

  - name: "max_discount"
    type: "DECIMAL(21,9)"
    default: 0.000000000
    role: ["sales", "pricing"]
    description: "Maximum discount percentage allowed for this item"
    synonyms_en: ["maximum discount", "item discount limit"]
    synonyms_ar: ["الحد الأقصى للخصم"]

  - name: "inspection_required_before_purchase"
    type: "INT"
    default: 0
    role: ["purchase", "quality"]
    description: "Specifies if quality inspection is required before purchase"
    synonyms_en: ["pre-purchase inspection"]
    synonyms_ar: ["فحص قبل الشراء"]

  - name: "quality_inspection_template"
    type: "VARCHAR"
    role: ["quality"]
    description: "Template used for quality inspection"
    synonyms_en: ["inspection template", "quality check form"]
    synonyms_ar: ["نموذج فحص الجودة"]
    join_hint: tabItem.quality_inspection_template = tabQuality Inspection Template.name

  - name: "inspection_required_before_delivery"
    type: "INT"
    default: 0
    role: ["sales", "quality"]
    description: "Specifies if inspection is required before delivery"
    synonyms_en: ["pre-delivery inspection"]
    synonyms_ar: ["فحص قبل التسليم"]

  - name: "include_item_in_manufacturing"
    type: "INT"
    default: 1
    role: ["manufacturing"]
    description: "Indicates whether the item is used in manufacturing processes"
    synonyms_en: ["used in manufacturing"]
    synonyms_ar: ["عنصر مستخدم في التصنيع"]

  - name: "is_sub_contracted_item"
    type: "INT"
    default: 0
    role: ["purchase", "manufacturing"]
    description: "Indicates if the item is subcontracted"
    synonyms_en: ["subcontracted item"]
    synonyms_ar: ["عنصر مقاول فرعي"]

  - name: "default_bom"
    type: "VARCHAR"
    role: ["manufacturing"]
    description: "Default Bill of Materials for this item"
    synonyms_en: ["default BOM", "bill of materials"]
    synonyms_ar: ["قائمة المواد الافتراضية"]
    join_hint: tabItem.default_bom = tabBOM.name

  - name: "customer_code"
    type: "TEXT"
    role: ["sales", "customer"]
    description: "Customer-specific item code"
    synonyms_en: ["customer item code"]
    synonyms_ar: ["رمز العميل"]

  - name: "default_item_manufacturer"
    type: "VARCHAR"
    role: ["purchase", "inventory"]
    description: "Default manufacturer linked to this item"
    synonyms_en: ["manufacturer name"]
    synonyms_ar: ["المُصنّع الافتراضي"]
    join_hint: tabItem.default_item_manufacturer = tabManufacturer.name

  - name: "default_manufacturer_part_no"
    type: "VARCHAR"
    role: ["purchase", "inventory"]
    description: "Manufacturer's part number for this item"
    synonyms_en: ["manufacturer part number", "MPN"]
    synonyms_ar: ["رقم جزء الشركة المصنعة"]

  - name: "total_projected_qty"
    type: "DECIMAL(21,9)"
    default: 0.000000000
    role: ["inventory", "planning"]
    description: "Total projected quantity based on planned production and stock"
    synonyms_en: ["projected quantity", "expected stock"]
    synonyms_ar: ["الكمية المتوقعة"]


  notes: |
    - Core doctype for all products, raw materials, and services used across Purchase, Sales, Manufacturing, and Inventory modules.
    - `item_code` serves as the unique identifier for each item and is referenced across all transactional doctypeS.
    - `is_stock_item` controls whether inventory is maintained for the item; if disabled, quantity tracking is skipped.
    - `item_group` enables item classification for reporting, pricing, and tax purposes.
    - `stock_uom`, `purchase_uom`, and `sales_uom` define units of measurement for stock tracking, purchase, and sales respectively.
    - `valuation_rate` and `standard_rate` are used for stock valuation and selling price calculations.
    - Quality checks are governed by `inspection_required_before_purchase` and `inspection_required_before_delivery`.
    - Items with `has_batch_no` or `has_serial_no` enabled allow batch or serial tracking during stock transactions.
    - Asset items (`is_fixed_asset = 1`) integrate with the Asset Management module for automated capitalization and depreciation.
    - `total_projected_qty` helps in demand forecasting and stock availability reports.
    - Indexed fields like `item_code`, `item_group`, and `is_stock_item` improve query and reporting performance.


- table: "tabPacked Item"
  synonyms_en:
  - "packed item"
  - "bundle item"
  - "pos packed line"
  - "shipment pack line"
  - "package content item"
  description: "Stores item bundle or packed line details linked to an opportunity, order, or shipment. Includes stock, batch,\
    \ quantity, and rate tracking."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique packed line ID (primary key)"
    synonyms_en: ["row id", "packed line id"]
    synonyms_ar: ["معرّف السطر", "رقم السطر", "المفتاح"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Row creation timestamp"
    synonyms_en: ["created at"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Last updated timestamp"
    synonyms_en: ["updated at", "last modified"]
    synonyms_ar: ["آخر تحديث", "تاريخ التعديل"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last edited"
    synonyms_en: ["edited by"]
    synonyms_ar: ["تم التعديل بواسطة", "المحرر"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created this row"
    synonyms_en: ["created by", "line owner"]
    synonyms_ar: ["المنشئ", "مالك السجل"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Status: 0=Draft,1=Submitted,2=Cancelled"
    synonyms_en: ["state"]
    synonyms_ar: ["حالة المستند", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "UI order index"
    synonyms_en: ["position"]
    synonyms_ar: ["الترتيب", "الفهرس"]

  - name: "parent_item"
    type: "VARCHAR(140)"
    role: ["relation", "analysis"]
    description: "Item that this packed row is derived from or bundled under"
    synonyms_en: ["main item", "bundle parent"]
    synonyms_ar: ["العنصر الرئيسي", "الأصل في الحزمة"]
    join_hint: tabPacked Item.parent_item = tabItem.name

  - name: "item_code"
    type: "VARCHAR(140)"
    role: ["relation", "analysis"]
    description: "Stock keeping unit or catalog item"
    synonyms_en: ["product code", "sku"]
    synonyms_ar: ["رمز المنتج", "SKU"]
    join_hint: tabPacked Item.item_code = tabItem.name

  - name: "item_name"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Item display name"
    synonyms_en: ["product name"]
    synonyms_ar: ["اسم العنصر", "اسم المنتج"]

  - name: "description"
    type: "LONGTEXT"
    role: ["attribute"]
    description: "Full packed item description"
    synonyms_en: ["details"]
    synonyms_ar: ["الوصف", "التفاصيل"]

  - name: "warehouse"
    type: "VARCHAR(140)"
    role: ["location", "analysis"]
    description: "Current warehouse/source location"
    synonyms_en: ["source warehouse", "from warehouse"]
    synonyms_ar: ["المستودع المصدر", "المخزن"]
    join_hint: tabPacked Item.warehouse = tabWarehouse.name

  - name: "target_warehouse"
    type: "VARCHAR(140)"
    role: ["location", "analysis"]
    description: "Destination warehouse if transfer happens"
    synonyms_en: ["to warehouse", "destination warehouse"]
    synonyms_ar: ["المستودع المستهدف", "مستودع الوجهة"]
    join_hint: tabPacked Item.target_warehouse = tabWarehouse.name

  - name: "conversion_factor"
    type: "DECIMAL(21,9)"
    role: ["metric", "analysis"]
    description: "UOM conversion multiplier, default 0 means compute instead of trusting stored value"
    synonyms_en: ["uom factor", "unit conversion factor"]
    synonyms_ar: ["معامل التحويل", "عامل التحويل"]

  - name: "qty"
    type: "DECIMAL(21,9)"
    role: ["measure", "analysis"]
    description: "Base quantity to pack or track"
    synonyms_en: ["quantity", "packed total qty"]
    synonyms_ar: ["الكمية", "عدد الوحدات"]

  - name: "packed_qty"
    type: "DECIMAL(21,9)"
    role: ["measure", "analysis"]
    description: "Actual quantity packed"
    synonyms_en: ["total packed qty"]
    synonyms_ar: ["الكمية المعبأة"]

  - name: "picked_qty"
    type: "DECIMAL(21,9)"
    role: ["measure", "analysis"]
    description: "Quantity picked from warehouse"
    synonyms_en: ["picked qty"]
    synonyms_ar: ["الكمية الملتقطة", "كمية الالتقاط"]

  - name: "rate"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Item rate applied in packing context"
    synonyms_en: ["price", "item price"]
    synonyms_ar: ["السعر", "معدل العنصر"]

  - name: "base_rate"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Rate in base currency for reconciliation"
    synonyms_en: ["standard rate", "base price"]
    synonyms_ar: ["السعر الأساسي", "السعر بالعملة الأساسية"]

  - name: "base_amount"
    type: "DECIMAL(21,9)"
    role: ["measure", "analysis"]
    description: "qty * base_rate stored result, but revalidate in BI/SQL"
    synonyms_en: ["base value", "base total"]
    synonyms_ar: ["القيمة الأساسية", "الإجمالي الأساسي"]

  - name: "amount"
    type: "DECIMAL(21,9)"
    role: ["measure", "analysis"]
    description: "qty * rate stored result, must be revalidated"
    synonyms_en: ["line total", "item total"]
    synonyms_ar: ["إجمالي السطر", "المبلغ"]

  - name: "actual_qty"
    type: "DECIMAL(21,9)"
    role: ["inventory", "analysis"]
    description: "Live actual stock quantity at source warehouse"
    synonyms_en: ["available stock", "real qty"]
    synonyms_ar: ["المخزون الفعلي", "الكمية المتاحة"]

  - name: "projected_qty"
    type: "DECIMAL(21,9)"
    role: ["inventory", "analysis"]
    description: "System projected stock after allocations"
    synonyms_en: ["future stock", "projected stock"]
    synonyms_ar: ["المخزون المتوقع"]

  - name: "ordered_qty"
    type: "DECIMAL(21,9)"
    role: ["analysis"]
    description: "Quantity ordered before packing"
    synonyms_en: ["ordered total"]
    synonyms_ar: ["الكمية المطلوبة"]

  - name: "incoming_rate"
    type: "DECIMAL(21,9)"
    role: ["measure", "analysis"]
    description: "Supplier or incoming rate for valuation"
    synonyms_en: ["purchase rate", "supplier rate"]
    synonyms_ar: ["السعر الوارد", "سعر المورد"]

  - name: "use_serial_batch_fields"
    type: "INT(1)"
    role: ["flag", "config", "analysis"]
    description: "1=Serial/Batch fields used in packing,0=Not used"
    synonyms_en: ["serial batch enabled"]
    synonyms_ar: ["تم استخدام السيريال والباتش"]

  - name: "serial_and_batch_bundle"
    type: "VARCHAR(140)"
    role: ["relation", "analysis"]
    description: "Linked serial/batch bundle reference if enabled"
    synonyms_ar: ["حزمة السيريال والباتش"]
    join_hint: tabPacked Item.serial_and_batch_bundle = tabSerial and Batch Bundle.name

  - name: "serial_no"
    type: "TEXT"
    role: ["attribute", "analysis"]
    description: "Serial numbers packed, do NOT count on this for totals, parse in BI/SQL when mining"
    synonyms_en: ["serial list"]
    synonyms_ar: ["الأرقام التسلسلية"]

  - name: "batch_no"
    type: "VARCHAR(140)"
    role: ["attribute", "relation", "analysis"]
    description: "Batch identifier if inventory is batch-controlled"
    synonyms_en: ["lot no", "batch id"]
    synonyms_ar: ["رقم الدُفعة", "رقم اللوت"]
    join_hint: tabPacked Item.batch_no = tabBatch.name

  - name: "actual_batch_qty"
    type: "DECIMAL(21,9)"
    role: ["inventory", "analysis"]
    description: "Actual quantity available in this batch"
    synonyms_en: ["batch stock qty"]
    synonyms_ar: ["كمية الدفعة الفعلية"]

  - name: "delivered_by_supplier"
    type: "INT(1)"
    role: ["flag", "analysis"]
    description: "1=Delivered directly by supplier,0=Delivered by own warehouse"
    synonyms_en: ["direct supplier delivery"]
    synonyms_ar: ["تم التوصيل بواسطة المورد"]

  - name: "return_against"
    type: "VARCHAR(140)"
    role: ["analysis", "relation"]
    description: "Original document reference if this packed row is tied to a return process"
    synonyms_en: ["return ref"]
    synonyms_ar: ["مرتجع مقابل"]

  - name: "page_break"
    type: "INT(1)"
    role: ["flag", "config"]
    description: "UI flag for page break in print"
    synonyms_en: ["print page break"]
    synonyms_ar: ["فاصل الصفحة"]

  - name: "parent_detail_docname"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked parent detail docname for traceability when chained"
    synonyms_en: ["source detail parent"]
    synonyms_ar: ["مرجع التفاصيل الأصل"]

  - name: "_user_tags"
    type: "TEXT"
    role: ["meta"]
    description: "Tags for filtering/grouping rows"
    synonyms_en: ["tags"]
    synonyms_ar: ["وسوم"]

  - name: "_comments"
    type: "TEXT"
    role: ["meta"]
    description: "User notes/comments"
    synonyms_ar: ["ملاحظات", "تعليقات"]

  - name: "_assign"
    type: "TEXT"
    role: ["meta"]
    description: "Assigned handlers"
    synonyms_ar: ["التعيينات", "المكلفون"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["meta"]
    description: "Liked users tracking"
    synonyms_ar: ["تم الإعجاب بواسطة"]

  notes: |
    - **Not a master list table**. This is a bundled/packed child line table. Your masters are `Item` and `Cost Center`.
    - Financial totals (`amount`, `base_amount`) must be **revalidated in BI/SQL**. Never trust stored computed columns in reconciliation. Recompute for correctness.
    - `conversion_factor` stored default 0 is a schema smell. In analytics, compute conversion from UOM master or rule table instead.
    - `warehouse` + `item_code` composite is indexed, that is good, but **enforce NOT NULL logically** if your packing workflow requires source warehouse.
    - Do not use `idx` for analytics KPIs, it only orders UI rows.
    - BI insights you can build from this:
        Packed vs Picked accuracy %, Batch concentration risk, Supplier direct delivery ratio, Most bundled parent items.
    - Suggested BI join path:
        Opportunity/Order header → Opportunity Item → Packed Item (bundle lines) → Warehouse, Customer, Item master tables for truth.

- table: "tabPacking Slip"
  synonyms_en:
  - "packing slip"
  - "shipment packing slip"
  - "delivery package slip"
  - "consignment pack slip"
  - "pos packing slip"
  - "case packing slip"
  description: "Stores header details of packing slips generated for deliveries, including case range, net/gross weight, linked\
    \ delivery notes and audit metadata."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique Packing Slip ID (primary key)"
    synonyms_en: ["slip id", "packing id", "record id"]
    synonyms_ar: ["معرّف السجل", "رقم السجل", "المفتاح الرئيسي"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when slip was created"
    synonyms_en: ["created at", "generated on"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when slip was last updated"
    synonyms_en: ["updated at", "last modified"]
    synonyms_ar: ["آخر تحديث", "تاريخ التعديل"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified"
    synonyms_ar: ["تم التعديل بواسطة", "المحرر"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created this packing slip"
    synonyms_en: ["created by"]
    synonyms_ar: ["تم الإنشاء بواسطة", "مالك السجل"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Status: 0=Draft,1=Submitted,2=Cancelled"
    synonyms_en: ["slip state", "status code"]
    synonyms_ar: ["حالة المستند", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "UI ordering index"
    synonyms_en: ["position", "order"]
    synonyms_ar: ["الترتيب", "الفهرس"]

  - name: "delivery_note"
    type: "VARCHAR(140)"
    role: ["relation", "analysis"]
    description: "Reference to linked Delivery Note"
    synonyms_en: ["delivery note id", "linked delivery"]
    synonyms_ar: ["إذن التسليم", "مرجع التسليم"]
    join_hint: tabPacking Slip.delivery_note = tabDelivery Note.name

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["config", "analysis"]
    description: "Series pattern used for auto naming of packing slips"
    synonyms_en: ["series", "naming pattern"]
    synonyms_ar: ["سلسلة التسمية"]
    options:
    - MAT-PAC-.YYYY.-

  - name: "from_case_no"
    type: "INT(11)"
    role: ["analysis", "range"]
    description: "Starting case/box number in this packing batch"
    synonyms_en: ["first case no", "case start"]
    synonyms_ar: ["رقم الكرتون من", "رقم الصندوق بداية"]

  - name: "to_case_no"
    type: "INT(11)"
    role: ["analysis", "range"]
    description: "Ending case/box number"
    synonyms_en: ["last case no", "case end"]
    synonyms_ar: ["رقم الكرتون إلى", "رقم الصندوق نهاية"]

  - name: "net_weight_pkg"
    type: "DECIMAL(21,9)"
    role: ["measure", "analysis"]
    description: "Net weight of package"
    synonyms_en: ["net package weight", "net weight"]
    synonyms_ar: ["الوزن الصافي", "وزن الحزمة الصافي"]

  - name: "net_weight_uom"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Unit of net weight, example: KG, G, LBS"
    synonyms_en: ["net weight unit"]
    synonyms_ar: ["وحدة الوزن الصافي"]
    join_hint: tabPacking Slip.net_weight_uom = tabUOM.name

  - name: "gross_weight_pkg"
    type: "DECIMAL(21,9)"
    role: ["measure", "analysis"]
    description: "Gross package weight including packing material"
    synonyms_en: ["gross weight", "total package weight"]
    synonyms_ar: ["الوزن الإجمالي", "وزن الحزمة الكلي"]

  - name: "gross_weight_uom"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Unit of gross weight"
    synonyms_en: ["gross weight unit"]
    synonyms_ar: ["وحدة الوزن الإجمالي"]
    join_hint: tabPacking Slip.gross_weight_uom = tabUOM.name

  - name: "letter_head"
    type: "VARCHAR(140)"
    role: ["config"]
    description: "Print letterhead format applied while printing slip"
    synonyms_en: ["print header", "letter format"]
    synonyms_ar: ["الترويسة", "ترويسة الطباعة"]
    join_hint: tabPacking Slip.letter_head = tabLetter Head.name

  - name: "amended_from"
    type: "VARCHAR(140)"
    role: ["relation", "analysis"]
    description: "Reference slip ID if amended from a previous record"
    synonyms_en: ["amend reference"]
    synonyms_ar: ["مُعدَّل من", "مرجع التعديل"]
    join_hint: tabPacking Slip.amended_from = tabPacking Slip.name

  - name: "_user_tags"
    type: "TEXT"
    role: ["meta"]
    description: "Custom tags for filtering slips"
    synonyms_en: ["tags"]
    synonyms_ar: ["وسوم", "علامات"]

  - name: "_comments"
    type: "TEXT"
    role: ["meta"]
    description: "Audit or user notes"
    synonyms_en: ["remarks", "notes"]
    synonyms_ar: ["تعليقات", "ملاحظات"]

  - name: "_assign"
    type: "TEXT"
    role: ["meta"]
    description: "Assigned handlers/users"
    synonyms_ar: ["التعيينات", "المكلفون"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["meta"]
    description: "Users who liked this slip"
    synonyms_en: ["liked by"]
    synonyms_ar: ["تم الإعجاب بواسطة"]

  notes: |
    - This is a **packing slip header**, it summarizes case range and weight. Line-item contents belong in child tables like `Packing Slip Item` or `Packed Item`.
    - `from_case_no` and `to_case_no` define a range. For analytics, compute `case_count = (to_case_no - from_case_no + 1)` instead of storing it here. That logic is safer in SQL or BI.
    - Nullable IDs (`delivery_note`, `company`, `warehouse`) are risky for reporting. If every slip must link to a delivery note, enforce NOT NULL at your logic layer.
    - Gross/net weights should be revalidated when reconciling shipments. Do not derive invoice totals from this table, join invoices/orders instead.
    - Composite index on `(item_code, warehouse)` exists in schema for children. Use it to optimize packed quantity reconciliation at source warehouse level.
    - `idx` and `_user_tags` are metadata/UI fields only. Never include them in KPIs or rankings.
    - Useful BI insights:
        Case range trends, Net vs Gross weight variance %, Most amended slips, Active users handling packing logs.

