  notes: |
    - Represents a sales quotation or estimate for a Customer or Lead.
    - Contains validity dates and pricing summary fields.
    - Supports multi-currency and exchange rate conversion.
    - Can be amended using `amended_from`.
    - Discount can be applied via coupon or flat discount.
    - Indexed fields improve query performance: `party_name`, `transaction_date`, `modified`.
    - Core financial fields stored in both base and quote currency.

- table: "tabQuotation Item"
  synonyms_en:
  - "quotation item"
  - "sales quote line"
  - "quoted product"
  - "quote item"
  - "estimate item"
  - "proposal item"
  description: "Individual items or product lines inside a Quotation document with quantity, UOM, and pricing-related fields."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique quotation item line ID (primary key)"
    synonyms_en: ["quote line id", "item row id", "quotation item id"]
    synonyms_ar: ["معرّف العنصر", "رقم السطر", "المفتاح الرئيسي للسطر"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the item line was created"
    synonyms_en: ["created at", "line creation time"]
    synonyms_ar: ["تاريخ إنشاء السطر", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the item line was last modified"
    synonyms_en: ["updated at", "modified at", "line modified time"]
    synonyms_ar: ["تاريخ تعديل السطر", "آخر تحديث للسطر"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified the item record"
    synonyms_en: ["edited by", "updated by"]
    synonyms_ar: ["تم التعديل بواسطة", "محرر السطر"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who originally created the quotation item line"
    synonyms_en: ["created by", "creator of line"]
    synonyms_ar: ["تم الإنشاء بواسطة", "منشئ السطر"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Line document status (0 = Draft, 1 = Submitted, 2 = Cancelled)"
    synonyms_en: ["line status", "status code"]
    synonyms_ar: ["حالة السطر", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row index for ordering inside the quotation"
    synonyms_en: ["row order", "line position", "index"]
    synonyms_ar: ["ترتيب الصف", "موضع السطر", "فهرس"]

  - name: "item_code"
    type: "VARCHAR(140)"
    role: ["attribute", "relation"]
    description: "Reference ID of the item being quoted"
    synonyms_en: ["product code", "quoted item id", "item id"]
