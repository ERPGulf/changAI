    synonyms_en: ["sub assembly WH"]
    synonyms_ar: ["مخزن التجميع الفرعي"]
    join_hint: tabProduction Plan.sub_assembly_warehouse = tabWarehouse.name

  - name: "skip_available_sub_assembly_item"
    type: "INT(1)"
    role: ["flag", "analysis"]
    description: "Skip sub items if stock is available"
    synonyms_en: ["skip available sub items"]
    synonyms_ar: ["تخطي المستلزمات المتاحة"]

  - name: "include_non_stock_items"
    type: "INT(1)"
    role: ["flag"]
    description: "Include service or non-inventory items"
    synonyms_en: ["include non inventory"]
    synonyms_ar: ["شمل العناصر غير المخزنية"]

  - name: "include_subcontracted_items"
    type: "INT(1)"
    role: ["flag"]
    description: "Include items produced via subcontract"
    synonyms_en: ["include subcontracted"]
    synonyms_ar: ["شمل الأصناف المتعاقد عليها"]

  - name: "consider_minimum_order_qty"
    type: "INT(1)"
    role: ["flag"]
    description: "Respect minimum order quantity"
    synonyms_en: ["consider MOQ"]
    synonyms_ar: ["اعتبار الحد الأدنى للكمية"]

  - name: "include_safety_stock"
    type: "INT(1)"
    role: ["flag"]
    description: "Factor in safety stock"
    synonyms_en: ["consider safety stock"]
    synonyms_ar: ["شمل مخزون الأمان"]

  - name: "ignore_existing_ordered_qty"
    type: "INT(1)"
    role: ["flag"]
    description: "Ignore already ordered qty"
    synonyms_en: ["ignore pre-ordered qty"]
    synonyms_ar: ["تجاهل الكمية المطلوبة سابقاً"]

  - name: "for_warehouse"
    type: "VARCHAR(140)"
    role: ["attribute", "analysis", "relation"]
    description: "Target warehouse filter"
    synonyms_en: ["warehouse scope"]
    synonyms_ar: ["نطاق المخزن", "المخزن المحدد"]
    join_hint: tabProduction Plan.for_warehouse = tabWarehouse.name

  - name: "total_planned_qty"
    type: "DECIMAL(21,9)"
    role: ["measure", "analysis"]
    description: "Total planned quantity"
    synonyms_en: ["planned qty", "plan total"]
    synonyms_ar: ["إجمالي الكمية المخططة"]

  - name: "total_produced_qty"
    type: "DECIMAL(21,9)"
    role: ["measure", "analysis"]
    description: "Total produced quantity"
    synonyms_en: ["manufactured qty", "actual produced"]
    synonyms_ar: ["إجمالي الكمية المنتجة", "الكمية الفعلية"]

  - name: "status"
    type: "VARCHAR(140)"
    role: ["status"]
    description: "Workflow status, example: Draft, Submitted, Completed"
    synonyms_en: ["plan workflow state"]
    synonyms_ar: ["حالة سير الخطة"]
    options:
    - Draft
    - Submitted
    - Not Started
    - In Process
    - Completed
    - Closed
    - Cancelled
    - Material Requested

  - name: "amended_from"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Link to original plan if amended"
    synonyms_en: ["amended source"]
    synonyms_ar: ["مصدر التعديل", "المرجع الأصلي"]
    join_hint: tabProduction Plan.amended_from = tabProduction Plan.name

  - name: "_user_tags"
    type: "TEXT"
    role: ["meta"]
    description: "User tags for classification only"
    synonyms_en: ["tags"]
    synonyms_ar: ["الوسوم"]

  - name: "_comments"
    type: "TEXT"
    role: ["meta"]
    description: "System or user comments, not for analytics"
    synonyms_en: ["notes", "comments"]
    synonyms_ar: ["التعليقات"]

  - name: "_assign"
    type: "TEXT"
    role: ["meta"]
    description: "Assignment data, not for metrics"
    synonyms_ar: ["تعيين"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["meta"]
    description: "Liked by users, UI only field"
    synonyms_en: ["likes"]
    synonyms_ar: ["أعجب به"]

  notes: |
    - Production Plan is used to generate Work Orders and Material Requests.
    - KPI calculations should rely on `total_planned_qty` vs `total_produced_qty` only.
    - Do not include metadata fields in production success metrics.
    - Join path for analytics: Production Plan → Work Order → Stock Ledger → Delivery Note/Sales Order → Customer.
    - Convert INT flags into boolean or enums in data layers before using in Power BI or pipelines.

