    description: "Last updated time of the token record"
    synonyms_en: ["last modified", "updated at"]
    synonyms_ar: ["تاريخ التعديل", "آخر تحديث"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified this token record"
    synonyms_en: ["updated by", "modified user"]
    synonyms_ar: ["تم التعديل بواسطة", "المعدل"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the token record"
    synonyms_en: ["created by", "record creator"]
    synonyms_ar: ["المنشئ", "تم الإنشاء بواسطة"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Workflow document status"
    synonyms_en: ["document state", "status code"]
    synonyms_ar: ["حالة المستند", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row ordering index"
    synonyms_en: ["row index", "order index"]
    synonyms_ar: ["فهرس الترتيب", "رقم الصف"]

  - name: "client"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "OAuth client application linked to this token"
    synonyms_en: ["oauth client", "app client"]
    synonyms_ar: ["العميل OAuth", "تطبيق العميل"]
    join_hint: tabOAuth Bearer Token.client = tabOAuth Client.name

  - name: "user"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "User the token is issued to"
    synonyms_en: ["token user", "authorized user"]
    synonyms_ar: ["المستخدم المصرّح"]
    join_hint: tabOAuth Bearer Token.user = tabUser.name

  - name: "scopes"
    type: "TEXT"
    role: ["property"]
    description: "OAuth scopes allowed for this token"
    synonyms_en: ["permissions scope", "access scope"]
    synonyms_ar: ["نطاقات الصلاحيات"]

  - name: "access_token"
    type: "VARCHAR(140)"
    unique: true
    role: ["attribute"]
    description: "Bearer access token string"
    synonyms_en: ["api access token"]
    synonyms_ar: ["رمز الوصول", "رمز API"]

  - name: "refresh_token"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Token used to refresh access on expiry"
    synonyms_en: ["renewal token"]
    synonyms_ar: ["رمز التحديث", "رمز التجديد"]

  - name: "expiration_time"
    type: "DATETIME(6)"
    role: ["attribute"]
    description: "Exact expiration timestamp of the access token"
    synonyms_en: ["token expiry time", "expires at"]
    synonyms_ar: ["وقت انتهاء الصلاحية", "ينتهي في"]

  - name: "expires_in"
    type: "INT(11)"
    default: 0
    role: ["attribute"]
    description: "Seconds until token expires"
    synonyms_en: ["expiry duration", "valid for seconds"]
    synonyms_ar: ["مدة الصلاحية بالثواني"]

  - name: "status"
    type: "VARCHAR(140)"
    role: ["state"]
    description: "Current state of the token"
    synonyms_en: ["token status"]
    synonyms_ar: ["حالة الرمز"]
    options:
    - Active
    - Revoked

  - name: "_user_tags"
    type: "TEXT"
    role: ["meta"]
    description: "Custom user tags for this token record"
    synonyms_en: ["tags"]
    synonyms_ar: ["وسوم", "علامات"]

  - name: "_comments"
    type: "TEXT"
    role: ["meta"]
    description: "Internal comments or notes"
    synonyms_en: ["comments", "notes"]
    synonyms_ar: ["تعليقات داخلية"]

  - name: "_assign"
    type: "TEXT"
    role: ["meta"]
    description: "Assigned user or task references"
    synonyms_en: ["assignments"]
    synonyms_ar: ["تعيينات"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["meta"]
    description: "Users who liked this token record"
    synonyms_en: ["likes"]
    synonyms_ar: ["الإعجابات"]

  notes: |
    - Used for API authentication using OAuth2 Bearer tokens.
    - Includes both access and refresh tokens.
    - access_token is unique and indexed for fast lookup.
    - expiration can be checked using expiration_time or expires_in.
    - Linked to an OAuth client app and a user record.

