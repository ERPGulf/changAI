    - Typically linked through the `branch` field in transactional doctypes to track branch-wise operations and reporting.
    - Use `docstatus = 1` to filter active (submitted) branches.
    - Key joins: `branch` → referenced in `tabPurchase Invoice`, `tabSales Invoice`, and `tabEmployee`.
    - `owner`, `_assign`, and `_comments` manage user-level collaboration and tracking.
    - Indexed field `name` improves lookup and joins in financial and inventory reports.
    - Crucial for consolidated vs. branch-level financial statements and profit center reporting.
