  notes: |
    - Master tables store key identifiers and classification fields used in multiple transactions.  
    - They enable accurate entity resolution in natural language queries.  
    - Users may refer to entities using partial names, informal terms, or synonyms.  
    - Embedding master data improves matching accuracy and reduces ambiguity.  
    - Correct master data retrieval ensures proper joins, filters, and query generation.

- table: "tabSales Invoice Item"
  synonyms_en:
  - "invoice line"
  - "line item"
  - "sales line"
  - "invoice item"
  - "product line"
  - "SI item"
  synonyms_ar:
  - "بند الفاتورة"
  - "سطر الفاتورة"
  - "عنصر المبيعات"
  description: "Child rows of Sales Invoice representing each billed item, quantity, price, discounts, taxes, and delivery\
    \ references."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Primary key of the line item"
    synonyms_en: ["line id", "row id"]
    synonyms_ar: ["معرّف السطر", "معرّف البند"]

  - name: "parent"
    type: "VARCHAR"
    role: ["parent_link"]
    description: "Links to parent Sales Invoice (tabSales Invoice.name)"
    synonyms_en: ["invoice id (parent)", "parent invoice"]
    synonyms_ar: ["فاتورة الأصل", "رابط الأصل"]
    join_hint: tabSales Invoice Item.parent = tabSales Invoice.name

  - name: "parenttype"
    type: "VARCHAR"
    role: ["system"]
    description: "Parent doctype (should be 'Sales Invoice')"
    synonyms_en: ["parent doctype", "parent type", "source doctype", "origin doctype"]
    synonyms_ar: ["نوع المستند الأصل", "نوع الأصل", "نوع المصدر"]

  - name: "parentfield"
    type: "VARCHAR"
    role: ["system"]
    description: "Child table fieldname on parent (usually 'items')"
    synonyms_en: ["child table fieldname", "parent fieldname", "items field", "child link field"]
    synonyms_ar: ["اسم حقل الجدول الفرعي", "اسم حقل الأصل", "حقل العناصر"]

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the line was created"
    synonyms_en: ["created at", "creation time", "created date", "invoice item created on"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء", "تم الإنشاء في"]

  - name: "modified"
    type: "DATETIME"
    role: ["system"]
    description: "Timestamp when the line was last modified"
    synonyms_en: ["last modified", "updated at", "modification time", "last updated date"]
    synonyms_ar: ["آخر تعديل", "تاريخ التعديل", "وقت التعديل"]

  - name: "modified_by"
    type: "VARCHAR"
    role: ["system"]
    description: "User who last modified the line"
    synonyms_en: ["updated by", "last modified by", "user who modified", "edited by"]
    synonyms_ar: ["تم التعديل بواسطة", "آخر من عدّل", "المستخدم المعدّل"]

  - name: "owner"
    type: "VARCHAR"
    role: ["system"]
    description: "User who created the line"
    synonyms_en: ["created by", "owner", "user who created", "creator"]
    synonyms_ar: ["تم الإنشاء بواسطة", "المالك", "منشئ السجل"]

  - name: "docstatus"
    type: "INT"
    role: ["lifecycle"]
