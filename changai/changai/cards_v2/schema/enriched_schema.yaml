    synonyms_ar: ["مخزون الأمان", "الحد الأدنى للمخزون"]

  - name: "is_purchase_item"
    type: "INT"
    role: ["procurement"]
    description: "Specifies if the item can be purchased (1=Yes)"
    synonyms_en: ["purchasable", "buyable item"]
    synonyms_ar: ["عنصر قابل للشراء"]

  - name: "lead_time_days"
    type: "INT"
    role: ["procurement"]
    description: "Expected number of days required to receive the item after ordering"
    synonyms_en: ["lead time", "delivery time", "supply time"]
    synonyms_ar: ["مدة التوريد", "زمن التسليم"]

  - name: "last_purchase_rate"
    type: "DECIMAL"
    role: ["procurement"]
    description: "Rate at which the item was last purchased"
    synonyms_en: ["last buy rate", "previous purchase price"]
    synonyms_ar: ["سعر الشراء الأخير", "أحدث سعر شراء"]

  - name: "is_customer_provided_item"
    type: "INT"
    role: ["supply_chain"]
    description: "Indicates whether the item is provided by the customer (1=Yes)"
    synonyms_en: ["customer supplied", "customer owned item"]
    synonyms_ar: ["عنصر مقدم من العميل", "صنف العميل"]

  - name: "customer"
    type: "VARCHAR"
    role: ["relationship"]
    description: "Customer associated with this item if it is customer-provided"
    synonyms_en: ["associated customer", "linked customer"]
    synonyms_ar: ["العميل المرتبط", "عميل الصنف"]
    join_hint: tabItem.customer = tabCustomer.name

  - name: "delivered_by_supplier"
    type: "INT"
    role: ["logistics"]
    description: "Indicates whether the item is delivered directly by the supplier to customer (1=Yes)"
    synonyms_en: ["supplier delivery", "dropship item"]
    synonyms_ar: ["يُسلَّم من المورد", "توصيل المورد"]

  - name: "country_of_origin"
    type: "VARCHAR"
    role: ["trade"]
    description: "Country where the item was manufactured or sourced from"
    synonyms_en: ["origin country", "manufacturing country"]
    synonyms_ar: ["بلد المنشأ", "بلد الصنع"]
    join_hint: tabItem.country_of_origin = tabCountry.name

  - name: "customs_tariff_number"
    type: "VARCHAR"
    role: ["trade"]
    description: "Customs tariff or HS code used for international trade and taxation"
    synonyms_en: ["tariff code", "hs code", "customs code"]
    synonyms_ar: ["رمز التعرفة الجمركية", "رمز النظام المنسق"]
    join_hint: tabItem.customs_tariff_number = tabCustoms Tariff Number.name

  - name: "sales_uom"
    type: "VARCHAR"
    role: ["sales"]
    description: "Default unit of measure used during sales transactions"
    synonyms_en: ["sales unit", "selling unit"]
    synonyms_ar: ["وحدة المبيعات", "وحدة القياس للبيع"]
    join_hint: tabItem.sales_uom = tabUOM.name

  - name: "grant_commission"
    type: "INT"
    role: ["sales"]
    description: "Specifies if sales commissions are granted for selling this item (1=Yes)"
    synonyms_en: ["allow commission", "commission applicable"]
