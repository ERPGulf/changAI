    synonyms_ar: ["المعجبون", "من أقر المستند", "من وافق عليه", "من فضّل المستند"]
  notes: |
    - Core doctype for recording goods or materials received from a supplier against a Purchase Order.
    - Use `docstatus = 1` to filter submitted receipts.
    - Key joins: `supplier` → `tabSupplier`, `name` → `tabPurchase Receipt Item`.`parent`.
    - `posting_date` and `posting_time` define the actual goods receipt date and time.
    - `grand_total` and `base_grand_total` capture receipt value in transaction and company currency.
    - `is_return` and `return_against` track returned or rejected goods.
    - `warehouse` and `rejected_warehouse` fields determine stock movement and rejection handling.
    - `taxes_and_charges`, `tax_category`, and `discount_amount` manage receipt-level adjustments.
    - `status` reflects document lifecycle (Draft, Submitted, Cancelled).
    - `supplier_address`, `dispatch_address`, and `shipping_address` store logistics and delivery details.
    - Commonly used for GRN (Goods Receipt Note), supplier delivery tracking, and stock valuation.
    - Indexed fields like `supplier`, `posting_date`, and `company` improve reporting performance.


