  - name: "custom_zatca_tax_category"
    type: "VARCHAR"
    role: ["zatca", "tax"]
    description: "ZATCA tax category applied to invoice"
    synonyms_en: ["zatca tax category"]
    synonyms_ar: ["فئة الضريبة زاتكا"]
    options:
    - Standard
    - Zero Rated
    - Exempted
    - Services outside scope of tax / Not subject to VAT

  - name: "custom_exemption_reason_code"
    type: "VARCHAR"
    role: ["zatca", "tax"]
    description: "ZATCA exemption reason code if applicable"
    synonyms_en: ["zatca exemption reason code"]
    synonyms_ar: ["رمز سبب الإعفاء زاتكا"]
    options:
    - Standard 15%
    - VATEX-SA-29
    - VATEX-SA-29-7
    - VATEX-SA-30
    - VATEX-SA-32
    - VATEX-SA-33
    - VATEX-SA-34-1
    - VATEX-SA-34-2
    - VATEX-SA-34-3
    - VATEX-SA-34-4
    - VATEX-SA-34-5
    - VATEX-SA-35
    - VATEX-SA-36
    - VATEX-SA-EDU
    - VATEX-SA-HEA
    - VATEX-SA-MLTRY
    - VATEX-SA-OOS
  notes: |
    - Core doctype for supplier bills and accounts payable.
    - Use `docstatus = 1` to filter submitted invoices.
    - Key joins: `supplier` → `tabSupplier`, `name` → `tabPurchase Invoice Item`.`parent`.
    - Use `grand_total` for invoice currency and `base_grand_total` for company currency.
    - `outstanding_amount` is crucial for AP aging and payments.
    - Discounts and taxes controlled via `discount_amount`, `taxes_and_charges`, `tax_category`.
    - `status` reflects lifecycle (Draft, Submitted, Paid, etc.).
    - `is_return` and `return_against` track credit notes/returns.
    - ZATCA fields (`custom_zatca_*`) are important for e-invoicing compliance.
    - Indexed fields like `supplier`, `posting_date`, and `bill_no` improve query performance.

- table: "tabOpening Invoice Creation Tool Item"

  synonyms_en:
  - "opening invoice item"
  - "initial invoice line"
  - "opening balance invoice item"
  - "invoice creation tool item"

  synonyms_ar:
  - "عنصر فاتورة افتتاحية"
  - "بند فاتورة البداية"
  - "سطر فاتورة الرصيد الافتتاحي"

  description: "Line items used in the opening invoice creation tool to initialize outstanding invoices for parties."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique record ID (Primary Key)"
    synonyms_en: ["record id", "primary key"]
    synonyms_ar: ["معرف السجل", "المفتاح الرئيسي"]

  - name: "creation"
    type: "DATETIME(6)"
