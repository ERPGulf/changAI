  - name: "job_title"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Job title of contact person"
    synonyms_ar: ["المسمى الوظيفي"]

  - name: "contact_email"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Email of the contact"
    synonyms_ar: ["البريد الإلكتروني"]

  - name: "contact_mobile"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Mobile number of contact"
    synonyms_ar: ["رقم الجوال"]

  - name: "whatsapp"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "WhatsApp number"
    synonyms_ar: ["رقم الواتساب"]

  - name: "customer_address"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked address record"
    synonyms_ar: ["عنوان العميل"]
    join_hint: tabOpportunity.customer_address = tabAddress.name

  - name: "address_display"
    type: "TEXT"
    role: ["attribute"]
    description: "Formatted address view"
    synonyms_ar: ["العنوان الكامل المعروض"]

  - name: "base_total"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total value in base currency"
    synonyms_ar: ["الإجمالي بالأساس"]

  - name: "total"
    type: "DECIMAL(21,9)"
    role: ["measure"]
    description: "Total opportunity value"
    synonyms_ar: ["الإجمالي"]

  notes: |
    - Used to track sales opportunities from lead to closing stage.
    - Fields `territory` and `customer_group` can be used to create reporting hierarchies.
    - `probability` helps forecast conversion.
    - Amount fields support multi-currency reporting.
    - Contact details stored separately for sales reference.
    - Does not directly impact accounting modules unless converted into an order.
    - Indexed fields include `customer_group`, `territory`, `company`, and `modified` for faster joins.

- table: "tabLead"

  synonyms_en:
  - "lead"
  - "prospect"
  - "sales lead"
  - "potential client"

  synonyms_ar:
  - "عميل محتمل"
  - "فرصة مبيعات"
  - "مرشح عميل"

  description: "Lead master used in CRM to store personal, contact and sourcing details."

  fields:

  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique identifier of the lead"
    synonyms_en: ["lead id", "record id"]
    synonyms_ar: ["معرف العميل", "رقم السجل"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when lead was created"
    synonyms_en: ["created at", "creation time"]
    synonyms_ar: ["تاريخ الإنشاء", "وقت الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Time when lead was last updated"
    synonyms_en: ["last modified", "updated at"]
    synonyms_ar: ["آخر تعديل", "تم التعديل في"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last updated the lead"
    synonyms_en: ["modified by", "updated by"]
    synonyms_ar: ["تم التعديل بواسطة"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the lead"
    synonyms_en: ["record owner", "created by"]
    synonyms_ar: ["مالك السجل", "تم الإنشاء بواسطة"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document workflow status"
    synonyms_en: ["status code", "document status"]
    synonyms_ar: ["حالة المستند"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row index"
    synonyms_en: ["row index", "position"]
    synonyms_ar: ["فهرس", "ترتيب"]

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["property"]
    description: "Series format used to generate lead names"
    synonyms_en: ["series", "numbering pattern"]
    synonyms_ar: ["سلسلة الترقيم"]
    options:
    - CRM-LEAD-.YYYY.-

  - name: "salutation"
    type: "VARCHAR(140)"
    role: ["demographic"]
    description: "Title such as Mr, Ms, Dr"
    synonyms_en: ["title", "honorific"]
    synonyms_ar: ["التحية", "اللقب"]
    join_hint: tabLead.salutation = tabSalutation.name

  - name: "first_name"
    type: "VARCHAR(140)"
    role: ["identity"]
    description: "Lead's first name"
    synonyms_en: ["given name", "forename"]
    synonyms_ar: ["الاسم الأول"]

  - name: "middle_name"
    type: "VARCHAR(140)"
    role: ["identity"]
    description: "Lead's middle name"
    synonyms_en: ["middle name"]
    synonyms_ar: ["الاسم الأوسط"]

  - name: "last_name"
    type: "VARCHAR(140)"
    role: ["identity"]
    description: "Lead's last name"
    synonyms_en: ["surname", "family name"]
    synonyms_ar: ["اسم العائلة", "اللقب"]

  - name: "lead_name"
    type: "VARCHAR(140)"
    role: ["identity"]
    description: "Full name of the lead"
    synonyms_en: ["full name", "lead full name"]
    synonyms_ar: ["الاسم الكامل"]

  - name: "job_title"
    type: "VARCHAR(140)"
    role: ["professional"]
    description: "Lead's job designation"
    synonyms_en: ["designation", "position", "role"]
    synonyms_ar: ["المسمى الوظيفي"]

  - name: "gender"
    type: "VARCHAR(140)"
    role: ["demographic"]
    description: "Gender of the lead"
    synonyms_en: ["sex", "gender identity"]
    synonyms_ar: ["الجنس"]
    join_hint: tabLead.gender = tabGender.name

  - name: "source"
    type: "VARCHAR(140)"
    role: ["marketing"]
    description: "Where the lead originated from"
    synonyms_en: ["lead source", "acquisition source"]
    synonyms_ar: ["مصدر العميل", "مصدر الحصول"]
    join_hint: tabLead.source = tabLead Source.name

  - name: "lead_owner"
    type: "VARCHAR(140)"
    role: ["assignment"]
    description: "User or salesperson responsible for the lead"
    synonyms_en: ["owner", "assigned to", "lead handler"]
    synonyms_ar: ["مالك العميل", "المسؤول عن المتابعة"]
    join_hint: tabLead.lead_owner = tabUser.name

  - name: "status"
    type: "VARCHAR(140)"
    default: "Lead"
    role: ["state"]
    description: "Current status of the lead"
    synonyms_en: ["lead status", "stage"]
    synonyms_ar: ["حالة العميل", "مرحلة العميل"]
    options:
    - Lead
    - Open
    - Replied
    - Opportunity
    - Quotation
    - Lost Quotation
    - Interested
    - Converted
    - Do Not Contact

  - name: "customer"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "Linked customer record if converted"
    synonyms_en: ["customer reference", "linked customer"]
    synonyms_ar: ["العميل المرتبط"]
    join_hint: tabLead.customer = tabCustomer.name

  - name: "type"
    type: "VARCHAR(140)"
    role: ["classification"]
    description: "Lead type such as Individual or Company"
    synonyms_en: ["lead type", "category"]
    synonyms_ar: ["نوع العميل"]
    options:
    - Client
    - Channel Partner
    - Consultant

  - name: "request_type"
    type: "VARCHAR(140)"
    role: ["classification"]
    description: "Type of request or inquiry made by the lead"
    synonyms_en: ["inquiry type", "request category"]
    synonyms_ar: ["نوع الطلب"]
    options:
    - Product Enquiry
    - Request for Information
    - Suggestions
    - Other

  - name: "email_id"
    type: "VARCHAR(140)"
    role: ["contact"]
    description: "Primary email of the lead"
    synonyms_en: ["email", "email address"]
    synonyms_ar: ["البريد الإلكتروني"]

  - name: "website"
    type: "VARCHAR(140)"
    role: ["contact"]
    description: "Lead’s website address"
    synonyms_en: ["website url", "site"]
    synonyms_ar: ["الموقع الإلكتروني"]

  - name: "mobile_no"
    type: "VARCHAR(140)"
    role: ["contact"]
    description: "Lead’s mobile number"
    synonyms_en: ["mobile", "cell number"]
    synonyms_ar: ["رقم الجوال"]

  - name: "whatsapp_no"
    type: "VARCHAR(140)"
    role: ["contact"]
    description: "WhatsApp number of the lead"
    synonyms_en: ["whatsapp", "whatsapp contact"]
    synonyms_ar: ["رقم واتساب"]

  - name: "phone"
    type: "VARCHAR(140)"
    role: ["contact"]
    description: "Lead’s landline phone number"
    synonyms_en: ["telephone", "landline"]
    synonyms_ar: ["الهاتف الثابت"]

  - name: "phone_ext"
    type: "VARCHAR(140)"
    role: ["contact"]
    description: "Extension for office phone numbers"
    synonyms_en: ["extension", "phone extension"]
    synonyms_ar: ["التحويلة"]

  - name: "company_name"
    type: "VARCHAR(140)"
    role: ["company"]
    description: "Lead’s company name"
    synonyms_en: ["business name", "organization name"]
    synonyms_ar: ["اسم الشركة"]

  - name: "no_of_employees"
    type: "VARCHAR(140)"
    role: ["company"]
    description: "Number of employees in the lead's company"
    synonyms_en: ["employee count", "staff count"]
    synonyms_ar: ["عدد الموظفين"]
    options:
    - 1-10
    - 11-50
    - 51-200
    - 201-500
    - 501-1000
    - 1000+

  - name: "annual_revenue"
    type: "DECIMAL(21,9)"
    role: ["financial"]
    description: "Company’s approximate annual revenue"
    synonyms_en: ["yearly revenue", "annual income"]
    synonyms_ar: ["الإيرادات السنوية"]

  - name: "industry"
    type: "VARCHAR(140)"
    role: ["classification"]
    description: "Industry sector of the lead"
    synonyms_en: ["industry type", "business sector"]
    synonyms_ar: ["الصناعة"]
    join_hint: tabLead.industry = tabIndustry Type.name

  - name: "market_segment"
    type: "VARCHAR(140)"
    role: ["classification"]
    description: "Market segment to which the lead belongs"
    synonyms_en: ["segment", "market category"]
    synonyms_ar: ["شريحة السوق"]
    join_hint: tabLead.market_segment = tabMarket Segment.name

  - name: "territory"
    type: "VARCHAR(140)"
    role: ["territory"]
    description: "Geographical territory of the lead"
    synonyms_en: ["region", "zone"]
    synonyms_ar: ["الإقليم"]
    join_hint: tabLead.territory = tabTerritory.name

  - name: "fax"
    type: "VARCHAR(140)"
    role: ["contact"]
    description: "Fax number of the lead or company"
    synonyms_en: ["fax number", "fax contact"]
    synonyms_ar: ["فاكس"]

  - name: "city"
    type: "VARCHAR(140)"
    role: ["location"]
    description: "City of the lead"
    synonyms_en: ["city name", "town"]
    synonyms_ar: ["مدينة"]

  - name: "state"
    type: "VARCHAR(140)"
    role: ["location"]
    description: "State or province of the lead"
    synonyms_en: ["state name", "province"]
    synonyms_ar: ["الولاية", "المقاطعة"]

  - name: "country"
    type: "VARCHAR(140)"
    role: ["location"]
    description: "Country of the lead"
    synonyms_en: ["country name", "nation"]
    synonyms_ar: ["الدولة", "البلد"]
    join_hint: tabLead.country = tabCountry.name

  - name: "qualification_status"
    type: "VARCHAR(140)"
    role: ["state"]
    description: "Qualification stage of the lead"
    synonyms_en: ["qualification stage", "lead qualification status"]
    synonyms_ar: ["حالة التأهيل"]
    options:
    - Unqualified
    - In Process
    - Qualified

  - name: "qualified_by"
    type: "VARCHAR(140)"
    role: ["assignment"]
    description: "User who qualified the lead"
    synonyms_en: ["qualified by", "verified by"]
    synonyms_ar: ["تم التأهيل بواسطة"]
    join_hint: tabLead.qualified_by = tabUser.name

  - name: "qualified_on"
    type: "DATE"
    role: ["timestamp"]
    description: "Date when the lead was qualified"
    synonyms_en: ["qualification date"]
    synonyms_ar: ["تاريخ التأهيل"]

  - name: "campaign_name"
    type: "VARCHAR(140)"
    role: ["marketing"]
    description: "Associated marketing campaign"
    synonyms_en: ["campaign", "marketing campaign"]
    synonyms_ar: ["الحملة", "الحملة التسويقية"]
    join_hint: tabLead.campaign_name = tabCampaign.name

  - name: "company"
    type: "VARCHAR(140)"
    role: ["relation"]
    description: "ERP company linked to the lead"
    synonyms_en: ["erp company", "associated company"]
    synonyms_ar: ["الشركة المرتبطة"]
    join_hint: tabLead.company = tabCompany.name

  - name: "language"
    type: "VARCHAR(140)"
    role: ["preference"]
    description: "Preferred language of the lead"
    synonyms_en: ["preferred language", "communication language"]
    synonyms_ar: ["اللغة", "لغة التواصل"]
    join_hint: tabLead.language = tabLanguage.name

  - name: "image"
    type: "TEXT"
    role: ["media"]
    description: "Profile image of the lead"
    synonyms_en: ["profile picture", "photo", "image url"]
    synonyms_ar: ["الصورة", "الصورة الشخصية"]

  - name: "title"
    type: "VARCHAR(140)"
    role: ["identity"]
    description: "Display title or label for the lead"
    synonyms_en: ["label", "display title"]
    synonyms_ar: ["العنوان"]

  - name: "disabled"
    type: "INT(1)"
    role: ["state"]
    description: "Indicates whether the lead is disabled"
    synonyms_en: ["inactive", "deactivated"]
    synonyms_ar: ["معطل", "غير نشط"]

  - name: "unsubscribed"
    type: "INT(1)"
    role: ["preference"]
    description: "Indicates if lead unsubscribed from communications"
    synonyms_en: ["email unsubscribe", "communication opt-out"]
    synonyms_ar: ["غير مشترك", "إلغاء الاشتراك"]

  - name: "blog_subscriber"
    type: "INT(1)"
    role: ["preference"]
    description: "Shows if the lead is subscribed to the blog"
    synonyms_en: ["blog subscription", "blog follower"]
    synonyms_ar: ["مشترك في المدونة"]

  - name: "_user_tags"
    type: "TEXT"
    role: ["meta"]
    description: "User-added tags for categorization"
    synonyms_en: ["tags", "user tags"]
    synonyms_ar: ["وسوم المستخدم"]

  - name: "_comments"
    type: "TEXT"
    role: ["meta"]
    description: "Internal comment log"
    synonyms_en: ["comments", "internal notes"]
    synonyms_ar: ["تعليقات"]

  - name: "_assign"
    type: "TEXT"
    role: ["meta"]
    description: "Assignment metadata"
    synonyms_en: ["assignments", "assigned users"]
    synonyms_ar: ["التعيينات"]

  - name: "_liked_by"
    type: "TEXT"
    role: ["meta"]
    description: "List of users who liked this record"
    synonyms_en: ["likes", "liked by"]
    synonyms_ar: ["الإعجابات"]

  notes: |
    - Lead represents an early-stage prospect before becoming a Customer.
    - Fields cover demographics, contact information, qualification status and marketing attribution.
    - Lead can be converted into Opportunity, Customer or Quotation.
    - Status and qualification fields are key for CRM pipeline tracking.
    - Email, mobile, and WhatsApp numbers are often used for automated outreach.
    - System meta fields (_user_tags, _comments, _assign, _liked_by) support collaboration within CRM teams.

- table: "tabCurrency"
  synonyms_en:
  - "currency"
  - "money unit"
  - "monetary system"
  - "legal tender"
  - "financial denomination"
  description: "Stores master data for currencies including name, symbol, fractions, and formatting rules."

  fields:
  - name: "name"
    type: "VARCHAR(140)"
    role: ["id"]
    description: "Unique document ID (primary key)"
    synonyms_en: ["currency id", "record id"]
