    description: "User who last modified this record"
    synonyms_en: ["edited by", "updated by"]
    synonyms_ar: ["تم التعديل بواسطة", "المحرر"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created this record"
    synonyms_en: ["created by", "creator"]
    synonyms_ar: ["المنشئ", "تم الإنشاء بواسطة"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document status. 0=Draft, 1=Submitted, 2=Cancelled"
    synonyms_en: ["document status", "status code"]
    synonyms_ar: ["حالة المستند", "رمز الحالة"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Row ordering index"
    synonyms_en: ["index", "row order"]
    synonyms_ar: ["فهرس الترتيب", "ترتيب الصف"]

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Series prefix used for generating names"
    synonyms_en: ["name series", "series code"]
    synonyms_ar: ["سلسلة التسمية", "كود السلسلة"]
    options:
    - MAT-RECO-.YYYY.-

  - name: "company"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Company linked to this reconciliation"
    synonyms_en: ["company name", "linked company"]
    synonyms_ar: ["اسم الشركة", "مرجع الشركة"]
    join_hint: tabStock Reconciliation.company = tabCompany.name

  - name: "purpose"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Reason for stock reconciliation"
    synonyms_en: ["audit purpose", "reason"]
    synonyms_ar: ["السبب", "الغرض من التسوية"]
    options:
    - Opening Stock
    - Stock Reconciliation

  - name: "posting_date"
    type: "DATE"
    role: ["attribute"]
    description: "Reconciliation posting date"
    synonyms_en: ["reconcile date"]
    synonyms_ar: ["تاريخ القيد", "تاريخ التسوية"]

  - name: "posting_time"
    type: "TIME(6)"
    role: ["attribute"]
    description: "Reconciliation posting time"
    synonyms_en: ["reconcile time"]
    synonyms_ar: ["وقت القيد", "وقت التسوية"]

  - name: "set_posting_time"
