    synonyms_ar: ["تاريخ انتهاء الخدمة"]

  - name: "weight_per_unit"
    type: "DECIMAL(21,9)"
    role: ["inventory"]
    description: "Weight of one unit of the item"
    synonyms_en: ["unit weight", "single item weight"]
    synonyms_ar: ["وزن الوحدة"]

  - name: "total_weight"
    type: "DECIMAL(21,9)"
    role: ["inventory"]
    description: "Total weight of the total quantity sold"
    synonyms_en: ["gross weight", "overall weight"]
    synonyms_ar: ["الوزن الإجمالي"]

  - name: "weight_uom"
