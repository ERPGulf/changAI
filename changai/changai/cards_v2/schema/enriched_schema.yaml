    options: *id005

  notes: |
    - Master doctype defining currencies used across transactions, reports, and accounting modules.
    - Each record represents a unique currency with its symbol, format, and fractional unit setup.
    - Use `enabled = 1` to activate currencies available for use in the system.
    - `smallest_currency_fraction_value` supports precision in rounding and financial calculations.
    - `symbol` and `symbol_on_right` determine how currency is displayed in invoices and reports.
    - `number_format` controls digit grouping and decimal representation (e.g., "#,###.##").
    - Commonly joined with financial transactions like `tabPurchase Invoice`, `tabSales Invoice`, and `tabJournal Entry` via `currency`.
    - Indexed by `name` for quick lookup and consistent currency management.


