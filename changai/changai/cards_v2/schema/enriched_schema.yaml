  - name: "weight_uom"
    type: "VARCHAR(140)"
    role: ["inventory"]
    description: "Unit of measure for weight"
    synonyms_en: ["weight unit", "mass uom"]
    synonyms_ar: ["وحدة الوزن"]
    join_hint: tabPOS Invoice Item.weight_uom = tabUOM.name

  - name: "warehouse"
    type: "VARCHAR(140)"
    role: ["inventory"]
    description: "Warehouse from where the item is issued"
