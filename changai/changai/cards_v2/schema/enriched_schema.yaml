  - name: "select_print_heading"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Selected print heading"
    synonyms_en: ["print heading"]
    synonyms_ar: ["عنوان الطباعة"]
    join_hint: tabQuotation.select_print_heading = tabPrint Heading.name

  - name: "language"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Document language"
    synonyms_en: ["doc language"]
    synonyms_ar: ["لغة المستند"]

  - name: "order_lost_reason"
    type: "TEXT"
    role: ["attribute"]
    description: "Reason if quotation was lost"
    synonyms_en: ["lost reason"]
    synonyms_ar: ["سبب خسارة العرض"]

  - name: "status"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Current document status"
    synonyms_en: ["status"]
    synonyms_ar: ["الحالة"]
