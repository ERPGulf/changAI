  - name: "item_tax_amount"
    type: "DECIMAL"
    role: ["tax", "calculation"]
    description: "Total tax amount applied on this particular item."
    synonyms_en: ["item tax amount", "tax value", "tax per item"]
    synonyms_ar: ["قيمة الضريبة", "مبلغ الضريبة", "ضريبة العنصر"]

  - name: "rm_supp_cost"
