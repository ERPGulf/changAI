  - name: "prevent_pos"
    type: "INT"
    role: ["flag"]
    description: "Prevent purchase orders to this supplier"
    synonyms_en: ["block po"]
    synonyms_ar: ["منع أمر الشراء"]

  - name: "on_hold"
    type: "INT"
    role: ["flag"]
    description: "Flag indicating if supplier is on hold"
    synonyms_en: ["on hold"]
    synonyms_ar: ["قيد الإيقاف"]

  - name: "hold_type"
    type: "VARCHAR"
    role: ["flag"]
    description: "Type of hold applied"
    synonyms_en: ["hold type"]
    synonyms_ar: ["نوع الإيقاف"]
    options:
    - All
    - Invoices
    - Payments

  - name: "release_date"
    type: "DATE"
    role: ["flag"]
    description: "Date to release hold"
    synonyms_en: ["release date"]
    synonyms_ar: ["تاريخ الإطلاق"]


  notes: |
    - `tabSupplier` stores vendor master data used in purchasing workflows.
    - Common joins: purchase orders (`tabPurchase Order`), invoices (`tabPurchase Invoice`), and supplier quotations.
    - For reporting, use `supplier_group`, `country`, `is_frozen`, and `disabled` for segmentation.
    - `on_hold`, `warn_*`, and `prevent_*` flags support procurement control workflows.
    - `tax_category` and `tax_withholding_category` are used for tax compliance in purchasing.
    - `default_currency` and `payment_terms` help determine default financial settings.

- table: "tabPurchase Invoice"
  synonyms_en:
  - "purchase bill"
  - "vendor invoice"
  - "supplier invoice"
  - "purchase voucher"
  - "purchase document"
  synonyms_ar:
  - "فاتورة شراء"
  - "فاتورة المورد"
  - "فاتورة المشتريات"
  - "سند شراء"
  - "مستند شراء"
  description: "Represents a purchase transaction from a supplier. Includes supplier details, posting dates, totals, payment\
    \ information, and ZATCA compliance fields."

  fields:
  - name: "name"
    type: "VARCHAR"
    role: ["id"]
    description: "Primary key / Purchase Invoice ID"
    synonyms_en: ["purchase invoice id", "bill id", "purchase bill number"]
    synonyms_ar: ["معرّف فاتورة الشراء", "رقم فاتورة الشراء"]

  - name: "creation"
    type: "DATETIME"
    role: ["system"]
