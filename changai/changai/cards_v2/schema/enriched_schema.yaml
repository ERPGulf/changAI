    description: "Tax identification number of the customer"
    synonyms_en: ["tax id", "tax identification number", "TIN", "VAT number", "tax number"]
    synonyms_ar: ["رقم الضريبة", "رقم التعريف الضريبي", "الرقم الضريبي", "رقم ضريبة القيمة المضافة"]

  - name: "company"
