    role: ["system"]
    description: "Users who liked this record"
    synonyms_en: ["liked by"]
    synonyms_ar: ["أُعجب به بواسطة"]

  notes: |
    - Used to manage physical vs system stock variance.
    - Commonly part of inventory audit flows.
    - Core fields: item barcode scans and value variance posting.
    - Does not directly affect accounting modules except variance posting references.
    - Indexed field: parent/doctype joins for faster reconciliation links.

