    synonyms_en: ["base price list rate", "base currency price"]
    synonyms_ar: ["سعر القائمة بالعملة الأساسية", "السعر الأساسي بالعملة المحلية"]

  - name: "margin_type"
    type: "VARCHAR(140)"
