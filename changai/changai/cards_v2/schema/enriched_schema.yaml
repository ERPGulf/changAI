    role: ["relation"]
    description: "Linked party (Customer or Supplier)"
    synonyms_en: ["linked party", "entity", "contact entity"]
    synonyms_ar: ["الطرف المرتبط", "الجهة", "الكيان"]

  - name: "temporary_opening_account"
