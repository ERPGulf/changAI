    description: "Linked original document if amended"
    synonyms_en: ["amend reference", "original doc ref"]
    synonyms_ar: ["مُعدّل من", "مرجع المستند الأصلي"]
    join_hint: tabStock Reconciliation.amended_from = tabStock Reconciliation.name

  - name: "cost_center"
    type: "VARCHAR(140)"
    role: ["relation"]
