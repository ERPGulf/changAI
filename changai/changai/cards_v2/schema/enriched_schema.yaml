    synonyms_ar: ["المستودع الوجهة"]
    join_hint: tabPOS Invoice Item.target_warehouse = tabWarehouse.name

  - name: "quality_inspection"
    type: "VARCHAR(140)"
    role: ["quality"]
    description: "Reference to the quality inspection document"
    synonyms_en: ["inspection ID", "QC reference"]
    synonyms_ar: ["فحص الجودة"]
    join_hint: tabPOS Invoice Item.quality_inspection = tabQuality Inspection.name

  - name: "serial_and_batch_bundle"
    type: "VARCHAR(140)"
    role: ["inventory"]
    description: "Serial and batch bundle identifier"
    synonyms_en: ["batch bundle", "serial bundle"]
    synonyms_ar: ["مجموعة التسلسل والدفعة"]
    join_hint: tabPOS Invoice Item.serial_and_batch_bundle = tabSerial and Batch Bundle.name

  - name: "use_serial_batch_fields"
    type: "INT(1)"
    role: ["inventory"]
    description: "Specifies if serial and batch fields are used"
    synonyms_en: ["serial tracking", "batch tracking"]
    synonyms_ar: ["استخدام الحقول التسلسلية"]

  - name: "allow_zero_valuation_rate"
    type: "INT(1)"
    role: ["inventory"]
    description: "Allows item with zero valuation rate"
    synonyms_en: ["zero valuation allowed", "allow no value"]
    synonyms_ar: ["السماح بتقييم صفري"]

  - name: "item_tax_rate"
    type: "TEXT"
    role: ["financial"]
    description: "Tax rate applied to the item"
    synonyms_en: ["tax rate", "item tax"]
    synonyms_ar: ["نسبة الضريبة"]

  - name: "actual_batch_qty"
    type: "DECIMAL(21,9)"
    role: ["inventory"]
    description: "Actual batch quantity for the item"
    synonyms_en: ["real batch qty", "actual lot quantity"]
    synonyms_ar: ["الكمية الفعلية للدفعة"]

  - name: "actual_qty"
    type: "DECIMAL(21,9)"
    role: ["inventory"]
    description: "Actual quantity of the item processed"
    synonyms_en: ["real quantity", "actual processed qty"]
    synonyms_ar: ["الكمية الفعلية"]

  - name: "serial_no"
    type: "TEXT"
    role: ["inventory"]
    description: "Serial numbers associated with the item"
    synonyms_en: ["serial numbers", "item serials"]
    synonyms_ar: ["الأرقام التسلسلية"]

  - name: "batch_no"
    type: "VARCHAR(140)"
    role: ["inventory"]
    description: "Batch number of the item"
    synonyms_en: ["lot number", "batch ID"]
    synonyms_ar: ["رقم الدفعة"]
    join_hint: tabPOS Invoice Item.batch_no = tabBatch.name

  - name: "sales_order"
    type: "VARCHAR(140)"
    role: ["sales"]
    description: "Reference to linked Sales Order"
    synonyms_en: ["SO reference", "sales order ID"]
    synonyms_ar: ["طلب المبيعات"]
    join_hint: tabPOS Invoice Item.sales_order = tabSales Order.name

  - name: "so_detail"
    type: "VARCHAR(140)"
    role: ["sales"]
    description: "Reference to Sales Order detail row"
    synonyms_en: ["SO item reference", "sales order detail"]
    synonyms_ar: ["تفاصيل طلب المبيعات"]

  - name: "pos_invoice_item"
    type: "VARCHAR(140)"
    role: ["sales"]
    description: "Reference to related POS Invoice Item"
    synonyms_en: ["POS item reference", "linked POS item"]
    synonyms_ar: ["عنصر الفاتورة في نقطة البيع"]

  - name: "delivery_note"
    type: "VARCHAR(140)"
    role: ["logistics"]
    description: "Linked Delivery Note reference"
    synonyms_en: ["delivery note ID", "dispatch reference"]
    synonyms_ar: ["إشعار التسليم"]
    join_hint: tabPOS Invoice Item.delivery_note = tabDelivery Note.name

  - name: "dn_detail"
    type: "VARCHAR(140)"
    role: ["logistics"]
    description: "Reference to Delivery Note detail row"
    synonyms_en: ["delivery note item", "dispatch detail"]
    synonyms_ar: ["تفاصيل إشعار التسليم"]

  - name: "delivered_qty"
    type: "DECIMAL(21,9)"
    role: ["logistics"]
    description: "Quantity delivered for the item"
    synonyms_en: ["delivered quantity", "shipped qty"]
    synonyms_ar: ["الكمية المسلمة"]

  - name: "cost_center"
    type: "VARCHAR(140)"
    role: ["financial"]
    description: "Cost center associated with this item"
    synonyms_en: ["expense center", "department code"]
    synonyms_ar: ["مركز التكلفة"]
    join_hint: tabPOS Invoice Item.cost_center = tabCost Center.name

  - name: "project"
    type: "VARCHAR(140)"
    role: ["project_management"]
    description: "Linked project reference"
    synonyms_en: ["project code", "project reference"]
    synonyms_ar: ["المشروع"]
    join_hint: tabPOS Invoice Item.project = tabProject.name



  - name: "parent"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "Parent document name for this record"
    synonyms_en: ["parent ID", "linked document"]
    synonyms_ar: ["المستند الرئيسي"]
    join_hint: tabPOS Invoice Item.parent = tabPOS Invoice.name

  - name: "parentfield"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "Field name used to link child record to parent document"
    synonyms_en: ["child field name", "link field"]
    synonyms_ar: ["حقل الارتباط"]

  - name: "parenttype"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "Parent document type name"
    synonyms_en: ["parent type", "document type"]
    synonyms_ar: ["نوع المستند الرئيسي"]

  notes: |
    - Core doctype for POS billing and retail sales tracking.
    - Each record represents an individual product or service item in a POS Invoice.
    - Use `docstatus = 1` to filter finalized (submitted) invoices.
    - Key joins: `parent` → `tabPOS Invoice`, `item_code` → `tabItem`, `warehouse` → `tabWarehouse`.
    - Pricing fields include `rate`, `amount`, `discount_percentage`, `discount_amount`, and `net_amount`.
    - Margin fields (`margin_type`, `margin_rate_or_amount`, `rate_with_margin`) manage markups and margins.
    - `net_rate` and `net_amount` capture post-discount, pre-tax values.
    - `income_account`, `expense_account`, and `cost_center` map revenue and expense accounts.

- table: "tabPayment Entry"
  synonyms_en:
  - "payment transaction"
  - "bank payment"
  - "cash receipt"
  - "incoming payment"
  - "outgoing payment"
  - "fund transfer"
  description: "Record of payments made or received, including mode of payment, party details, references to invoices, and\
    \ accounting impact on company ledgers."
  fields:

  - name: "name"
    type: "VARCHAR(140)"
    role: ["system", "primary_key"]
    description: "Unique name or ID of the payment entry document"
    synonyms_en: ["document id", "payment entry id", "record name"]
    synonyms_ar: ["اسم السجل", "معرف السجل"]

  - name: "creation"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the document was created"
    synonyms_en: ["created on", "creation date"]
    synonyms_ar: ["تاريخ الإنشاء"]

  - name: "modified"
    type: "DATETIME(6)"
    role: ["system"]
    description: "Timestamp when the document was last modified"
    synonyms_en: ["modified on", "last updated"]
    synonyms_ar: ["تاريخ التعديل"]

  - name: "modified_by"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who last modified the document"
    synonyms_en: ["updated by", "edited by"]
    synonyms_ar: ["تم التعديل بواسطة"]

  - name: "owner"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "User who created the document"
    synonyms_en: ["created by", "document owner"]
    synonyms_ar: ["تم الإنشاء بواسطة"]

  - name: "docstatus"
    type: "INT(1)"
    role: ["system"]
    description: "Document status (0: Draft, 1: Submitted, 2: Cancelled)"
    synonyms_en: ["document status", "status code"]
    synonyms_ar: ["حالة المستند"]

  - name: "idx"
    type: "INT(8)"
    role: ["system"]
    description: "Index for internal ordering"
    synonyms_en: ["index", "order index"]
    synonyms_ar: ["ترتيب"]

  - name: "naming_series"
    type: "VARCHAR(140)"
    role: ["system"]
    description: "Naming series pattern used for auto-generated document names"
    synonyms_en: ["series code", "naming pattern"]
    synonyms_ar: ["نمط التسمية", "رمز السلسلة"]
    options:
    - ACC-PAY-.YYYY.-

  - name: "payment_type"
    type: "VARCHAR(140)"
    description: "Indicates whether the payment is incoming, outgoing, or transfer."
    synonyms_en: ["payment direction", "transaction type", "receipt or payment"]
    synonyms_ar: ["نوع الدفع", "اتجاه المعاملة"]
    options:
    - Receive
    - Pay
    - Internal Transfer

  - name: "payment_order_status"
    type: "VARCHAR(140)"
    description: "Status of linked payment order, showing whether it is pending, processed, or cancelled."
    synonyms_en: ["payment order state", "order status"]
    synonyms_ar: ["حالة أمر الدفع"]
    options:
    - Initiated
    - Payment Ordered

  - name: "posting_date"
    type: "DATE"
    description: "The date on which the payment is recorded in the company’s books."
    synonyms_en: ["transaction date", "record date"]
    synonyms_ar: ["تاريخ القيد", "تاريخ المعاملة"]

  - name: "company"
    type: "VARCHAR(140)"
    description: "Company for which this payment entry is recorded."
    synonyms_en: ["organization", "entity name"]
    synonyms_ar: ["الشركة"]
    join_hint: tabPayment Entry.company = tabCompany.name

  - name: "mode_of_payment"
    type: "VARCHAR(140)"
    description: "Specifies how the payment was made or received (e.g., Bank, Cash, UPI)."
    synonyms_en: ["payment method", "transaction medium"]
    synonyms_ar: ["طريقة الدفع", "وسيلة الدفع"]
    join_hint: tabPayment Entry.mode_of_payment = tabMode of Payment.name

  - name: "party_type"
    type: "VARCHAR(140)"
    description: "Indicates whether the party is a Customer, Supplier, or Employee."
    synonyms_en: ["partner type", "counterparty type"]
    synonyms_ar: ["نوع الطرف"]
    join_hint: tabPayment Entry.party_type = tabDocType.name

  - name: "party"
    type: "VARCHAR(140)"
    description: "Linked party (Customer, Supplier, or Employee) involved in this transaction."
    synonyms_en: ["linked partner", "counterparty name"]
    synonyms_ar: ["الطرف"]

  - name: "party_name"
    type: "VARCHAR(140)"
    description: "Display name of the party involved in the payment."
    synonyms_en: ["partner name", "beneficiary name"]
    synonyms_ar: ["اسم الطرف"]

  - name: "book_advance_payments_in_separate_party_account"
    type: "INT(1)"
    description: "Flag indicating if advance payments should be booked separately in party accounts."
    synonyms_en: ["separate advance booking flag"]
    synonyms_ar: ["تسجيل الدفعات المسبقة في حساب منفصل"]

  - name: "reconcile_on_advance_payment_date"
    type: "INT(1)"
    description: "Specifies if advance payments should be reconciled based on their payment date."
    synonyms_en: ["reconcile on advance date", "match advance by date"]
    synonyms_ar: ["تسوية على تاريخ الدفعة المسبقة"]

  - name: "bank_account"
    type: "VARCHAR(140)"
    description: "Company bank account used for this transaction."
    synonyms_en: ["company bank", "payment source account"]
    synonyms_ar: ["الحساب البنكي للشركة"]
    join_hint: tabPayment Entry.bank_account = tabBank Account.name

  - name: "party_bank_account"
    type: "VARCHAR(140)"
    description: "Bank account of the customer or supplier receiving or sending the payment."
    synonyms_en: ["partner bank account", "beneficiary account"]
    synonyms_ar: ["الحساب البنكي للطرف"]
    join_hint: tabPayment Entry.party_bank_account = tabBank Account.name

  - name: "contact_person"
    type: "VARCHAR(140)"
    description: "Contact person associated with the party for this payment."
    synonyms_en: ["party contact", "representative name"]
    synonyms_ar: ["شخص الاتصال"]
    join_hint: tabPayment Entry.contact_person = tabContact.name

  - name: "contact_email"
    type: "VARCHAR(140)"
    description: "Email address of the contact person."
    synonyms_en: ["contact email ID", "party email"]
    synonyms_ar: ["البريد الإلكتروني للاتصال"]

  - name: "party_balance"
    type: "DECIMAL(21,9)"
    description: "The outstanding balance of the party before this transaction."
    synonyms_en: ["balance before payment", "party outstanding amount"]
    synonyms_ar: ["رصيد الطرف"]

  - name: "paid_from"
    type: "VARCHAR(140)"
    description: "Ledger account from which payment is made (for outgoing payments)."
    synonyms_en: ["source account", "debit account"]
    synonyms_ar: ["الحساب المدفوع منه"]
    join_hint: tabPayment Entry.paid_from = tabAccount.name

  - name: "paid_from_account_type"
    type: "VARCHAR(140)"
    description: "Specifies the type of account used for payment (e.g., Bank, Cash)."
    synonyms_en: ["source account type"]
    synonyms_ar: ["نوع الحساب المدفوع منه"]

  - name: "paid_from_account_currency"
    type: "VARCHAR(140)"
    description: "Currency of the account from which the payment is made."
    synonyms_en: ["source account currency", "debit account currency"]
    synonyms_ar: ["عملة الحساب المدفوع منه"]
    join_hint: tabPayment Entry.paid_from_account_currency = tabCurrency.name

  - name: "paid_from_account_balance"
    type: "DECIMAL(21,9)"
    description: "Current balance of the source account before the payment transaction."
    synonyms_en: ["source account balance", "debit account balance"]
    synonyms_ar: ["رصيد الحساب المدفوع منه"]

  - name: "paid_to"
    type: "VARCHAR(140)"
    description: "Ledger account to which the payment is made (for incoming payments)."
    synonyms_en: ["destination account", "credit account"]
    synonyms_ar: ["الحساب المدفوع إليه"]
    join_hint: tabPayment Entry.paid_to = tabAccount.name

  - name: "paid_to_account_type"
    type: "VARCHAR(140)"
    description: "Type of the destination account receiving the payment (e.g., Bank, Cash)."
    synonyms_en: ["destination account type"]
    synonyms_ar: ["نوع الحساب المدفوع إليه"]

  - name: "paid_to_account_currency"
    type: "VARCHAR(140)"
    description: "Currency of the account receiving the payment."
    synonyms_en: ["destination account currency", "credit account currency"]
    synonyms_ar: ["عملة الحساب المدفوع إليه"]
    join_hint: tabPayment Entry.paid_to_account_currency = tabCurrency.name

  - name: "paid_to_account_balance"
    type: "DECIMAL(21,9)"
    description: "Current balance of the destination account before the transaction."
    synonyms_en: ["destination account balance", "credit account balance"]
    synonyms_ar: ["رصيد الحساب المدفوع إليه"]

  - name: "paid_amount"
    type: "DECIMAL(21,9)"
    description: "Total amount paid from the source account before tax calculations."
    synonyms_en: ["gross paid amount", "total payment"]
    synonyms_ar: ["المبلغ المدفوع"]

  - name: "paid_amount_after_tax"
    type: "DECIMAL(21,9)"
    description: "Amount paid after tax adjustments are applied."
    synonyms_en: ["net paid amount", "payment after tax"]
    synonyms_ar: ["المبلغ المدفوع بعد الضريبة"]

  - name: "source_exchange_rate"
    type: "DECIMAL(21,9)"
    description: "Exchange rate applied for converting source account currency to base currency."
    synonyms_en: ["source forex rate", "conversion rate from source"]
    synonyms_ar: ["سعر الصرف للحساب المصدر"]

  - name: "base_paid_amount"
    type: "DECIMAL(21,9)"
    description: "Equivalent paid amount converted into the company’s base currency."
    synonyms_en: ["base currency paid amount", "converted paid amount"]
    synonyms_ar: ["المبلغ المدفوع بالعملة الأساسية"]

  - name: "base_paid_amount_after_tax"
    type: "DECIMAL(21,9)"
    description: "Paid amount after tax, converted to base currency."
    synonyms_en: ["net paid amount in base currency"]
    synonyms_ar: ["المبلغ الصافي المدفوع بالعملة الأساسية"]

  - name: "received_amount"
    type: "DECIMAL(21,9)"
    description: "Total amount received into the destination account before tax."
    synonyms_en: ["gross received amount", "total receipt"]
    synonyms_ar: ["المبلغ المستلم"]

  - name: "received_amount_after_tax"
    type: "DECIMAL(21,9)"
    description: "Received amount after tax deductions or additions."
    synonyms_en: ["net received amount", "receipt after tax"]
    synonyms_ar: ["المبلغ المستلم بعد الضريبة"]

  - name: "target_exchange_rate"
    type: "DECIMAL(21,9)"
    description: "Exchange rate used to convert destination account currency to base currency."
    synonyms_en: ["target forex rate", "conversion rate to destination"]
    synonyms_ar: ["سعر الصرف للحساب الوجهة"]

  - name: "base_received_amount"
    type: "DECIMAL(21,9)"
    description: "Amount received, converted into base currency before tax."
    synonyms_en: ["base currency received amount", "converted received amount"]
    synonyms_ar: ["المبلغ المستلم بالعملة الأساسية"]

  - name: "base_received_amount_after_tax"
    type: "DECIMAL(21,9)"
    description: "Received amount after tax, expressed in base currency."
    synonyms_en: ["net received amount in base currency"]
    synonyms_ar: ["المبلغ الصافي المستلم بالعملة الأساسية"]

  - name: "total_allocated_amount"
    type: "DECIMAL(21,9)"
    description: "Total amount from the payment allocated to invoices or other documents."
    synonyms_en: ["allocated total", "total applied amount"]
    synonyms_ar: ["إجمالي المبلغ المخصص"]

  - name: "base_total_allocated_amount"
    type: "DECIMAL(21,9)"
    description: "Total allocated amount in company base currency."
    synonyms_en: ["base currency allocated total"]
    synonyms_ar: ["إجمالي المبلغ المخصص بالعملة الأساسية"]

  - name: "unallocated_amount"
    type: "DECIMAL(21,9)"
    description: "Remaining unallocated amount after applying payments to invoices."
    synonyms_en: ["unapplied balance", "unsettled payment amount"]
    synonyms_ar: ["المبلغ غير المخصص"]

  - name: "difference_amount"
    type: "DECIMAL(21,9)"
    description: "The difference between the paid and allocated amounts, often due to rounding or exchange rate variations."
    synonyms_en: ["adjustment amount", "payment difference"]
    synonyms_ar: ["مبلغ الفرق", "مبلغ التعديل"]

  - name: "purchase_taxes_and_charges_template"
    type: "VARCHAR(140)"
    description: "Template used for applying purchase taxes and charges in the payment entry."
    synonyms_en: ["purchase tax template", "supplier tax setup"]
    synonyms_ar: ["نموذج الضرائب والمصاريف للمشتريات"]
    join_hint: tabPayment Entry.purchase_taxes_and_charges_template = tabPurchase Taxes and Charges Template.name

  - name: "sales_taxes_and_charges_template"
    type: "VARCHAR(140)"
    description: "Template used for applying sales taxes and charges related to the transaction."
    synonyms_en: ["sales tax template", "customer tax setup"]
    synonyms_ar: ["نموذج الضرائب والمصاريف للمبيعات"]
    join_hint: tabPayment Entry.sales_taxes_and_charges_template = tabSales Taxes and Charges Template.name

  - name: "apply_tax_withholding_amount"
    type: "INT(1)"
    description: "Indicates whether tax withholding (TDS/TCS) should be applied to this payment."
    synonyms_en: ["apply withholding", "enable tax deduction"]
    synonyms_ar: ["تطبيق اقتطاع الضريبة", "تفعيل حجز الضريبة"]

  - name: "tax_withholding_category"
    type: "VARCHAR(140)"
    description: "Tax withholding category or type applied, such as TDS or WHT, based on jurisdiction rules."
    synonyms_en: ["withholding tax category", "TDS category"]
    synonyms_ar: ["فئة اقتطاع الضريبة", "نوع الضريبة المقتطعة"]
    join_hint: tabPayment Entry.tax_withholding_category = tabTax Withholding Category.name

  - name: "base_total_taxes_and_charges"
    type: "DECIMAL(21,9)"
    description: "Total taxes and charges expressed in the company’s base currency."
    synonyms_en: ["base total tax", "tax total in base currency"]
    synonyms_ar: ["إجمالي الضرائب والمصاريف بالعملة الأساسية"]

  - name: "total_taxes_and_charges"
    type: "DECIMAL(21,9)"
    description: "Total taxes and charges applied in the transaction currency."
    synonyms_en: ["total tax and charge", "tax total in transaction currency"]
    synonyms_ar: ["إجمالي الضرائب والمصاريف بعملة المعاملة"]

  - name: "reference_no"
    type: "VARCHAR(140)"
    description: "External payment reference number, such as bank transaction ID or cheque number."
    synonyms_en: ["transaction reference", "bank reference number"]
    synonyms_ar: ["الرقم المرجعي للدفعة", "رقم المعاملة البنكية"]

  - name: "reference_date"
    type: "DATE"
    description: "Date of the external payment reference, such as cheque or bank transfer date."
    synonyms_en: ["transaction date", "reference document date"]
    synonyms_ar: ["تاريخ المرجع", "تاريخ المعاملة"]

  - name: "clearance_date"
    type: "DATE"
    description: "Date when the payment was cleared or reconciled in the bank account."
    synonyms_en: ["bank clearance date", "settlement date"]
    synonyms_ar: ["تاريخ التسوية البنكية", "تاريخ المقاصة"]

  - name: "project"
    type: "VARCHAR(140)"
    description: "Project to which this payment entry is linked for cost or revenue tracking."
    synonyms_en: ["project reference", "associated project"]
    synonyms_ar: ["المشروع المرتبط", "مشروع الدفعة"]
    join_hint: tabPayment Entry.project = tabProject.name

  - name: "cost_center"
    type: "VARCHAR(140)"
    description: "Cost center to which the payment is allocated for accounting segmentation."
    synonyms_en: ["accounting cost center", "department cost center"]
    synonyms_ar: ["مركز التكلفة", "وحدة التكاليف"]
    join_hint: tabPayment Entry.cost_center = tabCost Center.name

  - name: "status"
    type: "VARCHAR(140)"
    description: "Current workflow state of the payment entry, such as Draft, Submitted, or Reconciled."
    synonyms_en: ["payment status", "entry state"]
    synonyms_ar: ["حالة الدفعة", "حالة القيد"]
    options:
    - Draft
    - Submitted
    - Cancelled

  - name: "custom_remarks"
    type: "INT(1)"
    description: "Indicates whether a custom remark has been added to this payment entry."
    synonyms_en: ["has custom remarks", "remark flag"]
    synonyms_ar: ["ملاحظات مخصصة", "إشارة الملاحظات"]

  - name: "remarks"
    type: "TEXT"
    description: "Additional notes or comments describing the payment details."
    synonyms_en: ["comments", "payment notes"]
    synonyms_ar: ["ملاحظات", "تعليقات الدفعة"]

  - name: "base_in_words"
    type: "TEXT"
    description: "Total base amount written in words in the company's base currency."
    synonyms_en: ["base total in words", "base amount words"]
    synonyms_ar: ["المبلغ الأساسي بالحروف", "الإجمالي بعملة الأساس بالحروف"]

  - name: "is_opening"
    type: "VARCHAR(140)"
    description: "Indicates whether this payment entry represents an opening balance."
    synonyms_en: ["opening entry flag", "opening balance indicator"]
    synonyms_ar: ["إدخال افتتاحي", "رصيد افتتاحي"]
    options:
    - 'No'
    - 'Yes'

  - name: "letter_head"
    type: "VARCHAR(140)"
    description: "Letterhead template used when printing this payment document."
    synonyms_en: ["document letterhead", "print header"]
    synonyms_ar: ["رأس الخطاب", "نموذج الطباعة"]
    join_hint: tabPayment Entry.letter_head = tabLetter Head.name

  - name: "print_heading"
    type: "VARCHAR(140)"
    description: "Custom title displayed on printed versions of this payment entry."
    synonyms_en: ["print title", "print heading"]
    synonyms_ar: ["عنوان الطباعة", "رأس الطباعة"]
    join_hint: tabPayment Entry.print_heading = tabPrint Heading.name

  - name: "bank"
    type: "VARCHAR(140)"
    description: "Name of the bank used for this payment transaction."
    synonyms_en: ["bank name", "associated bank"]
    synonyms_ar: ["اسم البنك", "البنك المرتبط"]

  - name: "bank_account_no"
    type: "VARCHAR(140)"
    description: "Bank account number from which or to which the payment is made."
    synonyms_en: ["bank account number", "account number"]
    synonyms_ar: ["رقم الحساب البنكي", "رقم الحساب"]

  - name: "payment_order"
    type: "VARCHAR(140)"
    description: "Reference to the associated payment order document."
    synonyms_en: ["payment order reference", "linked payment order"]
    synonyms_ar: ["أمر الدفع", "مرجع الدفع"]
    join_hint: tabPayment Entry.payment_order = tabPayment Order.name

  - name: "in_words"
    type: "TEXT"
    description: "Total paid amount written in words in the transaction currency."
    synonyms_en: ["amount in words", "payment amount in words"]
    synonyms_ar: ["المبلغ بالحروف", "إجمالي الدفع بالحروف"]

  - name: "auto_repeat"
    type: "VARCHAR(140)"
    description: "Specifies if this payment entry is linked to an auto-repeat schedule."
    synonyms_en: ["auto repeat", "recurring payment reference"]
    synonyms_ar: ["تكرار تلقائي", "دفعة متكررة"]
    join_hint: tabPayment Entry.auto_repeat = tabAuto Repeat.name

  - name: "amended_from"
    type: "VARCHAR(140)"
    description: "Reference to the original payment entry if this document is an amendment."
    synonyms_en: ["amended from document", "revision source"]
    synonyms_ar: ["تعديل من", "مستند معدل"]
    join_hint: tabPayment Entry.amended_from = tabPayment Entry.name

  - name: "title"
    type: "VARCHAR(140)"
    description: "Custom title of this payment entry used for display or identification."
    synonyms_en: ["document title", "payment entry title"]
    synonyms_ar: ["عنوان المستند", "عنوان الدفع"]


  notes: |
    - Core doctype for POS session payment reconciliation.
    - Use `docstatus = 1` to filter submitted POS closing entries.
    - Key joins: `mode_of_payment` → `tabMode of Payment Account`, `parent` → `tabPOS Closing Entry`.
    - `opening_amount`, `expected_amount`, and `closing_amount` track daily cash flow per mode of payment.
    - `difference` highlights shortages or overages between expected and counted cash.
    - Useful for cash management, audit, and POS reconciliation reports.
    - Indexed fields like `mode_of_payment`, `parent`, and `creation` improve query performance.

