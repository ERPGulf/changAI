    join_hint: tabQuotation.auto_repeat = tabAuto Repeat.name

  - name: "letter_head"
    type: "VARCHAR(140)"
    role: ["attribute"]
    description: "Print letter head reference"
    synonyms_en: ["letter head"]
    synonyms_ar: ["رأس الرسالة", "الترويسة"]
    join_hint: tabQuotation.letter_head = tabLetter Head.name

  - name: "group_same_items"
    type: "INT(1)"
    role: ["attribute"]
    description: "Group identical items flag"
    synonyms_en: ["group items"]
