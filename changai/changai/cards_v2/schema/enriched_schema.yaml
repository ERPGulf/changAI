    synonyms_ar: ["حالة المستند", "حالة السجل", "مؤشر الحالة"]

  - name: "idx"
    type: "INT(8)"
    description: "Index position for ordering records internally"
    synonyms_en: ["index", "position", "order number"]
    synonyms_ar: ["الفهرس", "الترتيب", "رقم الترتيب"]

  - name: "branch"
    type: "VARCHAR(140)"
